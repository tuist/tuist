# Used by `mise run grafana:dev`.
#
# Brings up a Prometheus that scrapes https://staging.tuist.dev and a Grafana
# stack with the plugin mounted + the Prometheus datasource pre-provisioned.
#
# The dev task is responsible for populating `.secrets/` before compose starts:
#
#   - `.secrets/prometheus.yml`       rendered from prometheus.yml.tmpl with
#                                     the developer's Tuist handle
#   - `.secrets/tuist-metrics-token`  a per-developer `account:metrics:read`
#                                     token minted from the developer's OAuth
#                                     session against staging.tuist.dev
#
# Both are gitignored and mounted read-only so they never leak into the image
# or docker-inspect output.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
    volumes:
      - ./.secrets/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.secrets/tuist-metrics-token:/etc/prometheus/secrets/tuist-metrics-token:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: tuist-tuist-app
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./dist:/var/lib/grafana/plugins/tuist-tuist-app
      - ./provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
