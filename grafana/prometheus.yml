global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: tuist-staging
    scheme: https
    metrics_path: /api/accounts/marek/metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/tuist-metrics-token
    static_configs:
      - targets:
          - staging.tuist.dev
        labels:
          env: staging
