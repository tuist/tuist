services:
  cache:
    image: ghcr.io/tuist/cache
    container_name: cache-app
    user: "990:990"
    volumes:
      - cas_data:/cas:rw
      - sqlite_data:/data:rw
      - cache_socket:/run/cache:rw
      - /etc/hostname:/etc/host_hostname:ro
    environment:
      CAS_STORAGE_DIR: /cas
      PHX_SOCKET_PATH: /run/cache/cache.sock
      PHX_SOCKET_LINK: /run/cache/current.sock
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      APPSIGNAL_PUSH_API_KEY: ${APPSIGNAL_PUSH_API_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_HOST: ${S3_HOST}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      TUIST_CACHE_API_KEY: ${TUIST_CACHE_API_KEY}
      RELEASE_COOKIE: ${RELEASE_COOKIE}
      GUARDIAN_SECRET_KEY: ${GUARDIAN_SECRET_KEY}
      OBAN_WEB_USERNAME: ${OBAN_WEB_USERNAME}
      OBAN_WEB_PASSWORD: ${OBAN_WEB_PASSWORD}
    networks:
      - cache_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cache-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - cache_socket:/run/cache:ro
      - cas_data:/cas:ro
      - nginx_certs:/etc/nginx/certs:rw
      - nginx_acme:/var/www/acme:rw
    depends_on:
      - cache
    networks:
      - cache_network
    restart: unless-stopped

volumes:
  cas_data:
  sqlite_data:
  cache_socket:
  nginx_certs:
  nginx_acme:

networks:
  cache_network:
    driver: bridge
