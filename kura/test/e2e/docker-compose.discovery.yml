services:
  kura-us:
    environment:
      KURA_PEERS: http://kura-us.kura.internal:7443
      KURA_DISCOVERY_DNS_NAME: kura-ring.kura.internal
    networks:
      default:
        aliases:
          - kura-us.kura.internal
          - kura-ring.kura.internal

  kura-us-2:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: kura-us-2
    domainname: kura.internal
    environment:
      KURA_PORT: "4000"
      KURA_GRPC_PORT: "50051"
      KURA_INTERNAL_PORT: "7443"
      KURA_TENANT_ID: default
      KURA_TMP_DIR: /tmp/kura
      KURA_DATA_DIR: /var/cache/kura
      KURA_REGION: us-east
      KURA_NODE_URL: http://kura-us-2.kura.internal:7443
      KURA_PEERS: http://kura-us-2.kura.internal:7443
      KURA_DISCOVERY_DNS_NAME: kura-ring.kura.internal
      KURA_FILE_DESCRIPTOR_POOL_SIZE: "128"
      KURA_FILE_DESCRIPTOR_ACQUIRE_TIMEOUT_MS: "5000"
      KURA_SEGMENT_HANDLE_CACHE_SIZE: "32"
      KURA_MEMORY_SOFT_LIMIT_BYTES: "536870912"
      KURA_MEMORY_HARD_LIMIT_BYTES: "805306368"
      KURA_MANIFEST_CACHE_MAX_BYTES: "67108864"
      KURA_MAX_KEYVALUE_BYTES: "1048576"
      KURA_METADATA_STORE_MAX_OPEN_FILES: "1024"
      KURA_METADATA_STORE_MAX_BACKGROUND_JOBS: "4"
      KURA_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4318/v1/traces
      KURA_OTEL_SERVICE_NAME: kura-us-2
      KURA_OTEL_DEPLOYMENT_ENVIRONMENT: local
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/up >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
    labels:
      kura.region: us-east
      kura.tenant_id: default
    ports:
      - "${KURA_US_2_PORT:-4402}:4000"
      - "${KURA_US_2_GRPC_PORT:-5402}:50051"
    volumes:
      - kura-us-2-data:/var/cache/kura
    networks:
      default:
        aliases:
          - kura-us-2.kura.internal
          - kura-ring.kura.internal

volumes:
  kura-us-2-data:
