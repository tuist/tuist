# PATCHED gateway nginx config — reproduces production AFTER the fix.
#
# Identical to baseline.conf EXCEPT for the three HTTP/2 upload-window
# directives below, which are exactly what the kura-controller / platform
# chart now render:
#   client-body-buffer-size: "4m"
#   http2-max-concurrent-streams: "32"
#   http-snippet: "http2_body_preread_size 4m;"
#
# Keep this file in lockstep with baseline.conf so the harness measures the
# effect of the window change and nothing else.

worker_processes auto;
events { worker_connections 4096; }

http {
    access_log off;
    error_log /dev/stderr warn;

    # ---- THE FIX (the only difference from baseline.conf) ----
    http2_body_preread_size 4m;        # initial advertised HTTP/2 request-body window (default 64k)
    client_body_buffer_size 4m;        # paces WINDOW_UPDATE grants while streaming (default ~16k)
    http2_max_concurrent_streams 32;   # bounds worst-case memory: 32 x 4m = 128MB/conn (default 128)
    # ----------------------------------------------------------

    upstream kura_grpc {
        server kura:50051;
        keepalive 16;
        keepalive_requests 10000;
        keepalive_timeout 10s;
    }

    server {
        listen 8443;
        http2 on;

        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        location / {
            grpc_pass grpc://kura_grpc;
            grpc_read_timeout 3600s;
            grpc_send_timeout 3600s;
        }
    }
}
