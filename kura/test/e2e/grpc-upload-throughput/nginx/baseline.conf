# BASELINE gateway nginx config — reproduces production BEFORE the fix.
#
# This intentionally leaves the HTTP/2 request-body flow-control windows at
# nginx's defaults (http2_body_preread_size 64k, client_body_buffer_size 16k,
# http2_max_concurrent_streams 128). Under WAN latency that caps each gRPC
# upload stream at ~window/RTT, which is the bug the PR fixes.
#
# Everything else mirrors the kura gateway (h2c listener, grpc_pass, unlimited
# body, long grpc timeouts, no buffering) so the ONLY difference between this
# file and patched.conf is the three window directives.

worker_processes auto;
events { worker_connections 4096; }

http {
    access_log off;
    error_log /dev/stderr warn;

    # NOTE: no window overrides here — nginx defaults apply (this is the point).

    upstream kura_grpc {
        server kura:50051;
        keepalive 16;
        keepalive_requests 10000;
        keepalive_timeout 10s;
    }

    server {
        listen 8443;
        http2 on;                      # cleartext HTTP/2 (h2c) — matches client over plaintext

        client_max_body_size 0;        # proxy-body-size: 0
        proxy_buffering off;           # proxy-buffering: off
        proxy_request_buffering off;   # proxy-request-buffering: off (no-op for grpc, kept for parity)
        proxy_max_temp_file_size 0;    # proxy-max-temp-file-size: 0

        location / {
            grpc_pass grpc://kura_grpc;
            grpc_read_timeout 3600s;   # proxy-read-timeout: 3600
            grpc_send_timeout 3600s;   # proxy-send-timeout: 3600
        }
    }
}
