# Publishes kura-us's DEDICATED HTTP listener (KURA_PORT=4000) to the host for
# the accelerated-serving suite. The base compose publishes the combined
# HTTP + h2c gRPC listener (8080) as the primary client endpoint (KURA_US_PORT),
# but the same-port artifact accelerator only runs on the dedicated HTTP
# listener — the combined listener uses the standard Axum path — so this suite
# reaches 4000 explicitly to exercise it. Isolated to this override file so the
# extra host port is only allocated for this suite (parallel-safe).
services:
  kura-us:
    ports:
      - "${KURA_US_HTTP_PORT:-4104}:4000"
