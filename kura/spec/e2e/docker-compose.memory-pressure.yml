services:
  kura-us:
    mem_limit: ${KURA_E2E_DOCKER_MEMORY_LIMIT:-256m}
    environment: &kura_memory_pressure_env
      KURA_MEMORY_SOFT_LIMIT_BYTES: ${KURA_E2E_MEMORY_SOFT_LIMIT_BYTES:-134217728}
      KURA_MEMORY_HARD_LIMIT_BYTES: ${KURA_E2E_MEMORY_HARD_LIMIT_BYTES:-201326592}
      KURA_MANIFEST_CACHE_MAX_BYTES: ${KURA_E2E_MANIFEST_CACHE_MAX_BYTES:-8388608}
      KURA_SEGMENT_HANDLE_CACHE_SIZE: ${KURA_E2E_SEGMENT_HANDLE_CACHE_SIZE:-8}
      KURA_METADATA_STORE_READ_CACHE_BYTES: ${KURA_E2E_METADATA_STORE_READ_CACHE_BYTES:-8388608}
      KURA_METADATA_STORE_WRITE_BUFFER_POOL_BYTES: ${KURA_E2E_METADATA_STORE_WRITE_BUFFER_POOL_BYTES:-8388608}
      KURA_METADATA_STORE_WRITE_BUFFER_BYTES: ${KURA_E2E_METADATA_STORE_WRITE_BUFFER_BYTES:-4194304}
  kura-eu:
    mem_limit: ${KURA_E2E_DOCKER_MEMORY_LIMIT:-256m}
    environment:
      <<: *kura_memory_pressure_env
  kura-ap:
    mem_limit: ${KURA_E2E_DOCKER_MEMORY_LIMIT:-256m}
    environment:
      <<: *kura_memory_pressure_env
