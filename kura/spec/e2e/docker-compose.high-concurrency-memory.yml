services:
  kura-us:
    mem_limit: 2g
    environment: &kura_high_concurrency_memory
      KURA_MEMORY_SOFT_LIMIT_BYTES: null
      KURA_MEMORY_HARD_LIMIT_BYTES: null
      KURA_SNAPSHOT_CACHE_MAX_BYTES: null
      KURA_MANIFEST_CACHE_MAX_BYTES: null
  kura-eu:
    mem_limit: 2g
    environment:
      <<: *kura_high_concurrency_memory
  kura-ap:
    mem_limit: 2g
    environment:
      <<: *kura_high_concurrency_memory
