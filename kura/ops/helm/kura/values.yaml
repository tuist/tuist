replicaCount: 3

image:
  repository: ghcr.io/tuist/kura
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Exposes Kura's Prometheus /metrics endpoint to annotation-based
# scrapers. The managed clusters' k8s-monitoring release discovers
# targets via these prometheus.io/* keys (annotationAutodiscovery), and
# the embedded Prometheus self-hosters opt into reads the same keys.
# port-name pins discovery to the single `http` container port (the pod
# also declares grpc and peer) so /metrics is scraped once per pod.
# Inert when no scraper is present.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port-name: "http"
  prometheus.io/path: "/metrics"
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  annotations: {}
  loadBalancerIP: ""
  externalTrafficPolicy: ""
  httpPort: 4000
  grpcPort: 50051

peerTls:
  enabled: false
  internalPort: 7443
  secretName: ""
  caCertFileName: ca.pem
  certFileName: tls.crt
  keyFileName: tls.key

headlessService:
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kura.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

grpcIngress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kura-grpc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  # Prefer ReadWriteOncePod to enforce one Kura writer per PVC.
  # Override to ReadWriteOnce only when the CSI driver does not support it.
  accessModes:
    - ReadWriteOncePod
  size: 20Gi
  storageClass: ""
  annotations: {}

tmpStorage:
  sizeLimit: ""

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

updateStrategy:
  rollingUpdatePartition: null

podLifecycle:
  # Allow endpoint propagation to remove the pod from public traffic before SIGTERM.
  preStopDelaySeconds: 20
  # Leave a small platform buffer after Kura's own drain deadline for process exit.
  terminationGraceExtraSeconds: 15

pdb:
  enabled: true
  minAvailable: 1

config:
  tenantId: default
  region: fr-par
  fileDescriptors:
    poolSize: 128
    acquireTimeoutMs: 5000
    segmentHandleCacheSize: 32
  memory:
    softLimitBytes: 536870912
    hardLimitBytes: 805306368
    manifestCacheMaxBytes: 67108864
    maxKeyvalueBytes: 1048576
  shutdown:
    drainCompletionTimeoutMs: 240000
  metadataStore:
    maxOpenFiles: 1024
    maxBackgroundJobs: 4
  replication:
    # 0 disables application-level peer artifact body throttling.
    # Positive values are adaptive ceilings: Kura lowers the effective sync
    # rate under public inflight load or elevated public request latency.
    bandwidthLimitBytesPerSecond: 0
    # Public request latency target used to further back off peer sync traffic.
    # Set to 0 to disable latency-based pressure.
    publicLatencyTargetMs: 100
  telemetry:
    otlpTracesEndpoint: http://otel-collector:4318/v1/traces
    deploymentEnvironment: production
  discovery:
    enabled: true
  # The Kura image vendors a DB-IP Lite City MMDB at
  # `/opt/geoip/dbip-city-lite.mmdb`, so client geographic attribution
  # (country + ISO 3166-2 subdivision) is on whenever that file is
  # present (Kura soft-fails if it isn't). `refreshIntervalSecs`
  # controls how often the pod re-downloads the monthly dump in the
  # background. Set to 0 to pin to the vendored copy for the pod
  # lifetime.
  geoip:
    refreshIntervalSecs: 86400

# Use extraEnv or extraEnvFrom to inject optional secrets such as KURA_SENTRY_DSN.
extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []

extension:
  enabled: false
  existingConfigMap: ""
  script: ""
  mountDir: /etc/kura/extensions
  scriptFileName: hooks.lua
