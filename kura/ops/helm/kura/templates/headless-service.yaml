apiVersion: v1
kind: Service
metadata:
  name: {{ include "kura.headlessServiceName" . }}
  labels:
    {{- include "kura.labels" . | nindent 4 }}
  {{- with .Values.headlessService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "kura.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    {{- if .Values.peerTls.enabled }}
    - name: peer
      port: {{ .Values.peerTls.internalPort }}
      targetPort: peer
      protocol: TCP
    {{- end }}
