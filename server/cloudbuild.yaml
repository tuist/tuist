# Cloud Build config for the Tuist server image.
#
# Submits a native amd64 build (Cloud Build runners are Linux/amd64) and
# pushes to Artifact Registry in the same project. This exists so we can
# build without local QEMU emulation; local Docker on Apple Silicon mis-emulates
# Erlang's crypto NIF and produces broken releases.
#
# Usage (from repo root):
#
#   gcloud builds submit \
#     --config=server/cloudbuild.yaml \
#     --project=tuist-staging \
#     --substitutions=_TAG=stag-vN,_MIX_ENV=stag \
#     --region=europe-west3 \
#     .
#
# _TAG      — image tag to publish (caller supplies; e.g. the commit SHA)
# _MIX_ENV  — Mix environment, controls which priv/secrets/<env>.yml.enc and
#             runtime/config.exs the release uses. Must be stag, can, or prod.
# _TUIST_HOSTED — 1 for managed images (keeps encrypted secrets in the image).

timeout: 2400s

substitutions:
  _TAG: latest
  _MIX_ENV: prod
  _TUIST_HOSTED: "1"
  _TARGET: runner

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - buildx
      - create
      - --use
      - --name=tuist-builder
    id: buildx-create
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker buildx build \
          --platform linux/amd64 \
          --target ${_TARGET} \
          --file server/Dockerfile \
          --build-arg TUIST_HOSTED=${_TUIST_HOSTED} \
          --build-arg MIX_ENV=${_MIX_ENV} \
          --build-arg APT_CACHE_BUST=${SHORT_SHA:-$(date +%s)} \
          --tag europe-west3-docker.pkg.dev/${PROJECT_ID}/tuist/server:${_TAG} \
          --push \
          .
    id: build-push
images:
  - europe-west3-docker.pkg.dev/${PROJECT_ID}/tuist/server:${_TAG}
