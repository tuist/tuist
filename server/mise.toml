[env]
_.source = "{{config_root}}/../mise/utilities/dev_instance_env.sh"
TUIST_SECRET_KEY_BASE = "rpux4+W/oBey0drSFOctyIbppOG2A9VUUuTMC1WaM8xZgYxA6gg4yryG/LkOoqkj"
# Stripe price IDs for local dev (test-mode identifiers, not secrets — the keys
# come from fnox/1Password). Environment.stripe_prices/1 reads TUIST_STRIPE_PRICES
# as a JSON string; dev has no chart to render it, so it's inlined here.
TUIST_STRIPE_PRICES = '{"air":{"usage":["price_1PVY2kLWue9IBlPSHCmPX1jp"],"flat_monthly":["price_1PVY21LWue9IBlPSLksRxRos"]},"pro":{"usage":["price_1QMtp7LWue9IBlPSImRePMKa"],"flat_monthly":["price_1QMtzQLWue9IBlPSoRg6kBhr"]},"enterprise":{"flat_monthly":["price_1PWfxuLWue9IBlPSDbc3osiV"],"flat_yearly":[]}}'

[hooks]
  postinstall = "{{config_root}}/mise/tasks/install.sh"
  enter = { task = "clickhouse:start" }

[tools]
  # Injects dev-only secrets (e.g. the license) from 1Password at runtime via
  # `fnox exec` in the dev task — see server/fnox.toml. Installed for everyone,
  # but the dev task only invokes it when 1Password access is present, so
  # contributors without a 1Password account still run the server locally.
  fnox = "latest"
  aube = "1.6.2"
  node = "24.11.0"
  sops = "3.9.3"
  age = "1.2.1"
  trivy = "0.69.3"
  helm = "3.16.3"
  kubectl = "1.31.3"
  "npm:prettier" = "3.4.2"
  "asdf:aeons/asdf-minio" = "latest"
  "npm:appium" = "3.0.1"

[tools."github:ClickHouse/ClickHouse"]
version = "26.1.2.11-stable"
version_prefix = "v"

[tools."github:ClickHouse/ClickHouse".platforms]
macos-arm64 = { asset_pattern = "clickhouse-macos-aarch64" }
macos-x64 = { asset_pattern = "clickhouse-macos" }
linux-x64 = { asset_pattern = "clickhouse-common-static-*-amd64.tgz" }
linux-arm64 = { asset_pattern = "clickhouse-common-static-*-arm64.tgz" }
