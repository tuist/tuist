# Local Tuist cluster for the CLI acceptance tests.
#
# Spins up the same image we ship to canary/production (Postgres + ClickHouse + MinIO +
# Tuist server), seeds the default `tuistrocks@tuist.dev` user from `priv/repo/seeds.exs`,
# and exposes the server on `${TUIST_CLUSTER_HOST_PORT:-8080}`. Each acceptance-test shard
# brings up its own copy of this compose with a unique COMPOSE_PROJECT_NAME so multiple
# clusters can coexist on the same Docker daemon.
#
# Set `TUIST_IMAGE_TAG` (defaults to `latest`) to pin the server image — CI sets it to the
# `sha-<short>` tag produced by the build job.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tuist
      POSTGRES_PASSWORD: tuist
      POSTGRES_DB: tuist
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuist -d tuist"]
      interval: 2s
      timeout: 5s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:25
    environment:
      CLICKHOUSE_DB: tuist
      CLICKHOUSE_USER: tuist
      CLICKHOUSE_PASSWORD: tuist
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8123/ping || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tuist
      MINIO_ROOT_PASSWORD: tuist_dev_password
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 tuist tuist_dev_password
        mc mb --ignore-existing local/tuist
    restart: "no"

  tuist:
    image: ghcr.io/tuist/tuist:${TUIST_IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${TUIST_CLUSTER_HOST_PORT:-8080}:8080"
    environment: &tuist-env
      TUIST_HOSTED: "0"
      TUIST_USE_SSL_FOR_DATABASE: "0"
      TUIST_LICENSE: ""
      DATABASE_URL: ecto://tuist:tuist@postgres:5432/tuist
      TUIST_CLICKHOUSE_URL: http://tuist:tuist@clickhouse:8123/tuist
      TUIST_APP_URL: http://localhost:${TUIST_CLUSTER_HOST_PORT:-8080}
      TUIST_SECRET_KEY_BASE: rpux4+W/oBey0drSFOctyIbppOG2A9VUUuTMC1WaM8xZgYxA6gg4yryG/LkOoqkj
      TUIST_S3_ACCESS_KEY_ID: tuist
      TUIST_S3_SECRET_ACCESS_KEY: tuist_dev_password
      TUIST_S3_BUCKET_NAME: tuist
      TUIST_S3_REGION: auto
      TUIST_S3_ENDPOINT: http://minio:9000
      TUIST_S3_VIRTUAL_HOST: "0"
      WEB_CONCURRENCY: "1"
      MIX_ENV: prod
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ready || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 30s

  tuist-seed:
    image: ghcr.io/tuist/tuist:${TUIST_IMAGE_TAG:-latest}
    depends_on:
      tuist:
        condition: service_healthy
    environment:
      <<: *tuist-env
      # Smallest possible volumes — we only care about the seeded test user.
      SEED_SCALE: small
      SEED_BUILD_RUNS: "0"
      SEED_TEST_RUNS: "0"
      SEED_COMMAND_EVENTS: "0"
      SEED_PREVIEWS: "0"
      SEED_BUNDLES: "0"
    entrypoint: ["/app/bin/tuist"]
    command: ["eval", "Tuist.Release.seed"]
    restart: "no"
