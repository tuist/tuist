name: Setup Server Mix
description: Install mise tools, restore mix deps + _build cache, fetch hex deps for server jobs.

inputs:
  mise-version:
    description: Version of mise to install
    required: true
  mise-install-args:
    description: Tools to install via mise (passed to install_args)
    required: false
    default: erlang elixir
  mix-cache-key:
    description: |
      Primary cache key prefix for deps + _build (mix.lock hash is appended automatically).
      Default is shared across most server jobs; override if a job needs an isolated mix state
      (e.g. test currently uses mix-test-v2 to keep MIX_ENV=test artifacts separate).
    required: false
    default: mix
  mix-cache-restore-key:
    description: Restore-keys prefix for deps + _build cache fallback
    required: false
    default: mix-
  mix-os-deps-compile-partition-count:
    description: Lower Mix dependency compilation parallelism for CI runners with tighter memory limits.
    required: false
    default: "3"
  github-token:
    description: GitHub token used by mise to fetch tools (avoids rate limits)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Tune Mix dependency compilation parallelism
      shell: bash
      run: echo "MIX_OS_DEPS_COMPILE_PARTITION_COUNT=${{ inputs.mix-os-deps-compile-partition-count }}" >> "$GITHUB_ENV"
    - uses: jdx/mise-action@v4.0.1
      with:
        version: ${{ inputs.mise-version }}
        install_args: ${{ inputs.mise-install-args }}
        # The server toolchain (precompiled erlang/elixir, ClickHouse)
        # installs in ~25s, but its mise cache is 500MB+. Restoring that
        # costs about as long as a fresh install while consuming the
        # repo's 10GB cache budget, which evicts the deps/_build cache
        # below — the one that turns a cold 6-minute compile into a ~30s
        # incremental one. Skip it so the high-value cache survives.
        cache: "false"
        working_directory: server
        github_token: ${{ inputs.github-token || env.MISE_GITHUB_TOKEN }}
    - name: Restore Mix Cache
      uses: actions/cache@v4
      with:
        path: |
          server/deps
          server/_build
        key: ${{ inputs.mix-cache-key }}-${{ hashFiles('server/mix.lock') }}
        restore-keys: |
          ${{ inputs.mix-cache-restore-key }}
    - name: Install dependencies
      shell: bash
      working-directory: server
      run: mix deps.get
