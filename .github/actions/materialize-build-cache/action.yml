name: Materialize Build Cache
description: Replace symlinks in a build cache directory with their resolved contents before actions/cache archives it.

inputs:
  path:
    description: Path to the build cache directory.
    required: true

runs:
  using: composite
  steps:
    - name: Materialize symlinks
      shell: bash
      run: |
        set -euo pipefail

        input_path="${{ inputs.path }}"
        case "$input_path" in
          /*) cache_path="$input_path" ;;
          *) cache_path="$GITHUB_WORKSPACE/$input_path" ;;
        esac

        if [ ! -e "$cache_path" ]; then
          echo "Cache path does not exist: $cache_path"
          exit 0
        fi

        first_symlink="$(find "$cache_path" -type l -print -quit)"
        if [ -z "$first_symlink" ]; then
          echo "No symlinks found in $cache_path"
          exit 0
        fi

        parent_path="$(dirname "$cache_path")"
        cache_name="$(basename "$cache_path")"
        materialized_path="$parent_path/.${cache_name}.materialized.$$"

        rm -rf "$materialized_path"
        mkdir -p "$materialized_path"
        trap 'rm -rf "$materialized_path"' EXIT

        cp -R -L -p "$cache_path"/. "$materialized_path"/
        rm -rf "$cache_path"
        mv "$materialized_path" "$cache_path"

        trap - EXIT
