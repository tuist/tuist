name: Run cache k6 load test
description: Run the k6 load test suite against the cache staging service

inputs:
  cache-host:
    description: Cache service hostname
    required: true
  region:
    description: Cache region identifier
    required: true
  run-id:
    description: Unique run identifier for this load test
    required: true
  commit-sha:
    description: Commit SHA being tested
    required: true
  artifact-name:
    description: Name for the uploaded result artifact
    required: true

runs:
  using: composite
  steps:
    - name: Create cache account token
      shell: bash
      working-directory: cache
      run: ./ci/create-cache-token.sh
    - uses: grafana/setup-k6-action@v1
    - uses: jdx/mise-action@v3.2.0
      with:
        install: false
        env: false
        cache: false
        working_directory: cache
    - name: Wait for cache service
      shell: bash
      run: |
        echo "Waiting for cache service at ${{ inputs.cache-host }}..."
        for i in $(seq 1 30); do
          if curl -sf "https://${{ inputs.cache-host }}/up" > /dev/null 2>&1; then
            echo "Cache service ready after ${i}s"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "::error::Cache service at ${{ inputs.cache-host }} did not become ready in time"
            exit 1
          fi
          echo "Attempt $i: not ready, waiting..."
          sleep 2
        done
    - name: Run load test
      shell: bash
      working-directory: cache
      env:
        CACHE_HOST: ${{ inputs.cache-host }}
        REGION: ${{ inputs.region }}
        RUN_ID: ${{ inputs.run-id }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
      run: mise run load-test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.artifact-name }}
        path: cache/k6/result.json
        retention-days: 30
