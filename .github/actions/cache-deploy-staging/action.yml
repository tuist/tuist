name: Deploy cache to staging
description: Deploy the cache service to staging via Kamal

inputs:
  ssh-private-key:
    description: SSH private key for Kamal
    required: true
  op-service-account-token:
    description: 1Password service account token
    required: true
  kamal-secrets:
    description: Kamal secrets
    required: true

runs:
  using: composite
  steps:
    - uses: 1password/install-cli-action@v2
    - uses: jdx/mise-action@v3.2.0
      with:
        install_args: "ruby gem:kamal"
        cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
        working_directory: cache
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
    - name: Deploy with Kamal
      shell: bash
      working-directory: cache
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op-service-account-token }}
        SECRETS: ${{ inputs.kamal-secrets }}
      run: mise run deploy "staging"
