name: Server

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - .github/workflows/server.yml
      - server/pnpm-lock.yaml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - .github/workflows/server.yml
      - server/pnpm-lock.yaml
      - pnpm-lock.yaml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: tuist-server-${{ github.head_ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PNPM_HOME: ~/.pnpm
  MISE_TASK_RUN_AUTO_INSTALL: 0
  MISE_GITHUB_ATTESTATIONS: 0

defaults:
  run:
    working-directory: server

jobs:
  test:
    name: Test
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir github:ClickHouse/ClickHouse"
          cache: "false"
          working_directory: server
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Start ClickHouse
        run: mise run --no-prepare clickhouse:start
      - name: Setup database
        run: mise run --no-prepare db:reset
      - name: Run tests
        run: mix test --warnings-as-errors
  credo:
    name: Credo
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir"
          cache: "false"
          working_directory: server
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Run Credo
        run: mix credo
  format:
    name: Format
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir node pnpm npm:prettier"
          cache: "false"
          working_directory: server
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Restore PNPM Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm/store
          key: pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
      - name: Install dependencies
        run: mix deps.get && pnpm install --ignore-workspace
      - name: Check format
        run: mise run --no-prepare format --check
  esbuild:
    name: esbuild
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir node pnpm"
          cache: "false"
          working_directory: server
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Restore PNPM Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm/store
          key: pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
      - name: Install dependencies
        run: mix deps.get && pnpm install --ignore-workspace
      - name: Build noora static assets
        working-directory: noora
        run: |
          pnpm install
          npx esbuild js/index.js --bundle --minify --sourcemap --format=esm --outfile=./priv/static/noora.js
          npx esbuild css/noora.css --bundle --minify --sourcemap --outfile=./priv/static/noora.css
      - name: Install esbuild
        run: mix esbuild.install
      - name: Check esbuild output
        run: |
          # Run esbuild and capture output
          output=$(mix esbuild app --log-level=warning 2>&1 || true)

          # Filter out known non-warning messages
          warnings=$(echo "$output" | grep -v "^==> " | grep -v "^Compiling" | grep -v "^Generated" | grep -v "Downloading esbuild" | grep -v "^$" || true)

          if [ -z "$warnings" ]; then
            echo "No esbuild warnings detected."
            exit 0
          else
            echo "::error title=esbuild warnings detected::asset build has warnings."
            echo "$warnings"
            exit 1
          fi
  security:
    name: Security
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir"
          cache: "false"
          working_directory: server
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          rm /tmp/trivy.tar.gz
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Check
        run: mise run --no-prepare security
  docker_build:
    name: Docker build
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Set up Docker Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@v0
      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: false
          tags: tuist/tuist
          build-args: |
            TUIST_HOSTED=0
            TUIST_VERSION=1.24.11.11
            MIX_ENV=prod
  # The Codegen produces non-deterministic results, so we're skipping it for now
  # api-codegen:
