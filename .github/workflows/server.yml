name: Server

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - .github/workflows/server.yml
      - server/pnpm-lock.yaml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - .github/workflows/server.yml
      - server/pnpm-lock.yaml
      - noora/aube-lock.yaml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: tuist-server-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_TASK_RUN_AUTO_INSTALL: 0
  MISE_GITHUB_ATTESTATIONS: 0

defaults:
  run:
    working-directory: server

jobs:
  swift-test:
    name: Swift Tests (XCActivityLogParser)
    runs-on: tuist-macos
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: server/native/xcactivitylog_nif
    steps:
      - uses: actions/checkout@v4
      - name: Restore SwiftPM Cache
        uses: actions/cache@v4
        with:
          path: server/native/xcactivitylog_nif/.build
          key: xcactivitylog-nif-swiftpm-${{ hashFiles('server/native/xcactivitylog_nif/Package.resolved') }}
      - name: Run tests
        run: swift test --replace-scm-with-registry
  gettext:
    name: Gettext
    # tuist-linux-large: mix gettext.extract compiles the full project
    # (every dgettext/3 call needs to be reachable for the extractor) and
    # OOMs the 2 vCPU / 8 GB default shape — same Elixir-compile-OOM
    # pattern as `setup-server-mix` callers.
    runs-on: tuist-linux-large
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
      - name: Check gettext templates are up-to-date
        env:
          # Throttle Elixir's parallel-compiler — gettext.extract has to
          # compile the whole project to reach every dgettext/3 call site,
          # and the default parallelism OOM-kills even tuist-linux-large.
          # MIX_OS_DEPS_COMPILE_PARTITION_COUNT throttles OS-deps compile
          # (same gate the Security job uses); ERL_AFLAGS "+S 1:1" forces
          # BEAM to a single scheduler, which `Kernel.ParallelCompiler`
          # reads via `System.schedulers_online()` to size its concurrency
          # — serialising the project compile that the OS-deps gate alone
          # doesn't reach.
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: 1
          ERL_AFLAGS: "+S 1:1"
        run: |
          run_gettext_extract() {
            log_file="$1"
            (
              while true; do
                sleep 30
                echo "Waiting for gettext.extract..."
              done
            ) &
            heartbeat_pid=$!

            set +e
            timeout 5m mix gettext.extract > "$log_file" 2>&1
            extract_status=$?
            set -e

            kill "$heartbeat_pid" 2>/dev/null || true
            wait "$heartbeat_pid" 2>/dev/null || true

            if [ "$extract_status" -eq 124 ]; then
              echo "::error title=Gettext extraction timed out::mix gettext.extract did not finish within 5 minutes."
              cat "$log_file"
              exit 1
            fi

            if [ "$extract_status" -gt 128 ]; then
              exit "$extract_status"
            fi
          }

          # Extract only (without --merge) to check if marketing.pot changes
          # DO NOT use --merge here as it would modify .po translation files
          cp priv/gettext/marketing.pot priv/gettext/marketing.pot.backup

          # Dashboard domains to check
          DASHBOARD_DOMAINS="dashboard dashboard_account dashboard_auth dashboard_builds dashboard_cache dashboard_integrations dashboard_previews dashboard_projects dashboard_tests"

          # Backup all dashboard .pot files
          for domain in $DASHBOARD_DOMAINS; do
            if [ -f "priv/gettext/${domain}.pot" ]; then
              cp "priv/gettext/${domain}.pot" "priv/gettext/${domain}.pot.backup"
            fi
          done

          run_gettext_extract /tmp/gettext-extract.log

          exit_code=0

          if ! diff -q priv/gettext/marketing.pot.backup priv/gettext/marketing.pot > /dev/null; then
            echo "::error title=Marketing gettext template out of sync::The marketing.pot file is not up-to-date. Please run 'mix gettext.extract' (WITHOUT --merge) in the server directory and commit the changes."
            exit_code=1
          else
            echo "✅ Marketing gettext template is up-to-date"
          fi
          rm priv/gettext/marketing.pot.backup

          # Check each dashboard domain for changes
          CHANGED_DOMAINS=""
          for domain in $DASHBOARD_DOMAINS; do
            if [ -f "priv/gettext/${domain}.pot.backup" ]; then
              if ! diff -q "priv/gettext/${domain}.pot.backup" "priv/gettext/${domain}.pot" > /dev/null 2>&1; then
                CHANGED_DOMAINS="$CHANGED_DOMAINS $domain"
              fi
              rm "priv/gettext/${domain}.pot.backup"
            elif [ -f "priv/gettext/${domain}.pot" ]; then
              # New domain file was created
              CHANGED_DOMAINS="$CHANGED_DOMAINS $domain"
            fi
          done

          if [ -n "$CHANGED_DOMAINS" ]; then
            echo "::error title=Dashboard gettext templates out of sync::The following .pot files are not up-to-date:$CHANGED_DOMAINS. Please run 'mix gettext.extract' (WITHOUT --merge) in the server directory and commit the changes."
            exit_code=1
          else
            echo "✅ All dashboard gettext templates are up-to-date"
          fi

          exit "$exit_code"
      - name: Check marketing translations exist
        run: |
          # Check if marketing.pot exists
          if [ ! -f priv/gettext/marketing.pot ]; then
            echo "::error title=Missing marketing translations::marketing.pot file is missing. Please run 'mix gettext.extract' in the server directory."
            exit 1
          fi

          # Check if all languages have marketing.po files
          for lang_dir in priv/gettext/*/LC_MESSAGES; do
            lang=$(basename $(dirname "$lang_dir"))
            marketing_po="$lang_dir/marketing.po"

            if [ ! -f "$marketing_po" ]; then
              echo "::error title=Missing marketing translation::Missing $marketing_po for language '$lang'. Marketing domain translations are required for all languages."
              exit 1
            fi
          done

          echo "✅ All marketing translations present"
      - name: Check dashboard translations templates exist
        run: |
          # Dashboard domains to check
          DASHBOARD_DOMAINS="dashboard dashboard_account dashboard_auth dashboard_builds dashboard_cache dashboard_integrations dashboard_previews dashboard_projects dashboard_tests"

          MISSING_DOMAINS=""
          for domain in $DASHBOARD_DOMAINS; do
            if [ ! -f "priv/gettext/${domain}.pot" ]; then
              MISSING_DOMAINS="$MISSING_DOMAINS $domain"
            fi
          done

          if [ -n "$MISSING_DOMAINS" ]; then
            echo "::error title=Missing dashboard translations::The following .pot files are missing:$MISSING_DOMAINS. Please run 'mix gettext.extract' in the server directory."
            exit 1
          fi

          echo "✅ All dashboard translation templates present"
  test:
    name: Test
    # Bigger shape: the test compile + ClickHouse + Postgres peak over the
    # 2 vCPU / 8 GB default microVM, OOM-killing the runner from inside the
    # guest ("lost communication"). The 4 vCPU / 16 GB shape restores the
    # headroom this job had before the default was downsized (#11052).
    runs-on: tuist-linux-large
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
          mise-install-args: erlang elixir github:ClickHouse/ClickHouse
          mix-cache-key: mix-test-v2
          mix-cache-restore-key: mix-test-v2-
      - name: Compile
        run: mix compile --warnings-as-errors
      - name: Start ClickHouse
        run: mise run --no-deps clickhouse:start
      - name: Setup database
        run: mise run --no-deps db:reset
      - name: Run tests
        run: mix test --warnings-as-errors
  credo:
    name: Credo
    runs-on: tuist-linux
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
      - name: Run Credo
        env:
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: 1
        run: mix credo
  format:
    name: Format
    runs-on: tuist-linux
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
          mise-install-args: erlang elixir node aube npm:prettier
      - name: Restore Aube Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/aube
            ~/.cache/aube
          key: aube-server-${{ hashFiles('server/pnpm-lock.yaml') }}
      - name: Install aube dependencies
        run: aube install
      - name: Check format
        run: mise run --no-deps format --check
  esbuild:
    name: esbuild
    runs-on: tuist-linux
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
          mise-install-args: erlang elixir node aube
      - name: Restore Aube Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/aube
            ~/.cache/aube
          key: aube-server-${{ hashFiles('server/pnpm-lock.yaml') }}
      - name: Install aube dependencies
        run: aube install
      - name: Build noora static assets
        working-directory: noora
        run: |
          aube install
          aube run build
      - name: Install esbuild
        env:
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: 1
        run: mix esbuild.install
      - name: Check esbuild output
        run: |
          # Run esbuild and capture output
          output=$(mix esbuild app --log-level=warning 2>&1 || true)

          # Filter out known non-warning messages
          warnings=$(echo "$output" | grep -v "^==> " | grep -v "^Compiling" | grep -v "^Generated" | grep -v "Downloading esbuild" | grep -v "^$" || true)

          if [ -z "$warnings" ]; then
            echo "No esbuild warnings detected."
            exit 0
          else
            echo "::error title=esbuild warnings detected::asset build has warnings."
            echo "$warnings"
            exit 1
          fi
  security:
    name: Security
    runs-on: tuist-linux
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          rm /tmp/trivy.tar.gz
      - name: Check
        env:
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: 1
        run: ./mise/tasks/security.sh
  docker_build:
    name: Docker build
    # Bigger shape: the server image build (Elixir release compile inside
    # the dind sidecar) OOMs the 2 vCPU / 8 GB default microVM.
    runs-on: tuist-linux-large
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build
        run: |
          docker buildx build \
            --progress=plain \
            --file "$GITHUB_WORKSPACE/server/Dockerfile" \
            --target runner \
            --load \
            --tag tuist/tuist \
            --build-arg TUIST_HOSTED=0 \
            --build-arg TUIST_VERSION=1.24.11.11 \
            --build-arg MIX_ENV=prod \
            --build-arg APT_CACHE_BUST=${{ github.sha }} \
            --build-arg DOCKER_IMAGE_PREFIX=mirror.gcr.io/ \
            --build-arg DOCKER_OFFICIAL_IMAGE_PREFIX=mirror.gcr.io/library/ \
            "$GITHUB_WORKSPACE"
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          rm /tmp/trivy.tar.gz
      - name: Scan image for vulnerabilities
        # Use the absolute workspace path because `trivy image` in 0.69.3
        # resolves --ignorefile against an undocumented base, not cwd.
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress --ignorefile "$GITHUB_WORKSPACE/.trivyignore" tuist/tuist
  # The Codegen produces non-deterministic results, so we're skipping it for now
  # api-codegen:
  #   name: API Codegen Check
  #   runs-on: tuist-linux
  #   timeout-minutes: 15
  #   services:
  #     postgres:
  #       image: postgres:16
  #       env:
  #         POSTGRES_USER: postgres
  #         POSTGRES_PASSWORD: postgres
  #       ports:
  #         - 5432:5432
  #       options: >-
  #         --health-cmd pg_isready
  #         --health-interval 10s
  #         --health-timeout 5s
  #         --health-retries 5
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: jdx/mise-action@v4.0.1
  #       with:
  #         cache: "true"
  #     - run: mise run install
  #     - run: mise run clickhouse:start
  #     - run: mise run db:reset
  #     - name: Generate OpenAPI spec
  #       run: MIX_ENV=dev mix openapi.spec.yaml --spec TuistWeb.API.Spec ../cli/Sources/TuistServer/OpenAPI/server.yml
  #     - name: Check for uncommitted changes
  #       run: |
  #         if [ -n "$(git status --porcelain)" ]; then
  #           echo "::error title=OpenAPI spec out of sync::The generated OpenAPI spec is not up-to-date. Please run 'mise run generate-api-cli-code' in the server directory and commit the changes."
  #           echo "Changed files:"
  #           git status --porcelain
  #           echo "Diff:"
  #           git diff
  #           exit 1
  #         else
  #           echo "✅ Generated OpenAPI spec is up-to-date"
  #         fi
  seed:
    name: Seed
    # Bigger shape: database setup (migrations + seeds) is too slow on the
    # 2 vCPU default and overruns the 15m timeout under fleet load. The
    # 4 vCPU / 16 GB shape restores the headroom from before #11052.
    runs-on: tuist-linux-large
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
          mise-install-args: erlang elixir github:ClickHouse/ClickHouse
      - name: Start ClickHouse
        run: mise run --no-deps clickhouse:start
      - name: Setup database
        run: mise run --no-deps db:reset
      - name: Run migrations
        run: mix ecto.migrate
      - name: Seed the database
        run: mix run priv/repo/seeds.exs
