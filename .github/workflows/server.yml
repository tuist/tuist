name: Server

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - .github/workflows/server.yml
      - server/pnpm-lock.yaml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - server/**
      - tuist_common/**
      - .github/workflows/server.yml
      - server/pnpm-lock.yaml
      - pnpm-lock.yaml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: tuist-server-${{ github.head_ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PNPM_HOME: ~/.pnpm

defaults:
  run:
    working-directory: server

jobs:
  test:
    name: Test
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        id: mix-cache
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Restore PNPM Cache
        uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: |
            ~/.pnpm/store
          key: pnpm-server-${{ hashFiles('server/pnpm-lock.yaml') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: server
      - run: mise run install
      - run: mise run clickhouse:start
      - run: mise run db:reset
      - name: Run tests
        run: mix test --trace
  # NOTE: All other jobs temporarily disabled to save CI minutes while profiling test performance.
  # Will be restored before merging.
  # Disabled jobs: gettext_marketing, gettext_dashboard, translation_protection,
  # credo, format, esbuild, security, docker_build, seed, gradle_cache_acceptance
