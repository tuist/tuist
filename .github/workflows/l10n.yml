name: L10n

on:
  push:
    branches:
      - main
    paths:
      - "server/priv/gettext/*.pot"
      - "L10N.md"
      - "server/L10N.md"
      - "server/L10N/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: l10n-translations
  cancel-in-progress: true

jobs:
  translate:
    name: Translate
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "elixir erlang"
          cache: "false"
      - name: Run translations
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: elixir translate.exs
      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git diff --name-only -- '*.po' '.l10n/') ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.TUISTIT_TOKEN }}
          commit-message: "chore(server): update translations"
          branch: l10n/update-translations
          title: "chore(server): update translations"
          body: |
            Automated translation update triggered by changes to `.pot` files or `L10N.md` context.
          committer: "tuistit <tuistit@users.noreply.github.com>"
          author: "tuistit <tuistit@users.noreply.github.com>"
