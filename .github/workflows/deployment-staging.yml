name: Staging Deployment

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Sha of the commit to be deployed
        required: true

concurrency:
  group: staging-deployment-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  MISE_EXPERIMENTAL: 1

jobs:
  deploy:
    environment:
      name: staging
      url: https://staging.tuist.io
    name: Staging Deployment
    env:
      DOCKER_BUILDKIT: 1
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - name: "Get version"
        id: version
        run: |
          version=$(.mise/tasks/generate-version)
          echo "::set-output name=version::$version"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Fly
        run: flyctl deploy --remote-only -c fly.staging.toml --build-arg TUIST_HOSTED=1 --build-arg MIX_ENV=stag --build-arg TUIST_VERSION=${{ steps.version.outputs.version }} --wait-timeout 3600
      - name: Notify about the deployment in Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            commit: "${{ env.GITHUB_SHA }}"
            environment: "staging"
