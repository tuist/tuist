name: CLI Self-Hosted

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TUIST_ENABLE_CACHING: true

jobs:
  cli-lint-self-hosted:
    name: Lint
    runs-on:
      - self-hosted
      - macos
      - apple-silicon
      - scaleway
      - xcode-26-2
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/select-xcode
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "tuist swiftlint swiftformat"
          cache: "false"
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist cache
        run: tuist setup cache
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Lint
        run: |
          mise x swiftformat -- swiftformat cli/ app/ --lint
          mise x swiftlint -- swiftlint lint --quiet --config .swiftlint.yml cli/Sources
          tuist inspect dependencies --only implicit
