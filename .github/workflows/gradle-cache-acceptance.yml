name: Gradle Cache Acceptance

on:
  push:
    branches:
      - main
    paths:
      - gradle/**
      - server/**
      - cache/**
      - .github/workflows/gradle-cache-acceptance.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - gradle/**
      - server/**
      - cache/**
      - .github/workflows/gradle-cache-acceptance.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: gradle-cache-acceptance-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_TASK_RUN_AUTO_INSTALL: 0
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  gradle_cache_acceptance:
    name: Gradle Cache Acceptance
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: dev
      DATABASE_HOST: localhost
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      TUIST_SECRET_KEY_BASE: ci-test-secret-key-base-must-be-at-least-64-characters-long-for-phoenix-to-work
      TUIST_SECRET_KEY_PASSWORD: ci-test-secret-key-password
      TUIST_SECRET_KEY_TOKENS: ci-test-secret-key-tokens
      TUIST_SECRET_KEY_ENCRYPTION: ci-test-encryption-key-32-bytes!
      TUIST_CACHE_API_KEY: 7a3de63bb6136d94539e9976b1c54bfd553467c2c4775f84b7b2baf27f8b38c6
    steps:
      - uses: actions/checkout@v4
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "erlang elixir java gradle tuist bats"
          cache: "false"
          working_directory: .
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "erlang elixir asdf:aeons/asdf-minio github:ClickHouse/ClickHouse"
          cache: "false"
          working_directory: server
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Restore server deps
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-
      - name: Install server deps
        working-directory: server
        run: mix deps.get
      - name: Start ClickHouse
        working-directory: server
        run: mise run --no-deps clickhouse:start
      - name: Restore cache deps
        uses: actions/cache@v4
        with:
          path: |
            cache/deps
            cache/_build
          key: cache-mix-${{ hashFiles('cache/mix.lock') }}
          restore-keys: |
            cache-mix-
      - name: Install cache deps
        working-directory: cache
        run: mix deps.get
      - name: Setup main server
        working-directory: server
        run: |
          # Single mix do so compile + all ecto tasks + seeds share one BEAM
          # (and peak memory only once) before we ever start the web server.
          MIX_ENV=dev mix do \
            compile, \
            ecto.create, \
            run priv/repo/timezone.exs, \
            ecto.load, \
            ecto.migrate, \
            run priv/repo/seeds.exs
      - name: Start main server
        working-directory: server
        run: |
          # nohup + disown so the backgrounded BEAM survives the bash
          # shell exiting when this step finishes — otherwise the e2e
          # step hits nothing-listening. ELIXIR_ERL_OPTIONS="+S 1" forces
          # serial compile if the manifest is stale, so the recompile
          # peak doesn't overshoot the runner's memory ceiling (the
          # parallel compiler holds a copy of every in-flight module per
          # worker, and this project plus deps is enough to OOM at 4
          # workers).
          nohup bash -c 'ELIXIR_ERL_OPTIONS="+S 1" MIX_ENV=dev mix phx.server' >/tmp/main-server.log 2>&1 &
          disown
          server_url="${TUIST_SERVER_URL:-http://localhost:8080}"
          port="${server_url##*:}"
          for i in {1..180}; do
            if nc -z localhost "$port" 2>/dev/null; then
              echo "Main server is listening on :${port} after ${i} attempts"
              break
            fi
            if [ "$i" = "180" ]; then
              echo "Main server never came up on :${port}" >&2
              echo "--- main-server.log tail ---" >&2
              tail -50 /tmp/main-server.log >&2
              exit 1
            fi
            sleep 2
          done
      - name: Start cache server
        working-directory: cache
        run: |
          MIX_ENV=dev mix phx.server &
          cache_port="${TUIST_CACHE_PORT:-8087}"
          for i in {1..30}; do
            if nc -z localhost "$cache_port" 2>/dev/null; then
              echo "Cache server is ready"
              break
            fi
            echo "Waiting for cache server... ($i/30)"
            sleep 2
          done
      - name: Run Gradle cache acceptance test
        env:
          SERVER_URL: ${{ env.TUIST_SERVER_URL }}
        run: mise run --no-deps e2e gradle_cache
