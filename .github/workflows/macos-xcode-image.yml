name: macOS + Xcode Image

# Build the in-house macOS + Xcode Tart image — our replacement for
# `ghcr.io/cirruslabs/macos-tahoe-xcode:N`. Triggered on-demand
# when Apple ships a new Xcode (or when we want to test a beta).
#
# Per-Xcode image model: each invocation produces ONE image with
# ONE Xcode. The push tag carries the full version with dots →
# dashes:
#   xcode_version=26.5     → ghcr.io/tuist/macos-tahoe-xcode:26-5
#   xcode_version=26.4.1   → ghcr.io/tuist/macos-tahoe-xcode:26-4-1
#   xcode_version=26.0.1   → ghcr.io/tuist/macos-tahoe-xcode:26-0-1
#
# Customer-facing fleet selects between these via a runner profile
# (`runs-on: tuist-macos-xcode-26-5`, etc.) once that wiring lands.
# For now, the chart pins one image at a time as the default.
#
# Auth model: the bare-metal `vm-image-builder` Mac mini has a
# logged-in xcodes session in its login keychain. A maintainer
# runs `xcodes signin <apple-id>` over SSH once per quarter (or
# whenever the session expires) and approves 2FA from a trusted
# device. After that, `xcodes download` on the builder
# authenticates silently against developer.apple.com — no Apple
# ID secrets in GitHub, no manual upload per Xcode release. See
# `infra/macos-xcode-image/AGENTS.md` for the runbook.

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: "Xcode version to install (e.g. 26.4.1, 26.5). Must be available on developer.apple.com. Drives the push tag (dots → dashes)."
        required: true
      base_image:
        description: "Base Tart image to layer Xcode onto"
        required: false
        default: "ghcr.io/cirruslabs/macos-tahoe-base:latest"

concurrency:
  # Different Xcode versions can build in parallel (different push
  # tags, no shared state). Same Xcode dispatched twice serialises.
  group: macos-xcode-image-${{ inputs.xcode_version }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 180
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4

      # Tart isn't installed by this workflow. The builder host's
      # bootstrap path (infra/macos-host-bootstrap.installTart, run
      # by the Scaleway CAPI provider on every Mac mini Node)
      # extracts the operator-image-baked tart.app tarball to
      # /usr/local/bin/tart. Same install path the in-cluster
      # macosFleet / runnersFleet hosts use; the workflow's PATH
      # picks it up and `packer init` / Packer's tart-cli plugin
      # fail loudly if it's missing.

      # `oras` isn't part of the host bootstrap (yet) — install on
      # demand via brew. Cheap when cached, fast first-time install
      # since oras is a single static Go binary.
      - name: Ensure oras is installed
        run: |
          set -euo pipefail
          if ! command -v oras >/dev/null 2>&1; then
            brew install oras
          fi
          oras version

      # Pull the .xip from our in-house mirror instead of Apple
      # directly. The mirror is populated by the operator running
      # `mise run xcode-mirror:upload <version>` on their Mac
      # (typically triggered by the xcodereleases.com RSS feed
      # firing in Slack — see infra/macos-xcode-image/AGENTS.md).
      # Moving the Apple-auth concern out of CI means CAPI-managed
      # builders can rotate without breaking the workflow — no
      # host-bound keychain session, no `gh workflow run`
      # pre-requirement to SSH into the builder.
      # If the .xip isn't in the mirror yet, the operator runs
      # the upload task locally and re-triggers this workflow.
      - name: Pull Xcode .xip from mirror
        id: xcode_xip
        env:
          XCODE_VERSION: ${{ inputs.xcode_version }}
        run: |
          set -euo pipefail
          XCODE_CACHE="${RUNNER_TEMP:-/tmp}/xcode-xip"
          mkdir -p "$XCODE_CACHE"
          if ! ls "$XCODE_CACHE"/Xcode-${XCODE_VERSION}*.xip >/dev/null 2>&1; then
            # The credential-helper protocol picks up the GHCR creds
            # the next step's `crane auth login` writes — same path
            # the runner-image / xcresult-processor workflows use.
            # We do an explicit login here (not at workflow top)
            # because oras' login persists to ~/.docker/config.json
            # which Packer's anonymous-pull dance later toggles
            # back to anonymous for the public Cirrus base.
            echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username tuist-bot --password-stdin
            if ! oras pull "ghcr.io/tuist/xcode-xips:${XCODE_VERSION}" --output "$XCODE_CACHE"; then
              {
                echo "Error: Xcode ${XCODE_VERSION} is not in the mirror at"
                echo "ghcr.io/tuist/xcode-xips:${XCODE_VERSION}."
                echo ""
                echo "Populate the mirror from a maintainer Mac:"
                echo ""
                echo "  mise run xcode-mirror:upload ${XCODE_VERSION}"
                echo ""
                echo "Then re-trigger this workflow."
              } >&2
              exit 1
            fi
          fi
          XCODE_XIP=$(ls "$XCODE_CACHE"/Xcode-${XCODE_VERSION}*.xip | head -n1)
          test -f "$XCODE_XIP"
          echo "Have $(basename "$XCODE_XIP") ($(du -h "$XCODE_XIP" | awk '{print $1}'))"
          echo "path=${XCODE_XIP}" >> "$GITHUB_OUTPUT"

      - name: Initialize Packer
        working-directory: infra/macos-xcode-image
        run: packer init -upgrade macos-xcode.pkr.hcl

      # Same anonymous-pull dance as the other image workflows:
      # the bare-metal runner has tuist-bot creds cached for ghcr.io
      # which don't authorize ghcr.io/cirruslabs/* pulls. Tart also
      # consults Docker credential helpers, and this runner can
      # have the macOS helper installed without the Docker CLI —
      # clear both stores before Packer clones the public base.
      - name: Drop cached ghcr.io credentials
        run: |
          tart logout ghcr.io || true
          if command -v docker >/dev/null 2>&1; then
            docker logout ghcr.io || true
          fi
          for helper in docker-credential-osxkeychain docker-credential-desktop; do
            if command -v "$helper" >/dev/null 2>&1; then
              printf 'ghcr.io' | "$helper" erase || true
              printf 'https://ghcr.io' | "$helper" erase || true
            fi
          done

      - name: Reclaim Tart disk
        # Delete every locally-cloned VM; see runner-image.yml's
        # same step for the rationale (sibling image-bake workflows
        # on this host leave their VMs behind, ~80 GB each).
        run: |
          set -uo pipefail
          tart list || true
          df -h /
          tart list | awk '$1 == "local" { print $2 }' | while read -r vm; do
            tart stop "$vm" 2>/dev/null || true
            tart delete "$vm" 2>/dev/null || true
          done
          tart prune --entries caches --older-than 0
          df -h /

      - name: Build image
        id: build
        working-directory: infra/macos-xcode-image
        env:
          XCODE_VERSION: ${{ inputs.xcode_version }}
        run: |
          set -euo pipefail
          docker_config="$HOME/.docker/config.json"
          docker_config_backup=""
          restore_docker_config() {
            if [ -n "$docker_config_backup" ] && [ -f "$docker_config_backup" ]; then
              mkdir -p "$HOME/.docker"
              mv "$docker_config_backup" "$docker_config"
            fi
          }
          trap restore_docker_config EXIT

          if [ -f "$docker_config" ]; then
            docker_config_backup="$(mktemp "${RUNNER_TEMP:-/tmp}/docker-config.XXXXXX")"
            mv "$docker_config" "$docker_config_backup"
          fi

          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${{ inputs.base_image || 'ghcr.io/cirruslabs/macos-tahoe-base:latest' }}" \
            -var "output_image=macos-tahoe-xcode" \
            -var "xcode_xip_path=${{ steps.xcode_xip.outputs.path }}" \
            -var "xcode_version=${XCODE_VERSION}" \
            macos-xcode.pkr.hcl

          # Tag is the full version with dots → dashes:
          #   26.4.1 → 26-4-1
          #   26.5   → 26-5
          # Downstream Layer 2 images and the chart's
          # `runnersFleet.runnerImage` digest pin reference this
          # tag, so a 26.4.0 → 26.4.1 Apple bump is a *new* tag
          # (`:26-4-1`), not a same-tag replacement.
          TAG=$(echo "${XCODE_VERSION}" | tr '.' '-')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # crane writes creds to ~/.docker/config.json, which Tart's
      # push reads via the Docker credential-helper protocol.
      # Bypasses the macOS keychain (which `tart login` would use,
      # and which gates on a Tahoe-LaunchAgent-incompatible "User
      # interaction" prompt) and Tart 2.32.1's env-var-only push
      # path (which hangs with "Error: The request timed out").
      # `crane` is installed by the builder bootstrap. Logging in
      # AFTER the Packer build is intentional: this image's base
      # is the *public* `ghcr.io/cirruslabs/macos-tahoe-base`, so
      # Packer's clone is anonymous (see the credential-dropping
      # step above). Auth is needed only for the push that follows.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      # The push to GHCR goes via a disk-backed local OCI registry on
      # the builder. tart's own push uses Swift URLSession, which is
      # documented-unreliable for multi-GB blob uploads (see
      # cirruslabs/tart#963 — skopeo pulls the same image ~40x faster
      # and reliably where tart fails). So we split:
      #   1. tart push to localhost over loopback (~5 min, no network)
      #   2. skopeo copy to GHCR (resumable, retries on transient
      #      errors, real progress output)
      # `crane registry serve --disk` is already on the builder via
      # the bootstrap and gives us a single-binary OCI v2 registry.
      - name: Start local OCI registry
        run: |
          set -euo pipefail
          mkdir -p /tmp/local-registry
          # Serve in background; the `Cleanup` step kills it.
          nohup crane registry serve --address 127.0.0.1:5000 --disk /tmp/local-registry \
            > /tmp/local-registry.log 2>&1 &
          echo $! > /tmp/local-registry.pid
          # Wait for the listener to come up (max 10s).
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5000/v2/ >/dev/null 2>&1; then
              echo "local registry up (pid $(cat /tmp/local-registry.pid))"
              exit 0
            fi
            sleep 0.5
          done
          echo "local registry did not come up in 10s; log:" >&2
          cat /tmp/local-registry.log >&2 || true
          exit 1

      - name: Push image to local registry
        run: |
          set -euo pipefail
          TAG="${{ steps.build.outputs.tag }}"
          # --insecure for HTTP loopback; chunk-size still helps even
          # locally because tart's monolithic-upload code path is the
          # same one that fails against ghcr.io.
          tart push --insecure --chunk-size 3 \
            macos-tahoe-xcode "127.0.0.1:5000/tuist/macos-tahoe-xcode:${TAG}"

      - name: Copy image to GHCR (skopeo)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.build.outputs.tag }}"
          for attempt in 1 2 3; do
            echo "skopeo copy attempt ${attempt} starting at $(date -u +%H:%M:%SZ)" >&2
            if skopeo copy \
                --src-tls-verify=false \
                --dest-creds "tuist-bot:${GITHUB_TOKEN}" \
                "docker://127.0.0.1:5000/tuist/macos-tahoe-xcode:${TAG}" \
                "docker://ghcr.io/tuist/macos-tahoe-xcode:${TAG}"; then
              echo "Pushed ghcr.io/tuist/macos-tahoe-xcode:${TAG} on attempt ${attempt}"
              exit 0
            fi
            echo "skopeo copy attempt ${attempt} failed; sleeping 60s before retry" >&2
            sleep 60
          done
          echo "skopeo copy failed three times in a row" >&2
          exit 1

      - name: Cleanup
        if: always()
        run: |
          tart delete macos-tahoe-xcode 2>/dev/null || true
          if [ -f /tmp/local-registry.pid ]; then
            kill "$(cat /tmp/local-registry.pid)" 2>/dev/null || true
            rm -f /tmp/local-registry.pid
          fi
          rm -rf /tmp/local-registry /tmp/local-registry.log
