name: macOS + Xcode Image

# Build the in-house macOS + Xcode Tart image — our replacement for
# `ghcr.io/cirruslabs/macos-tahoe-xcode:N`. Triggered on-demand
# when Apple ships a new Xcode (or when we want to broaden the set
# of co-installed Xcodes).
#
# Multi-Xcode model: the image bakes in a *set* of Xcode versions,
# newest-first. The first version becomes the default
# (xcode-select target); the rest are co-installed at
# /Applications/Xcode_<version>.app so customer workflows pinning
# older Xcodes don't pay an install cost at job time. The push
# tag is derived from the *default* Xcode's major-minor:
# `xcode_versions=26.5.0,26.4.1,26.3,26.2.1,26.1,26.0.1` → pushed
# to `ghcr.io/tuist/macos-tahoe-xcode:26-5`.
#
# Cost profile: every additional Xcode adds ~30 min to the build
# (xip extract + per-version rename) and ~40 GB to the image. A
# six-Xcode build takes ~3.5 hours and produces a ~250 GB image.
# That's deliberate: the alternative is paying that install cost
# on every customer job that pins an older Xcode, which is much
# worse than amortising it across image builds. Workflow timeout
# is sized for the upper end (480 min).
#
# Auth model: the bare-metal `vm-image-builder` Mac mini has a
# logged-in xcodes session in its login keychain. A maintainer
# runs `xcodes signin <apple-id>` over SSH once per quarter (or
# whenever the session expires) and approves 2FA from a trusted
# device. After that, `xcodes download` on the builder
# authenticates silently against developer.apple.com — no Apple
# ID secrets in GitHub, no manual upload per Xcode release. See
# `infra/macos-xcode-image/AGENTS.md` for the runbook.

on:
  workflow_dispatch:
    inputs:
      xcode_versions:
        description: "Comma-separated Xcode versions, newest first (e.g. 26.5.0,26.4.1,26.3,26.2.1,26.1,26.0.1). First is the default; tag derives from its major-minor."
        required: true
      base_image:
        description: "Base Tart image to layer Xcode onto"
        required: false
        default: "ghcr.io/cirruslabs/macos-tahoe-base:latest"

concurrency:
  # Same input dispatched twice serialises; different inputs can
  # build in parallel. The group is the raw input string — two
  # dispatches with equivalent versions but different whitespace
  # would race, but that's a soft consistency problem the operator
  # owns (one workflow_dispatch at a time).
  group: macos-xcode-image-${{ inputs.xcode_versions }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 480
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4

      - name: Update Tart
        run: |
          set -euo pipefail
          brew update
          brew upgrade cirruslabs/cli/tart || brew install cirruslabs/cli/tart
          tart --version

      - name: Ensure xcodes is installed
        # The CLI is also baked into the resulting Tart image, but
        # here we need it on the *host* to drive the .xip downloads
        # before Packer boots a VM.
        run: |
          set -euo pipefail
          if ! command -v xcodes >/dev/null 2>&1; then
            brew install xcodes aria2
          fi
          xcodes version

      - name: Parse Xcode versions
        id: versions
        # Workflow input is a single comma-separated string; the
        # rest of the pipeline wants both a whitespace-separated
        # list (for the download loop) and the bare default
        # version (for the tag). Trim each entry to tolerate the
        # `26.5.0, 26.4.1` style operators tend to type.
        run: |
          set -euo pipefail
          INPUT="${{ inputs.xcode_versions }}"
          IFS=',' read -ra RAW <<< "$INPUT"
          VERSIONS=()
          for v in "${RAW[@]}"; do
            trimmed=$(echo "$v" | xargs)
            if [ -n "$trimmed" ]; then
              VERSIONS+=("$trimmed")
            fi
          done
          if [ "${#VERSIONS[@]}" -eq 0 ]; then
            echo "no versions parsed from input: $INPUT" >&2
            exit 1
          fi
          DEFAULT="${VERSIONS[0]}"
          # Major-minor of the default, with dot → dash for the
          # OCI-safe tag form (`:26-5` not `:26.5`).
          MAJOR_MINOR=$(echo "$DEFAULT" | sed -E 's/^([0-9]+\.[0-9]+).*/\1/' | tr '.' '-')
          # JSON list for Packer's -var. Packer's HCL parser accepts
          # a JSON-style list when the variable is typed as
          # list(string).
          JSON=$(printf '"%s",' "${VERSIONS[@]}" | sed 's/,$//')
          JSON="[$JSON]"
          echo "versions_space=${VERSIONS[*]}" >> "$GITHUB_OUTPUT"
          echo "versions_json=$JSON" >> "$GITHUB_OUTPUT"
          echo "default=$DEFAULT" >> "$GITHUB_OUTPUT"
          echo "tag=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "Will install: ${VERSIONS[*]}"
          echo "Default (xcode-select target): $DEFAULT"
          echo "Push tag: $MAJOR_MINOR"

      - name: Download Xcode .xips from Apple
        id: xips
        # Uses the xcodes session cached in the builder's login
        # keychain by the quarterly `xcodes signin` runbook. If the
        # session has expired, `xcodes download` returns non-zero
        # on the first attempt because Apple's auth challenge
        # can't be answered non-interactively — the failure here
        # is the signal to re-mint the session. Each .xip is
        # ~10 GB, so six versions = ~60 GB of downloads, ~1 hour
        # at Apple's typical serving rate.
        run: |
          set -euo pipefail
          XIP_DIR="${RUNNER_TEMP:-/tmp}/xcode-xips"
          mkdir -p "$XIP_DIR"
          for v in ${{ steps.versions.outputs.versions_space }}; do
            # Reuse the .xip across runs if xcodes has it cached;
            # only download when absent. Apple's downloads page
            # serves the same artifact regardless of which xcodes
            # session pulled it, so a previous build's .xip is
            # still valid for this build.
            if ls "$XIP_DIR"/Xcode-"$v"*.xip >/dev/null 2>&1; then
              echo "=== Xcode $v already cached ==="
              ls -lh "$XIP_DIR"/Xcode-"$v"*.xip
              continue
            fi
            echo "=== Downloading Xcode $v ==="
            xcodes download "$v" --directory "$XIP_DIR"
            ls -lh "$XIP_DIR"/Xcode-"$v"*.xip
          done
          echo "dir=$XIP_DIR" >> "$GITHUB_OUTPUT"
          df -h "$XIP_DIR"

      - name: Initialize Packer
        working-directory: infra/macos-xcode-image
        run: packer init -upgrade macos-xcode.pkr.hcl

      # Same anonymous-pull dance as the other image workflows: the
      # bare-metal runner has tuist-bot creds cached for ghcr.io
      # which don't authorize ghcr.io/cirruslabs/* pulls. Tart also
      # consults Docker credential helpers, and this runner can have
      # the macOS helper installed without the Docker CLI — clear
      # both stores before Packer clones the public base.
      - name: Drop cached ghcr.io credentials
        run: |
          tart logout ghcr.io || true
          if command -v docker >/dev/null 2>&1; then
            docker logout ghcr.io || true
          fi
          for helper in docker-credential-osxkeychain docker-credential-desktop; do
            if command -v "$helper" >/dev/null 2>&1; then
              printf 'ghcr.io' | "$helper" erase || true
              printf 'https://ghcr.io' | "$helper" erase || true
            fi
          done

      - name: Reclaim Tart disk
        run: |
          set -uo pipefail
          tart list --format json || true
          df -h /
          tart stop macos-tahoe-xcode 2>/dev/null || true
          tart delete macos-tahoe-xcode 2>/dev/null || true
          tart prune --entries caches --older-than 0
          tart prune --entries vms --older-than 1
          df -h /

      - name: Build image
        working-directory: infra/macos-xcode-image
        env:
          XCODE_VERSIONS_JSON: ${{ steps.versions.outputs.versions_json }}
          XCODE_XIP_DIR: ${{ steps.xips.outputs.dir }}
        run: |
          set -euo pipefail
          docker_config="$HOME/.docker/config.json"
          docker_config_backup=""
          restore_docker_config() {
            if [ -n "$docker_config_backup" ] && [ -f "$docker_config_backup" ]; then
              mkdir -p "$HOME/.docker"
              mv "$docker_config_backup" "$docker_config"
            fi
          }
          trap restore_docker_config EXIT

          if [ -f "$docker_config" ]; then
            docker_config_backup="$(mktemp "${RUNNER_TEMP:-/tmp}/docker-config.XXXXXX")"
            mv "$docker_config" "$docker_config_backup"
          fi

          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${{ inputs.base_image || 'ghcr.io/cirruslabs/macos-tahoe-base:latest' }}" \
            -var "output_image=macos-tahoe-xcode" \
            -var "xcode_versions=${XCODE_VERSIONS_JSON}" \
            -var "xcode_xip_dir=${XCODE_XIP_DIR}" \
            macos-xcode.pkr.hcl

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | tart login ghcr.io --username tuist-bot --password-stdin

      - name: Push image to GHCR
        run: |
          set -euo pipefail
          TAG="${{ steps.versions.outputs.tag }}"
          tart push macos-tahoe-xcode "ghcr.io/tuist/macos-tahoe-xcode:${TAG}"
          echo "Pushed ghcr.io/tuist/macos-tahoe-xcode:${TAG}"
          echo "  default Xcode: ${{ steps.versions.outputs.default }}"
          echo "  also includes: ${{ steps.versions.outputs.versions_space }}"

      - name: Cleanup
        if: always()
        run: tart delete macos-tahoe-xcode 2>/dev/null || true
