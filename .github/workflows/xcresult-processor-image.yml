name: Xcresult Processor Image

# On-demand build of the Tart VM image that hosts the Tuist xcresult
# processor on macOS. Invoke via `gh workflow run
# xcresult-processor-image.yml --ref <branch>` when probing image
# contents or smoke-testing a Packer change before merging.
#
# The push-on-main flow lives in release.yml's
# release-xcresult-processor job — that's the path that produces
# versioned tags (`:<version>` + `:latest`) and rewrites the
# xcresultProcessor image tag in `values-managed-common.yaml`. This
# workflow's `:<git-sha>` tag is dispatch-only and not consumed by
# the chart.
#
# Two stages on the same self-hosted bare-metal Mac mini (the same
# vm-image-builder host #10264 introduces — Tart needs a live GUI session
# for Virtualization.framework, so this can't run on hosted GitHub runners):
#
#   1. Build the Erlang release with the xcresult NIF, package as a tarball.
#   2. Bake the tarball into a Tart image via Packer + push to GHCR.

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: "Base Tart image"
        required: false
        default: "ghcr.io/cirruslabs/macos-tahoe-xcode:26.4"

concurrency:
  group: xcresult-processor-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      MISE_VERSION: "2026.4.18"
      MISE_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "erlang elixir"
          working_directory: server

      # 1. Build the macOS Erlang release. Includes both the xcresult NIF
      # (used by xcresult-processor mode) and the xcactivitylog NIF
      # (used by build-processor mode). Both are macOS-only and both
      # have `@on_load` that crashes the BEAM at boot if the .so is
      # missing in a prod build — the xcresult-processor mode doesn't
      # *call* xcactivitylog_nif but the Module still gets loaded
      # eagerly, so the .so has to be present either way.
      - name: Build server release for macOS
        id: release
        working-directory: server
        run: |
          set -euo pipefail
          MIX_ENV=prod mix deps.get --only prod
          # `mix release` doesn't invoke the per-NIF build.sh scripts;
          # run them explicitly so the .so / .dylib land in priv/native
          # before the release tarball is assembled.
          ./native/xcresult_nif/build.sh
          ./native/xcactivitylog_nif/build.sh
          # The bare-metal Mac mini reuses a single $TUIST_MIX_BUILD_ROOT
          # across runs, which is mostly fine — except mix's mtime-based
          # incremental compile occasionally keeps a stale .beam after a
          # rebase. `--force` recompiles every .ex regardless; the BEAM
          # build is fast enough (~30s) that the safety is worth more
          # than the saved time.
          MIX_ENV=prod mix compile --force --warnings-as-errors
          MIX_ENV=prod mix release tuist --overwrite
          # mix.exs honors $TUIST_MIX_BUILD_ROOT (set on the bare-metal
          # runner to share the BEAM build cache across jobs). When it's
          # set, the release lands at $TUIST_MIX_BUILD_ROOT/server/prod/
          # rel/tuist; when unset, plain ./_build/prod/rel/tuist.
          if [ -n "${TUIST_MIX_BUILD_ROOT:-}" ]; then
            RELEASE_DIR="${TUIST_MIX_BUILD_ROOT}/server/prod/rel/tuist"
          else
            RELEASE_DIR="$(pwd)/_build/prod/rel/tuist"
          fi
          echo "dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package release tarball
        run: |
          set -euo pipefail
          tar -czf /tmp/release.tar.gz -C "${{ steps.release.outputs.dir }}" .
          ls -lh /tmp/release.tar.gz

      # 2. Bake the tarball into a Tart image.
      - name: Initialize Packer
        working-directory: infra/xcresult-processor-image
        run: packer init -upgrade xcresult-processor.pkr.hcl

      # The bare-metal runner has tuist-bot ghcr.io creds cached from
      # earlier image-push jobs. Those creds don't authorize pulls
      # from ghcr.io/cirruslabs/*, so Tart's token-fetch returns 403.
      # Tart also consults Docker credential helpers, and this runner
      # can have the macOS helper installed without the Docker CLI.
      # Clear both stores before the public anonymous pull.
      - name: Drop cached ghcr.io credentials
        run: |
          tart logout ghcr.io || true
          if command -v docker >/dev/null 2>&1; then
            docker logout ghcr.io || true
          fi
          for helper in docker-credential-osxkeychain docker-credential-desktop; do
            if command -v "$helper" >/dev/null 2>&1; then
              printf 'ghcr.io' | "$helper" erase || true
              printf 'https://ghcr.io' | "$helper" erase || true
            fi
          done

      # Reclaim disk before the Cirrus pull. macos-tahoe-xcode:26.4 is
      # ~70GB on disk; the bare-metal Mac mini accumulates older Tart
      # VMs + image layers across runs and fills up. Stop+delete any
      # leftover xcresult VM, then prune unused image layers.
      - name: Reclaim Tart disk
        # See runner-image.yml's Reclaim Tart disk step for the long
        # explanation. tl;dr: delete both builder VMs because they
        # share a host and the sibling workflow leaves its VM
        # behind, eating ~80 GB of disk that the next clone needs.
        run: |
          set -uo pipefail
          tart list --format json || true
          df -h /
          for vm in tuist-runner tuist-xcresult-processor; do
            tart stop "$vm" 2>/dev/null || true
            tart delete "$vm" 2>/dev/null || true
          done
          tart prune --entries caches --older-than 0
          df -h /

      - name: Build image
        working-directory: infra/xcresult-processor-image
        run: |
          set -euo pipefail
          docker_config="$HOME/.docker/config.json"
          docker_config_backup=""
          restore_docker_config() {
            if [ -n "$docker_config_backup" ] && [ -f "$docker_config_backup" ]; then
              mkdir -p "$HOME/.docker"
              mv "$docker_config_backup" "$docker_config"
            fi
          }
          trap restore_docker_config EXIT

          # Tart hardcodes ~/.docker/config.json when looking up Docker
          # credential helpers. Move it aside so the public Cirrus image is
          # pulled anonymously instead of through stale ghcr.io credentials.
          if [ -f "$docker_config" ]; then
            docker_config_backup="$(mktemp "${RUNNER_TEMP:-/tmp}/docker-config.XXXXXX")"
            mv "$docker_config" "$docker_config_backup"
          fi

          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${{ inputs.base_image || 'ghcr.io/cirruslabs/macos-tahoe-xcode:26.4' }}" \
            -var "output_image=tuist-xcresult-processor" \
            -var "release_tarball=/tmp/release.tar.gz" \
            xcresult-processor.pkr.hcl

      # GHCR auth for the Push step below. See runner-image.yml's
      # matching step for the long explanation.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Push image to GHCR
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # SHA-tagged builds for ad-hoc deploys; semver tags + `:latest`
          # are owned by release.yml's release-xcresult-processor job.
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA::8}"
          tart push tuist-xcresult-processor "ghcr.io/tuist/tuist-xcresult-processor:${GIT_SHA}"
          echo "Pushed ghcr.io/tuist/tuist-xcresult-processor:${GIT_SHA}"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/release.tar.gz
          tart delete tuist-xcresult-processor 2>/dev/null || true
