name: Notify Slack on failure

on:
  workflow_run:
    workflows:
      - Android
      - App
      - Cache
      - Cache Deploy
      - CLI
      - CLI Cache EE
      - Gradle
      - Gradle Cache Acceptance
      - Handbook
      - Noora
      - Processor
      - Processor Deploy
      - Release
      - Secret Scanning
      - Server
      - Server Production Deployment
      - Xcode Processor
      - Xcode Processor Deploy
    branches: [main]
    types: [completed]

permissions: {}

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: 1password/install-cli-action@v2
      - name: Load secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          echo "SLACK_WEBHOOK_URL=$(op read 'op://cache/SLACK_WEBHOOK_URL/password')" >> $GITHUB_ENV
      - uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "`${{ github.event.workflow_run.name }}` failed on main: ${{ github.event.workflow_run.html_url }}"
            }
