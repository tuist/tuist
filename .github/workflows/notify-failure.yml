name: Notify Slack on failure

on:
  workflow_run:
    workflows:
      - Android
      - App
      - Cache
      - Cache Deploy
      - Cache Release
      - CLI
      - CLI Cache EE
      - CNPG Restore Drill
      - Gradle
      - Gradle Cache Acceptance
      - Gradle Release
      - Handbook
      - Hetzner Robot Controller Release
      - Kura
      - Mgmt Cluster Apply
      - Noora
      - Noora Storybook Deployment
      - Processor
      - Processor Deploy
      - Release
      - Secret Scanning
      - Skills Release
      - Slack
      - Slack Deployment
      - Server
      - Server Deployment
      - Server Kura Regional Deployment
      - Server Production Deployment
      - Tuist Ops Deployment
      - Xcode Processor
      - Xcode Processor Deploy
    branches: [main]
    types: [completed]

permissions: {}

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: 1password/install-cli-action@v2
      - name: Load secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          SLACK_WEBHOOK_URL=$(op read 'op://cache/SLACK_WEBHOOK_URL/password')
          echo "::add-mask::$SLACK_WEBHOOK_URL"
          echo "SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL" >> $GITHUB_ENV
      - name: Build Slack payload
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="${REPO_URL}/commit/${SHA}"
          TEXT=$(printf ':x: <%s|%s> failed on main for <%s|tuist%s>: %s' "$RUN_URL" "$WORKFLOW_NAME" "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MESSAGE")
          jq -n --arg text "$TEXT" '{text: $text}' > "$RUNNER_TEMP/slack-payload.json"
      - uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: ${{ runner.temp }}/slack-payload.json
