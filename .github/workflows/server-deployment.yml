name: Server Deployment

# Build + deploy the Tuist server to a single Kubernetes environment.
#
# This workflow is the "building block": build → push image → helm
# upgrade. It runs against exactly one environment per invocation, with no
# cascade and no acceptance tests. Use it for:
#   - Ad-hoc staging / canary / production deploys via workflow_dispatch
#     (e.g. re-running a specific SHA on one env).
#   - As a workflow_call target from server-production-deployment.yml,
#     which chains canary → acceptance tests → production on push-to-main.
#
# Image architecture: a single env-agnostic image is built per commit
# (MIX_ENV=prod always). The runtime picks canary/staging/production
# behavior via the TUIST_DEPLOY_ENV env var set by the Helm overlay, and the
# MASTER_KEY ESO secret decrypts the matching priv/secrets/<env>.yml.enc
# file baked into the image. This means the same `sha-<SHA>` image is
# promoted across environments - one build, N deploys.
#
# Environment → cluster wiring is by convention: namespace = `tuist-<env>`
# (except production = `tuist`), values overlay = `values-managed-<env>.yaml`,
# public host = `<env>.tuist.dev` (except production = `tuist.dev`). Adding a
# new environment is just adding the matching values files.
#
# Required secrets:
#   OP_SERVICE_ACCOUNT_TOKEN (per GitHub Environment server-k8s-<env>) -
#     1Password service-account token scoped read-only to the
#     tuist-k8s-<env> vault, where the cluster's kubeconfig is stored
#     as a Document item named `kubeconfig: tuist-<env>`. Each
#     environment's secret value is the SA token for that environment's
#     vault — staging deploys can't read canary/production kubeconfigs.
#     Production also reads the Kura regional workload kubeconfigs from
#     `kubeconfig: kura-us-east-1` and `kubeconfig: kura-us-west-1` in
#     the production vault so the server can write KuraInstance CRs to
#     the us-east and us-west clusters.
# App secrets live inside the cluster (MASTER_KEY via ESO, DATABASE_URL /
# ClickHouse / Tigris keys in priv/secrets/<env>.yml.enc baked into the
# image).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - canary
          - production
      commit_sha:
        description: Commit SHA to deploy (defaults to the event's SHA)
        required: false
      image_tag:
        description: Pre-built image tag to deploy instead of building
        required: false
      kura_runtime_image_tag:
        description: Pre-built Kura runtime image tag to deploy
        required: false
  workflow_call:
    inputs:
      environment:
        description: Target environment (staging | canary | production)
        required: true
        type: string
      commit_sha:
        description: Commit SHA to deploy (defaults to github.sha)
        required: false
        type: string
      image_tag:
        description: >-
          Pre-built image tag to deploy. When set, the build job is
          skipped and the deploy job uses this tag directly. When unset,
          the workflow builds + pushes an image tagged sha-<commit_sha>.
        required: false
        type: string
      kura_runtime_image_tag:
        description: >-
          Pre-built Kura runtime image tag to deploy. When unset, the
          deploy job resolves the latest kura@ release tag and strips the
          tag prefix before passing it to Helm.
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist
  KURA_CONTROLLER_IMAGE_NAME: tuist/kura-controller
  HELM_CHART_PATH: infra/helm/tuist
  HELM_RELEASE_NAME: tuist
  OBSERVABILITY_CHART_PATH: infra/helm/k8s-monitoring
  OBSERVABILITY_RELEASE_NAME: k8s-monitoring
  OBSERVABILITY_NAMESPACE: observability
  DEPLOY_SHA: ${{ inputs.commit_sha || github.sha }}
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
  MISE_GITHUB_ATTESTATIONS: 0
  # Skip mise's SLSA provenance verification for github-backend tools
  # only. The platform-install job runs `mise -C infra run`, which
  # resolves the repo toolset including `github:tuist/blick` +
  # `github:endevco/aube`; mise's SLSA check builds a malformed release
  # URL for github-backend tools (releases/tags/<owner>/<repo>@<ver>
  # instead of /<ver>) and 404s on cache-cold runners. GitHub artifact
  # attestations still verify. Aqua-backend SLSA stays ON: mise.lock
  # records slsa provenance for aqua tools (e.g. getsops/sops), and
  # disabling it trips mise's downgrade-attack guard.
  MISE_GITHUB_SLSA: false

jobs:
  build:
    name: Build + push
    if: inputs.image_tag == ''
    # Bigger shape: the server image build (Elixir release compile inside
    # the dind sidecar) OOMs the 2 vCPU / 8 GB default microVM, killing the
    # runner mid-build ("lost communication"). Mirrors server.yml's
    # docker_build job.
    runs-on: ubuntu-latest
    # 60m absorbs a fully cold build (no buildcache hits).
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          submodules: false
      - id: tag
        run: echo "image_tag=sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - id: buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Persist the OG-image render output across builds. The /og-cache
      # `--mount=type=cache` is local to the BuildKit builder, so it is empty
      # on every ephemeral runner and Chromium re-renders every OG image
      # (~6 min, on the critical path that gates `mix release`). cache-dance
      # round-trips the mount through actions/cache so unchanged images are
      # skipped via their .cachekey sidecars. The registry cache below only
      # exports layers, never cache-mount contents.
      - name: Restore OG image render cache
        id: og-cache
        uses: actions/cache@v4
        with:
          path: |
            og-cache-marketing
            og-cache-docs
          key: server-og-cache-${{ env.DEPLOY_SHA }}
          restore-keys: |
            server-og-cache-
      - name: Seed OG cache mounts into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "og-cache-marketing": { "target": "/og-cache/marketing", "id": "og-marketing" },
              "og-cache-docs": { "target": "/og-cache/docs", "id": "og-docs" }
            }
          skip-extraction: ${{ steps.og-cache.outputs.cache-hit }}
      - uses: docker/build-push-action@v6
        name: Build and push server image
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          # Shared `buildcache:server` ref, kept warm by the push-to-main
          # build in server-production-deployment.yml. `mode=max` exports
          # cache for every stage (deps.compile, builder, og-images).
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:server
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:server,mode=max
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=${{ env.DEPLOY_SHA }}
      - uses: docker/build-push-action@v6
        name: Build and push Kura controller image
        with:
          context: .
          file: ./infra/kura-controller/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.KURA_CONTROLLER_IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
  observability-install:
    # Installs / upgrades the grafana/k8s-monitoring wrapper chart ahead of
    # the server rollout so the Alloy OTLP receiver is ready before the
    # server starts pushing spans to it. Idempotent: on every run it's a
    # no-op if Chart.lock + values haven't changed.
    #
    # Per-chart concurrency lane: serializes this install against its
    # own past runs without making sibling install jobs in the same
    # run cancel each other. A single shared lane caps the GitHub
    # queue at running + 1 waiting and drops the rest, which used to
    # leave only one of the three install jobs running per deploy.
    name: Observability chart (${{ inputs.environment }})
    needs: build
    # `build` is skipped when image_tag is supplied - keep running.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: tuist-linux
    environment:
      name: server-k8s-${{ inputs.environment }}
    concurrency:
      group: server-deploy-${{ inputs.environment }}-observability
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-${{ inputs.environment }}" \
            --vault "tuist-k8s-${{ inputs.environment }}" --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Verify cluster reachability
        # Fail fast if the 1P-stored kubeconfig points at an unreachable
        # apiserver. Without this, the next step would hang for `--timeout`
        # on a phantom kubeconfig (e.g. a torn-down validation cluster
        # whose LB IP got reassigned to another tenant) and we'd find out
        # only after a partial helm rollout.
        run: |
          set -euo pipefail
          API="$(kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Reaching apiserver at $API"
          kubectl --request-timeout=10s get --raw /version >/dev/null
      - name: helm dependency update
        run: helm dependency update "$OBSERVABILITY_CHART_PATH"
      - name: helm upgrade --install k8s-monitoring
        run: |
          helm upgrade --install "$OBSERVABILITY_RELEASE_NAME" "$OBSERVABILITY_CHART_PATH" \
            --namespace "$OBSERVABILITY_NAMESPACE" --create-namespace \
            -f "$OBSERVABILITY_CHART_PATH/values-${{ inputs.environment }}.yaml" \
            --timeout 10m --wait

  tailscale-operator-install:
    # Installs / upgrades the tailscale-operator wrapper chart ahead of
    # the server rollout so the Connector subnet router that announces
    # the macOS fleet's CGNAT range is Ready before the CAPI provider
    # starts bootstrapping Mac minis. Idempotent: a no-op if Chart.lock
    # + values haven't changed.
    #
    # All three Tuist-managed envs (staging, canary, production) ship
    # their own values-<env>.yaml under infra/helm/tailscale-operator/,
    # so this skip path is reachable only when the workflow is forked
    # by a self-hoster who hasn't authored one. Keeps the workflow
    # usable downstream without a hard dependency on Tailscale; the
    # main server deploy continues either way.
    #
    # Per-chart concurrency lane: same reasoning as
    # observability-install. Serializes this install against its own
    # past runs without sharing a slot with the sibling install jobs.
    name: Tailscale operator chart (${{ inputs.environment }})
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: tuist-linux
    environment:
      name: server-k8s-${{ inputs.environment }}
    concurrency:
      group: server-deploy-${{ inputs.environment }}-tailscale
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      TAILSCALE_CHART_PATH: infra/helm/tailscale-operator
      TAILSCALE_RELEASE_NAME: tailscale-operator
      TAILSCALE_NAMESPACE: tailscale-operator
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - id: check-values
        name: Check for env values file
        run: |
          set -euo pipefail
          VALUES="$TAILSCALE_CHART_PATH/values-${{ inputs.environment }}.yaml"
          if [ -f "$VALUES" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$VALUES present; proceeding with install."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$VALUES not present; skipping tailscale-operator install for this env."
          fi
      - if: steps.check-values.outputs.exists == 'true'
        uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - if: steps.check-values.outputs.exists == 'true'
        uses: 1password/install-cli-action@v2
      - if: steps.check-values.outputs.exists == 'true'
        name: Load kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-${{ inputs.environment }}" \
            --vault "tuist-k8s-${{ inputs.environment }}" --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - if: steps.check-values.outputs.exists == 'true'
        name: Verify cluster reachability
        run: |
          set -euo pipefail
          API="$(kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Reaching apiserver at $API"
          kubectl --request-timeout=10s get --raw /version >/dev/null
      - if: steps.check-values.outputs.exists == 'true'
        name: helm dependency update
        run: helm dependency update "$TAILSCALE_CHART_PATH"
      - if: steps.check-values.outputs.exists == 'true'
        name: helm upgrade --install tailscale-operator
        run: |
          helm upgrade --install "$TAILSCALE_RELEASE_NAME" "$TAILSCALE_CHART_PATH" \
            --namespace "$TAILSCALE_NAMESPACE" --create-namespace \
            -f "$TAILSCALE_CHART_PATH/values-${{ inputs.environment }}.yaml" \
            --timeout 10m --wait

  platform-install:
    # Installs / upgrades the platform chart (cert-manager, ingress-nginx,
    # external-dns, ESO, metrics-server) ahead of the server rollout. The
    # bootstrap script lays this down once per cluster, but app-impacting
    # platform settings — ingress-nginx upstream-keepalive-timeout,
    # metrics-server presence — must self-heal on every deploy so existing
    # clusters pick up chart edits without a manual re-bootstrap. Idempotent:
    # steady-state finishes in under a minute when nothing has drifted.
    #
    # Per-chart concurrency lane: same reasoning as
    # observability-install. Serializes this install against its own
    # past runs without sharing a slot with the sibling install jobs.
    name: Platform chart (${{ inputs.environment }})
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: tuist-linux
    environment:
      name: server-k8s-${{ inputs.environment }}
    concurrency:
      group: server-deploy-${{ inputs.environment }}-platform
      cancel-in-progress: false
    timeout-minutes: 40
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-${{ inputs.environment }}" \
            --vault "tuist-k8s-${{ inputs.environment }}" --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Verify cluster reachability
        run: |
          set -euo pipefail
          API="$(kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Reaching apiserver at $API"
          kubectl --request-timeout=10s get --raw /version >/dev/null
      - name: Run k8s:install-platform
        # CLOUDFLARE_API_TOKEN is read from the in-cluster Secret the bootstrap
        # script created (CI is cluster-admin) instead of being added as a
        # second GitHub secret. ::add-mask:: registers the value with Actions
        # so it's redacted in subsequent step output (GHA only auto-masks
        # values it knows are secrets; values derived at runtime aren't).
        env:
          CLUSTER_NAME: ${{ inputs.environment == 'production' && 'tuist' || format('tuist-{0}', inputs.environment) }}
        run: |
          set -euo pipefail
          CLOUDFLARE_API_TOKEN="$(kubectl -n platform get secret cloudflare-api-token \
            -o jsonpath='{.data.api-token}' | base64 -d)"
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          export CLOUDFLARE_API_TOKEN
          echo "Reconciling platform chart for cluster $CLUSTER_NAME"
          mise -C infra run k8s:install-platform "$KUBECONFIG" "$CLUSTER_NAME"

  deploy:
    name: Deploy to ${{ inputs.environment == 'production' && 'tuist' || format('tuist-{0}', inputs.environment) }}
    needs: [build, observability-install, tailscale-operator-install, platform-install]
    # `build` may be skipped when image_tag is passed in - keep running.
    # `platform-install` brings up CRDs (cert-manager, ESO,
    # cloudnative-pg) the Tuist chart consumes; if it fails the chart
    # deploy would silently no-op on those resources, so block.
    # `observability-install` always runs, so it must be a plain success.
    # `tailscale-operator-install` runs the install for managed envs and
    # short-circuits when a forked workflow has no env values file; either
    # way it must complete cleanly before the chart deploy.
    # `platform-install` reconciles cert-manager / ingress-nginx /
    # external-dns / ESO / metrics-server / cloudnative-pg so app-impacting
    # platform settings (including CNPG CRDs the Tuist chart consumes for
    # the in-cluster Postgres rollout) land before the app chart upgrade.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && needs.observability-install.result == 'success' && needs.tailscale-operator-install.result == 'success' && needs.platform-install.result == 'success'
    runs-on: tuist-linux
    environment:
      name: server-k8s-${{ inputs.environment }}
      url: https://${{ inputs.environment == 'production' && 'tuist.dev' || format('{0}.tuist.dev', inputs.environment) }}
    # Serialize deploys targeting the same environment so two concurrent
    # runs don't race on the Helm release. Per-job lane so the sibling
    # chart-install jobs don't compete for this slot within one run.
    concurrency:
      group: server-deploy-${{ inputs.environment }}-deploy
      cancel-in-progress: false
    # This ceiling MUST stay above the helm step's own timeout (70m =
    # helm `--timeout 60m` + ~10m `--atomic` rollback) plus the ~5-10m
    # of setup before it. Otherwise GitHub SIGKILLs helm mid-`--wait`,
    # before its rollback can run, and the release is left wedged in
    # pending-upgrade (the bug that drove the long pending-upgrade ->
    # rollback churn: the ceiling had drifted to 50m, under helm's 60m,
    # when helm was bumped from 30m). 80m keeps helm < step < job so a
    # stuck deploy fails via helm's own clean path, not this ceiling.
    timeout-minutes: 80
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      NAMESPACE: ${{ inputs.environment == 'production' && 'tuist' || format('tuist-{0}', inputs.environment) }}
      IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || needs.build.outputs.image_tag }}
      KURA_RUNTIME_IMAGE_TAG: ${{ inputs.kura_runtime_image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          # Full history + tags so the version-resolution step below can
          # read every `<component>@<semver>` release tag.
          fetch-depth: 0
      - name: Resolve fleet and runtime image versions from git tags
        # The version of each fleet/runtime image (xcresult-processor, CAPI
        # provider, runners-controller, Kura runtime, macOS + Linux runner
        # images) is the highest `<component>@<semver>` tag reachable from
        # the deployed commit, so a release that cuts a new tag rolls forward
        # on the next deploy. `--merged` makes a re-promote of an older SHA
        # resolve the versions as they were at that commit.
        run: |
          set -euo pipefail
          resolve() {
            git tag --list "${1}*" --merged "$DEPLOY_SHA" \
              | sed "s|^${1}||" \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n1
          }
          {
            echo "XCRESULT_PROCESSOR_TAG=$(resolve 'xcresult-processor-image@')"
            echo "CAPI_TAG=$(resolve 'capi-scaleway@')"
            echo "RUNNERS_CONTROLLER_TAG=$(resolve 'runners-controller@')"
            echo "KURA_RUNTIME_TAG=$(resolve 'kura@')"
            echo "RUNNER_IMAGE_SEMVER=$(resolve 'runner-image@')"
            echo "LINUX_RUNNER_IMAGE_VERSION=$(resolve 'linux-runner-image@')"
          } >> "$GITHUB_ENV"
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-${{ inputs.environment }}" \
            --vault "tuist-k8s-${{ inputs.environment }}" --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Verify cluster reachability
        # Fail fast if the 1P-stored kubeconfig points at an unreachable
        # apiserver. Without this, helm upgrade would hang for `--timeout`
        # against a phantom endpoint and partially mutate cluster state
        # before erroring.
        run: |
          set -euo pipefail
          API="$(kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.server}')"
          echo "Reaching apiserver at $API"
          kubectl --request-timeout=10s get --raw /version >/dev/null
      - name: Sync Kura regional kubeconfigs
        if: inputs.environment == 'production'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail

          dir="$RUNNER_TEMP/kura-kubeconfigs"
          mkdir -p "$dir"

          op document get "kubeconfig: kura-us-east-1" \
            --vault "tuist-k8s-production" --output "$dir/us-east-1.yaml"
          op document get "kubeconfig: kura-us-west-1" \
            --vault "tuist-k8s-production" --output "$dir/us-west-1.yaml"
          chmod 600 "$dir/us-east-1.yaml" "$dir/us-west-1.yaml"

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NAMESPACE" create secret generic tuist-kura-kubeconfigs \
            --from-file=TUIST_KURA_KUBECONFIG_US_EAST_1="$dir/us-east-1.yaml" \
            --from-file=TUIST_KURA_KUBECONFIG_US_WEST_1="$dir/us-west-1.yaml" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: kubectl apply CRDs
        # Helm 3 installs `crds/*.yaml` on `helm install` and skips
        # them on `helm upgrade` (intentional — Helm refuses to manage
        # CRD lifecycle to avoid data loss on schema regressions). The
        # deploy workflow re-applies them every run so chart-managed
        # schema changes ship the same way code changes do; no
        # operator-side manual step.
        run: kubectl apply -f "$HELM_CHART_PATH/crds/"
      - name: Recover interrupted Helm release
        run: |
          set -euo pipefail

          status="$(
            helm status "$HELM_RELEASE_NAME" -n "$NAMESPACE" 2>/dev/null |
              awk '/^STATUS:/ { print $2 }' ||
              true
          )"
          case "$status" in
            pending-install|pending-upgrade|pending-rollback)
              echo "Release $HELM_RELEASE_NAME is $status; rolling back to the last deployed revision before upgrading."
              helm history "$HELM_RELEASE_NAME" -n "$NAMESPACE" --max 20

              deployed_revision="$(
                helm history "$HELM_RELEASE_NAME" -n "$NAMESPACE" --max 20 |
                  awk '$0 ~ /[[:space:]]deployed[[:space:]]/ { revision = $1 } END { print revision }'
              )"

              if [ -z "$deployed_revision" ]; then
                echo "No deployed revision found for $HELM_RELEASE_NAME in $NAMESPACE."
                exit 1
              fi

              # This is a metadata recovery path, not the real health gate.
              # An interrupted atomic rollback can leave the latest Helm
              # revision in pending-rollback even when the last deployed
              # revision is the only viable base for the next deploy. Waiting
              # here replays the old manifest's readiness problems and can
              # strand this recovery step before the current chart gets a
              # chance to fix them. The following helm upgrade owns the full
              # --wait/--atomic rollout with richer diagnostics.
              helm rollback "$HELM_RELEASE_NAME" "$deployed_revision" \
                --namespace "$NAMESPACE" --timeout 5m

              helm status "$HELM_RELEASE_NAME" -n "$NAMESPACE"
              ;;
            *)
              echo "Release $HELM_RELEASE_NAME status is ${status:-not-installed}; no recovery needed."
              ;;
          esac
      - name: Clean up stale migration Jobs
        # The chart's pre-upgrade migration hook is named
        # `tuist-tuist-server-migrate` (stable across revisions). Any
        # `tuist-tuist-server-migrate-<n>` Jobs in the namespace are
        # orphans whose Pending pods would otherwise compete with the new
        # hook for scheduler attention; sweep them before invoking helm.
        run: |
          set -euo pipefail

          stale_jobs="$(
            kubectl -n "$NAMESPACE" get jobs \
              -l app.kubernetes.io/component=server-migration \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
              grep -E -- '-[0-9]+$' || true
          )"

          if [ -z "$stale_jobs" ]; then
            echo "No revision-suffixed migration Jobs to clean up."
            exit 0
          fi

          echo "Deleting stale migration Jobs:"
          echo "$stale_jobs"
          # `--ignore-not-found` covers a rare race where helm's hook gets
          # deleted between the list and delete calls. Cascade=foreground
          # so dependent pods (Pending or otherwise) go with the Job.
          echo "$stale_jobs" | xargs -r kubectl -n "$NAMESPACE" delete job \
            --ignore-not-found --cascade=foreground --timeout=2m
      - name: helm upgrade --install
        # App secrets never pass through --set: the chart runs in
        # `server.managedSecrets: true` mode, which reads DATABASE_URL /
        # TUIST_CLICKHOUSE_URL / TUIST_S3_* from priv/secrets/<env>.yml.enc
        # baked into the image and pulls MASTER_KEY from 1Password via an
        # in-cluster ExternalSecret. Passing secrets through --set would
        # leak them into `helm get manifest`.
        #
        # `--timeout 60m` is generous on purpose: a complex migration
        # (the pre-upgrade hook runs inside this budget) plus the
        # `--wait` rollout can genuinely take a while, and undershooting
        # would kill a legitimately-slow deploy mid-migration. The 70m
        # step timeout is helm's 60m plus a ~10m cushion for the
        # in-process `--atomic` rollback. The job's `timeout-minutes`
        # ceiling sits above this (helm < step < job): that ordering is
        # what makes a stuck deploy hit helm's own timeout first (clean
        # rollback + failure diagnostics) instead of the job ceiling
        # SIGKILLing helm mid-wait and wedging the release in
        # pending-upgrade.
        timeout-minutes: 70
        run: |
          # Stream cluster state every 30s while helm waits. helm
          # --atomic --wait produces no stdout during the wait, so
          # without this the action log shows nothing for up to 90 min.
          # The watcher dies via trap when helm exits (either way).
          (
            while true; do
              sleep 30
              echo "::group::cluster snapshot $(date -u +%H:%M:%SZ)"
              kubectl -n "$NAMESPACE" get pods -o wide 2>&1 | tail -40 || true
              echo "--- recent events ---"
              kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp 2>&1 | tail -20 || true
              echo "::endgroup::"
            done
          ) &
          watcher_pid=$!
          trap 'kill "$watcher_pid" 2>/dev/null || true; wait "$watcher_pid" 2>/dev/null || true' EXIT

          # Fleet + runtime image versions come from the env (the "Resolve
          # fleet and runtime image versions" step) and are passed to the
          # chart via --set. add_set skips empties so an unreleased or
          # disabled component keeps the chart default.
          image_sets=()
          add_set() {
            if [ -n "$2" ]; then
              image_sets+=(--set "$1=$2")
              echo "Pinning $1=$2"
            else
              echo "WARNING: no version resolved for $1; leaving chart default."
            fi
          }
          add_set "xcresultProcessor.image.tag" "${XCRESULT_PROCESSOR_TAG:-}"
          add_set "macosFleet.image.tag" "${CAPI_TAG:-}"
          add_set "runnersController.image.tag" "${RUNNERS_CONTROLLER_TAG:-}"
          add_set "runnersFleet.runnerImageSemver" "${RUNNER_IMAGE_SEMVER:-}"
          if [ -n "${LINUX_RUNNER_IMAGE_VERSION:-}" ]; then
            add_set "runnersFleetLinux.shapeRunnerImage" \
              "ghcr.io/tuist/tuist-linux-runner:${LINUX_RUNNER_IMAGE_VERSION}"
          fi

          # The explicit kura_runtime_image_tag input (manual re-roll) wins
          # over the resolved kura@ tag.
          kura_runtime_tag="${KURA_RUNTIME_IMAGE_TAG:-}"
          if [ -n "$kura_runtime_tag" ]; then
            echo "Overriding resolved Kura runtime tag with input ${kura_runtime_tag}"
          else
            kura_runtime_tag="${KURA_RUNTIME_TAG:-}"
          fi
          add_set "kuraRuntime.image.tag" "$kura_runtime_tag"

          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$NAMESPACE" --create-namespace \
            -f "$HELM_CHART_PATH/values-managed-common.yaml" \
            -f "$HELM_CHART_PATH/values-managed-${{ inputs.environment }}.yaml" \
            --set server.image.tag="$IMAGE_TAG" \
            --set kuraController.image.tag="$IMAGE_TAG" \
            "${image_sets[@]}" \
            --atomic --timeout 60m --wait
      - name: Diagnostics on failure
        # `--atomic` rolls back the release on timeout, so `helm history` and
        # most cluster state reflect the rolled-back revision rather than the
        # failure. Migration-job pods linger long enough for logs to be useful;
        # everything else is best-effort.
        if: failure()
        run: |
          set +e
          echo "::group::helm history"
          helm history "$HELM_RELEASE_NAME" -n "$NAMESPACE" --max 10 || true
          echo "::endgroup::"
          echo "::group::helm get manifest (last attempted revision)"
          helm get manifest "$HELM_RELEASE_NAME" -n "$NAMESPACE" 2>&1 | head -200 || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n "$NAMESPACE" get pods -o wide || true
          echo "::endgroup::"
          echo "::group::events (last 100, sorted)"
          kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp 2>&1 | tail -100 || true
          echo "::endgroup::"
          echo "::group::migration job"
          kubectl -n "$NAMESPACE" get jobs -l app.kubernetes.io/component=server-migration -o wide || true
          for job in $(kubectl -n "$NAMESPACE" get jobs -l app.kubernetes.io/component=server-migration -o name 2>/dev/null); do
            echo "--- describe $job ---"
            kubectl -n "$NAMESPACE" describe "$job" || true
            echo "--- logs $job ---"
            kubectl -n "$NAMESPACE" logs "$job" --all-containers --tail=500 || true
          done
          echo "::endgroup::"
          echo "::group::server deployment + pods"
          kubectl -n "$NAMESPACE" describe deploy/tuist-tuist-server || true
          for pod in $(kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/component=server -o name 2>/dev/null); do
            echo "--- describe $pod ---"
            kubectl -n "$NAMESPACE" describe "$pod" || true
            echo "--- logs $pod (current) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --tail=500 || true
            echo "--- logs $pod (previous) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --previous --tail=500 || true
          done
          echo "::endgroup::"
          echo "::group::xcresult processor deployment + pods"
          kubectl -n "$NAMESPACE" describe deploy/tuist-tuist-xcresult-processor || true
          for pod in $(kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/component=xcresult-processor -o name 2>/dev/null); do
            echo "--- describe $pod ---"
            kubectl -n "$NAMESPACE" describe "$pod" || true
            echo "--- logs $pod (current) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --tail=500 || true
            echo "--- logs $pod (previous) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --previous --tail=500 || true
          done
          echo "::endgroup::"
          echo "::group::runners-controller deployment + pods"
          kubectl -n "$NAMESPACE" describe deploy/tuist-tuist-runners-controller 2>&1 || true
          for pod in $(kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/component=runners-controller -o name 2>/dev/null); do
            echo "--- describe $pod ---"
            kubectl -n "$NAMESPACE" describe "$pod" || true
            echo "--- logs $pod (current) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --tail=500 || true
            echo "--- logs $pod (previous) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --previous --tail=500 || true
          done
          echo "::endgroup::"
          echo "::group::CAPI provider deployment + pods"
          kubectl -n "$NAMESPACE" describe deploy/tuist-tuist-capi-scaleway-applesilicon 2>&1 || true
          for pod in $(kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/component=capi-provider-scaleway-applesilicon -o name 2>/dev/null); do
            echo "--- describe $pod ---"
            kubectl -n "$NAMESPACE" describe "$pod" || true
            echo "--- logs $pod (current) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --tail=300 || true
          done
          echo "::endgroup::"
          echo "::group::Scaleway Apple Silicon CRs (Machine adoption state)"
          kubectl -n "$NAMESPACE" get scalewayapplesiliconmachines -o wide 2>&1 || true
          kubectl -n "$NAMESPACE" get scalewayapplesiliconmachinetemplates -o wide 2>&1 || true
          kubectl -n "$NAMESPACE" get machinedeployments.cluster.x-k8s.io -o wide 2>&1 || true
          kubectl -n "$NAMESPACE" get machines.cluster.x-k8s.io -o wide 2>&1 || true
          echo "::endgroup::"
          echo "::group::macOS fleet nodes"
          kubectl get nodes -l kubernetes.io/os=darwin,tuist.dev/runtime=tart -o wide || true
          for node in $(kubectl get nodes -l kubernetes.io/os=darwin,tuist.dev/runtime=tart -o name 2>/dev/null); do
            echo "--- describe $node ---"
            kubectl describe "$node" || true
          done
          echo "::endgroup::"
          echo "::group::external secrets"
          kubectl -n "$NAMESPACE" get externalsecret,secretstore 2>&1 || true
          kubectl -n "$NAMESPACE" describe externalsecret 2>&1 || true
          echo "::endgroup::"
      - name: Post-deploy smoke test
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/tuist-tuist-server --timeout=10m
          kubectl -n "$NAMESPACE" run smoke-$RANDOM --rm -i --restart=Never --image=curlimages/curl \
            --command -- curl -fsS "http://tuist-tuist-server/ready"
