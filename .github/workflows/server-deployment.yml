name: Server Deployment

# Build + deploy the Tuist server to a single Kubernetes environment.
#
# This workflow is the "building block": build → push image → helm
# upgrade. It runs against exactly one environment per invocation, with no
# cascade and no acceptance tests. Use it for:
#   - Ad-hoc staging / canary / production deploys via workflow_dispatch
#     (e.g. re-running a specific SHA on one env).
#   - As a workflow_call target from server-production-deployment.yml,
#     which chains canary → acceptance tests → production on push-to-main.
#
# Image architecture: a single env-agnostic image is built per commit
# (MIX_ENV=prod always). The runtime picks canary/staging/production
# behavior via the TUIST_DEPLOY_ENV env var set by the Helm overlay, and the
# MASTER_KEY ESO secret decrypts the matching priv/secrets/<env>.yml.enc
# file baked into the image. This means the same `sha-<SHA>` image is
# promoted across environments - one build, N deploys.
#
# Environment → cluster wiring is by convention: namespace = `tuist-<env>`
# (except production = `tuist`), values overlay = `values-managed-<env>.yaml`,
# public host = `<env>.tuist.dev` (except production = `tuist.dev`). Adding a
# new environment is just adding the matching values files.
#
# Required GitHub Environment secrets (per environment):
#   KUBECONFIG - base64-encoded kubeconfig for that environment's cluster.
# App secrets live inside the cluster (MASTER_KEY via ESO, DATABASE_URL /
# ClickHouse / Tigris keys in priv/secrets/<env>.yml.enc baked into the
# image).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - canary
          - production
      commit_sha:
        description: Commit SHA to deploy (defaults to the event's SHA)
        required: false
      image_tag:
        description: Pre-built image tag to deploy instead of building
        required: false
      macos_fleet_image_tag:
        description: >-
          CAPI operator (capi-provider-scaleway-applesilicon) image tag.
          Leave blank to auto-resolve to the latest successful build of
          the operator image on main.
        required: false
  workflow_call:
    inputs:
      environment:
        description: Target environment (staging | canary | production)
        required: true
        type: string
      commit_sha:
        description: Commit SHA to deploy (defaults to github.sha)
        required: false
        type: string
      image_tag:
        description: >-
          Pre-built image tag to deploy. When set, the build job is
          skipped and the deploy job uses this tag directly. When unset,
          the workflow builds + pushes an image tagged sha-<commit_sha>.
        required: false
        type: string
      macos_fleet_image_tag:
        description: >-
          CAPI operator image tag (capi-provider-scaleway-applesilicon).
          Leave blank to auto-resolve to the latest successful build on
          main. The operator image rides its own build pipeline
          (capi-provider-scaleway-applesilicon-image.yml) rather than
          the per-commit server build, so it has its own tag input.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  # actions:read lets the deploy job's gh-api lookup find the latest
  # successful run of capi-provider-scaleway-applesilicon-image.yml
  # to pin macosFleet.image.tag at upgrade time.
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist
  HELM_CHART_PATH: infra/helm/tuist
  HELM_RELEASE_NAME: tuist
  OBSERVABILITY_CHART_PATH: infra/helm/k8s-monitoring
  OBSERVABILITY_RELEASE_NAME: k8s-monitoring
  OBSERVABILITY_NAMESPACE: observability
  DEPLOY_SHA: ${{ inputs.commit_sha || github.sha }}

jobs:
  build:
    name: Build + push
    if: inputs.image_tag == ''
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 40
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          submodules: false
      - id: tag
        run: echo "image_tag=sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=${{ env.DEPLOY_SHA }}

  observability-install:
    # Installs / upgrades the grafana/k8s-monitoring wrapper chart ahead of
    # the server rollout so the Alloy OTLP receiver is ready before the
    # server starts pushing spans to it. Idempotent: on every run it's a
    # no-op if Chart.lock + values haven't changed.
    #
    # Shares the `server-deploy-<env>` concurrency lane with the deploy
    # job on purpose: the server's OTLP endpoint and the chart that
    # provides the receiver change in lockstep, so a newer chart install
    # must never interleave with an older server rollout.
    name: Observability chart (${{ inputs.environment }})
    needs: build
    # `build` is skipped when image_tag is supplied - keep running.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-${{ inputs.environment }}
    concurrency:
      group: server-deploy-${{ inputs.environment }}
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: helm dependency update
        run: helm dependency update "$OBSERVABILITY_CHART_PATH"
      - name: helm upgrade --install k8s-monitoring
        run: |
          helm upgrade --install "$OBSERVABILITY_RELEASE_NAME" "$OBSERVABILITY_CHART_PATH" \
            --namespace "$OBSERVABILITY_NAMESPACE" --create-namespace \
            -f "$OBSERVABILITY_CHART_PATH/values-${{ inputs.environment }}.yaml" \
            --timeout 10m --wait

  deploy:
    name: Deploy to ${{ inputs.environment == 'production' && 'tuist' || format('tuist-{0}', inputs.environment) }}
    needs: [build, observability-install]
    # `build` may be skipped when image_tag is passed in - keep running.
    # `observability-install` always runs, so it must be a plain success.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && needs.observability-install.result == 'success'
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-${{ inputs.environment }}
      url: https://${{ inputs.environment == 'production' && 'tuist.dev' || format('{0}.tuist.dev', inputs.environment) }}
    # Serialize deploys targeting the same environment so two concurrent
    # runs don't race on the Helm release.
    concurrency:
      group: server-deploy-${{ inputs.environment }}
      cancel-in-progress: false
    timeout-minutes: 75
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      NAMESPACE: ${{ inputs.environment == 'production' && 'tuist' || format('tuist-{0}', inputs.environment) }}
      IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || needs.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: kubectl apply CRDs
        # Helm 3 installs `crds/*.yaml` on `helm install` and skips
        # them on `helm upgrade` (intentional — Helm refuses to manage
        # CRD lifecycle to avoid data loss on schema regressions). The
        # deploy workflow re-applies them every run so chart-managed
        # schema changes ship the same way code changes do; no
        # operator-side manual step.
        run: kubectl apply -f "$HELM_CHART_PATH/crds/"
      - name: Recover interrupted Helm release
        run: |
          set -euo pipefail

          status="$(
            helm status "$HELM_RELEASE_NAME" -n "$NAMESPACE" 2>/dev/null |
              awk '/^STATUS:/ { print $2 }' ||
              true
          )"
          case "$status" in
            pending-install|pending-upgrade|pending-rollback)
              echo "Release $HELM_RELEASE_NAME is $status; rolling back to the last deployed revision before upgrading."
              helm history "$HELM_RELEASE_NAME" -n "$NAMESPACE" --max 20

              deployed_revision="$(
                helm history "$HELM_RELEASE_NAME" -n "$NAMESPACE" --max 20 |
                  awk '$0 ~ /[[:space:]]deployed[[:space:]]/ { revision = $1 } END { print revision }'
              )"

              if [ -z "$deployed_revision" ]; then
                echo "No deployed revision found for $HELM_RELEASE_NAME in $NAMESPACE."
                exit 1
              fi

              helm rollback "$HELM_RELEASE_NAME" "$deployed_revision" \
                --namespace "$NAMESPACE" --wait --timeout 10m
              ;;
            *)
              echo "Release $HELM_RELEASE_NAME status is ${status:-not-installed}; no recovery needed."
              ;;
          esac
      - name: Clean up stale migration Jobs
        # The chart's pre-upgrade migration hook is named
        # `tuist-tuist-server-migrate` (stable across revisions). Any
        # `tuist-tuist-server-migrate-<n>` Jobs in the namespace are
        # orphans whose Pending pods would otherwise compete with the new
        # hook for scheduler attention; sweep them before invoking helm.
        run: |
          set -euo pipefail

          stale_jobs="$(
            kubectl -n "$NAMESPACE" get jobs \
              -l app.kubernetes.io/component=server-migration \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
              grep -E '-[0-9]+$' || true
          )"

          if [ -z "$stale_jobs" ]; then
            echo "No revision-suffixed migration Jobs to clean up."
            exit 0
          fi

          echo "Deleting stale migration Jobs:"
          echo "$stale_jobs"
          # `--ignore-not-found` covers a rare race where helm's hook gets
          # deleted between the list and delete calls. Cascade=foreground
          # so dependent pods (Pending or otherwise) go with the Job.
          echo "$stale_jobs" | xargs -r kubectl -n "$NAMESPACE" delete job \
            --ignore-not-found --cascade=foreground --timeout=2m
      - name: Resolve macosFleet image tag
        # The CAPI operator image is built by its own workflow on
        # main pushes that touch infra/cluster-api-provider-scaleway-
        # applesilicon (or the modules it embeds). When the deploy
        # caller didn't pin a tag explicitly, look up the SHA of the
        # most recent green build on main so the helm upgrade pins to
        # an immutable tag rather than the floating `:latest`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_FLEET_IMAGE_TAG_INPUT: ${{ inputs.macos_fleet_image_tag }}
        run: |
          set -euo pipefail
          if [ -n "${MACOS_FLEET_IMAGE_TAG_INPUT}" ]; then
            TAG="${MACOS_FLEET_IMAGE_TAG_INPUT}"
          else
            HEAD_SHA="$(
              gh api -H "Accept: application/vnd.github+json" \
                "repos/${{ github.repository }}/actions/workflows/capi-provider-scaleway-applesilicon-image.yml/runs?status=success&branch=main&per_page=1" \
                -q '.workflow_runs[0].head_sha'
            )"
            if [ -z "${HEAD_SHA}" ] || [ "${HEAD_SHA}" = "null" ]; then
              echo "No successful run found for capi-provider-scaleway-applesilicon-image.yml on main." >&2
              exit 1
            fi
            # The operator image build tags with the 8-char SHA prefix.
            TAG="${HEAD_SHA:0:8}"
          fi
          echo "MACOS_FLEET_IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "Resolved macosFleet image tag: ${TAG}"
      - name: helm upgrade --install
        # App secrets never pass through --set: the chart runs in
        # `server.managedSecrets: true` mode, which reads DATABASE_URL /
        # TUIST_CLICKHOUSE_URL / TUIST_S3_* from priv/secrets/<env>.yml.enc
        # baked into the image and pulls MASTER_KEY from 1Password via an
        # in-cluster ExternalSecret. Passing secrets through --set would
        # leak them into `helm get manifest`.
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$NAMESPACE" --create-namespace \
            -f "$HELM_CHART_PATH/values-managed-common.yaml" \
            -f "$HELM_CHART_PATH/values-managed-${{ inputs.environment }}.yaml" \
            --set server.image.tag="$IMAGE_TAG" \
            --set macosFleet.image.tag="$MACOS_FLEET_IMAGE_TAG" \
            --atomic --timeout 60m --wait
      - name: Diagnostics on failure
        # `--atomic` rolls back the release on timeout, so `helm history` and
        # most cluster state reflect the rolled-back revision rather than the
        # failure. Migration-job pods linger long enough for logs to be useful;
        # everything else is best-effort.
        if: failure()
        run: |
          set +e
          echo "::group::helm history"
          helm history "$HELM_RELEASE_NAME" -n "$NAMESPACE" --max 10 || true
          echo "::endgroup::"
          echo "::group::helm get manifest (last attempted revision)"
          helm get manifest "$HELM_RELEASE_NAME" -n "$NAMESPACE" 2>&1 | head -200 || true
          echo "::endgroup::"
          echo "::group::pods"
          kubectl -n "$NAMESPACE" get pods -o wide || true
          echo "::endgroup::"
          echo "::group::events (last 100, sorted)"
          kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp 2>&1 | tail -100 || true
          echo "::endgroup::"
          echo "::group::migration job"
          kubectl -n "$NAMESPACE" get jobs -l app.kubernetes.io/component=server-migration -o wide || true
          for job in $(kubectl -n "$NAMESPACE" get jobs -l app.kubernetes.io/component=server-migration -o name 2>/dev/null); do
            echo "--- describe $job ---"
            kubectl -n "$NAMESPACE" describe "$job" || true
            echo "--- logs $job ---"
            kubectl -n "$NAMESPACE" logs "$job" --all-containers --tail=500 || true
          done
          echo "::endgroup::"
          echo "::group::server deployment + pods"
          kubectl -n "$NAMESPACE" describe deploy/tuist-tuist-server || true
          for pod in $(kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/component=server -o name 2>/dev/null); do
            echo "--- describe $pod ---"
            kubectl -n "$NAMESPACE" describe "$pod" || true
            echo "--- logs $pod (current) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --tail=500 || true
            echo "--- logs $pod (previous) ---"
            kubectl -n "$NAMESPACE" logs "$pod" --all-containers --previous --tail=500 || true
          done
          echo "::endgroup::"
          echo "::group::external secrets"
          kubectl -n "$NAMESPACE" get externalsecret,secretstore 2>&1 || true
          kubectl -n "$NAMESPACE" describe externalsecret 2>&1 || true
          echo "::endgroup::"
      - name: Post-deploy smoke test
        run: |
          kubectl -n "$NAMESPACE" rollout status deploy/tuist-tuist-server --timeout=10m
          kubectl -n "$NAMESPACE" run smoke-$RANDOM --rm -i --restart=Never --image=curlimages/curl \
            --command -- curl -fsS "http://tuist-tuist-server/ready"
