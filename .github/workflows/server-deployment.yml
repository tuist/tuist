name: Server Deployment

# Build + deploy the Tuist server to a Kubernetes environment.
#
# Triggers:
#   push to main        — canary → acceptance tests → production cascade.
#                         Commits whose subject contains "(hotfix)" bypass
#                         the cascade and fast-path to production; canary
#                         + tests still run as a safety net.
#   workflow_dispatch   — staging / canary → deploy the chosen environment
#                         directly. production → run the full cascade
#                         against the pinned SHA.
#
# Each environment is its own Kubernetes namespace. The image is rebuilt
# per environment so Mix.env() and the encrypted priv/secrets/<env>.yml.enc
# baked in match.
#
# Required GitHub Environment secrets (per environment):
#   KUBECONFIG — base64-encoded kubeconfig for that environment's cluster.
# App secrets live inside the cluster (MASTER_KEY via ESO, DATABASE_URL /
# ClickHouse / Tigris keys in priv/secrets/<env>.yml.enc baked into the
# image).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - canary
          - production
      commit_sha:
        description: Commit SHA to deploy (defaults to the event's SHA)
        required: false
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - processor/**
      - xcode_processor/**
      - infra/helm/tuist/**
      - .github/workflows/server-deployment.yml
      - server/pnpm-lock.yaml

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist
  HELM_CHART_PATH: infra/helm/tuist
  HELM_RELEASE_NAME: tuist
  DEPLOY_SHA: ${{ inputs.commit_sha || github.sha }}

jobs:
  # ============================================================================
  # Direct dispatch: staging or canary. No cascade, no tests, single deploy.
  # ============================================================================
  plan-direct:
    name: Plan (${{ inputs.environment }})
    if: github.event_name == 'workflow_dispatch' && inputs.environment != 'production'
    runs-on: namespace-profile-default
    outputs:
      mix_env: ${{ steps.map.outputs.mix_env }}
      namespace: ${{ steps.map.outputs.namespace }}
      image_tag: ${{ steps.map.outputs.image_tag }}
      values_overlay: ${{ steps.map.outputs.values_overlay }}
      public_host: ${{ steps.map.outputs.public_host }}
      environment_key: ${{ steps.map.outputs.environment_key }}
    steps:
      - id: map
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          case "$TARGET_ENV" in
            staging)
              env_key=staging; mix_env=stag; namespace=tuist-staging
              overlay=values-managed-staging.yaml; host=staging.tuist.dev ;;
            canary)
              env_key=canary; mix_env=can; namespace=tuist-canary
              overlay=values-managed-canary.yaml; host=canary.tuist.dev ;;
            *) echo "Unknown environment: $TARGET_ENV" >&2; exit 1 ;;
          esac
          {
            echo "environment_key=$env_key"
            echo "mix_env=$mix_env"
            echo "namespace=$namespace"
            echo "values_overlay=$overlay"
            echo "public_host=$host"
            echo "image_tag=${TARGET_ENV}-sha-${DEPLOY_SHA:0:12}"
          } >> "$GITHUB_OUTPUT"

  build-direct:
    name: Build + push (${{ inputs.environment }})
    needs: plan-direct
    if: github.event_name == 'workflow_dispatch' && inputs.environment != 'production'
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}", submodules: false }
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.plan-direct.outputs.image_tag }}
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=${{ needs.plan-direct.outputs.mix_env }}
            APT_CACHE_BUST=${{ env.DEPLOY_SHA }}
          cache-from: type=gha,scope=${{ needs.plan-direct.outputs.mix_env }}
          cache-to: type=gha,mode=max,scope=${{ needs.plan-direct.outputs.mix_env }}

  deploy-direct:
    name: Deploy to ${{ needs.plan-direct.outputs.namespace }}
    needs: [plan-direct, build-direct]
    if: github.event_name == 'workflow_dispatch' && inputs.environment != 'production'
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-${{ needs.plan-direct.outputs.environment_key }}
      url: https://${{ needs.plan-direct.outputs.public_host }}
    concurrency:
      group: server-deploy-${{ needs.plan-direct.outputs.environment_key }}
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}" }
      - uses: jdx/mise-action@v3.2.0
        with: { install_args: "helm kubectl", cache: "false" }
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: helm upgrade --install
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "${{ needs.plan-direct.outputs.namespace }}" --create-namespace \
            -f "$HELM_CHART_PATH/values-managed-common.yaml" \
            -f "$HELM_CHART_PATH/${{ needs.plan-direct.outputs.values_overlay }}" \
            --set server.image.tag="${{ needs.plan-direct.outputs.image_tag }}" \
            --atomic --timeout 15m --wait
      - name: Post-deploy smoke test
        run: |
          kubectl -n "${{ needs.plan-direct.outputs.namespace }}" rollout status deploy/tuist-tuist-server --timeout=10m
          kubectl -n "${{ needs.plan-direct.outputs.namespace }}" run smoke-$RANDOM --rm -i --restart=Never --image=curlimages/curl \
            --command -- curl -fsS "http://tuist-tuist-server/ready"

  # ============================================================================
  # Canary leg — runs for every push to main AND for production dispatches.
  # ============================================================================
  plan-canary:
    name: Plan (canary)
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default
    outputs:
      image_tag: ${{ steps.map.outputs.image_tag }}
    steps:
      - id: map
        run: echo "image_tag=canary-sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_OUTPUT"

  build-canary:
    name: Build + push (canary)
    needs: plan-canary
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}", submodules: false }
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.plan-canary.outputs.image_tag }}
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=can
            APT_CACHE_BUST=${{ env.DEPLOY_SHA }}
          cache-from: type=gha,scope=can
          cache-to: type=gha,mode=max,scope=can

  deploy-canary:
    name: Deploy to tuist-canary
    needs: [plan-canary, build-canary]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-canary
      url: https://canary.tuist.dev
    concurrency:
      group: server-deploy-canary
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}" }
      - uses: jdx/mise-action@v3.2.0
        with: { install_args: "helm kubectl", cache: "false" }
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: helm upgrade --install
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace tuist-canary --create-namespace \
            -f "$HELM_CHART_PATH/values-managed-common.yaml" \
            -f "$HELM_CHART_PATH/values-managed-canary.yaml" \
            --set server.image.tag="${{ needs.plan-canary.outputs.image_tag }}" \
            --atomic --timeout 15m --wait
      - name: Post-deploy smoke test
        run: |
          kubectl -n tuist-canary rollout status deploy/tuist-tuist-server --timeout=10m
          kubectl -n tuist-canary run smoke-$RANDOM --rm -i --restart=Never --image=curlimages/curl \
            --command -- curl -fsS "http://tuist-tuist-server/ready"

  # ============================================================================
  # Acceptance tests on canary — gates production rollout.
  # ============================================================================
  acceptance-tests:
    name: Acceptance Tests
    needs: deploy-canary
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default-macos
    timeout-minutes: 15
    environment: server-k8s-canary
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-cli-cache-ee-${{ hashFiles('Package.resolved') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Initialize TuistCacheEE submodule
        env:
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
        run: mise run cli:ee
      - name: Test
        env:
          TUIST_EE: 1
        run: tuist test TuistCacheEEAcceptanceTests --no-selective-testing -- -retry-tests-on-failure -test-iterations 2

  # ============================================================================
  # Production leg — runs after acceptance tests for push (non-hotfix) and for
  # production dispatches.
  # ============================================================================
  plan-production:
    name: Plan (production)
    needs: acceptance-tests
    if: >-
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '(hotfix)')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default
    outputs:
      image_tag: ${{ steps.map.outputs.image_tag }}
    steps:
      - id: map
        run: echo "image_tag=production-sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_OUTPUT"

  build-production:
    name: Build + push (production)
    needs: plan-production
    if: >-
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '(hotfix)')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}", submodules: false }
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.plan-production.outputs.image_tag }}
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=${{ env.DEPLOY_SHA }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

  deploy-production:
    name: Deploy to tuist (production)
    needs: [plan-production, build-production]
    if: >-
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '(hotfix)')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-production
      url: https://tuist.dev
    concurrency:
      group: server-deploy-production
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}" }
      - uses: jdx/mise-action@v3.2.0
        with: { install_args: "helm kubectl", cache: "false" }
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: helm upgrade --install
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace tuist --create-namespace \
            -f "$HELM_CHART_PATH/values-managed-common.yaml" \
            -f "$HELM_CHART_PATH/values-managed-production.yaml" \
            --set server.image.tag="${{ needs.plan-production.outputs.image_tag }}" \
            --atomic --timeout 15m --wait
      - name: Post-deploy smoke test
        run: |
          kubectl -n tuist rollout status deploy/tuist-tuist-server --timeout=10m
          kubectl -n tuist run smoke-$RANDOM --rm -i --restart=Never --image=curlimages/curl \
            --command -- curl -fsS "http://tuist-tuist-server/ready"

  # ============================================================================
  # Hotfix fast-path: push-to-main with "(hotfix)" in the subject ships
  # production directly, without waiting for canary/tests. The canary leg
  # still runs in parallel as a safety net.
  # ============================================================================
  plan-production-hotfix:
    name: Plan (production-hotfix)
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '(hotfix)')
    runs-on: namespace-profile-default
    outputs:
      image_tag: ${{ steps.map.outputs.image_tag }}
    steps:
      - id: map
        run: echo "image_tag=production-sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_OUTPUT"

  build-production-hotfix:
    name: Build + push (production-hotfix)
    needs: plan-production-hotfix
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '(hotfix)')
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}", submodules: false }
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.plan-production-hotfix.outputs.image_tag }}
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=${{ env.DEPLOY_SHA }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

  deploy-production-hotfix:
    name: Deploy to tuist (production-hotfix)
    needs: [plan-production-hotfix, build-production-hotfix]
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '(hotfix)')
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-production
      url: https://tuist.dev
    concurrency:
      group: server-deploy-production
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.DEPLOY_SHA }}" }
      - uses: jdx/mise-action@v3.2.0
        with: { install_args: "helm kubectl", cache: "false" }
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: helm upgrade --install
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace tuist --create-namespace \
            -f "$HELM_CHART_PATH/values-managed-common.yaml" \
            -f "$HELM_CHART_PATH/values-managed-production.yaml" \
            --set server.image.tag="${{ needs.plan-production-hotfix.outputs.image_tag }}" \
            --atomic --timeout 15m --wait
      - name: Post-deploy smoke test
        run: |
          kubectl -n tuist rollout status deploy/tuist-tuist-server --timeout=10m
          kubectl -n tuist run smoke-$RANDOM --rm -i --restart=Never --image=curlimages/curl \
            --command -- curl -fsS "http://tuist-tuist-server/ready"
