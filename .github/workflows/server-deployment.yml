name: Server Deployment

# Server image build + k8s deployment. Per-env build and deploy is factored
# into the reusable workflow .github/workflows/server-deploy-env.yml; this
# file wires up the trigger → environment mapping and the promotion cascade.
#
# Triggers:
#   push to main
#     Standard promotion: canary → acceptance tests → production.
#     Commits with "(hotfix)" in the subject additionally deploy straight to
#     production in parallel with the canary leg, skipping the wait for
#     tests so urgent fixes ship immediately. Canary + tests still run as a
#     safety net.
#
#   workflow_dispatch
#     staging / canary → deploy that environment directly.
#     production       → run the full canary → tests → production cascade
#                        against the chosen commit, mirroring a push-to-main
#                        promotion but pinned to the SHA you pass in.
#
# Each environment is its own k8s namespace. The image is rebuilt per env so
# Mix.env() and priv/secrets/<env>.yml.enc baked in match.

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy (defaults to the event's SHA)
        required: false
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - canary
          - production
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - processor/**
      - xcode_processor/**
      - infra/helm/tuist/**
      - .github/workflows/server-deployment.yml
      - .github/workflows/server-deploy-env.yml
      - server/pnpm-lock.yaml

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------
  # workflow_dispatch: staging / canary go direct, single env.
  # Production dispatch falls through to the cascade jobs below.
  # ---------------------------------------------------------------
  staging:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    uses: ./.github/workflows/server-deploy-env.yml
    with:
      target_env: staging
      commit_sha: ${{ inputs.commit_sha || github.sha }}
    secrets: inherit

  canary-dispatch:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'canary'
    uses: ./.github/workflows/server-deploy-env.yml
    with:
      target_env: canary
      commit_sha: ${{ inputs.commit_sha || github.sha }}
    secrets: inherit

  # ---------------------------------------------------------------
  # Promotion cascade: canary → acceptance tests → production.
  # Runs on every push to main and on workflow_dispatch targeting
  # production. On hotfix pushes canary/tests still run as a
  # safety net; the production-hotfix job below ships in parallel.
  # ---------------------------------------------------------------
  canary:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    uses: ./.github/workflows/server-deploy-env.yml
    with:
      target_env: canary
      commit_sha: ${{ inputs.commit_sha || github.sha }}
    secrets: inherit

  acceptance-tests:
    name: Acceptance Tests
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    needs: canary
    runs-on: namespace-profile-default-macos
    timeout-minutes: 15
    environment: server-k8s-canary
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}
          token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-cli-cache-ee-${{ hashFiles('Package.resolved') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Initialize TuistCacheEE submodule
        env:
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
        run: mise run cli:ee
      - name: Test
        env:
          TUIST_EE: 1
        run: tuist test TuistCacheEEAcceptanceTests --no-selective-testing -- -retry-tests-on-failure -test-iterations 2

  production:
    if: >-
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '(hotfix)')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    needs: acceptance-tests
    uses: ./.github/workflows/server-deploy-env.yml
    with:
      target_env: production
      commit_sha: ${{ inputs.commit_sha || github.sha }}
    secrets: inherit

  # Hotfix fast-path: push with "(hotfix)" in the subject ships production
  # without waiting for canary + acceptance tests. Kept independent of the
  # cascade so a flaky acceptance test can't block an urgent fix.
  production-hotfix:
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '(hotfix)')
    uses: ./.github/workflows/server-deploy-env.yml
    with:
      target_env: production
      commit_sha: ${{ github.sha }}
    secrets: inherit
