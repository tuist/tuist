name: Xcode Processor

on:
  push:
    branches:
      - main
    paths:
      - xcode_processor/**
      - tuist_common/**
      - .github/workflows/xcode-processor.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - xcode_processor/**
      - tuist_common/**
      - .github/workflows/xcode-processor.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: xcode-processor-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  swift-build:
    name: Swift Build (XCResultNIF)
    runs-on: namespace-profile-default-macos
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: xcode_processor/native/xcresult_nif
    steps:
      - uses: actions/checkout@v4
      - name: Restore SwiftPM Cache
        uses: actions/cache@v4
        with:
          path: xcode_processor/native/xcresult_nif/.build
          key: xcresult-nif-swiftpm-${{ hashFiles('xcode_processor/native/xcresult_nif/Package.resolved') }}
      - name: Build
        run: swift build -c release --replace-scm-with-registry

  elixir-format:
    name: Format
    runs-on: namespace-profile-default
    timeout-minutes: 15
    defaults:
      run:
        working-directory: xcode_processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            xcode_processor/deps
            xcode_processor/_build
          key: xcode-processor-mix-${{ hashFiles('xcode_processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          version: ${{ vars.MISE_VERSION }}
          install_args: "erlang elixir"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: xcode_processor
      - name: Install dependencies
        run: mix deps.get
      - name: Check format
        run: mix format --check-formatted

  elixir-credo:
    name: Credo
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: xcode_processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            xcode_processor/deps
            xcode_processor/_build
          key: xcode-processor-mix-${{ hashFiles('xcode_processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          version: ${{ vars.MISE_VERSION }}
          install_args: "erlang elixir"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: xcode_processor
      - name: Install dependencies
        run: mix deps.get
      - name: Run Credo
        run: mix credo

  elixir-test:
    name: Elixir Tests
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: xcode_processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            xcode_processor/deps
            xcode_processor/_build
          key: xcode-processor-mix-${{ hashFiles('xcode_processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          version: ${{ vars.MISE_VERSION }}
          install_args: "erlang elixir"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: xcode_processor
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        run: mix test --warnings-as-errors

  elixir-compile-prod:
    name: Compile (prod)
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: xcode_processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            xcode_processor/deps
            xcode_processor/_build
          key: xcode-processor-mix-${{ hashFiles('xcode_processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          version: ${{ vars.MISE_VERSION }}
          install_args: "erlang elixir"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: xcode_processor
      - name: Install dependencies
        run: mix deps.get
      - name: Compile with MIX_ENV=prod
        run: MIX_ENV=prod mix compile --warnings-as-errors
