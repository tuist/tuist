name: CAPI Scaleway Apple Silicon Provider Image

on:
  push:
    branches: [main]
    paths:
      - infra/cluster-api-provider-scaleway-applesilicon/**
      - infra/macos-host-bootstrap/**
      - infra/tart-kubelet/**
      - .github/workflows/capi-provider-scaleway-applesilicon-image.yml
  pull_request:
    paths:
      - infra/cluster-api-provider-scaleway-applesilicon/**
      - infra/macos-host-bootstrap/**
      - infra/tart-kubelet/**
      - .github/workflows/capi-provider-scaleway-applesilicon-image.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/capi-provider-scaleway-applesilicon

jobs:
  test:
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/cluster-api-provider-scaleway-applesilicon/go.mod
          cache-dependency-path: infra/cluster-api-provider-scaleway-applesilicon/go.sum
      - name: Test (provider)
        working-directory: infra/cluster-api-provider-scaleway-applesilicon
        run: go test ./...
      - name: Vet (provider)
        working-directory: infra/cluster-api-provider-scaleway-applesilicon
        run: go vet ./...

  test-macos-host-bootstrap:
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/macos-host-bootstrap/go.mod
          cache-dependency-path: infra/macos-host-bootstrap/go.sum
      - name: Test (macos-host-bootstrap)
        working-directory: infra/macos-host-bootstrap
        run: go test ./...
      - name: Vet (macos-host-bootstrap)
        working-directory: infra/macos-host-bootstrap
        run: go vet ./...

  test-tart-kubelet:
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/tart-kubelet/go.mod
          cache-dependency-path: infra/tart-kubelet/go.sum
      - name: Test (tart-kubelet)
        working-directory: infra/tart-kubelet
        run: go test ./...
      - name: Vet (tart-kubelet)
        working-directory: infra/tart-kubelet
        run: go vet ./...

  build:
    needs: [test, test-macos-host-bootstrap, test-tart-kubelet]
    if: github.event_name != 'pull_request'
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          GIT_SHA="${GITHUB_SHA::8}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GIT_SHA},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/cluster-api-provider-scaleway-applesilicon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=capi-scaleway-applesilicon
          cache-to: type=gha,mode=max,scope=capi-scaleway-applesilicon
