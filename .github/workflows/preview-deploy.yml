name: Preview Deploy
run-name: "Preview ${{ inputs.action || github.event.action || 'deploy' }} ${{ inputs.slug || inputs.pr_number || inputs.commit_sha || github.event.pull_request.number || github.sha }}${{ inputs.preview_id && format(' #{0}', inputs.preview_id) || '' }}"

# Deploy / refresh / tear down an ephemeral preview environment. Single
# workflow behind every preview lifecycle in this repo — PR labels,
# manual dispatch, and Slack-driven dispatch from tuist-ops all land
# here. Every preview includes Kura (server + cache + embedded
# Postgres/ClickHouse/MinIO + KuraInstance + seeded test account), so
# PR-driven previews catch Kura regressions and the Slack/CI/local
# shapes don't diverge.
#
# Triggers:
#
#   pull_request: [labeled, synchronize, unlabeled, closed]
#     Auto-deploys when the `preview` label is added; re-deploys on
#     every push thereafter; tears down when the label is removed or
#     the PR is closed. Internal PRs only — fork PRs filtered at the
#     `resolve` job because they can't access deploy secrets.
#
#   workflow_dispatch:
#     Manual run for a PR/commit, or Slack dispatch from tuist-ops.
#     Inputs:
#       action          deploy | delete (default deploy)
#       slug            DNS-safe slug (Slack flow). For PR/SHA flow we
#                       derive from pr_number or commit_sha.
#       pr_number       PR to deploy (mutually exclusive with commit_sha)
#       commit_sha      Specific commit to deploy
#       ttl_hours       Auto-delete after N hours (max 168)
#       requester_*     Audit metadata (Slack flow)
#       reason          Audit reason (Slack flow)
#       preview_id      tuist-ops preview row id (Slack flow)
#
# Naming convention:
#   pr_number=1234   → slug=pr-1234, release=pr-1234,
#                      namespace=preview-pr-1234,
#                      host=pr-1234.preview.tuist.dev
#   commit_sha=abc…  → slug=sha-abc1234, release=sha-abc1234,
#                      host=sha-abc1234.preview.tuist.dev
#   slack            → slug=<requested>, release=ondemand-<slug>,
#                      namespace=preview-ondemand-<slug>,
#                      host=<slug>.preview.tuist.dev
#
# Scope: this workflow owns only per-preview state. The cluster-wide platform
# chart and the single Kura controller are reconciled by
# preview-platform-reconcile.yml, so a server-only PR never upgrades
# cert-manager and two concurrent previews never race on a shared Helm release.
# The deploy fails fast if that reconcile has never run against the cluster.
#
# Kura: each preview gets its own KuraInstance, rendered by the chart
# (infra/helm/tuist/templates/kura-instance.yaml) into the cluster-wide `kura`
# namespace that the controller watches. Helm owns it, so `helm upgrade`
# patches it and `helm uninstall` reaps it. Previews run the controller from
# `main`; only the Kura *runtime* is built per PR, when the ref touches
# `kura/**`. Otherwise the runtime resolves to the latest `kura@` release
# reachable from the trusted platform ref.
#
# That resolution is checked against GHCR before being pinned, because a
# reachable release tag is not necessarily a pushed image. When the newest
# candidate has no image the deploy walks back and says so; when none do, it
# fails fast instead of ImagePullBackOff-ing behind the `--atomic` timeout.
#
# Required GitHub Environment secret (server-k8s-preview):
#   KUBECONFIG  - base64 kubeconfig for the preview workload cluster.

on:
  workflow_dispatch:
    inputs:
      action:
        description: deploy or delete
        required: false
        default: deploy
        type: choice
        options:
          - deploy
          - delete
      slug:
        description: DNS-safe slug (Slack flow); empty for PR/SHA flow
        required: false
      pr_number:
        description: PR number to deploy
        required: false
      commit_sha:
        description: Commit SHA to deploy
        required: false
      platform_ref:
        description: Optional Git ref for the cluster-wide platform chart
        required: false
      ttl_hours:
        description: Auto-delete after N hours (1-168)
        required: false
        default: "24"
      requester_email:
        description: Requester email (Slack flow)
        required: false
      requester_slack_id:
        description: Requester Slack id (Slack flow)
        required: false
      reason:
        description: Audit reason (Slack flow)
        required: false
      preview_id:
        description: tuist-ops preview row id (Slack flow)
        required: false
  pull_request:
    types: [labeled, synchronize, unlabeled, closed]

permissions:
  contents: read
  packages: write
  pull-requests: write
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist
  REGISTRY_IMAGE_NAME: tuist/registry
  KURA_RUNTIME_IMAGE_NAME: tuist/kura
  HELM_CHART_PATH: infra/helm/tuist
  PREVIEW_BASE_DOMAIN: preview.tuist.dev

jobs:
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    # Skip pull_request events that aren't preview-label changes and
    # aren't synchronize/close on an already-labeled PR. Also skip
    # fork PRs (secrets don't propagate). workflow_dispatch always
    # passes through.
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.full_name == github.repository
        && (
          (github.event.action == 'labeled'   && github.event.label.name == 'preview') ||
          (github.event.action == 'unlabeled' && github.event.label.name == 'preview') ||
          (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'preview')) ||
          (github.event.action == 'closed'      && contains(github.event.pull_request.labels.*.name, 'preview'))
        )
      )
    outputs:
      action: ${{ steps.r.outputs.action }}
      source: ${{ steps.r.outputs.source }}
      slug: ${{ steps.r.outputs.slug }}
      release: ${{ steps.r.outputs.release }}
      namespace: ${{ steps.r.outputs.namespace }}
      host: ${{ steps.r.outputs.host }}
      ref: ${{ steps.r.outputs.ref }}
      platform_ref: ${{ steps.r.outputs.platform_ref }}
      short_sha: ${{ steps.r.outputs.short_sha }}
      ttl_hours: ${{ steps.r.outputs.ttl_hours }}
      expires_at: ${{ steps.r.outputs.expires_at }}
      pr_number: ${{ steps.r.outputs.pr_number }}
    steps:
      - id: r
        env:
          EVENT: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DISPATCH_ACTION: ${{ inputs.action }}
          DISPATCH_SLUG: ${{ inputs.slug }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          DISPATCH_SHA: ${{ inputs.commit_sha }}
          DISPATCH_PLATFORM_REF: ${{ inputs.platform_ref }}
          DISPATCH_TTL: ${{ inputs.ttl_hours }}
          REQUESTER_EMAIL: ${{ inputs.requester_email }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "$EVENT" = "workflow_dispatch" ]; then
            # Slack flow uses a slug; manual PR/SHA flow doesn't. Source is
            # `slack` when a requester email is present (tuist-ops always
            # provides one), `manual` otherwise.
            if [ -n "$REQUESTER_EMAIL" ]; then
              SOURCE=slack
            else
              SOURCE=manual
            fi
            ACTION="$DISPATCH_ACTION"
            TTL_HOURS="$DISPATCH_TTL"

            if [ "$ACTION" = "deploy" ]; then
              if [ -n "$DISPATCH_PR" ] && [ -n "$DISPATCH_SHA" ]; then
                echo "::error::Provide pr_number OR commit_sha, not both."; exit 1
              fi
              if [ -n "$DISPATCH_PR" ] && ! [[ "$DISPATCH_PR" =~ ^[0-9]+$ ]]; then
                echo "::error::pr_number must be a positive integer."; exit 1
              fi
              if [ -n "$DISPATCH_SHA" ] && ! [[ "$DISPATCH_SHA" =~ ^[0-9a-f]{7,40}$ ]]; then
                echo "::error::commit_sha must be 7-40 lowercase hex chars."; exit 1
              fi
              if ! [[ "$TTL_HOURS" =~ ^[0-9]+$ ]] || [ "$TTL_HOURS" -lt 1 ] || [ "$TTL_HOURS" -gt 168 ]; then
                echo "::error::ttl_hours must be an integer between 1 and 168."; exit 1
              fi

              if [ -n "$DISPATCH_PR" ]; then
                REF=$(gh pr view "$DISPATCH_PR" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
                PR_OUT="$DISPATCH_PR"
              elif [ -n "$DISPATCH_SHA" ]; then
                REF="$DISPATCH_SHA"
                PR_OUT=""
              else
                REF="${{ github.sha }}"
                PR_OUT=""
              fi
            else
              REF=""
              PR_OUT=""
              TTL_HOURS="${TTL_HOURS:-1}"
            fi

            # Slug + release/namespace shapes. Slack supplies a slug;
            # PR/SHA derives from the ref.
            if [ -n "$DISPATCH_SLUG" ]; then
              SLUG="$(echo "$DISPATCH_SLUG" | tr '[:upper:]' '[:lower:]')"
              if ! [[ "$SLUG" =~ ^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$ ]]; then
                echo "::error::slug must be 1-40 chars [a-z0-9-], alphanumeric ends."; exit 1
              fi
              RELEASE="ondemand-${SLUG}"
              NAMESPACE="preview-ondemand-${SLUG}"
            elif [ -n "$DISPATCH_PR" ]; then
              SLUG="pr-${DISPATCH_PR}"
              RELEASE="$SLUG"
              NAMESPACE="preview-${SLUG}"
            elif [ -n "$DISPATCH_SHA" ]; then
              SLUG="sha-${DISPATCH_SHA:0:7}"
              RELEASE="$SLUG"
              NAMESPACE="preview-${SLUG}"
            else
              echo "::error::Provide slug OR pr_number OR commit_sha."; exit 1
            fi
          else
            # pull_request — auto-deploy on label/sync, teardown on
            # unlabel/close. TTL defaults to a long horizon; teardown is
            # label-driven, sweep is the backstop.
            SOURCE=github-pr
            case "$EVENT_ACTION" in
              labeled|synchronize) ACTION=deploy ;;
              unlabeled|closed)    ACTION=delete ;;
              *) echo "::error::unhandled pull_request action $EVENT_ACTION"; exit 1 ;;
            esac
            TTL_HOURS=168
            REF="$EVENT_HEAD_SHA"
            SLUG="pr-${EVENT_PR}"
            RELEASE="$SLUG"
            NAMESPACE="preview-${SLUG}"
            PR_OUT="$EVENT_PR"
          fi

          HOST="${SLUG}.${PREVIEW_BASE_DOMAIN}"
          SHORT_SHA="${REF:0:12}"
          EXPIRES_AT=$(( $(date +%s) + TTL_HOURS * 3600 ))
          if [ "$EVENT" = "pull_request" ]; then
            PLATFORM_REF="$EVENT_BASE_SHA"
          else
            PLATFORM_REF="$DEFAULT_BRANCH"
          fi
          if [ -n "${DISPATCH_PLATFORM_REF:-}" ]; then
            if [[ "$DISPATCH_PLATFORM_REF" =~ [[:space:]] ]]; then
              echo "::error::platform_ref must not contain whitespace."; exit 1
            fi
            PLATFORM_REF="$DISPATCH_PLATFORM_REF"
          fi

          {
            echo "action=$ACTION"
            echo "source=$SOURCE"
            echo "slug=$SLUG"
            echo "release=$RELEASE"
            echo "namespace=$NAMESPACE"
            echo "host=$HOST"
            echo "ref=$REF"
            echo "platform_ref=$PLATFORM_REF"
            echo "short_sha=$SHORT_SHA"
            echo "ttl_hours=$TTL_HOURS"
            echo "expires_at=$EXPIRES_AT"
            echo "pr_number=$PR_OUT"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Preview $ACTION"
            echo "- Source: \`$SOURCE\`"
            echo "- Release: \`$RELEASE\`"
            echo "- Namespace: \`$NAMESPACE\`"
            echo "- Host: https://$HOST"
            if [ "$ACTION" = "deploy" ]; then
              echo "- Ref: \`$REF\`"
              echo "- Platform ref: \`$PLATFORM_REF\`"
              echo "- Expires: $(date -u -d "@$EXPIRES_AT" '+%Y-%m-%d %H:%M UTC')"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Detect whether the deploying ref touches Kura paths. Fresh images are
  # built only for the affected component; deploy resolves immutable images
  # from the trusted platform ref for everything else.
  paths-changed:
    name: Detect Kura path changes
    needs: resolve
    if: needs.resolve.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    outputs:
      kura_runtime: ${{ steps.f.outputs.kura_runtime }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0
      - id: f
        env:
          REF: ${{ needs.resolve.outputs.ref }}
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE" ]; then
            BASE="$(git merge-base origin/main "$REF" 2>/dev/null || true)"
          fi
          if [ -z "$BASE" ]; then
            # No base: build the Kura runtime so the preview validates the SHA.
            echo "kura_runtime=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE" "$REF" || true)"
          echo "$CHANGED" | grep -qE '^kura/' \
            && echo "kura_runtime=true" >> "$GITHUB_OUTPUT" \
            || echo "kura_runtime=false" >> "$GITHUB_OUTPUT"

  build-server:
    name: Build server image
    needs: resolve
    if: needs.resolve.outputs.action == 'deploy'
    runs-on: tuist-linux-large
    timeout-minutes: 40
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          submodules: false
      - id: tag
        run: echo "image_tag=sha-${{ needs.resolve.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
      - id: apt-bust
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=${{ steps.apt-bust.outputs.value }}

  build-registry:
    name: Build registry image
    needs: resolve
    if: needs.resolve.outputs.action == 'deploy'
    runs-on: tuist-linux
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          submodules: false
      - id: tag
        run: echo "image_tag=sha-${{ needs.resolve.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./registry/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          build-args: |
            MIX_ENV=prod

  build-kura-runtime:
    name: Build kura runtime image
    needs: [resolve, paths-changed]
    if: |
      needs.resolve.outputs.action == 'deploy'
      && needs.paths-changed.outputs.kura_runtime == 'true'
    runs-on: tuist-linux-large
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - id: tag
        run: echo "image_tag=sha-${{ needs.resolve.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./kura
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.KURA_RUNTIME_IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}

  start-deployment:
    name: Start GitHub Deployment
    needs: resolve
    if: needs.resolve.outputs.action == 'deploy' && needs.resolve.outputs.source == 'github-pr' && needs.resolve.outputs.pr_number != ''
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.create.outputs.deployment_id }}
    steps:
      - id: create
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ needs.resolve.outputs.ref }}
          RELEASE: ${{ needs.resolve.outputs.release }}
          PR: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -uo pipefail
          BODY=$(jq -nc \
            --arg ref "$REF" \
            --arg env "preview-$RELEASE" \
            --arg desc "Preview for PR #$PR" \
            '{ref: $ref,
              environment: $env,
              transient_environment: true,
              production_environment: false,
              auto_merge: false,
              required_contexts: [],
              description: $desc}')

          if DEPLOYMENT_ID=$(echo "$BODY" | gh api "repos/${{ github.repository }}/deployments" \
              --method POST --input - --jq .id 2>&1); then
            gh api "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" \
              --method POST \
              -f state=in_progress \
              -f description="Building + deploying" \
              -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >/dev/null \
              || echo "::warning::Could not set Deployment status to in_progress"
          else
            echo "::warning::Could not create GitHub Deployment: $DEPLOYMENT_ID"
            DEPLOYMENT_ID=""
          fi
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ needs.resolve.outputs.release }}
    needs: [resolve, paths-changed, build-server, build-registry, build-kura-runtime]
    if: |
      always()
      && needs.resolve.outputs.action == 'deploy'
      && needs.build-server.result == 'success'
      && needs.build-registry.result == 'success'
      && (needs.build-kura-runtime.result == 'success' || needs.build-kura-runtime.result == 'skipped')
    runs-on: tuist-linux
    environment:
      name: server-k8s-preview
      url: https://${{ needs.resolve.outputs.host }}
    concurrency:
      group: preview-deploy-${{ needs.resolve.outputs.release }}
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      KUBECONFIG: /tmp/tuist-preview-kubeconfig-${{ github.run_id }}-${{ github.run_attempt }}
      RELEASE: ${{ needs.resolve.outputs.release }}
      NAMESPACE: ${{ needs.resolve.outputs.namespace }}
      HOST: ${{ needs.resolve.outputs.host }}
      REGISTRY_HOST: registry-${{ needs.resolve.outputs.slug }}.preview.tuist.dev
      SLUG: ${{ needs.resolve.outputs.slug }}
      SOURCE: ${{ needs.resolve.outputs.source }}
      IMAGE_TAG: ${{ needs.build-server.outputs.image_tag }}
      REGISTRY_IMAGE_TAG: ${{ needs.build-registry.outputs.image_tag }}
      REGISTRY_GITHUB_TOKEN: ${{ github.token }}
      EXPIRES_AT: ${{ needs.resolve.outputs.expires_at }}
      KURA_RUNTIME_TAG: ${{ needs.build-kura-runtime.outputs.image_tag }}
      KURA_INSTANCE: ${{ needs.resolve.outputs.release }}-kura
      KURA_HOST: kura-${{ needs.resolve.outputs.slug }}.preview.tuist.dev
    steps:
      - name: Checkout platform source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.platform_ref }}
          fetch-depth: 0
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl jq"
          cache: "false"
      - name: Resolve immutable Kura runtime image tag
        if: env.KURA_RUNTIME_TAG == ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # A `kura@<semver>` tag reachable from the platform ref does not imply
          # a pushed image: `release-kura-docker` publishes `kura:<semver>` only
          # when a release is cut. Pinning a tag that was never pushed leaves the
          # pod in ImagePullBackOff until `--atomic` times out and rolls back,
          # ~20 min after the fact. Probe the registry instead and walk back to
          # the newest release that has an image, so the deploy either runs a
          # real image or fails immediately with an actionable error.
          # Only a 404 means "never pushed". Treating a 5xx or an auth failure
          # as absent would silently walk back and pin a stale runtime, so
          # anything other than 200/404 aborts the deploy.
          manifest_status() {
            local repository="$1" reference="$2" token
            token="$(
              curl -fsSL -u "${GITHUB_ACTOR}:${GITHUB_TOKEN}" \
                "https://ghcr.io/token?service=ghcr.io&scope=repository:${repository}:pull" \
                | jq -r '.token // empty'
            )" || { echo "000"; return; }
            [ -n "$token" ] || { echo "000"; return; }
            curl -s -o /dev/null -I -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${repository}/manifests/${reference}" \
              || echo "000"
          }

          # Echoes the first reference that has a published manifest, walking
          # the candidates newest-first. Empty output means none of them do; a
          # non-zero return means the registry could not be consulted at all.
          resolve_published_tag() {
            local repository="$1" reference status
            shift
            for reference in "$@"; do
              [ -n "$reference" ] || continue
              status="$(manifest_status "$repository" "$reference")"
              case "$status" in
                200)
                  printf '%s' "$reference"
                  return 0
                  ;;
                404)
                  echo "::notice::${repository}:${reference} is not in the registry; trying the preceding candidate." >&2
                  ;;
                *)
                  echo "::error::Registry lookup for ${repository}:${reference} failed with HTTP ${status}. Refusing to guess an older image." >&2
                  return 2
                  ;;
              esac
            done
            return 0
          }

          if [ -z "${KURA_RUNTIME_TAG:-}" ]; then
            runtime_candidates=()
            while IFS= read -r version; do
              [ -n "$version" ] || continue
              runtime_candidates+=("$version")
            done < <(
              git tag --merged HEAD --list 'kura@*' \
                | sed 's/^kura@//' \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -rV
            )
            KURA_RUNTIME_TAG="$(
              resolve_published_tag \
                "$KURA_RUNTIME_IMAGE_NAME" "${runtime_candidates[@]:-}"
            )"
          fi
          if [ -z "${KURA_RUNTIME_TAG:-}" ]; then
            echo "::error::No kura@<semver> release reachable from the platform ref has a published runtime image. Cut a Kura release, or dispatch the preview with a platform_ref that has one."
            exit 1
          fi

          echo "KURA_RUNTIME_TAG=$KURA_RUNTIME_TAG" >> "$GITHUB_ENV"
          echo "Using Kura runtime $KURA_RUNTIME_TAG"
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Re-apply preview node label
        # Node-scoped and idempotent, so it is safe from a per-preview job and
        # keeps a freshly joined worker schedulable without waiting for the
        # next platform reconcile. Cluster-wide *releases* are reconciled by
        # preview-platform-reconcile.yml, not here.
        run: |
          kubectl label nodes -l '!node-role.kubernetes.io/control-plane' role=preview --overwrite
      - name: Verify preview platform
        # The platform chart and the cluster-wide Kura controller are owned by
        # preview-platform-reconcile.yml. Fail fast with something actionable
        # rather than letting `helm --atomic` time out on a KuraInstance no
        # controller will ever reconcile.
        run: |
          set -euo pipefail
          if ! kubectl -n platform get secret cloudflare-api-token >/dev/null 2>&1; then
            echo "::error::Missing platform/cloudflare-api-token in the preview cluster. Restore the cluster bootstrap secret before deploying previews."
            exit 1
          fi
          controllers="$(
            kubectl -n kura get deployment \
              -l app.kubernetes.io/component=kura-controller -o name 2>/dev/null | wc -l | tr -d ' '
          )"
          if [ "$controllers" -lt 1 ]; then
            echo "::error::No Kura controller in the preview cluster. Run the 'Preview Platform Reconcile' workflow (workflow_dispatch) before deploying previews."
            exit 1
          fi
      - name: Checkout preview source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0
      - name: Mark namespace as creating
        env:
          REQUESTER_EMAIL: ${{ inputs.requester_email }}
          REQUESTER_SLACK_ID: ${{ inputs.requester_slack_id }}
          REQUEST_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          NOW=$(date +%s)
          kubectl get namespace "$NAMESPACE" >/dev/null 2>&1 || kubectl create namespace "$NAMESPACE"
          kubectl label namespace "$NAMESPACE" \
            "tuist.dev/preview=true" \
            "tuist.dev/preview-source=$SOURCE" \
            "tuist.dev/slug=$SLUG" \
            "tuist.dev/release=$RELEASE" \
            "tuist.dev/state=creating" \
            --overwrite
          kubectl label namespace "$NAMESPACE" tuist.dev/expires-at- --ignore-not-found || true
          kubectl annotate namespace "$NAMESPACE" \
            "tuist.dev/host=https://$HOST" \
            "tuist.dev/created-at=$NOW" \
            --overwrite
          if [ -n "${REQUESTER_EMAIL:-}" ]; then
            kubectl annotate namespace "$NAMESPACE" "tuist.dev/owner-email=$REQUESTER_EMAIL" --overwrite
          fi
          if [ -n "${REQUESTER_SLACK_ID:-}" ]; then
            kubectl annotate namespace "$NAMESPACE" "tuist.dev/owner-slack-id=$REQUESTER_SLACK_ID" --overwrite
          fi
          if [ -n "${REQUEST_REASON:-}" ]; then
            kubectl annotate namespace "$NAMESPACE" "tuist.dev/reason=$REQUEST_REASON" --overwrite
          fi
      - name: Copy Kura introspection Secret into preview namespace
        run: |
          set -euo pipefail
          kubectl -n kura get secret kura-shared-secrets -o json \
            | jq 'del(.metadata.namespace, .metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.ownerReferences, .metadata.labels, .metadata.annotations)' \
            | kubectl -n "$NAMESPACE" apply -f -
      - name: Adopt a pre-existing KuraInstance into the Helm release
        # Transitional. Previews created before the KuraInstance moved into the
        # chart have a CR with no Helm ownership metadata, and `helm upgrade`
        # refuses to take over such a resource. Stamp the metadata so Helm
        # adopts it in place instead of erroring. Remove once no preview
        # predating that change is still alive (max TTL is 168h).
        run: |
          set -euo pipefail
          if kubectl -n kura get kurainstance "$KURA_INSTANCE" >/dev/null 2>&1; then
            kubectl -n kura label kurainstance "$KURA_INSTANCE" \
              app.kubernetes.io/managed-by=Helm --overwrite
            kubectl -n kura annotate kurainstance "$KURA_INSTANCE" \
              "meta.helm.sh/release-name=$RELEASE" \
              "meta.helm.sh/release-namespace=$NAMESPACE" --overwrite
          fi
      - name: helm upgrade --install
        # The preview's KuraInstance is a chart resource (templates/kura-instance.yaml)
        # rendered into the cluster-wide `kura` namespace, so Helm owns its
        # lifecycle. Its static shape lives in values-preview-kura.yaml; only
        # the per-preview identity is set here.
        run: |
          set -euo pipefail
          helm upgrade --install "$RELEASE" "$HELM_CHART_PATH" \
            --namespace "$NAMESPACE" \
            -f "$HELM_CHART_PATH/values-preview.yaml" \
            -f "$HELM_CHART_PATH/values-preview-kura.yaml" \
            --set "server.image.tag=$IMAGE_TAG" \
            --set "registry.image.tag=$REGISTRY_IMAGE_TAG" \
            --set registry.ingress.enabled=true \
            --set "registry.ingress.host=$REGISTRY_HOST" \
            --set "registry.publicHost=$REGISTRY_HOST" \
            --set "registry.serverUrl=https://$HOST" \
            --set-string "swiftRegistrySync.inlineSecrets.githubToken=$REGISTRY_GITHUB_TOKEN" \
            --set server.ingress.enabled=true \
            --set "server.ingress.host=$HOST" \
            --set "server.appUrl=https://$HOST" \
            --set "kuraRuntime.image.tag=$KURA_RUNTIME_TAG" \
            --set "kuraRuntime.instance.name=$KURA_INSTANCE" \
            --set "kuraRuntime.instance.publicHost=$KURA_HOST" \
            --set-string "kuraRuntime.instance.labels.tuist\.dev/slug=$SLUG" \
            --set-string "kuraRuntime.instance.labels.tuist\.dev/preview-source=$SOURCE" \
            --set-file "kuraRuntime.instance.extensionScript=kura/ops/helm/kura/hooks/tuist.lua" \
            --set "server.kuraEndpointUrls[0]=https://$KURA_HOST" \
            --atomic --timeout 20m --wait
      - name: Finalize namespace labels
        run: |
          set -euo pipefail
          ARGS=("tuist.dev/state=ready" --overwrite)
          if [ -n "${EXPIRES_AT:-}" ]; then
            ARGS=("tuist.dev/expires-at=$EXPIRES_AT" "tuist.dev/state=ready" --overwrite)
          fi
          kubectl label namespace "$NAMESPACE" "${ARGS[@]}"
      - name: Wait for KuraInstance
        run: |
          set -euo pipefail
          kubectl -n kura wait --for=jsonpath='{.status.phase}'=Ready "kurainstance/${KURA_INSTANCE}" --timeout=10m
          for i in $(seq 1 60); do
            if curl -fsSL --max-time 5 "https://${KURA_HOST}/ready" >/dev/null; then
              echo "OK: https://${KURA_HOST}/ready returned 200"
              break
            fi
            echo "Attempt $i: https://${KURA_HOST}/ready not yet reachable; retrying in 10s..."
            sleep 10
            if [ "$i" = "60" ]; then
              echo "::error::https://${KURA_HOST}/ready never returned 200 after about 10 min."
              exit 1
            fi
          done
      - name: Smoke test
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout status deploy/${RELEASE}-tuist-server --timeout=10m
          kubectl -n "$NAMESPACE" rollout status deploy/${RELEASE}-tuist-registry --timeout=10m
          for i in $(seq 1 60); do
            if curl -fsSL --max-time 5 "https://${HOST}/ready" >/dev/null; then
              echo "OK: https://${HOST}/ready returned 200"
              break
            fi
            echo "Attempt $i: https://${HOST}/ready not yet reachable; retrying in 10s..."
            sleep 10
            if [ "$i" = "60" ]; then
              echo "::error::https://${HOST}/ready never returned 200 after about 10 min."
              exit 1
            fi
          done
          for i in $(seq 1 60); do
            if curl -fsSL --max-time 5 "https://${REGISTRY_HOST}/up" >/dev/null; then
              echo "OK: https://${REGISTRY_HOST}/up returned 200"
              break
            fi
            echo "Attempt $i: https://${REGISTRY_HOST}/up not yet reachable; retrying in 10s..."
            sleep 10
            if [ "$i" = "60" ]; then
              echo "::error::https://${REGISTRY_HOST}/up never returned 200 after about 10 min."
              exit 1
            fi
          done
      - name: Wait for Swift registry sync
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsSL --max-time 5 "https://${REGISTRY_HOST}/swift/alamofire/alamofire" >/dev/null; then
              echo "OK: https://${REGISTRY_HOST}/swift/alamofire/alamofire returned 200"
              break
            fi
            echo "Attempt $i: alamofire/alamofire not synced yet; retrying in 10s..."
            sleep 10
            if [ "$i" = "90" ]; then
              echo "::error::alamofire/alamofire metadata was not synced after about 15 min."
              exit 1
            fi
          done
      - name: Seed preview account
        env:
          PREVIEW_ACCOUNT_HANDLE: tuist
          PREVIEW_USER_EMAIL: tuistrocks@tuist.dev
          PREVIEW_USER_PASSWORD: tuistrocks
          PREVIEW_SEED_CONTENT: "1"
          SEED_BUILD_RUNS: "200"
          SEED_TEST_RUNS: "150"
          SEED_COMMAND_EVENTS: "800"
          SEED_PREVIEWS: "10"
          SEED_BUNDLES: "8"
          SEED_CAS_OPS_PER_BUILD: "5"
          SEED_FILES_PER_BUILD: "10"
          SEED_TARGETS_PER_BUILD: "10"
          SEED_XCODE_GRAPHS: "10"
          SEED_MODULES_PER_TEST: "2"
          SEED_SUITES_PER_MODULE: "2"
          SEED_CASES_PER_SUITE: "4"
          SEED_CH_BATCH_SIZE: "5000"
          KURA_ENDPOINT_URL: https://${{ env.KURA_HOST }}
          RELEASE_NAME: ${{ env.RELEASE }}
        run: |
          mise -C infra run preview:seed-account --namespace "$NAMESPACE"
      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          KURA_NAMESPACE=kura
          KURA_SELECTOR="app.kubernetes.io/name=kura,app.kubernetes.io/instance=${KURA_INSTANCE}"
          KURA_CONTROLLER_SELECTOR="app.kubernetes.io/component=kura-controller"

          echo "::group::KuraInstance status"
          kubectl -n "$KURA_NAMESPACE" get kurainstance "$KURA_INSTANCE" -o json \
            | jq '{
                metadata: (.metadata | {
                  name,
                  generation,
                  creationTimestamp,
                  deletionTimestamp,
                  finalizers
                }),
                desired: (.spec | {
                  image,
                  replicas,
                  publicHost,
                  ingressClassName,
                  storageClassName,
                  storageSize,
                  nodeSelector,
                  tolerations
                }),
                status
              }' || true
          echo "::endgroup::"

          echo "::group::Kura controller"
          kubectl -n "$KURA_NAMESPACE" get deployment,pod \
            -l "$KURA_CONTROLLER_SELECTOR" -o wide || true
          kubectl -n "$KURA_NAMESPACE" get deployment \
            -l "$KURA_CONTROLLER_SELECTOR" -o json \
            | jq '[.items[] | {
                metadata: (.metadata | {name, generation, creationTimestamp}),
                desired: {
                  replicas: .spec.replicas,
                  strategy: .spec.strategy,
                  containers: [
                    .spec.template.spec.containers[]
                    | {name, image, imagePullPolicy, resources, livenessProbe, readinessProbe}
                  ]
                },
                status
              }]' || true
          echo "::endgroup::"

          echo "::group::Kura workload resources"
          kubectl -n "$KURA_NAMESPACE" get \
            statefulset,pod,persistentvolumeclaim,service,ingress,certificates.cert-manager.io \
            -l "$KURA_SELECTOR" -o wide || true

          kubectl -n "$KURA_NAMESPACE" get statefulset \
            -l "$KURA_SELECTOR" -o json \
            | jq '[.items[] | {
                metadata: (.metadata | {name, generation, creationTimestamp}),
                desired: {
                  replicas: .spec.replicas,
                  serviceName: .spec.serviceName,
                  podManagementPolicy: .spec.podManagementPolicy,
                  updateStrategy: .spec.updateStrategy,
                  storage: [
                    .spec.volumeClaimTemplates[]
                    | {metadata: (.metadata | {name, labels}), spec}
                  ],
                  containers: [
                    .spec.template.spec.containers[]
                    | {name, image, imagePullPolicy, resources, livenessProbe, readinessProbe}
                  ]
                },
                status
              }]' || true

          kubectl -n "$KURA_NAMESPACE" get pod \
            -l "$KURA_SELECTOR" -o json \
            | jq '[.items[] | {
                metadata: (.metadata | {name, creationTimestamp, deletionTimestamp}),
                placement: {
                  nodeName: .spec.nodeName,
                  nodeSelector: .spec.nodeSelector,
                  tolerations: .spec.tolerations
                },
                status
              }]' || true

          for resource in \
            persistentvolumeclaim \
            service \
            ingress \
            certificates.cert-manager.io; do
            kubectl -n "$KURA_NAMESPACE" describe "$resource" \
              -l "$KURA_SELECTOR" || true
          done

          while IFS= read -r volume; do
            [ -n "$volume" ] || continue
            kubectl get persistentvolume "$volume" -o wide || true
            kubectl describe persistentvolume "$volume" || true
          done < <(
            kubectl -n "$KURA_NAMESPACE" get persistentvolumeclaim \
              -l "$KURA_SELECTOR" \
              -o jsonpath='{range .items[*]}{.spec.volumeName}{"\n"}{end}' \
              2>/dev/null
          )
          echo "::endgroup::"

          echo "::group::Kura events"
          kubectl -n "$KURA_NAMESPACE" get events -o json \
            | jq -r --arg instance "$KURA_INSTANCE" '
                [.items[]
                  | (.involvedObject.name // "") as $name
                  | select(
                      ($name | contains($instance))
                      or ($name | contains("kura-platform-tuist-kura-controller"))
                    )
                  | {
                      time: (
                        .eventTime
                        // .lastTimestamp
                        // .firstTimestamp
                        // .metadata.creationTimestamp
                      ),
                      type,
                      reason,
                      message,
                      count: (.series.count // .count),
                      kind: .involvedObject.kind,
                      name: .involvedObject.name
                    }
                ]
                | sort_by(.time)
                | (
                    ["TIME", "TYPE", "REASON", "OBJECT", "COUNT", "MESSAGE"],
                    (.[] | [
                      .time,
                      .type,
                      .reason,
                      (.kind + "/" + .name),
                      (.count // 1),
                      .message
                    ])
                  )
                | @tsv
              ' || true
          echo "::endgroup::"

          echo "::group::Kura image digests"
          echo "controller"
          kubectl -n "$KURA_NAMESPACE" get pods \
            -l "$KURA_CONTROLLER_SELECTOR" \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{range .status.containerStatuses[*]}  {.name}{" image="}{.image}{" imageID="}{.imageID}{" ready="}{.ready}{" restarts="}{.restartCount}{"\n"}{end}{end}' || true
          echo
          echo "runtime"
          kubectl -n "$KURA_NAMESPACE" get pods \
            -l "$KURA_SELECTOR" \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{range .status.containerStatuses[*]}  {.name}{" image="}{.image}{" imageID="}{.imageID}{" ready="}{.ready}{" restarts="}{.restartCount}{"\n"}{end}{end}' || true
          echo
          echo "::endgroup::"

          echo "::group::Kura controller logs"
          while IFS= read -r pod; do
            echo "--- $pod current ---"
            kubectl -n "$KURA_NAMESPACE" logs "$pod" -c manager \
              --since=30m --tail=500 --timestamps || true
            echo "--- $pod previous ---"
            kubectl -n "$KURA_NAMESPACE" logs "$pod" -c manager \
              --previous --tail=500 --timestamps || true
          done < <(
            kubectl -n "$KURA_NAMESPACE" get pods \
              -l "$KURA_CONTROLLER_SELECTOR" -o name 2>/dev/null
          )
          echo "::endgroup::"

          echo "::group::Kura runtime logs"
          while IFS= read -r pod; do
            echo "--- $pod current ---"
            kubectl -n "$KURA_NAMESPACE" logs "$pod" -c kura \
              --tail=500 --timestamps || true
            echo "--- $pod previous ---"
            kubectl -n "$KURA_NAMESPACE" logs "$pod" -c kura \
              --previous --tail=500 --timestamps || true
          done < <(
            kubectl -n "$KURA_NAMESPACE" get pods \
              -l "$KURA_SELECTOR" -o name 2>/dev/null
          )
          echo "::endgroup::"

          echo "::group::pods"
          kubectl -n "$NAMESPACE" get pods -o wide || true
          echo "::endgroup::"
          echo "::group::events"
          kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp | tail -50 || true
          echo "::endgroup::"
          for component in server registry swift-registry-sync; do
            echo "::group::$component pods"
            kubectl -n "$NAMESPACE" describe pods -l "app.kubernetes.io/component=$component" || true
            echo "::endgroup::"

            for pod in $(kubectl -n "$NAMESPACE" get pods -l "app.kubernetes.io/component=$component" -o name 2>/dev/null); do
              echo "::group::$pod logs"
              kubectl -n "$NAMESPACE" logs "$pod" --all-containers --tail=300 || true
              echo "::endgroup::"
            done
          done

  delete:
    name: Delete ${{ needs.resolve.outputs.release }}
    needs: resolve
    if: needs.resolve.outputs.action == 'delete'
    runs-on: tuist-linux
    environment:
      name: server-k8s-preview
    concurrency:
      group: preview-deploy-${{ needs.resolve.outputs.release }}
      cancel-in-progress: false
    timeout-minutes: 15
    env:
      KUBECONFIG: /tmp/tuist-preview-kubeconfig-${{ github.run_id }}-${{ github.run_attempt }}
      RELEASE: ${{ needs.resolve.outputs.release }}
      NAMESPACE: ${{ needs.resolve.outputs.namespace }}
    steps:
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Delete KuraInstance, helm uninstall, drop namespace
        # The KuraInstance lives in the `kura` namespace; deleting it first lets
        # the controller GC its StatefulSet/PVC/Service/Ingress (owner refs) and
        # synchronously waits out the finalizer. `helm uninstall` then clears the
        # release, and dropping the namespace removes everything preview-scoped.
        # Backstop: the KuraInstance is also owned by this namespace, so even if
        # the explicit delete fails, dropping the namespace garbage-collects it.
        run: |
          set -euo pipefail
          kubectl -n kura delete kurainstance "${RELEASE}-kura" --ignore-not-found --wait=true --timeout 5m || true
          if helm status "$RELEASE" --namespace "$NAMESPACE" >/dev/null 2>&1; then
            helm uninstall "$RELEASE" --namespace "$NAMESPACE" --wait --timeout 5m || true
          fi
          if kubectl get namespace "$NAMESPACE" >/dev/null 2>&1; then
            kubectl delete namespace "$NAMESPACE" --wait=true --timeout 5m || true
          fi

  finalize-deploy:
    name: Finalize deploy (PR surface)
    needs: [resolve, deploy, start-deployment]
    if: |
      always()
      && needs.resolve.outputs.action == 'deploy'
      && needs.resolve.outputs.source == 'github-pr'
      && needs.resolve.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mark GitHub Deployment success
        if: needs.deploy.result == 'success' && needs.start-deployment.outputs.deployment_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          HOST: ${{ needs.resolve.outputs.host }}
        run: |
          gh api "repos/${{ github.repository }}/deployments/${{ needs.start-deployment.outputs.deployment_id }}/statuses" \
            --method POST \
            -f state=success \
            -f environment_url="https://$HOST" \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -F auto_inactive=true \
            -f description="Preview live at https://$HOST" >/dev/null
      - name: Mark GitHub Deployment failure
        if: needs.deploy.result != 'success' && needs.start-deployment.outputs.deployment_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/deployments/${{ needs.start-deployment.outputs.deployment_id }}/statuses" \
            --method POST \
            -f state=failure \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="Preview deploy failed" >/dev/null
      - name: Comment on PR
        if: needs.deploy.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          RELEASE: ${{ needs.resolve.outputs.release }}
          HOST: ${{ needs.resolve.outputs.host }}
          REGISTRY_HOST: registry-${{ needs.resolve.outputs.slug }}.preview.tuist.dev
          EXPIRES_AT: ${{ needs.resolve.outputs.expires_at }}
        run: |
          set -euo pipefail
          MARKER="<!-- preview-deploy:${RELEASE} -->"
          BODY=$(cat <<EOF
          $MARKER
          🟢 Preview deployed: **https://$HOST**

          - Registry: \`https://$REGISTRY_HOST\`
          - Release: \`$RELEASE\`
          - Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')
          - Expires: $(date -u -d "@$EXPIRES_AT" '+%Y-%m-%d %H:%M UTC')

          Push to this PR to update the preview; remove the \`preview\` label or close the PR to tear it down.
          EOF
          )
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -f body="$BODY" >/dev/null
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" --body "$BODY"
          fi

  finalize-delete:
    name: Finalize teardown (PR surface)
    needs: [resolve, delete]
    if: |
      always()
      && needs.resolve.outputs.action == 'delete'
      && needs.resolve.outputs.source == 'github-pr'
      && needs.resolve.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mark GitHub Deployment inactive
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE: ${{ needs.resolve.outputs.release }}
        run: |
          set -euo pipefail
          ENV="preview-${RELEASE}"
          IDS=$(gh api "repos/${{ github.repository }}/deployments?environment=$ENV&per_page=20" \
            --jq '.[].id')
          for ID in $IDS; do
            gh api "repos/${{ github.repository }}/deployments/$ID/statuses" \
              --method POST \
              -f state=inactive \
              -f description="Preview torn down" >/dev/null || true
          done
      - name: Update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          RELEASE: ${{ needs.resolve.outputs.release }}
        run: |
          MARKER="<!-- preview-deploy:${RELEASE} -->"
          BODY="$MARKER"$'\n'"⚪ Preview torn down ($(date -u '+%Y-%m-%d %H:%M UTC')). Re-add the \`preview\` label to bring it back."
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -f body="$BODY" >/dev/null
          fi
