name: Runner Cache Volume Benchmark

# Staging perf benchmark for per-account cache volumes (spec #76).
# Manual only. Runs on the staging runners pool.
#
# Times `tuist generate tuist ProjectDescription --no-open` (the canonical
# manifest-heavy generate) inside a runner VM whose cache root is the
# mounted per-account volume. Run it twice back to back:
#   Run 1 lands on a cold/empty volume: manifests + ProjectDescription
#   helpers compile from scratch, and the volume is promoted with that
#   warmth on a clean exit.
#   Run 2 boots a fresh VM cloned from the promoted (warm) master: the
#   cached manifests + compiled helpers are already at their final paths,
#   so generate skips the compile phase — the manifest/helper/metadata
#   warmth win the spec measures (~49% faster pre-build on the fixture).
#
# The binaries-hit increment additionally needs the EE cache-signing grant
# (server secret + merged EE); without it binaries re-pull per VM while the
# manifest/helper warmth (unsigned) applies in full — the dominant win.

on:
  workflow_dispatch:
    inputs:
      tuist_ref:
        description: "tuist repo ref to generate (pinned for a fair A/B)"
        required: false
        default: "main"

permissions: {}

jobs:
  benchmark:
    runs-on: tuist-staging-macos
    timeout-minutes: 40
    steps:
      - name: Cache volume state (pre)
        run: |
          set -uo pipefail
          echo "TUIST_XDG_CACHE_HOME = ${TUIST_XDG_CACHE_HOME:-<unset>}"
          echo "TUIST_CACHE_MAX_BYTES = ${TUIST_CACHE_MAX_BYTES:-<unset>}"
          root="${TUIST_XDG_CACHE_HOME:-}"
          if [ -n "${root}" ]; then
            echo "=== cache subtree sizes BEFORE generate (warmth from prior runs) ==="
            du -sh "${root}/tuist/"* 2>/dev/null | sed 's/^/  /' || echo "  (empty volume — cold)"
          else
            echo "VOLUME NOT MOUNTED — this run is on the cold path."
          fi

      - name: Toolchain
        run: |
          set -euo pipefail
          if ! command -v mise >/dev/null 2>&1; then
            curl -fsSL https://mise.run | sh
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
            export PATH="${HOME}/.local/bin:${PATH}"
          fi
          mise --version

      - name: Clone tuist
        run: |
          set -euo pipefail
          rm -rf tuist-bench
          git clone --filter=blob:none "https://github.com/tuist/tuist" tuist-bench
          cd tuist-bench
          git checkout "${{ inputs.tuist_ref }}"
          git rev-parse HEAD

      - name: Install pinned tuist + resolve dependencies
        working-directory: tuist-bench
        run: |
          set -euo pipefail
          mise install
          # SPM/package resolution (not the benchmark focus; timed for context).
          /usr/bin/time -h mise exec -- tuist install 2>&1 | tail -5 || \
            mise exec -- tuist install

      - name: Benchmark — tuist generate tuist ProjectDescription
        working-directory: tuist-bench
        run: |
          set -euo pipefail
          echo "=== timing tuist generate tuist ProjectDescription --no-open ==="
          start=$(date +%s.%N)
          mise exec -- tuist generate tuist ProjectDescription --no-open
          end=$(date +%s.%N)
          echo "GENERATE_SECONDS=$(echo "${end} - ${start}" | bc)"

      - name: Cache volume state (post)
        if: always()
        run: |
          set -uo pipefail
          root="${TUIST_XDG_CACHE_HOME:-}"
          [ -z "${root}" ] && exit 0
          echo "=== cache subtree sizes AFTER generate (warmth this run captured) ==="
          du -sh "${root}/tuist/"* 2>/dev/null | sed 's/^/  /' || true
          echo "=== manifests cached ==="
          ls -1 "${root}/tuist/Manifests/" 2>/dev/null | head -5 | sed 's/^/  /' || echo "  (none)"
