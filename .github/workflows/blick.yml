name: blick

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "server/**"
      - "cache/**"
      - "processor/**"
      - "xcode_processor/**"
      - "tuist_common/**"
      - "noora/**"
      - ".blick/**"
      - "blick.toml"
      - ".github/workflows/blick.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: blick-${{ github.head_ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  review:
    name: Review
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}

      - name: Install blick and opencode
        run: |
          mise use -g aube@1.6.2
          mise use -g github:tuist/blick
          mise use -g npm:opencode-ai

      - name: Run blick review
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: blick review --base "origin/${{ github.event.pull_request.base.ref }}" --json --stream

      - name: Publish review
        # Only publish when the review step succeeded. `blick publish`
        # is a no-op when there are no findings and exits non-zero only
        # on real publish errors.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: blick publish

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blick-runs
          path: .blick/runs/
          if-no-files-found: ignore
