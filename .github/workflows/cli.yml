name: CLI

on:
  push:
    branches:
      - main
    paths:
      - "cli/TuistCacheEE"
      - "cli/TuistCacheEE/**"
      - "cli/Sources/**"
      - "cli/Tests/**"
      - "cli/Templates/**"
      - "*.swift"
      - ".github/workflows/cli.yml"
      - "mise/tasks/cli/lint.sh"
      - "mise/tasks/cli/ee.sh"
      - "mise.toml"
      - "mise.lock"
      - "examples/xcode/**"
      - "Tuist/**"
      - ".xcode-version"
      - ".swiftpm/**"
      - "Package.swift"
      - "Package.resolved"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "cli/TuistCacheEE"
      - "cli/TuistCacheEE/**"
      - "cli/Sources/**"
      - "cli/Tests/**"
      - "cli/Templates/**"
      - "*.swift"
      - ".github/workflows/cli.yml"
      - "mise/tasks/cli/lint.sh"
      - "mise/tasks/cli/ee.sh"
      - "mise.toml"
      - "mise.lock"
      - "examples/xcode/**"
      - "Tuist/**"
      - ".xcode-version"
      - ".swiftpm/**"
      - "Package.swift"
      - "Package.resolved"

permissions:
  id-token: write
  contents: read

env:
  MISE_VERSION: "2026.4.18"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
  TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN }}
  TUIST_EE: ${{ github.event.pull_request.head.repo.fork != true && '1' || '' }}
  TUIST_ENABLE_CACHING: ${{ github.event.pull_request.head.repo.fork != true }}
  MISE_GITHUB_ATTESTATIONS: 0
  MISE_LOCKED: 1

concurrency:
  group: cli-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  cli-lint:
    name: Lint
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist swiftlint swiftformat"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Lint
        run: |
          mise x swiftformat -- swiftformat cli/ app/ --lint
          mise x swiftlint -- swiftlint lint --quiet --config .swiftlint.yml cli/Sources
          tuist inspect dependencies --only implicit

  cli-spm-build:
    name: SwiftPM Build
    runs-on: macos-26
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Build
        run: swift build --configuration debug --replace-scm-with-registry --force-resolved-versions

  cli-cache:
    name: Cache
    runs-on: macos-26
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Cache
        run: tuist cache
      - name: Save cache
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

  cli-unit-tests:
    name: Unit Tests
    runs-on: namespace-profile-default-macos
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Run tests
        run: tuist test TuistUnitTests -- -retry-tests-on-failure -test-iterations 4

  # Brings up a single shared kind+helm cluster on a Linux runner (macOS Namespace
  # runners can't host a Linux VM — no nested virt → no HVF → no docker/podman
  # machine), exposes it via a cloudflared Quick Tunnel, and publishes the
  # public URL as a workflow artifact. The acceptance test shards run on macOS
  # and consume the URL via `needs: cli-acceptance-cluster-ready` (the cheap
  # Linux sentinel below) — they never poll on the macOS runner, so we don't
  # spend macOS minutes waiting for the cluster to come up. The cluster job
  # idles until its timeout to outlive the test shards; whichever finishes
  # first ends the cluster naturally when GHA tears the runner down.
  cli-acceptance-cluster:
    name: Acceptance Cluster
    runs-on: namespace-profile-default
    timeout-minutes: 30
    # ESO needs the 1Password service-account token, which is not exposed to
    # forks. Same gate as the tests.
    # TEMP (this PR only): drop the `draft == false` gate so this runs on draft
    # PRs while we exercise the new pipeline. Restore the gate before merge.
    if: github.event.pull_request.head.repo.fork != true
    permissions:
      contents: read
      packages: read
    env:
      TUIST_IMAGE_TAG: image-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          # Skip the default `mise install`: this job doesn't need the heavy
          # toolchains (elixir, swift, …) from mise.toml. up.sh installs the
          # exact tools it needs (kind, helm, kubectl) on demand.
          install: false
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Wait for server image
        uses: ./.github/actions/wait-for-server-image
      - name: Bring up acceptance cluster
        env:
          MISE_TASK_RUN_AUTO_INSTALL: "0"
          MISE_LOCKED: "0"
          MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          INSTALL_TUNNEL: "1"
        run: mise run cli:acceptance-cluster:up 0
      - name: Publish cluster URL artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-acceptance-cluster-url
          path: /tmp/tuist-acceptance-0-url
          retention-days: 1
          if-no-files-found: error
      - name: Hold cluster until test shards finish
        # Test shards have a 60min timeout each but typically finish in under
        # 20min. We sleep up to ~25min, leaving margin for the slowest shard.
        # If a shard is still running when we exit, GHA will tear down the
        # runner regardless; the shard itself will fail when its requests start
        # timing out, which is the correct signal.
        run: sleep 1500

  # Cheap Linux sentinel that polls for the cluster URL artifact and exposes it
  # as a job output. The macOS test shards `needs:` this job, which means GHA
  # only schedules the (expensive) macOS runners *after* the cluster is up and
  # the URL is known — no wasted macOS minutes spent polling. This pattern is
  # reusable: any future acceptance-test workflow that needs a tuist server
  # cluster can `needs: cli-acceptance-cluster-ready` and read the URL from
  # `needs.cli-acceptance-cluster-ready.outputs.url`.
  cli-acceptance-cluster-ready:
    name: Acceptance Cluster Ready
    runs-on: namespace-profile-default
    timeout-minutes: 30
    if: github.event.pull_request.head.repo.fork != true
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Wait for cluster URL artifact
        id: url
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # The cluster job runs in parallel with this sentinel. Its budget is:
          # wait-for-server-image (up to ~5min) + bring-up (kind+helm+ESO ~6min)
          # + tunnel handshake (~30s). 25min covers the slow path; we exit
          # early on the happy path the moment the artifact lands. We also
          # short-circuit if the cluster job itself reaches a terminal failure
          # so the test shards fail fast instead of waiting the full budget.
          deadline=$(( $(date +%s) + 25 * 60 ))
          while :; do
            id=$(gh api --paginate \
                "/repos/${GH_REPO}/actions/runs/${GH_RUN_ID}/artifacts?per_page=100" \
                --jq '.artifacts[] | select(.name == "cli-acceptance-cluster-url") | .id' \
                2>/dev/null | head -1)
            if [ -n "${id:-}" ]; then
              gh api "/repos/${GH_REPO}/actions/artifacts/${id}/zip" >/tmp/cluster-url.zip
              unzip -o /tmp/cluster-url.zip -d /tmp/cluster-url >/dev/null
              url=$(cat /tmp/cluster-url/tuist-acceptance-0-url)
              echo "url=${url}" >>"$GITHUB_OUTPUT"
              echo "Cluster URL: ${url}"
              break
            fi
            cluster_conclusion=$(gh api \
                "/repos/${GH_REPO}/actions/runs/${GH_RUN_ID}/jobs?per_page=100" \
                --jq '.jobs[] | select(.name == "Acceptance Cluster") | .conclusion // ""' \
                2>/dev/null | head -1)
            case "$cluster_conclusion" in
              failure|cancelled|timed_out|action_required|startup_failure)
                echo "ERROR: Acceptance Cluster job ended with conclusion '${cluster_conclusion}'; aborting." >&2
                exit 1
                ;;
            esac
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "ERROR: cluster URL artifact not available after 25 minutes." >&2
              exit 1
            fi
            sleep 10
          done

  cli-acceptance-tests-build:
    name: Build Acceptance Tests
    runs-on: namespace-profile-default-macos
    timeout-minutes: 60
    # TEMP (this PR only): drop the `draft == false` gate so the docker build and
    # acceptance tests run on draft PRs while we exercise the new pipeline.
    # Restore the gate before merge.
    if: github.event.pull_request.head.repo.fork != true
    outputs:
      matrix: ${{ steps.shard.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Build tests
        id: shard
        run: tuist test --build-only --shard-total 2 --shard-granularity suite TuistAcceptanceTests

  cli-acceptance-tests:
    name: Acceptance Tests
    runs-on: namespace-profile-default-macos
    timeout-minutes: 60
    # Wait on both: the sharded test build (gives us the matrix) AND the
    # cluster-ready sentinel (gives us the URL). The sentinel is a cheap Linux
    # job, so we get proper queueing without spending macOS minutes polling.
    needs: [cli-acceptance-tests-build, cli-acceptance-cluster-ready]
    if: toJSON(fromJSON(needs.cli-acceptance-tests-build.outputs.matrix).shard) != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.cli-acceptance-tests-build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Set up new keychain
        run: |
          TMP_DIRECTORY=$(mktemp -d)
          KEYCHAIN_PATH=$TMP_DIRECTORY/keychain.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
      - name: Run shard ${{ matrix.shard }}
        run: tuist test --without-building --platform macOS TuistAcceptanceTests -- -retry-tests-on-failure -test-iterations 2
        env:
          TUIST_SHARD_INDEX: ${{ matrix.shard }}
          TUIST_URL: ${{ needs.cli-acceptance-cluster-ready.outputs.url }}
          TUIST_AUTH_EMAIL: tuistrocks@tuist.dev
          TUIST_AUTH_PASSWORD: tuistrocks

  cli-acceptance-tests-fork:
    name: Acceptance Tests (Fork)
    runs-on: macos-26
    timeout-minutes: 60
    if: (github.event.pull_request.draft == false || github.event_name != 'pull_request') && github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Set up new keychain
        run: |
          TMP_DIRECTORY=$(mktemp -d)
          KEYCHAIN_PATH=$TMP_DIRECTORY/keychain.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
      - name: Run tests
        run: tuist test --platform macOS TuistAcceptanceTests -- -retry-tests-on-failure -test-iterations 2

  cli-linux-build:
    name: Linux Build
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: linux-cli-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - name: Resolve dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: swift package resolve --replace-scm-with-registry
      - name: Build tuist CLI
        run: swift build --target tuist --replace-scm-with-registry --force-resolved-versions
      - name: Save cache
        if: github.ref == 'refs/heads/main'
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

  cli-linux-unit-tests:
    name: Linux Unit Tests
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: linux-cli-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - name: Resolve dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: swift package resolve --replace-scm-with-registry
      - name: Run unit tests
        run: swift test --replace-scm-with-registry
      - name: Save cache
        if: github.ref == 'refs/heads/main'
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
