name: CLI

on:
  push:
    branches:
      - main
    paths:
      - "cli/TuistCacheEE"
      - "cli/TuistCacheEE/**"
      - "cli/Sources/**"
      - "cli/Tests/**"
      - "cli/Templates/**"
      - "*.swift"
      - ".github/workflows/cli.yml"
      - "mise/tasks/cli/lint.sh"
      - "mise/tasks/cli/ee.sh"
      - "mise.toml"
      - "mise.lock"
      - "examples/xcode/**"
      - "Tuist/**"
      - ".xcode-version"
      - ".swiftpm/**"
      - "Package.swift"
      - "Package.resolved"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "cli/TuistCacheEE"
      - "cli/TuistCacheEE/**"
      - "cli/Sources/**"
      - "cli/Tests/**"
      - "cli/Templates/**"
      - "*.swift"
      - ".github/workflows/cli.yml"
      - "mise/tasks/cli/lint.sh"
      - "mise/tasks/cli/ee.sh"
      - "mise.toml"
      - "mise.lock"
      - "examples/xcode/**"
      - "Tuist/**"
      - ".xcode-version"
      - ".swiftpm/**"
      - "Package.swift"
      - "Package.resolved"

permissions:
  id-token: write
  contents: read

env:
  MISE_VERSION: "2026.4.18"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
  TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN }}
  TUIST_EE: ${{ github.event.pull_request.head.repo.fork != true && '1' || '' }}
  TUIST_ENABLE_CACHING: ${{ github.event.pull_request.head.repo.fork != true }}
  MISE_GITHUB_ATTESTATIONS: 0
  MISE_LOCKED: 1

concurrency:
  group: cli-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  cli-lint:
    name: Lint
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist swiftlint swiftformat"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Lint
        run: |
          mise x swiftformat -- swiftformat cli/ app/ --lint
          mise x swiftlint -- swiftlint lint --quiet --config .swiftlint.yml cli/Sources
          tuist inspect dependencies --only implicit

  cli-spm-build:
    name: SwiftPM Build
    runs-on: macos-26
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Build
        run: swift build --configuration debug --replace-scm-with-registry --force-resolved-versions

  cli-cache:
    name: Cache
    runs-on: macos-26
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Cache
        run: tuist cache
      - name: Save cache
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

  cli-unit-tests:
    name: Unit Tests
    runs-on: namespace-profile-default-macos
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Run tests
        run: tuist test TuistUnitTests -- -retry-tests-on-failure -test-iterations 4

  # Deploys the tuist server image into an ephemeral helm release on Pedro's
  # Syself-managed preview cluster (the same cluster preview-deploy.yml uses
  # for per-PR previews). The cluster has ESO + ClusterSecretStore + a
  # wildcard `*.preview.tuist.dev` cert pre-configured during cluster
  # bootstrap (see infra/k8s/syself-onboarding.md), so we don't bootstrap any
  # of that here — we just helm install and the cluster's existing infra
  # resolves the license from 1Password.
  #
  # Earlier iterations of this PR ran a fresh kind cluster on a Linux runner,
  # exposed via cloudflared, which forced us to bootstrap ESO from scratch on
  # every run. That hit a wall when the shared OP_SERVICE_ACCOUNT_TOKEN turned
  # out to be scoped to the wrong vault. Going through Pedro's cluster
  # sidesteps the bootstrap entirely and gives us a public URL via the
  # existing ingress + wildcard-TLS pattern.
  #
  # Each run gets its own helm release in its own namespace, keyed on the PR
  # number when available (so multiple pushes to a PR upgrade in place) and
  # github.run_id otherwise. The teardown job below cleans up regardless of
  # test outcome; preview-sweep.yml's TTL annotation acts as a backstop.
  cli-acceptance-cluster:
    name: Acceptance Cluster
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # ESO + KUBECONFIG secrets aren't exposed to forks.
    # TEMP (this PR only): drop the `draft == false` gate so this runs on
    # draft PRs while we exercise the new pipeline. Restore the gate before
    # merge.
    if: github.event.pull_request.head.repo.fork != true
    environment: server-k8s-preview
    permissions:
      contents: read
      packages: read
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      release: ${{ steps.resolve.outputs.release }}
      namespace: ${{ steps.resolve.outputs.namespace }}
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      IMAGE_TAG: image-${{ github.sha }}
      # helm + kubectl aren't pinned in mise.lock; the workflow-level
      # MISE_LOCKED=1 would block their install.
      MISE_LOCKED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "helm kubectl"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Wait for server image
        uses: ./.github/actions/wait-for-server-image
      - name: Resolve release / namespace / host
        id: resolve
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            slug="pr-${{ github.event.pull_request.number }}"
          else
            slug="run-${{ github.run_id }}"
          fi
          release="acceptance-${slug}"
          namespace="acceptance-${slug}"
          host="${release}.preview.tuist.dev"
          # Embedded MinIO needs a public hostname too — the server signs
          # presigned URLs with TUIST_S3_ENDPOINT, and the CLI on the
          # macOS runner has to resolve that. Cluster-internal DNS would
          # fail at the upload step.
          object_storage_host="minio-${release}.preview.tuist.dev"
          echo "release=${release}" >>"$GITHUB_OUTPUT"
          echo "namespace=${namespace}" >>"$GITHUB_OUTPUT"
          echo "host=${host}" >>"$GITHUB_OUTPUT"
          echo "object_storage_host=${object_storage_host}" >>"$GITHUB_OUTPUT"
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Re-apply role=preview label/taint on workers
        # Same idempotent step preview-deploy.yml uses — CAPI/Syself doesn't
        # surface node labels via topology variables, so workers come up
        # unlabeled after MachineDeployment scale events.
        run: |
          kubectl label nodes -l '!node-role.kubernetes.io/control-plane' role=preview --overwrite
          kubectl taint nodes -l '!node-role.kubernetes.io/control-plane' role=preview:NoSchedule --overwrite
      - name: Provision GHCR pull secret in the namespace
        # The chart's image is private (ghcr.io/tuist/tuist). Create a
        # docker-registry secret named `ghcr-pull-secret` in the deploy
        # namespace so the chart's pods can pull on this fresh namespace
        # without depending on a cluster-wide reflector.
        env:
          NAMESPACE: ${{ steps.resolve.outputs.namespace }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: helm upgrade --install
        id: deploy
        env:
          RELEASE: ${{ steps.resolve.outputs.release }}
          NAMESPACE: ${{ steps.resolve.outputs.namespace }}
          HOST: ${{ steps.resolve.outputs.host }}
          OBJECT_STORAGE_HOST: ${{ steps.resolve.outputs.object_storage_host }}
        run: |
          set -euo pipefail
          # Clean up any leftover release from a previous failed run on this
          # PR — k8s Jobs (the chart's pre-upgrade migration job) have
          # immutable fields, so `helm upgrade --install` against a stale
          # release fails with "field is immutable". Uninstall + reinstall
          # is fine because we don't need to preserve state across runs.
          helm uninstall "$RELEASE" --namespace "$NAMESPACE" --wait --ignore-not-found
          # extraEnv override for TUIST_S3_ENDPOINT: the chart's helper
          # hardcodes the cluster-internal Service DNS for embedded MinIO,
          # which the macOS runner can't resolve. Server signs presigned
          # upload URLs with this value, so it has to be the public host.
          # k8s honours the *last* env entry when names collide, so the
          # extraEnv here wins over the chart's hardcoded value.
          # Keep cache enabled (matches values-preview.yaml). The CLI
          # queries cache endpoints during `tuist test`; with caching off
          # at the cluster, the build aborts with "No cache endpoints are
          # available."
          if ! helm upgrade --install "$RELEASE" infra/helm/tuist \
            --namespace "$NAMESPACE" \
            -f infra/helm/tuist/values-preview.yaml \
            --set global.imagePullSecrets[0].name=ghcr-pull-secret \
            --set server.image.tag="$IMAGE_TAG" \
            --set server.ingress.enabled=true \
            --set server.ingress.host="$HOST" \
            --set "server.appUrl=https://${HOST}" \
            --set "server.extraEnv[0].name=TUIST_S3_ENDPOINT" \
            --set "server.extraEnv[0].value=https://${OBJECT_STORAGE_HOST}" \
            --atomic --timeout 20m --wait; then
            echo "::error::helm install failed; pod state:" >&2
            kubectl -n "$NAMESPACE" get pods >&2 || true
            kubectl -n "$NAMESPACE" describe pods >&2 || true
            kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp >&2 || true
            exit 1
          fi
          # Expose the embedded MinIO Service externally so the macOS test
          # shards (and anything else outside the cluster) can resolve the
          # presigned URLs the server hands out. nginx default-ssl-cert
          # serves the wildcard *.preview.tuist.dev cert; no per-host TLS
          # plumbing required.
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${RELEASE}-tuist-object-storage
            namespace: ${NAMESPACE}
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "0"
              nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
          spec:
            ingressClassName: nginx
            rules:
              - host: ${OBJECT_STORAGE_HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${RELEASE}-tuist-object-storage
                          port:
                            number: 9000
          EOF
          # TTL label so preview-sweep.yml cleans up if the explicit
          # teardown job below misses (e.g. workflow cancelled). Epoch
          # seconds, matching the format preview-deploy.yml writes — k8s
          # label values can't contain ':' so ISO timestamps are out.
          kubectl label namespace "$NAMESPACE" \
            "tuist.dev/expires-at=$(( $(date +%s) + 2 * 3600 ))" \
            "tuist.dev/preview=true" \
            --overwrite

          # Seed the test user (tuistrocks@tuist.dev) + fixture project.
          # The chart deploys with TUIST_DEPLOY_ENV=prod, where seeds.exs
          # doesn't auto-run. The CLI's TUIST_AUTH_EMAIL/_PASSWORD env
          # vars point at this user; without it every test fails fast on
          # "unauthorized" trying to upload run metadata.
          #
          # Use Tuist.Release.seed/0 — it disables the Phoenix endpoint
          # and PromEx (so the eval node doesn't fight the running pod
          # for those ports), starts the application, runs seeds.exs,
          # and halts. Without those overrides, Application.ensure_all_started
          # fails with `:eaddrinuse` on the metrics port.
          #
          # Override every data-volume env var to 0: acceptance tests
          # only need the test user / org / projects (created at the top
          # of seeds.exs unconditionally). The bulk data generation
          # (default 2k build runs, 1.5k test runs, 8k command events,
          # ~30k CAS records) blew past the chart's 1Gi server memory
          # limit and got OOMKilled (exit 137).
          #
          # Retry up to 3× — Application.ensure_all_started occasionally
          # races with the running pod's cachex locksmith setup; a brief
          # back-off lets that settle.
          SERVER_POD=$(kubectl get pods -n "$NAMESPACE" \
            -l app.kubernetes.io/component=server \
            -o jsonpath='{.items[0].metadata.name}')
          attempt=0
          until [ $attempt -ge 3 ]; do
            attempt=$((attempt + 1))
            if kubectl exec -n "$NAMESPACE" "$SERVER_POD" -- \
                 sh -c 'SEED_BUILD_RUNS=0 SEED_TEST_RUNS=0 SEED_COMMAND_EVENTS=0 SEED_PREVIEWS=0 SEED_BUNDLES=0 SEED_XCODE_GRAPHS=0 /app/bin/tuist eval "Tuist.Release.seed()"'; then
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Seed attempt $attempt failed; retrying in 20s…"
              sleep 20
            else
              echo "::error::Seed failed after 3 attempts"
              exit 1
            fi
          done
          # Smoke test the server through the public host. Retries cover
          # DNS / cert propagation lag.
          for i in $(seq 1 30); do
            if curl -fsSL --max-time 5 "https://${HOST}/ready" >/dev/null; then
              echo "OK — https://${HOST}/ready returned 200"
              break
            fi
            echo "Attempt $i: https://${HOST}/ready not yet reachable; retrying in 10s..."
            sleep 10
          done
          if ! curl -fsSL --max-time 5 "https://${HOST}/ready" >/dev/null; then
            echo "::error::https://${HOST}/ready never returned 200 after ~5 min."
            exit 1
          fi
          # MinIO health check — its `/minio/health/live` endpoint returns
          # 200 once the server is accepting requests. Wait for the new
          # Ingress + DNS to resolve.
          for i in $(seq 1 30); do
            if curl -fsSL --max-time 5 "https://${OBJECT_STORAGE_HOST}/minio/health/live" >/dev/null; then
              echo "OK — https://${OBJECT_STORAGE_HOST}/minio/health/live returned 200"
              echo "url=https://${HOST}" >>"$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: https://${OBJECT_STORAGE_HOST}/minio/health/live not yet reachable; retrying in 10s..."
            sleep 10
          done
          echo "::error::https://${OBJECT_STORAGE_HOST}/minio/health/live never returned 200 after ~5 min."
          exit 1

  cli-acceptance-tests-build:
    name: Build Acceptance Tests
    runs-on: namespace-profile-default-macos
    timeout-minutes: 60
    # `tuist test --build-only --shard-total --shard-granularity suite`
    # registers a shard plan on the configured server. The test shards
    # query that plan by reference; if the plan lives on canary but the
    # tests run against the preview cluster, lookup 404s with "shard plan
    # not found". Build against the same cluster the tests use.
    needs: cli-acceptance-cluster
    # TEMP (this PR only): drop the `draft == false` gate so the docker build and
    # acceptance tests run on draft PRs while we exercise the new pipeline.
    # Restore the gate before merge.
    if: github.event.pull_request.head.repo.fork != true
    outputs:
      matrix: ${{ steps.shard.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Authenticate against acceptance cluster
        # The shard plan registered by `tuist test --build-only` lives on
        # the server identified by TUIST_URL. We point it at the preview
        # cluster so the test shards (which run with the same TUIST_URL)
        # can find the plan.
        env:
          TUIST_URL: ${{ needs.cli-acceptance-cluster.outputs.url }}
        run: tuist auth login --email tuistrocks@tuist.dev --password tuistrocks
      - name: Build tests
        id: shard
        env:
          TUIST_URL: ${{ needs.cli-acceptance-cluster.outputs.url }}
        run: tuist test --build-only --shard-total 2 --shard-granularity suite TuistAcceptanceTests

  cli-acceptance-tests:
    name: Acceptance Tests
    runs-on: namespace-profile-default-macos
    timeout-minutes: 60
    # Wait on both: the sharded test build (gives us the matrix) AND the
    # cluster deploy (gives us the URL). The cluster job exits successfully
    # the moment the helm release is healthy + the smoke test passes, so
    # macOS shards only spin up when the cluster is actually reachable.
    needs: [cli-acceptance-tests-build, cli-acceptance-cluster]
    if: toJSON(fromJSON(needs.cli-acceptance-tests-build.outputs.matrix).shard) != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.cli-acceptance-tests-build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
      - name: Initialize TuistCacheEE submodule
        if: github.event.pull_request.head.repo.fork != true
        run: bash mise/tasks/cli/ee.sh
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: mise
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist auth login
      - name: Setup Tuist
        if: github.event.pull_request.head.repo.fork != true
        run: tuist setup
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Set up new keychain
        run: |
          TMP_DIRECTORY=$(mktemp -d)
          KEYCHAIN_PATH=$TMP_DIRECTORY/keychain.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
      - name: Authenticate against acceptance cluster
        # The earlier `tuist auth login` step authenticates against the
        # default tuist server (canary). `tuist test` then tries to upload
        # run metadata to TUIST_URL (our preview cluster), where it has no
        # session — the request 401s. Authenticate against the preview
        # cluster URL too so credentials get saved for that host.
        env:
          TUIST_URL: ${{ needs.cli-acceptance-cluster.outputs.url }}
          TUIST_AUTH_EMAIL: tuistrocks@tuist.dev
          TUIST_AUTH_PASSWORD: tuistrocks
        run: tuist auth login --email tuistrocks@tuist.dev --password tuistrocks
      - name: Run shard ${{ matrix.shard }}
        run: tuist test --without-building --platform macOS TuistAcceptanceTests -- -retry-tests-on-failure -test-iterations 2
        env:
          TUIST_SHARD_INDEX: ${{ matrix.shard }}
          TUIST_URL: ${{ needs.cli-acceptance-cluster.outputs.url }}
          TUIST_AUTH_EMAIL: tuistrocks@tuist.dev
          TUIST_AUTH_PASSWORD: tuistrocks

  # Teardown the helm release + namespace once the test shards finish (or fail,
  # or get cancelled). preview-sweep.yml's TTL annotation is the backstop, but
  # an explicit uninstall here keeps the cluster from accumulating stale
  # releases between sweeps.
  cli-acceptance-cluster-teardown:
    name: Acceptance Cluster Teardown
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [cli-acceptance-cluster, cli-acceptance-tests]
    # Always run, even if the cluster job failed — a partial deploy still
    # leaves a release behind that the next run's `helm uninstall` would
    # have to clean up. Earlier we gated on cluster success, but that left
    # stale releases that broke immutable-field upgrades.
    if: always() && needs.cli-acceptance-cluster.outputs.release != ''
    environment: server-k8s-preview
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      RELEASE: ${{ needs.cli-acceptance-cluster.outputs.release }}
      NAMESPACE: ${{ needs.cli-acceptance-cluster.outputs.namespace }}
      MISE_LOCKED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "helm kubectl"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: helm uninstall + delete namespace
        run: |
          helm uninstall "$RELEASE" --namespace "$NAMESPACE" --wait --ignore-not-found || true
          kubectl delete namespace "$NAMESPACE" --wait=false --ignore-not-found

  cli-acceptance-tests-fork:
    name: Acceptance Tests (Fork)
    runs-on: macos-26
    timeout-minutes: 60
    if: (github.event.pull_request.draft == false || github.event_name != 'pull_request') && github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: .build
          key: ${{ runner.os }}-cli-${{ hashFiles('.xcode-version') }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Install Tuist dependencies
        if: steps.cache.outputs.cache-matched-key == ''
        run: tuist install
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Set up new keychain
        run: |
          TMP_DIRECTORY=$(mktemp -d)
          KEYCHAIN_PATH=$TMP_DIRECTORY/keychain.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p $KEYCHAIN_PASSWORD $KEYCHAIN_PATH
      - name: Run tests
        run: tuist test --platform macOS TuistAcceptanceTests -- -retry-tests-on-failure -test-iterations 2

  cli-linux-build:
    name: Linux Build
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: linux-cli-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - name: Resolve dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: swift package resolve --replace-scm-with-registry
      - name: Build tuist CLI
        run: swift build --target tuist --replace-scm-with-registry --force-resolved-versions
      - name: Save cache
        if: github.ref == 'refs/heads/main'
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

  cli-linux-unit-tests:
    name: Linux Unit Tests
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: linux-cli-${{ hashFiles('Package.resolved', 'Package.swift') }}
      - name: Resolve dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: swift package resolve --replace-scm-with-registry
      - name: Run unit tests
        run: swift test --replace-scm-with-registry
      - name: Save cache
        if: github.ref == 'refs/heads/main'
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
