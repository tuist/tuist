name: kube-impersonator image

# Builds and pushes the kube-impersonator container image to
# ghcr.io/tuist/kube-impersonator. The image runs as a sidecar in
# each env's Pomerium pod (see infra/helm/pomerium/). Tag the chart
# is configured to pull via `kubeImpersonator.image.tag` in
# infra/helm/pomerium/values.yaml.

on:
  push:
    paths:
      - kube-impersonator/**
      - .github/workflows/kube-impersonator-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: tuist-linux-large
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   - `sha-<short>` on every build (immutable, what the chart
      #     should pin to in production)
      #   - branch name on non-main builds (so feature branches can
      #     reference their own image during pre-merge validation)
      #   - `latest` only on push to main
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tuist/kube-impersonator
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: kube-impersonator
          file: kube-impersonator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
