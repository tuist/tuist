name: Kura Website

on:
  push:
    branches:
      - main
    paths:
      - kura/website/**
      - .github/workflows/kura-website.yml
      - kura/website/aube-lock.yaml
      - kura/website/package.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kura/website/**
      - .github/workflows/kura-website.yml
      - kura/website/aube-lock.yaml
      - kura/website/package.json
  merge_group:

concurrency:
  group: kura-website-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Restore Aube Cache
        if: github.ref != 'refs/heads/main'
        uses: actions/cache@v4
        id: aube-cache
        with:
          path: |
            ~/.local/share/aube
            ~/.cache/aube
          key: aube-${{ hashFiles('kura/website/aube-lock.yaml') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          working_directory: kura/website
      - name: Build Kura website
        working-directory: kura/website
        run: mise run build
      - uses: 1password/install-cli-action@v2
        if: github.ref == 'refs/heads/main'
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://tuist/Cloudflare/CLOUDFLARE_API_TOKEN
          CLOUDFLARE_ACCOUNT_ID: op://tuist/Cloudflare/CLOUDFLARE_ACCOUNT_ID
          NODE_OPTIONS: --max-old-space-size=8192
        working-directory: kura/website
        run: op run -- mise run deploy
