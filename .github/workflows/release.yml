  release-xcresult-processor-image:
    name: Release xcresult processor image
    needs: check-releases
    if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true'
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff erlang elixir"
          working_directory: server

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^xcresult-processor-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          INCLUDE_PATHS=(
            --include-path "infra/xcresult-processor-image/**/*"
            --include-path "server/lib/**/*"
            --include-path "server/native/xcresult_nif/**/*"
            --include-path "server/mix.exs"
            --include-path "server/mix.lock"
          )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/xcresult-processor-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/xcresult-processor-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/xcresult-processor-image
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^xcresult-processor-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          INCLUDE_PATHS=(
            --include-path "infra/xcresult-processor-image/**/*"
            --include-path "server/lib/**/*"
            --include-path "server/native/xcresult_nif/**/*"
            --include-path "server/mix.exs"
            --include-path "server/mix.lock"
          )

          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Build server release for macOS
        id: release
        working-directory: server
        run: |
          set -euo pipefail
          MIX_ENV=prod mix deps.get --only prod
          ./native/xcresult_nif/build.sh
          ./native/xcactivitylog_nif/build.sh
          MIX_ENV=prod mix compile --force --warnings-as-errors
          MIX_ENV=prod mix release tuist --overwrite
          if [ -n "${TUIST_MIX_BUILD_ROOT:-}" ]; then
            RELEASE_DIR="${TUIST_MIX_BUILD_ROOT}/server/prod/rel/tuist"
          else
            RELEASE_DIR="$(pwd)/_build/prod/rel/tuist"
          fi
          echo "dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package release tarball
        run: |
          set -euo pipefail
          tar -czf /tmp/release.tar.gz -C "${{ steps.release.outputs.dir }}" .
          ls -lh /tmp/release.tar.gz

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates with the tuist-bot token. crane writes creds
      # to ~/.docker/config.json, which Tart reads via the Docker
      # credential-helper protocol for both the pull (this build's
      # clone of the base) and the push at the end. See
      # runner-image.yml's matching step for the long explanation.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/xcresult-processor-image
        run: packer init -upgrade xcresult-processor.pkr.hcl

      - name: Reclaim Tart disk
        # Delete every locally-cloned VM; see runner-image.yml's
        # same step for the rationale.
        run: |
          set -uo pipefail
          tart list || true
          df -h /
          tart list | awk '$1 == "local" { print $2 }' | while read -r vm; do
            tart stop "$vm" 2>/dev/null || true
            tart delete "$vm" 2>/dev/null || true
          done
          tart prune --entries caches --older-than 0
          df -h /

      - name: Build image
        working-directory: infra/xcresult-processor-image
        run: |
          set -euo pipefail
          # Resolve the newest published macos-tahoe-xcode tag at
          # build time instead of pinning. The xcresult-processor is
          # a singleton backend that has to parse .xcresult bundles
          # from *all* customer runner profiles — pinning to a
          # specific Xcode would silently break parsing of bundles
          # produced by any newer Xcode (xcresulttool's JSON schema
          # changes across Xcode majors). Filter for version-shaped
          # tags (`<major>` / `<major>-<minor>` / `<major>-<minor>-<patch>`),
          # numeric-sort by `-`-delimited fields, pick the highest.
          BASE_TAG=$(crane ls ghcr.io/tuist/macos-tahoe-xcode | grep -E '^[0-9]+(-[0-9]+){0,2}$' | sort -t- -k1,1n -k2,2n -k3,3n | tail -n1)
          if [ -z "$BASE_TAG" ]; then
            echo "Error: No version-shaped tags found at ghcr.io/tuist/macos-tahoe-xcode. Trigger macos-xcode-image.yml first." >&2
            exit 1
          fi
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
          echo "Resolved base image: ${BASE_IMAGE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-xcresult-processor" \
            -var "release_tarball=/tmp/release.tar.gz" \
            xcresult-processor.pkr.hcl

      - name: Push image to GHCR
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}"
          tart push tuist-xcresult-processor "ghcr.io/tuist/tuist-xcresult-processor:${VERSION}"
          tart push tuist-xcresult-processor "ghcr.io/tuist/tuist-xcresult-processor:latest"
          echo "Pushed ghcr.io/tuist/tuist-xcresult-processor:${VERSION}"

      - name: Upload xcresult-processor-image artifacts
        uses: actions/upload-artifact@v4
        with:
          # values-managed-common.yaml is bumped by commit-and-release
          # against its own checkout, not packaged here, so two parallel
          # release-* jobs touching different `tag:` lines in the same
          # file can't trample each other on artifact extract.
          name: xcresult-processor-image-artifacts
          path: |
            infra/xcresult-processor-image/CHANGELOG.md
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/release.tar.gz
          tart delete tuist-xcresult-processor 2>/dev/null || true

  runner-image-build:
    # One job per active profile, fanned out across whatever
    # vm-image-builder hosts are available. GitHub schedules them
    # respecting the label set — with 2 builders, 2 profiles build
    # in parallel; adding more hosts scales linearly without any
    # workflow change.
    #
    # The active-profile list is declared inline below. Adding a
    # profile = adding a matrix entry; if you move the first entry,
    # update the adjacent `Resolve default profile + digest` step in
    # release-runner-image to match (it produces the chart pin).
    #
    # To refresh an out-of-rotation profile (one not in the matrix),
    # use `gh workflow run runner-image.yml -f xcode_version=26.X.Y` —
    # that path keeps publishing tags but doesn't move the chart pin.
    name: Build runner image (Xcode ${{ matrix.xcode }})
    needs: check-releases
    if: needs.check-releases.outputs.runner-image-should-release == 'true'
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    strategy:
      # If any profile build fails, abort sibling builds so the chart
      # pin doesn't move to a partially-published set.
      fail-fast: true
      matrix:
        # First entry is the default profile (its digest goes into
        # the chart pin). Keep release-runner-image.outputs.profile
        # in sync.
        xcode: ["26.5", "26.4.1"]
    env:
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TART_REGISTRY_HOSTNAME: ghcr.io
      TART_REGISTRY_USERNAME: tuist-bot
      TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates with the tuist-bot token. `crane auth login`
      # writes creds to ~/.docker/config.json, which Tart reads via
      # the Docker credential-helper protocol for both pull (Packer's
      # clone of the base) and push at the end. See runner-image.yml
      # for the long explanation of why crane and not `tart login`.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      - name: Reclaim Tart disk
        # Delete every locally-cloned VM on this host; see
        # runner-image.yml's same step for the rationale.
        run: |
          set -uo pipefail
          tart list || true
          df -h /
          tart list | awk '$1 == "local" { print $2 }' | while read -r vm; do
            tart stop "$vm" 2>/dev/null || true
            tart delete "$vm" 2>/dev/null || true
          done
          tart prune --entries caches --older-than 0
          df -h /

      - name: Build + push profile
        working-directory: infra/runner-image
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.runner-image-next-version-number }}"
          XCODE="${{ matrix.xcode }}"
          BASE_TAG="${XCODE//./-}"
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
          PROFILE="macos-${BASE_TAG}"
          echo "Building profile ${PROFILE} from base ${BASE_IMAGE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-runner" \
            runner.pkr.hcl
          # Immutable + rolling tags.
          tart push tuist-runner "ghcr.io/tuist/tuist-runner:${PROFILE}-${VERSION}"
          tart push tuist-runner "ghcr.io/tuist/tuist-runner:${PROFILE}"
          echo "Pushed ghcr.io/tuist/tuist-runner:${PROFILE}-${VERSION} + :${PROFILE}"

      - name: Cleanup
        if: always()
        run: tart delete tuist-runner 2>/dev/null || true

  release-runner-image:
    # Post-job: every profile is now in GHCR. Resolve the default
    # profile's digest, update the chart pin, generate release notes
    # + CHANGELOG, upload artifacts. Lightweight, runs on ubuntu.
    # Downstream `release-*` jobs key off this job's outputs + result.
    name: Release runner image
    needs: [check-releases, runner-image-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
      profile: ${{ steps.digest.outputs.profile }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"

      # Resolve the default profile's digest from GHCR. The matrix
      # job published it; we look it up here because matrix outputs
      # don't aggregate cleanly into a sibling job's `needs.*.outputs`.
      - uses: imjasonh/setup-crane@v0.4
      - name: Log in to GHCR (crane)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io
      - name: Resolve default profile + digest
        # Single declaration of which profile is the default — the
        # chart pin tracks its digest. Keep in sync with the first
        # matrix entry in runner-image-build above (dots → dashes).
        id: digest
        run: |
          set -euo pipefail
          DEFAULT="macos-26-5"
          DIGEST=$(crane digest "ghcr.io/tuist/tuist-runner:${DEFAULT}")
          echo "Default profile: ${DEFAULT} digest: ${DIGEST}"
          echo "profile=${DEFAULT}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/runner-image/**/*" )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/runner-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/runner-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/runner-image
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/runner-image/**/*" )

          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Bump runner image digest pin in chart values
        run: |
          # The runner image digest pin lives in each managed env's
          # values file under runnersFleet.runnerImage. Anchor the
          # substitution to the runnerImage line so we only touch
          # that one (the values files carry several image refs).
          # GNU sed (-i without an argument) — this job runs on
          # ubuntu, unlike the previous BSD-sed-style `sed -i ''`.
          DIGEST="${{ steps.digest.outputs.digest }}"
          for f in \
            infra/helm/tuist/values-managed-staging.yaml \
            infra/helm/tuist/values-managed-canary.yaml \
            infra/helm/tuist/values-managed-production.yaml; do
            # Only rewrite if the file already has a non-empty pin to
            # the runner image — values-managed-{canary,production}.yaml
            # ship with `runnerImage: ""` until those envs are flipped
            # on, and we don't want to populate them silently from the
            # release flow. The match accepts both pin styles the chart
            # has used: a digest (`@sha256:...`) and a tag (`:<short-sha>`
            # or `:<semver>`). Staging is on `:08e66c9b` during bring-up;
            # narrowing the guard to `@sha256:` would skip it on every
            # release and leave the only enabled env on the previous
            # image.
            if grep -qE '^\s*runnerImage:\s*"ghcr\.io/tuist/tuist-runner[@:]' "$f"; then
              sed -i -E "s|^([[:space:]]*runnerImage:[[:space:]]*\")ghcr\.io/tuist/tuist-runner[@:][^\"]*(\".*)|\1ghcr.io/tuist/tuist-runner@${DIGEST}\2|" "$f"
            fi
          done

      - name: Upload runner-image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runner-image-artifacts
          path: |
            infra/runner-image/CHANGELOG.md
            infra/helm/tuist/values-managed-staging.yaml
            infra/helm/tuist/values-managed-canary.yaml
            infra/helm/tuist/values-managed-production.yaml
          retention-days: 1

  release-linux-runner-image:
    name: Release Linux runner image
    needs: check-releases
    if: needs.check-releases.outputs.linux-runner-image-should-release == 'true'
    # TODO: migrate to tuist-production-linux once the runner image ships
    # a docker daemon — buildx requires a working docker engine.
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
          cache: "true"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^linux-runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/linux-runner-image/**/*" )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/linux-runner-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/linux-runner-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/linux-runner-image
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^linux-runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/linux-runner-image/**/*" )

          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: infra/linux-runner-image
          file: infra/linux-runner-image/Dockerfile
          # Linux runners run on Hetzner bare-metal x86 nodes at v1.
          # arm64 is a future option and can land as an additive
          # `platforms:` entry.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/tuist/tuist-linux-runner:${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}
            ghcr.io/tuist/tuist-linux-runner:latest

      - name: Bump linux runner image digest pin in chart values
        run: |
          # The linux runner image digest pin lives in each managed
          # env's values file under runnersFleetLinux.pools[].runnerImage.
          # Anchor the substitution to `tuist-linux-runner` so we
          # don't touch the macOS `tuist-runner` pin on the same line
          # shape under `runnersFleet`. The digest comes from the
          # build-push-action's own output — no second registry round
          # trip via crane needed.
          DIGEST="${{ steps.build.outputs.digest }}"
          for f in \
            infra/helm/tuist/values-managed-staging.yaml \
            infra/helm/tuist/values-managed-canary.yaml \
            infra/helm/tuist/values-managed-production.yaml; do
            # Only rewrite if the file already has a non-empty pin to
            # the Linux runner image. canary/production ship with
            # `runnerImage: ""` until those envs are flipped on, and
            # we don't want to populate them silently from the release
            # flow. The match accepts both pin styles the chart has
            # used: a digest (`@sha256:...`) and a tag (`:<short-sha>`
            # or `:<semver>`).
            if grep -qE '^\s*runnerImage:\s*"ghcr\.io/tuist/tuist-linux-runner[@:]' "$f"; then
              sed -i -E "s|^([[:space:]]*runnerImage:[[:space:]]*\")ghcr\.io/tuist/tuist-linux-runner[@:][^\"]*(\".*)|\1ghcr.io/tuist/tuist-linux-runner@${DIGEST}\2|" "$f"
            fi
          done

      - name: Upload linux-runner-image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-runner-image-artifacts
          path: |
            infra/linux-runner-image/CHANGELOG.md
            infra/helm/tuist/values-managed-staging.yaml
            infra/helm/tuist/values-managed-canary.yaml
            infra/helm/tuist/values-managed-production.yaml
          retention-days: 1

  commit-and-release:
    name: Commit and Release
    needs:
      [
        check-releases,
        release-cli,
        release-cli-linux,
        release-app,
        release-ios,
        release-android,
        release-server,
        release-cache,
        release-kura-prepare,
        release-kura-binaries,
        release-kura-docker,
        release-gradle,
        release-skills,
        release-noora,
        release-helm,
        release-capi-scaleway,
        release-runners-controller,
        release-hetzner-robot-controller,
        release-xcresult-processor-image,
        release-runner-image,
        release-linux-runner-image,
      ]
    if: |
      always() &&
      needs.check-releases.outputs.should-release-any == 'true'
    runs-on: tuist-production-linux
    timeout-minutes: 30
    concurrency:
      group: commit-and-release-${{ github.run_id }}
      cancel-in-progress: false
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Download CLI artifacts
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts

      - name: Download CLI Linux x86_64 artifacts
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-x86_64-artifacts
          path: build-linux-x86_64

      - name: Download CLI Linux aarch64 artifacts
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-aarch64-artifacts
          path: build-linux-aarch64

      - name: Merge Linux artifacts into build directory
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli-linux.result == 'success'
        run: |
          # Append Linux checksums to main checksum files
          cat build-linux-x86_64/SHASUMS256.txt >> build/SHASUMS256.txt
          cat build-linux-x86_64/SHASUMS512.txt >> build/SHASUMS512.txt
          cat build-linux-aarch64/SHASUMS256.txt >> build/SHASUMS256.txt
          cat build-linux-aarch64/SHASUMS512.txt >> build/SHASUMS512.txt
          # Move Linux tarballs to build directory
          mv build-linux-x86_64/tuist-linux-x86_64.tar.gz build/
          mv build-linux-aarch64/tuist-linux-aarch64.tar.gz build/

      - name: Download App artifacts
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-artifacts
          path: app

      - name: Download Server artifacts
        if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: server-artifacts
          path: server

      - name: Download Cache artifacts
        if: needs.check-releases.outputs.cache-should-release == 'true' && needs.release-cache.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cache-artifacts
          path: cache

      - name: Download Kura release metadata
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-prepare.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-release-metadata
          path: kura

      - name: Download Kura Linux x86_64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-unknown-linux-gnu-artifacts
          path: build-kura/x86_64-unknown-linux-gnu

      - name: Download Kura Linux aarch64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-unknown-linux-gnu-artifacts
          path: build-kura/aarch64-unknown-linux-gnu

      - name: Download Kura macOS x86_64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-apple-darwin-artifacts
          path: build-kura/x86_64-apple-darwin

      - name: Download Kura macOS aarch64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-apple-darwin-artifacts
          path: build-kura/aarch64-apple-darwin

      - name: Merge Kura artifacts into build directory
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        run: |
          mkdir -p build-kura

          : > build-kura/sha256.txt
          : > build-kura/sha512.txt

          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            cat "build-kura/$target/sha256.txt" >> build-kura/sha256.txt
            cat "build-kura/$target/sha512.txt" >> build-kura/sha512.txt
            mv "build-kura/$target"/kura-*.tar.gz build-kura/
          done

      - name: Download Gradle artifacts
        if: needs.check-releases.outputs.gradle-should-release == 'true' && needs.release-gradle.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: gradle-artifacts
          path: gradle

      - name: Download Skills artifacts
        if: needs.check-releases.outputs.skills-should-release == 'true' && needs.release-skills.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: skills-artifacts
          path: skills

      - name: Download Noora artifacts
        if: needs.check-releases.outputs.noora-should-release == 'true' && needs.release-noora.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: noora-artifacts
          path: noora

      - name: Download Helm artifacts
        if: needs.check-releases.outputs.helm-should-release == 'true' && needs.release-helm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: helm-artifacts
          path: infra/helm

      - name: Download CAPI operator artifacts
        # `path:` matches the upload's LCA so CHANGELOG.md lands back at
        # `infra/cluster-api-provider-scaleway-applesilicon/CHANGELOG.md`
        # for the later `git add` to find. upload-artifact@v4 strips the
        # LCA from each entry's archive path, so a workspace-root
        # download would put it at `<workspace>/CHANGELOG.md`.
        if: needs.check-releases.outputs.capi-scaleway-should-release == 'true' && needs.release-capi-scaleway.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: capi-scaleway-artifacts
          path: infra/cluster-api-provider-scaleway-applesilicon

      - name: Download runners-controller artifacts
        # The upload contains only files rooted at
        # `infra/runners-controller`, so download into that directory
        # for the later `git add infra/runners-controller/CHANGELOG.md`.
        if: needs.check-releases.outputs.runners-controller-should-release == 'true' && needs.release-runners-controller.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: runners-controller-artifacts
          path: infra/runners-controller

      - name: Download hetzner-robot-controller artifacts
        # Same shape as runners-controller above — artifact carries
        # only `infra/hetzner-robot-controller/CHANGELOG.md`. The
        # mgmt-cluster Deployment manifest's image pin is rewritten
        # by the chart-bump step below against this job's checkout.
        if: needs.check-releases.outputs.hetzner-robot-controller-should-release == 'true' && needs.release-hetzner-robot-controller.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: hetzner-robot-controller-artifacts
          path: infra/hetzner-robot-controller

      - name: Download xcresult-processor-image artifacts
        if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' && needs.release-xcresult-processor-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: xcresult-processor-image-artifacts
          path: infra/xcresult-processor-image

      - name: Bump chart image pins for released components
        # Single writer for values-managed-common.yaml. Each release-*
        # job pushes its image to ghcr.io and surfaces the new version
        # via check-releases outputs; we apply the corresponding `tag:`
        # bumps here against this job's own checkout. Doing it here
        # (rather than in each release-* job + bundling the file in the
        # artifact) prevents the artifact-extract overwrite that
        # previously dropped capi-scaleway's bump on the floor whenever
        # both capi-scaleway and xcresult-processor-image released in
        # the same run.
        run: |
          if [ "${{ needs.check-releases.outputs.capi-scaleway-should-release }}" == "true" ] && [ "${{ needs.release-capi-scaleway.result }}" == "success" ]; then
            sed -i '/repository: ghcr.io\/tuist\/capi-provider-scaleway-applesilicon/,/tag:/{
              s|tag: "[^"]*"|tag: "${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}"|
            }' infra/helm/tuist/values-managed-common.yaml
          fi
          if [ "${{ needs.check-releases.outputs.runners-controller-should-release }}" == "true" ] && [ "${{ needs.release-runners-controller.result }}" == "success" ]; then
            sed -i '/repository: ghcr.io\/tuist\/tuist-runners-controller/,/tag:/{
              s|tag: "[^"]*"|tag: "${{ needs.check-releases.outputs.runners-controller-next-version-number }}"|
            }' infra/helm/tuist/values-managed-common.yaml
          fi
          if [ "${{ needs.check-releases.outputs.xcresult-processor-image-should-release }}" == "true" ] && [ "${{ needs.release-xcresult-processor-image.result }}" == "success" ]; then
            sed -i '/repository: ghcr.io\/tuist\/tuist-xcresult-processor/,/tag:/{
              s|tag: "[^"]*"|tag: "${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}"|
            }' infra/helm/tuist/values-managed-common.yaml
          fi
          if [ "${{ needs.check-releases.outputs.hetzner-robot-controller-should-release }}" == "true" ] && [ "${{ needs.release-hetzner-robot-controller.result }}" == "success" ]; then
            # The hetzner-robot-controller image pin lives in the
            # mgmt-cluster raw manifest, not in values-managed-common
            # (the controller runs on the mgmt cluster, not on the
            # workload). Anchor the substitution on the
            # `ghcr.io/tuist/tuist-hetzner-robot-controller:` prefix
            # so we don't accidentally rewrite an unrelated line.
            sed -i -E "s|(image: ghcr\.io/tuist/tuist-hetzner-robot-controller):[^\"[:space:]]+|\1:${{ needs.check-releases.outputs.hetzner-robot-controller-next-version-number }}|" \
              infra/k8s/mgmt/hetzner-robot-controller.yaml
          fi

      - name: Download runner-image artifacts
        # The artifact's least-common archive root is `infra`, covering
        # both runner-image/CHANGELOG.md and helm/tuist values files.
        if: needs.check-releases.outputs.runner-image-should-release == 'true' && needs.release-runner-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: runner-image-artifacts
          path: infra

      - name: Download linux-runner-image artifacts
        # Same `infra` root as runner-image above: the artifact carries
        # linux-runner-image/CHANGELOG.md and helm/tuist values files.
        if: needs.check-releases.outputs.linux-runner-image-should-release == 'true' && needs.release-linux-runner-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-runner-image-artifacts
          path: infra

      - name: Create tags for successfully released components
        run: |
          # Create tags for successfully released components
          if [ "${{ needs.check-releases.outputs.cli-should-release }}" == "true" ] && [ "${{ needs.release-cli.result }}" == "success" ] && [ "${{ needs.release-cli-linux.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.cli-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.app-should-release }}" == "true" ] && [ "${{ needs.release-app.result }}" == "success" ] && [ "${{ needs.release-ios.result }}" == "success" ] && [ "${{ needs.release-android.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.app-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.server-should-release }}" == "true" ] && [ "${{ needs.release-server.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.server-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.cache-should-release }}" == "true" ] && [ "${{ needs.release-cache.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.cache-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.skills-should-release }}" == "true" ] && [ "${{ needs.release-skills.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.skills-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.noora-should-release }}" == "true" ] && [ "${{ needs.release-noora.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.noora-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.helm-should-release }}" == "true" ] && [ "${{ needs.release-helm.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.helm-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.capi-scaleway-should-release }}" == "true" ] && [ "${{ needs.release-capi-scaleway.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.capi-scaleway-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.runners-controller-should-release }}" == "true" ] && [ "${{ needs.release-runners-controller.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.runners-controller-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.hetzner-robot-controller-should-release }}" == "true" ] && [ "${{ needs.release-hetzner-robot-controller.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.hetzner-robot-controller-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.xcresult-processor-image-should-release }}" == "true" ] && [ "${{ needs.release-xcresult-processor-image.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.runner-image-should-release }}" == "true" ] && [ "${{ needs.release-runner-image.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.runner-image-next-version }}
          fi
          if [ "${{ needs.check-releases.outputs.linux-runner-image-should-release }}" == "true" ] && [ "${{ needs.release-linux-runner-image.result }}" == "success" ]; then
            git tag ${{ needs.check-releases.outputs.linux-runner-image-next-version }}
          fi

      - name: Create CLI GitHub Release
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success' && needs.release-cli-linux.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: CLI ${{ needs.check-releases.outputs.cli-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.cli-next-version }}
          body: ${{ needs.release-cli.outputs.release-notes }}
          files: |
            build/tuist.zip
            build/tuist-linux-x86_64.tar.gz
            build/tuist-linux-aarch64.tar.gz
            build/SHASUMS256.txt
            build/SHASUMS512.txt
            build/ProjectDescription.xcframework.zip
            build/tuist.spec.json

      - name: Update mise.lock
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success' && needs.release-cli-linux.result == 'success'
        run: mise lock tuist --platform linux-x64,macos-arm64,macos-x64

      - name: Create App GitHub Release
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success' && needs.release-ios.result == 'success' && needs.release-android.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: App ${{ needs.check-releases.outputs.app-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.app-next-version }}
          body: ${{ needs.release-app.outputs.release-notes }}
          files: |
            app/build/artifacts/SHASUMS256.txt
            app/build/artifacts/SHASUMS512.txt
            app/build/artifacts/Tuist.dmg

      - name: Create Server GitHub Release
        if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Server ${{ needs.check-releases.outputs.server-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.server-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist:${{ needs.check-releases.outputs.server-next-version-number }}`

            ${{ needs.release-server.outputs.release-notes }}

      - name: Create Cache GitHub Release
        if: needs.check-releases.outputs.cache-should-release == 'true' && needs.release-cache.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Cache ${{ needs.check-releases.outputs.cache-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.cache-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/cache:${{ needs.check-releases.outputs.cache-next-version-number }}`

            ${{ needs.release-cache.outputs.release-notes }}

      - name: Create Skills GitHub Release
        if: needs.check-releases.outputs.skills-should-release == 'true' && needs.release-skills.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Skills ${{ needs.check-releases.outputs.skills-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.skills-next-version }}
          body: |
            GitHub: https://github.com/tuist/agent-skills/releases/tag/${{ needs.check-releases.outputs.skills-next-version-number }}

            ${{ needs.release-skills.outputs.release-notes }}

      - name: Create Noora GitHub Release
        if: needs.check-releases.outputs.noora-should-release == 'true' && needs.release-noora.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Noora ${{ needs.check-releases.outputs.noora-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.noora-next-version }}
          body: |
            hex.pm: https://hex.pm/packages/noora/${{ needs.check-releases.outputs.noora-next-version-number }}

            ${{ needs.release-noora.outputs.release-notes }}

      - name: Create Helm GitHub Release
        if: needs.check-releases.outputs.helm-should-release == 'true' && needs.release-helm.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Helm Chart ${{ needs.check-releases.outputs.helm-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.helm-next-version }}
          body: |
            OCI registry: `oci://ghcr.io/tuist/charts/tuist:${{ needs.check-releases.outputs.helm-next-version-number }}`

            ${{ needs.release-helm.outputs.release-notes }}

      - name: Create CAPI Scaleway GitHub Release
        if: needs.check-releases.outputs.capi-scaleway-should-release == 'true' && needs.release-capi-scaleway.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: CAPI Scaleway ${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.capi-scaleway-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/capi-provider-scaleway-applesilicon:${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}`

            ${{ needs.release-capi-scaleway.outputs.release-notes }}

      - name: Create runners-controller GitHub Release
        if: needs.check-releases.outputs.runners-controller-should-release == 'true' && needs.release-runners-controller.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Runners Controller ${{ needs.check-releases.outputs.runners-controller-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.runners-controller-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-runners-controller:${{ needs.check-releases.outputs.runners-controller-next-version-number }}`

            ${{ needs.release-runners-controller.outputs.release-notes }}

      - name: Create hetzner-robot-controller GitHub Release
        if: needs.check-releases.outputs.hetzner-robot-controller-should-release == 'true' && needs.release-hetzner-robot-controller.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Hetzner Robot Controller ${{ needs.check-releases.outputs.hetzner-robot-controller-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.hetzner-robot-controller-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-hetzner-robot-controller:${{ needs.check-releases.outputs.hetzner-robot-controller-next-version-number }}`

            ${{ needs.release-hetzner-robot-controller.outputs.release-notes }}

      - name: Create xcresult-processor-image GitHub Release
        if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' && needs.release-xcresult-processor-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: xcresult Processor ${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}
          body: |
            Tart image: `ghcr.io/tuist/tuist-xcresult-processor:${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}`

            ${{ needs.release-xcresult-processor-image.outputs.release-notes }}

      - name: Create runner-image GitHub Release
        if: needs.check-releases.outputs.runner-image-should-release == 'true' && needs.release-runner-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Runner Image ${{ needs.check-releases.outputs.runner-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.runner-image-next-version }}
          body: |
            Tart image: `ghcr.io/tuist/tuist-runner:${{ needs.release-runner-image.outputs.profile }}-${{ needs.check-releases.outputs.runner-image-next-version-number }}`
            Digest: `ghcr.io/tuist/tuist-runner@${{ needs.release-runner-image.outputs.digest }}`

            ${{ needs.release-runner-image.outputs.release-notes }}

      - name: Create linux-runner-image GitHub Release
        if: needs.check-releases.outputs.linux-runner-image-should-release == 'true' && needs.release-linux-runner-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Linux Runner Image ${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.linux-runner-image-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-linux-runner:${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}`

            ${{ needs.release-linux-runner-image.outputs.release-notes }}

      - name: Trigger Homebrew Formula Update
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success' && needs.release-cli-linux.result == 'success'
        run: |
          SHA256=$(cat build/SHASUMS256.txt | grep tuist.zip | awk '{print $1}')
          mise run --no-deps cli:release:homebrew-formula --version "${{ needs.check-releases.outputs.cli-next-version }}" --github-token "${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}" --sha256 "$SHA256"

      - name: Trigger Homebrew Cask Update
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success' && needs.release-ios.result == 'success' && needs.release-android.result == 'success'
        run: |
          SHA256=$(cat app/build/artifacts/SHASUMS256.txt | grep Tuist.dmg | awk '{print $1}')
          mise run --no-deps app:release:homebrew-cask --version "${{ needs.check-releases.outputs.app-next-version-number }}" --github-token "${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}" --sha256 "$SHA256"

      - name: Commit all changes and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Track if any files were added
          FILES_ADDED=false

          # Add files from each component that was released
          if [ "${{ needs.check-releases.outputs.cli-should-release }}" == "true" ] && [ "${{ needs.release-cli.result }}" == "success" ] && [ "${{ needs.release-cli-linux.result }}" == "success" ]; then
            git add cli/CHANGELOG.md cli/Sources/TuistConstants/Constants.swift mise.toml mise.lock
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.app-should-release }}" == "true" ] && [ "${{ needs.release-app.result }}" == "success" ] && [ "${{ needs.release-ios.result }}" == "success" ] && [ "${{ needs.release-android.result }}" == "success" ]; then
            git add app/CHANGELOG.md app/Project.swift app/appcast.xml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.server-should-release }}" == "true" ] && [ "${{ needs.release-server.result }}" == "success" ]; then
            git add server/CHANGELOG.md
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.cache-should-release }}" == "true" ] && [ "${{ needs.release-cache.result }}" == "success" ]; then
            git add cache/CHANGELOG.md
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.kura-should-release }}" == "true" ] && [ "${{ needs.release-kura-prepare.result }}" == "success" ]; then
            git add kura/CHANGELOG.md kura/Cargo.toml kura/Cargo.lock
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.gradle-should-release }}" == "true" ] && [ "${{ needs.release-gradle.result }}" == "success" ]; then
            sed -i 's/public static let gradlePluginVersion = ".*"/public static let gradlePluginVersion = "${{ needs.check-releases.outputs.gradle-next-version-number }}"/' cli/Sources/TuistConstants/Constants.swift
            sed -i 's/id("dev.tuist") version ".*"/id("dev.tuist") version "${{ needs.check-releases.outputs.gradle-next-version-number }}"/' android/settings.gradle.kts
            git add gradle/CHANGELOG.md
            git add gradle/settings.gradle.kts
            git add gradle/src/main/kotlin/dev/tuist/gradle/TuistBuildCache.kt || true
            git add cli/Sources/TuistConstants/Constants.swift
            git add android/settings.gradle.kts
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.skills-should-release }}" == "true" ] && [ "${{ needs.release-skills.result }}" == "success" ]; then
            git add skills/CHANGELOG.md
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.noora-should-release }}" == "true" ] && [ "${{ needs.release-noora.result }}" == "success" ]; then
            git add noora/CHANGELOG.md noora/mix.exs
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.helm-should-release }}" == "true" ] && [ "${{ needs.release-helm.result }}" == "success" ]; then
            git add infra/helm/CHANGELOG.md infra/helm/tuist/Chart.yaml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.capi-scaleway-should-release }}" == "true" ] && [ "${{ needs.release-capi-scaleway.result }}" == "success" ]; then
            git add infra/cluster-api-provider-scaleway-applesilicon/CHANGELOG.md infra/helm/tuist/values-managed-common.yaml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.runners-controller-should-release }}" == "true" ] && [ "${{ needs.release-runners-controller.result }}" == "success" ]; then
            git add infra/runners-controller/CHANGELOG.md infra/helm/tuist/values-managed-common.yaml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.hetzner-robot-controller-should-release }}" == "true" ] && [ "${{ needs.release-hetzner-robot-controller.result }}" == "success" ]; then
            # The hetzner-robot-controller image pin lives on the
            # mgmt-cluster raw manifest, not values-managed-common,
            # because the controller runs on the mgmt cluster (not
            # alongside the Tuist server).
            git add \
              infra/hetzner-robot-controller/CHANGELOG.md \
              infra/k8s/mgmt/hetzner-robot-controller.yaml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.xcresult-processor-image-should-release }}" == "true" ] && [ "${{ needs.release-xcresult-processor-image.result }}" == "success" ]; then
            git add infra/xcresult-processor-image/CHANGELOG.md infra/helm/tuist/values-managed-common.yaml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.runner-image-should-release }}" == "true" ] && [ "${{ needs.release-runner-image.result }}" == "success" ]; then
            # The runner-image release rewrites only the values files
            # whose runnerImage line already carries a digest pin
            # (today: staging). canary/production stay empty until
            # those envs flip on, at which point the digest is set
            # by hand and subsequent releases auto-bump it.
            git add \
              infra/runner-image/CHANGELOG.md \
              infra/helm/tuist/values-managed-staging.yaml \
              infra/helm/tuist/values-managed-canary.yaml \
              infra/helm/tuist/values-managed-production.yaml
            FILES_ADDED=true
          fi

          if [ "${{ needs.check-releases.outputs.linux-runner-image-should-release }}" == "true" ] && [ "${{ needs.release-linux-runner-image.result }}" == "success" ]; then
            # Same shape as the macOS runner-image stage above: only
            # the env files whose runnersFleetLinux.pools[].runnerImage
            # already carries a non-empty pin (today: staging) get
            # rewritten. canary/production come online once those envs
            # have their pin seeded.
            git add \
              infra/linux-runner-image/CHANGELOG.md \
              infra/helm/tuist/values-managed-staging.yaml \
              infra/helm/tuist/values-managed-canary.yaml \
              infra/helm/tuist/values-managed-production.yaml
            FILES_ADDED=true
          fi

          # Only commit if files were added
          if [ "$FILES_ADDED" = "true" ]; then
            # Check if there are actually changes to commit
            if ! git diff --cached --quiet; then
              # Create commit message
              COMMIT_MSG="[Release]"
              if [ "${{ needs.check-releases.outputs.cli-should-release }}" == "true" ] && [ "${{ needs.release-cli.result }}" == "success" ] && [ "${{ needs.release-cli-linux.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Tuist CLI ${{ needs.check-releases.outputs.cli-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.app-should-release }}" == "true" ] && [ "${{ needs.release-app.result }}" == "success" ] && [ "${{ needs.release-ios.result }}" == "success" ] && [ "${{ needs.release-android.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Tuist App ${{ needs.check-releases.outputs.app-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.server-should-release }}" == "true" ] && [ "${{ needs.release-server.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Tuist Server ${{ needs.check-releases.outputs.server-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.cache-should-release }}" == "true" ] && [ "${{ needs.release-cache.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Tuist Cache ${{ needs.check-releases.outputs.cache-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.kura-should-release }}" == "true" ] && [ "${{ needs.release-kura-prepare.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Kura ${{ needs.check-releases.outputs.kura-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.gradle-should-release }}" == "true" ] && [ "${{ needs.release-gradle.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Gradle Plugin ${{ needs.check-releases.outputs.gradle-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.skills-should-release }}" == "true" ] && [ "${{ needs.release-skills.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Skills ${{ needs.check-releases.outputs.skills-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.noora-should-release }}" == "true" ] && [ "${{ needs.release-noora.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Noora ${{ needs.check-releases.outputs.noora-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.helm-should-release }}" == "true" ] && [ "${{ needs.release-helm.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Helm Chart ${{ needs.check-releases.outputs.helm-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.capi-scaleway-should-release }}" == "true" ] && [ "${{ needs.release-capi-scaleway.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG CAPI Scaleway ${{ needs.check-releases.outputs.capi-scaleway-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.runners-controller-should-release }}" == "true" ] && [ "${{ needs.release-runners-controller.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Runners Controller ${{ needs.check-releases.outputs.runners-controller-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.hetzner-robot-controller-should-release }}" == "true" ] && [ "${{ needs.release-hetzner-robot-controller.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Hetzner Robot Controller ${{ needs.check-releases.outputs.hetzner-robot-controller-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.xcresult-processor-image-should-release }}" == "true" ] && [ "${{ needs.release-xcresult-processor-image.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG xcresult Processor ${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.runner-image-should-release }}" == "true" ] && [ "${{ needs.release-runner-image.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Runner Image ${{ needs.check-releases.outputs.runner-image-next-version }}"
              fi
              if [ "${{ needs.check-releases.outputs.linux-runner-image-should-release }}" == "true" ] && [ "${{ needs.release-linux-runner-image.result }}" == "success" ]; then
                COMMIT_MSG="$COMMIT_MSG Linux Runner Image ${{ needs.check-releases.outputs.linux-runner-image-next-version }}"
              fi

              git commit -m "$COMMIT_MSG"
            else
              echo "No changes to commit"
            fi
          else
            echo "No components were released, skipping commit"
          fi

          # Push with retry logic
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            if git pull --rebase --autostash origin ${{ github.ref_name }}; then
              if git push origin ${{ github.ref_name }}; then
                echo "Successfully pushed changes"
                break
              fi
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "Failed to push after $max_attempts attempts"
            exit 1
          fi

      - name: Create Kura tag
        if: |
          needs.check-releases.outputs.kura-should-release == 'true' &&
          needs.release-kura-prepare.result == 'success' &&
          needs.release-kura-binaries.result == 'success' &&
          needs.release-kura-docker.result == 'success'
        run: |
          TAG=${{ needs.check-releases.outputs.kura-next-version }}
          SOURCE_SHA=${{ github.sha }}

          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin"
            exit 0
          fi

          git rev-parse --verify "${SOURCE_SHA}^{commit}"
          git tag "$TAG" "$SOURCE_SHA"
          git push origin "refs/tags/$TAG"

      - name: Create Kura GitHub Release
        if: |
          needs.check-releases.outputs.kura-should-release == 'true' &&
          needs.release-kura-prepare.result == 'success' &&
          needs.release-kura-binaries.result == 'success' &&
          needs.release-kura-docker.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Kura ${{ needs.check-releases.outputs.kura-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.kura-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/kura:${{ needs.check-releases.outputs.kura-next-version-number }}`

            ${{ needs.release-kura-prepare.outputs.release-notes }}
          files: |
            build-kura/kura-x86_64-unknown-linux-gnu.tar.gz
            build-kura/kura-aarch64-unknown-linux-gnu.tar.gz
            build-kura/kura-x86_64-apple-darwin.tar.gz
            build-kura/kura-aarch64-apple-darwin.tar.gz
            build-kura/sha256.txt
            build-kura/sha512.txt
