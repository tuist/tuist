  release-xcresult-processor-image:
    name: Release xcresult processor image
    needs: check-releases
    if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true'
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff erlang elixir"
          working_directory: server

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^xcresult-processor-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          INCLUDE_PATHS=(
            --include-path "infra/xcresult-processor-image/**/*"
            --include-path "server/lib/**/*"
            --include-path "server/native/xcresult_nif/**/*"
            --include-path "server/mix.exs"
            --include-path "server/mix.lock"
          )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/xcresult-processor-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/xcresult-processor-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/xcresult-processor-image
        run: |
          INCLUDE_PATHS=(
            --include-path "infra/xcresult-processor-image/**/*"
            --include-path "server/lib/**/*"
            --include-path "server/native/xcresult_nif/**/*"
            --include-path "server/mix.exs"
            --include-path "server/mix.lock"
          )

          git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Build server release for macOS
        id: release
        working-directory: server
        run: |
          set -euo pipefail
          MIX_ENV=prod mix deps.get --only prod
          ./native/xcresult_nif/build.sh
          ./native/xcactivitylog_nif/build.sh
          MIX_ENV=prod mix compile --force --warnings-as-errors
          MIX_ENV=prod mix release tuist --overwrite
          if [ -n "${TUIST_MIX_BUILD_ROOT:-}" ]; then
            RELEASE_DIR="${TUIST_MIX_BUILD_ROOT}/server/prod/rel/tuist"
          else
            RELEASE_DIR="$(pwd)/_build/prod/rel/tuist"
          fi
          echo "dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package release tarball
        run: |
          set -euo pipefail
          tar -czf /tmp/release.tar.gz -C "${{ steps.release.outputs.dir }}" .
          ls -lh /tmp/release.tar.gz

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates with the tuist-bot token. crane writes creds
      # to ~/.docker/config.json, which Tart reads via the Docker
      # credential-helper protocol for both the pull (this build's
      # clone of the base) and the push at the end. See
      # runner-image.yml's matching step for the long explanation.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/xcresult-processor-image
        run: packer init -upgrade xcresult-processor.pkr.hcl

      - uses: ./.github/actions/reclaim-tart-disk

      - name: Build image
        working-directory: infra/xcresult-processor-image
        # The processor parses .xcresult bundles from *all* customer
        # runner profiles, so the Xcode here should be at least as new
        # as the newest active runner-image profile (xcresulttool's
        # JSON schema changes across Xcode majors). Promotion rule:
        # when you bump the first matrix entry in runner-image-build
        # above, bump this too.
        env:
          XCODE_VERSION: "26.5"
        run: |
          set -euo pipefail
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${XCODE_VERSION//./-}"
          echo "Base image: ${BASE_IMAGE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-xcresult-processor" \
            -var "release_tarball=/tmp/release.tar.gz" \
            xcresult-processor.pkr.hcl

      - name: Push image to GHCR
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}"
          tart push tuist-xcresult-processor "ghcr.io/tuist/tuist-xcresult-processor:${VERSION}"
          tart push tuist-xcresult-processor "ghcr.io/tuist/tuist-xcresult-processor:latest"
          echo "Pushed ghcr.io/tuist/tuist-xcresult-processor:${VERSION}"

      - name: Upload xcresult-processor-image artifacts
        uses: actions/upload-artifact@v4
        with:
          # No values file is packaged: the image version is resolved at
          # deploy time from this run's `<component>@<semver>` tag (created
          # by tag-infra-releases), so there is no chart pin to bump.
          name: xcresult-processor-image-artifacts
          path: |
            infra/xcresult-processor-image/CHANGELOG.md
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/release.tar.gz
          tart delete tuist-xcresult-processor 2>/dev/null || true

  runner-image-build:
    # One job per active profile, fanned out across whatever
    # vm-image-builder hosts are available. GitHub schedules them
    # respecting the label set — with 2 builders, 2 profiles build
    # in parallel; adding more hosts scales linearly without any
    # workflow change.
    #
    # The active-profile list is declared inline below. Keep it
    # aligned with `runnersFleet.xcodeVersions` in
    # values-managed-common.yaml — every Xcode that ships a pool
    # needs a runner image published for it, and the post-job reads
    # that file to build the Release notes image list.
    #
    # To refresh an out-of-rotation profile (one not in the matrix),
    # use `gh workflow run runner-image.yml -f xcode_version=26.X.Y` —
    # that path keeps publishing tags without going through the full
    # release flow.
    name: Build runner image (Xcode ${{ matrix.xcode }})
    needs: check-releases
    if: needs.check-releases.outputs.runner-image-should-release == 'true'
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    strategy:
      # If any profile build fails, abort sibling builds so the chart
      # pin doesn't move to a partially-published set.
      fail-fast: true
      matrix:
        xcode: ["26.5", "26.4.1"]
    env:
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TART_REGISTRY_HOSTNAME: ghcr.io
      TART_REGISTRY_USERNAME: tuist-bot
      TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates with the tuist-bot token. `crane auth login`
      # writes creds to ~/.docker/config.json, which Tart reads via
      # the Docker credential-helper protocol for both pull (Packer's
      # clone of the base) and push at the end. See runner-image.yml
      # for the long explanation of why crane and not `tart login`.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      - uses: ./.github/actions/reclaim-tart-disk

      - name: Build profile
        id: build
        working-directory: infra/runner-image
        run: |
          set -euo pipefail
          XCODE="${{ matrix.xcode }}"
          BASE_TAG="${XCODE//./-}"
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
          PROFILE="macos-${BASE_TAG}"
          echo "Building profile ${PROFILE} from base ${BASE_IMAGE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-runner" \
            runner.pkr.hcl
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"

      - name: Restore nvram.bin if missing
        env:
          XCODE: ${{ matrix.xcode }}
        # See `runner-image.yml` for the rationale: packer-plugin-tart
        # v1.20.0 sometimes drops `nvram.bin` from the built bundle,
        # so the subsequent `tart push` fails after a successful disk
        # upload. Restore the file from a fresh clone of the base.
        run: |
          set -euo pipefail
          BUNDLE="$HOME/.tart/vms/tuist-runner"
          echo "pre-push bundle contents:"
          ls -la "$BUNDLE"
          if [ ! -f "$BUNDLE/nvram.bin" ]; then
            BASE_TAG="${XCODE//./-}"
            BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
            echo "nvram.bin missing — restoring from ${BASE_IMAGE}"
            tart delete nvram-restore 2>/dev/null || true
            tart clone "$BASE_IMAGE" nvram-restore
            cp "$HOME/.tart/vms/nvram-restore/nvram.bin" "$BUNDLE/nvram.bin"
            tart delete nvram-restore
            echo "restored nvram.bin ($(du -h "$BUNDLE/nvram.bin" | cut -f1))"
          fi

      - name: Push profile to GHCR
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          # See runner-image.yml's matching step for the rationale —
          # tart's auto-prune races mid-push (cirruslabs/tart#860).
          TART_NO_AUTO_PRUNE: "1"
        # Direct tart push; same shape as `macos-xcode-image.yml`.
        # Push both the immutable per-version tag and the rolling
        # `:<profile>` tag so the chart's tag template stays valid
        # without overrides while operators can still pin to a
        # specific version when they need to roll back. 3× retry per
        # tag — blob uploads are content-addressed so a re-push only
        # re-uploads layers that didn't make it on the previous
        # attempt.
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.runner-image-next-version-number }}"
          PROFILE="${{ steps.build.outputs.profile }}"
          for dest_tag in "${PROFILE}-${VERSION}" "${PROFILE}"; do
            DST="ghcr.io/tuist/tuist-runner:${dest_tag}"
            for attempt in 1 2 3; do
              echo "tart push -> ${dest_tag} attempt ${attempt} at $(date -u +%H:%M:%SZ)" >&2
              if tart push tuist-runner "$DST"; then
                echo "Pushed ${DST} on attempt ${attempt}"
                break
              fi
              if [ "$attempt" = 3 ]; then
                echo "tart push failed three times for ${dest_tag}" >&2
                exit 1
              fi
              echo "tart push attempt ${attempt} failed; sleeping 60s before retry" >&2
              sleep 60
            done
          done

      - name: Cleanup
        if: always()
        run: tart delete tuist-runner 2>/dev/null || true

  release-runner-image:
    # Post-job: every active profile is now in GHCR with a fresh
    # `:macos-<dashes>-<semver>` tag. Bump
    # `runnersFleet.runnerImageSemver` in the managed-env values
    # files so `runner-pool.yaml` re-renders every macOS pool's
    # image in lockstep (one field, all pools refresh). Generate
    # release notes + CHANGELOG, render the image list for the
    # GitHub Release body, upload artifacts. Lightweight, runs on
    # ubuntu. Downstream `release-*` jobs key off this job's
    # outputs + result.
    name: Release runner image
    needs: [check-releases, runner-image-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
      images: ${{ steps.images.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"

      - name: Render active profile image refs
        # `runnersFleet.xcodeVersions` lives in
        # values-managed-common.yaml — the shared catalog every
        # managed env layers `xcodeOverrides` on top of, and the same
        # source `runner-pool.yaml` iterates over. The Release body
        # lists exactly the tags the chart will render pools for.
        # `yq` is preinstalled on ubuntu-latest.
        id: images
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.runner-image-next-version-number }}"
          {
            echo "images<<EOF"
            yq -r '.runnersFleet.xcodeVersions[].xcodeVersion' \
              infra/helm/tuist/values-managed-common.yaml |
              while IFS= read -r v; do
                tag=$(echo "$v" | tr '.' '-')
                echo "- \`ghcr.io/tuist/tuist-runner:macos-${tag}-${VERSION}\`"
              done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get release notes
        id: release-notes
        # Keep these include paths aligned with `runner-image` in
        # `mise/tasks/release/components.json` — the active Xcode
        # manifest is split across the Packer template and the
        # chart's `runnersFleet.xcodeVersions` catalog, and a future
        # commit that only promotes or removes an Xcode version
        # should still trigger a runner-image release.
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=(
            --include-path "infra/runner-image/**/*"
            --include-path "infra/helm/tuist/values-managed-common.yaml"
            --include-path ".github/workflows/release.yml"
          )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/runner-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/runner-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/runner-image
        run: |
          INCLUDE_PATHS=(
            --include-path "infra/runner-image/**/*"
            --include-path "infra/helm/tuist/values-managed-common.yaml"
            --include-path ".github/workflows/release.yml"
          )

          git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.runner-image-next-version }}" -o CHANGELOG.md 2>/dev/null

      # The runner image semver is no longer written into the managed
      # values files. server-deployment.yml resolves it at deploy time
      # from this run's `runner-image@<semver>` tag (created by
      # tag-infra-releases), so there is no pin to commit back to main.

      - name: Upload runner-image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runner-image-artifacts
          path: |
            infra/runner-image/CHANGELOG.md
          retention-days: 1

  release-linux-runner-image:
    name: Release Linux runner image
    needs: check-releases
    if: needs.check-releases.outputs.linux-runner-image-should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
          cache: "true"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^linux-runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/linux-runner-image/**/*" )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/linux-runner-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/linux-runner-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/linux-runner-image
        run: |
          INCLUDE_PATHS=( --include-path "infra/linux-runner-image/**/*" )

          git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.linux-runner-image-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: infra/linux-runner-image
          file: infra/linux-runner-image/Dockerfile
          # Linux runners run on Hetzner bare-metal x86 nodes at v1.
          # arm64 is a future option and can land as an additive
          # `platforms:` entry.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/tuist/tuist-linux-runner:${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}
            ghcr.io/tuist/tuist-linux-runner:latest

      # The Linux runner image is no longer pinned by digest in the
      # managed values files. It is pushed with a `:<semver>` tag above;
      # server-deployment.yml resolves that version at deploy time from
      # this run's `linux-runner-image@<semver>` tag and passes
      # `tuist-linux-runner:<semver>` via --set. No pin is committed back.

      - name: Upload linux-runner-image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-runner-image-artifacts
          path: |
            infra/linux-runner-image/CHANGELOG.md
          retention-days: 1

  publish-releases:
    # Publishes GitHub Releases (which create the component tags via the
    # API), updates the Homebrew formula/cask, and publishes the Sparkle
    # appcast. It no longer commits anything back to main — version files
    # are stamped into the build artifacts by each release job, image
    # versions are resolved at deploy time from tags, and the remaining
    # in-source consumer pins land via Renovate PRs.
    name: Publish releases
    needs:
      [
        check-releases,
        release-cli,
        release-cli-linux,
        release-app,
        release-ios,
        release-android,
        release-server,
        release-server-manifest,
        release-cache,
        release-kura-prepare,
        release-kura-binaries,
        release-kura-docker,
        release-gradle,
        release-skills,
        release-noora,
        release-helm,
        release-capi-scaleway,
        release-runners-controller,
        release-hetzner-robot-controller,
        release-xcresult-processor-image,
        release-runner-image,
        release-linux-runner-image,
      ]
    if: |
      always() &&
      needs.check-releases.outputs.should-release-any == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    concurrency:
      group: publish-releases-${{ github.run_id }}
      cancel-in-progress: false
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Download CLI artifacts
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-artifacts

      - name: Download CLI Linux x86_64 artifacts
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-x86_64-artifacts
          path: build-linux-x86_64

      - name: Download CLI Linux aarch64 artifacts
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-aarch64-artifacts
          path: build-linux-aarch64

      - name: Merge Linux artifacts into build directory
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli-linux.result == 'success'
        run: |
          # Append Linux checksums to main checksum files
          cat build-linux-x86_64/SHASUMS256.txt >> build/SHASUMS256.txt
          cat build-linux-x86_64/SHASUMS512.txt >> build/SHASUMS512.txt
          cat build-linux-aarch64/SHASUMS256.txt >> build/SHASUMS256.txt
          cat build-linux-aarch64/SHASUMS512.txt >> build/SHASUMS512.txt
          # Move Linux tarballs to build directory
          mv build-linux-x86_64/tuist-linux-x86_64.tar.gz build/
          mv build-linux-aarch64/tuist-linux-aarch64.tar.gz build/

      - name: Download App artifacts
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-artifacts
          path: app

      - name: Download Server artifacts
        if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: server-artifacts
          path: server

      - name: Download Cache artifacts
        if: needs.check-releases.outputs.cache-should-release == 'true' && needs.release-cache.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cache-artifacts
          path: cache

      - name: Download Kura release metadata
        if: |
          needs.check-releases.outputs.kura-should-release == 'true' &&
          needs.release-kura-prepare.result == 'success' &&
          needs.release-kura-binaries.result == 'success' &&
          needs.release-kura-docker.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-release-metadata
          path: kura

      - name: Download Kura Linux x86_64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-unknown-linux-gnu-artifacts
          path: build-kura/x86_64-unknown-linux-gnu

      - name: Download Kura Linux aarch64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-unknown-linux-gnu-artifacts
          path: build-kura/aarch64-unknown-linux-gnu

      - name: Download Kura macOS x86_64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-apple-darwin-artifacts
          path: build-kura/x86_64-apple-darwin

      - name: Download Kura macOS aarch64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-apple-darwin-artifacts
          path: build-kura/aarch64-apple-darwin

      - name: Merge Kura artifacts into build directory
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        run: |
          mkdir -p build-kura

          : > build-kura/sha256.txt
          : > build-kura/sha512.txt

          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            cat "build-kura/$target/sha256.txt" >> build-kura/sha256.txt
            cat "build-kura/$target/sha512.txt" >> build-kura/sha512.txt
            mv "build-kura/$target"/kura-*.tar.gz build-kura/
          done

      - name: Download Gradle artifacts
        if: needs.check-releases.outputs.gradle-should-release == 'true' && needs.release-gradle.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: gradle-artifacts
          path: gradle

      - name: Download Skills artifacts
        if: needs.check-releases.outputs.skills-should-release == 'true' && needs.release-skills.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: skills-artifacts
          path: skills

      - name: Download Noora artifacts
        if: needs.check-releases.outputs.noora-should-release == 'true' && needs.release-noora.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: noora-artifacts
          path: noora

      - name: Download Helm artifacts
        if: needs.check-releases.outputs.helm-should-release == 'true' && needs.release-helm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: helm-artifacts
          path: infra/helm

      - name: Download CAPI operator artifacts
        # `path:` matches the upload's LCA so CHANGELOG.md lands back at
        # `infra/cluster-api-provider-scaleway-applesilicon/CHANGELOG.md`
        # for the later `git add` to find. upload-artifact@v4 strips the
        # LCA from each entry's archive path, so a workspace-root
        # download would put it at `<workspace>/CHANGELOG.md`.
        if: needs.check-releases.outputs.capi-scaleway-should-release == 'true' && needs.release-capi-scaleway.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: capi-scaleway-artifacts
          path: infra/cluster-api-provider-scaleway-applesilicon

      - name: Download runners-controller artifacts
        # The upload contains only files rooted at
        # `infra/runners-controller`, so download into that directory
        # for the later `git add infra/runners-controller/CHANGELOG.md`.
        if: needs.check-releases.outputs.runners-controller-should-release == 'true' && needs.release-runners-controller.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: runners-controller-artifacts
          path: infra/runners-controller

      - name: Download hetzner-robot-controller artifacts
        # Same shape as runners-controller above — artifact carries
        # only `infra/hetzner-robot-controller/CHANGELOG.md`. The
        # mgmt-cluster Deployment manifest's image pin is rewritten
        # by the chart-bump step below against this job's checkout.
        if: needs.check-releases.outputs.hetzner-robot-controller-should-release == 'true' && needs.release-hetzner-robot-controller.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: hetzner-robot-controller-artifacts
          path: infra/hetzner-robot-controller

      - name: Download xcresult-processor-image artifacts
        if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' && needs.release-xcresult-processor-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: xcresult-processor-image-artifacts
          path: infra/xcresult-processor-image

      - name: Download runner-image artifacts
        # Carries only runner-image/CHANGELOG.md now; the chart pin is gone.
        if: needs.check-releases.outputs.runner-image-should-release == 'true' && needs.release-runner-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: runner-image-artifacts
          path: infra

      - name: Download linux-runner-image artifacts
        # Carries only linux-runner-image/CHANGELOG.md now; the chart pin is gone.
        if: needs.check-releases.outputs.linux-runner-image-should-release == 'true' && needs.release-linux-runner-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-runner-image-artifacts
          path: infra

      # Component git tags are created by softprops/action-gh-release below
      # (via tag_name, through the GitHub API) for the published components,
      # by gradle's own job, and by tag-infra-releases for the fleet/runtime
      # images. There is no separate local `git tag` + push step any more —
      # nothing in the release path writes to a branch.

      - name: Create CLI GitHub Release
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success' && needs.release-cli-linux.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: CLI ${{ needs.check-releases.outputs.cli-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.cli-next-version }}
          body: ${{ needs.release-cli.outputs.release-notes }}
          files: |
            build/tuist.zip
            build/tuist-linux-x86_64.tar.gz
            build/tuist-linux-aarch64.tar.gz
            build/SHASUMS256.txt
            build/SHASUMS512.txt
            build/ProjectDescription.xcframework.zip
            build/tuist.spec.json


      - name: Create App GitHub Release
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success' && needs.release-ios.result == 'success' && needs.release-android.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: App ${{ needs.check-releases.outputs.app-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.app-next-version }}
          body: ${{ needs.release-app.outputs.release-notes }}
          files: |
            app/build/artifacts/SHASUMS256.txt
            app/build/artifacts/SHASUMS512.txt
            app/build/artifacts/Tuist.dmg

      - name: Publish Sparkle appcast feed
        # The Sparkle feed (app/appcast.xml, generated by release-app) is
        # served from a stable GitHub Release asset (tag `appcast`) that the
        # macOS app's SUFeedURL points at, instead of the committed
        # app/appcast.xml on main. softprops replaces the same-named asset
        # on the existing `appcast` release each app release; make_latest is
        # off so this housekeeping release never shadows the real "latest".
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success' && needs.release-ios.result == 'success' && needs.release-android.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          make_latest: "false"
          repository: tuist/tuist
          name: Sparkle appcast feed
          tag_name: appcast
          body: |
            Sparkle auto-update feed for the Tuist macOS app. The asset on
            this release is the live feed (SUFeedURL); it is overwritten by
            the release pipeline on every app release. Not a product release.
          files: |
            app/appcast.xml

      - name: Create Server GitHub Release
        if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success' && needs.release-server-manifest.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Server ${{ needs.check-releases.outputs.server-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.server-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist:${{ needs.check-releases.outputs.server-next-version-number }}`

            ${{ needs.release-server.outputs.release-notes }}

      - name: Create Cache GitHub Release
        if: needs.check-releases.outputs.cache-should-release == 'true' && needs.release-cache.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Cache ${{ needs.check-releases.outputs.cache-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.cache-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/cache:${{ needs.check-releases.outputs.cache-next-version-number }}`

            ${{ needs.release-cache.outputs.release-notes }}

      - name: Create Skills GitHub Release
        if: needs.check-releases.outputs.skills-should-release == 'true' && needs.release-skills.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Skills ${{ needs.check-releases.outputs.skills-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.skills-next-version }}
          body: |
            GitHub: https://github.com/tuist/agent-skills/releases/tag/${{ needs.check-releases.outputs.skills-next-version-number }}

            ${{ needs.release-skills.outputs.release-notes }}

      - name: Create Noora GitHub Release
        if: needs.check-releases.outputs.noora-should-release == 'true' && needs.release-noora.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Noora ${{ needs.check-releases.outputs.noora-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.noora-next-version }}
          body: |
            hex.pm: https://hex.pm/packages/noora/${{ needs.check-releases.outputs.noora-next-version-number }}

            ${{ needs.release-noora.outputs.release-notes }}

      - name: Create Helm GitHub Release
        if: needs.check-releases.outputs.helm-should-release == 'true' && needs.release-helm.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Helm Chart ${{ needs.check-releases.outputs.helm-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.helm-next-version }}
          body: |
            OCI registries:
            - `oci://ghcr.io/tuist/charts/tuist:${{ needs.check-releases.outputs.helm-next-version-number }}`
            - `oci://ghcr.io/tuist/charts/kura:${{ needs.check-releases.outputs.helm-next-version-number }}`

            ${{ needs.release-helm.outputs.release-notes }}

      - name: Create CAPI Scaleway GitHub Release
        if: needs.check-releases.outputs.capi-scaleway-should-release == 'true' && needs.release-capi-scaleway.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: CAPI Scaleway ${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.capi-scaleway-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/capi-provider-scaleway-applesilicon:${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}`

            ${{ needs.release-capi-scaleway.outputs.release-notes }}

      - name: Create runners-controller GitHub Release
        if: needs.check-releases.outputs.runners-controller-should-release == 'true' && needs.release-runners-controller.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Runners Controller ${{ needs.check-releases.outputs.runners-controller-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.runners-controller-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-runners-controller:${{ needs.check-releases.outputs.runners-controller-next-version-number }}`

            ${{ needs.release-runners-controller.outputs.release-notes }}

      - name: Create hetzner-robot-controller GitHub Release
        if: needs.check-releases.outputs.hetzner-robot-controller-should-release == 'true' && needs.release-hetzner-robot-controller.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Hetzner Robot Controller ${{ needs.check-releases.outputs.hetzner-robot-controller-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.hetzner-robot-controller-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-hetzner-robot-controller:${{ needs.check-releases.outputs.hetzner-robot-controller-next-version-number }}`

            ${{ needs.release-hetzner-robot-controller.outputs.release-notes }}

      - name: Create xcresult-processor-image GitHub Release
        if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' && needs.release-xcresult-processor-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: xcresult Processor ${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}
          body: |
            Tart image: `ghcr.io/tuist/tuist-xcresult-processor:${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}`

            ${{ needs.release-xcresult-processor-image.outputs.release-notes }}

      - name: Create runner-image GitHub Release
        if: needs.check-releases.outputs.runner-image-should-release == 'true' && needs.release-runner-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Runner Image ${{ needs.check-releases.outputs.runner-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.runner-image-next-version }}
          body: |
            Active runner image tags:
            ${{ needs.release-runner-image.outputs.images }}

            ${{ needs.release-runner-image.outputs.release-notes }}

      - name: Create linux-runner-image GitHub Release
        if: needs.check-releases.outputs.linux-runner-image-should-release == 'true' && needs.release-linux-runner-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Linux Runner Image ${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.linux-runner-image-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-linux-runner:${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}`

            ${{ needs.release-linux-runner-image.outputs.release-notes }}

      - name: Trigger Homebrew Formula Update
        if: needs.check-releases.outputs.cli-should-release == 'true' && needs.release-cli.result == 'success' && needs.release-cli-linux.result == 'success'
        run: |
          SHA256=$(cat build/SHASUMS256.txt | grep tuist.zip | awk '{print $1}')
          mise run --no-deps cli:release:homebrew-formula --version "${{ needs.check-releases.outputs.cli-next-version }}" --github-token "${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}" --sha256 "$SHA256"

      - name: Trigger Homebrew Cask Update
        if: needs.check-releases.outputs.app-should-release == 'true' && needs.release-app.result == 'success' && needs.release-ios.result == 'success' && needs.release-android.result == 'success'
        run: |
          SHA256=$(cat app/build/artifacts/SHASUMS256.txt | grep Tuist.dmg | awk '{print $1}')
          mise run --no-deps app:release:homebrew-cask --version "${{ needs.check-releases.outputs.app-next-version-number }}" --github-token "${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}" --sha256 "$SHA256"

      # The release pipeline no longer commits anything back to main.
      # CHANGELOG regeneration and version-file bumps used to be committed
      # here; the build artifacts already embed the right version (each
      # release job stamps it before building), and the release notes live
      # in the GitHub Releases created above. Image versions are resolved
      # at deploy time from the `<component>@<semver>` tags. The remaining
      # in-source consumer pins (mise.toml CLI version, the CLI
      # gradlePluginVersion constant, android's dev.tuist version, the
      # hetzner-robot-controller mgmt manifest image) land via Renovate
      # PRs — see renovate.json. Component tags are pushed by gradle's own
      # job, by softprops/action-gh-release (via tag_name) above, and by
      # the tag-infra-releases job for the fleet/runtime images.

      - name: Create Kura GitHub Release
        if: |
          needs.check-releases.outputs.kura-should-release == 'true' &&
          needs.release-kura-prepare.result == 'success' &&
          needs.release-kura-binaries.result == 'success' &&
          needs.release-kura-docker.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Kura ${{ needs.check-releases.outputs.kura-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.kura-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/kura:${{ needs.check-releases.outputs.kura-next-version-number }}`

            ${{ needs.release-kura-prepare.outputs.release-notes }}
          files: |
            build-kura/kura-x86_64-unknown-linux-gnu.tar.gz
            build-kura/kura-aarch64-unknown-linux-gnu.tar.gz
            build-kura/kura-x86_64-apple-darwin.tar.gz
            build-kura/kura-aarch64-apple-darwin.tar.gz
            build-kura/sha256.txt
            build-kura/sha512.txt

  # --------------------------------------------------------------------------
  # Deploy orchestration. The release pipeline no longer commits image pins
  # back to main; it tags every fleet/runtime image it builds and then
  # dispatches the server production deployment, which resolves those tags at
  # deploy time. This replaces the old "deploy server -> release commits a pin
  # -> server redeploys" double cascade with a single build-then-deploy pass.
  #
  # This pipeline owns the deploy ONLY when a fleet/runtime image is releasing
  # — that deploy must wait for the image build + tag, so it belongs here,
  # downstream of the build. Server / chart / config changes with no fleet
  # image release are deployed by server-deploy-dispatch.yml instead, off this
  # workflow's serialized concurrency lane, so a server deploy never waits
  # behind a CLI/app release build.
  # --------------------------------------------------------------------------
  tag-infra-releases:
    name: Tag fleet and runtime image releases
    needs:
      [
        check-releases,
        release-capi-scaleway,
        release-runners-controller,
        release-xcresult-processor-image,
        release-runner-image,
        release-linux-runner-image,
        release-kura-prepare,
        release-kura-binaries,
        release-kura-docker,
      ]
    # Runs whenever the gate computed, regardless of which (if any) image
    # released; tag_release no-ops the components that didn't.
    if: always() && needs.check-releases.result == 'success'
    runs-on: tuist-linux
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Create and push fleet/runtime component tags
        # server-deployment.yml resolves each image version from these
        # tags at deploy time, so they must exist on origin before the
        # deploy is dispatched. Idempotent: skip a tag that already exists.
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          tag_release() {
            # $1 should-release flag, $2 job result, $3 tag
            [ "$1" = "true" ] || return 0
            if [ "$2" != "success" ]; then
              echo "Skipping $3 (release job result: $2)"
              return 0
            fi
            if git ls-remote --tags --exit-code origin "refs/tags/$3" >/dev/null 2>&1; then
              echo "Tag $3 already exists on origin"
            else
              git tag "$3"
              git push origin "refs/tags/$3"
              echo "Pushed $3"
            fi
          }
          tag_release "${{ needs.check-releases.outputs.capi-scaleway-should-release }}" "${{ needs.release-capi-scaleway.result }}" "${{ needs.check-releases.outputs.capi-scaleway-next-version }}"
          tag_release "${{ needs.check-releases.outputs.runners-controller-should-release }}" "${{ needs.release-runners-controller.result }}" "${{ needs.check-releases.outputs.runners-controller-next-version }}"
          tag_release "${{ needs.check-releases.outputs.xcresult-processor-image-should-release }}" "${{ needs.release-xcresult-processor-image.result }}" "${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}"
          tag_release "${{ needs.check-releases.outputs.runner-image-should-release }}" "${{ needs.release-runner-image.result }}" "${{ needs.check-releases.outputs.runner-image-next-version }}"
          tag_release "${{ needs.check-releases.outputs.linux-runner-image-should-release }}" "${{ needs.release-linux-runner-image.result }}" "${{ needs.check-releases.outputs.linux-runner-image-next-version }}"
          # Kura gates on the full prepare/binaries/docker chain, like the
          # old commit-and-release "Create Kura tag" step did.
          KURA_RESULT=skipped
          if [ "${{ needs.release-kura-prepare.result }}" = "success" ] && [ "${{ needs.release-kura-binaries.result }}" = "success" ] && [ "${{ needs.release-kura-docker.result }}" = "success" ]; then
            KURA_RESULT=success
          fi
          tag_release "${{ needs.check-releases.outputs.kura-should-release }}" "$KURA_RESULT" "${{ needs.check-releases.outputs.kura-next-version }}"

  trigger-deploy:
    name: Trigger server production deployment
    needs: [check-releases, tag-infra-releases]
    # Owns the deploy ONLY when a fleet/runtime image released this run, so
    # the new image ships with the server in this same pass (the deploy must
    # wait for the build + tag, which is why it lives here downstream of
    # tag-infra-releases). Server / chart / config changes with no fleet
    # image release are handled by server-deploy-dispatch.yml off this
    # workflow's serialized lane. The two are mutually exclusive — no push
    # deploys twice or is skipped.
    if: >-
      always() &&
      needs.check-releases.result == 'success' &&
      needs.tag-infra-releases.result == 'success' &&
      (
        needs.check-releases.outputs.runner-image-should-release == 'true' ||
        needs.check-releases.outputs.linux-runner-image-should-release == 'true' ||
        needs.check-releases.outputs.runners-controller-should-release == 'true' ||
        needs.check-releases.outputs.capi-scaleway-should-release == 'true' ||
        needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' ||
        needs.check-releases.outputs.kura-should-release == 'true'
      )
    runs-on: tuist-linux
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      HEAD_MSG: ${{ github.event.head_commit.message }}
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch server production deployment
        # Dispatched as its own workflow run (not a needs edge) so
        # release.yml's concurrency can never interrupt an in-flight
        # helm --atomic deploy. The "(hotfix)" subject convention drives
        # the production fast-path via the dispatch input. HEAD_MSG is
        # passed through the env, never interpolated into the shell, so a
        # commit subject can't break the script.
        run: |
          set -euo pipefail
          HOTFIX=false
          case "$HEAD_MSG" in
            *'(hotfix)'*) HOTFIX=true ;;
          esac
          echo "Dispatching production deployment for ${{ github.sha }} (hotfix=$HOTFIX)"
          gh workflow run server-production-deployment.yml \
            --ref main \
            -f commit_sha="${{ github.sha }}" \
            -f hotfix="$HOTFIX"
