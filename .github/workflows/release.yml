        run: aube run build

      - name: Publish to hex.pm
        working-directory: noora
        run: mix hex.publish --yes --replace
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Upload Noora artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: noora-artifacts
          path: |
            noora/CHANGELOG.md
            noora/mix.exs
          retention-days: 1

  release-helm:
    name: Release Helm Chart
    needs: check-releases
    if: needs.check-releases.outputs.helm-should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
