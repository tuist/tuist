name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  statuses: write
  packages: write

concurrency:
  group: release-workflow-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}
  TUIST_ENABLE_CACHING: "true"
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  check-releases:
    name: Check for releasable changes
    runs-on: tuist-production-linux
    timeout-minutes: 5
    outputs:
      cli-should-release: ${{ steps.check.outputs.cli-should-release }}
      cli-next-version: ${{ steps.check.outputs.cli-next-version }}
      cli-next-version-number: ${{ steps.check.outputs.cli-next-version-number }}
      app-should-release: ${{ steps.check.outputs.app-should-release }}
      app-next-version: ${{ steps.check.outputs.app-next-version }}
      app-next-version-number: ${{ steps.check.outputs.app-next-version-number }}
      server-should-release: ${{ steps.check.outputs.server-should-release }}
      server-next-version: ${{ steps.check.outputs.server-next-version }}
      server-next-version-number: ${{ steps.check.outputs.server-next-version-number }}
      cache-should-release: ${{ steps.check.outputs.cache-should-release }}
      cache-next-version: ${{ steps.check.outputs.cache-next-version }}
      cache-next-version-number: ${{ steps.check.outputs.cache-next-version-number }}
      kura-should-release: ${{ steps.check.outputs.kura-should-release }}
      kura-next-version: ${{ steps.check.outputs.kura-next-version }}
      kura-next-version-number: ${{ steps.check.outputs.kura-next-version-number }}
      gradle-should-release: ${{ steps.check.outputs.gradle-should-release }}
      gradle-next-version: ${{ steps.check.outputs.gradle-next-version }}
      gradle-next-version-number: ${{ steps.check.outputs.gradle-next-version-number }}
      skills-should-release: ${{ steps.check.outputs.skills-should-release }}
      skills-next-version: ${{ steps.check.outputs.skills-next-version }}
      skills-next-version-number: ${{ steps.check.outputs.skills-next-version-number }}
      noora-should-release: ${{ steps.check.outputs.noora-should-release }}
      noora-next-version: ${{ steps.check.outputs.noora-next-version }}
      noora-next-version-number: ${{ steps.check.outputs.noora-next-version-number }}
      helm-should-release: ${{ steps.check.outputs.helm-should-release }}
      helm-next-version: ${{ steps.check.outputs.helm-next-version }}
      helm-next-version-number: ${{ steps.check.outputs.helm-next-version-number }}
      capi-scaleway-should-release: ${{ steps.check.outputs.capi-scaleway-should-release }}
      capi-scaleway-next-version: ${{ steps.check.outputs.capi-scaleway-next-version }}
      capi-scaleway-next-version-number: ${{ steps.check.outputs.capi-scaleway-next-version-number }}
      xcresult-processor-image-should-release: ${{ steps.check.outputs.xcresult-processor-image-should-release }}
      xcresult-processor-image-next-version: ${{ steps.check.outputs.xcresult-processor-image-next-version }}
      xcresult-processor-image-next-version-number: ${{ steps.check.outputs.xcresult-processor-image-next-version-number }}
      runner-image-should-release: ${{ steps.check.outputs.runner-image-should-release }}
      runner-image-next-version: ${{ steps.check.outputs.runner-image-next-version }}
      runner-image-next-version-number: ${{ steps.check.outputs.runner-image-next-version-number }}
      linux-runner-image-should-release: ${{ steps.check.outputs.linux-runner-image-should-release }}
      linux-runner-image-next-version: ${{ steps.check.outputs.linux-runner-image-next-version }}
      linux-runner-image-next-version-number: ${{ steps.check.outputs.linux-runner-image-next-version-number }}
      runners-controller-should-release: ${{ steps.check.outputs.runners-controller-should-release }}
      runners-controller-next-version: ${{ steps.check.outputs.runners-controller-next-version }}
      runners-controller-next-version-number: ${{ steps.check.outputs.runners-controller-next-version-number }}
      hetzner-robot-controller-should-release: ${{ steps.check.outputs.hetzner-robot-controller-should-release }}
      hetzner-robot-controller-next-version: ${{ steps.check.outputs.hetzner-robot-controller-next-version }}
      hetzner-robot-controller-next-version-number: ${{ steps.check.outputs.hetzner-robot-controller-next-version-number }}
      should-release-any: ${{ steps.check.outputs.should-release-any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff jq"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - id: check
        run: mise run release:check

  release-cli:
    name: Release CLI
    needs: check-releases
    if: needs.check-releases.outputs.cli-should-release == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    permissions:
      contents: write
      id-token: write
      pull-requests: read
      statuses: write
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version-releases).app
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist git-cliff 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install Tuist dependencies
        run: tuist install
      - name: Initialize TuistCacheEE submodule
        env:
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
        run: mise run --no-deps cli:ee
      - name: Get release notes
        id: release-notes
        working-directory: cli
        run: |
          # Get the latest CLI version tag dynamically
          LATEST_VERSION=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || echo "0.0.0")
          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          git cliff --include-path "cli/**/*" --include-path ".xcode-version-releases" --include-path "Package.swift" --include-path "Package.resolved" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update version in Constants.swift
        run: |
          sed -i '' -e "s/@TaskLocal public static var version: String! = \".*\"/@TaskLocal public static var version: String! = \"${{ needs.check-releases.outputs.cli-next-version }}\"/" "cli/Sources/TuistConstants/Constants.swift"

      - name: Update CHANGELOG.md
        working-directory: cli
        run: git cliff --include-path "cli/**/*" --include-path ".xcode-version-releases" --include-path "Package.swift" --include-path "Package.resolved" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null

      - name: Bundle CLI
        run: mise run --no-deps cli:bundle
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Update mise.toml
        run: |
          sed -i '' "s/tuist = \".*\"/tuist = \"${{ needs.check-releases.outputs.cli-next-version }}\"/" mise.toml

      - name: Upload CLI artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: cli-artifacts
          path: |
            cli/CHANGELOG.md
            cli/Sources/TuistConstants/Constants.swift
            mise.toml
            build/ProjectDescription.xcframework.zip
            build/tuist.zip
            build/tuist.spec.json
            build/SHASUMS256.txt
            build/SHASUMS512.txt
          retention-days: 1

  release-cli-linux:
    name: Release CLI (Linux ${{ matrix.arch }})
    needs: check-releases
    if: needs.check-releases.outputs.cli-should-release == 'true'
    runs-on: ${{ matrix.runner }}
    container:
      image: swift:6.2
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}

      - name: Update version in Constants.swift
        run: |
          sed -i "s/@TaskLocal public static var version: String! = \".*\"/@TaskLocal public static var version: String! = \"${{ needs.check-releases.outputs.cli-next-version }}\"/" "cli/Sources/TuistConstants/Constants.swift"

      - name: Bundle CLI
        run: ./mise/tasks/cli/bundle-linux.sh

      - name: Upload CLI Linux artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-${{ matrix.arch }}-artifacts
          path: |
            build/tuist-linux-${{ matrix.arch }}.tar.gz
            build/SHASUMS256.txt
            build/SHASUMS512.txt
          retention-days: 1

  release-app:
    name: Release App
    needs: check-releases
    if: needs.check-releases.outputs.app-should-release == 'true'
    runs-on: tuist-macos
    timeout-minutes: 50
    permissions:
      contents: write
      id-token: write
      pull-requests: read
      statuses: write
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Install create-dmg
        run: brew install create-dmg
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist git-cliff 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install dependencies
        run: tuist install

      - name: Get release notes
        id: release-notes
        working-directory: app
        run: |
          # Get the latest app version tag
          LATEST_VERSION=$(git tag -l | grep -E "^app@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "app/**/*" --include-path "mise/tasks/app/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "app/**/*" --include-path "mise/tasks/app/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update version
        working-directory: app
        run: |
          VERSION_NUMBER="${{ needs.check-releases.outputs.app-next-version }}"
          VERSION_NUMBER="${VERSION_NUMBER#app@}"
          sed -i '' -e "s/CFBundleShortVersionString.*/CFBundleShortVersionString\": \"$VERSION_NUMBER\",/g" "Project.swift"
          # +10000 offset ensures build numbers stay above 9127, the last value produced by
          # the previous scheme before github.run_number was adopted (the run counter reset
          # to ~3200 when the workflow was recreated, going below the old high-water mark).
          BUILD_NUMBER=$(( ${{ github.run_number }} + 10000 ))
          sed -i '' -e "s/CFBundleVersion.*/CFBundleVersion\": \"${BUILD_NUMBER}\",/g" "Project.swift"

      - name: Update CHANGELOG.md
        working-directory: app
        run: |
          # Get the latest app version tag
          LATEST_VERSION=$(git tag -l | grep -E "^app@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "app/**/*" --include-path "mise/tasks/app/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff --include-path "app/**/*" --include-path "mise/tasks/app/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Bundle macOS app
        run: mise run --no-deps app:bundle
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Generate Sparkle appcast
        run: op read "op://tuist/Tuist App Private Sparkle Key/credential" | .build/artifacts/sparkle-project.Sparkle/Sparkle/bin/generate_appcast --link https://github.com/tuist/tuist/releases --download-url-prefix https://github.com/tuist/tuist/releases/download/${{ needs.check-releases.outputs.app-next-version }}/Tuist.dmg -o app/appcast.xml app/build/artifacts --ed-key-file -

      - name: Upload App artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts
          path: |
            app/CHANGELOG.md
            app/Project.swift
            app/appcast.xml
            app/build/artifacts/Tuist.zip
            app/build/artifacts/Tuist.dmg
            app/build/artifacts/SHASUMS256.txt
            app/build/artifacts/SHASUMS512.txt
          retention-days: 1

  release-ios:
    name: Release iOS App
    needs: check-releases
    if: needs.check-releases.outputs.app-should-release == 'true'
    runs-on: tuist-macos
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      pull-requests: read
      statuses: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Update version
        working-directory: app
        run: |
          VERSION_NUMBER="${{ needs.check-releases.outputs.app-next-version }}"
          VERSION_NUMBER="${VERSION_NUMBER#app@}"
          sed -i '' -e "s/CFBundleShortVersionString.*/CFBundleShortVersionString\": \"$VERSION_NUMBER\",/g" "Project.swift"
          sed -i '' -e "s/CFBundleVersion.*/CFBundleVersion\": \"${{ github.run_number }}\",/g" "Project.swift"
      - name: Install Tuist dependencies
        run: tuist install
      - name: Generate TuistApp
        run: tuist generate TuistApp --no-binary-cache
      - name: Upload iOS App to App Store Connect
        run: mise run --no-deps app:upload-ios
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  release-android:
    name: Release Android App
    needs: check-releases
    if: needs.check-releases.outputs.app-should-release == 'true'
    runs-on: tuist-production-linux
    timeout-minutes: 30
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "java gradle 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Update version
        working-directory: android
        run: |
          VERSION_NUMBER="${{ needs.check-releases.outputs.app-next-version }}"
          VERSION_NUMBER="${VERSION_NUMBER#app@}"
          sed -i "s/versionCode = .*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION_NUMBER\"/" app/build.gradle.kts

      - name: Setup signing and credentials
        run: |
          op document get "Google Play release.keystore binary" --vault tuist --out-file android/release.keystore
          op read "op://tuist/Google Play release.keystore/sirudpicoo6z2b3rmdtfhcj3aa" --out-file android/service-account.json

      - name: Publish to Google Play
        working-directory: android
        run: |
          export ANDROID_KEYSTORE_PASSWORD=$(op read "op://tuist/Google Play release.keystore/password")
          export ANDROID_KEY_ALIAS=tuist
          export ANDROID_KEY_PASSWORD=$(op read "op://tuist/Google Play release.keystore/password")
          ./gradlew publishReleaseBundle

  release-server:
    name: Release Server
    needs: check-releases
    if: needs.check-releases.outputs.server-should-release == 'true'
    # TODO: migrate to tuist-production-linux once the runner image ships
    # a docker daemon — buildx requires a working docker engine.
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        working-directory: server
        run: |
          # Get the latest server version tag
          LATEST_VERSION=$(git tag -l | grep -E "^server@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "server/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "server/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: server
        run: |
          # Get the latest server version tag
          LATEST_VERSION=$(git tag -l | grep -E "^server@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "server/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff --include-path "server/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          build-args: |
            TUIST_HOSTED=0
            TUIST_VERSION=${{ needs.check-releases.outputs.server-next-version-number }}
            MIX_ENV=prod
            APT_CACHE_BUST=${{ github.sha }}
          tags: |
            ghcr.io/tuist/tuist:${{ needs.check-releases.outputs.server-next-version-number }}
            ghcr.io/tuist/tuist:latest

      - name: Upload Server artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: server-artifacts
          path: |
            server/CHANGELOG.md
          retention-days: 1

  release-cache:
    name: Release Cache
    needs: check-releases
    if: needs.check-releases.outputs.cache-should-release == 'true'
    # TODO: migrate to tuist-production-linux once the runner image ships
    # a docker daemon — buildx requires a working docker engine.
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        working-directory: cache
        run: |
          # Get the latest cache version tag
          LATEST_VERSION=$(git tag -l | grep -E "^cache@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: cache
        run: |
          # Get the latest cache version tag
          LATEST_VERSION=$(git tag -l | grep -E "^cache@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cache/Dockerfile
          push: true
          build-args: |
            CACHE_VERSION=${{ needs.check-releases.outputs.cache-next-version-number }}
            MIX_ENV=prod
          tags: |
            ghcr.io/tuist/cache:${{ needs.check-releases.outputs.cache-next-version-number }}
            ghcr.io/tuist/cache:latest

      - name: Upload Cache artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: cache-artifacts
          path: |
            cache/CHANGELOG.md
          retention-days: 1

  release-kura-prepare:
    name: Release Kura Metadata
    needs: check-releases
    if: needs.check-releases.outputs.kura-should-release == 'true'
    runs-on: tuist-production-linux
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff rust"
          cache: "false"
          working_directory: kura
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        working-directory: kura
        run: |
          # Get the latest kura version tag
          LATEST_VERSION=$(git tag -l | grep -E "^kura@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        working-directory: kura
        run: |
          sed -i '0,/^version = ".*"/s//version = "${{ needs.check-releases.outputs.kura-next-version-number }}"/' Cargo.toml
          env -u RUSTUP_TOOLCHAIN cargo update -w

      - name: Update CHANGELOG.md
        working-directory: kura
        run: |
          # Get the latest kura version tag
          LATEST_VERSION=$(git tag -l | grep -E "^kura@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Upload Kura release metadata
        uses: actions/upload-artifact@v4
        with:
          name: kura-release-metadata
          path: |
            kura/CHANGELOG.md
            kura/Cargo.toml
            kura/Cargo.lock
          retention-days: 1

  release-kura-binaries:
    name: Release Kura Binary (${{ matrix.target }})
    needs: [check-releases, release-kura-prepare]
    if: needs.check-releases.outputs.kura-should-release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: tuist-macos
            target: x86_64-apple-darwin
          - runner: tuist-macos
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
          cache: "false"
          working_directory: kura
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Download Kura release metadata
        uses: actions/download-artifact@v4
        with:
          name: kura-release-metadata
          path: kura

      - name: Build Kura binary
        working-directory: kura
        run: |
          TARGET="${{ matrix.target }}"
          ARTIFACT_DIR="$GITHUB_WORKSPACE/build-kura"
          ARTIFACT_NAME="kura-${TARGET}.tar.gz"

          mkdir -p "$ARTIFACT_DIR"

          env -u RUSTUP_TOOLCHAIN rustup target add "$TARGET"
          env -u RUSTUP_TOOLCHAIN cargo build --release --locked --target "$TARGET"

          tar -C "target/$TARGET/release" -czf "$ARTIFACT_DIR/$ARTIFACT_NAME" kura
          shasum -a 256 "$ARTIFACT_DIR/$ARTIFACT_NAME" | awk '{print $1 "  " FILENAME}' FILENAME="$ARTIFACT_NAME" > "$ARTIFACT_DIR/sha256.txt"
          shasum -a 512 "$ARTIFACT_DIR/$ARTIFACT_NAME" | awk '{print $1 "  " FILENAME}' FILENAME="$ARTIFACT_NAME" > "$ARTIFACT_DIR/sha512.txt"

      - name: Upload Kura binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kura-binary-${{ matrix.target }}-artifacts
          path: |
            build-kura/kura-${{ matrix.target }}.tar.gz
            build-kura/sha256.txt
            build-kura/sha512.txt
          retention-days: 1

  release-kura-docker:
    name: Release Kura Docker Image
    needs: [check-releases, release-kura-prepare]
    if: needs.check-releases.outputs.kura-should-release == 'true'
    # TODO: migrate to tuist-production-linux once the runner image ships
    # a docker daemon — buildx requires a working docker engine.
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Download Kura release metadata
        uses: actions/download-artifact@v4
        with:
          name: kura-release-metadata
          path: kura

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kura
          file: ./kura/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/tuist/kura:${{ needs.check-releases.outputs.kura-next-version-number }}
            ghcr.io/tuist/kura:latest

  release-gradle:
    name: Release Gradle Plugin
    needs: check-releases
    if: needs.check-releases.outputs.gradle-should-release == 'true'
    runs-on: tuist-production-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "java gradle git-cliff 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Get release notes
        id: release-notes
        run: |
          # Get the latest gradle version tag
          LATEST_VERSION=$(git tag -l | grep -E "^gradle@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            RELEASE_NOTES=$(git cliff --config gradle/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2)
          else
            RELEASE_NOTES=$(git cliff --config gradle/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2)
          fi

          if [ -z "$(echo "$RELEASE_NOTES" | tr -d '[:space:]')" ]; then
            echo "Gradle release notes are empty. Refusing to publish a release without notes." >&2
            exit 1
          fi

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: gradle
        run: |
          # Get the latest gradle version tag
          LATEST_VERSION=$(git tag -l | grep -E "^gradle@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "gradle/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null -- ${LATEST_VERSION}..HEAD
          else
            git cliff --include-path "gradle/**/*" --config cliff.toml --repository "../" --bump -o CHANGELOG.md 2>/dev/null
          fi

      - name: Publish to Gradle Plugin Portal
        working-directory: gradle
        run: |
          PUBLISH_KEY=$(op read "op://tuist/GRADLE_PUBLISH_KEY/password")
          PUBLISH_SECRET=$(op read "op://tuist/GRADLE_PUBLISH_SECRET/password")
          ./gradlew publishPlugins -Pversion=${{ needs.check-releases.outputs.gradle-next-version-number }} -Pgradle.publish.key="$PUBLISH_KEY" -Pgradle.publish.secret="$PUBLISH_SECRET"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Update version in settings.gradle.kts
        run: |
          sed -i 's/id("dev.tuist") version ".*"/id("dev.tuist") version "${{ needs.check-releases.outputs.gradle-next-version-number }}"/' gradle/settings.gradle.kts

      - name: Tag Gradle release
        run: |
          TAG=${{ needs.check-releases.outputs.gradle-next-version }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin"
            exit 0
          fi

          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Create Gradle GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          name: Gradle Plugin ${{ needs.check-releases.outputs.gradle-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.gradle-next-version }}
          body: |
            Gradle Plugin Portal: `dev.tuist:${{ needs.check-releases.outputs.gradle-next-version-number }}`

            ${{ steps.release-notes.outputs.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}

      - name: Upload Gradle artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: gradle-artifacts
          path: |
            gradle/CHANGELOG.md
            gradle/settings.gradle.kts
            gradle/src/main/kotlin/dev/tuist/gradle/TuistBuildCache.kt
          retention-days: 1

