      - name: Update CHANGELOG.md
        working-directory: infra/runners-controller
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^runners-controller@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          INCLUDE_PATHS=(
