name: Cache Load Test Requester

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  request:
    name: Request load test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.action == 'created' &&
      contains(github.event.comment.body, '/load-test')
    steps:
      - name: Check team membership
        env:
          GH_TOKEN: ${{ secrets.TUIST_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          AUTHOR="${{ github.event.comment.user.login }}"
          MEMBERSHIP=$(gh api "/orgs/tuist/teams/engineering/memberships/$AUTHOR" --jq '.state' 2>/dev/null || echo "not_found")
          if [ "$MEMBERSHIP" != "active" ]; then
            echo "::error::Only@tuist/engineering members can trigger load tests"
            exit 1
          fi

      - name: Resolve PR details
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.TUIST_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.issue.number }}"

          # Verify this is a PR comment, not an issue comment
          PR_DATA=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER" 2>/dev/null || echo "")
          if [ -z "$PR_DATA" ]; then
            echo "::error::Comment is not on a pull request"
            exit 1
          fi

          PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
          PR_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          HEAD_REPO=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')

          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            echo "::error::Load tests only run on same-repo PRs"
            exit 1
          fi

          MAIN_SHA=$(gh api "/repos/${{ github.repository }}/commits/main" --jq '.sha')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_ref=$PR_REF" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"
          echo "main_sha=$MAIN_SHA" >> "$GITHUB_OUTPUT"

      - name: Update PR comment - queued
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.resolve.outputs.pr_number }}"
          MARKER="<!-- cache-load-test -->"
          BODY="${MARKER}
          ## Cache Load Test

          **Status:** ⏳ Queued
          **PRSHA:** \`${{ steps.resolve.outputs.pr_sha }}\`
          **Workflow:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi

      - name: Trigger load test workflow
        env:
          GH_TOKEN: ${{ secrets.TUIST_GITHUB_TOKEN }}
        run: |
          gh workflow run cache-load-test.yml \
            -f pr_number="${{ steps.resolve.outputs.pr_number }}" \
            -f pr_ref="${{ steps.resolve.outputs.pr_ref }}" \
            -f pr_sha="${{ steps.resolve.outputs.pr_sha }}" \
            -f main_sha="${{ steps.resolve.outputs.main_sha }}"
