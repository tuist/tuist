name: Kura Bazel

# Shadow CI for the Kura Bazel migration (docs/bazel-migration-plan.md, "Shadow ->
# compare -> flip"). Non-gating: it builds and validates the Bazel-produced Linux
# binaries alongside the existing Cargo/Docker release path, without touching it.
#
# `bazel-linux`: each runner builds BOTH Linux arches inside the Debian Bookworm dev
# container: the arch matching the host is native, the other is cross-compiled (Debian
# cross GCC, no QEMU). Running on both an x86_64 and an arm64 runner exercises both cross
# directions of the symmetric toolchains — in particular it gives the arm64-from-x86_64
# cross build (which can't be validated on an Apple-silicon dev machine) a real x86_64 host.
#
# `oci`: builds the runtime OCI image with rules_oci (multi-arch index, no QEMU/Buildx)
# and runs the e2e suite against the native image. Still shadow only — no oci_push.

on:
  push:
    branches:
      - kura-bazel-phase1
      - "kura-bazel-*"
    paths:
      - kura/**
      - .github/workflows/kura-bazel.yml
  workflow_dispatch: {}

# Push-only (plus manual dispatch). We deliberately do NOT add a pull_request trigger:
# while a draft PR is open, a pull_request run would share this concurrency group,
# cancel the push run, then skip itself on the draft guard — so nothing would execute.
# Push runs already surface in the PR's checks, which is all this branch validation needs.

permissions:
  contents: read

concurrency:
  group: kura-bazel-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}

jobs:
  bazel-linux:
    name: Bazel Linux binaries (${{ matrix.host_arch }} host)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            host_arch: x86_64
          - runner: ubuntu-24.04-arm
            host_arch: arm64
    steps:
      - uses: actions/checkout@v4

      # Persist Bazel's disk + repository cache across runs so the native -sys crates
      # (rocksdb/jemalloc/aws-lc/lua) are not recompiled every time. Keyed on the
      # lockfiles, so it survives code-only changes and refreshes when deps move. The
      # cache is saved even when the job fails, so a red run still warms the next one.
      - name: Cache Bazel (disk + repos)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-cache
          key: bazel-linux-${{ matrix.host_arch }}-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock', 'kura/bazel/oci/bookworm_apt.lock.json') }}
          restore-keys: |
            bazel-linux-${{ matrix.host_arch }}-

      # Run Bazel inside the Debian Bookworm dev image (the single source of truth for
      # the toolchain). The runner provides Docker; checkout/upload run on the host
      # (which has node), only the Bazel build runs in the container. The disk/repo cache
      # is mounted in and wired via a CI-only ~/.bazelrc (so local builds are unaffected);
      # the trailing chmod makes the root-written cache readable to actions/cache.
      - name: Build the Bazel dev image (Debian Bookworm + cross GCC)
        run: docker build -f kura/bazel/linux-dev.Dockerfile -t kura-bazel-dev kura

      - name: Cross-build and validate both Linux binaries
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/kura:/workspace/kura" \
            -v "${{ runner.temp }}/bazel-cache:/bazelcache" \
            kura-bazel-dev \
            bash -c 'mkdir -p /bazelcache/disk /bazelcache/repo && printf "common --disk_cache=/bazelcache/disk\ncommon --repository_cache=/bazelcache/repo\n" > /root/.bazelrc && bash bazel/ci-validate.sh; ec=$?; chmod -R a+rX /bazelcache 2>/dev/null || true; exit $ec'

      - name: Upload Bazel-built Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: kura-bazel-linux-from-${{ matrix.host_arch }}
          path: |
            kura/bazel-dist/kura-x86_64
            kura/bazel-dist/kura-aarch64
            kura/bazel-dist/kura-x86_64.sha256
            kura/bazel-dist/kura-aarch64.sha256
          if-no-files-found: error
          retention-days: 7

  # Builds the runtime OCI image with rules_oci (multi-arch index, no QEMU) and runs the
  # e2e suite against it. SHADOW only — no oci_push; production paths are untouched. On
  # the x86_64 runner the native image is loaded and the cluster suite runs against it,
  # exercising the real bookworm runtime (tini/curl/certs) end-to-end.
  oci:
    name: Bazel OCI image + e2e (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "shellspec"
          working_directory: kura
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      # See the bazel-linux job for the caching rationale.
      - name: Cache Bazel (disk + repos)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-cache
          key: bazel-oci-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock', 'kura/bazel/oci/bookworm_apt.lock.json') }}
          restore-keys: |
            bazel-oci-

      - name: Build the Bazel dev image (Debian Bookworm + cross GCC)
        run: docker build -f kura/bazel/linux-dev.Dockerfile -t kura-bazel-dev kura

      - name: Build the OCI image (multi-arch index + native tarball)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/kura:/workspace/kura" \
            -v "${{ runner.temp }}/bazel-cache:/bazelcache" \
            kura-bazel-dev \
            bash -c 'mkdir -p /bazelcache/disk /bazelcache/repo && printf "common --disk_cache=/bazelcache/disk\ncommon --repository_cache=/bazelcache/repo\n" > /root/.bazelrc && bash bazel/ci-oci.sh; ec=$?; chmod -R a+rX /bazelcache 2>/dev/null || true; exit $ec'

      # The native amd64 image runs fine when built cross + loaded (classic or
      # containerd store) + run emulated on a dev machine, but the runner's
      # native load+run fails every binary with ENOENT (missing-loader signature).
      # This step localizes it: engine/store, the tarball's own layer digests
      # (to compare against a cross-built reference), and — decisively — whether
      # the base files actually materialize in the flattened rootfs on the runner.
      - name: Diagnose image load on the runner
        working-directory: kura
        run: |
          set -x
          docker version
          docker info --format 'driver={{.Driver}} version={{.ServerVersion}} storage={{.DriverStatus}}'
          echo "=== tarball entries (manifest + layer blobs) ==="
          tar -tf bazel-dist/kura-oci.tar
          echo "=== tarball manifest.json ==="
          tar -xOf bazel-dist/kura-oci.tar manifest.json
          docker load -i bazel-dist/kura-oci.tar
          docker image inspect kura-bazel:oci --format 'arch={{.Architecture}} os={{.Os}} entrypoint={{.Config.Entrypoint}}'
          echo "=== flattened rootfs: do base + runtime files materialize? ==="
          cid="$(docker create kura-bazel:oci)"
          docker export "$cid" | tar -tf - \
            | grep -E '(^|/)(bin/ls|usr/bin/tini|usr/bin/curl|usr/local/bin/kura)$|ld-linux-x86-64' \
            || echo '!!! base/runtime files NOT present in flattened rootfs !!!'
          docker rm "$cid" >/dev/null

      - name: Smoke-test the image (clean startup via tini)
        run: |
          out="$(docker run --rm kura-bazel:oci 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "invalid configuration" || { echo "image did not start cleanly under tini"; exit 1; }

      - name: Run e2e (cluster_spec) against the Bazel image
        working-directory: kura
        env:
          KURA_IMAGE: kura-bazel:oci
          KURA_E2E_SKIP_BUILD: "1"
        run: mise exec -- shellspec spec/e2e/cluster_spec.sh
