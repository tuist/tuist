name: Server Kura Regional Deployment

# Best-effort rollout of the Kura regional platform/controller layer
# after production has already landed on the main cluster.
#
# This stays separate from Server Production Deployment on purpose:
# regional cluster capacity problems should not flip the main
# production deploy red after the main `tuist` cluster is already
# updated.

on:
  workflow_run:
    workflows:
      - Server Production Deployment
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy (defaults to the triggering run's SHA)
        required: false
      image_tag:
        description: Pre-built image tag to deploy instead of sha-<commit_sha>
        required: false

permissions:
  contents: read

env:
  HELM_CHART_PATH: infra/helm/tuist
  HELM_RELEASE_NAME: tuist
  DEPLOY_SHA: ${{ inputs.commit_sha || github.event.workflow_run.head_sha || github.sha }}
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-production
    concurrency:
      group: server-kura-regionals-production
      cancel-in-progress: false
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "helm kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Resolve image tag
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_IMAGE_TAG:-}" ]; then
            echo "IMAGE_TAG=$INPUT_IMAGE_TAG" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "IMAGE_TAG=sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_ENV"
      - name: Deploy Kura regional controllers
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail

          declare -A kubeconfig_items=(
            ["us-east-1"]="kubeconfig: kura-us-east-1"
            ["us-west-1"]="kubeconfig: kura-us-west-1"
          )
          # Cluster names match the CAPI Cluster CR names in
          # infra/k8s/clusters/cluster-production-us-{east,west}.yaml.
          # They drive external-dns.txtOwnerId and the Hetzner ingress
          # LB annotation set by k8s:install-platform; drifting these
          # values would churn TXT records and rename LBs on every
          # deploy, so they must match what bootstrap-workload uses.
          declare -A cluster_names=(
            ["us-east-1"]="tuist-kura-us-east"
            ["us-west-1"]="tuist-kura-us-west"
          )

          CLOUDFLARE_API_TOKEN="$(op read "op://tuist-k8s-production/cloudflare-tuist-dns/credential")"
          export CLOUDFLARE_API_TOKEN

          for region in us-east-1 us-west-1; do
            kubeconfig="$RUNNER_TEMP/${region}.yaml"
            op document get "${kubeconfig_items[$region]}" \
              --vault "tuist-k8s-production" --output "$kubeconfig"
            chmod 600 "$kubeconfig"

            api="$(KUBECONFIG="$kubeconfig" kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.server}')"
            echo "Deploying Kura controller to $region at $api"
            KUBECONFIG="$kubeconfig" kubectl --request-timeout=10s get --raw /version >/dev/null

            mise -C "$GITHUB_WORKSPACE/infra" run k8s:install-platform \
              "$kubeconfig" "${cluster_names[$region]}"

            KUBECONFIG="$kubeconfig" kubectl apply -f "$HELM_CHART_PATH/crds/"
            KUBECONFIG="$kubeconfig" helm upgrade --install "$HELM_RELEASE_NAME" "$HELM_CHART_PATH" \
              --namespace tuist-kura-controller --create-namespace \
              -f "$HELM_CHART_PATH/values-managed-kura-region.yaml" \
              --set kuraController.image.tag="$IMAGE_TAG" \
              --atomic --timeout 10m --wait
          done
