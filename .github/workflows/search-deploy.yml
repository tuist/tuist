name: Search Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - search/**
      - .github/workflows/search-deploy.yml

concurrency:
  group: search-deploy
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: search

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}
  # Install only this project's tools and stop mise auto-installing the rest of the
  # merged root toolset when `mise run` executes (which would hit the GitHub API).
  MISE_AUTO_INSTALL: "0"

jobs:
  deploy:
    runs-on: tuist-linux
    timeout-minutes: 30
    environment: search-production
    steps:
      - uses: actions/checkout@v4
      - uses: 1password/install-cli-action@v2
      - uses: ./.github/actions/mise-install
        with:
          version: ${{ env.MISE_VERSION }}
          install: "ruby gem:kamal"
          working-directory: search
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mise run deploy
