name: Cache Release

# Releases the Tuist cache service image. Extracted from release.yml: the cache
# is a separate service (deployed by cache-deploy.yml), independent of the
# server, so it gets its own lane and is never queued behind a server deploy.
# Its cache@ tag + GitHub Release used to be created by release.yml's shared
# publish-releases job; that creation moved here so the tag still advances.

on:
  push:
    branches:
      - main
    paths:
      - cache/**
      - mise/tasks/release/components.json
      - .github/workflows/cache-release.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  # Serialize cache publishing through one ref-independent group: it derives
  # the next version from the cache@ tag set and creates a tag, so two runs
  # must never overlap. Queue rather than cancel so an in-flight publish is
  # never torn.
  group: cache-release
  cancel-in-progress: false

env:
  MISE_VERSION: "2026.5.15"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}
  GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}

jobs:
  check:
    name: Check for releasable changes
    runs-on: tuist-linux
    timeout-minutes: 5
    outputs:
      should-release: ${{ steps.check.outputs.cache-should-release }}
      next-version: ${{ steps.check.outputs.cache-next-version }}
      next-version-number: ${{ steps.check.outputs.cache-next-version-number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff jq"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - id: check
        run: mise run --skip-tools release:check cache

  release:
    name: Release Cache
    needs: check
    if: needs.check.outputs.should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        working-directory: cache
        run: |
          # Get the latest cache version tag
          LATEST_VERSION=$(git tag -l | grep -E "^cache@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: cache
        run: git cliff --include-path "cache/**/*" --config cliff.toml --repository "../" --tag "${{ needs.check.outputs.next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cache/Dockerfile
          push: true
          build-args: |
            CACHE_VERSION=${{ needs.check.outputs.next-version-number }}
            MIX_ENV=prod
          tags: |
            ghcr.io/tuist/cache:${{ needs.check.outputs.next-version-number }}
            ghcr.io/tuist/cache:latest

      - name: Create Cache GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Cache ${{ needs.check.outputs.next-version-number }}
          tag_name: ${{ needs.check.outputs.next-version }}
          body: |
            Docker image: `ghcr.io/tuist/cache:${{ needs.check.outputs.next-version-number }}`

            ${{ steps.release-notes.outputs.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
