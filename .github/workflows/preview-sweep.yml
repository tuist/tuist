name: Preview Sweep

# Hourly cleanup pass over the preview cluster. Deletes preview namespaces
# whose `tuist.dev/expires-at` label is in the past — uninstalls the
# release and drops the namespace. Also exposed as workflow_dispatch for
# force-runs (e.g. after manually uninstalling something out-of-band).
#
# No worker-pool scaling here: the preview cluster keeps a fixed worker
# pool (see infra/k8s/clusters/cluster-preview.yaml + the §8.3 step in
# infra/k8s/onboarding.md to activate elastic scaling).
#
# Required GitHub Environment secret (environment: server-k8s-preview):
#   KUBECONFIG  - same secret used by preview-deploy.yml.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    name: Sweep expired previews
    runs-on: tuist-linux
    environment:
      name: server-k8s-preview
    timeout-minutes: 15
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "--locked helm kubectl jq"
          cache: "false"
      - name: Load kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Delete expired preview namespaces
        # We helm-uninstall first so chart hooks (PVC retention etc.) get a
        # chance to run, then drop the namespace. `kubectl delete namespace`
        # is itself a backstop — if helm uninstall fails, the namespace
        # delete cascades through anyway.
        #
        # Namespaces in `state=creating` are skipped: the deploy workflow
        # writes that label before any chart mutation and replaces it with
        # `state=ready` once helm upgrade returns, so the sweep cannot race
        # a partial create.
        run: |
          set -euo pipefail

          NOW=$(date +%s)
          MAPPING=$(kubectl get namespaces -l tuist.dev/preview=true -o json | jq -r '
            .items[] |
            [
              .metadata.name,
              (.metadata.labels["tuist.dev/release"] // ""),
              (.metadata.labels["tuist.dev/expires-at"] // ""),
              (.metadata.labels["tuist.dev/state"] // "")
            ] | @tsv
          ')
          if [ -z "$MAPPING" ]; then
            echo "No preview namespaces found."
            exit 0
          fi
          echo "Found preview namespaces:"
          echo "$MAPPING"

          while IFS=$'\t' read -r NS RELEASE EXP STATE; do
            [ -z "$NS" ] && continue
            if [ -z "$RELEASE" ]; then
              # Strip the `preview-` prefix to get the helm release name.
              RELEASE="${NS#preview-}"
            fi

            if [ "$STATE" = "creating" ]; then
              echo "    Skipping mid-create: $NS"
              continue
            fi

            if [ -z "$EXP" ] || ! [[ "$EXP" =~ ^[0-9]+$ ]]; then
              echo "::warning::namespace $NS has missing/invalid expires-at label; skipping"
              continue
            fi

            if [ "$EXP" -le "$NOW" ]; then
              echo "==> Deleting: $NS (expired $((NOW - EXP))s ago)"
              helm uninstall "$RELEASE" --namespace "$NS" --wait --timeout 5m || true
              # Wait on KuraInstance deletion so the controller can release
              # its public Ingress + cert-manager Certificate before we drop
              # the namespace — orphaned LE leaf certs would otherwise pile
              # up across recreations.
              kubectl -n kura delete kurainstance "${RELEASE}-kura" --ignore-not-found --wait=true --timeout 5m || true
              kubectl delete namespace "$NS" --wait=true --timeout 5m || true
            else
              echo "    Live: $NS (expires in $((EXP - NOW))s)"
            fi
          done <<< "$MAPPING"
