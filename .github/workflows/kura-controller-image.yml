name: Kura Controller Image

on:
  push:
    branches: [main]
    paths:
      - infra/kura-controller/**
      - .github/workflows/kura-controller-image.yml
  pull_request:
    paths:
      - infra/kura-controller/**
      - .github/workflows/kura-controller-image.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/kura-controller

jobs:
  test:
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/kura-controller/go.mod
          cache-dependency-path: infra/kura-controller/go.sum
      - name: Test
        working-directory: infra/kura-controller
        run: go test ./...
      - name: Vet
        working-directory: infra/kura-controller
        run: go vet ./...

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          GIT_SHA="${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${GIT_SHA}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/kura-controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=kura-controller
          cache-to: type=gha,mode=max,scope=kura-controller
