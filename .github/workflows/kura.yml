name: Kura

on:
  push:
    branches:
      - main
    paths:
      - kura/**
      - .github/workflows/kura.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kura/**
      - .github/workflows/kura.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: kura-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kura

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Check formatting
        run: env -u RUSTUP_TOOLCHAIN cargo fmt --check

  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    # The compile gate is a Bazel build that dogfoods Kura as the remote cache. Kura runs as
    # a normal `docker run` container (bazel/ci-kura-cache.sh) so it can be GRACEFULLY stopped
    # (SIGTERM -> RocksDB flush) as the last step before its data dir is snapshotted by
    # actions/cache — the restore/save split persists the action cache across runs. Bazel runs
    # inside the dev image (bazel/linux-dev.Dockerfile, built in-step) because the cross-GCC
    # toolchain is non-hermetic and must match the bookworm runtime; the build command is
    # inlined (no wrapper script). Builds the lib + binary for BOTH Linux arches with
    # warnings-as-errors (the old `cargo check` only checked x86_64); the test target compiles
    # on the runner's native (x86_64) arch only — its test toolchain doesn't resolve when
    # cross-built. The OCI image is intentionally not built here (a different cache keyspace).
    steps:
      - uses: actions/checkout@v4

      # The action cache lives in Kura; persist Kura's data dir. Restore/save split so a red
      # run still warms the next, and so the save happens AFTER Kura is gracefully stopped.
      - name: Restore Kura cache (data dir)
        id: kura-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/kura-data
          key: kura-compile-data-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}
          restore-keys: |
            kura-compile-data-

      # Bazel's repository cache (downloaded crate sources) is not served by Kura's REAPI.
      - name: Cache Bazel repository downloads
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-repo
          key: bazel-repo-compile-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}
          restore-keys: |
            bazel-repo-compile-

      - name: Build the Bazel dev image (Debian Bookworm + cross GCC)
        run: docker build -f bazel/linux-dev.Dockerfile -t kura-bazel-dev .

      - name: Start Kura as the Bazel remote cache
        working-directory: kura
        env:
          KURA_CI_DATA_DIR: ${{ runner.temp }}/kura-data
        run: bash bazel/ci-kura-cache.sh start

      - name: Compile (Bazel, both Linux arches, warnings-as-errors)
        run: |
          docker run --rm \
            --network kura-bazel-ci-net \
            -v "$GITHUB_WORKSPACE/kura:/workspace/kura" \
            -v "${{ runner.temp }}/bazel-repo:/bazelrepo" \
            kura-bazel-dev \
            bash -c '
              mkdir -p /bazelrepo
              {
                echo "common --repository_cache=/bazelrepo"
                echo "common --http_timeout_scaling=8"
                echo "common --remote_cache=grpc://kura-bazel-ci-cache:50051"
                echo "common --remote_instance_name=kura-bazel-ci"
                echo "common --remote_upload_local_results=true"
                echo "common --remote_download_outputs=minimal"
              } > /root/.bazelrc
              ec=0
              # lib + binary for both arches (cross-compile check)
              for platform in //bazel/platforms:linux_x86_64 //bazel/platforms:linux_arm64; do
                bazel build //:kura //:kura_lib -c opt --platforms="$platform" \
                  --@rules_rust//rust/settings:extra_rustc_flags=-Dwarnings || ec=$?
              done
              # test code compiles on the runner (x86_64) arch — its test toolchain only
              # resolves for the native arch, so the test target is not cross-built
              bazel build //:kura_lib_test -c opt --platforms=//bazel/platforms:linux_x86_64 \
                --@rules_rust//rust/settings:extra_rustc_flags=-Dwarnings || ec=$?
              chmod -R a+rX /bazelrepo 2>/dev/null || true
              exit $ec'

      - name: Stop Kura and surface cache errors
        if: always()
        working-directory: kura
        env:
          KURA_CI_DATA_DIR: ${{ runner.temp }}/kura-data
        run: bash bazel/ci-kura-cache.sh stop

      - name: Save Kura cache (data dir)
        if: always() && steps.kura-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/kura-data
          key: kura-compile-data-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Run clippy
        run: env -u RUSTUP_TOOLCHAIN cargo clippy --locked --all-targets -- -D warnings

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    # Tests run via `bazel test //:kura_lib_test` (the rust_test that recompiles kura_lib
    # with --test so the crate's #[cfg(test)] unit tests run). Same Kura-as-remote-cache
    # setup as the `compile` job: Kura runs as a normal `docker run` container so it can be
    # gracefully stopped (SIGTERM -> RocksDB flush) before its data dir is snapshotted by
    # actions/cache. Flags MATCH the compile job's x86_64 leg (-c opt, same platform,
    # -Dwarnings) on purpose: that makes every third-party dep's action key identical, so a
    # fresh tests run reuses compile's warm dep cache (restore-keys falls back to
    # kura-compile-data-) and only the test-crate compile + test run are new work. There are
    # no doctests (rules_rust skips them) and no integration tests under tests/, so this
    # target is a faithful replacement for `cargo test --locked`. Native (x86_64) arch only —
    # the test toolchain doesn't resolve when cross-built.
    steps:
      - uses: actions/checkout@v4

      - name: Restore Kura cache (data dir)
        id: kura-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/kura-data
          key: kura-tests-data-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}
          restore-keys: |
            kura-tests-data-
            kura-compile-data-

      - name: Cache Bazel repository downloads
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-repo
          key: bazel-repo-tests-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}
          restore-keys: |
            bazel-repo-tests-
            bazel-repo-compile-

      - name: Build the Bazel dev image (Debian Bookworm + cross GCC)
        run: docker build -f bazel/linux-dev.Dockerfile -t kura-bazel-dev .

      - name: Start Kura as the Bazel remote cache
        working-directory: kura
        env:
          KURA_CI_DATA_DIR: ${{ runner.temp }}/kura-data
        run: bash bazel/ci-kura-cache.sh start

      - name: Test (Bazel, native arch)
        run: |
          docker run --rm \
            --network kura-bazel-ci-net \
            -v "$GITHUB_WORKSPACE/kura:/workspace/kura" \
            -v "${{ runner.temp }}/bazel-repo:/bazelrepo" \
            kura-bazel-dev \
            bash -c '
              mkdir -p /bazelrepo
              {
                echo "common --repository_cache=/bazelrepo"
                echo "common --http_timeout_scaling=8"
                echo "common --remote_cache=grpc://kura-bazel-ci-cache:50051"
                echo "common --remote_instance_name=kura-bazel-ci"
                echo "common --remote_upload_local_results=true"
                echo "common --remote_download_outputs=minimal"
              } > /root/.bazelrc
              ec=0
              bazel test //:kura_lib_test -c opt --platforms=//bazel/platforms:linux_x86_64 \
                --@rules_rust//rust/settings:extra_rustc_flags=-Dwarnings \
                --test_output=errors || ec=$?
              chmod -R a+rX /bazelrepo 2>/dev/null || true
              exit $ec'

      - name: Stop Kura and surface cache errors
        if: always()
        working-directory: kura
        env:
          KURA_CI_DATA_DIR: ${{ runner.temp }}/kura-data
        run: bash bazel/ci-kura-cache.sh stop

      - name: Save Kura cache (data dir)
        if: always() && steps.kura-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/kura-data
          key: kura-tests-data-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Install cargo-audit
        run: env -u RUSTUP_TOOLCHAIN cargo install cargo-audit --locked

      - name: Audit dependencies
        run: env -u RUSTUP_TOOLCHAIN cargo audit

  e2e-images:
    name: E2E Images
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    # Builds the runtime OCI image with rules_oci (//bazel/oci) — the multi-arch index plus
    # a docker-loadable tarball for the runner's native arch — with no Docker daemon, Buildx,
    # or QEMU, replacing the `docker compose build` of the bookworm Dockerfile. Dogfoods Kura
    # as the Bazel remote cache, same as compile/tests. The OCI build compiles the binary
    # under a rules_oci platform transition (ST-<hash> config), a DIFFERENT action keyspace
    # than the compile/tests jobs' --platforms flag config, so this job keeps its OWN Kura
    # cache namespace (kura-oci-data-) — seeding from compile's cache gives 0 hits. The native
    # tarball is uploaded for the e2e shards to load and run against (KURA_IMAGE + skip-build),
    # so every shard runs the real bookworm runtime (tini/curl/certs). Still no oci_push — the
    # release image flip is a later stage.
    steps:
      - uses: actions/checkout@v4

      - name: Restore Kura cache (data dir)
        id: kura-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/kura-data
          key: kura-oci-data-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock', 'kura/bazel/oci/bookworm_apt.lock.json') }}
          restore-keys: |
            kura-oci-data-

      - name: Cache Bazel repository downloads
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-repo
          key: bazel-repo-oci-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock', 'kura/bazel/oci/bookworm_apt.lock.json') }}
          restore-keys: |
            bazel-repo-oci-

      - name: Build the Bazel dev image (Debian Bookworm + cross GCC)
        run: docker build -f bazel/linux-dev.Dockerfile -t kura-bazel-dev .

      - name: Start Kura as the Bazel remote cache
        working-directory: kura
        env:
          KURA_CI_DATA_DIR: ${{ runner.temp }}/kura-data
        run: bash bazel/ci-kura-cache.sh start

      - name: Build the OCI image (multi-arch index + native tarball)
        run: |
          docker run --rm \
            --network kura-bazel-ci-net \
            -v "$GITHUB_WORKSPACE/kura:/workspace/kura" \
            -v "${{ runner.temp }}/bazel-repo:/bazelrepo" \
            kura-bazel-dev \
            bash -c '
              mkdir -p /bazelrepo
              {
                echo "common --repository_cache=/bazelrepo"
                echo "common --http_timeout_scaling=8"
                echo "common --remote_cache=grpc://kura-bazel-ci-cache:50051"
                echo "common --remote_instance_name=kura-bazel-ci"
                echo "common --remote_upload_local_results=true"
                echo "common --remote_download_outputs=all"
              } > /root/.bazelrc
              bash bazel/ci-oci.sh; ec=$?
              chmod -R a+rX /bazelrepo 2>/dev/null || true
              exit $ec'

      - name: Stop Kura and surface cache errors
        if: always()
        working-directory: kura
        env:
          KURA_CI_DATA_DIR: ${{ runner.temp }}/kura-data
        run: bash bazel/ci-kura-cache.sh stop

      - name: Save Kura cache (data dir)
        if: always() && steps.kura-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/kura-data
          key: kura-oci-data-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock', 'kura/bazel/oci/bookworm_apt.lock.json') }}

      - name: Compress the image tarball
        run: zstd -T0 -o kura-e2e-images.tar.zst bazel-dist/kura-oci.tar

      - uses: actions/upload-artifact@v4
        with:
          name: kura-e2e-images
          path: kura/kura-e2e-images.tar.zst
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: E2E (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: e2e-images
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: cluster
            specs: "spec/e2e/cluster_spec.sh"
          - shard_name: clients
            specs: "spec/e2e/clients_spec.sh"
          - shard_name: discovery-faults-handoff
            specs: "spec/e2e/discovery_spec.sh spec/e2e/faults_spec.sh spec/e2e/handoff_spec.sh"
          - shard_name: extension-mtls
            specs: "spec/e2e/extension_spec.sh spec/e2e/mtls_spec.sh"
    # Runs against the Bazel OCI image built by e2e-images. KURA_IMAGE points every compose
    # service (base + overlay files) at the single loaded image and KURA_E2E_SKIP_BUILD stops
    # compose from rebuilding the Dockerfile — so the per-suite retag dance the Dockerfile
    # path needed is gone. The mise install keeps rust/bazel/buck2: clients_spec drives Bazel
    # and Buck2 as REAPI clients against the cluster.
    env:
      KURA_E2E_SKIP_BUILD: "1"
      KURA_IMAGE: kura-bazel:oci
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust shellspec bazel aqua:facebook/buck2"
          working_directory: kura

      - name: Show Docker tooling
        run: docker compose version

      - uses: actions/download-artifact@v4
        with:
          name: kura-e2e-images
          path: kura/prebuilt-images

      - name: Load the Bazel OCI image
        run: zstd -dc prebuilt-images/kura-e2e-images.tar.zst | docker load

      - name: Run end-to-end suite
        run: shellspec ${{ matrix.specs }}
