name: Kura

on:
  push:
    branches:
      - main
    paths:
      - kura/**
      - .github/workflows/kura.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kura/**
      - .github/workflows/kura.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: kura-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kura

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - name: Restore Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kura/target
          key: kura-rust-${{ runner.os }}-${{ hashFiles('kura/Cargo.lock') }}
          restore-keys: |
            kura-rust-${{ runner.os }}-

      - name: Compile without warnings
        run: RUSTFLAGS="-D warnings" cargo check --locked --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - name: Restore Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kura/target
          key: kura-rust-${{ runner.os }}-${{ hashFiles('kura/Cargo.lock') }}
          restore-keys: |
            kura-rust-${{ runner.os }}-

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - name: Restore Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kura/target
          key: kura-rust-${{ runner.os }}-${{ hashFiles('kura/Cargo.lock') }}
          restore-keys: |
            kura-rust-${{ runner.os }}-

      - name: Run tests
        run: cargo test --locked

  e2e:
    name: E2E (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: cluster
            specs: "spec/e2e/cluster_spec.sh"
          - shard_name: clients
            specs: "spec/e2e/clients_spec.sh"
          - shard_name: discovery-faults-handoff
            specs: "spec/e2e/discovery_spec.sh spec/e2e/faults_spec.sh spec/e2e/handoff_spec.sh"
          - shard_name: extension-mtls
            specs: "spec/e2e/extension_spec.sh spec/e2e/mtls_spec.sh"
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust shellspec bazel aqua:facebook/buck2 node"
          working_directory: kura

      - name: Show Docker tooling
        run: docker compose version

      - name: Prebuild Docker images
        run: docker compose build

      - name: Run end-to-end suite
        run: shellspec ${{ matrix.specs }}
