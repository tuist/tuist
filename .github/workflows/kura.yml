name: Kura

on:
  push:
    branches:
      - main
    paths:
      - kura/**
      - .github/workflows/kura.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kura/**
      - .github/workflows/kura.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: kura-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kura

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          working_directory: kura

      - name: Run unit tests
        run: mise exec -- cargo test

      - name: Show Docker tooling
        run: docker compose version

      - name: Prebuild Docker images
        run: docker compose build

      - name: Run end-to-end suite
        run: mise exec -- shellspec
