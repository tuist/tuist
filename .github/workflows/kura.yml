name: Kura

on:
  push:
    branches:
      - main
    paths:
      - kura/**
      - .github/workflows/kura.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kura/**
      - .github/workflows/kura.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: kura-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kura

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Check formatting
        run: env -u RUSTUP_TOOLCHAIN cargo fmt --check

  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    # Fast guard for the crate_universe pin. Cargo.Bazel.lock is a digest of Cargo.toml +
    # Cargo.lock and must be repinned when they change (or after merging main); otherwise the
    # Bazel jobs fail deep in analysis with "lockfile is out of date for 'crates'".
    # `mise run repin check` runs `bazel query '@crates//:all'` WITHOUT CARGO_BAZEL_REPIN, so a
    # stale pin fails loudly here in ~1 min with an actionable message. It only materializes the
    # @crates repo — no cc toolchain — so it runs on the host (no dev container). Fix: `mise run repin`.
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel"
          working_directory: kura

      - name: Cache Bazel repository downloads
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-repo
          key: bazel-repo-lockfile-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}
          restore-keys: |
            bazel-repo-lockfile-

      - name: Check Cargo.Bazel.lock is up to date
        run: |
          echo "common --repository_cache=${{ runner.temp }}/bazel-repo" >> "$HOME/.bazelrc"
          mise run repin check

  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Compile without warnings
        run: env -u RUSTUP_TOOLCHAIN RUSTFLAGS="-D warnings" cargo check --locked --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Run clippy
        run: env -u RUSTUP_TOOLCHAIN cargo clippy --locked --all-targets -- -D warnings

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Run tests
        run: env -u RUSTUP_TOOLCHAIN cargo test --locked

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Install cargo-audit
        run: env -u RUSTUP_TOOLCHAIN cargo install cargo-audit --locked

      - name: Audit dependencies
        run: env -u RUSTUP_TOOLCHAIN cargo audit

  e2e-images:
    name: E2E Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    env:
      COMPOSE_PROJECT_NAME: kura
    steps:
      - uses: actions/checkout@v4

      - name: Show Docker tooling
        run: docker compose version

      - name: Prebuild Docker images
        run: docker compose build

      - name: Archive Docker images
        run: docker save kura-kura-us kura-kura-eu kura-kura-ap | zstd -T0 -o kura-e2e-images.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: kura-e2e-images
          path: kura/kura-e2e-images.tar.zst
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: E2E (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: e2e-images
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: cluster
            specs: "spec/e2e/cluster_spec.sh"
          - shard_name: clients
            specs: "spec/e2e/clients_spec.sh"
          - shard_name: discovery-faults-handoff
            specs: "spec/e2e/discovery_spec.sh spec/e2e/faults_spec.sh spec/e2e/handoff_spec.sh"
          - shard_name: extension-mtls
            specs: "spec/e2e/extension_spec.sh spec/e2e/mtls_spec.sh"
    env:
      KURA_E2E_SKIP_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust shellspec bazel aqua:facebook/buck2"
          working_directory: kura

      - name: Show Docker tooling
        run: docker compose version

      - uses: actions/download-artifact@v4
        with:
          name: kura-e2e-images
          path: kura/prebuilt-images

      - name: Load prebuilt Docker images
        run: zstd -dc prebuilt-images/kura-e2e-images.tar.zst | docker load

      - name: Retag prebuilt Docker images for every suite project
        run: |
          for project in kura-e2e kura-clients kura-discovery kura-faults kura-handoff kura-extension kura-mtls kura-rollout; do
            for service in kura-us kura-eu kura-ap; do
              docker tag "kura-${service}" "${project}-${service}"
            done
          done

      - name: Run end-to-end suite
        run: shellspec ${{ matrix.specs }}
