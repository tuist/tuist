name: Kura

on:
  push:
    branches:
      - main
    paths:
      - kura/**
      - .github/workflows/kura.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kura/**
      - .github/workflows/kura.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: kura-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kura

env:
  MISE_VERSION: "2026.5.15"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Check formatting
        run: env -u RUSTUP_TOOLCHAIN cargo fmt --check

  bazel-lockfile:
    name: Bazel Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    # Fast guard for the crate_universe pin. Cargo.Bazel.lock is a digest of Cargo.toml +
    # Cargo.lock and must be repinned when they change (or after merging main); otherwise the
    # Bazel jobs fail deep in analysis with "lockfile is out of date for 'crates'".
    # `mise run bazel-repin check` runs `bazel query '@crates//:all'` WITHOUT CARGO_BAZEL_REPIN, so a
    # stale pin fails loudly here in ~1 min with an actionable message. It only materializes the
    # @crates repo — no cc toolchain — so it runs on the host (no dev container). Fix: `mise run bazel-repin`.
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel"
          working_directory: kura

      - name: Cache Bazel repository downloads
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bazel-repo
          key: bazel-repo-lockfile-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}
          restore-keys: |
            bazel-repo-lockfile-

      - name: Check Cargo.Bazel.lock is up to date
        run: |
          echo "common --repository_cache=${{ runner.temp }}/bazel-repo" >> "$HOME/.bazelrc"
          mise run bazel-repin check

  # Split into non-fork (`bazel-compile`) and fork (`bazel-compile-fork`) like
  # gradle.yml / android.yml so only trusted runs get `id-token: write`. GitHub exposes
  # the OIDC token request env whenever that permission is granted, and the fork path
  # skips `tuist auth login` (the only OIDC consumer), so fork executions run with
  # `contents: read` alone.
  bazel-compile:
    name: Bazel Compile
    runs-on: ubuntu-latest
    # A cold Bazel build compiles the -sys crates' C/C++ (rocksdb, aws-lc) from source,
    # unlike `cargo check`, so allow more wall-clock than the cargo compile job.
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    if: |
      (github.event.pull_request.draft == false || github.event_name != 'pull_request') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel tuist"
          working_directory: kura

      # - name: Install C/C++ toolchain for -sys crates (rocksdb/aws-lc bindgen)
      #   run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang cmake pkg-config
      #
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Tuist Bazel setup
        run: tuist bazel setup && cat .bazelrc.tuist

      - name: Compile without warnings
        run: |
          bazel build //:all --define=kura_deny_warnings=true

  bazel-compile-fork:
    name: Bazel Compile Fork
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Fork PRs only: `contents: read`, never `id-token: write`. Skips `tuist auth login`
    # and `tuist bazel setup` (the OIDC consumers) and builds against the local
    # repository/disk caches alone.
    permissions:
      contents: read
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel"
          working_directory: kura

      - name: Cache Bazel repository downloads and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/bazel-repo
            ${{ runner.temp }}/bazel-disk
          key: bazel-compile-fork-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}-${{ github.sha }}
          restore-keys: |
            bazel-compile-fork-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}-
            bazel-compile-fork-

      # - name: Install C/C++ toolchain for -sys crates (rocksdb/aws-lc bindgen)
      #   run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang cmake pkg-config
      #
      - name: Compile without warnings
        run: |
          {
            echo "common --repository_cache=${{ runner.temp }}/bazel-repo"
            echo "build --disk_cache=${{ runner.temp }}/bazel-disk"
          } >> "$HOME/.bazelrc"
          bazel build //:all --define=kura_deny_warnings=true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: --force rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Run clippy
        run: env -u RUSTUP_TOOLCHAIN cargo clippy --locked --all-targets -- -D warnings

  # Split into non-fork (`bazel-test`) and fork (`bazel-test-fork`) for the same
  # reason as bazel-compile: only trusted runs get `id-token: write` and the Tuist
  # remote cache; fork PRs run with `contents: read` and the local cache alone.
  bazel-test:
    name: Bazel Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    if: |
      (github.event.pull_request.draft == false || github.event_name != 'pull_request') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel tuist"
          working_directory: kura

      # - name: Install C/C++ toolchain for -sys crates (rocksdb/aws-lc bindgen)
      #   run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang cmake pkg-config
      #
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Tuist Bazel setup
        run: tuist bazel setup && cat .bazelrc.tuist

      - name: Run tests
        run: bazel test //:all --define=kura_deny_warnings=true --test_output=all

  bazel-test-fork:
    name: Bazel Test Fork
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Fork PRs only: `contents: read`, never `id-token: write`. Skips `tuist auth login`
    # and `tuist bazel setup` (the OIDC consumers) and tests against the local
    # repository/disk caches alone.
    permissions:
      contents: read
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel"
          working_directory: kura

      - name: Cache Bazel repository downloads and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/bazel-repo
            ${{ runner.temp }}/bazel-disk
          key: bazel-test-fork-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}-${{ github.sha }}
          restore-keys: |
            bazel-test-fork-${{ hashFiles('kura/MODULE.bazel.lock', 'kura/Cargo.Bazel.lock') }}-
            bazel-test-fork-

      # - name: Install C/C++ toolchain for -sys crates (rocksdb/aws-lc bindgen)
      #   run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang cmake pkg-config
      #
      - name: Run tests
        run: |
          {
            echo "common --repository_cache=${{ runner.temp }}/bazel-repo"
            echo "build --disk_cache=${{ runner.temp }}/bazel-disk"
          } >> "$HOME/.bazelrc"
          bazel test //:all --define=kura_deny_warnings=true --test_output=all

  # TEMPORARY diagnostic: reproduce the mmap/mincore page-cache-residency check
  # behind the kura mmap test failures on tuist-linux (Kata microVM + virtio-fs)
  # vs ubuntu-latest (native ext4). Prints mincore residency per filesystem on
  # both runners; remove once confirmed.
  mincore-probe:
    name: FS Residency Probe (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    continue-on-error: true
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, tuist-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Build the mincore probe
        run: |
          sudo apt-get update -qq >/dev/null 2>&1 || true
          sudo apt-get install -y -qq --no-install-recommends gcc libc6-dev util-linux >/dev/null 2>&1 || true
          cc -O2 test/mincore_probe.c -o "$RUNNER_TEMP/mincore_probe"

      - name: Probe mincore residency across filesystems
        run: |
          echo "runner=${{ matrix.runner }} kernel=$(uname -r)"
          unshare --version 2>/dev/null | head -1 || echo "unshare unavailable"
          probe="$RUNNER_TEMP/mincore_probe"
          for dir in "$PWD" "${RUNNER_TEMP:-/tmp}" /tmp /dev/shm; do
            [ -d "$dir" ] && [ -w "$dir" ] || continue
            fstype="$(findmnt -no FSTYPE --target "$dir" 2>/dev/null || stat -f -c '%T' "$dir" 2>/dev/null || echo '?')"
            echo "--- dir=$dir fstype=$fstype ---"
            printf '  direct                  : '; "$probe" "$dir" || echo "(err)"
            # Mimic the Bazel linux-sandbox: a new user namespace with an identity
            # uid map (Bazel's default), then with a map-to-root, on the same dir.
            printf '  userns map-current-user : '; unshare --user --map-current-user "$probe" "$dir" 2>&1 || echo "(unshare unsupported)"
            printf '  userns map-root-user    : '; unshare --user --map-root-user "$probe" "$dir" 2>&1 || echo "(unshare unsupported)"
          done

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel"
          working_directory: kura

      - name: Probe inside the Bazel test sandbox
        run: |
          # The definitive test: run the same probe as a cc_test under `bazel test`,
          # so it experiences the exact linux-sandbox the failing kura tests run in
          # and writes to the same $TEST_TMPDIR.
          sudo apt-get install -y -qq --no-install-recommends build-essential >/dev/null 2>&1 || true
          bazel test //test:mincore_probe_test --test_output=all

      - name: Probe with kura's exact Rust mmap code (memmap2 + mincore)
        run: |
          # The faithful reproduction: kura's residency gate, same crates
          # (memmap2 0.9.10 + libc), same scenario as the failing test (a tiny
          # 16-byte file mapped at a sub-page offset). Run per filesystem.
          cd test/mincore_probe_rs
          for dir in "${RUNNER_TEMP:-/tmp}" /tmp "$GITHUB_WORKSPACE"; do
            [ -d "$dir" ] && [ -w "$dir" ] || continue
            fstype="$(findmnt -no FSTYPE --target "$dir" 2>/dev/null || echo '?')"
            echo "### rust probe dir=$dir fstype=$fstype ###"
            cargo run --quiet --release -- "$dir" || echo "(rust probe error)"
          done

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: rust
          working_directory: kura

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kura-rust-${{ runner.os }}
          workspaces: |
            kura -> target

      - name: Install cargo-audit
        run: env -u RUSTUP_TOOLCHAIN cargo install cargo-audit --locked

      - name: Audit dependencies
        run: env -u RUSTUP_TOOLCHAIN cargo audit

  e2e-images:
    name: E2E Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    env:
      COMPOSE_PROJECT_NAME: kura
    steps:
      - uses: actions/checkout@v4

      - name: Show Docker tooling
        run: docker compose version

      - name: Prebuild Docker images
        run: docker compose build

      - name: Archive Docker images
        run: docker save kura-kura-us kura-kura-eu kura-kura-ap | zstd -T0 -o kura-e2e-images.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: kura-e2e-images
          path: kura/kura-e2e-images.tar.zst
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: E2E (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: e2e-images
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: cluster
            specs: "spec/e2e/cluster_spec.sh"
          - shard_name: clients
            specs: "spec/e2e/clients_spec.sh"
          - shard_name: discovery-faults-handoff
            specs: "spec/e2e/discovery_spec.sh spec/e2e/faults_spec.sh spec/e2e/handoff_spec.sh"
          - shard_name: extension-mtls
            specs: "spec/e2e/extension_spec.sh spec/e2e/mtls_spec.sh"
          - shard_name: large-artifact
            specs: "spec/e2e/large_artifact_spec.sh"
          - shard_name: gateway-throughput
            specs: "spec/e2e/grpc_upload_throughput_spec.sh"
            throughput: "1"
    env:
      KURA_E2E_SKIP_BUILD: "1"
      # Empty on normal shards; "1" opts the gateway-throughput spec in (it
      # otherwise skips). Only that shard lists the throughput spec.
      KURA_E2E_THROUGHPUT: ${{ matrix.throughput || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/mise-install
        with:
          version: ${{ env.MISE_VERSION }}
          install: "rust shellspec bazel aqua:facebook/buck2"
          working-directory: kura

      - name: Show Docker tooling
        run: docker compose version

      - uses: actions/download-artifact@v4
        with:
          name: kura-e2e-images
          path: kura/prebuilt-images

      - name: Load prebuilt Docker images
        run: zstd -dc prebuilt-images/kura-e2e-images.tar.zst | docker load

      - name: Retag prebuilt Docker images for every suite project
        run: |
          for project in kura-e2e kura-clients kura-discovery kura-faults kura-handoff kura-extension kura-mtls kura-rollout kura-large-artifact; do
            for service in kura-us kura-eu kura-ap; do
              docker tag "kura-${service}" "${project}-${service}"
            done
          done
          # The gateway-throughput harness defaults to image kura:e2e; reuse the
          # CI-built kura so it runs against the CI version and never rebuilds
          # from source. Harmless extra tag for the other shards.
          docker tag kura-kura-us kura:e2e

      - name: Run end-to-end suite
        run: shellspec ${{ matrix.specs }}
