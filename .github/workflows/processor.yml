name: Processor

on:
  push:
    branches:
      - main
    paths:
      - processor/**
      - tuist_common/**
      - .github/workflows/processor.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - processor/**
      - tuist_common/**
      - .github/workflows/processor.yml
  merge_group: {}

permissions:
  contents: read

concurrency:
  group: processor-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  swift-test:
    name: Swift Tests (XCActivityLogParser)
    runs-on: namespace-profile-default-macos
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: processor/native/xcactivitylog_nif
    steps:
      - uses: actions/checkout@v4
      - name: Restore SwiftPM Cache
        uses: actions/cache@v4
        with:
          path: processor/native/xcactivitylog_nif/.build
          key: nif-swiftpm-${{ hashFiles('processor/native/xcactivitylog_nif/Package.resolved') }}
      - name: Run tests
        run: swift test --replace-scm-with-registry

  elixir-format:
    name: Format
    runs-on: namespace-profile-default
    timeout-minutes: 15
    defaults:
      run:
        working-directory: processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            processor/deps
            processor/_build
          key: processor-mix-${{ hashFiles('processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir ruby"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: processor
      - name: Install dependencies
        run: mix deps.get
      - name: Check format
        run: mix format --check-formatted

  elixir-credo:
    name: Credo
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            processor/deps
            processor/_build
          key: processor-mix-${{ hashFiles('processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir ruby"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: processor
      - name: Install dependencies
        run: mix deps.get
      - name: Run Credo
        run: mix credo

  elixir-test:
    name: Elixir Tests
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            processor/deps
            processor/_build
          key: processor-mix-${{ hashFiles('processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir ruby"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: processor
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        run: mix test --warnings-as-errors

  elixir-compile-prod:
    name: Compile (prod)
    runs-on: namespace-profile-default
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: processor
    steps:
      - uses: actions/checkout@v4
      - name: Restore Mix Cache
        uses: actions/cache@v4
        with:
          path: |
            processor/deps
            processor/_build
          key: processor-mix-${{ hashFiles('processor/mix.lock') }}
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "erlang elixir ruby"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: processor
      - name: Install dependencies
        run: mix deps.get
      - name: Compile with MIX_ENV=prod
        run: MIX_ENV=prod mix compile --warnings-as-errors
