name: Server image

# Single source of truth for building + Trivy-scanning + publishing the
# `ghcr.io/tuist/tuist:image-<sha>` server image. Both `server.yml` (used to host the
# docker_build job) and `cli.yml`'s acceptance tests now consume this image instead of
# rebuilding it themselves — that's what stops a combined-paths PR from doing two
# parallel buildx runs against the same Dockerfile.
#
# Triggered on the union of the paths that can affect the image so any commit that
# changes the runtime gets a fresh scanned image. Consumers wait for the
# `image-<sha>` tag to land in GHCR before doing their work.

on:
  # Triggered on changes that affect the image itself (server, shared libs, examples
  # baked into priv) AND on changes that require a *consumer* of the image to fire —
  # most importantly the CLI acceptance tests, which spin a cluster against this
  # image and would time out waiting for the tag if the image workflow didn't run on
  # cli-only PRs.
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - examples/xcode/**
      - skills/skills/**
      - cli/Sources/**
      - cli/Tests/**
      - cli/cluster/**
      - cli/Templates/**
      - cli/TuistCacheEE/**
      - mise/tasks/cli/acceptance-cluster/**
      - mise.toml
      - mise.lock
      - Tuist/**
      - Package.swift
      - Package.resolved
      - .github/workflows/server-image.yml
      - .github/workflows/server-image-build.yml
      - .github/workflows/cli.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - examples/xcode/**
      - skills/skills/**
      - cli/Sources/**
      - cli/Tests/**
      - cli/cluster/**
      - cli/Templates/**
      - cli/TuistCacheEE/**
      - mise/tasks/cli/acceptance-cluster/**
      - mise.toml
      - mise.lock
      - Tuist/**
      - Package.swift
      - Package.resolved
      - .github/workflows/server-image.yml
      - .github/workflows/server-image-build.yml
      - .github/workflows/cli.yml
  merge_group: {}

concurrency:
  group: server-image-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + scan
    # TEMP (this PR only): drop the `draft == false` gate so the docker build runs
    # on draft PRs too — we want to confirm the new kind+helm pipeline is green
    # before flipping the PR out of draft. Restore the gate before merge.
    uses: ./.github/workflows/server-image-build.yml
    with:
      tag: image-${{ github.sha }}
      scan: true
      tuist_hosted: "0"
      mix_env: prod
