name: Server image build

# Reusable: builds the Tuist server image off `server/Dockerfile`. Called from both
# `server.yml` (vulnerability scan) and `cli.yml` (acceptance-test cluster) so the
# build args + buildx setup live in one place. The image is always pushed to GHCR with
# the supplied tag — callers that don't need a registry artifact just discard the tag.
# Trivy is invoked when `scan: true`, mirroring the previous `server.yml` behavior.

on:
  workflow_call:
    inputs:
      tag:
        description: Image tag (under ghcr.io/tuist/tuist) — e.g. acceptance-<sha>.
        required: true
        type: string
      scan:
        description: Run a Trivy HIGH/CRITICAL scan against the built image.
        required: false
        default: false
        type: boolean
      tuist_hosted:
        description: TUIST_HOSTED build arg (1 = hosted secrets bundled, 0 = self-host).
        required: false
        default: "0"
        type: string
      mix_env:
        description: MIX_ENV build arg.
        required: false
        default: prod
        type: string
    outputs:
      image_tag:
        description: Tag the image was pushed under.
        value: ${{ inputs.tag }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist

jobs:
  build:
    name: Build ${{ inputs.tag }}
    runs-on: namespace-profile-default-with-volume
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          build-args: |
            TUIST_HOSTED=${{ inputs.tuist_hosted }}
            MIX_ENV=${{ inputs.mix_env }}
            APT_CACHE_BUST=${{ github.sha }}
      - name: Install Trivy
        if: inputs.scan
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          rm /tmp/trivy.tar.gz
      - name: Scan image for vulnerabilities
        if: inputs.scan
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
