name: Staging Linux Runner Credo Test

# One-shot validation of the staging Linux runner pool against a real
# server.yml job. Mirrors the `credo` job from server.yml exactly,
# except it `runs-on: tuist-staging-linux` so the workload lands on
# a kata-qemu microVM Pod backed by the AX42-U bare-metal Node
# instead of a Namespace hosted runner. The earlier smoke
# (linux-runners-staging-smoke.yml) only ran a curl + a few uname
# assertions; this one exercises the full mix toolchain — install
# erlang/elixir via mise, fetch hex deps, compile, and run credo —
# which is representative of any real server CI job we'd want to
# move to this pool.
#
# TEMPORARY. Delete this file once we've confirmed the Linux pool
# handles a representative server workload end-to-end.

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # Match server.yml's pinned mise version.
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}

defaults:
  run:
    working-directory: server

jobs:
  credo:
    name: Credo on staging Linux runner
    runs-on: tuist-staging-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-server-mix
        with:
          mise-version: ${{ env.MISE_VERSION }}
      - name: Run Credo
        run: mix credo
