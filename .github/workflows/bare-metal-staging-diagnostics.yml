name: Bare Metal Staging Diagnostics

# Diagnostic dump for the staging bare-metal substrate bring-up.
# Mirrors the macOS/runners-controller diagnostics that came before:
# pulls the mgmt + workload kubeconfigs from 1Password, prints state
# at every relevant layer (caph HetznerBareMetalHost, CAPI Machines,
# workload Nodes, kata-deploy DaemonSet, RunnerPool, runner Pods,
# server logs). Removable once the substrate is proven stable.

on:
  workflow_dispatch: {}
  # Auto-fires on changes to itself during bring-up so we re-run
  # diagnostics without manual dispatch every iteration.
  push:
    branches:
      - claude/priceless-wozniak-85daf8
    paths:
      - .github/workflows/bare-metal-staging-diagnostics.yml

permissions:
  contents: read

jobs:
  workload:
    runs-on: namespace-profile-default
    environment:
      name: server-k8s-staging
    timeout-minutes: 10
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load workload kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-staging" --vault tuist-k8s-staging --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Workload nodes
        run: |
          set +e
          echo "::group::All Nodes"
          kubectl get nodes -o wide
          echo "::endgroup::"
          echo "::group::Bare-metal pool Nodes"
          kubectl get nodes -l node.cluster.x-k8s.io/pool=runners-linux -o wide
          echo "::endgroup::"
          echo "::group::Bare-metal node labels + taints"
          for node in $(kubectl get nodes -l node.cluster.x-k8s.io/pool=runners-linux -o name 2>/dev/null); do
            echo "--- $node ---"
            kubectl get "$node" -o jsonpath='{.metadata.labels}' | jq '.'
            echo "taints:"
            kubectl get "$node" -o jsonpath='{.spec.taints}' | jq '.'
          done
          echo "::endgroup::"

      - name: kata-deploy DaemonSet
        run: |
          set +e
          echo "::group::kata-deploy Pods"
          kubectl -n tuist-staging get pods -l app.kubernetes.io/name=kata-deploy -o wide
          echo "::endgroup::"
          for pod in $(kubectl -n tuist-staging get pods -l app.kubernetes.io/name=kata-deploy -o name 2>/dev/null); do
            echo "::group::logs $pod (tail 200)"
            kubectl -n tuist-staging logs "$pod" --tail=200 2>&1 || true
            echo "::endgroup::"
          done
          echo "::group::kata-fc RuntimeClass"
          kubectl get runtimeclass kata-fc -o yaml 2>&1 || echo "(not yet present)"
          echo "::endgroup::"

      - name: RunnerPool + runner Pods
        run: |
          set +e
          echo "::group::RunnerPool CRs"
          kubectl -n tuist-runners get runnerpools -o wide
          echo "::endgroup::"
          echo "::group::Runner Pods"
          kubectl -n tuist-runners get pods -o wide
          echo "::endgroup::"
          echo "::group::Runner Pod events"
          kubectl -n tuist-runners get events --sort-by=.lastTimestamp | tail -50
          echo "::endgroup::"

      - name: Tuist server logs (runners-related, last 30m)
        run: |
          set +e
          for pod in $(kubectl -n tuist-staging get pods -l app.kubernetes.io/component=server -o name 2>/dev/null); do
            echo "::group::$pod runners log"
            kubectl -n tuist-staging logs "$pod" --since=30m 2>&1 \
              | grep -iE 'runners:|dispatch|workflow_job|kata' | tail -60 || true
            echo "::endgroup::"
          done

  mgmt:
    runs-on: namespace-profile-default
    environment:
      name: mgmt-cluster-apply
    timeout-minutes: 10
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load mgmt kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-mgmt" --vault tuist-k8s-mgmt --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: HetznerBareMetalHost state
        run: |
          set +e
          echo "::group::HetznerBareMetalHost CRs (all)"
          kubectl -n org-tuist get hetznerbaremetalhost -o wide
          echo "::endgroup::"
          for h in $(kubectl -n org-tuist get hetznerbaremetalhost -o name 2>/dev/null); do
            echo "::group::describe $h"
            kubectl -n org-tuist describe "$h"
            echo "::endgroup::"
          done

      - name: CAPI Cluster + Machines for tuist-staging
        run: |
          set +e
          echo "::group::Cluster"
          kubectl -n org-tuist get cluster tuist-staging -o wide
          echo "::endgroup::"
          echo "::group::MachineDeployments"
          kubectl -n org-tuist get machinedeployments -l cluster.x-k8s.io/cluster-name=tuist-staging -o wide
          echo "::endgroup::"
          echo "::group::Machines"
          kubectl -n org-tuist get machines -l cluster.x-k8s.io/cluster-name=tuist-staging -o wide
          echo "::endgroup::"
          echo "::group::Recent Machine events"
          kubectl -n org-tuist get events --field-selector involvedObject.kind=Machine --sort-by=.lastTimestamp 2>&1 | tail -40
          echo "::endgroup::"

      - name: ExternalSecret sync state
        run: |
          set +e
          for name in hetzner-robot-credentials hetzner-bare-metal-ssh-key; do
            echo "::group::ExternalSecret $name"
            kubectl -n org-tuist get externalsecret "$name" -o yaml 2>&1 | head -80 || echo "(missing)"
            echo "::endgroup::"
            echo "::group::Secret $name (keys only, no values)"
            kubectl -n org-tuist get secret "$name" -o jsonpath='{.data}' 2>&1 | jq 'keys' || echo "(missing or empty)"
            echo "::endgroup::"
          done

      - name: caph controller logs (last 100 lines, filtered)
        run: |
          set +e
          for pod in $(kubectl -n caph-system get pods -l control-plane=controller-manager -o name 2>/dev/null); do
            echo "::group::$pod"
            kubectl -n caph-system logs "$pod" --tail=100 2>&1 \
              | grep -iE 'hetznerbaremetal|bm-staging|rescue|installimage|2986829' | tail -40 || true
            echo "::endgroup::"
          done
