name: On-Demand Preview Deploy

# Slack-requested preview environments. tuist-ops dispatches this workflow
# with action=create/delete; this file is a thin wrapper that normalises
# the Slack-side inputs (slug, pr_number or commit_sha, TTL, requester
# audit fields) into the preview-deploy-impl input shape and delegates
# the actual build/deploy/delete lifecycle.

on:
  workflow_dispatch:
    inputs:
      action:
        description: create or delete
        required: true
        default: create
        type: choice
        options:
          - create
          - delete
      slug:
        description: DNS-safe environment slug
        required: true
      pr_number:
        description: PR number to deploy
        required: false
      commit_sha:
        description: Commit SHA to deploy
        required: false
      ttl_hours:
        description: Auto-delete after N hours
        required: false
        default: "24"
      requester_email:
        description: Requesting operator email
        required: false
      requester_slack_id:
        description: Requesting Slack user id
        required: false
      reason:
        description: Request reason
        required: false
      kura_controller_image_tag:
        description: ghcr.io/tuist/kura-controller tag (cluster-wide controller install)
        required: false
        default: latest
      kura_runtime_image_tag:
        description: ghcr.io/tuist/kura tag exposed to the server
        required: false
        default: latest
      kura_instance_replicas:
        description: Shared preview KuraInstance replicas, 0 disables Kura
        required: false
        default: "1"

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  PREVIEW_BASE_DOMAIN: preview.tuist.dev

jobs:
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.r.outputs.action }}
      slug: ${{ steps.r.outputs.slug }}
      release: ${{ steps.r.outputs.release }}
      namespace: ${{ steps.r.outputs.namespace }}
      host: ${{ steps.r.outputs.host }}
      ref: ${{ steps.r.outputs.ref }}
      expires_at: ${{ steps.r.outputs.expires_at }}
      ttl_hours: ${{ steps.r.outputs.ttl_hours }}
      profile: ${{ steps.r.outputs.profile }}
      kura_instance_replicas: ${{ steps.r.outputs.kura_instance_replicas }}
    steps:
      - id: r
        env:
          ACTION: ${{ inputs.action }}
          SLUG_IN: ${{ inputs.slug }}
          PR: ${{ inputs.pr_number }}
          SHA: ${{ inputs.commit_sha }}
          TTL_HOURS: ${{ inputs.ttl_hours }}
          KURA_REPLICAS: ${{ inputs.kura_instance_replicas }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "$ACTION" != "create" ] && [ "$ACTION" != "delete" ]; then
            echo "::error::action must be create or delete."; exit 1
          fi

          SLUG="$(echo "$SLUG_IN" | tr '[:upper:]' '[:lower:]')"
          if ! [[ "$SLUG" =~ ^[a-z0-9]([a-z0-9-]{0,38}[a-z0-9])?$ ]]; then
            echo "::error::slug must be 1-40 chars of lowercase letters, numbers, and hyphens, starting and ending alphanumeric."; exit 1
          fi

          if [ "$ACTION" = "create" ]; then
            if [ -n "$PR" ] && [ -n "$SHA" ]; then
              echo "::error::Provide pr_number OR commit_sha, not both."; exit 1
            fi
            if [ -n "$PR" ] && ! [[ "$PR" =~ ^[0-9]+$ ]]; then
              echo "::error::pr_number must be a positive integer."; exit 1
            fi
            if [ -n "$SHA" ] && ! [[ "$SHA" =~ ^[0-9a-f]{7,40}$ ]]; then
              echo "::error::commit_sha must be 7-40 lowercase hex chars."; exit 1
            fi
            if ! [[ "$TTL_HOURS" =~ ^[0-9]+$ ]] || [ "$TTL_HOURS" -lt 1 ] || [ "$TTL_HOURS" -gt 168 ]; then
              echo "::error::ttl_hours must be an integer between 1 and 168."; exit 1
            fi
            if ! [[ "$KURA_REPLICAS" =~ ^[0-9]+$ ]] || [ "$KURA_REPLICAS" -gt 3 ]; then
              echo "::error::kura_instance_replicas must be an integer between 0 and 3."; exit 1
            fi

            if [ -n "$PR" ]; then
              REF=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
            elif [ -n "$SHA" ]; then
              REF="$SHA"
            else
              REF="${{ github.sha }}"
            fi
            ACTION_OUT=deploy
          else
            REF=""
            TTL_HOURS=1
            KURA_REPLICAS=0
            ACTION_OUT=delete
          fi

          RELEASE="ondemand-${SLUG}"
          NAMESPACE="preview-ondemand-${SLUG}"
          HOST="${SLUG}.${PREVIEW_BASE_DOMAIN}"
          EXPIRES_AT=$(( $(date +%s) + TTL_HOURS * 3600 ))
          # Slack-requested previews are always "with Kura" by default
          # (kura_instance_replicas=0 disables it). Reuse the same impl
          # workflow with a different profile when a future request shape
          # needs the bare-app profile.
          if [ "$KURA_REPLICAS" = "0" ]; then
            PROFILE=app
          else
            PROFILE=app-with-kura
          fi

          {
            echo "action=$ACTION_OUT"
            echo "slug=$SLUG"
            echo "release=$RELEASE"
            echo "namespace=$NAMESPACE"
            echo "host=$HOST"
            echo "ref=$REF"
            echo "expires_at=$EXPIRES_AT"
            echo "ttl_hours=$TTL_HOURS"
            echo "profile=$PROFILE"
            echo "kura_instance_replicas=$KURA_REPLICAS"
          } >> "$GITHUB_OUTPUT"

  call-impl:
    name: Lifecycle
    needs: resolve
    uses: ./.github/workflows/preview-deploy-impl.yml
    secrets: inherit
    with:
      action: ${{ needs.resolve.outputs.action }}
      source: slack
      slug: ${{ needs.resolve.outputs.slug }}
      release: ${{ needs.resolve.outputs.release }}
      namespace: ${{ needs.resolve.outputs.namespace }}
      host: ${{ needs.resolve.outputs.host }}
      ref: ${{ needs.resolve.outputs.ref }}
      ttl_hours: ${{ fromJSON(needs.resolve.outputs.ttl_hours) }}
      expires_at: ${{ needs.resolve.outputs.expires_at }}
      profile: ${{ needs.resolve.outputs.profile }}
      requester_email: ${{ inputs.requester_email }}
      requester_slack_id: ${{ inputs.requester_slack_id }}
      reason: ${{ inputs.reason }}
      kura_instance_replicas: ${{ fromJSON(needs.resolve.outputs.kura_instance_replicas) }}
      kura_controller_image_tag: ${{ inputs.kura_controller_image_tag }}
      kura_runtime_image_tag: ${{ inputs.kura_runtime_image_tag }}
