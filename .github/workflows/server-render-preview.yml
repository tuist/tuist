name: Server — Render Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - server/**
      - tuist_common/**
      - render.yaml

concurrency:
  group: server-render-preview-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  render-preview:
    if: "!github.event.pull_request.draft && github.event.pull_request.head.repo.fork != true"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.title.includes('[render preview]')) {
              return;
            }
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title: `${pr.title} [render preview]`
            });
