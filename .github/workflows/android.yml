name: Android

on:
  push:
    branches:
      - main
    paths:
      - android/**
      - .github/workflows/android.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - android/**
      - .github/workflows/android.yml
  merge_group:

concurrency:
  group: android-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_ATTESTATIONS: 0
  MISE_LOCKED: 1

defaults:
  run:
    working-directory: android

jobs:
  # All android jobs stay on GitHub-hosted runners: gradle needs the
  # Android SDK (ANDROID_HOME), which the hosted image pre-installs but
  # the in-house tuist-linux runner image does not. Moving them onto
  # the fleet needs the SDK baked into that image first.
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    if: |
      (github.event.pull_request.draft == false || github.event_name != 'pull_request') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
      - name: Authenticate with Tuist
        run: tuist auth login
      - run: ./gradlew testDebugUnitTest

  test-fork:
    name: Test Fork
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew testDebugUnitTest

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    if: |
      (github.event.pull_request.draft == false || github.event_name != 'pull_request') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist"
          cache: "false"
      - name: Authenticate with Tuist
        run: tuist auth login
      - run: ./gradlew assembleDebug
      - name: Share
        run: tuist share app/build/outputs/apk/debug/app-debug.apk
      - name: Inspect bundle
        run: tuist inspect bundle app/build/outputs/apk/debug/app-debug.apk

  build-fork:
    name: Build Fork
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug
