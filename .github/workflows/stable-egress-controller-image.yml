name: Stable Egress Controller Image

# PR validation + ad-hoc image build for stable-egress-controller, the
# operator that keeps the hosted server's stable-egress gateway highly
# available: it holds the Hetzner Floating IP + the active gateway label on a
# single Ready node from the egress candidate pool and fails over to another on
# node loss.
#
# Steady-state image promotion is owned by release.yml; this workflow only
# handles pre-release iteration via `:sha-<git-sha>` tags.

on:
  push:
    branches:
      - main
    paths:
      - infra/stable-egress-controller/**
      - .github/workflows/stable-egress-controller-image.yml
  pull_request:
    paths:
      - infra/stable-egress-controller/**
      - .github/workflows/stable-egress-controller-image.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist-stable-egress-controller

jobs:
  test:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: tuist-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/stable-egress-controller/go.mod
          cache-dependency-path: infra/stable-egress-controller/go.sum
      - name: Test
        working-directory: infra/stable-egress-controller
        run: go test ./...
      - name: Vet
        working-directory: infra/stable-egress-controller
        run: go vet ./...

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: tuist-linux
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          GIT_SHA="${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${GIT_SHA}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/stable-egress-controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=stable-egress-controller
          cache-to: type=gha,mode=max,scope=stable-egress-controller
