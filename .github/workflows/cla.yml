name: "CLA Check"
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "server/**"
      - "kura/**"
      - ".github/workflows/cla.yml"

concurrency:
  group: cla-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  CLA:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine CLA scopes
        id: cla_scope
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const changedPaths = files.map(file => file.filename);
            const workflowChanged = changedPaths.includes('.github/workflows/cla.yml');
            const serverRequired = workflowChanged || changedPaths.some(path => path.startsWith('server/'));
            const kuraRequired = workflowChanged || changedPaths.some(path => path.startsWith('kura/'));

            core.setOutput('server_required', String(serverRequired));
            core.setOutput('kura_required', String(kuraRequired));

      - name: Check CLA Status
        id: cla_check
        run: |
          # Get PR author info
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_AUTHOR_ID="${{ github.event.pull_request.user.id }}"
          PR_AUTHOR_TYPE="${{ github.event.pull_request.user.type }}"

          echo "Checking CLA status for: $PR_AUTHOR (ID: $PR_AUTHOR_ID, type: $PR_AUTHOR_TYPE)"

          if [[ "$PR_AUTHOR_TYPE" == "Bot" ]]; then
            echo "✅ PR author $PR_AUTHOR is a bot, CLA not required"
            echo "cla_required=false" >> $GITHUB_OUTPUT
            echo "missing_scopes=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check allowlist first
          ALLOWLIST="pepicrft,cschmatzler,asmitbm,fortmarek"
          if echo "$ALLOWLIST" | grep -q "$PR_AUTHOR"; then
            echo "✅ User $PR_AUTHOR is in allowlist, CLA not required"
            echo "cla_required=false" >> $GITHUB_OUTPUT
            echo "missing_scopes=" >> $GITHUB_OUTPUT
            exit 0
          fi

          missing_scopes=()

          check_component_cla() {
            local scope="$1"
            local signatures_file="$2"

            if [[ ! -f "$signatures_file" ]]; then
              echo "❌ $scope signatures file not found, CLA required"
              missing_scopes+=("$scope")
              return
            fi

            local signed
            signed=$(jq -r --arg author_id "$PR_AUTHOR_ID" '.signedContributors[]? | select(.id == ($author_id | tonumber)) | .name' "$signatures_file" || echo "")

            if [[ -n "$signed" ]]; then
              echo "✅ User $PR_AUTHOR has signed the $scope CLA"
            else
              echo "❌ User $PR_AUTHOR has not signed the $scope CLA"
              missing_scopes+=("$scope")
            fi
          }

          if [[ "${{ steps.cla_scope.outputs.server_required }}" == "true" ]]; then
            check_component_cla "server" "server/cla/signatures.json"
          fi

          if [[ "${{ steps.cla_scope.outputs.kura_required }}" == "true" ]]; then
            check_component_cla "kura" "kura/cla/signatures.json"
          fi

          if [[ ${#missing_scopes[@]} -eq 0 ]]; then
            echo "✅ User $PR_AUTHOR has signed all required CLAs"
            echo "cla_required=false" >> $GITHUB_OUTPUT
            echo "missing_scopes=" >> $GITHUB_OUTPUT
          else
            missing_scopes_csv=$(IFS=,; echo "${missing_scopes[*]}")
            echo "❌ User $PR_AUTHOR has not signed required CLAs: $missing_scopes_csv"
            echo "cla_required=true" >> $GITHUB_OUTPUT
            echo "missing_scopes=$missing_scopes_csv" >> $GITHUB_OUTPUT
          fi

      - name: Update CLA comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cla-check -->';
            const prAuthor = '${{ github.event.pull_request.user.login }}';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const missingScopes = '${{ steps.cla_check.outputs.missing_scopes }}'
              .split(',')
              .map(scope => scope.trim())
              .filter(Boolean);

            const scopeDetails = {
              server: {
                label: 'Tuist Server',
                documentUrl: 'https://github.com/tuist/tuist/blob/main/server/cla/document.md',
                command: 'mise run cla-sign',
                signaturesPath: 'server/cla/signatures.json',
              },
              kura: {
                label: 'Kura',
                documentUrl: 'https://github.com/tuist/tuist/blob/main/kura/cla/document.md',
                command: 'CLA_COMPONENT=kura mise run cla-sign',
                signaturesPath: 'kura/cla/signatures.json',
              },
            };

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.filter(c => c.body && c.body.includes(marker)).pop();

            if (missingScopes.length > 0) {
              const scopeList = missingScopes
                .map(scope => `- ${scopeDetails[scope].label}`)
                .join('\n');

              const signingSections = missingScopes
                .map(scope => {
                  const detail = scopeDetails[scope];
                  return [
                    `### ${detail.label}`,
                    '',
                    `1. Read the CLA: [Contributor License Agreement](${detail.documentUrl})`,
                    '2. Sign it with:',
                    '```bash',
                    detail.command,
                    `git add ${detail.signaturesPath}`,
                    `git commit -m "add CLA signature for ${prAuthor}"`,
                    'git push',
                    '```',
                    `3. Or manually add your signature to \`${detail.signaturesPath}\``,
                  ].join('\n');
                })
                .join('\n\n');

              const comment = [
                marker,
                '## CLA Signature Required',
                '',
                `Hi @${prAuthor},`,
                '',
                'Before we can merge this PR, you need to sign the required Contributor License Agreement for the component your changes touch.',
                '',
                'Required CLA:',
                '',
                scopeList,
                '',
                'How to sign:',
                '',
                signingSections,
                '',
                "Once you've signed the required CLA, this check will automatically pass.",
                '',
                '---',
                '<sub>This is an automated message. The CLA is required for contributions to server and Kura code so we can continue to maintain and distribute Tuist under the chosen component licenses.</sub>',
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: comment });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: comment });
              }
            } else if (existing) {
              const comment = [
                marker,
                '## CLA Check Passed',
                '',
                `Thank you @${prAuthor}! Your contribution is ready to be reviewed. The CLA requirement has been satisfied.`,
              ].join('\n');

              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: comment });
            }

      - name: Complete CLA check
        run: |
          if [ "${{ steps.cla_check.outputs.cla_required }}" = "true" ]; then
            echo "❌ CLA signature required - see PR comment for instructions"
            exit 1
          else
            echo "✅ CLA check passed"
          fi
