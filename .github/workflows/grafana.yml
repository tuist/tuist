name: Grafana plugin

on:
  push:
    branches:
      - main
    paths:
      - grafana/**
      - .github/workflows/grafana.yml
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - grafana/**
      - .github/workflows/grafana.yml
  merge_group:

concurrency:
  group: grafana-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}
  PNPM_HOME: ~/.pnpm

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm/store
          key: pnpm-grafana-${{ hashFiles('grafana/pnpm-lock.yaml') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          working_directory: grafana
      - name: Lint
        working-directory: grafana
        run: mise run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm/store
          key: pnpm-grafana-${{ hashFiles('grafana/pnpm-lock.yaml') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          working_directory: grafana
      - name: Typecheck
        working-directory: grafana
        run: mise run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm/store
          key: pnpm-grafana-${{ hashFiles('grafana/pnpm-lock.yaml') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          working_directory: grafana
      - name: Test
        working-directory: grafana
        run: mise run test

  build:
    name: Build & bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm/store
          key: pnpm-grafana-${{ hashFiles('grafana/pnpm-lock.yaml') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          working_directory: grafana
      - name: Build
        working-directory: grafana
        run: mise run build
      - name: Bundle (unsigned, smoke test)
        working-directory: grafana
        run: mise run bundle --skip-sign
