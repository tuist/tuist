name: Benchmark Cacheless Release Paths

on:
  push:
    branches:
      - benchmark/npm-cache-release-timings-10739
    paths:
      - .github/workflows/benchmark-cacheless-release.yml
      - Package.swift
      - Package.resolved
      - .xcode-version
      - .xcode-version-releases
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}
  MISE_GITHUB_ATTESTATIONS: 0
  TUIST_ENABLE_CACHING: "true"

jobs:
  release-cli:
    name: Release CLI setup (${{ matrix.cache_mode }})
    runs-on: namespace-profile-default-macos
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        cache_mode:
          - with-cache
          - without-cache
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version-releases).app
      - name: Restore cache
        id: cache-restore
        if: matrix.cache_mode == 'with-cache'
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-cli-release-${{ hashFiles('.xcode-version-releases') }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Package.resolved') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist git-cliff 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install Tuist dependencies
        if: matrix.cache_mode == 'without-cache' || steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Initialize TuistCacheEE submodule
        env:
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
        run: mise run --no-deps cli:ee
      - name: Benchmark summary
        run: |
          {
            echo "### Release CLI setup"
            echo ""
            echo "- Cache mode: ${{ matrix.cache_mode }}"
            echo "- Restored cache key: ${{ steps.cache-restore.outputs.cache-matched-key || 'none' }}"
            echo "- Side effects: no cache save, no artifact upload, no changelog update, no tag, no release"
          } >> "$GITHUB_STEP_SUMMARY"

  release-ios:
    name: Release iOS setup (${{ matrix.cache_mode }})
    runs-on: namespace-profile-macos-xcode-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        cache_mode:
          - with-cache
          - without-cache
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Skip Xcode Macro Fingerprint Validation
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
      - name: Skip Xcode Package Validation
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "tuist 1password-cli"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Restore cache
        id: cache-restore
        if: matrix.cache_mode == 'with-cache'
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-app-${{ hashFiles('Package.swift') }}-${{ hashFiles('Package.resolved') }}
      - name: Install Tuist dependencies
        if: matrix.cache_mode == 'without-cache' || steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Generate TuistApp
        run: tuist generate TuistApp --no-binary-cache
      - name: Benchmark summary
        run: |
          {
            echo "### Release iOS setup"
            echo ""
            echo "- Cache mode: ${{ matrix.cache_mode }}"
            echo "- Restored cache key: ${{ steps.cache-restore.outputs.cache-matched-key || 'none' }}"
            echo "- Side effects: no cache save, no App Store upload, no signing credential fetch, no artifact upload"
          } >> "$GITHUB_STEP_SUMMARY"

  server-acceptance:
    name: Server acceptance setup (${{ matrix.cache_mode }})
    runs-on: namespace-profile-macos-xcode-26
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        cache_mode:
          - with-cache
          - without-cache
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$(cat .xcode-version).app
      - name: Restore cache
        id: cache-restore
        if: matrix.cache_mode == 'with-cache'
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-cli-cache-ee-${{ hashFiles('Package.resolved') }}
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
          cache: "false"
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install Tuist dependencies
        if: matrix.cache_mode == 'without-cache' || steps.cache-restore.outputs.cache-matched-key == ''
        run: tuist install
      - name: Initialize TuistCacheEE submodule
        env:
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
        run: mise run cli:ee
      - name: Benchmark summary
        run: |
          {
            echo "### Server acceptance setup"
            echo ""
            echo "- Cache mode: ${{ matrix.cache_mode }}"
            echo "- Restored cache key: ${{ steps.cache-restore.outputs.cache-matched-key || 'none' }}"
            echo "- Side effects: no cache save, no canary deploy, no production deploy, no acceptance tests"
          } >> "$GITHUB_STEP_SUMMARY"
