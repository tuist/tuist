name: Runner Download Stall Repro

# Diagnostic for the binary-artifact download stall seen in
# runner-job-89247178602 (tuist install hung ~6h on SwiftPM binary
# artifact downloads until GitHub cancelled the job). It streams the 10
# artifact URLs from that job to /dev/null with a stall watchdog and
# reports transport-level facts (negotiated HTTP version, CDN edge IP,
# connect/TTFB/total time, bytes, speed, stall class), on a Tuist staging
# macOS runner and a GitHub-hosted macOS runner side-by-side.
#
# The modes discriminate the hypotheses (see the script header):
#   seq-h2 vs seq-h1  -> HTTP/2 vs HTTP/1.1
#   conc              -> independent connections (NAT / egress conntrack)
#   pool              -> shared pool + same-host HTTP/2 coalescing (HoL)
#
# Throwaway: scoped to the claude/runner-download-timeout-1f95d4 branch,
# not intended for main. Fires on push to that branch (when this file or
# the script changes) and via manual dispatch for repeated runs, since
# the stall is intermittent.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/runner-download-timeout-1f95d4
    paths:
      - .github/workflows/runner-download-stall-repro.yml
      - .github/scripts/repro_download_stall.sh

permissions:
  contents: read

env:
  MAX_TIME: "180"
  CONNECT_TIMEOUT: "20"
  STALL_BYTES: "2048"
  STALL_SECS: "25"

jobs:
  tuist-macos:
    # Staging Tuist Runners pool (same dispatch label the runners smoke
    # test uses). This is the environment the customer hit the stall in.
    runs-on: tuist-staging-macos
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: true
      - name: Environment
        run: |
          echo "host: $(hostname)  macOS: $(sw_vers -productVersion)  arch: $(uname -m)"
          sysctl -n machdep.cpu.brand_string || true
          curl -V | head -1
      - name: Repro (all modes once, then loop pool to catch intermittent stalls)
        run: |
          set -uo pipefail
          bash .github/scripts/repro_download_stall.sh
          for i in 1 2 3 4 5 6; do
            echo "===== extra pool iteration $i ====="
            MODES=pool OUT_DIR="./pool-$i" bash .github/scripts/repro_download_stall.sh || true
          done
      - name: Dump traces for any stalled runs
        if: always()
        run: |
          shopt -s nullglob
          any=0
          for d in ./download-stall-repro-* ./pool-*; do
            [ -f "$d/results.tsv" ] || continue
            if grep -Eq 'STALL|ERR|FAIL|CONNECT-TIMEOUT' "$d/results.tsv"; then
              any=1
              echo "########## $d ##########"
              echo "----- results.tsv -----"; cat "$d/results.tsv"
              for t in "$d"/trace-*.log; do
                echo "----- $t (first 120 lines) -----"
                sed -n '1,120p' "$t"
              done
            fi
          done
          [ "$any" = 0 ] && echo "No stalls/errors recorded across all runs on the Tuist runner."

  github-macos:
    # GitHub-hosted control, for the side-by-side the customer described
    # (they moved off GitHub runners because of this same download issue).
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: true
      - name: Repro (baseline on GitHub-hosted macOS)
        run: |
          set -uo pipefail
          bash .github/scripts/repro_download_stall.sh
          for i in 1 2 3; do
            echo "===== extra pool iteration $i ====="
            MODES=pool OUT_DIR="./pool-$i" bash .github/scripts/repro_download_stall.sh || true
          done
      - name: Dump traces for any stalled runs
        if: always()
        run: |
          shopt -s nullglob
          any=0
          for d in ./download-stall-repro-* ./pool-*; do
            [ -f "$d/results.tsv" ] || continue
            if grep -Eq 'STALL|ERR|FAIL|CONNECT-TIMEOUT' "$d/results.tsv"; then
              any=1
              echo "########## $d ##########"
              echo "----- results.tsv -----"; cat "$d/results.tsv"
              for t in "$d"/trace-*.log; do
                echo "----- $t (first 120 lines) -----"
                sed -n '1,120p' "$t"
              done
            fi
          done
          [ "$any" = 0 ] && echo "No stalls/errors recorded across all runs on the GitHub-hosted runner."
