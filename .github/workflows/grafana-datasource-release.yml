name: Grafana data source release

on:
  push:
    tags:
      - "grafana-datasource-v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: grafana-datasource

jobs:
  release:
    runs-on: tuist-linux
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Install frontend dependencies
        run: npm ci

      - name: Check and build frontend
        run: |
          npm run typecheck
          npm run lint
          npm run test:ci
          npm run build

      - name: Build backend binaries for all platforms
        env:
          GOWORK: "off"
        run: |
          go install github.com/magefile/mage@latest
          mage -v
          ls -la dist/gpx_tuist_datasource_* >/dev/null

      - name: Sign plugin
        if: ${{ env.GRAFANA_ACCESS_POLICY_TOKEN != '' }}
        run: npm run sign

      - name: Read plugin id and version
        id: meta
        run: |
          echo "id=$(node -p "require('./src/plugin.json').id")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          id=${{ steps.meta.outputs.id }}
          version=${{ steps.meta.outputs.version }}
          mv dist "$id"
          zip -r "$id-$version.zip" "$id"
          sha1sum "$id-$version.zip" | cut -d' ' -f1 > "$id-$version.zip.sha1"

      - name: Validate plugin (informational)
        run: |
          id=${{ steps.meta.outputs.id }}
          version=${{ steps.meta.outputs.version }}
          npx -y @grafana/plugin-validator@latest -sourceCodeUri file://. "$id-$version.zip" || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}
          path: |
            grafana-datasource/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}.zip
            grafana-datasource/${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}.zip.sha1

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id=${{ steps.meta.outputs.id }}
          version=${{ steps.meta.outputs.version }}
          gh release create "${{ github.ref_name }}" \
            "$id-$version.zip" "$id-$version.zip.sha1" \
            --title "Grafana data source $version" \
            --notes "Tuist Grafana data source plugin $version. Attached: signed plugin zip + SHA1 for catalog submission." \
            --repo "${{ github.repository }}"
