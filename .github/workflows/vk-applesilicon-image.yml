name: VK Apple Silicon Image

on:
  push:
    branches: [main]
    paths:
      - infra/vk-applesilicon/**
      - .github/workflows/vk-applesilicon-image.yml
  pull_request:
    paths:
      - infra/vk-applesilicon/**
      - .github/workflows/vk-applesilicon-image.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/vk-applesilicon

jobs:
  test:
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/vk-applesilicon/go.mod
          cache-dependency-path: infra/vk-applesilicon/go.sum
      - name: Test
        working-directory: infra/vk-applesilicon
        run: go test ./...
      - name: Vet
        working-directory: infra/vk-applesilicon
        run: go vet ./...

  build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          GIT_SHA="${GITHUB_SHA::8}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GIT_SHA},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/vk-applesilicon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=vk-applesilicon
          cache-to: type=gha,mode=max,scope=vk-applesilicon
