name: Cache Load Test

on:
  pull_request:
    types: [labeled]
    branches: ['main']

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: cache-load-test-staging
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.label.name == 'load-test' &&
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_ref: ${{ steps.resolve.outputs.pr_ref }}
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      main_sha: ${{ steps.resolve.outputs.main_sha }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          set -euo pipefail
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "pr_ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "main_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"

      - name: Remove label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/load-test" -X DELETE || true

  deploy-main:
    name: Deploy main
    needs: resolve
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.main_sha }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "ruby gem:kamal"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy main with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  baseline:
    name: Baseline
    needs: [resolve, deploy-main]
    runs-on: namespace-profile-default
    timeout-minutes: 20
    env:
      REGION: eu-central
      CACHE_HOST: cache-eu-central-staging.tuist.dev
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_ref }}
      - name: Create cache account token
        run: ./ci/create-cache-token.sh
      - uses: grafana/setup-k6-action@v1
      - uses: jdx/mise-action@v3.2.0
        with:
          install: false
          env: false
          cache: false
          working_directory: cache
      - name: Wait for cache service
        run: |
          echo "Waiting for cache service at ${{ env.CACHE_HOST }}..."
          for i in $(seq 1 30); do
            if curl -sf "https://${{ env.CACHE_HOST }}/up" > /dev/null 2>&1; then
              echo "Cache service ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Cache service at ${{ env.CACHE_HOST }} did not become ready in time"
              exit 1
            fi
            echo "Attempt $i: not ready, waiting..."
            sleep 2
          done
      - name: Run baseline load test
        env:
          RUN_ID: lt-baseline-${{ github.run_id }}-${{ env.REGION }}
          COMMIT_SHA: ${{ needs.resolve.outputs.main_sha }}
        run: mise run load-test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-result-${{ env.REGION }}
          path: cache/k6/result.json
          retention-days: 30

  deploy-pr:
    name: Deploy PR
    needs: [resolve, baseline]
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_ref }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "ruby gem:kamal"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  test:
    name: Test
    needs: [resolve, deploy-pr]
    runs-on: namespace-profile-default
    timeout-minutes: 20
    env:
      REGION: eu-central
      CACHE_HOST: cache-eu-central-staging.tuist.dev
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_ref }}
      - name: Create cache account token
        run: ./ci/create-cache-token.sh
      - uses: grafana/setup-k6-action@v1
      - uses: jdx/mise-action@v3.2.0
        with:
          install: false
          env: false
          cache: false
          working_directory: cache
      - name: Wait for cache service
        run: |
          echo "Waiting for cache service at ${{ env.CACHE_HOST }}..."
          for i in $(seq 1 30); do
            if curl -sf "https://${{ env.CACHE_HOST }}/up" > /dev/null 2>&1; then
              echo "Cache service ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Cache service at ${{ env.CACHE_HOST }} did not become ready in time"
              exit 1
            fi
            echo "Attempt $i: not ready, waiting..."
            sleep 2
          done
      - name: Run PR load test
        env:
          RUN_ID: lt-pr-${{ needs.resolve.outputs.pr_number }}-${{ github.run_id }}-${{ env.REGION }}
          COMMIT_SHA: ${{ needs.resolve.outputs.pr_sha }}
        run: mise run load-test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-result-${{ env.REGION }}
          path: cache/k6/result.json
          retention-days: 30

  compare:
    name: Compare
    needs: [resolve, deploy-main, baseline, deploy-pr, test]
    if: >
      always() &&
      needs.deploy-main.result == 'success' &&
      needs.baseline.result == 'success' &&
      needs.deploy-pr.result == 'success' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      verdict: ${{ steps.compare.outputs.verdict }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_ref }}

      - name: Download baseline results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: baseline-result-*
          merge-multiple: false

      - name: Download PR results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: k6-result-*
          merge-multiple: false

      - name: Compare results
        id: compare
        env:
          PR_SHA: ${{ needs.resolve.outputs.pr_sha }}
          MAIN_SHA: ${{ needs.resolve.outputs.main_sha }}
        run: bash cache/ci/compare-load-test.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: report.md
          retention-days: 30

  restore:
    name: Restore main
    needs: [resolve, deploy-main, baseline, deploy-pr, test, compare]
    if: always() && needs.deploy-main.result == 'success'
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.main_sha }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "ruby gem:kamal"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy main with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  comment:
    name: Update PR comment
    needs: [resolve, deploy-main, baseline, deploy-pr, test, compare, restore]
    if: always() && needs.deploy-main.result == 'success'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: load-test-report
        continue-on-error: true

      - name: Update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          PR_SHA: ${{ needs.resolve.outputs.pr_sha }}
          VERDICT: ${{ needs.compare.outputs.verdict }}
          BASELINE_RESULT: ${{ needs.baseline.result }}
          DEPLOY_PR_RESULT: ${{ needs.deploy-pr.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COMPARE_RESULT: ${{ needs.compare.result }}
          RESTORE_RESULT: ${{ needs.restore.result }}
        run: |
          set -euo pipefail
          MARKER="<!-- cache-load-test -->"

          if [ -f report.md ]; then
            BODY=$(cat report.md)
          else
            if [ "$BASELINE_RESULT" = "failure" ]; then
              STATUS="❌ Baseline execution failed"
            elif [ "$DEPLOY_PR_RESULT" = "failure" ]; then
              STATUS="❌ PR deployment failed"
            elif [ "$TEST_RESULT" = "failure" ]; then
              STATUS="❌ Test execution failed"
            elif [ "$COMPARE_RESULT" = "failure" ]; then
              STATUS="❌ Comparison failed"
            elif [ "$VERDICT" = "fail" ]; then
              STATUS="❌ Regression detected"
            elif [ "$VERDICT" = "pass" ]; then
              STATUS="✅ Passed"
            else
              STATUS="⚠️ Unknown (check workflow logs)"
            fi

            BODY="${MARKER}
          ## Cache Load Test

          **Status:** ${STATUS}
          **PR SHA:** \`${PR_SHA}\`
          **Workflow:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

          COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi

  finalize:
    name: Finalize load test
    needs: [resolve, deploy-main, baseline, deploy-pr, test, compare, restore, comment]
    if: always() && needs.deploy-main.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail on regression
        if: >
          needs.baseline.result == 'failure' ||
          needs.deploy-pr.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.compare.result == 'failure' ||
          needs.restore.result == 'failure' ||
          needs.compare.outputs.verdict == 'fail'
        run: |
          echo "::error::Load test detected regressions or test failures"
          exit 1
