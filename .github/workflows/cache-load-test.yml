name: Cache Load Test

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to test
        required: true
      pr_sha:
        description: PR head SHA
        required: true
      main_sha:
        description: Main branch SHA at time of request
        required: true
  pull_request:
    types: [labeled]
    branches: ['main']

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: cache-load-test-staging
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      (github.event_name == 'pull_request' && github.event.label.name == 'load-test') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      main_sha: ${{ steps.resolve.outputs.main_sha }}
    steps:
      - name: Resolve inputs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "pr_sha=${{ inputs.pr_sha }}" >> "$GITHUB_OUTPUT"
            echo "main_sha=${{ inputs.main_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            MAIN_SHA=$(gh api "/repos/${{ github.repository }}/commits/main" --jq '.sha')
            echo "main_sha=$MAIN_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove label
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/load-test" -X DELETE || true

  deploy-main:
    name: Deploy main
    needs: resolve
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.main_sha }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy main with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  baseline:
    name: Baseline (${{ matrix.region }})
    needs: [resolve, deploy-main]
    runs-on: namespace-profile-default
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: eu-central
            cache_host: cache-eu-central-staging.tuist.dev
          - region: us-east
            cache_host: cache-us-east-staging.tuist.dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_sha }}
      - uses: grafana/setup-k6-action@v1
      - name: Wait for cache service
        run: |
          echo "Waiting for cache service at ${{ matrix.cache_host }}..."
          for i in $(seq 1 30); do
            if curl -sf "https://${{ matrix.cache_host }}/up" > /dev/null 2>&1; then
              echo "Cache service ready after ${i}s"
              break
            fi
            echo "Attempt $i: not ready, waiting..."
            sleep 2
          done
      - name: Run baseline k6
        working-directory: cache/k6
        run: |
          k6 run src/main.ts \
            -e CACHE_HOST=${{ matrix.cache_host }} \
            -e SERVER_URL=https://staging.tuist.dev \
            -e REGION=${{ matrix.region }} \
            -e RUN_ID="lt-baseline-${{ github.run_id }}-${{ matrix.region }}" \
            -e COMMIT_SHA=${{ needs.resolve.outputs.main_sha }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-result-${{ matrix.region }}
          path: cache/k6/result.json
          retention-days: 30

  deploy-pr:
    name: Deploy PR
    needs: [resolve, baseline]
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_sha }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  test:
    name: Test (${{ matrix.region }})
    needs: [resolve, deploy-pr]
    runs-on: namespace-profile-default
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: eu-central
            cache_host: cache-eu-central-staging.tuist.dev
          - region: us-east
            cache_host: cache-us-east-staging.tuist.dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.pr_sha }}
      - uses: grafana/setup-k6-action@v1
      - name: Wait for cache service
        run: |
          echo "Waiting for cache service at ${{ matrix.cache_host }}..."
          for i in $(seq 1 30); do
            if curl -sf "https://${{ matrix.cache_host }}/up" > /dev/null 2>&1; then
              echo "Cache service ready after ${i}s"
              break
            fi
            echo "Attempt $i: not ready, waiting..."
            sleep 2
          done
      - name: Run k6
        working-directory: cache/k6
        run: |
          k6 run src/main.ts \
            -e CACHE_HOST=${{ matrix.cache_host }} \
            -e SERVER_URL=https://staging.tuist.dev \
            -e REGION=${{ matrix.region }} \
            -e RUN_ID="lt-pr-${{ needs.resolve.outputs.pr_number }}-${{ github.run_id }}-${{ matrix.region }}" \
            -e COMMIT_SHA=${{ needs.resolve.outputs.pr_sha }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-result-${{ matrix.region }}
          path: cache/k6/result.json
          retention-days: 30

  compare:
    name: Compare
    needs: [resolve, deploy-main, baseline, deploy-pr, test]
    if: always() && needs.deploy-main.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      verdict: ${{ steps.compare.outputs.verdict }}
    steps:
      - name: Download baseline results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: baseline-result-*
          merge-multiple: false

      - name: Download PR results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: k6-result-*
          merge-multiple: false

      - name: Compare results
        id: compare
        env:
          PR_SHA: ${{ needs.resolve.outputs.pr_sha }}
          MAIN_SHA: ${{ needs.resolve.outputs.main_sha }}
        run: |
          set -euo pipefail

          THRESHOLD="1.03"
          THROUGHPUT_THRESHOLD="0.97"
          VERDICT="pass"
          REGRESSIONS=""
          SUMMARY=""

          add_failure() {
            local region="$1" metric="$2" check_name="$3" baseline="$4" pr="$5" delta="$6"
            REGRESSIONS="${REGRESSIONS}| ${region} | ${metric} | ${check_name} | ${baseline} | ${pr} | ${delta} | ❌ |
          "
            VERDICT="fail"
          }

          compare_metric() {
            local region="$1" pr_file="$2" baseline_file="$3" metric="$4"

            local pr_p50 pr_p95 pr_p99 pr_throughput pr_error_rate
            local base_p50 base_p95 base_p99 base_throughput

            pr_p50=$(jq -r ".metrics[\"$metric\"].p50 // 0" "$pr_file")
            pr_p95=$(jq -r ".metrics[\"$metric\"].p95 // 0" "$pr_file")
            pr_p99=$(jq -r ".metrics[\"$metric\"].p99 // 0" "$pr_file")
            pr_throughput=$(jq -r ".metrics[\"$metric\"].throughput // 0" "$pr_file")
            pr_error_rate=$(jq -r ".metrics[\"$metric\"].error_rate // 0" "$pr_file")

            base_p50=$(jq -r ".metrics[\"$metric\"].p50 // 0" "$baseline_file")
            base_p95=$(jq -r ".metrics[\"$metric\"].p95 // 0" "$baseline_file")
            base_p99=$(jq -r ".metrics[\"$metric\"].p99 // 0" "$baseline_file")
            base_throughput=$(jq -r ".metrics[\"$metric\"].throughput // 0" "$baseline_file")

            if [ "$(echo "$pr_error_rate > 0" | bc -l)" -eq 1 ]; then
              local pct
              pct=$(printf "%.2f" "$(echo "$pr_error_rate * 100" | bc -l)")
              add_failure "$region" "$metric" "error_rate" "0%" "${pct}%" "-"
            fi

            for pct_name in p50 p95 p99; do
              local pr_val base_val
              eval "pr_val=\$pr_$pct_name"
              eval "base_val=\$base_$pct_name"

              if [ "$(echo "$base_val > 0" | bc -l)" -eq 1 ]; then
                if [ "$(echo "$pr_val > $base_val * $THRESHOLD" | bc -l)" -eq 1 ]; then
                  local delta
                  delta=$(printf "%.1f" "$(echo "($pr_val / $base_val - 1) * 100" | bc -l)")
                  add_failure "$region" "$metric" "$pct_name" "$(printf '%.2f' "$base_val")ms" "$(printf '%.2f' "$pr_val")ms" "+${delta}%"
                fi
              fi
            done

            if [ "$(echo "$base_throughput > 0" | bc -l)" -eq 1 ]; then
              if [ "$(echo "$pr_throughput < $base_throughput * $THROUGHPUT_THRESHOLD" | bc -l)" -eq 1 ]; then
                local delta
                delta=$(printf "%.1f" "$(echo "(1 - $pr_throughput / $base_throughput) * 100" | bc -l)")
                add_failure "$region" "$metric" "throughput" "$(printf '%.1f' "$base_throughput")/s" "$(printf '%.1f' "$pr_throughput")/s" "-${delta}%"
              fi
            fi

            SUMMARY="${SUMMARY}| ${region} | ${metric} | $(printf '%.2f' "$pr_p50") | $(printf '%.2f' "$pr_p95") | $(printf '%.2f' "$pr_p99") | $(printf '%.1f' "$pr_throughput") | $(printf '%.2f' "$(echo "$pr_error_rate * 100" | bc -l)")% |
          "
          }

          for region in eu-central us-east; do
            PR_FILE="k6-result-${region}/result.json"
            BASELINE_FILE="baseline-result-${region}/result.json"

            if [ ! -f "$BASELINE_FILE" ]; then
              add_failure "$region" "workflow" "baseline" "present" "missing" "-"
              continue
            fi

            if [ ! -f "$PR_FILE" ]; then
              add_failure "$region" "workflow" "pr_result" "present" "missing" "-"
              continue
            fi

            METRICS=$(jq -r '.metrics | keys[]' "$PR_FILE")
            for metric in $METRICS; do
              compare_metric "$region" "$PR_FILE" "$BASELINE_FILE" "$metric"
            done
          done

          REPORT="<!-- cache-load-test -->
          ## Cache Load Test
          "

          if [ "$VERDICT" = "fail" ]; then
            REPORT="${REPORT}
          **Status:** ❌ Regression detected"
          else
            REPORT="${REPORT}
          **Status:** ✅ Passed"
          fi

          REPORT="${REPORT}
          **PR SHA:** \`${PR_SHA}\`
          **Baseline:** \`main\` @ \`${MAIN_SHA}\`
          **Workflow:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          "

          if [ -n "$REGRESSIONS" ]; then
            REPORT="${REPORT}
          ### Regressions
          | Region | Metric | Check | Baseline | PR | Delta | Status |
          |---|---|---|---:|---:|---:|---|
          ${REGRESSIONS}"
          fi

          if [ -n "$SUMMARY" ]; then
            REPORT="${REPORT}
          ### Summary
          | Region | Metric | p50 (ms) | p95 (ms) | p99 (ms) | Throughput | Error Rate |
          |---|---|---:|---:|---:|---:|---:|
          ${SUMMARY}"
          fi

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "$REPORT" > report.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: report.md
          retention-days: 30

  restore:
    name: Restore main
    needs: [resolve, deploy-main, baseline, deploy-pr, test, compare]
    if: always() && needs.deploy-main.result == 'success'
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    defaults:
      run:
        working-directory: cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.main_sha }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy main with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  comment:
    name: Update PR comment
    needs: [resolve, deploy-main, baseline, deploy-pr, test, compare, restore]
    if: always() && needs.deploy-main.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: load-test-report
        continue-on-error: true

      - name: Update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          PR_SHA: ${{ needs.resolve.outputs.pr_sha }}
          VERDICT: ${{ needs.compare.outputs.verdict }}
          BASELINE_RESULT: ${{ needs.baseline.result }}
          DEPLOY_PR_RESULT: ${{ needs.deploy-pr.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COMPARE_RESULT: ${{ needs.compare.result }}
          RESTORE_RESULT: ${{ needs.restore.result }}
        run: |
          set -euo pipefail
          MARKER="<!-- cache-load-test -->"

          if [ -f report.md ]; then
            BODY=$(cat report.md)
          else
            if [ "$BASELINE_RESULT" = "failure" ]; then
              STATUS="❌ Baseline execution failed"
            elif [ "$DEPLOY_PR_RESULT" = "failure" ]; then
              STATUS="❌ PR deployment failed"
            elif [ "$TEST_RESULT" = "failure" ]; then
              STATUS="❌ Test execution failed"
            elif [ "$COMPARE_RESULT" = "failure" ]; then
              STATUS="❌ Comparison failed"
            elif [ "$VERDICT" = "fail" ]; then
              STATUS="❌ Regression detected"
            elif [ "$VERDICT" = "pass" ]; then
              STATUS="✅ Passed"
            else
              STATUS="⚠️ Unknown (check workflow logs)"
            fi

            BODY="${MARKER}
          ## Cache Load Test

          **Status:** ${STATUS}
          **PR SHA:** \`${PR_SHA}\`
          **Workflow:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

          COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi

      - name: Fail on regression
        if: >
          needs.baseline.result == 'failure' ||
          needs.deploy-pr.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.compare.result == 'failure' ||
          needs.compare.outputs.verdict == 'fail'
        run: |
          echo "::error::Load test detected regressions or test failures"
          exit 1
