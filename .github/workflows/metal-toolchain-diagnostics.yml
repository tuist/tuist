name: Metal Toolchain Diagnostics

# TEMPORARY diagnostic workflow. Phase 2: is the MobileAsset catalog
# signature-verify failure driven by CONCURRENCY?
#
# Established already (runs 29636635011 / 29750363729): mobileassetd fails to
# verify Apple's signed MetalToolchain catalog (SecKeyVerifySignature /
# CSSMERR_CSP_VERIFY_FAILED) on a fraction of clones; every clone shares one
# baked device identity (same IOPlatformUUID/serial); a plain in-boot retry
# recovers it. Network/clock/throttle/DNS all ruled out.
#
# This phase decides the REAL fix by discriminating two mechanisms:
#   (A) shared per-clone identity collides when many clones hit Apple's
#       personalization at once  -> fix = regenerate identity per clone
#   (B) per-clone securityd/mobileassetd boot race (device-independent)
#       -> fix = warm the security/asset daemons at boot; identity regen is
#          useless here
#
# Method: run the SAME single download (no retry) two ways and compare the
# first-attempt failure rate:
#   solo  = matrix serialized with max-parallel 1 -> each clone downloads ALONE
#   burst = matrix uncapped -> clones download concurrently
# burst `needs: solo`, so no burst leg runs while the solo reps are measuring.
#
#   solo ~0% AND burst high  => (A): identity collision under concurrency.
#   solo ~= burst (both high) => (B): per-clone boot-state race.
#
# start_epoch/end_epoch per leg let us confirm burst legs actually overlapped
# and solo legs did not. Delete this file once the mechanism is settled.

on:
  pull_request:
    paths:
      - ".github/workflows/metal-toolchain-diagnostics.yml"
  workflow_dispatch:

jobs:
  solo:
    name: "solo rep ${{ matrix.rep }} (serialized, no concurrency)"
    runs-on: tuist-macos
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        rep: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Single Metal Toolchain download (no retry)
        run: |
          uuid=$(ioreg -rd1 -c IOPlatformExpertDevice 2>/dev/null | awk -F'"' '/IOPlatformUUID/{print $4}')
          start=$(date +%s)
          xcodebuild -downloadComponent MetalToolchain > /tmp/dl.log 2>&1
          rc=$?
          end=$(date +%s)
          echo "RESULT group=solo id=${{ matrix.rep }} rc=$rc dur=$((end - start))s start_epoch=$start end_epoch=$end uuid=$uuid"
          tail -3 /tmp/dl.log | sed 's/^/  /'
          [ "$rc" = "0" ]

  burst:
    name: "burst leg ${{ matrix.leg }} (max concurrency)"
    runs-on: tuist-macos
    timeout-minutes: 30
    needs: solo
    if: always()
    strategy:
      fail-fast: false
      matrix:
        leg: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - name: Single Metal Toolchain download (no retry)
        run: |
          uuid=$(ioreg -rd1 -c IOPlatformExpertDevice 2>/dev/null | awk -F'"' '/IOPlatformUUID/{print $4}')
          start=$(date +%s)
          xcodebuild -downloadComponent MetalToolchain > /tmp/dl.log 2>&1
          rc=$?
          end=$(date +%s)
          echo "RESULT group=burst id=${{ matrix.leg }} rc=$rc dur=$((end - start))s start_epoch=$start end_epoch=$end uuid=$uuid"
          tail -3 /tmp/dl.log | sed 's/^/  /'
          [ "$rc" = "0" ]
