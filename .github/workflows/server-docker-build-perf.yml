name: Server Docker Build Perf (temporary)

# TEMPORARY VALIDATION WORKFLOW - delete before merging.
#
# Exercises the server image build on the PR so the buildcache + OG
# cache-dance changes can be measured cold vs warm without running a real
# deploy. It mirrors the build args of the server-production-deployment.yml
# `build` job but:
#   - never deploys and never publishes an image tag (push: false)
#   - uses an isolated `buildcache:perf` ref and `perf-og-cache-*` actions
#     cache so it does not touch the production caches
#   - pins APT_CACHE_BUST to a constant so the runner-base apt layer does
#     not add ~58s of noise between runs
#
# Measure: push the branch once (cold), then push again (warm). The second
# run should show deps.compile + OG render as cache hits.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist

jobs:
  build-perf:
    name: Build perf (no deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - id: buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore OG image render cache
        id: og-cache
        uses: actions/cache@v4
        with:
          path: |
            og-cache-marketing
            og-cache-docs
          key: perf-og-cache-${{ github.run_id }}
          restore-keys: |
            perf-og-cache-
      - name: Seed OG cache mounts into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "og-cache-marketing": { "target": "/og-cache/marketing", "id": "og-marketing" },
              "og-cache-docs": { "target": "/og-cache/docs", "id": "og-docs" }
            }
          skip-extraction: ${{ steps.og-cache.outputs.cache-hit }}
      - uses: docker/build-push-action@v6
        name: Build server image (no push)
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:perf
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:perf,mode=max
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=perf
