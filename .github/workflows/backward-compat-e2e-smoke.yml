name: Backward-Compat E2E Smoke

# TEMPORARY: validates the backward-compatibility-acceptance job from
# server-production-deployment.yml end-to-end against the already-live canary,
# without running the deploy cascade. Delete this file once the suite is proven
# green - the real gate lives in server-production-deployment.yml.

on:
  # Manual-only: canary's DB connection pool is currently exhausted (500s on
  # writes), so auto-running on every push just produces noisy red checks. Run
  # this by hand once canary is healthy to validate the suite.
  workflow_dispatch:
    inputs:
      version:
        description: tuist version to test
        default: "4.155.0"

permissions:
  contents: read

jobs:
  backward-compatibility-acceptance:
    name: Backward-Compatibility Acceptance (smoke)
    runs-on: tuist-macos
    timeout-minutes: 15
    environment: server-k8s-canary
    permissions:
      contents: read
      id-token: write
    env:
      MIN_SUPPORTED_TUIST_VERSION: ${{ github.event.inputs.version || '4.155.0' }}
      MISE_TASK_RUN_AUTO_INSTALL: 0
      TUIST_URL: https://canary.tuist.dev
      TUIST_AUTH_EMAIL: tuistrocks@tuist.dev
      TUIST_AUTH_PASSWORD: tuistrocks
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
          install_args: "bats"
      - name: Install oldest supported tuist
        run: mise install "tuist@${MIN_SUPPORTED_TUIST_VERSION}"
      - name: Resolve oldest supported tuist binary
        id: oldtuist
        run: |
          install_dir="$(mise where "tuist@${MIN_SUPPORTED_TUIST_VERSION}")"
          bin="$(find "$install_dir" -type f -name tuist | head -n1)"
          if [ -z "$bin" ]; then
            echo "Could not locate the tuist binary under $install_dir" >&2
            exit 1
          fi
          echo "tuist_bin=$bin" >> "$GITHUB_OUTPUT"
          "$bin" version
      - name: Run backward-compatibility acceptance test
        env:
          TUIST_EXECUTABLE: ${{ steps.oldtuist.outputs.tuist_bin }}
        run: mise run --no-deps e2e module_cache_backward_compat
