name: ProjectDescription Documentation
on:
  push:
    branches:
      - main
    paths:
      - cli/Sources/ProjectDescription/**
      - Package.swift
      - Package.resolved
      - .github/workflows/project-description-docs.yml

permissions:
  id-token: write
  contents: read

concurrency:
  group: project-description-docs
  cancel-in-progress: true

jobs:
  build:
    name: Build ProjectDescription docs
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: linux-docc-${{ hashFiles('Package.resolved') }}
          restore-keys: linux-docc-
      - name: Build DocC documentation
        run: |
          swift package --replace-scm-with-registry \
            --allow-writing-to-directory .build/documentation \
            generate-documentation \
            --product ProjectDescription \
            --disable-indexing \
            --output-path .build/documentation \
            --transform-for-static-hosting \
            --hosting-base-path ""
          echo "/ /documentation/projectdescription/project 301" > .build/documentation/_redirects
      - name: Save SPM cache
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.spm-cache.outputs.cache-primary-key }}
      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: project-description-docs
          path: .build/documentation

  deploy:
    name: Deploy ProjectDescription docs
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download documentation
        uses: actions/download-artifact@v4
        with:
          name: project-description-docs
          path: documentation
      - uses: 1password/install-cli-action@v2
      - name: Deploy to Cloudflare Pages
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://tuist/Cloudflare/CLOUDFLARE_API_TOKEN
          CLOUDFLARE_ACCOUNT_ID: op://tuist/Cloudflare/CLOUDFLARE_ACCOUNT_ID
        run: |
          op run -- npx wrangler pages deploy --commit-hash ${{ github.sha }} --branch ${{ github.ref_name }} --project-name tuist-project-description documentation
