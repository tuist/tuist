name: Kura Runner Cache Routing Smoke

# Re-fire after Cilium enable-endpoint-routes=true on staging (round 3 — fresh post-restart poller).
# Manual A/B measurement workflow comparing two Kura cache paths from a
# staging Linux runner Pod using REAL Gradle build-cache traffic. We
# repeatedly run the same Gradle build, swapping `TUIST_CACHE_ENDPOINT`
# between an in-cluster Kura URL and the public Kura URL, and report
# wall-clock for each phase. The Tuist Gradle plugin already honours
# `TUIST_CACHE_ENDPOINT` (TuistConfigReader.kt) and reads the auth
# token from the local credential store written by `tuist auth login`
# (TokenProvider.kt), so no plugin change is needed — we just override
# the endpoint env per phase.
#
# Validates the runner Pod NetworkPolicy carve-out (egress to the kura
# namespace on cache ports) and quantifies the in-cluster speedup with
# REAL artifact traffic (compiled JARs from the Tuist Gradle plugin
# project) rather than a synthetic `/up` probe.
#
# Prereqs:
#   * NetworkPolicy carve-out deployed to staging (this PR's
#     `infra/helm/tuist/templates/runners-namespace.yaml`).
#   * The Tuist Gradle plugin project (`tuist/gradle-plugin`, set in
#     `gradle/tuist.toml`) is registered on staging.tuist.dev and the
#     `tuistrocks@tuist.dev` acceptance account has access to it.
#
# Triggers:
#   - workflow_dispatch: full control over the URLs + iterations.
#   - push to the feat branch when this file changes: lets us run the
#     smoke before the workflow lands on the default branch (GitHub
#     `workflow_dispatch` requires the workflow file to be on main). A
#     trivial edit to this file (e.g. bumping a comment) re-fires the
#     smoke with the env-level defaults below.

on:
  workflow_dispatch:
    inputs:
      project_handle:
        description: Staging project handle the build is attributed to
        required: false
        default: tuist/gradle-plugin
        type: string
      public_kura_url:
        description: Public Kura URL (e.g. `https://tuist-eu-central-1.kura.tuist.dev`)
        required: true
        type: string
      private_kura_url:
        description: In-cluster Kura URL (e.g. `http://kura-tuist-eu-central-1.kura.svc.cluster.local:4000`)
        required: true
        type: string
      iterations:
        description: Repetitions per phase (each is a clean build that round-trips Gradle's cache)
        required: false
        default: '3'
        type: string
  push:
    branches:
      - feat/kura-scaleway-runner-cache
    paths:
      - .github/workflows/kura-runner-cache-routing-smoke.yml

permissions:
  contents: read
  # `tuist auth login` detects CI and switches to GitHub OIDC, which
  # needs this scope to mint a workflow-scoped JWT to exchange with
  # staging.tuist.dev for an access token. Staging needs to trust GH
  # OIDC for `tuist/tuist`; if it doesn't, `tuist auth login` errors
  # with a clear message and we adjust there.
  id-token: write

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}
  MISE_TASK_RUN_AUTO_INSTALL: 0
  MISE_GITHUB_ATTESTATIONS: 0
  # Force the CLI + Gradle plugin to talk to staging, not the local
  # acceptance-test server some runner shapes bake in via
  # TUIST_SERVER_URL.
  TUIST_URL: https://staging.tuist.dev
  # Fallbacks so the `push` trigger (no workflow inputs available) runs
  # against the *only* staging Kura instance we currently have — the
  # `kura-smoke-staging-regional` account's regional eu-central node.
  # The `tuist` staging account has no Kura provisioned (and its
  # template-derived public hostname would collide with production DNS).
  # `workflow_dispatch` overrides each via its input.
  PROJECT_HANDLE: ${{ inputs.project_handle || 'kura-smoke-staging-regional/gradle-bench' }}
  PUBLIC_KURA_URL: ${{ inputs.public_kura_url || 'https://kura-smoke-staging-regional-eu-central-1.kura.tuist.dev' }}
  PRIVATE_KURA_URL: ${{ inputs.private_kura_url || 'http://kura-kura-smoke-staging-regional-eu-central-1.kura.svc.cluster.local:4000' }}
  ITERATIONS: ${{ inputs.iterations || '3' }}

jobs:
  routing-smoke:
    # Pinned directly at the shape pool's dispatch label instead of the
    # `tuist-staging-linux` profile. The profile path requires the
    # server's `Tuist.Runners.Dispatch.resolve_dispatch_target` to map
    # the label to a pool; while debugging that resolution we observed
    # the staging profile's webhooks never reached a successful claim,
    # so we side-step by targeting the pool shape directly. The shape
    # advertises the same Ubuntu 22.04 LTS runner image as the profile
    # would have resolved to (`runnersFleetLinux.shapeRunnerImage`).
    runs-on: shape-linux-2vcpu-8gb
    timeout-minutes: 30
    steps:
      - name: Early diagnostics — before any other step
        run: |
          set -uo pipefail
          echo "::group::early-resolv.conf"
          cat /etc/resolv.conf 2>&1 | head -10 || true
          echo "::endgroup::"
          echo "::group::early-dns Kura"
          nslookup kura-kura-smoke-staging-regional-eu-central-1.kura.svc.cluster.local 2>&1 | tail -8 || true
          echo "::endgroup::"
          echo "::group::early-clusterIP probe"
          curl -sS -o /dev/null --max-time 6 -w "early clusterIP -> HTTP %{http_code}\n" \
            -H "Host: kura-kura-smoke-staging-regional-eu-central-1.kura.svc.cluster.local" \
            http://10.140.109.22:4000/up 2>&1 || true
          echo "::endgroup::"

      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "java gradle tuist"
          cache: "true"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show environment
        run: |
          set -euo pipefail
          echo "Hostname:     $(hostname)"
          echo "Kernel:       $(uname -a)"
          echo "Architecture: $(uname -m)"
          echo "Project:      $PROJECT_HANDLE"
          echo "Server:       $TUIST_URL"
          echo "Public URL:   $PUBLIC_KURA_URL"
          echo "Private URL:  $PRIVATE_KURA_URL"
          echo "Iterations:   $ITERATIONS"

      - name: Network diagnostics
        run: |
          set -uo pipefail
          echo "::group::resolv.conf"
          cat /etc/resolv.conf || true
          echo "::endgroup::"
          echo "::group::nslookup kube-dns control plane (sanity)"
          nslookup kubernetes.default.svc.cluster.local 2>&1 | head -10 || true
          echo "::endgroup::"
          echo "::group::nslookup against private hostname"
          nslookup "$(echo "$PRIVATE_KURA_URL" | sed -E 's|^https?://||;s|:.*$||')" 2>&1 | head -20 || true
          echo "::endgroup::"
          echo "::group::nslookup against the smoke kura headless"
          nslookup kura-kura-smoke-staging-regional-eu-central-1-headless.kura.svc.cluster.local 2>&1 | head -10 || true
          echo "::endgroup::"
          echo "::group::route table (via /proc since iproute2 missing)"
          (command -v ip >/dev/null && ip route) || cat /proc/net/route || true
          echo "::endgroup::"
          echo "::group::curl with raw ClusterIP (rules out DNS)"
          curl -v --max-time 8 --resolve "kura-kura-smoke-staging-regional-eu-central-1.kura.svc.cluster.local:4000:10.140.109.22" \
            "http://kura-kura-smoke-staging-regional-eu-central-1.kura.svc.cluster.local:4000/up" 2>&1 | head -30 || true
          echo "::endgroup::"
          echo "::group::curl raw IP no host header (truly DNS-free)"
          curl -v --max-time 8 -H "Host: kura-kura-smoke-staging-regional-eu-central-1.kura.svc.cluster.local" \
            "http://10.140.109.22:4000/up" 2>&1 | head -30 || true
          echo "::endgroup::"
          echo "::group::curl -v against private hostname (verbose)"
          curl -v --max-time 8 "$PRIVATE_KURA_URL/up" 2>&1 | head -30 || true
          echo "::endgroup::"

      - name: Reachability probe
        run: |
          set -uo pipefail
          # Surface routing issues before we burn 10+ minutes of Gradle
          # builds against an unreachable endpoint. /up needs no auth.
          # `--write-out` is THE source of truth here; the `|| echo 000`
          # only fires on transport failure when curl writes nothing —
          # `%{http_code}` always emits exactly 3 chars on success.
          for label in public private; do
            if [ "$label" = public ]; then url="$PUBLIC_KURA_URL"; fi
            if [ "$label" = private ]; then url="$PRIVATE_KURA_URL"; fi
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 8 "$url/up" 2>/dev/null)
            : "${code:=000}"
            if [ "$code" = "000" ]; then
              echo "::error::$label probe FAILED — $url/up unreachable. Check the NetworkPolicy carve-out / DNS."
              exit 1
            fi
            echo "$label probe OK — $url/up -> HTTP $code"
          done

      - name: Authenticate with staging Tuist
        run: |
          # `tuist auth login` detects CI (via the GH Actions env vars)
          # and uses GitHub OIDC: it requests an id-token from the
          # workflow, hands it to staging.tuist.dev, and writes the
          # returned Tuist access + refresh tokens into the local
          # credential store keyed by TUIST_URL. The Gradle plugin's
          # TokenProvider reads from that same store on every cache
          # request. Some acceptance-test runner shapes export
          # TUIST_SERVER_URL=http://localhost:8223 which would override
          # TUIST_URL inside the CLI; clear it before login so the
          # token is keyed against staging.
          unset TUIST_SERVER_URL TUIST_HOSTED
          tuist auth login

      - name: Configure Gradle project handle
        run: |
          set -euo pipefail
          # Override the in-repo gradle/tuist.toml so the plugin attributes
          # this build to the input project on staging.
          cat > gradle/tuist.toml <<TOML
          project = "${PROJECT_HANDLE}"
          TOML

      - name: Run A/B benchmark
        run: |
          set -uo pipefail
          IT="$ITERATIONS"

          # Clears every layer Gradle would hit before talking to Kura,
          # so each measured build round-trips both the local
          # build-cache and the remote Tuist build-cache.
          purge_gradle_caches() {
            rm -rf gradle/build gradle/.gradle ~/.gradle/caches/build-cache-1 || true
          }

          # Runs `./gradlew assemble --build-cache` and captures total
          # wall-clock. We use `assemble` not `build` to keep the run
          # cache-bound rather than test-bound (the plugin's tests boot
          # an embedded server, which would dominate timing). Returns
          # seconds with millisecond precision.
          measure_one() {
            local label=$1
            local url=$2
            local kind=$3   # "miss" (purge first) or "hit" (warm cache)
            if [ "$kind" = "miss" ]; then purge_gradle_caches; fi
            # GRADLE_USER_HOME stays default so the daemon is reused
            # across phases. The cache state is what we vary.
            local started ended
            started=$(date +%s.%N)
            ( cd gradle && TUIST_CACHE_ENDPOINT="$url" \
                ./gradlew --no-daemon -Dorg.gradle.caching=true \
                          --build-cache assemble \
                          >>/tmp/gradle-${label}-${kind}.log 2>&1 ) || true
            ended=$(date +%s.%N)
            python3 -c "import sys; print(f'{float(sys.argv[1]) - float(sys.argv[2]):.3f}')" "$ended" "$started"
          }

          declare -A results
          for kind in miss hit; do
            for path in private public; do
              if [ "$path" = public ]; then url="$PUBLIC_KURA_URL"; fi
              if [ "$path" = private ]; then url="$PRIVATE_KURA_URL"; fi
              for i in $(seq 1 "$IT"); do
                echo "::group::$path / $kind / iteration $i"
                t=$(measure_one "$path" "$url" "$kind")
                results["$path|$kind|$i"]=$t
                echo "wall-clock: ${t}s"
                # Surface the last 30 lines of the Gradle log inside the
                # group so a failed build is visible without a re-run.
                tail -30 "/tmp/gradle-${path}-${kind}.log" || true
                echo "::endgroup::"
              done
            done
          done

          # Dump CSV for the summarizer.
          {
            echo "path,kind,iter,seconds"
            for key in "${!results[@]}"; do
              IFS='|' read -r path kind iter <<<"$key"
              echo "$path,$kind,$iter,${results[$key]}"
            done
          } | tee /tmp/results.csv

      - name: Summarize
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import csv, statistics
          rows = []
          with open('/tmp/results.csv') as f:
              for r in csv.DictReader(f):
                  rows.append({"path": r["path"], "kind": r["kind"], "iter": int(r["iter"]), "seconds": float(r["seconds"])})

          def col(kind, path):
              return [r["seconds"] for r in rows if r["kind"] == kind and r["path"] == path]

          def stats(vs):
              if not vs:
                  return None
              sv = sorted(vs)
              return {
                  "n": len(sv),
                  "min": sv[0],
                  "max": sv[-1],
                  "mean": statistics.mean(sv),
                  "median": statistics.median(sv),
              }

          print()
          print(f"{'phase':<10} {'path':<8} {'n':>3} {'min':>8} {'median':>8} {'mean':>8} {'max':>8}   (seconds wall-clock)")
          print("-" * 64)
          for kind in ["miss", "hit"]:
              for path in ["public", "private"]:
                  s = stats(col(kind, path))
                  if s is None:
                      print(f"{kind:<10} {path:<8} {'-':>3}")
                      continue
                  print(f"{kind:<10} {path:<8} {s['n']:>3} {s['min']:>8.2f} {s['median']:>8.2f} {s['mean']:>8.2f} {s['max']:>8.2f}")
              print()

          for kind in ["miss", "hit"]:
              pub = stats(col(kind, "public"))
              priv = stats(col(kind, "private"))
              if pub and priv and priv["median"] > 0:
                  saved = pub["median"] - priv["median"]
                  ratio = pub["median"] / priv["median"]
                  print(f"{kind}: private median is {ratio:.2f}x the speed of public ({saved:+.2f}s saved per build)")
          PY

      - name: Upload Gradle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: /tmp/gradle-*.log
          if-no-files-found: ignore
          retention-days: 7
