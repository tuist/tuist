name: Runners Controller Image

# Mirrors .github/workflows/kura-controller-image.yml. The
# runners-controller binary reconciles RunnerPool CRDs into the
# Pod + ServiceAccount pairs the Tuist server's dispatch endpoint
# authenticates against; the staging chart can't roll out without
# this image present in ghcr.io.

on:
  push:
    branches:
      - main
      # Build on the long-lived bring-up branch too so staging can
      # consume the image before this lands on main.
      - feat/runners-shape-2
    paths:
      - infra/runners-controller/**
      - .github/workflows/runners-controller-image.yml
  pull_request:
    paths:
      - infra/runners-controller/**
      - .github/workflows/runners-controller-image.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist-runners-controller

jobs:
  format:
    runs-on: tuist-production-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/runners-controller/go.mod
          cache-dependency-path: infra/runners-controller/go.sum
      - name: Check formatting
        working-directory: infra/runners-controller
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

  test:
    runs-on: tuist-production-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/runners-controller/go.mod
          cache-dependency-path: infra/runners-controller/go.sum
      - name: Test
        working-directory: infra/runners-controller
        run: go test ./...
      - name: Vet
        working-directory: infra/runners-controller
        run: go vet ./...

  build:
    needs: test
    if: github.event_name != 'pull_request'
    # TODO: migrate to tuist-production-linux once the runner image ships
    # a docker daemon — buildx requires a working docker engine.
    runs-on: namespace-profile-default
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          GIT_SHA="${GITHUB_SHA::12}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${GIT_SHA}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/runners-controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=runners-controller
          cache-to: type=gha,mode=max,scope=runners-controller
