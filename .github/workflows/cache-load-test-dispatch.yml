name: Cache Load Test Dispatch

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: read

jobs:
  dispatch:
    name: Dispatch load test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch when load-test label is added
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL_NAME: ${{ github.event.label.name }}
          IS_PULL_REQUEST: ${{ github.event.issue.pull_request != null }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          remove_label() {
            gh api "/repos/${REPOSITORY}/issues/${PR_NUMBER}/labels/load-test" -X DELETE || true
          }

          if [ "$LABEL_NAME" != 'load-test' ]; then
            echo "Ignoring label: ${LABEL_NAME}"
            exit 0
          fi

          if [ "$IS_PULL_REQUEST" != 'true' ]; then
            echo "Ignoring load-test label on non-PR issue #${PR_NUMBER}"
            remove_label
            exit 0
          fi

          pr_json=$(gh api "/repos/${REPOSITORY}/pulls/${PR_NUMBER}")
          head_repo=$(jq -r '.head.repo.full_name' <<<"$pr_json")
          base_ref=$(jq -r '.base.ref' <<<"$pr_json")

          if [ "$head_repo" != "$REPOSITORY" ]; then
            echo "Ignoring load-test label for fork PR #${PR_NUMBER}"
            remove_label
            exit 0
          fi

          if [ "$base_ref" != 'main' ]; then
            echo "Ignoring load-test label for PR #${PR_NUMBER} targeting ${base_ref}"
            remove_label
            exit 0
          fi

          changed_files=$(gh api "/repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')

          has_relevant_changes=false
          while IFS= read -r path; do
            case "$path" in
              cache/*|tuist_common/*|.github/actions/cache-deploy-staging/*|.github/actions/cache-run-k6/*|.github/workflows/cache-load-test.yml)
                has_relevant_changes=true
                break
                ;;
            esac
          done <<< "$changed_files"

          if [ "$has_relevant_changes" != 'true' ]; then
            echo "Ignoring load-test label for PR #${PR_NUMBER} without cache-related changes"
            remove_label
            exit 0
          fi

          pr_ref=$(jq -r '.head.ref' <<<"$pr_json")
          pr_sha=$(jq -r '.head.sha' <<<"$pr_json")
          main_sha=$(jq -r '.base.sha' <<<"$pr_json")

          gh workflow run cache-load-test.yml \
            --ref "$pr_ref" \
            -f pr_number="$PR_NUMBER" \
            -f pr_ref="$pr_ref" \
            -f pr_sha="$pr_sha" \
            -f main_sha="$main_sha"

          remove_label
