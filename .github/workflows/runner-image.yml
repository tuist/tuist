name: Runner Image

# On-demand build of the Tart VM image hosted on the customer-runner
# Mac mini fleet. Invoke via `gh workflow run runner-image.yml --ref
# <branch>` when probing image contents or smoke-testing a Packer
# change before merging.
#
# The push-on-main flow lives in release.yml's runner-image-build +
# release-runner-image jobs — that's the path that publishes the
# immutable per-release profile tags and pins
# runnersFleet.runnerImage in the chart. This workflow's
# `:macos-<dashes>-<git-sha>` tag is dispatch-only and not consumed
# by the chart.
#
# Builds on top of `ghcr.io/tuist/macos-tahoe-xcode:<xcode-version-dashes>`
# (built by `infra/macos-xcode-image`). Xcode + dev tools + WWDR certs
# live in the base; this build just adds the GitHub Actions runner
# agent and dispatch loop on top, so a rebuild is ~2 min instead of
# the ~30 min an all-in-one rebuild used to cost.
#
# Runs on the same self-hosted bare-metal Mac mini as the other
# Tart images — Tart needs a live GUI session for
# Virtualization.framework, so this can't run on hosted runners.

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: "Xcode version of the profile to (re)build (e.g. 26.5, 26.4.1). Use this to refresh a profile that's out of the release.yml matrix without bumping the chart pin."
        required: true
      runner_version:
        description: "GitHub Actions runner version"
        required: false
        default: "2.334.0"

concurrency:
  group: runner-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates. crane writes creds to ~/.docker/config.json,
      # which Tart reads via the Docker credential-helper protocol
      # for both pull (this build's clone of the base) and the push
      # at the end of the job. Bypasses both the macOS keychain
      # (which `tart login` would use, and which gates on a Tahoe-
      # LaunchAgent-incompatible "User interaction" prompt) and
      # Tart 2.32.1's env-var-only push path (which hangs with
      # "Error: The request timed out").
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      - name: Reclaim Tart disk
        # Delete every locally-cloned VM on this host, not just the
        # one this workflow produces. The sibling
        # `xcresult-processor-image` workflow runs on the same host
        # and leaves its working VM behind (and vice versa); each
        # VM is ~80 GB, and on an M1-M's 256 GB SSD they accumulate
        # fast and the next `tart clone` fails with "The file
        # couldn't be saved because there isn't enough space."
        # Filtering on `Source=local` keeps the cached OCI base
        # image (`ghcr.io/cirruslabs/macos-tahoe-xcode:26.4`,
        # ~70 GB) so the next clone is still fast — `tart prune`
        # below is what reclaims that cache when an image is
        # upgraded. The `--older-than 1` vms prune doesn't catch
        # the clones because `tart list` updates the access time.
        # New image-bake workflows on this host don't need this
        # step updated; their VMs get cleaned up the same way.
        run: |
          set -uo pipefail
          tart list || true
          df -h /
          tart list | awk '$1 == "local" { print $2 }' | while read -r vm; do
            tart stop "$vm" 2>/dev/null || true
            tart delete "$vm" 2>/dev/null || true
          done
          tart prune --entries caches --older-than 0
          df -h /

      - name: Build image
        id: build
        working-directory: infra/runner-image
        env:
          XCODE: ${{ inputs.xcode_version }}
        run: |
          set -euo pipefail
          # Single-profile dispatch. The multi-profile rebuild loop
          # is in release.yml's runner-image-build matrix.
          BASE_TAG="${XCODE//./-}"
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
          PROFILE="macos-${BASE_TAG}"
          echo "Xcode:      ${XCODE}"
          echo "Base image: ${BASE_IMAGE}"
          echo "Profile:    ${PROFILE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-runner" \
            -var "runner_version=${{ inputs.runner_version || '2.334.0' }}" \
            runner.pkr.hcl
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"

      # Push to GHCR via a disk-backed local OCI registry on the
      # builder. tart's own push uses Swift URLSession, which is
      # documented-unreliable for multi-GB blob uploads (see
      # cirruslabs/tart#963 — skopeo pushes the same image ~40x more
      # reliably). Split into:
      #   1. tart push to localhost over loopback (~5 min, no
      #      network), so the multi-GB upload completes regardless
      #      of upstream issues.
      #   2. skopeo copy to GHCR with mature retry semantics.
      # `crane registry serve --disk` (already on the builder via
      # the bootstrap) is a single-binary OCI v2 registry. Same shape
      # as `macos-xcode-image.yml` — keep them in sync if either
      # workflow's push path changes.
      - name: Start local OCI registry
        run: |
          set -euo pipefail
          mkdir -p /tmp/local-registry
          nohup crane registry serve --address 127.0.0.1:5000 --disk /tmp/local-registry \
            > /tmp/local-registry.log 2>&1 &
          echo $! > /tmp/local-registry.pid
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:5000/v2/ >/dev/null 2>&1; then
              echo "local registry up (pid $(cat /tmp/local-registry.pid))"
              exit 0
            fi
            sleep 0.5
          done
          echo "local registry did not come up in 10s; log:" >&2
          cat /tmp/local-registry.log >&2 || true
          exit 1

      - name: Push image to local registry
        id: push-local
        run: |
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA::8}"
          PROFILE="${{ steps.build.outputs.profile }}"
          TAG="${PROFILE}-${GIT_SHA}"
          # --insecure for HTTP loopback; --chunk-size 3 keeps the
          # monolithic-upload path off (it's the same path that fails
          # against ghcr.io).
          tart push --insecure --chunk-size 3 \
            tuist-runner "127.0.0.1:5000/tuist/tuist-runner:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Copy image to GHCR (skopeo)
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.push-local.outputs.tag }}"
          for attempt in 1 2 3; do
            echo "skopeo copy attempt ${attempt} starting at $(date -u +%H:%M:%SZ)" >&2
            if skopeo copy \
                --src-tls-verify=false \
                --dest-creds "tuist-bot:${GITHUB_TOKEN}" \
                "docker://127.0.0.1:5000/tuist/tuist-runner:${TAG}" \
                "docker://ghcr.io/tuist/tuist-runner:${TAG}"; then
              echo "Pushed ghcr.io/tuist/tuist-runner:${TAG} on attempt ${attempt}"
              echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "skopeo copy attempt ${attempt} failed; sleeping 60s before retry" >&2
            sleep 60
          done
          echo "skopeo copy failed three times in a row" >&2
          exit 1

      - name: Cleanup
        if: always()
        run: |
          tart delete tuist-runner 2>/dev/null || true
          if [ -f /tmp/local-registry.pid ]; then
            kill "$(cat /tmp/local-registry.pid)" 2>/dev/null || true
            rm -f /tmp/local-registry.pid
          fi
          rm -rf /tmp/local-registry /tmp/local-registry.log
