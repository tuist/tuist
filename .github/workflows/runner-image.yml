name: Runner Image

# On-demand build of the Tart VM image hosted on the customer-runner
# Mac mini fleet. Invoke via `gh workflow run runner-image.yml --ref
# <branch>` when probing image contents or smoke-testing a Packer
# change before merging.
#
# The push-on-main flow lives in server-production-deployment.yml's runner-image-build +
# release-runner-image jobs — that's the path that publishes the
# immutable per-release profile tags and pins
# runnersFleet.runnerImage in the chart. This workflow's
# `:macos-<dashes>-<git-sha>` tag is dispatch-only and not consumed
# by the chart.
#
# Builds on top of `ghcr.io/tuist/macos-tahoe-xcode:<xcode-version-dashes>`
# (built by `infra/macos-xcode-image`). Xcode + dev tools + WWDR certs
# live in the base; this build just adds the GitHub Actions runner
# agent and dispatch loop on top, so a rebuild is ~2 min instead of
# the ~30 min an all-in-one rebuild used to cost.
#
# Runs on the same self-hosted bare-metal Mac mini as the other
# Tart images — Tart needs a live GUI session for
# Virtualization.framework, so this can't run on hosted runners.

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: "Xcode version of the profile to (re)build (e.g. 26.5, 26.4.1). Use this to refresh a profile that's out of the server-production-deployment.yml matrix without bumping the chart pin."
        required: true
      runner_version:
        description: "GitHub Actions runner version"
        required: false
        default: "2.334.0"

concurrency:
  group: runner-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates. crane writes creds to ~/.docker/config.json,
      # which Tart reads via the Docker credential-helper protocol
      # for both pull (this build's clone of the base) and the push
      # at the end of the job. Bypasses both the macOS keychain
      # (which `tart login` would use, and which gates on a Tahoe-
      # LaunchAgent-incompatible "User interaction" prompt) and
      # Tart 2.32.1's env-var-only push path (which hangs with
      # "Error: The request timed out").
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      - uses: ./.github/actions/reclaim-tart-disk

      - name: Build image
        id: build
        working-directory: infra/runner-image
        env:
          XCODE: ${{ inputs.xcode_version }}
        run: |
          set -euo pipefail
          # Single-profile dispatch. The multi-profile rebuild loop
          # is in server-production-deployment.yml's runner-image-build matrix.
          BASE_TAG="${XCODE//./-}"
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
          PROFILE="macos-${BASE_TAG}"
          echo "Xcode:      ${XCODE}"
          echo "Base image: ${BASE_IMAGE}"
          echo "Profile:    ${PROFILE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-runner" \
            -var "runner_version=${{ inputs.runner_version || '2.334.0' }}" \
            runner.pkr.hcl
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"

      - name: Restore nvram.bin if missing
        env:
          XCODE: ${{ inputs.xcode_version }}
        # packer-plugin-tart v1.20.0 builds leave the VM bundle
        # without `nvram.bin`, so the very next `tart push` uploads
        # config + disk successfully then fails with
        # `Error: The file "nvram.bin" doesn't exist.` Restore it
        # from a fresh clone of the base image (no provisioner ever
        # mutates auxiliary storage from inside the guest, so the
        # base's nvram is equivalent for our purposes).
        run: |
          set -euo pipefail
          BUNDLE="$HOME/.tart/vms/tuist-runner"
          echo "pre-push bundle contents:"
          ls -la "$BUNDLE"
          if [ ! -f "$BUNDLE/nvram.bin" ]; then
            BASE_TAG="${XCODE//./-}"
            BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
            echo "nvram.bin missing — restoring from ${BASE_IMAGE}"
            tart delete nvram-restore 2>/dev/null || true
            tart clone "$BASE_IMAGE" nvram-restore
            cp "$HOME/.tart/vms/nvram-restore/nvram.bin" "$BUNDLE/nvram.bin"
            tart delete nvram-restore
            echo "restored nvram.bin ($(du -h "$BUNDLE/nvram.bin" | cut -f1))"
          fi

      - name: Push image to GHCR
        id: push
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          # Tart's OCI-cache prune fires opportunistically during
          # `tart push`'s internal staging step and races the push
          # of the source VM bundle — when it loses, nvram.bin is
          # truncated mid-upload (see cirruslabs/tart#860). Disable
          # the prune for the duration of the push; the cache was
          # already trimmed at the start of the job by the
          # `reclaim-tart-disk` composite action and won't grow
          # before push completes.
          TART_NO_AUTO_PRUNE: "1"
        # Direct tart push. Cirrus uses the same path to publish
        # macos-tahoe-xcode at the same size; the prior bridge through
        # a local registry was an unsuccessful workaround on a
        # different host's structurally bad network. Outer 3× retry
        # stays as belt-and-braces; blob uploads are content-
        # addressed so a re-push only re-uploads layers that didn't
        # make it on the previous attempt.
        run: |
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA::8}"
          PROFILE="${{ steps.build.outputs.profile }}"
          TAG="${PROFILE}-${GIT_SHA}"
          for attempt in 1 2 3; do
            echo "tart push attempt ${attempt} starting at $(date -u +%H:%M:%SZ)" >&2
            if tart push tuist-runner "ghcr.io/tuist/tuist-runner:${TAG}"; then
              echo "Pushed ghcr.io/tuist/tuist-runner:${TAG} on attempt ${attempt}"
              echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "tart push attempt ${attempt} failed; sleeping 60s before retry" >&2
            sleep 60
          done
          echo "tart push failed three times in a row" >&2
          exit 1

      - name: Cleanup
        if: always()
        run: tart delete tuist-runner 2>/dev/null || true
