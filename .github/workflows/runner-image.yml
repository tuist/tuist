name: Runner Image

# On-demand build of the Tart VM image hosted on the customer-runner
# Mac mini fleet. Invoke via `gh workflow run runner-image.yml --ref
# <branch>` when probing image contents or smoke-testing a Packer
# change before merging.
#
# The push-on-main flow lives in release.yml's release-runner-image
# job — that's the path that produces digest-pinned tags and rewrites
# the runnersFleet.runnerImage value in the chart. This workflow's
# `:<git-sha>` tag is dispatch-only and not consumed by the chart.
#
# Runs on the same self-hosted bare-metal Mac mini as the
# xcresult-processor image — Tart needs a live GUI session for
# Virtualization.framework, so this can't run on hosted runners.

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: "Base Tart image"
        required: false
        default: "ghcr.io/cirruslabs/macos-tahoe-xcode:26.4.1"
      runner_version:
        description: "GitHub Actions runner version"
        required: false
        default: "2.334.0"

concurrency:
  group: runner-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4

      - name: Install Tart
        run: brew install cirruslabs/cli/tart

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      # Same anonymous-pull dance as xcresult-processor-image.yml:
      # the bare-metal runner has tuist-bot creds cached for ghcr.io
      # which don't authorize ghcr.io/cirruslabs/* pulls. Tart also
      # consults Docker credential helpers, and this runner can have
      # the macOS helper installed without the Docker CLI — clear
      # both stores before Packer clones ghcr.io/cirruslabs/*.
      - name: Drop cached ghcr.io credentials
        run: |
          tart logout ghcr.io || true
          if command -v docker >/dev/null 2>&1; then
            docker logout ghcr.io || true
          fi
          for helper in docker-credential-osxkeychain docker-credential-desktop; do
            if command -v "$helper" >/dev/null 2>&1; then
              printf 'ghcr.io' | "$helper" erase || true
              printf 'https://ghcr.io' | "$helper" erase || true
            fi
          done

      - name: Reclaim Tart disk
        run: |
          set -uo pipefail
          tart list --format json || true
          df -h /
          tart stop tuist-runner 2>/dev/null || true
          tart delete tuist-runner 2>/dev/null || true
          tart prune --entries caches --older-than 0
          tart prune --entries vms --older-than 1
          df -h /

      - name: Build image
        working-directory: infra/runner-image
        run: |
          set -euo pipefail
          docker_config="$HOME/.docker/config.json"
          docker_config_backup=""
          restore_docker_config() {
            if [ -n "$docker_config_backup" ] && [ -f "$docker_config_backup" ]; then
              mkdir -p "$HOME/.docker"
              mv "$docker_config_backup" "$docker_config"
            fi
          }
          trap restore_docker_config EXIT

          # Tart hardcodes ~/.docker/config.json when looking up Docker
          # credential helpers. Move it aside so the public Cirrus image is
          # pulled anonymously instead of through stale ghcr.io credentials.
          if [ -f "$docker_config" ]; then
            docker_config_backup="$(mktemp "${RUNNER_TEMP:-/tmp}/docker-config.XXXXXX")"
            mv "$docker_config" "$docker_config_backup"
          fi

          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${{ inputs.base_image || 'ghcr.io/cirruslabs/macos-tahoe-xcode:26.4' }}" \
            -var "output_image=tuist-runner" \
            -var "runner_version=${{ inputs.runner_version || '2.334.0' }}" \
            runner.pkr.hcl

      # Note: no `tart login ghcr.io` step. Tart's login writes to the
      # macOS keychain, which on Tahoe-host LaunchAgents is gated by a
      # "User interaction is not allowed" prompt the headless runner
      # can't satisfy. The Push step below uses TART_REGISTRY_USERNAME
      # / TART_REGISTRY_PASSWORD env-vars instead, which bypass
      # keychain entirely. (The earlier "Drop cached ghcr.io
      # credentials" step similarly works around stale keychain creds
      # that would 403 anonymous Cirruslabs base-image pulls.)

      - name: Push image to GHCR
        id: push
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA::8}"
          tart push tuist-runner "ghcr.io/tuist/tuist-runner:${GIT_SHA}"
          echo "Pushed ghcr.io/tuist/tuist-runner:${GIT_SHA}"
          echo "tag=${GIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Cleanup
        if: always()
        run: tart delete tuist-runner 2>/dev/null || true
