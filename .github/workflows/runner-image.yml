name: Runner Image

# On-demand build of the Tart VM image hosted on the customer-runner
# Mac mini fleet. Invoke via `gh workflow run runner-image.yml --ref
# <branch>` when probing image contents or smoke-testing a Packer
# change before merging.
#
# The push-on-main flow lives in release.yml's release-runner-image
# job — that's the path that produces digest-pinned tags and rewrites
# the runnersFleet.runnerImage value in the chart. This workflow's
# `:<git-sha>` tag is dispatch-only and not consumed by the chart.
#
# Layer split: this is Layer 2 on top of
# `ghcr.io/tuist/macos-tahoe-xcode:<xcode-version-dashes>` (built by
# `infra/macos-xcode-image`). Xcode + dev tools + WWDR certs live
# in Layer 1; this build just adds the GitHub Actions runner agent
# and dispatch loop on top, so a Layer 2 build is ~2 min instead of
# the ~30 min an all-in-one rebuild used to cost.
#
# Runs on the same self-hosted bare-metal Mac mini as the other
# Tart images — Tart needs a live GUI session for
# Virtualization.framework, so this can't run on hosted runners.

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: "Layer 1 base Tart image. Bump the tag to test against a different Xcode profile."
        required: false
        default: "ghcr.io/tuist/macos-tahoe-xcode:26-4-1"
      runner_version:
        description: "GitHub Actions runner version"
        required: false
        default: "2.334.0"

concurrency:
  group: runner-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 30
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4

      - name: Update Tart
        run: |
          set -euo pipefail
          brew update
          brew upgrade cirruslabs/cli/tart || brew install cirruslabs/cli/tart
          tart --version

      # Log in BEFORE Packer build so Tart's clone of the Layer 1
      # base (a private ghcr.io/tuist/* image) authenticates. This
      # is the opposite of the previous Cirrus flow, where we
      # cleared cached creds to allow anonymous pulls of
      # ghcr.io/cirruslabs/* — our Layer 1 is in our own org and
      # requires the tuist-bot token to pull.
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | tart login ghcr.io --username tuist-bot --password-stdin

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      - name: Reclaim Tart disk
        run: |
          set -uo pipefail
          tart list --format json || true
          df -h /
          tart stop tuist-runner 2>/dev/null || true
          tart delete tuist-runner 2>/dev/null || true
          tart prune --entries caches --older-than 0
          tart prune --entries vms --older-than 1
          df -h /

      - name: Build image
        working-directory: infra/runner-image
        run: |
          set -euo pipefail
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${{ inputs.base_image || 'ghcr.io/tuist/macos-tahoe-xcode:26-4-1' }}" \
            -var "output_image=tuist-runner" \
            -var "runner_version=${{ inputs.runner_version || '2.334.0' }}" \
            runner.pkr.hcl

      - name: Push image to GHCR
        id: push
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA::8}"
          tart push tuist-runner "ghcr.io/tuist/tuist-runner:${GIT_SHA}"
          echo "Pushed ghcr.io/tuist/tuist-runner:${GIT_SHA}"
          echo "tag=${GIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Cleanup
        if: always()
        run: tart delete tuist-runner 2>/dev/null || true
