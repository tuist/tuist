name: Server Deploy Dispatch

# Decides whether a push to main needs a server deploy and, if so,
# dispatches server-production-deployment.yml — decoupled from release.yml's
# serialized component releases.
#
# Why a separate workflow: release.yml serializes its runs (one concurrency
# group) so version computation is correct, and those runs contain the slow
# CLI/app builds. A server/chart/config change has nothing to do with a CLI
# release, so it must not sit behind one. This workflow has its own
# concurrency lane and reads the already-published `<component>@<semver>`
# tags at deploy time, so it never waits on a release build.
#
# Division of labor with release.yml:
#   - A fleet/runtime image is releasing this push (runner-image,
#     linux-runner-image, runners-controller, capi-scaleway,
#     xcresult-processor-image, kura) -> release.yml's trigger-deploy owns
#     the deploy, because it must wait for the image to build + tag before
#     the deploy can resolve the new version. This job defers.
#   - Otherwise (server / chart / config change, no fleet image release) ->
#     this job dispatches the deploy immediately.
# The two paths are mutually exclusive, so no push is deployed twice or
# skipped.

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - tuist_common/**
      - noora/**
      - infra/kura-controller/**
      - infra/helm/tuist/**
      - infra/helm/k8s-monitoring/**
      - .github/workflows/server-deployment.yml
      - .github/workflows/server-production-deployment.yml
      - .github/workflows/server-deploy-dispatch.yml
      - server/pnpm-lock.yaml

concurrency:
  # Own lane, independent of release-workflow. Serializes deploy dispatches
  # among themselves (GitHub keeps only the latest pending), but never
  # behind a CLI/app release run.
  group: server-deploy-dispatch-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch server deploy unless a fleet image release owns it
    runs-on: tuist-linux
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      MISE_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}
      HEAD_MSG: ${{ github.event.head_commit.message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          install_args: "git-cliff jq"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - id: check
        # Same component-change detection release.yml uses, so the
        # fleet-image-release decision matches exactly (path + commit scope).
        run: mise run release:check
      - name: Dispatch server production deployment
        run: |
          set -euo pipefail
          fleet_releasing=false
          for flag in \
            "${{ steps.check.outputs.runner-image-should-release }}" \
            "${{ steps.check.outputs.linux-runner-image-should-release }}" \
            "${{ steps.check.outputs.runners-controller-should-release }}" \
            "${{ steps.check.outputs.capi-scaleway-should-release }}" \
            "${{ steps.check.outputs.xcresult-processor-image-should-release }}" \
            "${{ steps.check.outputs.kura-should-release }}"; do
            [ "$flag" = "true" ] && fleet_releasing=true
          done

          if [ "$fleet_releasing" = "true" ]; then
            echo "A fleet/runtime image is releasing this push; release.yml's trigger-deploy owns the deploy (it waits for the image build + tag)."
            exit 0
          fi

          # HEAD_MSG via env, never interpolated into the shell, so a commit
          # subject can't break the script.
          HOTFIX=false
          case "$HEAD_MSG" in
            *'(hotfix)'*) HOTFIX=true ;;
          esac
          echo "Dispatching production deployment for ${{ github.sha }} (hotfix=$HOTFIX)"
          gh workflow run server-production-deployment.yml \
            --ref main \
            -f commit_sha="${{ github.sha }}" \
            -f hotfix="$HOTFIX"
