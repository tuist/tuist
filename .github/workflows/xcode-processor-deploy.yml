name: Xcresult Processor Deploy

# Builds the *server* Elixir release on macOS (with the Xcode-only xcresult
# Swift NIF) and ships it to a Scaleway Mac mini that boots it in
# xcresult-processor mode. Manual-only — coordinated rollouts (new NIF
# contract before a CLI release, etc.) need to land on the macOS fleet
# explicitly, separately from the in-cluster Linux deploys.

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy (defaults to the workflow's ref).
        required: false
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - canary
          - production

concurrency:
  group: xcresult-processor-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_TOKEN: ${{ github.token }}

jobs:
  deploy:
    runs-on: namespace-profile-default-macos
    timeout-minutes: 45
    environment: xcresult-processor-${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "erlang elixir"
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: xcode_processor
      - name: Load secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          ENV_UPPER=$(echo "${{ github.event.inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          echo "XCODE_PROCESSOR_SSH_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          op read "op://cache/XCODE_PROCESSOR_SSH_PRIVATE_KEY/notesPlain" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "XCODE_PROCESSOR_HOST=$(op read "op://cache/XCODE_PROCESSOR_HOST_${ENV_UPPER}/notesPlain")" >> $GITHUB_ENV
          echo "SLACK_WEBHOOK_URL=$(op read 'op://cache/SLACK_WEBHOOK_URL/password')" >> $GITHUB_ENV
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ env.XCODE_PROCESSOR_SSH_PRIVATE_KEY }}
      - name: Deploy
        working-directory: xcode_processor
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
        run: |
          mise run deploy ${{ env.XCODE_PROCESSOR_HOST }} ${{ github.event.inputs.environment }}
