name: Status Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - status/**
      - .github/workflows/status-deploy.yml

concurrency:
  group: status-deploy
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: status

env:
  MISE_VERSION: "2026.5.15"
  MISE_GITHUB_TOKEN: ${{ github.token }}
  # Install only this project's tools and stop mise auto-installing the rest of the
  # merged root toolset when `mise run` executes (which would hit the GitHub API).
  MISE_AUTO_INSTALL: "0"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: status-production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/mise-install
        with:
          version: ${{ env.MISE_VERSION }}
          install: "node aube npm:wrangler"
          working-directory: status
      - uses: 1password/install-cli-action@v2
      - name: Deploy worker to Cloudflare
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://tuist/Cloudflare/CLOUDFLARE_API_TOKEN
          CLOUDFLARE_ACCOUNT_ID: op://tuist/Cloudflare/CLOUDFLARE_ACCOUNT_ID
        run: op run -- mise run deploy
