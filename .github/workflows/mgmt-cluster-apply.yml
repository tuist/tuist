name: Mgmt Cluster Apply

# Auto-applies CAPI manifests (ClusterClass + per-env Cluster CRs) and
# mgmt-cluster workloads (etcd-snapshot CronJob, Tailscale daemon) to
# our self-hosted CAPI mgmt cluster on push to main when the relevant
# paths change.
#
# Why a workflow instead of Argo CD / Flux: the mgmt cluster has a tiny
# manifest surface (one ClusterClass, four Cluster CRs, two mgmt-side
# workloads) — drift detection / continuous reconciliation provided by
# a long-running GitOps controller is overkill at this scale. A
# push-driven CI apply gets us GitOps-style "the repo is the source of
# truth" without the operational overhead of running another controller.
# We can graduate to Argo CD later if the mgmt-cluster surface grows.
#
# Order matters: the ClusterClass is applied before the Cluster CRs
# because the topology controller resolves `topology.classRef.name`
# at admission time. Mgmt-side workloads (etcd-snapshot, tailscale)
# are independent and applied last.
#
# Known limitation: KubeadmControlPlaneTemplate spec is immutable.
# When the ClusterClass changes anything in the KCT, kubectl apply
# fails with "field is immutable, please create new resource instead".
# This workflow surfaces that as a failure — operator must
# `kubectl delete kubeadmcontrolplanetemplate tuist-hcloud-control-plane`
# manually, then re-run this workflow. Intentional: that operation
# also requires deleting + recreating each Cluster CR, which is too
# destructive to automate.
#
# Required secrets (on the mgmt-cluster-apply GitHub Environment):
#   OP_SERVICE_ACCOUNT_TOKEN - 1Password SA scoped read-only to the
#     tuist-k8s-mgmt vault, where the mgmt cluster's kubeconfig is
#     stored as `kubeconfig: tuist-mgmt`.

on:
  push:
    # Main-only — every other deploy workflow in the repo holds this
    # posture so a feature branch never mutates production state.
    branches: [main]
    paths:
      - 'infra/k8s/clusters/**'
      - 'infra/k8s/mgmt/etcd-snapshot.yaml'
      - 'infra/k8s/mgmt/tailscale.yaml'
      - 'infra/k8s/mgmt/hetzner-robot-controller.yaml'
      - '.github/workflows/mgmt-cluster-apply.yml'
  workflow_dispatch:
    inputs:
      force_roll_bare_metal:
        description: |
          When set, SKIP the apply steps and force-roll a Hetzner
          Robot bare-metal worker in the chosen cluster. CAPI's
          MachineDeployment then re-provisions the host with
          whatever bootstrap the current template carries — used
          when a chart change has updated `postInstallScript` and
          we need it to take effect without waiting for natural
          Node churn. The standalone
          `mgmt-cluster-roll-bare-metal.yml` workflow covers the
          same need but is only dispatchable once it lands on
          main; this input exists so a PR branch can validate the
          roll path before merge.
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]
      dump_cloud_init:
        description: |
          When set, SKIP everything else and SSH to the chosen
          cluster's bare-metal host to dump `cloud-init status
          --long` and the tail of `/var/log/cloud-init-output.log`
          / `/var/log/cloud-init.log`. Diagnostic-only — when
          caph reports `ensure-provisioned` stuck on
          `CloudInitStatus failed`, this surfaces which
          preKubeadmCommands step failed. SSH key comes from
          1Password (`hetzner-bare-metal-ssh-key`).
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]
      dump_workload:
        description: |
          When set, SKIP everything else and dump workload-cluster
          state for the chosen cluster: Nodes, RunnerPool CRs,
          runner Pods + recent events, runners-controller logs.
          Used when the smoke is stuck "queued" (no runner picked
          it up) to find out whether the bare-metal Node joined,
          whether Pods got created, and why they're not running.
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]
      dump_robot_controller:
        description: |
          When set, dump hetzner-robot-controller state on the
          mgmt cluster: pod status, recent logs, all HBMs visible
          in `org-tuist`. Used when a force-roll deletes the HBM
          but the controller never recreates it.
        required: false
        type: boolean
        default: false
      restart_robot_controller:
        description: |
          When set, `kubectl rollout restart` the
          hetzner-robot-controller deployment, wait 90s for a
          fresh reconcile cycle, then dump the new logs. Useful
          when the controller appears stuck — info-level logs
          only fire on create/delete, so silence on its own is
          ambiguous.
        required: false
        type: boolean
        default: false
      query_robot_inventory:
        description: |
          When set, fetch the Robot API credentials from the
          `org-tuist/hetzner` Secret and curl Robot's `/server`
          endpoint directly. Reveals what server names + numbers
          Robot is currently advertising — used to verify whether
          a rename in the Robot panel has actually landed in the
          API list.
        required: false
        type: boolean
        default: false
      cleanup_runner_pods:
        description: |
          When set, delete the chosen cluster's runner Pods that
          are Pending, Failed, or Terminating. The runners-controller
          reconciler then recreates them from the CURRENT pod
          template, picking up any toleration/nodeSelector
          changes from a recent chart bump. Used when Pods are
          stuck Pending because their snapshot predates a node-
          template change (untolerated taint).
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]
      kick_runners_controller:
        description: |
          When set, `kubectl rollout restart` the runners-controller
          deployment in the WORKLOAD cluster, then patch the
          RunnerPool CR to nudge replicas (set to 0 then back to
          spec.replicas), then sleep 30s and dump Pod state. Used
          when the reconciler is silent — replicas=N but 0 actual
          Pods, status.observedReplicas stale.
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]
      dump_hcloud_md0:
        description: |
          When set, dump the chosen cluster's md-0 (cloud worker)
          MachineDeployment + Machines + HCloudMachines with
          status conditions. Used when cloud workers are stuck
          NotReady or VMs aren't joining the workload cluster.
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]
      query_hcloud_servers:
        description: |
          When set, curl the Hetzner Cloud API directly with the
          mgmt-cluster's hcloud-cloud-controller-manager creds
          to list all servers — confirms whether the VMs that
          CAPI says exist actually exist (and their status) at
          the cloud provider level.
        required: false
        type: boolean
        default: false
      unstick_uninit_taints:
        description: |
          When set, removes the cloud-uninit taints from Ready
          cloud workers in the workload cluster (`node.cluster.x-k8s.io/uninitialized`,
          `node.cloudprovider.kubernetes.io/uninitialized`) and
          uncordons the control plane. Used when HCCM/CAPI fail
          to initialize Nodes, leaving everything tainted and
          nothing schedulable.
        required: false
        type: choice
        default: ""
        options: ["", "staging", "canary", "production"]

# Serialize: don't let two pushes apply concurrently and race.
concurrency:
  group: mgmt-cluster-apply
  cancel-in-progress: false

permissions: {}

jobs:
  apply:
    name: kubectl apply
    runs-on: namespace-profile-default
    environment:
      name: mgmt-cluster-apply
    # 20-minute ceiling — the apply path normally finishes in
    # under 2 min; the roll path needs ~15 min for caph's
    # rescue + installimage + kubeadm-join cycle.
    timeout-minutes: 20
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      # True when ANY workflow_dispatch diagnostic or destructive
      # input is set — used to gate the standard apply steps off
      # so a diagnostic dispatch doesn't also re-run a full apply.
      # Keep in sync with `on.workflow_dispatch.inputs` above.
      DIAG_MODE: ${{ github.event.inputs.force_roll_bare_metal != '' || github.event.inputs.dump_cloud_init != '' || github.event.inputs.dump_workload != '' || github.event.inputs.dump_robot_controller == 'true' || github.event.inputs.restart_robot_controller == 'true' || github.event.inputs.query_robot_inventory == 'true' || github.event.inputs.cleanup_runner_pods != '' || github.event.inputs.kick_runners_controller != '' || github.event.inputs.dump_hcloud_md0 != '' || github.event.inputs.query_hcloud_servers == 'true' || github.event.inputs.unstick_uninit_taints != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load mgmt kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-mgmt" --vault tuist-k8s-mgmt --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Diff (visibility into what's about to change)
        if: env.DIAG_MODE != 'true'
        # `kubectl diff` exits non-zero when there's a diff, which is
        # the expected case here, so don't fail the step on that.
        # The actual gate is the apply step below.
        continue-on-error: true
        run: |
          set +e
          echo "::group::ClusterClass diff"
          kubectl diff -f infra/k8s/clusters/clusterclass-tuist.yaml || true
          echo "::endgroup::"
          for f in infra/k8s/clusters/bare-metal-*.yaml; do
            [ -e "$f" ] || continue
            echo "::group::$(basename "$f") diff"
            kubectl diff -f "$f" || true
            echo "::endgroup::"
          done
          for f in infra/k8s/clusters/cluster-*.yaml; do
            echo "::group::$(basename "$f") diff"
            kubectl diff -f "$f" || true
            echo "::endgroup::"
          done
          echo "::group::etcd-snapshot.yaml diff"
          kubectl diff -f infra/k8s/mgmt/etcd-snapshot.yaml || true
          echo "::endgroup::"
          echo "::group::tailscale.yaml diff"
          kubectl diff -f infra/k8s/mgmt/tailscale.yaml || true
          echo "::endgroup::"
          echo "::group::hetzner-robot-controller.yaml diff"
          kubectl diff -f infra/k8s/mgmt/hetzner-robot-controller.yaml || true
          echo "::endgroup::"
      - name: Apply ClusterClass first (Cluster CRs reference it)
        if: env.DIAG_MODE != 'true'
        run: |
          kubectl apply -f infra/k8s/clusters/clusterclass-tuist.yaml
      - name: Apply per-env bare-metal substrate
        if: env.DIAG_MODE != 'true'
        # HetznerBareMetalHost CRs + HetznerBareMetalMachineTemplate +
        # bare-metal KubeadmConfigTemplate + ExternalSecrets. Applied
        # between ClusterClass and Cluster CRs so the MD-claimed
        # templates exist by the time the topology controller starts
        # reconciling worker Machines.
        #
        # HetznerBareMetalMachineTemplate's spec is immutable by CAPI
        # convention (every infrastructure template across providers
        # works this way — the spec is a definitional snapshot that
        # gets cloned by reference at Machine creation, not mutated in
        # place). When the PR changes the template, plain `kubectl
        # apply` fails with `Invalid value: ... is immutable`. Fall
        # back to delete + apply, which is safe because:
        # (a) deleting an unreferenced template is a no-op for caph
        # (b) existing Machines hold a snapshot of the template's
        #     spec in their own object and aren't affected by the
        #     template going away.
        run: |
          set -o pipefail
          for f in infra/k8s/clusters/bare-metal-*.yaml; do
            [ -e "$f" ] || continue
            echo "==> $f"
            if ! kubectl apply -f "$f" 2>&1 | tee /tmp/apply.out; then
              if grep -q 'is immutable' /tmp/apply.out; then
                echo "Immutable spec detected, retrying as delete + apply..."
                kubectl delete -f "$f" --ignore-not-found --wait=true
                kubectl apply -f "$f"
              else
                exit 1
              fi
            fi
          done
      - name: Apply per-env Cluster CRs
        if: env.DIAG_MODE != 'true'
        run: |
          for f in infra/k8s/clusters/cluster-*.yaml; do
            echo "==> $f"
            kubectl apply -f "$f"
          done
      - name: Apply mgmt-side workloads
        if: env.DIAG_MODE != 'true'
        # These are mgmt-cluster Deployments / CronJobs, not Cluster
        # CRs. Independent of the CAPI manifests above.
        run: |
          kubectl apply -f infra/k8s/mgmt/hetzner-robot-controller.yaml
          kubectl apply -f infra/k8s/mgmt/etcd-snapshot.yaml
          kubectl apply -f infra/k8s/mgmt/tailscale.yaml
      - name: Force-roll bare-metal HBM
        # Pre-merge counterpart to `mgmt-cluster-roll-bare-metal.yml`
        # (which is only dispatchable once it lands on main).
        #
        # We delete the HetznerBareMetalHost (the physical-server CR),
        # not just its consumer HBMM. Reason: caph fast-rebinds when
        # an HBMM is deleted but the HBM is still in `provisioned`
        # state — the new HBMM just claims the existing OS instead
        # of triggering rescue + installimage. To get the current
        # `postInstallScript` to actually run, we need caph to see a
        # fresh HBM in `(empty)` state.
        #
        # Side effects of deleting the HBM:
        #   - caph marks the bound HBMM failed (its infra is gone).
        #   - The MachineDeployment recreates the HBMM from the
        #     current template.
        #   - `hetzner-robot-controller` re-creates the HBM from
        #     Robot inventory on its next sync (~30s). For this to
        #     work, the Robot server's NAME must still match the
        #     `tuist-bm-*` prefix the controller uses for creation
        #     (caph rewrites the name during provisioning; if a roll
        #     is being attempted on an already-provisioned host,
        #     rename the server back in the Robot panel first).
        #   - caph claims the fresh HBM, runs the full cycle:
        #     preparing → registering → image-installing →
        #     ensure-provisioned → provisioned → kubeadm-joined.
        #
        # No cordon/drain: bare-metal nodes are tainted
        # `tuist.dev/runner-tier=bare-metal:NoSchedule` so the only
        # Pods on them are idempotent runner Pods.
        if: github.event.inputs.force_roll_bare_metal != ''
        timeout-minutes: 18
        env:
          CLUSTER: ${{ github.event.inputs.force_roll_bare_metal }}
        run: |
          set -euo pipefail
          # Pick the first managed HBM in the namespace directly.
          # Not via "find HBMM, follow consumerRef" because MD can
          # create a fresh HBMM while the old one is still stuck on
          # the previous HBM — leaving us with two HBMMs (one bound
          # to the HBM, one waiting) and picking the wrong one.
          # Only one bare-metal HBM per env today, so first-in-list
          # is unambiguous.
          hbm=$(kubectl get hetznerbaremetalhost -n org-tuist \
            -l app.kubernetes.io/managed-by=hetzner-robot-controller \
            -o jsonpath='{.items[0].metadata.name}' || true)
          if [ -z "$hbm" ]; then
            echo "::error::No managed HetznerBareMetalHost in cluster"
            kubectl get hetznerbaremetalhost -n org-tuist
            exit 1
          fi
          old_ts=$(kubectl get hetznerbaremetalhost -n org-tuist "$hbm" \
            -o jsonpath='{.metadata.creationTimestamp}')
          # Snapshot OLD HBMM names so we can detect when CAPI's
          # MD has truly recreated them (rather than reusing a
          # stale snapshot).
          old_hbmms=$(kubectl get hetznerbaremetalmachine -n org-tuist \
            -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER \
            -o jsonpath='{.items[*].metadata.name}' || true)
          echo "Force-reinstalling HBM: $hbm (creationTimestamp=$old_ts)"
          echo "Old HBMM(s) being replaced: $old_hbmms"
          echo "::group::Pre-roll state"
          kubectl get hetznerbaremetalhost -n org-tuist "$hbm"
          kubectl get hetznerbaremetalmachine -n org-tuist \
            -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER -o wide
          echo "::endgroup::"
          # Delete the parent CAPI Machine objects + HBMMs. CAPI
          # clones template specs at creation time:
          #   * KubeadmConfigTemplate → KubeadmConfig (bootstrap)
          #   * HetznerBareMetalMachineTemplate → HBMM (infra)
          # Both snapshots are immutable on the Machine, so a
          # Machine created before a template change carries the
          # old script forever. Without deleting the Machine,
          # MachineDeployment won't recreate it (the Machine
          # exists but unhealthy; MD/MS only remediates via
          # MachineHealthCheck, which we don't run). Deleting the
          # HBMM alone leaves the Machine pointing at a missing
          # infra ref and CAPI marks it permanently failed.
          echo "Deleting CAPI Machines + HBMMs in cluster pool"
          machines_to_drop=$(kubectl get machine -n org-tuist \
            -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER \
            -o jsonpath='{.items[*].metadata.name}' || true)
          kubectl delete machine -n org-tuist \
            -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER \
            --wait=false --timeout=2m || true
          kubectl delete hetznerbaremetalmachine -n org-tuist \
            -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER \
            --wait=false --timeout=2m || true
          # Strip Machine finalizers — they typically hang waiting
          # for infra ref cleanup, but the HBMMs we just deleted
          # are gone, leaving the Machine in a permanent
          # `deletionTimestamp set + finalizer present` state.
          for m in $machines_to_drop; do
            if kubectl get machine -n org-tuist "$m" >/dev/null 2>&1; then
              kubectl patch machine -n org-tuist "$m" \
                -p '{"metadata":{"finalizers":[]}}' --type=merge || true
            fi
          done
          # Then delete the HBM. caph releases the (now dying)
          # HBMM bindings, hetzner-robot-controller re-creates the
          # HBM (fresh, empty state), MD creates a fresh HBMM
          # from the current template, caph claims it and walks
          # the full state machine.
          kubectl delete hetznerbaremetalhost -n org-tuist "$hbm" --wait=false --timeout=2m || true
          if kubectl get hetznerbaremetalhost -n org-tuist "$hbm" >/dev/null 2>&1; then
            echo "HBM still present after 2m; stripping finalizers."
            kubectl patch hetznerbaremetalhost -n org-tuist "$hbm" \
              -p '{"metadata":{"finalizers":[]}}' --type=merge
          fi
          # Wait for:
          #   (1) a HBM to exist with a fresher creationTimestamp
          #       (proves hetzner-robot-controller re-created it).
          #   (2) HBMM.status.ready transitions to true (set only
          #       after the workload-cluster Node joins via
          #       kubeadm — fires last in the state machine).
          deadline=$(( $(date +%s) + 17*60 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            new_hbm=$(kubectl get hetznerbaremetalhost -n org-tuist \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            new_ts=""
            prov=""
            if [ -n "$new_hbm" ]; then
              new_ts=$(kubectl get hetznerbaremetalhost -n org-tuist "$new_hbm" \
                -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || true)
              prov=$(kubectl get hetznerbaremetalhost -n org-tuist "$new_hbm" \
                -o jsonpath='{.spec.status.provisioningState}' 2>/dev/null || true)
            fi
            new_hbmm=$(kubectl get hetznerbaremetalmachine -n org-tuist \
              -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            ready=$(kubectl get hetznerbaremetalmachine -n org-tuist \
              -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER \
              -o jsonpath='{.items[0].status.ready}' 2>/dev/null || true)
            # Reject the current HBMM if its name is one of the
            # ones we just deleted (status.ready can be stale on
            # an object still tearing down).
            hbmm_fresh=true
            for old in $old_hbmms; do
              if [ "$new_hbmm" = "$old" ]; then
                hbmm_fresh=false
                break
              fi
            done
            echo "$(date -u +%H:%M:%S) hbm=${new_hbm:-?} ts=${new_ts:-?} state=${prov:-?} hbmm=${new_hbmm:-?} fresh=$hbmm_fresh ready=${ready:-false}"
            if [ -n "$new_ts" ] && [ "$new_ts" != "$old_ts" ] && [ "$hbmm_fresh" = "true" ] && [ "$ready" = "true" ]; then
              echo "Fresh HBM ($new_ts > $old_ts), fresh HBMM ($new_hbmm), Ready — done."
              exit 0
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for fresh HBM + fresh HBMM Ready=true"
          kubectl get hetznerbaremetalmachine -n org-tuist -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER
          kubectl get hetznerbaremetalhost -n org-tuist
          exit 1
      - name: Dump cloud-init logs from bare-metal host
        # SSH into the bare-metal host using the keypair caph also
        # uses (stored in 1Password as `hetzner-bare-metal-ssh-key`).
        # Surfaces which `preKubeadmCommands` step failed when caph
        # gets stuck at `ensure-provisioned` with `CloudInitStatus
        # failed`.
        if: github.event.inputs.dump_cloud_init != ''
        timeout-minutes: 5
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLUSTER: ${{ github.event.inputs.dump_cloud_init }}
        run: |
          set -euo pipefail
          # Pick HBM directly by managed-by label (avoids the two-
          # HBMMs-one-bound corner case the force-roll step also
          # had to work around).
          hbm=$(kubectl get hetznerbaremetalhost -n org-tuist \
            -l app.kubernetes.io/managed-by=hetzner-robot-controller \
            -o jsonpath='{.items[0].metadata.name}' || true)
          if [ -z "$hbm" ]; then
            echo "::error::No managed HetznerBareMetalHost in cluster"
            kubectl get hetznerbaremetalhost -n org-tuist
            exit 1
          fi
          ip=$(kubectl get hetznerbaremetalhost -n org-tuist "$hbm" \
            -o jsonpath='{.spec.status.ipv4}')
          if [ -z "$ip" ]; then
            echo "::error::No IPv4 on HBM $hbm"
            kubectl get hetznerbaremetalhost -n org-tuist "$hbm" -o yaml
            exit 1
          fi
          echo "HBM: $hbm  IP: $ip"
          # Fetch the SSH key directly from the K8s Secret caph
          # uses — same data, less guessing about 1Password layout.
          # Write to /dev/shm (tmpfs, RAM-only) and trap-clear on
          # EXIT so the key never persists on disk even if a
          # subsequent ssh call fails mid-step.
          ssh_key=/dev/shm/hbm-$$
          trap 'shred -u "$ssh_key" 2>/dev/null || rm -f "$ssh_key"' EXIT
          kubectl get secret -n org-tuist hetzner-bare-metal-ssh-key \
            -o jsonpath='{.data.ssh-privatekey}' | base64 -d > "$ssh_key"
          chmod 600 "$ssh_key"
          if ! [ -s "$ssh_key" ]; then
            echo "::error::SSH private key fetch produced empty file."
            kubectl get secrets -n org-tuist
            exit 1
          fi
          ssh_opts=(
            -i "$ssh_key"
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=10
            -o BatchMode=yes
          )
          echo "::group::cloud-init status --long"
          ssh "${ssh_opts[@]}" "root@$ip" 'cloud-init status --long' || true
          echo "::endgroup::"
          echo "::group::cloud-init-output.log (last 300 lines)"
          ssh "${ssh_opts[@]}" "root@$ip" 'tail -300 /var/log/cloud-init-output.log' || true
          echo "::endgroup::"
          echo "::group::cloud-init.log (last 300 lines, error-relevant)"
          ssh "${ssh_opts[@]}" "root@$ip" 'tail -300 /var/log/cloud-init.log | grep -E "ERROR|WARNING|FAILED|fail|error" || tail -300 /var/log/cloud-init.log' || true
          echo "::endgroup::"
          echo "::group::containerd status"
          ssh "${ssh_opts[@]}" "root@$ip" 'systemctl status containerd --no-pager -l; ls -la /usr/local/bin/containerd /usr/local/sbin/runc /usr/local/lib/systemd/system/containerd.service /etc/containerd/config.toml 2>&1' || true
          echo "::endgroup::"
          echo "::group::uptime / load / memory / disk"
          ssh "${ssh_opts[@]}" "root@$ip" 'uptime; echo "---"; free -h; echo "---"; df -h /; echo "---"; df -h' || true
          echo "::endgroup::"
          echo "::group::kubelet status + recent journal"
          ssh "${ssh_opts[@]}" "root@$ip" 'systemctl status kubelet --no-pager -l; echo "---"; journalctl -u kubelet --no-pager -n 200' || true
          echo "::endgroup::"
          echo "::group::containerd recent journal"
          ssh "${ssh_opts[@]}" "root@$ip" 'journalctl -u containerd --no-pager -n 100' || true
          echo "::endgroup::"
          echo "::group::dmesg tail (kernel events, OOM, hardware)"
          ssh "${ssh_opts[@]}" "root@$ip" 'dmesg --ctime | tail -200' || true
          echo "::endgroup::"
          echo "::group::Recent /var/log/syslog"
          ssh "${ssh_opts[@]}" "root@$ip" 'test -f /var/log/syslog && tail -200 /var/log/syslog || journalctl --no-pager -n 200' || true
          echo "::endgroup::"
      - name: Dump workload-cluster state
        # Pulls the workload cluster's kubeconfig from the
        # CAPI-managed Secret (`<cluster>-kubeconfig` in
        # `org-tuist`) and dumps:
        #   - Nodes (did the bare-metal host actually join?)
        #   - RunnerPool CRs (does the controller see the pool?)
        #   - Runner Pods + events (did Pods get created, did they
        #     schedule, are they failing on kata-qemu / image pull?)
        #   - runners-controller logs (autoscaler reactions, etc.)
        # Used when the smoke is stuck "queued" — no runner
        # registered with GitHub means no live Pod with the right
        # dispatch label.
        if: github.event.inputs.dump_workload != ''
        timeout-minutes: 5
        env:
          CLUSTER: ${{ github.event.inputs.dump_workload }}
          WL_KUBECONFIG: ${{ github.workspace }}/.kube/workload-config
        run: |
          set -euo pipefail
          kubectl get secret -n org-tuist "tuist-$CLUSTER-kubeconfig" \
            -o jsonpath='{.data.value}' | base64 -d > "$WL_KUBECONFIG"
          chmod 600 "$WL_KUBECONFIG"
          export KUBECONFIG="$WL_KUBECONFIG"
          echo "::group::Nodes"
          kubectl get nodes -o wide
          echo
          echo "--- bare-metal Node descriptions ---"
          for n in $(kubectl get nodes -l node.cluster.x-k8s.io/pool=runners-linux -o jsonpath='{.items[*].metadata.name}'); do
            echo "=== $n ==="
            kubectl describe node "$n" | sed -n '/Conditions:/,/Addresses:/p'
            echo
            kubectl describe node "$n" | sed -n '/Taints:/,/Unschedulable:/p'
          done
          echo "::endgroup::"
          echo "::group::Cilium agent pods on bare-metal Nodes"
          for n in $(kubectl get nodes -l node.cluster.x-k8s.io/pool=runners-linux -o jsonpath='{.items[*].metadata.name}'); do
            echo "=== Cilium on $n ==="
            cilium_pod=$(kubectl get pods -n kube-system -l k8s-app=cilium --field-selector spec.nodeName="$n" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -z "$cilium_pod" ]; then
              echo "(no Cilium pod scheduled on $n)"
            else
              kubectl get pod -n kube-system "$cilium_pod" -o wide
              echo "--- last 80 lines of cilium-agent logs ---"
              kubectl logs -n kube-system "$cilium_pod" --tail=80 2>&1 || true
            fi
          done
          echo "::endgroup::"
          echo "::group::RunnerPool CRs"
          kubectl get runnerpool -A -o wide || true
          echo "::endgroup::"
          echo "::group::Runner Pods"
          kubectl get pods -n tuist-runners -o wide || true
          echo
          kubectl get pods -n tuist-runners -o yaml | grep -E "phase:|reason:|message:|runtimeClassName:|nodeName:|name:" | head -60 || true
          echo "::endgroup::"
          echo "::group::Recent events in tuist-runners"
          kubectl get events -n tuist-runners --sort-by=.lastTimestamp | tail -40 || true
          echo "::endgroup::"
          echo "::group::runners-controller logs (last 200 lines)"
          ns_dep=$(kubectl get deployment -A -o json | jq -r '.items[] | select(.metadata.name | endswith("runners-controller")) | "\(.metadata.namespace)/\(.metadata.name)"' | head -1)
          if [ -n "$ns_dep" ]; then
            kubectl logs -n "${ns_dep%%/*}" "deployment/${ns_dep##*/}" --tail=200 2>&1 || true
          fi
          echo "::endgroup::"
          echo "::group::One Linux runner pod logs (last 100 lines)"
          one_pod=$(kubectl get pods -n tuist-runners -l tuist.dev/runner-pool -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep "linux-ubuntu" | head -1)
          if [ -z "$one_pod" ]; then
            one_pod=$(kubectl get pods -n tuist-runners -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' 2>/dev/null | tr ' ' '\n' | grep "linux-ubuntu" | head -1)
          fi
          if [ -n "$one_pod" ]; then
            echo "Pod: $one_pod"
            kubectl logs -n tuist-runners "$one_pod" --tail=100 2>&1 || true
          fi
          echo "::endgroup::"
          echo "::group::Tuist server health"
          kubectl get deployment -n tuist-staging -o wide | grep -v runners-controller || true
          echo
          kubectl get pods -n tuist-staging -o wide | head -30 || true
          echo "::endgroup::"
      - name: Dump hetzner-robot-controller state
        # When the force-roll deletes the HBM but the controller
        # never re-creates it, this surfaces: is the controller
        # pod healthy? Are its recent reconciles erroring? What
        # HBMs does the controller currently see?
        if: github.event.inputs.dump_robot_controller == 'true'
        run: |
          set -euo pipefail
          echo "::group::hetzner-robot-controller pod (in org-tuist)"
          kubectl get pods -n org-tuist -l app.kubernetes.io/name=hetzner-robot-controller -o wide || true
          echo "::endgroup::"
          echo "::group::hetzner-robot-controller logs (last 200)"
          kubectl logs -n org-tuist deployment/hetzner-robot-controller --tail=200 2>&1 || \
            kubectl logs -n org-tuist -l app.kubernetes.io/name=hetzner-robot-controller --tail=200 2>&1 || true
          echo "::endgroup::"
          echo "::group::All HBMs in org-tuist"
          kubectl get hetznerbaremetalhost -n org-tuist -o wide || true
          echo
          kubectl get hetznerbaremetalhost -n org-tuist -o yaml | grep -E "name:|managed-by|server-name|provisioningState" | head -30 || true
          echo "::endgroup::"
          echo "::group::All HBMMs in org-tuist"
          kubectl get hetznerbaremetalmachine -n org-tuist -o wide || true
          echo "::endgroup::"
          echo "::group::All KubeadmConfigTemplates in org-tuist"
          kubectl get kubeadmconfigtemplate -n org-tuist -o wide || true
          echo
          echo "--- per-template spec files block check ---"
          for kct in $(kubectl get kubeadmconfigtemplate -n org-tuist -o jsonpath='{.items[*].metadata.name}'); do
            echo "=== $kct ==="
            kubectl get kubeadmconfigtemplate -n org-tuist "$kct" -o jsonpath='{.spec.template.spec.files}' 2>/dev/null || true
            echo
          done
          echo "::endgroup::"
          echo "::group::MachineSet's bootstrap template reference"
          kubectl get machineset -n org-tuist -o yaml 2>/dev/null | grep -A 3 "bootstrap:" | head -40 || true
          echo "::endgroup::"
          echo "::group::KubeadmConfig objects (instances created from template)"
          kubectl get kubeadmconfig -n org-tuist -o wide || true
          echo
          for kc in $(kubectl get kubeadmconfig -n org-tuist -o jsonpath='{.items[*].metadata.name}'); do
            files=$(kubectl get kubeadmconfig -n org-tuist "$kc" -o jsonpath='{.spec.files}' 2>/dev/null || true)
            echo "$kc files-block-len=${#files}"
          done
          echo "::endgroup::"
          echo "::group::CAPI Cluster + MachineDeployments + MachineSets + Machines"
          kubectl get cluster -n org-tuist -o wide || true
          echo
          kubectl get machinedeployment -n org-tuist -o wide || true
          echo
          kubectl get machineset -n org-tuist -o wide || true
          echo
          kubectl get machine -n org-tuist -o wide || true
          echo
          echo "--- MachineDeployment describe (status, conditions) ---"
          for md in $(kubectl get machinedeployment -n org-tuist -o jsonpath='{.items[*].metadata.name}'); do
            echo "=== $md ==="
            kubectl describe machinedeployment -n org-tuist "$md" | sed -n '/Status:/,/Events:/p' | head -40
          done
          echo "::endgroup::"
      - name: Restart hetzner-robot-controller and re-tail logs
        # Force a fresh reconcile cycle. Useful when the controller
        # is up but quiet (the info logs only fire on create/delete,
        # so silence could mean either "nothing to do" or "stuck").
        # After restart we wait 90s (1 reconcile interval + slack)
        # and re-tail.
        if: github.event.inputs.restart_robot_controller == 'true'
        run: |
          set -euo pipefail
          echo "Triggering rollout restart..."
          kubectl rollout restart -n org-tuist deployment/hetzner-robot-controller
          kubectl rollout status -n org-tuist deployment/hetzner-robot-controller --timeout=2m
          echo "Waiting 90s for one reconcile cycle..."
          sleep 90
          echo "::group::Fresh controller logs"
          kubectl logs -n org-tuist deployment/hetzner-robot-controller --tail=100 2>&1 || \
            kubectl logs -n org-tuist -l app.kubernetes.io/name=hetzner-robot-controller --tail=100 2>&1 || true
          echo "::endgroup::"
          echo "::group::HBMs after restart"
          kubectl get hetznerbaremetalhost -n org-tuist -o wide || true
          echo "::endgroup::"
      - name: Query Robot API /server directly
        # Pulls the Robot creds from the same Secret the
        # controller reads (`org-tuist/hetzner`), then curls
        # Robot's `/server` endpoint. The endpoint returns a JSON
        # array of all servers in the account with their current
        # name + number. Use it to confirm whether a panel rename
        # has landed in the API view that the controller
        # actually sees.
        if: github.event.inputs.query_robot_inventory == 'true'
        run: |
          set -euo pipefail
          user=$(kubectl get secret -n org-tuist hetzner \
            -o jsonpath='{.data.hetzner-robot-user}' | base64 -d)
          pass=$(kubectl get secret -n org-tuist hetzner \
            -o jsonpath='{.data.hetzner-robot-password}' | base64 -d)
          if [ -z "$user" ] || [ -z "$pass" ]; then
            echo "::error::Robot creds not found in org-tuist/hetzner secret"
            kubectl get secret -n org-tuist hetzner -o yaml | grep -v 'token\|password\|key' | head -20
            exit 1
          fi
          echo "::group::Robot /server response (servers + names)"
          curl -sS -u "$user:$pass" https://robot-ws.your-server.de/server \
            | jq '[ .[] | { server_number: .server.server_number, server_name: .server.server_name, dc: .server.dc, status: .server.status, cancelled: .server.cancelled } ]' || true
          echo "::endgroup::"
      - name: Cleanup stale runner Pods
        # Deletes runner Pods stuck in Pending/Failed/Terminating
        # state. The runners-controller reconciles desired
        # replicas by creating fresh Pods from the CURRENT pod
        # template, so this is the safe way to pick up
        # toleration/nodeSelector changes from a chart bump
        # without rolling the whole RunnerPool CR.
        if: github.event.inputs.cleanup_runner_pods != ''
        env:
          CLUSTER: ${{ github.event.inputs.cleanup_runner_pods }}
          WL_KUBECONFIG: ${{ github.workspace }}/.kube/workload-config
        run: |
          set -euo pipefail
          kubectl get secret -n org-tuist "tuist-$CLUSTER-kubeconfig" \
            -o jsonpath='{.data.value}' | base64 -d > "$WL_KUBECONFIG"
          chmod 600 "$WL_KUBECONFIG"
          export KUBECONFIG="$WL_KUBECONFIG"
          echo "::group::Pods before cleanup"
          kubectl get pods -n tuist-runners -l tuist.dev/runner-pool -o wide 2>/dev/null || \
            kubectl get pods -n tuist-runners -o wide
          echo "::endgroup::"
          for phase in Pending Failed; do
            kubectl delete pods -n tuist-runners \
              --field-selector=status.phase=$phase --wait=false || true
          done
          # Terminating Pods stay in phase=Running but carry a
          # deletionTimestamp. Field selectors can't see this, so
          # list all Pods with deletionTimestamp set (any phase)
          # and strip finalizers + force-delete. Finalizers often
          # wait on a Node that's gone, blocking deletion
          # indefinitely. The runners-controller counts these
          # Pods toward replicas, so until they're fully gone it
          # won't recreate fresh ones.
          for p in $(kubectl get pods -n tuist-runners \
              -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true); do
            echo "Force-finishing Terminating Pod: $p"
            kubectl patch pod -n tuist-runners "$p" \
              -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
            kubectl delete pod -n tuist-runners "$p" --grace-period=0 --force --wait=false || true
          done
          echo "Sleeping 30s for reconciler to recreate..."
          sleep 30
          echo "::group::Pods after cleanup"
          kubectl get pods -n tuist-runners -o wide || true
          echo "::endgroup::"
      - name: Kick runners-controller (force reconcile)
        if: github.event.inputs.kick_runners_controller != ''
        env:
          CLUSTER: ${{ github.event.inputs.kick_runners_controller }}
          WL_KUBECONFIG: ${{ github.workspace }}/.kube/workload-config
        run: |
          set -euo pipefail
          kubectl get secret -n org-tuist "tuist-$CLUSTER-kubeconfig" \
            -o jsonpath='{.data.value}' | base64 -d > "$WL_KUBECONFIG"
          chmod 600 "$WL_KUBECONFIG"
          export KUBECONFIG="$WL_KUBECONFIG"
          # Helm release names the deployment
          # `<release>-tuist-runners-controller` in the `tuist-<env>`
          # namespace. Scan for any deployment matching
          # `*runners-controller`.
          ns_dep=$(kubectl get deployment -A -o json | jq -r '.items[] | select(.metadata.name | endswith("runners-controller")) | "\(.metadata.namespace)/\(.metadata.name)"' | head -1)
          if [ -z "$ns_dep" ]; then
            echo "::error::runners-controller deployment not found"
            kubectl get deployment -A | grep -i runners || true
            exit 1
          fi
          ns="${ns_dep%%/*}"
          dep="${ns_dep##*/}"
          echo "runners-controller: $ns/$dep"
          echo "::group::Current pod state + last logs (BEFORE restart)"
          kubectl get pods -n "$ns" -l app.kubernetes.io/component=runners-controller -o wide || \
            kubectl get pods -n "$ns" --selector="$(kubectl get deployment -n "$ns" "$dep" -o jsonpath='{.spec.selector.matchLabels}' | jq -r 'to_entries | map("\(.key)=\(.value)") | join(",")')" -o wide || true
          for pod in $(kubectl get pods -n "$ns" -l app.kubernetes.io/component=runners-controller -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod conditions + scheduler events ---"
            kubectl describe pod -n "$ns" "$pod" | sed -n '/Conditions:/,/Volumes:/p' | head -15
            kubectl get events -n "$ns" --field-selector involvedObject.name="$pod" --sort-by=.lastTimestamp | tail -20 || true
            echo "--- $pod previous logs ---"
            kubectl logs -n "$ns" "$pod" --previous --tail=80 2>&1 || true
            echo "--- $pod current logs ---"
            kubectl logs -n "$ns" "$pod" --tail=80 2>&1 || true
          done
          echo "::endgroup::"
          echo "::group::All Nodes + taints (why does the controller pod not schedule?)"
          kubectl get nodes -o custom-columns=NAME:.metadata.name,STATUS:.status.conditions[-1].type,TAINTS:.spec.taints --no-headers 2>&1 || true
          echo "::endgroup::"
          echo "::group::Rollout restart + force-finish stuck pods"
          kubectl rollout restart -n "$ns" "deployment/$dep"
          # Force-finish any Pods stuck Terminating on a NotReady/
          # powered-off Node — without this the rollout can't
          # progress because PDB / finalizers hold the old Pod
          # alive while its Node never comes back.
          for p in $(kubectl get pods -n "$ns" -l app.kubernetes.io/component=runners-controller \
              -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true); do
            echo "Force-deleting stuck Terminating Pod: $p"
            kubectl patch pod -n "$ns" "$p" \
              -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
            kubectl delete pod -n "$ns" "$p" --grace-period=0 --force --wait=false 2>/dev/null || true
          done
          kubectl rollout status -n "$ns" "deployment/$dep" --timeout=3m || true
          echo "::endgroup::"
          echo "::group::Nudge RunnerPool replicas (0 -> spec value)"
          for rp in $(kubectl get runnerpool -n tuist-runners -o jsonpath='{.items[?(@.spec.os=="linux")].metadata.name}'); do
            current=$(kubectl get runnerpool -n tuist-runners "$rp" -o jsonpath='{.spec.replicas}')
            echo "Bumping $rp: $current -> 0 -> $current"
            kubectl patch runnerpool -n tuist-runners "$rp" --type=merge -p "{\"spec\":{\"replicas\":0}}"
            sleep 5
            kubectl patch runnerpool -n tuist-runners "$rp" --type=merge -p "{\"spec\":{\"replicas\":$current}}"
          done
          echo "::endgroup::"
          echo "Sleeping 45s for reconciler to act..."
          sleep 45
          echo "::group::Linux Pods after kick"
          kubectl get pods -n tuist-runners -o wide | grep -E "NAME|linux-ubuntu" || true
          echo "::endgroup::"
          echo "::group::runners-controller logs after kick (last 80)"
          kubectl logs -n "$ns" "deployment/$dep" --tail=80 2>&1 || true
          echo "::endgroup::"
      - name: Dump hcloud md-0 state
        if: github.event.inputs.dump_hcloud_md0 != ''
        env:
          CLUSTER: ${{ github.event.inputs.dump_hcloud_md0 }}
        run: |
          set -euo pipefail
          echo "::group::md-0 Machines (cloud worker pool)"
          kubectl get machine -n org-tuist \
            -l cluster.x-k8s.io/cluster-name=tuist-$CLUSTER,cluster.x-k8s.io/deployment-name=tuist-$CLUSTER-md-0 \
            -o wide || kubectl get machine -n org-tuist | grep "md-0" || true
          echo "::endgroup::"
          echo "::group::HCloudMachines"
          kubectl get hcloudmachine -n org-tuist -o wide || true
          echo
          for hcm in $(kubectl get hcloudmachine -n org-tuist -o jsonpath='{.items[*].metadata.name}'); do
            echo "=== $hcm ==="
            kubectl get hcloudmachine -n org-tuist "$hcm" -o yaml | \
              awk '/^status:/,/^[a-z]/' | grep -E "providerID|conditions:|reason:|message:|status:|type:|lastTransitionTime:" | head -30
          done
          echo "::endgroup::"
          echo "::group::Recent CAPI Machine events"
          kubectl get events -n org-tuist --sort-by=.lastTimestamp --field-selector=involvedObject.kind=Machine | tail -25 || true
          echo "::endgroup::"
          echo "::group::Recent CAPH controller logs"
          for ns in capi-system caph-system capi-hetzner-system cluster-api-provider-hetzner-system; do
            pods=$(kubectl get pods -n "$ns" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
            for p in $pods; do
              echo "--- $ns/$p logs (tail 60) ---"
              kubectl logs -n "$ns" "$p" --tail=60 2>&1 | grep -iE "error|fail|reconcil" | head -20 || true
            done
          done
          echo "::endgroup::"
      - name: Query Hetzner Cloud /servers
        if: github.event.inputs.query_hcloud_servers == 'true'
        run: |
          set -euo pipefail
          # The hcloud token is in a Secret somewhere — try common
          # places. caph reads it via HetznerCluster's
          # hcloudTokenRef which points at a Secret in the same
          # namespace as the cluster.
          token=""
          for ns_sec in org-tuist/hetzner org-tuist/hcloud-token org-tuist/hetzner-token; do
            ns="${ns_sec%/*}"; sec="${ns_sec##*/}"
            for key in hcloud-token hcloud token; do
              t=$(kubectl get secret -n "$ns" "$sec" -o jsonpath="{.data.$key}" 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -n "$t" ] && [ "${#t}" -gt 30 ]; then
                token="$t"; echo "found token in $ns/$sec key=$key"; break 2
              fi
            done
          done
          if [ -z "$token" ]; then
            echo "::error::Could not locate hcloud token secret"
            kubectl get secret -A | grep -i "hcloud\|hetzner" || true
            exit 1
          fi
          echo "::group::Hetzner Cloud /servers (filtered to tuist-staging-*)"
          curl -sS -H "Authorization: Bearer $token" \
            "https://api.hetzner.cloud/v1/servers?per_page=50" \
            | jq '[ .servers[] | select(.name | test("tuist-staging")) | { id, name, status, created, server_type: .server_type.name, image: .image.name, datacenter: .datacenter.name } ]' || true
          echo "::endgroup::"
          echo "::group::Hetzner Cloud actions (recent failures)"
          curl -sS -H "Authorization: Bearer $token" \
            "https://api.hetzner.cloud/v1/actions?status=error&per_page=20&sort=started:desc" \
            | jq '[ .actions[] | select(.resources[]?.id as $r | true) | { id, command, status, started, finished, error, progress } ]' || true
          echo "::endgroup::"
      - name: Unstick uninit taints + uncordon CP
        if: github.event.inputs.unstick_uninit_taints != ''
        env:
          CLUSTER: ${{ github.event.inputs.unstick_uninit_taints }}
          WL_KUBECONFIG: ${{ github.workspace }}/.kube/workload-config
        run: |
          set -euo pipefail
          kubectl get secret -n org-tuist "tuist-$CLUSTER-kubeconfig" \
            -o jsonpath='{.data.value}' | base64 -d > "$WL_KUBECONFIG"
          chmod 600 "$WL_KUBECONFIG"
          export KUBECONFIG="$WL_KUBECONFIG"
          echo "::group::Uncordon control-plane Nodes"
          for cp in $(kubectl get nodes -l node-role.kubernetes.io/control-plane -o jsonpath='{.items[*].metadata.name}'); do
            unsched=$(kubectl get node "$cp" -o jsonpath='{.spec.unschedulable}')
            if [ "$unsched" = "true" ]; then
              echo "Uncordoning $cp"
              kubectl uncordon "$cp" || true
            fi
          done
          echo "::endgroup::"
          echo "::group::Stamp node.cluster.x-k8s.io/pool=runners-linux on Ready bare-metal Nodes"
          # CAPI's Machine controller normally propagates this
          # label from MachineDeployment.metadata.labels. With the
          # controller degraded, the label is missing and the
          # Linux runner Pod's nodeSelector (which keys on this
          # label) can't match. Stamp directly.
          for n in $(kubectl get nodes -o json | jq -r '.items[] | select(.metadata.name | startswith("bm-tuist-" + env.CLUSTER)) | select(.status.conditions[] | select(.type=="Ready" and .status=="True")) | .metadata.name'); do
            existing=$(kubectl get node "$n" -o jsonpath='{.metadata.labels.node\.cluster\.x-k8s\.io/pool}' 2>/dev/null || true)
            if [ "$existing" != "runners-linux" ]; then
              echo "Stamping pool=runners-linux on $n"
              kubectl label node "$n" node.cluster.x-k8s.io/pool=runners-linux --overwrite 2>/dev/null || true
            fi
          done
          echo "::endgroup::"
          echo "::group::Strip uninit taints from all Ready Nodes (cloud + bare-metal)"
          # Only Ready Nodes — leave NotReady stale CRs alone.
          # Cover both cloud workers (md-0) and bare-metal Nodes
          # (bm-*); both can have CAPI/HCCM-set uninit taints
          # stuck when their respective controllers are degraded.
          for n in $(kubectl get nodes -o json | jq -r '.items[] | select(.metadata.name | startswith("tuist-" + env.CLUSTER + "-md-0") or startswith("bm-tuist-" + env.CLUSTER)) | select(.status.conditions[] | select(.type=="Ready" and .status=="True")) | .metadata.name'); do
            taints=$(kubectl get node "$n" -o jsonpath='{.spec.taints}' 2>/dev/null || true)
            if echo "$taints" | grep -qE "uninitialized"; then
              echo "Removing uninit taints from $n"
              kubectl taint node "$n" node.cluster.x-k8s.io/uninitialized:NoSchedule- 2>/dev/null || true
              kubectl taint node "$n" node.cloudprovider.kubernetes.io/uninitialized:NoSchedule- 2>/dev/null || true
            fi
          done
          echo "::endgroup::"
          echo "::group::Result"
          kubectl get nodes -o custom-columns=NAME:.metadata.name,STATUS:.status.conditions[-1].type,SCHED:.spec.unschedulable,TAINT_KEYS:.spec.taints[*].key 2>&1 | head -30 || true
          echo "::endgroup::"
