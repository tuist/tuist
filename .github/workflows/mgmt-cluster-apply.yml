name: Mgmt Cluster Apply

# Auto-applies CAPI manifests (ClusterClass + per-env Cluster CRs) and
# mgmt-cluster workloads (etcd-snapshot CronJob, Tailscale daemon) to
# our self-hosted CAPI mgmt cluster on push to main when the relevant
# paths change.
#
# Why a workflow instead of Argo CD / Flux: the mgmt cluster has a tiny
# manifest surface (one ClusterClass, four Cluster CRs, two mgmt-side
# workloads) — drift detection / continuous reconciliation provided by
# a long-running GitOps controller is overkill at this scale. A
# push-driven CI apply gets us GitOps-style "the repo is the source of
# truth" without the operational overhead of running another controller.
# We can graduate to Argo CD later if the mgmt-cluster surface grows.
#
# Order matters: the ClusterClass is applied before the Cluster CRs
# because the topology controller resolves `topology.classRef.name`
# at admission time. Mgmt-side workloads (etcd-snapshot, tailscale)
# are independent and applied last.
#
# Known limitation: KubeadmControlPlaneTemplate spec is immutable.
# When the ClusterClass changes anything in the KCT, kubectl apply
# fails with "field is immutable, please create new resource instead".
# This workflow surfaces that as a failure — operator must
# `kubectl delete kubeadmcontrolplanetemplate tuist-hcloud-control-plane`
# manually, then re-run this workflow. Intentional: that operation
# also requires deleting + recreating each Cluster CR, which is too
# destructive to automate.
#
# Required secrets (on the mgmt-cluster-apply GitHub Environment):
#   OP_SERVICE_ACCOUNT_TOKEN - 1Password SA scoped read-only to the
#     tuist-k8s-mgmt vault, where the mgmt cluster's kubeconfig is
#     stored as `kubeconfig: tuist-mgmt`.

on:
  push:
    # Main-only — every other deploy workflow in the repo holds this
    # posture so a feature branch never mutates production state.
    branches: [main]
    paths:
      - 'infra/k8s/clusters/**'
      - 'infra/k8s/mgmt/cluster-autoscaler.yaml'
      - 'infra/k8s/mgmt/etcd-snapshot.yaml'
      - 'infra/k8s/mgmt/tailscale.yaml'
      - 'infra/k8s/mgmt/hetzner-robot-controller.yaml'
      - '.github/workflows/mgmt-cluster-apply.yml'
  # Manual re-runs of the apply path, e.g. to force a re-deploy
  # without a code change. Operators can optionally scope a manual run
  # to one workload Cluster CR so feature-branch validation does not
  # reconcile every environment.
  workflow_dispatch:
    inputs:
      cluster_manifest:
        description: Optional single workload Cluster manifest to apply, for example infra/k8s/clusters/cluster-staging.yaml
        required: false
        default: ""

# Serialize: don't let two pushes apply concurrently and race.
concurrency:
  group: mgmt-cluster-apply
  cancel-in-progress: false

permissions: {}

jobs:
  apply:
    name: kubectl apply
    runs-on: ubuntu-latest
    environment:
      name: mgmt-cluster-apply
    # `kubectl diff` can be slow against the Cluster API CRDs when many
    # Machines are changing, so leave enough room for the visibility step.
    timeout-minutes: 15
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      TARGET_CLUSTER_MANIFEST: ${{ inputs.cluster_manifest || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3.2.0
        with:
          install_args: "kubectl"
          cache: "false"
      - uses: 1password/install-cli-action@v2
      - name: Load mgmt kubeconfig from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          op document get "kubeconfig: tuist-mgmt" --vault tuist-k8s-mgmt --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
      - name: Diff (visibility into what's about to change)
        # `kubectl diff` exits non-zero when there's a diff, which is
        # the expected case here, so don't fail the step on that.
        # The actual gate is the apply step below.
        continue-on-error: true
        run: |
          set +e
          diff_manifest() {
            timeout 60s kubectl diff -f "$1" || true
          }

          if [ -n "$TARGET_CLUSTER_MANIFEST" ]; then
            case "$TARGET_CLUSTER_MANIFEST" in
              infra/k8s/clusters/cluster-*.yaml)
                if [ ! -f "$TARGET_CLUSTER_MANIFEST" ]; then
                  echo "Target cluster manifest does not exist: $TARGET_CLUSTER_MANIFEST"
                  exit 1
                fi
                echo "Skipping kubectl diff for scoped manual apply of $TARGET_CLUSTER_MANIFEST"
                exit 0
                ;;
              *)
                echo "cluster_manifest must be under infra/k8s/clusters/cluster-*.yaml"
                exit 1
                ;;
            esac
          fi

          cluster_files=()
          for f in infra/k8s/clusters/cluster-*.yaml; do
            cluster_files+=("$f")
          done

          echo "::group::ClusterClass diff"
          diff_manifest infra/k8s/clusters/clusterclass-tuist.yaml
          echo "::endgroup::"
          for f in infra/k8s/clusters/bare-metal*.yaml; do
            [ -e "$f" ] || continue
            echo "::group::$(basename "$f") diff"
            diff_manifest "$f"
            echo "::endgroup::"
          done
          for f in "${cluster_files[@]}"; do
            echo "::group::$(basename "$f") diff"
            diff_manifest "$f"
            echo "::endgroup::"
          done
          echo "::group::etcd-snapshot.yaml diff"
          diff_manifest infra/k8s/mgmt/etcd-snapshot.yaml
          echo "::endgroup::"
          echo "::group::tailscale.yaml diff"
          diff_manifest infra/k8s/mgmt/tailscale.yaml
          echo "::endgroup::"
          echo "::group::hetzner-robot-controller.yaml diff"
          diff_manifest infra/k8s/mgmt/hetzner-robot-controller.yaml
          echo "::endgroup::"
          echo "::group::cluster-autoscaler.yaml diff"
          diff_manifest infra/k8s/mgmt/cluster-autoscaler.yaml
          echo "::endgroup::"
      - name: Apply ClusterClass first (Cluster CRs reference it)
        if: env.TARGET_CLUSTER_MANIFEST == ''
        run: |
          kubectl apply -f infra/k8s/clusters/clusterclass-tuist.yaml
      - name: Apply bare-metal substrate
        if: env.TARGET_CLUSTER_MANIFEST == ''
        # HetznerBareMetalMachineTemplate + KubeadmConfigTemplate
        # for the shared `bare-metal-worker` MachineDeployment class.
        # Per-cluster HBM claim scoping is via the `bareMetalCluster`
        # ClusterClass variable + the patch in `clusterclass-tuist.yaml`,
        # not by duplicating substrate per env. Applied
        # between ClusterClass and Cluster CRs so the MD-claimed
        # templates exist by the time the topology controller starts
        # reconciling worker Machines.
        #
        # HetznerBareMetalMachineTemplate's spec is immutable by CAPI
        # convention (every infrastructure template across providers
        # works this way — the spec is a definitional snapshot that
        # gets cloned by reference at Machine creation, not mutated in
        # place). When the PR changes the template, plain `kubectl
        # apply` fails with `Invalid value: ... is immutable`. Fall
        # back to delete + apply, which is safe because:
        # (a) deleting an unreferenced template is a no-op for caph
        # (b) existing Machines hold a snapshot of the template's
        #     spec in their own object and aren't affected by the
        #     template going away.
        run: |
          set -o pipefail
          for f in infra/k8s/clusters/bare-metal*.yaml; do
            [ -e "$f" ] || continue
            echo "==> $f"
            if ! kubectl apply -f "$f" 2>&1 | tee /tmp/apply.out; then
              if grep -q 'is immutable' /tmp/apply.out; then
                echo "Immutable spec detected, retrying as delete + apply..."
                kubectl delete -f "$f" --ignore-not-found --wait=true
                kubectl apply -f "$f"
              else
                exit 1
              fi
            fi
          done
      - name: Apply per-env Cluster CRs
        run: |
          cluster_files=()
          if [ -n "$TARGET_CLUSTER_MANIFEST" ]; then
            case "$TARGET_CLUSTER_MANIFEST" in
              infra/k8s/clusters/cluster-*.yaml)
                if [ ! -f "$TARGET_CLUSTER_MANIFEST" ]; then
                  echo "Target cluster manifest does not exist: $TARGET_CLUSTER_MANIFEST"
                  exit 1
                fi
                cluster_files=("$TARGET_CLUSTER_MANIFEST")
                ;;
              *)
                echo "cluster_manifest must be under infra/k8s/clusters/cluster-*.yaml"
                exit 1
                ;;
            esac
          else
            for f in infra/k8s/clusters/cluster-*.yaml; do
              cluster_files+=("$f")
            done
          fi

          apply_args=()
          if [ -n "$TARGET_CLUSTER_MANIFEST" ]; then
            apply_args+=(--validate=false --request-timeout=60s)
          fi

          for f in "${cluster_files[@]}"; do
            echo "==> $f"
            if [ -n "$TARGET_CLUSTER_MANIFEST" ]; then
              timeout 90s kubectl apply "${apply_args[@]}" -f "$f"
            else
              kubectl apply "${apply_args[@]}" -f "$f"
            fi
          done
      - name: Apply mgmt-side workloads
        if: env.TARGET_CLUSTER_MANIFEST == ''
        # These are mgmt-cluster Deployments / CronJobs, not Cluster
        # CRs. Independent of the CAPI manifests above.
        run: |
          kubectl apply -f infra/k8s/mgmt/hetzner-robot-controller.yaml
          kubectl apply -f infra/k8s/mgmt/cluster-autoscaler.yaml
          kubectl apply -f infra/k8s/mgmt/etcd-snapshot.yaml
          kubectl apply -f infra/k8s/mgmt/tailscale.yaml
