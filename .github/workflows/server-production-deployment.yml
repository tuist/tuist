name: Server Production Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - cli/**
      - mise/tasks/cli/**
      - .github/workflows/cli-release.yml
      - .github/workflows/cli-build-publish.yml
      - app/**
      - grafana-datasource/**
      - mise/tasks/app/**
      - Package.swift
      - Package.resolved
      - .xcode-version-releases
      # Components with their own release workflows (extracted from this
      # pipeline) so a change to them alone does not spin up the monorepo run.
      - cache/**
      - gradle/**
      - skills/**
      - infra/hetzner-robot-controller/**
      - .github/workflows/cache-release.yml
      - .github/workflows/gradle-release.yml
      - .github/workflows/skills-release.yml
      - .github/workflows/hetzner-robot-controller-release.yml

permissions:
  contents: write
  pull-requests: read
  statuses: write
  packages: write

concurrency:
  # Serialize release runs (the group): check-releases derives each next
  # version from the latest tag, so two runs in flight would compute the
  # same version and collide.
  #
  # Queue rather than cancel: a run pushes component tags, publishes GitHub
  # Releases, and runs the production deploy as side effects, so each must
  # complete atomically — cancelling mid-run could tear a release or a
  # helm --atomic deploy. GitHub keeps only the latest pending run, so a
  # burst of merges collapses into one run that covers them all via
  # cumulative check-releases.
  group: release-workflow-${{ github.ref }}
  cancel-in-progress: false

env:
  MISE_VERSION: "2026.5.15"
  MISE_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}
  GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN || github.token }}
  TUIST_ENABLE_CACHING: "true"
  MISE_GITHUB_ATTESTATIONS: 0
  # Used by the production deploy cascade's build job.
  REGISTRY: ghcr.io
  IMAGE_NAME: tuist/tuist
  REGISTRY_IMAGE_NAME: tuist/registry
  KURA_CONTROLLER_IMAGE_NAME: tuist/kura-controller

jobs:
  check-releases:
    name: Check for releasable changes
    runs-on: tuist-linux
    timeout-minutes: 5
    # release:check only needs the git-cliff + jq installed below, but `mise run`
    # otherwise auto-installs the whole merged mise.toml toolset — including
    # github/npm-backend tools that hit the rate-limited GitHub API for SLSA
    # verification (--locked only redirects the binary download, not the
    # provenance fetch). Block the task-run auto-install.
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "0"
    outputs:
      cli-should-release: ${{ steps.check.outputs.cli-should-release }}
      cli-next-version: ${{ steps.check.outputs.cli-next-version }}
      cli-next-version-number: ${{ steps.check.outputs.cli-next-version-number }}
      app-should-release: ${{ steps.check.outputs.app-should-release }}
      app-next-version: ${{ steps.check.outputs.app-next-version }}
      app-next-version-number: ${{ steps.check.outputs.app-next-version-number }}
      server-should-release: ${{ steps.check.outputs.server-should-release }}
      server-next-version: ${{ steps.check.outputs.server-next-version }}
      server-next-version-number: ${{ steps.check.outputs.server-next-version-number }}
      kura-should-release: ${{ steps.check.outputs.kura-should-release }}
      kura-next-version: ${{ steps.check.outputs.kura-next-version }}
      kura-next-version-number: ${{ steps.check.outputs.kura-next-version-number }}
      noora-should-release: ${{ steps.check.outputs.noora-should-release }}
      noora-next-version: ${{ steps.check.outputs.noora-next-version }}
      noora-next-version-number: ${{ steps.check.outputs.noora-next-version-number }}
      helm-should-release: ${{ steps.check.outputs.helm-should-release }}
      helm-next-version: ${{ steps.check.outputs.helm-next-version }}
      helm-next-version-number: ${{ steps.check.outputs.helm-next-version-number }}
      capi-scaleway-should-release: ${{ steps.check.outputs.capi-scaleway-should-release }}
      capi-scaleway-next-version: ${{ steps.check.outputs.capi-scaleway-next-version }}
      capi-scaleway-next-version-number: ${{ steps.check.outputs.capi-scaleway-next-version-number }}
      xcresult-processor-image-should-release: ${{ steps.check.outputs.xcresult-processor-image-should-release }}
      xcresult-processor-image-next-version: ${{ steps.check.outputs.xcresult-processor-image-next-version }}
      xcresult-processor-image-next-version-number: ${{ steps.check.outputs.xcresult-processor-image-next-version-number }}
      runner-image-should-release: ${{ steps.check.outputs.runner-image-should-release }}
      runner-image-next-version: ${{ steps.check.outputs.runner-image-next-version }}
      runner-image-next-version-number: ${{ steps.check.outputs.runner-image-next-version-number }}
      runner-image-matrix: ${{ steps.runner-image-matrix.outputs.matrix }}
      linux-runner-image-should-release: ${{ steps.check.outputs.linux-runner-image-should-release }}
      linux-runner-image-next-version: ${{ steps.check.outputs.linux-runner-image-next-version }}
      linux-runner-image-next-version-number: ${{ steps.check.outputs.linux-runner-image-next-version-number }}
      runners-controller-should-release: ${{ steps.check.outputs.runners-controller-should-release }}
      runners-controller-next-version: ${{ steps.check.outputs.runners-controller-next-version }}
      runners-controller-next-version-number: ${{ steps.check.outputs.runners-controller-next-version-number }}
      stable-egress-controller-should-release: ${{ steps.check.outputs.stable-egress-controller-should-release }}
      stable-egress-controller-next-version: ${{ steps.check.outputs.stable-egress-controller-next-version }}
      stable-egress-controller-next-version-number: ${{ steps.check.outputs.stable-egress-controller-next-version-number }}
      should-release-any: ${{ steps.check.outputs.should-release-any }}
      deployable-changed: ${{ steps.deployable.outputs.deployable-changed }}
      # Single source of truth for hotfix routing. "(hotfix)" in the commit
      # subject ships straight to production via the production-hotfix leg and
      # skips the canary cascade. The deploy-tail jobs (canary, production,
      # production-hotfix) all gate on this one output, so the marker format
      # lives in exactly one place instead of three inline contains() checks
      # with inverted logic.
      is-hotfix: ${{ contains(github.event.head_commit.message, '(hotfix)') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff jq"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}
      - id: check
        run: mise run release:check
      # The runner-image build matrix is data-driven from
      # infra/runner-image/profiles.json so the active Xcode list lives
      # under the component's own path. Editing the list both triggers a
      # runner-image release (path is in components.json's include_paths)
      # and reshapes the build matrix below — no workflow edit needed.
      - id: runner-image-matrix
        run: |
          echo "matrix=$(jq -c '{xcode: .}' infra/runner-image/profiles.json)" >> "$GITHUB_OUTPUT"
      - id: deployable
        # A change to any of these paths deploys the server; the build gate
        # of the production cascade ORs this with the fleet/runtime
        # image-release flags. infra/helm/platform/ is included so platform
        # chart changes (CNPG operator, cert-manager, ingress-nginx, ESO,
        # metrics-server) deploy on merge via platform-install — without it a
        # platform-only change skips build and the whole cascade, merging green
        # but never reaching the cluster.
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base="$BEFORE"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            # No reliable base (new branch / force-push): deploy to be safe.
            echo "deployable-changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" "${{ github.sha }}" \
            | grep -qE '^(server/|registry/|tuist_common/|noora/|infra/kura-controller/|infra/helm/tuist/|infra/helm/platform/|infra/helm/k8s-monitoring/|\.github/workflows/(server-deployment|server-production-deployment)\.yml)'; then
            echo "deployable-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployable-changed=false" >> "$GITHUB_OUTPUT"
          fi

  release-server:
    name: Release Server (amd64)
    needs: check-releases
    if: needs.check-releases.outputs.server-should-release == 'true'
    # Bigger shape: the server image build (Elixir release compile inside
    # the dind sidecar) OOMs the 2 vCPU / 8 GB default microVM, killing the
    # runner mid-build ("lost communication"). Mirrors server.yml's
    # docker_build job.
    runs-on: tuist-linux-large
    timeout-minutes: 75
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      image-digest: ${{ steps.build.outputs.digest }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        working-directory: server
        run: |
          # Get the latest server version tag
          LATEST_VERSION=$(git tag -l | grep -E "^server@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "server/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "server/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: server
        run: git cliff --include-path "server/**/*" --config cliff.toml --repository "../" --tag "${{ needs.check-releases.outputs.server-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          platforms: linux/amd64
          outputs: type=image,name=ghcr.io/tuist/tuist,push-by-digest=true,name-canonical=true,push=true
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            TUIST_HOSTED=0
            TUIST_VERSION=${{ needs.check-releases.outputs.server-next-version-number }}
            MIX_ENV=prod
            APT_CACHE_BUST=${{ github.sha }}

      - name: Upload Server artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: server-artifacts
          path: |
            server/CHANGELOG.md
          retention-days: 1

  release-server-arm64-image:
    name: Release Server (arm64)
    needs: check-releases
    if: needs.check-releases.outputs.server-should-release == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 75
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          platforms: linux/arm64
          outputs: type=image,name=ghcr.io/tuist/tuist,push-by-digest=true,name-canonical=true,push=true
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            TUIST_HOSTED=0
            TUIST_VERSION=${{ needs.check-releases.outputs.server-next-version-number }}
            MIX_ENV=prod
            APT_CACHE_BUST=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/tuist/tuist-buildcache:release-server-arm64
          cache-to: type=registry,ref=ghcr.io/tuist/tuist-buildcache:release-server-arm64,mode=max

  release-server-manifest:
    name: Release Server manifest
    needs: [check-releases, release-server, release-server-arm64-image]
    if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success' && needs.release-server-arm64-image.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      IMAGE: ghcr.io/tuist/tuist
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ needs.check-releases.outputs.server-next-version-number }}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}@${{ needs.release-server.outputs.image-digest }}" \
            "${IMAGE}@${{ needs.release-server-arm64-image.outputs.image-digest }}"

          docker buildx imagetools inspect "${IMAGE}:${{ needs.check-releases.outputs.server-next-version-number }}"

  release-kura-prepare:
    name: Release Kura Metadata
    needs: check-releases
    if: needs.check-releases.outputs.kura-should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/mise-install
        with:
          version: ${{ env.MISE_VERSION }}
          install: "git-cliff rust"
          cache: "false"
          working-directory: kura
          github-token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        working-directory: kura
        run: |
          # Get the latest kura version tag
          LATEST_VERSION=$(git tag -l | grep -E "^kura@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        working-directory: kura
        run: |
          sed -i '0,/^version = ".*"/s//version = "${{ needs.check-releases.outputs.kura-next-version-number }}"/' Cargo.toml
          env -u RUSTUP_TOOLCHAIN cargo update -w

      - name: Update CHANGELOG.md
        working-directory: kura
        run: git cliff --include-path "kura/**/*" --config cliff.toml --repository "../" --tag "${{ needs.check-releases.outputs.kura-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Upload Kura release metadata
        uses: actions/upload-artifact@v4
        with:
          name: kura-release-metadata
          path: |
            kura/CHANGELOG.md
            kura/Cargo.toml
            kura/Cargo.lock
          retention-days: 1

  release-kura-binaries:
    name: Release Kura Binary (${{ matrix.target }})
    needs: [check-releases, release-kura-prepare]
    if: needs.check-releases.outputs.kura-should-release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    # id-token: OIDC for `tuist bazel setup`. Job permissions replace (not merge) the workflow's,
    # so contents:read must be restated for checkout.
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        # All targets build with Bazel and reuse the Tuist remote cache. macOS x86_64 is the only
        # non-native target: it cross-compiles from the arm64 runner via --config=macos-x86_64-cross
        # (apple_support supplies the cross cc toolchain for the -sys crates). The rest are native.
        include:
          - runner: tuist-linux
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: tuist-macos
            target: aarch64-apple-darwin
          - runner: tuist-macos
            target: x86_64-apple-darwin
            compile-args: "--config=macos-x86_64-cross"
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust bazel tuist"
          cache: "false"
          working_directory: kura
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Download Kura release metadata
        uses: actions/download-artifact@v4
        with:
          name: kura-release-metadata
          path: kura

      # macOS gets clang/cmake from Xcode; this apt path is Linux-only.
      - name: Install C/C++ toolchain for -sys crates (rocksdb/aws-lc bindgen)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang cmake pkg-config
      # Best-effort: continue-on-error + `.bazelrc` try-imports `.bazelrc.tuist`, so a failed setup
      # falls back to a cold local build instead of blocking the release.
      - name: Set up the Tuist remote cache
        working-directory: kura
        run: |
          tuist auth login
          tuist bazel setup
        continue-on-error: true
      - name: Warn when the Tuist remote cache is unavailable
        if: hashFiles('kura/.bazelrc.tuist') == ''
        run: echo "::warning::Tuist remote cache unavailable (.bazelrc.tuist not written); building cold against the local cache."

      - name: Build Kura binary
        working-directory: kura
        run: |
          TARGET="${{ matrix.target }}"
          ARTIFACT_DIR="$GITHUB_WORKSPACE/build-kura"
          ARTIFACT_NAME="kura-${TARGET}.tar.gz"

          mkdir -p "$ARTIFACT_DIR"

          # --binary-only builds just //:kura (opt via kura/.bazelrc); //... would pull in the test
          # target, which can't cross-compile. compile-args adds the cross --config on the macOS
          # x86_64 leg and is empty for the native legs.
          mise run --skip-tools compile -- --binary-only ${{ matrix.compile-args }}

          STAGE_DIR="$(mktemp -d)"
          cp bazel-bin/kura "$STAGE_DIR/kura"
          chmod +x "$STAGE_DIR/kura"

          tar -C "$STAGE_DIR" -czf "$ARTIFACT_DIR/$ARTIFACT_NAME" kura
          shasum -a 256 "$ARTIFACT_DIR/$ARTIFACT_NAME" | awk '{print $1 "  " FILENAME}' FILENAME="$ARTIFACT_NAME" > "$ARTIFACT_DIR/sha256.txt"
          shasum -a 512 "$ARTIFACT_DIR/$ARTIFACT_NAME" | awk '{print $1 "  " FILENAME}' FILENAME="$ARTIFACT_NAME" > "$ARTIFACT_DIR/sha512.txt"

      - name: Upload Kura binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kura-binary-${{ matrix.target }}-artifacts
          path: |
            build-kura/kura-${{ matrix.target }}.tar.gz
            build-kura/sha256.txt
            build-kura/sha512.txt
          retention-days: 1

  release-kura-docker:
    name: Release Kura Docker Image
    needs: [check-releases, release-kura-prepare, release-kura-binaries]
    if: needs.check-releases.outputs.kura-should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download Kura amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-unknown-linux-gnu-artifacts
          path: kura-binary-amd64

      - name: Download Kura arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-unknown-linux-gnu-artifacts
          path: kura-binary-arm64

      - name: Stage binaries for Docker build
        working-directory: kura
        run: |
          mkdir -p bin/amd64 bin/arm64
          tar -xzf "$GITHUB_WORKSPACE/kura-binary-amd64/kura-x86_64-unknown-linux-gnu.tar.gz" -C bin/amd64
          tar -xzf "$GITHUB_WORKSPACE/kura-binary-arm64/kura-aarch64-unknown-linux-gnu.tar.gz" -C bin/arm64
          chmod +x bin/amd64/kura bin/arm64/kura

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kura
          file: ./kura/Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=kura-runtime
          cache-to: type=gha,mode=max,scope=kura-runtime
          tags: |
            ghcr.io/tuist/kura:${{ needs.check-releases.outputs.kura-next-version-number }}
            ghcr.io/tuist/kura:latest

  release-noora:
    name: Release Noora
    needs: check-releases
    if: needs.check-releases.outputs.noora-should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/mise-install
        with:
          version: ${{ env.MISE_VERSION }}
          install: "erlang elixir node aube git-cliff"
          cache: "false"
          working-directory: noora
          github-token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        run: |
          # Get the latest noora version tag
          LATEST_VERSION=$(git tag -l | grep -E "^noora@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "noora/**/*" --config noora/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "noora/**/*" --config noora/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update version in mix.exs
        working-directory: noora
        run: |
          sed -i 's/version: ".*"/version: "${{ needs.check-releases.outputs.noora-next-version-number }}"/' mix.exs

      - name: Update CHANGELOG.md
        working-directory: noora
        run: git cliff --include-path "noora/**/*" --config cliff.toml --repository "../" --tag "${{ needs.check-releases.outputs.noora-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Install dependencies
        working-directory: noora
        run: |
          mix deps.get
          aube install

      - name: Build JS assets
        working-directory: noora
        run: aube run build

      - name: Publish to hex.pm
        working-directory: noora
        run: mix hex.publish --yes --replace
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Upload Noora artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: noora-artifacts
          path: |
            noora/CHANGELOG.md
            noora/mix.exs
          retention-days: 1

  release-helm:
    name: Release Helm Chart
    # release-kura-docker is in needs because the kura chart's appVersion is
    # stamped with the kura runtime version below: when this run also cuts a
    # kura release, the chart must not be pushed before (or without) the
    # docker tag it pins. The always() + result guard keeps helm-only runs
    # working (release-kura-docker skipped) while a FAILED kura image build
    # still blocks the chart from pinning a tag that never got published.
    needs: [check-releases, release-kura-docker]
    if: >-
      always() &&
      needs.check-releases.outputs.helm-should-release == 'true' &&
      (needs.release-kura-docker.result == 'success' || needs.release-kura-docker.result == 'skipped')
    runs-on: tuist-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      artifacts-uploaded: ${{ steps.upload.outputs.uploaded }}
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        run: |
          # Get the latest helm version tag
          LATEST_VERSION=$(git tag -l | grep -E "^helm@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff --include-path "infra/helm/**/*" --include-path "kura/ops/helm/kura/**/*" --config infra/helm/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff --include-path "infra/helm/**/*" --include-path "kura/ops/helm/kura/**/*" --config infra/helm/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i 's/^version: .*/version: ${{ needs.check-releases.outputs.helm-next-version-number }}/' infra/helm/tuist/Chart.yaml
          sed -i 's/^appVersion: .*/appVersion: "${{ needs.check-releases.outputs.helm-next-version-number }}"/' infra/helm/tuist/Chart.yaml
          sed -i 's/^version: .*/version: ${{ needs.check-releases.outputs.helm-next-version-number }}/' kura/ops/helm/kura/Chart.yaml
          # The kura chart's appVersion is the runtime image tag the chart
          # defaults to (statefulset falls back to .Chart.AppVersion), so it
          # is stamped with the KURA version, not the chart version: the
          # release cut in this run, or the newest existing one otherwise
          # (kura-next-version-number is the latest version when kura is not
          # releasing). The repo tree keeps appVersion "latest" so in-tree
          # installs track the newest release.
          sed -i 's/^appVersion: .*/appVersion: "${{ needs.check-releases.outputs.kura-next-version-number }}"/' kura/ops/helm/kura/Chart.yaml

      - name: Update CHANGELOG.md
        working-directory: infra/helm
        run: git cliff --include-path "infra/helm/**/*" --include-path "kura/ops/helm/kura/**/*" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.helm-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm charts
        run: |
          helm package infra/helm/tuist
          helm package kura/ops/helm/kura

      - name: Push Helm charts
        run: |
          helm push tuist-${{ needs.check-releases.outputs.helm-next-version-number }}.tgz oci://ghcr.io/tuist/charts
          helm push kura-${{ needs.check-releases.outputs.helm-next-version-number }}.tgz oci://ghcr.io/tuist/charts

      - name: Upload Helm artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: helm-artifacts
          path: |
            infra/helm/CHANGELOG.md
            infra/helm/tuist/Chart.yaml
            kura/ops/helm/kura/Chart.yaml
          retention-days: 1

