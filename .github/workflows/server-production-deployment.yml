  release-xcresult-processor-image:
    name: Release xcresult processor image
    needs: check-releases
    if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true'
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/mise-install
        with:
          version: ${{ env.MISE_VERSION }}
          install: "git-cliff erlang elixir"
          working-directory: server

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^xcresult-processor-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)

          INCLUDE_PATHS=(
            --include-path "infra/xcresult-processor-image/**/*"
            --include-path "server/lib/**/*"
            --include-path "server/native/xcresult_nif/**/*"
            --include-path "server/mix.exs"
            --include-path "server/mix.lock"
          )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/xcresult-processor-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/xcresult-processor-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/xcresult-processor-image
        run: |
          INCLUDE_PATHS=(
            --include-path "infra/xcresult-processor-image/**/*"
            --include-path "server/lib/**/*"
            --include-path "server/native/xcresult_nif/**/*"
            --include-path "server/mix.exs"
            --include-path "server/mix.lock"
          )

          git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Build server release for macOS
        id: release
        working-directory: server
        run: |
          set -euo pipefail
          MIX_ENV=prod mix deps.get --only prod
          ./native/xcresult_nif/build.sh
          ./native/xcactivitylog_nif/build.sh
          MIX_ENV=prod mix compile --force --warnings-as-errors
          MIX_ENV=prod mix release tuist --overwrite
          if [ -n "${TUIST_MIX_BUILD_ROOT:-}" ]; then
            RELEASE_DIR="${TUIST_MIX_BUILD_ROOT}/server/prod/rel/tuist"
          else
            RELEASE_DIR="$(pwd)/_build/prod/rel/tuist"
          fi
          echo "dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package release tarball
        run: |
          set -euo pipefail
          tar -czf /tmp/release.tar.gz -C "${{ steps.release.outputs.dir }}" .
          ls -lh /tmp/release.tar.gz

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates with the tuist-bot token. crane writes creds
      # to ~/.docker/config.json, which Tart reads via the Docker
      # credential-helper protocol for both the pull (this build's
      # clone of the base) and the push at the end. See
      # runner-image.yml's matching step for the long explanation.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/xcresult-processor-image
        run: packer init -upgrade xcresult-processor.pkr.hcl

      - uses: ./.github/actions/reclaim-tart-disk

      - name: Build image
        working-directory: infra/xcresult-processor-image
        # The processor parses .xcresult bundles from *all* customer
        # runner profiles, so the Xcode here should be at least as new
        # as the newest active runner-image profile (xcresulttool's
        # JSON schema changes across Xcode majors). Promotion rule:
        # when you bump the first entry in
        # infra/runner-image/profiles.json, bump this too.
        env:
          XCODE_VERSION: "26.5"
        run: |
          set -euo pipefail
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${XCODE_VERSION//./-}"
          echo "Base image: ${BASE_IMAGE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-xcresult-processor" \
            -var "release_tarball=/tmp/release.tar.gz" \
            xcresult-processor.pkr.hcl

      - name: Push image to GHCR
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        # Direct tart push with a 3x retry — identical shape to
        # macos-xcode-image.yml, which publishes the same-size image via
        # the same path and is the only large tart push that pushes
        # reliably. Earlier attempts here layered on TART_NO_AUTO_PRUNE
        # and a clone-the-base "restore nvram.bin" step; both failed to
        # fix the intermittent `Error: The file "nvram.bin" doesn't exist`
        # and the disk-heavy restore made it worse (the whole VM bundle
        # vanished mid-push). Blob uploads are content-addressed, so a
        # re-push only re-uploads layers that didn't land last time.
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}"
          for dest_tag in "${VERSION}" "latest"; do
            DST="ghcr.io/tuist/tuist-xcresult-processor:${dest_tag}"
            for attempt in 1 2 3; do
              echo "tart push -> ${dest_tag} attempt ${attempt} at $(date -u +%H:%M:%SZ)" >&2
              if tart push tuist-xcresult-processor "$DST"; then
                echo "Pushed ${DST} on attempt ${attempt}"
                break
              fi
              if [ "$attempt" = 3 ]; then
                echo "tart push failed three times for ${dest_tag}" >&2
                exit 1
              fi
              echo "tart push attempt ${attempt} failed; sleeping 60s before retry" >&2
              sleep 60
            done
          done

      - name: Upload xcresult-processor-image artifacts
        uses: actions/upload-artifact@v4
        with:
          # No values file is packaged: the image version is resolved at
          # deploy time from this run's `<component>@<semver>` tag (created
          # by tag-infra-releases), so there is no chart pin to bump.
          name: xcresult-processor-image-artifacts
          path: |
            infra/xcresult-processor-image/CHANGELOG.md
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/release.tar.gz
          tart delete tuist-xcresult-processor 2>/dev/null || true

  runner-image-build:
    # One job per active profile, fanned out across whatever
    # vm-image-builder hosts are available. GitHub schedules them
    # respecting the label set — with 2 builders, 2 profiles build
    # in parallel; adding more hosts scales linearly without any
    # workflow change.
    #
    # The active-profile list is the single source of truth in
    # infra/runner-image/profiles.json; check-releases reads it into
    # the `runner-image-matrix` output and the matrix below expands it.
    # Keep it aligned with `runnersFleet.xcodeVersions` in
    # values-managed-common.yaml — every Xcode that ships a pool needs
    # a runner image published for it. That alignment is a deploy
    # concern now, not a build trigger: only changes under
    # infra/runner-image/** (profiles.json included) release the image.
    #
    # To refresh an out-of-rotation profile (one not in profiles.json),
    # use `gh workflow run runner-image.yml -f xcode_version=26.X.Y` —
    # that path keeps publishing tags without going through the full
    # release flow.
    name: Build runner image (Xcode ${{ matrix.xcode }})
    needs: check-releases
    if: needs.check-releases.outputs.runner-image-should-release == 'true'
    runs-on: [self-hosted, macos, bare-metal, vm-image-builder]
    timeout-minutes: 60
    strategy:
      # If any profile build fails, abort sibling builds so the chart
      # pin doesn't move to a partially-published set.
      fail-fast: true
      matrix: ${{ fromJSON(needs.check-releases.outputs.runner-image-matrix) }}
    env:
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TART_REGISTRY_HOSTNAME: ghcr.io
      TART_REGISTRY_USERNAME: tuist-bot
      TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Log in BEFORE Packer build so Tart's clone of the
      # macos-tahoe-xcode base (a private ghcr.io/tuist/* image)
      # authenticates with the tuist-bot token. `crane auth login`
      # writes creds to ~/.docker/config.json, which Tart reads via
      # the Docker credential-helper protocol for both pull (Packer's
      # clone of the base) and push at the end. See runner-image.yml
      # for the long explanation of why crane and not `tart login`.
      - name: Log in to GHCR (crane)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login --username tuist-bot --password-stdin ghcr.io

      - name: Initialize Packer
        working-directory: infra/runner-image
        run: packer init -upgrade runner.pkr.hcl

      - uses: ./.github/actions/reclaim-tart-disk

      - name: Build profile
        id: build
        working-directory: infra/runner-image
        run: |
          set -euo pipefail
          XCODE="${{ matrix.xcode }}"
          BASE_TAG="${XCODE//./-}"
          BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
          PROFILE="macos-${BASE_TAG}"
          echo "Building profile ${PROFILE} from base ${BASE_IMAGE}"
          env -u GITHUB_TOKEN -u MISE_GITHUB_TOKEN packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "output_image=tuist-runner" \
            runner.pkr.hcl
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"

      - name: Restore nvram.bin if missing
        env:
          XCODE: ${{ matrix.xcode }}
        # See `runner-image.yml` for the rationale: packer-plugin-tart
        # v1.20.0 sometimes drops `nvram.bin` from the built bundle,
        # so the subsequent `tart push` fails after a successful disk
        # upload. Restore the file from a fresh clone of the base.
        run: |
          set -euo pipefail
          BUNDLE="$HOME/.tart/vms/tuist-runner"
          echo "pre-push bundle contents:"
          ls -la "$BUNDLE"
          if [ ! -f "$BUNDLE/nvram.bin" ]; then
            BASE_TAG="${XCODE//./-}"
            BASE_IMAGE="ghcr.io/tuist/macos-tahoe-xcode:${BASE_TAG}"
            echo "nvram.bin missing — restoring from ${BASE_IMAGE}"
            tart delete nvram-restore 2>/dev/null || true
            tart clone "$BASE_IMAGE" nvram-restore
            cp "$HOME/.tart/vms/nvram-restore/nvram.bin" "$BUNDLE/nvram.bin"
            tart delete nvram-restore
            echo "restored nvram.bin ($(du -h "$BUNDLE/nvram.bin" | cut -f1))"
          fi

      - name: Push profile to GHCR
        env:
          TART_REGISTRY_HOSTNAME: ghcr.io
          TART_REGISTRY_USERNAME: tuist-bot
          TART_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          # See runner-image.yml's matching step for the rationale —
          # tart's auto-prune races mid-push (cirruslabs/tart#860).
          TART_NO_AUTO_PRUNE: "1"
        # Direct tart push; same shape as `macos-xcode-image.yml`.
        # Push both the immutable per-version tag and the rolling
        # `:<profile>` tag so the chart's tag template stays valid
        # without overrides while operators can still pin to a
        # specific version when they need to roll back. 3× retry per
        # tag — blob uploads are content-addressed so a re-push only
        # re-uploads layers that didn't make it on the previous
        # attempt.
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.runner-image-next-version-number }}"
          PROFILE="${{ steps.build.outputs.profile }}"
          for dest_tag in "${PROFILE}-${VERSION}" "${PROFILE}"; do
            DST="ghcr.io/tuist/tuist-runner:${dest_tag}"
            for attempt in 1 2 3; do
              echo "tart push -> ${dest_tag} attempt ${attempt} at $(date -u +%H:%M:%SZ)" >&2
              if tart push tuist-runner "$DST"; then
                echo "Pushed ${DST} on attempt ${attempt}"
                break
              fi
              if [ "$attempt" = 3 ]; then
                echo "tart push failed three times for ${dest_tag}" >&2
                exit 1
              fi
              echo "tart push attempt ${attempt} failed; sleeping 60s before retry" >&2
              sleep 60
            done
          done

      - name: Cleanup
        if: always()
        run: tart delete tuist-runner 2>/dev/null || true

  release-runner-image:
    # Runs once every active profile is in GHCR with a fresh
    # `:macos-<dashes>-<semver>` tag (from runner-image-build): generates
    # release notes + CHANGELOG, renders the image list for the GitHub
    # Release body, and uploads artifacts. The `runner-image@<semver>` tag
    # (created by tag-infra-releases) is the source of truth the chart's
    # `runnersFleet.runnerImageSemver` resolves to at deploy time, so no
    # values file is rewritten here. Lightweight, runs on ubuntu; downstream
    # jobs key off this job's outputs + result.
    name: Release runner image
    needs: [check-releases, runner-image-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MISE_GITHUB_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
      images: ${{ steps.images.outputs.images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff"

      - name: Render active profile image refs
        # The active Xcode list is the single source of truth in
        # infra/runner-image/profiles.json — the same list the build
        # matrix expands. The Release body lists exactly the tags the
        # build published. `jq` is preinstalled on ubuntu-latest.
        id: images
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-releases.outputs.runner-image-next-version-number }}"
          {
            echo "images<<EOF"
            jq -r '.[]' infra/runner-image/profiles.json |
              while IFS= read -r v; do
                tag=$(echo "$v" | tr '.' '-')
                echo "- \`ghcr.io/tuist/tuist-runner:macos-${tag}-${VERSION}\`"
              done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get release notes
        id: release-notes
        # Keep this include path aligned with `runner-image` in
        # `mise/tasks/release/components.json`. The active Xcode list
        # lives under this path (profiles.json), so promoting or
        # removing a version still triggers a runner-image release.
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/runner-image/**/*" )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/runner-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/runner-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/runner-image
        run: |
          INCLUDE_PATHS=( --include-path "infra/runner-image/**/*" )

          git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.runner-image-next-version }}" -o CHANGELOG.md 2>/dev/null

      # server-deployment.yml resolves the runner image semver at deploy
      # time from this run's `runner-image@<semver>` tag (created by
      # tag-infra-releases), so the chart's runnersFleet.runnerImageSemver
      # needs no value written into the managed values files.

      - name: Upload runner-image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runner-image-artifacts
          path: |
            infra/runner-image/CHANGELOG.md
          retention-days: 1

  release-linux-runner-image:
    name: Release Linux runner image
    needs: check-releases
    if: needs.check-releases.outputs.linux-runner-image-should-release == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      release-notes: ${{ steps.release-notes.outputs.RELEASE_NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff"
          cache: "true"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Get release notes
        id: release-notes
        run: |
          LATEST_VERSION=$(git tag -l | grep -E "^linux-runner-image@[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
          INCLUDE_PATHS=( --include-path "infra/linux-runner-image/**/*" )

          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$LATEST_VERSION" ]; then
            git cliff "${INCLUDE_PATHS[@]}" --config infra/linux-runner-image/cliff.toml --repository "." 2>/dev/null -- ${LATEST_VERSION}..HEAD | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          else
            git cliff "${INCLUDE_PATHS[@]}" --config infra/linux-runner-image/cliff.toml --repository "." 2>/dev/null | sed -n '/<!-- RELEASE NOTES START -->/,$p' | tail -n +2 >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        working-directory: infra/linux-runner-image
        run: |
          INCLUDE_PATHS=( --include-path "infra/linux-runner-image/**/*" )

          git cliff "${INCLUDE_PATHS[@]}" --config cliff.toml --repository "../../" --tag "${{ needs.check-releases.outputs.linux-runner-image-next-version }}" -o CHANGELOG.md 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: infra/linux-runner-image
          file: infra/linux-runner-image/Dockerfile
          # Linux runners run on Hetzner bare-metal x86 nodes at v1.
          # arm64 is a future option and can land as an additive
          # `platforms:` entry.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/tuist/tuist-linux-runner:${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}
            ghcr.io/tuist/tuist-linux-runner:latest

      # The Linux runner image is pushed with a `:<semver>` tag above.
      # server-deployment.yml resolves that version at deploy time from
      # this run's `linux-runner-image@<semver>` tag and passes
      # `tuist-linux-runner:<semver>` to the chart via --set.

      - name: Upload linux-runner-image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-runner-image-artifacts
          path: |
            infra/linux-runner-image/CHANGELOG.md
          retention-days: 1

  publish-releases:
    # Publishes the GitHub Releases (which create the component tags via the
    # API) for the components released here — server, cache, kura, noora,
    # helm, skills, the infra images. CLI and app have their own workflows
    # (cli-release.yml, app-release.yml). Version files are stamped into the
    # build artifacts by each release job, image versions are resolved at
    # deploy time from tags, and in-source consumer pins land via Renovate
    # PRs, so this job writes nothing back to a branch.
    name: Publish releases
    needs:
      [
        check-releases,
        release-server,
        release-server-manifest,
        release-kura-prepare,
        release-kura-binaries,
        release-kura-docker,
        release-noora,
        release-helm,
        release-capi-scaleway,
        release-runners-controller,
        release-stable-egress-controller,
        release-xcresult-processor-image,
        release-runner-image,
        release-linux-runner-image,
      ]
    if: |
      always() &&
      needs.check-releases.outputs.should-release-any == 'true'
    runs-on: tuist-linux
    timeout-minutes: 30
    concurrency:
      group: publish-releases-${{ github.run_id }}
      cancel-in-progress: false
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}

      - uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "--locked git-cliff"
          cache: "false"
          github_token: ${{ env.MISE_GITHUB_TOKEN }}

      - name: Download Server artifacts
        if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: server-artifacts
          path: server

      - name: Download Kura release metadata
        if: |
          needs.check-releases.outputs.kura-should-release == 'true' &&
          needs.release-kura-prepare.result == 'success' &&
          needs.release-kura-binaries.result == 'success' &&
          needs.release-kura-docker.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-release-metadata
          path: kura

      - name: Download Kura Linux x86_64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-unknown-linux-gnu-artifacts
          path: build-kura/x86_64-unknown-linux-gnu

      - name: Download Kura Linux aarch64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-unknown-linux-gnu-artifacts
          path: build-kura/aarch64-unknown-linux-gnu

      - name: Download Kura macOS x86_64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-x86_64-apple-darwin-artifacts
          path: build-kura/x86_64-apple-darwin

      - name: Download Kura macOS aarch64 artifacts
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: kura-binary-aarch64-apple-darwin-artifacts
          path: build-kura/aarch64-apple-darwin

      - name: Merge Kura artifacts into build directory
        if: needs.check-releases.outputs.kura-should-release == 'true' && needs.release-kura-binaries.result == 'success'
        run: |
          mkdir -p build-kura

          : > build-kura/sha256.txt
          : > build-kura/sha512.txt

          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            cat "build-kura/$target/sha256.txt" >> build-kura/sha256.txt
            cat "build-kura/$target/sha512.txt" >> build-kura/sha512.txt
            mv "build-kura/$target"/kura-*.tar.gz build-kura/
          done

      - name: Download Noora artifacts
        if: needs.check-releases.outputs.noora-should-release == 'true' && needs.release-noora.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: noora-artifacts
          path: noora

      - name: Download Helm artifacts
        if: needs.check-releases.outputs.helm-should-release == 'true' && needs.release-helm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: helm-artifacts
          path: infra/helm

      - name: Download CAPI operator artifacts
        # `path:` matches the upload's LCA so CHANGELOG.md lands back at
        # `infra/cluster-api-provider-tuist/CHANGELOG.md`
        # for the later `git add` to find. upload-artifact@v4 strips the
        # LCA from each entry's archive path, so a workspace-root
        # download would put it at `<workspace>/CHANGELOG.md`.
        if: needs.check-releases.outputs.capi-scaleway-should-release == 'true' && needs.release-capi-scaleway.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: capi-scaleway-artifacts
          path: infra/cluster-api-provider-tuist

      - name: Download runners-controller artifacts
        # The upload contains only files rooted at
        # `infra/runners-controller`, so download into that directory
        # for the later `git add infra/runners-controller/CHANGELOG.md`.
        if: needs.check-releases.outputs.runners-controller-should-release == 'true' && needs.release-runners-controller.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: runners-controller-artifacts
          path: infra/runners-controller

      - name: Download stable-egress-controller artifacts
        # Carries only infra/stable-egress-controller/CHANGELOG.md; the platform
        # chart image pin is bumped by a Renovate PR (see renovate.json), not here.
        if: needs.check-releases.outputs.stable-egress-controller-should-release == 'true' && needs.release-stable-egress-controller.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: stable-egress-controller-artifacts
          path: infra/stable-egress-controller

      - name: Download xcresult-processor-image artifacts
        if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' && needs.release-xcresult-processor-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: xcresult-processor-image-artifacts
          path: infra/xcresult-processor-image

      - name: Download runner-image artifacts
        # Carries only runner-image/CHANGELOG.md now; the chart pin is gone.
        if: needs.check-releases.outputs.runner-image-should-release == 'true' && needs.release-runner-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: runner-image-artifacts
          path: infra

      - name: Download linux-runner-image artifacts
        # Carries only linux-runner-image/CHANGELOG.md now; the chart pin is gone.
        if: needs.check-releases.outputs.linux-runner-image-should-release == 'true' && needs.release-linux-runner-image.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-runner-image-artifacts
          path: infra

      # Component git tags are created by softprops/action-gh-release below
      # (via tag_name, through the GitHub API) for the published components,
      # by gradle's own job, and by tag-infra-releases for the fleet/runtime
      # images. The release path writes only tags and releases, never a
      # branch.

      - name: Create Server GitHub Release
        if: needs.check-releases.outputs.server-should-release == 'true' && needs.release-server.result == 'success' && needs.release-server-manifest.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          # Pin every component tag to the commit this run built, not main's
          # HEAD. Without this, action-gh-release defaults target_commitish to
          # the default branch, so a push landing during the run drifts the tag
          # onto a newer commit than the release notes and artifacts describe.
          target_commitish: ${{ github.sha }}
          name: Server ${{ needs.check-releases.outputs.server-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.server-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist:${{ needs.check-releases.outputs.server-next-version-number }}`

            ${{ needs.release-server.outputs.release-notes }}

      - name: Create Noora GitHub Release
        if: needs.check-releases.outputs.noora-should-release == 'true' && needs.release-noora.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Noora ${{ needs.check-releases.outputs.noora-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.noora-next-version }}
          body: |
            hex.pm: https://hex.pm/packages/noora/${{ needs.check-releases.outputs.noora-next-version-number }}

            ${{ needs.release-noora.outputs.release-notes }}

      - name: Create Helm GitHub Release
        if: needs.check-releases.outputs.helm-should-release == 'true' && needs.release-helm.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Helm Chart ${{ needs.check-releases.outputs.helm-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.helm-next-version }}
          body: |
            OCI registries:
            - `oci://ghcr.io/tuist/charts/tuist:${{ needs.check-releases.outputs.helm-next-version-number }}`
            - `oci://ghcr.io/tuist/charts/kura:${{ needs.check-releases.outputs.helm-next-version-number }}`

            ${{ needs.release-helm.outputs.release-notes }}

      - name: Create CAPI Scaleway GitHub Release
        if: needs.check-releases.outputs.capi-scaleway-should-release == 'true' && needs.release-capi-scaleway.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: CAPI Scaleway ${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.capi-scaleway-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/capi-provider-scaleway-applesilicon:${{ needs.check-releases.outputs.capi-scaleway-next-version-number }}`

            ${{ needs.release-capi-scaleway.outputs.release-notes }}

      - name: Create runners-controller GitHub Release
        if: needs.check-releases.outputs.runners-controller-should-release == 'true' && needs.release-runners-controller.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Runners Controller ${{ needs.check-releases.outputs.runners-controller-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.runners-controller-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-runners-controller:${{ needs.check-releases.outputs.runners-controller-next-version-number }}`

            ${{ needs.release-runners-controller.outputs.release-notes }}

      - name: Create stable-egress-controller GitHub Release
        if: needs.check-releases.outputs.stable-egress-controller-should-release == 'true' && needs.release-stable-egress-controller.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Stable Egress Controller ${{ needs.check-releases.outputs.stable-egress-controller-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.stable-egress-controller-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-stable-egress-controller:${{ needs.check-releases.outputs.stable-egress-controller-next-version-number }}`

            ${{ needs.release-stable-egress-controller.outputs.release-notes }}

      - name: Create xcresult-processor-image GitHub Release
        if: needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' && needs.release-xcresult-processor-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: xcresult Processor ${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}
          body: |
            Tart image: `ghcr.io/tuist/tuist-xcresult-processor:${{ needs.check-releases.outputs.xcresult-processor-image-next-version-number }}`

            ${{ needs.release-xcresult-processor-image.outputs.release-notes }}

      - name: Create runner-image GitHub Release
        if: needs.check-releases.outputs.runner-image-should-release == 'true' && needs.release-runner-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Runner Image ${{ needs.check-releases.outputs.runner-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.runner-image-next-version }}
          body: |
            Active runner image tags:
            ${{ needs.release-runner-image.outputs.images }}

            ${{ needs.release-runner-image.outputs.release-notes }}

      - name: Create linux-runner-image GitHub Release
        if: needs.check-releases.outputs.linux-runner-image-should-release == 'true' && needs.release-linux-runner-image.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Linux Runner Image ${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.linux-runner-image-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/tuist-linux-runner:${{ needs.check-releases.outputs.linux-runner-image-next-version-number }}`

            ${{ needs.release-linux-runner-image.outputs.release-notes }}

      # Nothing is committed to a branch here. Build artifacts embed their
      # version (each release job stamps it before building), release notes
      # live in the GitHub Releases above, image versions are resolved at
      # deploy time from the `<component>@<semver>` tags, and the in-source
      # consumer pins (mise.toml CLI version, the CLI gradlePluginVersion
      # constant, android's dev.tuist version, the hetzner-robot-controller
      # mgmt manifest image) land via Renovate PRs — see renovate.json.

      - name: Create Kura GitHub Release
        if: |
          needs.check-releases.outputs.kura-should-release == 'true' &&
          needs.release-kura-prepare.result == 'success' &&
          needs.release-kura-binaries.result == 'success' &&
          needs.release-kura-docker.result == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          repository: tuist/tuist
          target_commitish: ${{ github.sha }}
          name: Kura ${{ needs.check-releases.outputs.kura-next-version-number }}
          tag_name: ${{ needs.check-releases.outputs.kura-next-version }}
          body: |
            Docker image: `ghcr.io/tuist/kura:${{ needs.check-releases.outputs.kura-next-version-number }}`

            ${{ needs.release-kura-prepare.outputs.release-notes }}
          files: |
            build-kura/kura-x86_64-unknown-linux-gnu.tar.gz
            build-kura/kura-aarch64-unknown-linux-gnu.tar.gz
            build-kura/kura-x86_64-apple-darwin.tar.gz
            build-kura/kura-aarch64-apple-darwin.tar.gz
            build-kura/sha256.txt
            build-kura/sha512.txt

  # --------------------------------------------------------------------------
  # Deploy orchestration. This pipeline tags every fleet/runtime image it
  # builds and then runs the production deploy cascade in-sequence (the build →
  # canary → tests → production jobs below), which resolves those tags at
  # deploy time — one build-then-deploy pass on this workflow's serialized
  # concurrency lane, with no cross-workflow dispatch.
  #
  # tag-infra-releases pushes the image tags; the cascade's build job needs it
  # so a freshly built image ships with the server. The deploy fires when a
  # deployable path changed OR any fleet/runtime image released this run.
  # --------------------------------------------------------------------------
  tag-infra-releases:
    name: Tag fleet and runtime image releases
    needs:
      [
        check-releases,
        release-capi-scaleway,
        release-runners-controller,
        release-stable-egress-controller,
        release-xcresult-processor-image,
        release-runner-image,
        release-linux-runner-image,
        release-kura-prepare,
        release-kura-binaries,
        release-kura-docker,
      ]
    # Runs whenever the gate computed, regardless of which (if any) image
    # released; tag_release no-ops the components that didn't.
    if: always() && needs.check-releases.result == 'success'
    runs-on: tuist-linux
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
      - name: Create and push fleet/runtime component tags
        # server-deployment.yml resolves each image version from these
        # tags at deploy time, so they must exist on origin before the
        # deploy is dispatched. Idempotent: skip a tag that already exists.
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          tag_release() {
            # $1 should-release flag, $2 job result, $3 tag
            [ "$1" = "true" ] || return 0
            if [ "$2" != "success" ]; then
              echo "Skipping $3 (release job result: $2)"
              return 0
            fi
            if git ls-remote --tags --exit-code origin "refs/tags/$3" >/dev/null 2>&1; then
              echo "Tag $3 already exists on origin"
            else
              git tag "$3"
              git push origin "refs/tags/$3"
              echo "Pushed $3"
            fi
          }
          tag_release "${{ needs.check-releases.outputs.capi-scaleway-should-release }}" "${{ needs.release-capi-scaleway.result }}" "${{ needs.check-releases.outputs.capi-scaleway-next-version }}"
          tag_release "${{ needs.check-releases.outputs.runners-controller-should-release }}" "${{ needs.release-runners-controller.result }}" "${{ needs.check-releases.outputs.runners-controller-next-version }}"
          tag_release "${{ needs.check-releases.outputs.stable-egress-controller-should-release }}" "${{ needs.release-stable-egress-controller.result }}" "${{ needs.check-releases.outputs.stable-egress-controller-next-version }}"
          tag_release "${{ needs.check-releases.outputs.xcresult-processor-image-should-release }}" "${{ needs.release-xcresult-processor-image.result }}" "${{ needs.check-releases.outputs.xcresult-processor-image-next-version }}"
          tag_release "${{ needs.check-releases.outputs.runner-image-should-release }}" "${{ needs.release-runner-image.result }}" "${{ needs.check-releases.outputs.runner-image-next-version }}"
          tag_release "${{ needs.check-releases.outputs.linux-runner-image-should-release }}" "${{ needs.release-linux-runner-image.result }}" "${{ needs.check-releases.outputs.linux-runner-image-next-version }}"
          # Kura gates on the full prepare/binaries/docker chain, like the
          # old commit-and-release "Create Kura tag" step did.
          KURA_RESULT=skipped
          if [ "${{ needs.release-kura-prepare.result }}" = "success" ] && [ "${{ needs.release-kura-binaries.result }}" = "success" ] && [ "${{ needs.release-kura-docker.result }}" = "success" ]; then
            KURA_RESULT=success
          fi
          tag_release "${{ needs.check-releases.outputs.kura-should-release }}" "$KURA_RESULT" "${{ needs.check-releases.outputs.kura-next-version }}"

  # --------------------------------------------------------------------------
  # Production deploy cascade - build → canary → acceptance tests → production,
  # run in-sequence after the fleet/runtime images are built + tagged so a
  # freshly released image ships with the server in this same pass. The `build`
  # gate fires when a deployable path changed OR any fleet/runtime image
  # released this run; the rest of the cascade follows via `needs: build`.
  # "(hotfix)" in the commit subject ships straight to production via the
  # production-hotfix leg. Each leg is delegated to server-deployment.yml so
  # the helm logic stays in one place; the image is env-agnostic (built once
  # with MIX_ENV=prod) and the same sha-<SHA> tag is promoted canary → prod.
  #
  # Manual re-promotes / rollbacks of a pinned SHA go through
  # server-deployment.yml's own workflow_dispatch (deploy any environment,
  # optionally with a pre-built image_tag), so this cascade has no dispatch of
  # its own.
  # --------------------------------------------------------------------------
  build:
    name: Build deployment images
    needs: [check-releases, tag-infra-releases]
    if: >-
      always() &&
      needs.check-releases.result == 'success' &&
      needs.tag-infra-releases.result == 'success' &&
      (
        needs.check-releases.outputs.deployable-changed == 'true' ||
        needs.check-releases.outputs.runner-image-should-release == 'true' ||
        needs.check-releases.outputs.linux-runner-image-should-release == 'true' ||
        needs.check-releases.outputs.runners-controller-should-release == 'true' ||
        needs.check-releases.outputs.stable-egress-controller-should-release == 'true' ||
        needs.check-releases.outputs.capi-scaleway-should-release == 'true' ||
        needs.check-releases.outputs.xcresult-processor-image-should-release == 'true' ||
        needs.check-releases.outputs.kura-should-release == 'true'
      )
    # Bigger shape: the server image build (Elixir release compile inside
    # the dind sidecar) OOMs the 2 vCPU / 8 GB default microVM, killing the
    # runner mid-build ("lost communication"). Mirrors server.yml's
    # docker_build job.
    runs-on: ubuntu-latest
    timeout-minutes: 75
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      registry_image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: false
      - id: tag
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: echo "image_tag=sha-${DEPLOY_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - id: buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The Dockerfile's `--mount=type=cache` for /og-cache is local to the
      # BuildKit builder, which starts empty on every ephemeral runner, so
      # Chromium re-renders every OG image (~6 min, on the critical path that
      # gates `mix release`) on each deploy. cache-dance round-trips the mount
      # through actions/cache so unchanged images are skipped via their
      # .cachekey sidecars. The registry layer cache below can't do this:
      # `mode=max` exports layers, not cache-mount contents.
      - name: Restore OG image render cache
        id: og-cache
        uses: actions/cache@v4
        with:
          path: |
            og-cache-marketing
            og-cache-docs
          key: server-og-cache-${{ github.sha }}
          restore-keys: |
            server-og-cache-
      - name: Seed OG cache mounts into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "og-cache-marketing": { "target": "/og-cache/marketing", "id": "og-marketing" },
              "og-cache-docs": { "target": "/og-cache/docs", "id": "og-docs" }
            }
          skip-extraction: ${{ steps.og-cache.outputs.cache-hit }}
      - uses: docker/build-push-action@v6
        name: Build and push server image
        with:
          context: .
          file: ./server/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          # Shared registry layer cache. This workflow runs on every push to
          # main, so it keeps `buildcache:server` warm merge to merge;
          # server-deployment.yml reads and writes the same ref. `mode=max`
          # caches every stage (deps.compile, builder, og-images).
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:server
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-buildcache:server,mode=max
          build-args: |
            TUIST_HOSTED=1
            MIX_ENV=prod
            APT_CACHE_BUST=${{ github.sha }}
      - uses: docker/build-push-action@v6
        name: Build and push Kura controller image
        with:
          context: .
          file: ./infra/kura-controller/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.KURA_CONTROLLER_IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
      - uses: docker/build-push-action@v6
        name: Build and push Swift registry image
        with:
          context: .
          file: ./registry/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          build-args: |
            MIX_ENV=prod
  # --------------------------------------------------------------------------
  # Canary leg - deploys the pre-built image. Skipped on a hotfix: the
  # fast-path ships straight to production without waiting on the canary
  # cascade.
  canary:
    needs: [check-releases, build]
    # `build` runs under `if: always()` so it survives the many skipped sibling
    # release jobs. A plain-`if` dependent of an `always()`-guarded job gets
    # caught by skip-propagation and is itself skipped even when `build`
    # succeeded, so the whole deploy tail must re-assert success explicitly.
    if: ${{ always() && needs.build.result == 'success' && needs.check-releases.outputs.is-hotfix != 'true' }}
    # server-deployment.yml's build-kura-runtime job requests id-token: write;
    # a reusable workflow's permissions are validated against the caller at
    # startup, so this leg must grant the callee's full permission union.
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/server-deployment.yml
    with:
      environment: canary
      commit_sha: ${{ github.sha }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      registry_image_tag: ${{ needs.build.outputs.registry_image_tag }}
    secrets: inherit

  acceptance-tests:
    name: Acceptance Tests
    needs: canary
    if: ${{ always() && needs.canary.result == 'success' }}
    runs-on: tuist-macos
    timeout-minutes: 25
    environment: server-k8s-canary
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
          submodules: recursive
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
      - name: Authenticate with Tuist
        run: tuist auth login
      - name: Setup Tuist
        run: tuist setup
      - name: Install Tuist dependencies
        run: tuist install --force-resolved-versions
      - name: Initialize TuistCacheEE submodule
        env:
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN }}
        run: mise run cli:ee
      # The Xcode compilation-cache acceptance test loads the cas-plugin dylib
      # inside xcodebuild's compilers and routes it to the proxy over a unix
      # socket. Build both from source and hand their paths to the test via the
      # TUIST_CAS_PLUGIN_PATH / TUIST_CAS_PROXY_PATH overrides ResourceLocator
      # honours.
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
          install_args: rust
          working_directory: cas-plugin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cas-plugin-rust-${{ runner.os }}
          workspaces: |
            cas-plugin -> target
      - name: Build the cas-plugin
        working-directory: cas-plugin
        run: |
          mise run build
          echo "TUIST_CAS_PLUGIN_PATH=$(pwd)/target/release/libtuist_cas_plugin.dylib" >> "$GITHUB_ENV"
          echo "TUIST_CAS_PROXY_PATH=$(pwd)/target/release/tuist-cas-proxy" >> "$GITHUB_ENV"
      - name: Test
        env:
          TUIST_EE: 1
        run: tuist test TuistCacheEEAcceptanceTests --no-selective-testing -- -retry-tests-on-failure -test-iterations 2

  # --------------------------------------------------------------------------
  # Backward-compatibility acceptance - runs an OLD CLI against the freshly-
  # deployed canary to catch server changes that break still-supported CLIs.
  # The acceptance-tests job above always uses the CLI built from HEAD, so it
  # can never catch this; this job gates production alongside it.
  #
  # The support window's source of truth is
  # Tuist.CLIVersions.minimum_supported_version/0 in server/lib/tuist/cli_versions.ex
  # (it drives the deprecation warning and the docs Compatibility page). This job
  # would normally test that exact floor, but it builds on a macOS runner with
  # Xcode 26, and CLIs older than 4.154.2 cannot `tuist cache` under Xcode 26
  # (XCLogParser/build-log handling, fixed in CLI 4.154.2) - a client-side Xcode
  # gap, not a server-contract break. Since this gate guards the server contract,
  # it tests the oldest supported CLI that can actually build on this runner:
  # max(minimum_supported_version, the Xcode-26 build floor below). Keeping the
  # declared minimum lower (e.g. for a customer pinned to an older release) does
  # not weaken the contract check.
  # --------------------------------------------------------------------------
  backward-compatibility-acceptance:
    name: Backward-Compatibility Acceptance
    needs: canary
    if: ${{ always() && needs.canary.result == 'success' }}
    runs-on: tuist-macos-26-3
    timeout-minutes: 15
    environment: server-k8s-canary
    permissions:
      contents: read
      id-token: write
    env:
      MISE_TASK_RUN_AUTO_INSTALL: 0
      TUIST_URL: https://canary.tuist.dev
      # Pin the cache to canary's PUBLIC endpoint instead of resolving it via
      # /api/cache/endpoints. This job runs on the scw-fr-par macOS runner fleet,
      # and the server routes that fleet to the regional Kura cache - an in-cluster
      # Private Network NodePort (e.g. http://172.16.0.2:3xxxx) meant for the
      # dispatched-runner cache data plane, which a plain `tuist cache` here can't
      # reach (every download/upload times out). A real external customer resolves
      # the public endpoint; pinning makes this gate use it too. Verified on the
      # runner: with the pin the store+fetch round-trip succeeds; without it the
      # CLI picks the PN NodePort and stalls.
      TUIST_CACHE_ENDPOINT: https://cache-eu-central-canary.tuist.dev
      # Public canary test account, same as the HEAD acceptance scheme (Project.swift).
      TUIST_AUTH_EMAIL: tuistrocks@tuist.dev
      TUIST_AUTH_PASSWORD: tuistrocks
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: false
      - name: Resolve backward-compatibility CLI version
        # Test the oldest supported CLI that can build on this runner's Xcode:
        # max(minimum_supported_version, the Xcode-26 build floor). See the
        # comment block above the job for why the floor exists.
        run: |
          file=server/lib/tuist/cli_versions.ex
          min_version="$(grep -E '@minimum_supported_version' "$file" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          if [ -z "$min_version" ]; then
            echo "Could not resolve @minimum_supported_version from $file" >&2
            exit 1
          fi
          # Oldest CLI that can `tuist cache` under the runner's Xcode 26 (CLI 4.154.2).
          xcode_build_floor=4.154.2
          version="$(printf '%s\n%s\n' "$min_version" "$xcode_build_floor" | sort -V | tail -n1)"
          echo "BACKWARD_COMPAT_TUIST_VERSION=$version" >> "$GITHUB_ENV"
          echo "Minimum supported CLI: ${min_version}; testing backward-compat with: ${version}"
      - uses: jdx/mise-action@v4.0.1
        with:
          github_token: ${{ secrets.TUIST_DEPLOY_GITHUB_TOKEN || github.token }}
          install_args: "--locked bats"
      - name: Install backward-compatibility tuist
        run: mise install "tuist@${BACKWARD_COMPAT_TUIST_VERSION}"
      - name: Resolve backward-compatibility tuist binary
        id: oldtuist
        run: |
          install_dir="$(mise where "tuist@${BACKWARD_COMPAT_TUIST_VERSION}")"
          bin="$(find "$install_dir" -type f -name tuist | head -n1)"
          if [ -z "$bin" ]; then
            echo "Could not locate the tuist binary under $install_dir" >&2
            exit 1
          fi
          echo "tuist_bin=$bin" >> "$GITHUB_OUTPUT"
          "$bin" version
      - name: Run backward-compatibility acceptance test
        env:
          TUIST_EXECUTABLE: ${{ steps.oldtuist.outputs.tuist_bin }}
        run: mise run --no-deps e2e module_cache_backward_compat

  # Production leg - standard path: canary ready + tests green. Promotes the
  # same image bytes tests ran against. Skipped on a hotfix. The
  # `always() && needs.*.result == 'success'` guard is required for the
  # skip-propagation reason documented on `canary` above.
  production:
    # `canary` is listed explicitly (not just relied on transitively through the
    # acceptance jobs) so the "canary must be green before prod" invariant is
    # encoded in this job's own gate, not in the acceptance jobs' needs.
    needs: [check-releases, build, canary, acceptance-tests, backward-compatibility-acceptance]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.canary.result == 'success' &&
      needs.acceptance-tests.result == 'success' &&
      needs.backward-compatibility-acceptance.result == 'success' &&
      needs.check-releases.outputs.is-hotfix != 'true'
    # See `canary` above: grant the callee's full permission union.
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/server-deployment.yml
    with:
      environment: production
      commit_sha: ${{ github.sha }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      registry_image_tag: ${{ needs.build.outputs.registry_image_tag }}
    secrets: inherit

  # Hotfix fast-path: "(hotfix)" in the commit subject ships production without
  # waiting for canary + acceptance tests. Kept independent of the cascade so a
  # flaky acceptance test can't block an urgent fix; canary is skipped above on
  # hotfix so the fast-path is the only deploy in flight. The
  # `always() && needs.build.result == 'success'` guard mirrors `canary`
  # (see its comment) so this leg is not skip-propagated away.
  production-hotfix:
    needs: [check-releases, build]
    if: ${{ always() && needs.build.result == 'success' && needs.check-releases.outputs.is-hotfix == 'true' }}
    # See `canary` above: grant the callee's full permission union.
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/server-deployment.yml
    with:
      environment: production
      commit_sha: ${{ github.sha }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      registry_image_tag: ${{ needs.build.outputs.registry_image_tag }}
    secrets: inherit
