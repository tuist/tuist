name: Runners Staging Smoke Test

# Manual smoke test for the staging Tuist Runners pool. Targets
# `runs-on: tuist-staging-macos` so the staging tier's warm Pods
# (configured in infra/helm/tuist/values-managed-staging.yaml as
# `runnersFleet.replicas: 2`) pick up this job.
#
# Use this to validate, end-to-end:
#   1. workflow_job: queued webhook reaches the staging server.
#   2. Tuist.Runners.Dispatch finds an idle Pod and mints a JIT
#      config from GitHub.
#   3. The runner VM polls /api/internal/runners/dispatch on
#      staging.tuist.dev, claims the JIT, registers as a runner.
#   4. GH dispatches this job to the registered runner.
#   5. The job runs on the runner VM.
#   6. After completion the Pod terminates and the reconciler's
#      next 60 s tick creates a replacement.
#   7. When the account runs a private runner-cache Kura node, the
#      VM reaches it over the Scaleway PN (TUIST_CACHE_ENDPOINT),
#      proving the macOS runner-cache data plane end-to-end.
#
# Triggered manually only — we don't want every push to staging
# burning runner cycles.

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Cache benchmark to run on the host-Kura runner after the smoke (empty = smoke only). xcode-cache | module-cache | combined | no-cache"
        required: false
        default: ""
      runs:
        description: "hyperfine timed runs for the benchmark"
        required: false
        default: "3"
      tuist_ref:
        description: "Build the tuist CLI from this git ref instead of the pinned canary (for the CAS transfer/codec instrumentation on branch builds). Empty = use canary."
        required: false
        default: ""
      env_token:
        description: "xcode-cache only: extract the logged-in token and re-inject it as TUIST_TOKEN so environmentToken() short-circuits the per-op keychain auth read. Confirms the CAS per-op cost is client-side auth, not the wire."
        required: false
        default: "false"
      canary_tag:
        description: "Canary CLI + fixture ref to benchmark (e.g. 4.202.0-canary.27). Empty = the pinned default."
        required: false
        default: ""
  # Also fires when this workflow file itself changes on the
  # feat/runners-shape-2 branch. The smoke isn't a default CI
  # hook (would burn a runner slot on every PR), but during the
  # staging bring-up we want edits to the smoke definition to
  # re-validate against the live fleet without manual dispatch.
  # The `paths` filter scopes the auto-fire to changes to this
  # file alone; every other push to the branch needs an explicit
  # `gh workflow run runners-staging-smoke.yml`.
  push:
    branches:
      - feat/runners-shape-2
    paths:
      - .github/workflows/runners-staging-smoke.yml

# The smoke curls public github.com + the runner-cache /up; the
# optional bench job clones public repos, so it needs contents:read.
permissions:
  contents: read

jobs:
  smoke:
    # Single-label form. `tuist-staging-macos` is the pool's unique
    # dispatch label and is sufficient to pick a runner — no need
    # to also list `self-hosted` (which is advertised on the
    # runner but isn't an authorization boundary).
    runs-on: tuist-staging-macos
    timeout-minutes: 10
    steps:
      - name: Show environment
        run: |
          echo "Hostname:    $(hostname)"
          echo "macOS:       $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"
          echo "Xcode path:  $(xcode-select -p)"
          # Confirm we're inside a Tart VM. The VM's hostname is
          # set by Tart and the host CPU model leaks via sysctl.
          sysctl -n machdep.cpu.brand_string

      - name: Public reachability check
        run: |
          set -euo pipefail
          # Public GH should be reachable (the runner already
          # registered, so this had better work). This is the
          # only network assertion the smoke covers; the
          # negative-isolation test that used to live here was
          # removed because the previous shape leaned on
          # KUBERNETES_SERVICE_HOST being injected (it isn't —
          # Tart VMs don't get the K8s env contract that Pods
          # do) so the assertion passed vacuously via DNS
          # failure. Tart VM egress isolation is not enforced
          # by the runner-namespace NetworkPolicy (vmnet
          # bypasses CNI) and there's no in-cluster endpoint we
          # can dial from inside the VM as a proxy for "is the
          # cluster reachable" — the perimeter gate lives on the
          # Mac mini's security group at the IaaS layer, not
          # somewhere we can curl from the workflow.
          curl -fsSL -o /dev/null -w "github.com → HTTP %{http_code}\n" https://github.com

      - name: Kura runner-cache reachable over the PN
        run: |
          set -uo pipefail
          endpoint="${TUIST_CACHE_ENDPOINT:-}"
          if [ -z "${endpoint}" ]; then
            echo "TUIST_CACHE_ENDPOINT unset — dispatch handed this fleet no private runner-cache URL; skipping the PN cache probe."
            exit 0
          fi
          echo "TUIST_CACHE_ENDPOINT=${endpoint}"
          # macOS runners reach the cache over the Scaleway PN in
          # node-port form (http://<node PN IP>:<NodePort>). A 200 on
          # /up proves the VM routes onto the PN and the cache serves.
          code=$(curl -sS -m 10 -o /tmp/up -w '%{http_code}' "${endpoint%/}/up")
          echo "GET ${endpoint%/}/up → HTTP ${code}"
          cat /tmp/up 2>/dev/null || true; echo
          [ "${code}" = "200" ] || { echo "::error::cache /up over the PN returned ${code}"; exit 1; }
          echo "Runner reached the Kura runner-cache over the PN."

      - name: vmnet bulk throughput probe (host->VM over the bridge)
        run: |
          set -uo pipefail
          HOST=192.168.64.1
          # Downloads a large payload from a zero-copy sendfile server on the host
          # (host-side loopback baseline was ~80 Gbps, so the server is not the
          # bottleneck). Isolates the raw vmnet bridge capacity from kura serving.
          gbps() { python3 -c "import sys; s=float(sys.argv[1]); print(f'{s/1e6:.0f} MB/s = {s*8/1e9:.2f} Gbps')" "$1" 2>/dev/null || echo "$1 B/s"; }
          echo "== single-stream download over vmnet =="
          for i in 1 2 3; do
            S=$(curl -s -o /dev/null -w '%{speed_download}' "http://$HOST:5201/" 2>/dev/null || echo 0)
            echo "  run $i: $(gbps "$S")"
          done
          echo "== 4 parallel streams (aggregate: tells per-flow vs aggregate cap) =="
          tmp=$(mktemp -d)
          for n in 1 2 3 4; do ( curl -s -o /dev/null -w '%{speed_download}' "http://$HOST:5201/" > "$tmp/$n" 2>/dev/null ) & done
          wait
          AGG=$(cat "$tmp"/* | paste -sd+ - | bc 2>/dev/null || python3 -c "import glob;print(sum(float(open(f).read() or 0) for f in glob.glob('$tmp/*')))")
          echo "  aggregate of 4: $(gbps "$AGG")"
          rm -rf "$tmp"

  # Optional cached-build benchmark on the host-Kura runner. Runs the
  # runners-benchmark scenarios against the account the staging host Kura
  # serves (tuist/tuist → account 2), so the CAS/module cache routes to the
  # host Kura over the host<->VM bridge. Gated on the `strategy` input so a
  # plain smoke dispatch stays cheap.
  bench:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.strategy != '' }}
    runs-on: tuist-staging-macos
    # Higher ceiling: a from-source release build of the tuist CLI (tuist_ref)
    # can take ~30-40 min before the benchmark itself runs.
    timeout-minutes: 150
    # id-token for the secretless OIDC `tuist auth login` against staging.
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUNNER_LABEL: staging-hostkura
      BENCH_PROJECT: tuist
      TUIST_CANARY_TAG: ${{ inputs.canary_tag != '' && inputs.canary_tag || '4.202.0-canary.14' }}
      TUIST_FIXTURE_REF: ${{ inputs.canary_tag != '' && inputs.canary_tag || '4.202.0-canary.14' }}
      HYPERFINE_RUNS: ${{ inputs.runs }}
      # When set, build the tuist CLI from this ref (carries the CAS transfer/codec
      # instrumentation) instead of installing the pinned canary.
      TUIST_SRC_REF: ${{ inputs.tuist_ref }}
      # Auth control-plane against staging; the CAS data-plane stays on the
      # dispatch-set TUIST_CACHE_ENDPOINT (the host Kura).
      TUIST_URL: https://staging.tuist.dev
    steps:
      - name: Diagnostics — cache endpoint the dispatch handed us
        run: |
          echo "hostname:            $(hostname)"
          echo "TUIST_CACHE_ENDPOINT=${TUIST_CACHE_ENDPOINT:-<unset>}"
          if [ -n "${TUIST_CACHE_ENDPOINT:-}" ]; then
            code=$(curl -sS -m 5 -o /dev/null -w '%{http_code}' "${TUIST_CACHE_ENDPOINT%/}/up" || echo 000)
            echo "GET ${TUIST_CACHE_ENDPOINT%/}/up -> HTTP ${code}"
          fi

      - name: Install Tuist (canary or built from source) + hyperfine via mise
        run: |
          set -euo pipefail
          mise use --global "hyperfine@1.19.0"
          # We don't use jdx/mise-action, so wire the shims onto PATH for the
          # subsequent build step (GITHUB_PATH affects later steps).
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
          if [ -n "${TUIST_SRC_REF:-}" ]; then
            echo "== building tuist from source ref=$TUIST_SRC_REF (release) for CAS transfer/codec instrumentation =="
            git clone --depth 1 --branch "$TUIST_SRC_REF" https://github.com/tuist/tuist.git tuist-src
            ( cd tuist-src && swift build --product tuist -c release --replace-scm-with-registry )
            BIN="$PWD/tuist-src/.build/release"
            # Prepend the built binary so `tuist` resolves to it ahead of any mise shim.
            echo "$BIN" >> "$GITHUB_PATH"
            "$BIN/tuist" version
          else
            mise use --global "tuist@${TUIST_CANARY_TAG}"
            mise exec -- tuist version
          fi
          mise exec -- hyperfine --version

      - name: Check out the tuist modular fixture (public; fullHandle stays tuist/tuist)
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$TUIST_FIXTURE_REF" \
            https://github.com/tuist/tuist.git fixture
          grep fullHandle fixture/Tuist.swift || true
          rm -f fixture/mise.toml fixture/.mise.toml fixture/.tool-versions

      - name: Authenticate Tuist against staging (GitHub OIDC)
        working-directory: fixture
        run: |
          set -euo pipefail
          echo "TUIST_URL=${TUIST_URL}"
          tuist auth login
          tuist auth whoami || true

      - name: Skip Xcode macro/package fingerprint validation
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Run cached build + harvest CAS analytics
        working-directory: fixture
        env:
          STRATEGY: ${{ inputs.strategy }}
        run: |
          set -uo pipefail
          SIGN='CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO'
          BUILD_BASE='xcodebuild -workspace Tuist.xcworkspace -scheme tuist -destination "generic/platform=macOS" build '"$SIGN"' ARCHS=arm64'
          BUILD_NO_CACHE="$BUILD_BASE"' COMPILATION_CACHE_ENABLE_CACHING=NO'
          CLEAN_DD='rm -rf "$HOME/Library/Developer/Xcode/DerivedData"'
          rc=0
          echo "== strategy=$STRATEGY runs=$HYPERFINE_RUNS =="
          case "$STRATEGY" in
            xcode-cache)
              # Confirmation lever: re-inject the logged-in token as TUIST_TOKEN so
              # the CAS daemon's environmentToken() short-circuits the per-op keychain
              # read (the suspected ~340ms/op client-side cost). Must be exported
              # BEFORE `tuist setup cache` so the spawned daemon inherits it.
              if [ "${ENV_TOKEN:-false}" = "true" ]; then
                TOK=$(security find-internet-password -a "${TUIST_URL}_access_token" -w 2>/dev/null || true)
                if [ -z "${TOK:-}" ]; then
                  TOK=$(python3 -c 'import json,os;p=os.path.expanduser("~/.config/tuist/credentials/staging.tuist.dev.json");print(json.load(open(p))["accessToken"]) if os.path.exists(p) else ""' 2>/dev/null || true)
                fi
                if [ -n "${TOK:-}" ]; then
                  export TUIST_TOKEN="$TOK"
                  echo "TUIST_TOKEN injected (len=${#TOK}) -> environmentToken() short-circuits per-op keychain auth"
                else
                  echo "::warning::env_token requested but token extraction FAILED (keychain ACL?); running WITHOUT it"
                fi
              fi
              # Xcode CAS warmed on the host Kura; every clean rebuild resolves
              # its compilations as remote CAS hits against the host Kura.
              tuist setup cache
              tuist install
              tuist generate --no-binary-cache
              # The CAS daemon socket name derives from the connected project, so
              # discover it rather than hard-code it (tuist/tuist != tuist/mastodon).
              CAS_SOCK=""
              for _ in $(seq 1 20); do
                CAS_SOCK=$(ls -t "$HOME/.local/state/tuist/"*.sock 2>/dev/null | head -1)
                [ -n "$CAS_SOCK" ] && break
                sleep 1
              done
              echo "CAS daemon socket: ${CAS_SOCK:-<none found>}"
              [ -n "$CAS_SOCK" ] || { echo "::error::no CAS daemon socket after tuist setup cache"; exit 1; }
              CAS="COMPILATION_CACHE_ENABLE_CACHING=YES COMPILATION_CACHE_ENABLE_PLUGIN=YES COMPILATION_CACHE_REMOTE_SERVICE_PATH=${CAS_SOCK}"
              BUILD_CAS="$BUILD_BASE $CAS"
              # Direct evidence of where the CAS daemon spends per-op time: sample it
              # mid-build. If stacks are dominated by SecItem/keychain, the ~340ms/op
              # is client-side auth; if by network, it's the wire.
              DPID=$(pgrep -f "cache-start" 2>/dev/null | head -1); [ -z "${DPID:-}" ] && DPID=$(pgrep -x tuist 2>/dev/null | head -1)
              echo "daemon pid for sampling: ${DPID:-none}"
              eval "$CLEAN_DD"
              if [ -n "${DPID:-}" ]; then ( sleep 35; sample "$DPID" 12 -file /tmp/daemon.sample >/dev/null 2>&1 ) & fi
              eval "$BUILD_CAS" >/dev/null 2>&1 || true
              wait 2>/dev/null || true
              if [ -f /tmp/daemon.sample ]; then
                echo "=== daemon sample (hot path) ==="
                echo "keychain/Security frames: $(grep -icE 'SecItem|securityd|keychain|CopyMatching' /tmp/daemon.sample)"
                echo "network/URLSession frames: $(grep -icE 'URLSession|CFNetwork|nw_|boringssl|__recvfrom|socket' /tmp/daemon.sample)"
                echo "-- top auth/keychain symbols --"; grep -iE 'SecItem|keychain|authenticationToken|ServerCredentials|CachedValue|Authentication' /tmp/daemon.sample | sed 's/^ *[0-9]* *//' | sort | uniq -c | sort -rn | head -8
              fi
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json --show-output \
                --setup "$BUILD_CAS" --prepare "$CLEAN_DD" "$BUILD_CAS" || rc=$? ;;
            module-cache)
              # Binary (module) cache: each run clears local binaries, re-pulls
              # them via generate, then builds the app target.
              tuist install
              tuist cache
              # BREAKDOWN of the module-cache wall-clock, decomposed into:
              #   pull   = binary download from the cache (LOCAL disk on host-Kura,
              #            network on PN/WAN — where the local-serving win lives)
              #   gen    = graph resolve + Xcode project generation (CPU, cache-cold
              #            binaries already present so no pull)
              #   build  = compile the top-level tuist target + link (CPU)
              now() { python3 -c 'import time;print(time.time())'; }
              eval "$CLEAN_DD"; tuist clean binaries >/dev/null 2>&1 || true
              g0=$(now); tuist generate tuist; g1=$(now)          # resolve+PULL+gen
              g2=$(now); tuist generate tuist; g3=$(now)          # resolve+gen (binaries cached, no pull)
              du_cache=$(du -sm "$HOME/.cache/tuist" 2>/dev/null | awk '{print $1}')
              b0=$(now); eval "$BUILD_NO_CACHE"; b1=$(now)        # compile
              python3 -c "g0,g1,g2,g3,b0,b1,du=$g0,$g1,$g2,$g3,$b0,$b1,${du_cache:-0}; gen1=g1-g0; gen2=g3-g2; pull=max(0.0,gen1-gen2); build=b1-b0; print('== module-cache BREAKDOWN =='); print(f'  generate#1 (resolve+pull+gen)={gen1:.1f}s   generate#2 (resolve+gen, cached)={gen2:.1f}s'); print(f'  -> PULL(download binaries)~{pull:.1f}s   GEN(resolve+project)~{gen2:.1f}s   BUILD(compile)={build:.1f}s'); print(f'  one-shot generate#1+build={gen1+build:.1f}s   binary-cache footprint~{du:.0f}MB')"
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json --show-output \
                --prepare "$CLEAN_DD"' && tuist clean binaries' \
                'tuist generate tuist && '"$BUILD_NO_CACHE" || rc=$? ;;
            no-cache)
              tuist install
              tuist generate --no-binary-cache
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json --show-output \
                --prepare "$CLEAN_DD" "$BUILD_NO_CACHE" || rc=$? ;;
            *) echo "unsupported strategy: $STRATEGY"; exit 2 ;;
          esac
          echo "== hyperfine result (exit=$rc) =="
          python3 - result.json <<'PY' 2>/dev/null || echo "  (no result.json)"
          import sys, json
          with open(sys.argv[1]) as f:
              for r in json.load(f)["results"]:
                  print(f"  mean={r['mean']:.1f}s  min={r['min']:.1f}s  max={r['max']:.1f}s")
          PY
          echo "== CAS daemon analytics (ground truth for cache hits) =="
          CAS_DB="$HOME/.local/state/tuist/cas_analytics.db"
          if [ -f "$CAS_DB" ]; then
            sqlite3 "$CAS_DB" "PRAGMA wal_checkpoint(TRUNCATE);" >/dev/null 2>&1 || true
            # Split the per-op duration into transfer (wire) vs codec (de/compress) vs
            # remainder (daemon per-request processing: gRPC hop, marshalling, scheduling).
            # transfer_duration/codec_duration exist only on branch builds carrying the
            # instrumentation; fall back to the plain query on the canary.
            sqlite3 -header -column "$CAS_DB" "SELECT count(*) AS ops, round(avg(duration),1) AS total_ms, round(avg(transfer_duration),1) AS transfer_ms, round(avg(codec_duration),1) AS codec_ms, round(avg(duration-transfer_duration-codec_duration),1) AS remainder_ms, round(avg(size)) AS avg_bytes, round(avg(compressed_size)) AS avg_comp FROM cas_outputs;" 2>/dev/null \
              || sqlite3 "$CAS_DB" "SELECT count(*) AS ops, round(avg(duration),1) AS avg_ms, round(sum(duration)/1000.0,1) AS total_s, round(avg(size)) AS avg_bytes FROM cas_outputs;" 2>&1 || true
          else
            echo "  no cas_analytics.db — the CAS daemon never talked to a remote (endpoint/auth issue)"
          fi
          exit "$rc"
