name: Runners Staging Smoke Test

# Manual smoke test for the staging Tuist Runners pool. Targets
# `runs-on: tuist-staging-macos` so the staging tier's warm Pods
# (configured in infra/helm/tuist/values-managed-staging.yaml as
# `runnersFleet.replicas: 2`) pick up this job.
#
# Use this to validate, end-to-end:
#   1. workflow_job: queued webhook reaches the staging server.
#   2. Tuist.Runners.Dispatch finds an idle Pod and mints a JIT
#      config from GitHub.
#   3. The runner VM polls /api/internal/runners/dispatch on
#      staging.tuist.dev, claims the JIT, registers as a runner.
#   4. GH dispatches this job to the registered runner.
#   5. The job runs on the runner VM.
#   6. After completion the Pod terminates and the reconciler's
#      next 60 s tick creates a replacement.
#   7. When the account runs a private runner-cache Kura node, the
#      VM reaches it over the Scaleway PN (TUIST_CACHE_ENDPOINT),
#      proving the macOS runner-cache data plane end-to-end.
#
# Triggered manually only — we don't want every push to staging
# burning runner cycles.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "validate (marker persistence) or benchmark (tuist generate timing)"
        required: false
        default: "validate"
        type: choice
        options:
          - validate
          - benchmark
          - populate
          - warm-bench
      run_label:
        description: "Short label for this run's cache-volume marker (e.g. a, b)"
        required: false
        default: "a"
  # Also fires when this workflow file itself changes on the
  # feat/runners-shape-2 branch. The smoke isn't a default CI
  # hook (would burn a runner slot on every PR), but during the
  # staging bring-up we want edits to the smoke definition to
  # re-validate against the live fleet without manual dispatch.
  # The `paths` filter scopes the auto-fire to changes to this
  # file alone; every other push to the branch needs an explicit
  # `gh workflow run runners-staging-smoke.yml`.
  push:
    branches:
      - feat/runners-shape-2
    paths:
      - .github/workflows/runners-staging-smoke.yml

# Smoke job runs shell inside the Tart VM and curls public
# github.com plus the account's private runner-cache over the PN —
# it never reads or mutates repo state, so the GITHUB_TOKEN needs
# zero scopes.
permissions: {}

jobs:
  smoke:
    # Single-label form. `tuist-staging-macos` is the pool's unique
    # dispatch label and is sufficient to pick a runner — no need
    # to also list `self-hosted` (which is advertised on the
    # runner but isn't an authorization boundary).
    runs-on: tuist-staging-macos
    timeout-minutes: 150
    steps:
      - name: Show environment
        run: |
          echo "Hostname:    $(hostname)"
          echo "macOS:       $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"
          echo "Xcode path:  $(xcode-select -p)"
          # Confirm we're inside a Tart VM. The VM's hostname is
          # set by Tart and the host CPU model leaks via sysctl.
          sysctl -n machdep.cpu.brand_string

      - name: Cache volume — host/guest diagnostics (spec #76)
        run: |
          set -uo pipefail
          echo "=== dispatch-poll.sh mount-gate log (guest side) ==="
          sudo cat /var/log/tuist-runner/poll.log 2>/dev/null | grep -iE "cache|volume|mount|xdg|dirty|budget" || echo "(no cache lines in poll.log)"
          echo "=== volumes.json staged by host? (env share) ==="
          cat "/Volumes/My Shared Files/env/volumes.json" 2>/dev/null || echo "(no volumes.json — host did not stage a cache volume this boot)"
          echo "=== attached block devices (diskutil list) ==="
          diskutil list 2>/dev/null | head -50 || true
          echo "=== APFS volumes by label ==="
          diskutil list 2>/dev/null | grep -i "tuist" || echo "(no tuist-* APFS volume visible in the guest)"

      - name: Cache volume — state + marker persistence (spec #76)
        run: |
          set -uo pipefail
          echo "=== per-account cache volume (spec #76) — guest-side state ==="
          echo "TUIST_XDG_CACHE_HOME  = ${TUIST_XDG_CACHE_HOME:-<unset>}"
          echo "TUIST_CACHE_MAX_BYTES = ${TUIST_CACHE_MAX_BYTES:-<unset>}"
          if [ -n "${TUIST_CACHE_SIGNING_GRANT:-}" ]; then
            echo "TUIST_CACHE_SIGNING_GRANT = present (len ${#TUIST_CACHE_SIGNING_GRANT})"
          else
            echo "TUIST_CACHE_SIGNING_GRANT = absent (grant off / MAC fallback)"
          fi
          echo "=== mounts ==="; /sbin/mount | grep -i "tuist-cache" || echo "(no tuist-cache mount)"
          ls -la /Volumes/ 2>/dev/null || true

          root="${TUIST_XDG_CACHE_HOME:-}"
          if [ -z "${root}" ]; then
            echo "::warning::VOLUME NOT MOUNTED — job is on the cold path (no cache volume this boot)."
            exit 0
          fi
          echo "=== df of the cache volume ==="; df -h "${root}" || true

          bindir="${root}/tuist/Binaries"
          echo "=== markers present BEFORE this run (persisted from a prior run) ==="
          if ls -1 "${bindir}" 2>/dev/null | grep -q "validation-marker"; then
            ls -1 "${bindir}" | grep "validation-marker" | sed 's/^/  found: /'
            echo "RESULT: a prior run's marker PERSISTED -> attach + mount + dirty-gate + promote + clone-from-master WORKS."
          else
            echo "  (none — expected on the first run / cold volume)"
          fi

          echo "=== writing this run's marker (adds a Binaries entry -> dirty=1 -> promote) ==="
          mkdir -p "${bindir}"
          marker="${bindir}/validation-marker-${{ inputs.run_label }}-${{ github.run_id }}"
          printf 'run %s at %s\n' "${{ github.run_id }}" "$(date -u +%FT%TZ)" > "${marker}"
          echo "  wrote ${marker}"
          du -sh "${root}/tuist/"* 2>/dev/null | sed 's/^/  /' || true

      - name: Benchmark — tuist generate tuist (spec #76)
        if: ${{ inputs.mode == 'benchmark' }}
        shell: bash --noprofile --norc {0}
        env:
          # Point generate at staging + auth with a tuist/tuist staging project
          # token so it actually pulls cached binaries (the binary-pull path the
          # volume warms). Without this, generate skips the remote cache and the
          # metadata phase never runs — see the earlier binary-less runs.
          TUIST_URL: https://staging.tuist.dev
          TUIST_TOKEN: ${{ secrets.TUIST_STAGING_CACHE_TOKEN }}
        run: |
          # No errexit: this step captures rc explicitly and tolerates
          # missing dirs (cold volume) in its count() helper. GitHub's
          # default `bash -eo pipefail` would abort on the first `ls` of a
          # not-yet-existing Manifests/ dir.
          set +e -o pipefail
          root="${TUIST_XDG_CACHE_HOME:-$HOME/.cache}"
          man="${root}/tuist/Manifests"; bin="${root}/tuist/Binaries"
          count() { ls -1 "$1" 2>/dev/null | wc -l | tr -d ' '; }
          bytes() { du -sk "$1" 2>/dev/null | awk '{print $1}'; }

          # Self-label the arm from the volume's pre-existing warmth: a warm
          # volume already carries compiled manifests from a prior job.
          man_before=$(count "$man"); bin_before=$(count "$bin")
          arm="cold"; [ "${man_before:-0}" -gt 0 ] && arm="warm"
          echo "BENCH_ARM=${arm}  (manifests_before=${man_before} binaries_before=${bin_before})"
          echo "BENCH_XDG=${TUIST_XDG_CACHE_HOME:-<unset,ephemeral-disk>}"
          echo "BENCH_GRANT=$([ -n "${TUIST_CACHE_SIGNING_GRANT:-}" ] && echo present || echo absent)"

          if ! command -v mise >/dev/null 2>&1; then
            curl -fsSL https://mise.run | sh; export PATH="${HOME}/.local/bin:${PATH}"
          fi
          rm -rf tuist-bench
          git clone --quiet --filter=blob:none https://github.com/tuist/tuist tuist-bench
          cd tuist-bench
          mise install >/dev/null 2>&1 || mise install
          echo "tuist $(mise exec -- tuist version 2>/dev/null || echo '?')"
          echo "=== tuist install (SPM resolution, untimed setup) ==="
          mise exec -- tuist install >/dev/null 2>&1 || mise exec -- tuist install || true

          gen() { # $1=label
            local s e
            s=$(python3 -c 'import time;print(int(time.time()*1000))')
            mise exec -- tuist generate tuist ProjectDescription --no-open >/tmp/gen_$1.log 2>&1
            local rc=$?
            e=$(python3 -c 'import time;print(int(time.time()*1000))')
            echo "BENCH_GEN_$1_MS=$((e - s)) rc=${rc}"
            grep -iE "downloaded|cache|xcframework" /tmp/gen_$1.log | tail -2 | sed "s/^/  gen_$1: /" || true
          }
          echo "=== TIMED gen1 (first generate this boot) ==="; gen gen1
          echo "=== TIMED gen2 (same boot, warm page cache) ==="; gen gen2

          man_after=$(count "$man"); bin_after=$(count "$bin")
          echo "BENCH_MANIFESTS: before=${man_before} after=${man_after}"
          echo "BENCH_BINARIES: before=${bin_before} after=${bin_after} bytes_after=$(bytes "$bin")k"
          [ -n "${TUIST_XDG_CACHE_HOME:-}" ] && du -sh "${root}/tuist/"* 2>/dev/null | sed 's/^/  /' || true

      - name: Warm-bench — build EE CLI + generate (spec #76)
        if: ${{ inputs.mode == 'warm-bench' }}
        shell: bash --noprofile --norc {0}
        env:
          TUIST_URL: https://staging.tuist.dev
          TUIST_TOKEN: ${{ secrets.TUIST_STAGING_CACHE_TOKEN }}
          TUIST_GITHUB_TOKEN: ${{ secrets.TUIST_RELEASE_GITHUB_TOKEN }}
        run: |
          set +e -o pipefail
          root="${TUIST_XDG_CACHE_HOME:-$HOME/.cache}"
          man="${root}/tuist/Manifests"; bin="${root}/tuist/Binaries"
          count(){ ls -1 "$1" 2>/dev/null | wc -l | tr -d ' '; }
          arm="cold"; [ "$(count "$man")" -gt 0 ] && arm="warm"
          echo "WBENCH_ARM=${arm} manifests_before=$(count "$man") binaries_before=$(count "$bin")"
          echo "WBENCH_GRANT=$([ -n "${TUIST_CACHE_SIGNING_GRANT:-}" ] && echo present || echo absent)"
          echo "WBENCH_XDG=${TUIST_XDG_CACHE_HOME:-<unset>}"
          if ! command -v mise >/dev/null 2>&1; then curl -fsSL https://mise.run|sh; export PATH="$HOME/.local/bin:$PATH"; fi
          # Build the EE tuist from THIS branch (gitlink points at my EE commit).
          rm -rf tuist-src; git clone --quiet https://github.com/tuist/tuist tuist-src; cd tuist-src
          git checkout -q ${{ github.sha }} 2>/dev/null || true
          mise install >/dev/null 2>&1
          echo "=== init private EE submodule (my branch @ gitlink) ==="
          mise run --no-deps --skip-tools cli:ee 2>&1 | tail -2
          (cd cli/TuistCacheEE && echo "EE checked out at $(git rev-parse --short HEAD)")
          echo "=== build EE tuist (arm64, unsigned) ==="
          bs=$(python3 -c 'import time;print(int(time.time()))')
          TUIST_EE=1 mise exec -- tuist install >/tmp/inst.log 2>&1
          TUIST_EE=1 mise exec -- tuist generate tuist --no-open >/tmp/genws.log 2>&1 || { echo "GENWS rc=$?"; tail -15 /tmp/genws.log; }
          xcrun xcodebuild build -workspace Tuist.xcworkspace -scheme tuist -configuration Release \
            -derivedDataPath /tmp/eedd CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ARCHS=arm64 ONLY_ACTIVE_ARCH=YES > /tmp/xcb.log 2>&1
          echo "BUILD rc=$? seconds=$(( $(python3 -c 'import time;print(int(time.time()))') - bs ))"
          EE=$(find /tmp/eedd/Build/Products -name tuist -type f -perm +111 2>/dev/null | head -1)
          if [ -z "$EE" ] || [ ! -x "$EE" ]; then echo "NO EE BINARY — build failed"; tail -40 /tmp/xcb.log; exit 0; fi
          echo "EE binary: $EE"; file "$EE" | cut -c1-80
          "$EE" version 2>&1 | head -1 | sed 's/^/EE tuist version: /'
          strings "$EE" 2>/dev/null | grep -qiE "tuist-runner-cache|CacheSigningGrant" && echo "EE grant code: present in binary" || echo "EE grant code: NOT found"
          echo "=== timed generate with the EE tuist ==="
          g(){ s=$(python3 -c 'import time;print(int(time.time()*1000))'); "$EE" generate tuist ProjectDescription --no-open >/tmp/g_$1.log 2>&1; r=$?; e=$(python3 -c 'import time;print(int(time.time()*1000))'); echo "WBENCH_GEN_$1_MS=$((e-s)) rc=$r"; grep -iE "cache binaries|authentication|requires using|downloaded" /tmp/g_$1.log | tail -1 | sed "s/^/  $1: /"; }
          g gen1; g gen2
          echo "WBENCH_BINARIES after=$(count "$bin")"

      - name: Populate — tuist cache warm (spec #76)
        if: ${{ inputs.mode == 'populate' }}
        shell: bash --noprofile --norc {0}
        env:
          TUIST_URL: https://staging.tuist.dev
          TUIST_TOKEN: ${{ secrets.TUIST_STAGING_CACHE_TOKEN }}
        run: |
          set +e -o pipefail
          if ! command -v mise >/dev/null 2>&1; then curl -fsSL https://mise.run | sh; export PATH="${HOME}/.local/bin:${PATH}"; fi
          rm -rf tuist-bench; git clone --quiet --filter=blob:none https://github.com/tuist/tuist tuist-bench; cd tuist-bench
          mise install >/dev/null 2>&1 || mise install
          echo "tuist $(mise exec -- tuist version 2>/dev/null)"
          mise exec -- tuist install >/dev/null 2>&1 || mise exec -- tuist install || true
          echo "=== tuist cache warm — build + upload the binary cache to staging ==="
          s=$(python3 -c 'import time;print(int(time.time()))')
          mise exec -- tuist cache warm > /tmp/warm.log 2>&1; rc=$?
          tail -60 /tmp/warm.log
          echo "POPULATE rc=${rc} seconds=$(( $(python3 -c 'import time;print(int(time.time()))') - s ))"
          echo "=== cached artifacts now present in staging cache (config) ==="
          mise exec -- tuist cache config 2>&1 | head -8 || true

      - name: Public reachability check
        run: |
          set -euo pipefail
          # Public GH should be reachable (the runner already
          # registered, so this had better work). This is the
          # only network assertion the smoke covers; the
          # negative-isolation test that used to live here was
          # removed because the previous shape leaned on
          # KUBERNETES_SERVICE_HOST being injected (it isn't —
          # Tart VMs don't get the K8s env contract that Pods
          # do) so the assertion passed vacuously via DNS
          # failure. Tart VM egress isolation is not enforced
          # by the runner-namespace NetworkPolicy (vmnet
          # bypasses CNI) and there's no in-cluster endpoint we
          # can dial from inside the VM as a proxy for "is the
          # cluster reachable" — the perimeter gate lives on the
          # Mac mini's security group at the IaaS layer, not
          # somewhere we can curl from the workflow.
          curl -fsSL -o /dev/null -w "github.com → HTTP %{http_code}\n" https://github.com

      - name: Kura runner-cache reachable over the PN
        run: |
          set -uo pipefail
          endpoint="${TUIST_CACHE_ENDPOINT:-}"
          if [ -z "${endpoint}" ]; then
            echo "TUIST_CACHE_ENDPOINT unset — dispatch handed this fleet no private runner-cache URL; skipping the PN cache probe."
            exit 0
          fi
          echo "TUIST_CACHE_ENDPOINT=${endpoint}"
          # macOS runners reach the cache over the Scaleway PN in
          # node-port form (http://<node PN IP>:<NodePort>). A 200 on
          # /up proves the VM routes onto the PN and the cache serves.
          code=$(curl -sS -m 10 -o /tmp/up -w '%{http_code}' "${endpoint%/}/up")
          echo "GET ${endpoint%/}/up → HTTP ${code}"
          cat /tmp/up 2>/dev/null || true; echo
          [ "${code}" = "200" ] || { echo "::error::cache /up over the PN returned ${code}"; exit 1; }
          echo "Runner reached the Kura runner-cache over the PN."
