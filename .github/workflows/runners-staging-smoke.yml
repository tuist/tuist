name: Runners Staging Smoke Test

# Manual smoke test for the staging Tuist Runners pool. Targets
# `runs-on: tuist-staging-macos` so the staging tier's warm Pods
# (configured in infra/helm/tuist/values-managed-staging.yaml as
# `runnersFleet.replicas: 2`) pick up this job.
#
# Use this to validate, end-to-end:
#   1. workflow_job: queued webhook reaches the staging server.
#   2. Tuist.Runners.Dispatch finds an idle Pod and mints a JIT
#      config from GitHub.
#   3. The runner VM polls /api/internal/runners/dispatch on
#      staging.tuist.dev, claims the JIT, registers as a runner.
#   4. GH dispatches this job to the registered runner.
#   5. The job runs on the runner VM.
#   6. After completion the Pod terminates and the reconciler's
#      next 60 s tick creates a replacement.
#   7. When the account runs a private runner-cache Kura node, the
#      VM reaches it over the Scaleway PN (TUIST_CACHE_ENDPOINT),
#      proving the macOS runner-cache data plane end-to-end.
#
# Triggered manually only — we don't want every push to staging
# burning runner cycles.

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Cache benchmark to run on the host-Kura runner after the smoke (empty = smoke only). xcode-cache | xcode-cache-probe | xcode-cache-ramstate | module-cache | combined | no-cache"
        required: false
        default: ""
      runs:
        description: "hyperfine timed runs for the benchmark"
        required: false
        default: "3"
      tuist_ref:
        description: "Build the tuist CLI from this git ref instead of the pinned canary (for the CAS transfer/codec instrumentation on branch builds). Empty = use canary."
        required: false
        default: ""
      env_token:
        description: "xcode-cache only: extract the logged-in token and re-inject it as TUIST_TOKEN so environmentToken() short-circuits the per-op keychain auth read. Confirms the CAS per-op cost is client-side auth, not the wire."
        required: false
        default: "false"
      canary_tag:
        description: "Canary CLI + fixture ref to benchmark (e.g. 4.202.0-canary.27). Empty = the pinned default."
        required: false
        default: ""
      fixture:
        description: "Benchmark fixture: tuist (CLI, deep narrow module graph) | mastodon (app-shaped, fatter targets)"
        required: false
        default: "tuist"
  # Also fires when this workflow file itself changes on the
  # feat/runners-shape-2 branch. The smoke isn't a default CI
  # hook (would burn a runner slot on every PR), but during the
  # staging bring-up we want edits to the smoke definition to
  # re-validate against the live fleet without manual dispatch.
  # The `paths` filter scopes the auto-fire to changes to this
  # file alone; every other push to the branch needs an explicit
  # `gh workflow run runners-staging-smoke.yml`.
  push:
    branches:
      - feat/runners-shape-2
    paths:
      - .github/workflows/runners-staging-smoke.yml

# The smoke curls public github.com + the runner-cache /up; the
# optional bench job clones public repos, so it needs contents:read.
permissions:
  contents: read

jobs:
  smoke:
    # Single-label form. `tuist-staging-macos` is the pool's unique
    # dispatch label and is sufficient to pick a runner — no need
    # to also list `self-hosted` (which is advertised on the
    # runner but isn't an authorization boundary).
    runs-on: tuist-staging-macos
    timeout-minutes: 10
    steps:
      - name: Show environment
        run: |
          echo "Hostname:    $(hostname)"
          echo "macOS:       $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"
          echo "Xcode path:  $(xcode-select -p)"
          # Confirm we're inside a Tart VM. The VM's hostname is
          # set by Tart and the host CPU model leaks via sysctl.
          sysctl -n machdep.cpu.brand_string

      - name: Public reachability check
        run: |
          set -euo pipefail
          # Public GH should be reachable (the runner already
          # registered, so this had better work). This is the
          # only network assertion the smoke covers; the
          # negative-isolation test that used to live here was
          # removed because the previous shape leaned on
          # KUBERNETES_SERVICE_HOST being injected (it isn't —
          # Tart VMs don't get the K8s env contract that Pods
          # do) so the assertion passed vacuously via DNS
          # failure. Tart VM egress isolation is not enforced
          # by the runner-namespace NetworkPolicy (vmnet
          # bypasses CNI) and there's no in-cluster endpoint we
          # can dial from inside the VM as a proxy for "is the
          # cluster reachable" — the perimeter gate lives on the
          # Mac mini's security group at the IaaS layer, not
          # somewhere we can curl from the workflow.
          curl -fsSL -o /dev/null -w "github.com → HTTP %{http_code}\n" https://github.com

      - name: Kura runner-cache reachable over the PN
        run: |
          set -uo pipefail
          endpoint="${TUIST_CACHE_ENDPOINT:-}"
          if [ -z "${endpoint}" ]; then
            echo "TUIST_CACHE_ENDPOINT unset — dispatch handed this fleet no private runner-cache URL; skipping the PN cache probe."
            exit 0
          fi
          echo "TUIST_CACHE_ENDPOINT=${endpoint}"
          # macOS runners reach the cache over the Scaleway PN in
          # node-port form (http://<node PN IP>:<NodePort>). A 200 on
          # /up proves the VM routes onto the PN and the cache serves.
          code=$(curl -sS -m 10 -o /tmp/up -w '%{http_code}' "${endpoint%/}/up")
          echo "GET ${endpoint%/}/up → HTTP ${code}"
          cat /tmp/up 2>/dev/null || true; echo
          [ "${code}" = "200" ] || { echo "::error::cache /up over the PN returned ${code}"; exit 1; }
          echo "Runner reached the Kura runner-cache over the PN."

      - name: process-spawn latency probe (VM vs bare host comparison)
        run: |
          set -uo pipefail
          # Same benchmark as run on the bare M2 Pro host (true 1.46ms /
          # ls 1.60ms / python3 16.0ms): if guest spawns are several times
          # slower, the Virtualization.framework stack is the per-task
          # multiplier behind the warm replay's ~600ms/task overhead.
          python3 - <<'PYEOF'
          import subprocess, time
          def bench(cmd, n, label):
              ts = []
              for _ in range(n):
                  t0 = time.time()
                  subprocess.run(cmd, capture_output=True)
                  ts.append((time.time() - t0) * 1000)
              ts.sort()
              print(f"{label}: n={n}  p50={ts[n//2]:.2f}ms  p90={ts[int(n*0.9)]:.2f}  max={ts[-1]:.2f}", flush=True)
          bench(["/usr/bin/true"], 200, "spawn /usr/bin/true      ")
          bench(["/bin/ls", "/"], 100, "spawn /bin/ls            ")
          bench(["/usr/bin/python3", "-c", "pass"], 40, "spawn python3 (dyld-heavy)")
          bench(["/usr/bin/xcrun", "--find", "swift-frontend"], 40, "spawn xcrun --find       ")
          PYEOF
          echo "VM uptime: $(uptime)"
          echo "Spotlight: $(mdutil -a -s 2>/dev/null | tr '\n' ' ' | head -c 160)"
          echo "mds/XProtect CPU: $(ps -Ao %cpu,comm | grep -iE 'mds|XProtect|mobileassetd|syspolicyd' | sort -rn | head -4 | tr '\n' ' | ')"

      - name: vmnet bulk throughput probe (host->VM over the bridge)
        run: |
          set -uo pipefail
          HOST=192.168.64.1
          # Downloads a large payload from a zero-copy sendfile server on the host
          # (host-side loopback baseline was ~80 Gbps, so the server is not the
          # bottleneck). Isolates the raw vmnet bridge capacity from kura serving.
          gbps() { python3 -c "import sys; s=float(sys.argv[1]); print(f'{s/1e6:.0f} MB/s = {s*8/1e9:.2f} Gbps')" "$1" 2>/dev/null || echo "$1 B/s"; }
          echo "== single-stream download over vmnet =="
          for i in 1 2 3; do
            S=$(curl -s -o /dev/null -w '%{speed_download}' "http://$HOST:5201/" 2>/dev/null || echo 0)
            echo "  run $i: $(gbps "$S")"
          done
          echo "== 4 parallel streams (aggregate: tells per-flow vs aggregate cap) =="
          tmp=$(mktemp -d)
          for n in 1 2 3 4; do ( curl -s -o /dev/null -w '%{speed_download}' "http://$HOST:5201/" > "$tmp/$n" 2>/dev/null ) & done
          wait
          AGG=$(cat "$tmp"/* | paste -sd+ - | bc 2>/dev/null || python3 -c "import glob;print(sum(float(open(f).read() or 0) for f in glob.glob('$tmp/*')))")
          echo "  aggregate of 4: $(gbps "$AGG")"
          rm -rf "$tmp"

  # Optional cached-build benchmark on the host-Kura runner. Runs the
  # runners-benchmark scenarios against the account the staging host Kura
  # serves (tuist/tuist → account 2), so the CAS/module cache routes to the
  # host Kura over the host<->VM bridge. Gated on the `strategy` input so a
  # plain smoke dispatch stays cheap.
  bench:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.strategy != '' }}
    runs-on: tuist-staging-macos
    # Higher ceiling: a from-source release build of the tuist CLI (tuist_ref)
    # can take ~30-40 min before the benchmark itself runs.
    timeout-minutes: 150
    # id-token for the secretless OIDC `tuist auth login` against staging.
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUNNER_LABEL: staging-hostkura
      BENCH_PROJECT: tuist
      TUIST_CANARY_TAG: ${{ inputs.canary_tag != '' && inputs.canary_tag || '4.202.0-canary.14' }}
      TUIST_FIXTURE_REF: ${{ inputs.canary_tag != '' && inputs.canary_tag || '4.202.0-canary.14' }}
      HYPERFINE_RUNS: ${{ inputs.runs }}
      # When set, build the tuist CLI from this ref (carries the CAS transfer/codec
      # instrumentation) instead of installing the pinned canary.
      TUIST_SRC_REF: ${{ inputs.tuist_ref }}
      # Auth control-plane against staging; the CAS data-plane stays on the
      # dispatch-set TUIST_CACHE_ENDPOINT (the host Kura).
      TUIST_URL: https://staging.tuist.dev
    steps:
      - name: Diagnostics — cache endpoint the dispatch handed us
        run: |
          echo "hostname:            $(hostname)"
          echo "TUIST_CACHE_ENDPOINT=${TUIST_CACHE_ENDPOINT:-<unset>}"
          if [ -n "${TUIST_CACHE_ENDPOINT:-}" ]; then
            code=$(curl -sS -m 5 -o /dev/null -w '%{http_code}' "${TUIST_CACHE_ENDPOINT%/}/up" || echo 000)
            echo "GET ${TUIST_CACHE_ENDPOINT%/}/up -> HTTP ${code}"
          fi

      - name: Install Tuist (canary or built from source) + hyperfine via mise
        run: |
          set -euo pipefail
          mise use --global "hyperfine@1.19.0"
          # We don't use jdx/mise-action, so wire the shims onto PATH for the
          # subsequent build step (GITHUB_PATH affects later steps).
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
          if [ -n "${TUIST_SRC_REF:-}" ]; then
            echo "== building tuist from source ref=$TUIST_SRC_REF (release) for CAS transfer/codec instrumentation =="
            git clone --depth 1 --branch "$TUIST_SRC_REF" https://github.com/tuist/tuist.git tuist-src
            ( cd tuist-src && swift build --product tuist -c release --replace-scm-with-registry )
            BIN="$PWD/tuist-src/.build/release"
            # Prepend the built binary so `tuist` resolves to it ahead of any mise shim.
            echo "$BIN" >> "$GITHUB_PATH"
            "$BIN/tuist" version
          else
            mise use --global "tuist@${TUIST_CANARY_TAG}"
            mise exec -- tuist version
          fi
          mise exec -- hyperfine --version

      - name: Check out the fixture (tuist from the public repo, mastodon from the private benchmark repo)
        env:
          FIXTURE: ${{ inputs.fixture || 'tuist' }}
          FIXTURE_TOKEN: ${{ secrets.TUIST_GITHUB_TOKEN || secrets.TUIST_CLI_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if [ "$FIXTURE" = "mastodon" ]; then
            # The Tuist-ified Mastodon iOS app lives in the private benchmark
            # repo, which no workflow-accessible token can read (the repo
            # token is repo-scoped and the org tokens 403 or fail auth). For
            # bench runs the fixture tarball is staged on the Mac HOST and
            # served on the vmnet bridge IP only (never the public
            # interface), so the job fetches it with no credentials at all.
            # The fixture's fullHandle points at the production
            # tuist/mastodon project, which does not exist on staging:
            # rewrite it to tuist/tuist so OIDC auth and host-Kura account
            # routing match the tuist-fixture path.
            curl -fsS -m 60 -o fixtures.tar.gz http://192.168.64.1:5201/mastodon-tuist-ios.tar.gz \
              || { echo "::error::fixture tarball not staged on this host's bridge server (192.168.64.1:5201)"; exit 1; }
            tar -xzf fixtures.tar.gz
            mv mastodon-tuist-ios fixture
            sed -i '' 's#fullHandle: "tuist/mastodon"#fullHandle: "tuist/tuist"#' fixture/Tuist.swift
            grep fullHandle fixture/Tuist.swift
          else
            git clone --depth 1 --branch "$TUIST_FIXTURE_REF" \
              https://github.com/tuist/tuist.git fixture
            grep fullHandle fixture/Tuist.swift || true
          fi
          rm -f fixture/mise.toml fixture/.mise.toml fixture/.tool-versions

      - name: Authenticate Tuist against staging (GitHub OIDC)
        working-directory: fixture
        run: |
          set -euo pipefail
          echo "TUIST_URL=${TUIST_URL}"
          tuist auth login
          tuist auth whoami || true

      - name: Skip Xcode macro/package fingerprint validation
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Run cached build + harvest CAS analytics
        working-directory: fixture
        env:
          STRATEGY: ${{ inputs.strategy }}
          FIXTURE: ${{ inputs.fixture || 'tuist' }}
        run: |
          set -uo pipefail
          SIGN='CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO'
          if [ "${FIXTURE:-tuist}" = "mastodon" ]; then
            # iOS Simulator SDK: a device destination fails to link
            # simulator-excluded frameworks; arm64-only matches the runner.
            BUILD_BASE='xcodebuild -workspace MastodonTuist.xcworkspace -scheme Mastodon -destination "generic/platform=iOS Simulator" build '"$SIGN"' ARCHS=arm64'
            GEN_TARGET="Mastodon"
          else
            BUILD_BASE='xcodebuild -workspace Tuist.xcworkspace -scheme tuist -destination "generic/platform=macOS" build '"$SIGN"' ARCHS=arm64'
            GEN_TARGET="tuist"
          fi
          BUILD_NO_CACHE="$BUILD_BASE"' COMPILATION_CACHE_ENABLE_CACHING=NO'
          CLEAN_DD='rm -rf "$HOME/Library/Developer/Xcode/DerivedData"'
          rc=0
          echo "== strategy=$STRATEGY runs=$HYPERFINE_RUNS =="
          cat > /tmp/spawnbench.py <<'SPAWNEOF'
          import subprocess, sys, time
          label = sys.argv[1] if len(sys.argv) > 1 else "?"
          def bench(cmd, n, name):
              ts = []
              for _ in range(n):
                  t0 = time.time()
                  subprocess.run(cmd, capture_output=True)
                  ts.append((time.time() - t0) * 1000)
              ts.sort()
              print(f"  [{label}] {name}: p50={ts[n//2]:.2f}ms  p90={ts[int(n*0.9)]:.2f}  max={ts[-1]:.2f}", flush=True)
          bench(["/usr/bin/true"], 200, "true   ")
          bench(["/bin/ls", "/"], 100, "ls     ")
          bench(["/usr/bin/python3", "-c", "pass"], 40, "python3")
          SPAWNEOF
          spawnprobe() {
            echo "== spawn probe [$1]  (uptime: $(uptime | sed 's/.*up/up/;s/,.*//')) =="
            python3 /tmp/spawnbench.py "$1" || true
          }
          case "$STRATEGY" in
            xcode-cache)
              spawnprobe "bench-start"
              # Confirmation lever: re-inject the logged-in token as TUIST_TOKEN so
              # the CAS daemon's environmentToken() short-circuits the per-op keychain
              # read (the suspected ~340ms/op client-side cost). Must be exported
              # BEFORE `tuist setup cache` so the spawned daemon inherits it.
              if [ "${ENV_TOKEN:-false}" = "true" ]; then
                TOK=$(security find-internet-password -a "${TUIST_URL}_access_token" -w 2>/dev/null || true)
                if [ -z "${TOK:-}" ]; then
                  TOK=$(python3 -c 'import json,os;p=os.path.expanduser("~/.config/tuist/credentials/staging.tuist.dev.json");print(json.load(open(p))["accessToken"]) if os.path.exists(p) else ""' 2>/dev/null || true)
                fi
                if [ -n "${TOK:-}" ]; then
                  export TUIST_TOKEN="$TOK"
                  echo "TUIST_TOKEN injected (len=${#TOK}) -> environmentToken() short-circuits per-op keychain auth"
                else
                  echo "::warning::env_token requested but token extraction FAILED (keychain ACL?); running WITHOUT it"
                fi
              fi
              # Xcode CAS warmed on the host Kura; every clean rebuild resolves
              # its compilations as remote CAS hits against the host Kura.
              tuist setup cache
              tuist install
              tuist generate --no-binary-cache
              # The CAS daemon socket name derives from the connected project, so
              # discover it rather than hard-code it (tuist/tuist != tuist/mastodon).
              CAS_SOCK=""
              for _ in $(seq 1 20); do
                CAS_SOCK=$(ls -t "$HOME/.local/state/tuist/"*.sock 2>/dev/null | head -1)
                [ -n "$CAS_SOCK" ] && break
                sleep 1
              done
              echo "CAS daemon socket: ${CAS_SOCK:-<none found>}"
              [ -n "$CAS_SOCK" ] || { echo "::error::no CAS daemon socket after tuist setup cache"; exit 1; }
              CAS="COMPILATION_CACHE_ENABLE_CACHING=YES COMPILATION_CACHE_ENABLE_PLUGIN=YES COMPILATION_CACHE_REMOTE_SERVICE_PATH=${CAS_SOCK}"
              BUILD_CAS="$BUILD_BASE $CAS"
              # Direct evidence of where the CAS daemon spends per-op time: sample it
              # mid-build. If stacks are dominated by SecItem/keychain, the ~340ms/op
              # is client-side auth; if by network, it's the wire.
              DPID=$(pgrep -f "cache-start" 2>/dev/null | head -1); [ -z "${DPID:-}" ] && DPID=$(pgrep -x tuist 2>/dev/null | head -1)
              echo "daemon pid for sampling: ${DPID:-none}"
              eval "$CLEAN_DD"
              if [ -n "${DPID:-}" ]; then ( sleep 35; sample "$DPID" 12 -file /tmp/daemon.sample >/dev/null 2>&1 ) & fi
              eval "$BUILD_CAS" >/dev/null 2>&1 || true
              wait 2>/dev/null || true
              if [ -f /tmp/daemon.sample ]; then
                echo "=== daemon sample (hot path) ==="
                echo "keychain/Security frames: $(grep -icE 'SecItem|securityd|keychain|CopyMatching' /tmp/daemon.sample)"
                echo "network/URLSession frames: $(grep -icE 'URLSession|CFNetwork|nw_|boringssl|__recvfrom|socket' /tmp/daemon.sample)"
                echo "-- top auth/keychain symbols --"; { grep -iE 'SecItem|keychain|authenticationToken|ServerCredentials|CachedValue|Authentication' /tmp/daemon.sample | sed 's/^ *[0-9]* *//' | sort | uniq -c | sort -rn | head -8; } 2>/dev/null || true
              fi
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json --show-output \
                --setup "$BUILD_CAS" --prepare "$CLEAN_DD" "$BUILD_CAS" || rc=$?
              spawnprobe "bench-end" ;;
            xcode-cache-probe)
              # In-VM decomposition: WHILE the real cached build saturates the VM,
              # measure the same host-Kura CAS fetch two ways side by side:
              #   - URLSession probe (8-way concurrent, daemon-shaped async client)
              #   - curl loop (blocking client, one wake-up hop)
              # plus a CPU-pressure sampler (runnable threads + live compiler procs).
              # If URLSession inflates to ~daemon's 153ms while curl stays ~1-5ms,
              # the daemon's per-op cost is async-client scheduling starvation and a
              # blocking CAS client is the fix; if both inflate, the VM itself is
              # the bottleneck. Idle baselines are taken before the build starts.
              tuist setup cache
              tuist install
              tuist generate --no-binary-cache
              CAS_SOCK=""
              for _ in $(seq 1 20); do
                CAS_SOCK=$(ls -t "$HOME/.local/state/tuist/"*.sock 2>/dev/null | head -1)
                [ -n "$CAS_SOCK" ] && break
                sleep 1
              done
              [ -n "$CAS_SOCK" ] || { echo "::error::no CAS daemon socket after tuist setup cache"; exit 1; }
              CAS="COMPILATION_CACHE_ENABLE_CACHING=YES COMPILATION_CACHE_ENABLE_PLUGIN=YES COMPILATION_CACHE_REMOTE_SERVICE_PATH=${CAS_SOCK}"
              BUILD_CAS="$BUILD_BASE $CAS"
              EP="${TUIST_CACHE_ENDPOINT:?xcode-cache-probe needs the host-Kura endpoint}"
              EP="${EP%/}"
              PROBE_ID="probe$(python3 -c 'import uuid;print(uuid.uuid4().hex[:12])')"
              PROBE_URL="$EP/api/cache/cas/$PROBE_ID?account_handle=tuist&project_handle=tuist&hash=$PROBE_ID"
              head -c 30209 /dev/urandom > /tmp/probe_blob.bin
              seed=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$PROBE_URL" -H 'Content-Type: application/octet-stream' --data-binary @/tmp/probe_blob.bin || echo 000)
              get=$(curl -s -o /dev/null -w '%{http_code}' "$PROBE_URL" || echo 000)
              echo "probe artifact (30KB, avg compressed CAS payload): seed=$seed get=$get"
              cat > /tmp/us_probe.swift <<'SWIFTEOF'
              import Foundation
              let args = CommandLine.arguments
              let url = URL(string: args[1])!
              let conc = Int(args[2]) ?? 8
              let interval = Double(args[3]) ?? 2.0
              let maxBatches = Int(args[4]) ?? 1_000_000
              // exact tuist URLSession shape (URLSession+Tuist.swift)
              let cfg = URLSessionConfiguration.ephemeral
              cfg.timeoutIntervalForRequest = 120
              cfg.timeoutIntervalForResource = 90
              cfg.httpMaximumConnectionsPerHost = 20
              let session = URLSession(configuration: cfg)
              for _ in 0 ..< maxBatches {
                  var ls: [Double] = []
                  await withTaskGroup(of: Double.self) { g in
                      for _ in 0 ..< conc {
                          g.addTask {
                              let t0 = ProcessInfo.processInfo.systemUptime
                              do {
                                  let (d, r) = try await session.data(for: URLRequest(url: url))
                                  guard (r as? HTTPURLResponse)?.statusCode == 200, !d.isEmpty else { return -1.0 }
                                  return (ProcessInfo.processInfo.systemUptime - t0) * 1000
                              } catch { return -1.0 }
                          }
                      }
                      for await v in g where v >= 0 { ls.append(v) }
                  }
                  ls.sort()
                  if !ls.isEmpty {
                      let mean = ls.reduce(0, +) / Double(ls.count)
                      print(String(format: "%.3f n=%d mean=%.1f p50=%.1f max=%.1f", Date().timeIntervalSince1970, ls.count, mean, ls[ls.count / 2], ls[ls.count - 1]))
                      fflush(stdout)
                  }
                  try? await Task.sleep(nanoseconds: UInt64(interval * 1_000_000_000))
              }
          SWIFTEOF
              xcrun swiftc -O /tmp/us_probe.swift -o /tmp/us_probe 2>/tmp/us_probe_compile.log || { echo "::warning::URLSession probe compile failed (curl probe still runs)"; tail -5 /tmp/us_probe_compile.log || true; }
              echo "== IDLE baselines (VM quiet, before the build) =="
              if [ -x /tmp/us_probe ]; then /tmp/us_probe "$PROBE_URL" 8 0.2 10 > /tmp/us_idle.log 2>&1 || true; fi
              for _ in $(seq 1 15); do curl -s -o /dev/null -w '%{time_total}\n' "$PROBE_URL" 2>/dev/null || true; done > /tmp/curl_idle.log
              if [ -x /tmp/us_probe ]; then /tmp/us_probe "$PROBE_URL" 8 2 100000 > /tmp/us_build.log 2>&1 & USPID=$!; fi
              ( while :; do curl -s -o /dev/null -w '%{time_total}\n' "$PROBE_URL" >> /tmp/curl_build.log 2>/dev/null || true; sleep 1; done ) & CURLPID=$!
              ( while :; do echo "$(date +%s) runnable=$(ps -A -o state= 2>/dev/null | grep -c '^R' || true) compilers=$(pgrep -f 'swift-frontend|clang|swift-driver' 2>/dev/null | wc -l | tr -d ' ') memfree=$(memory_pressure -Q 2>/dev/null | grep -oE '[0-9]+%' | tr -d '%' | head -1) pageouts=$(vm_stat 2>/dev/null | awk '/Pageouts/{gsub("\\.","",$2); print $2}') comppages=$(vm_stat 2>/dev/null | awk '/occupied by compressor/{gsub("\\.","",$5); print $5}') swapused=$(sysctl -n vm.swapusage 2>/dev/null | awk '{print $6}')" >> /tmp/cpu_build.log; sleep 2; done ) & CPUPID=$!
              # no --show-output: keeps the log small enough that the summaries
              # below survive `gh run view --log` truncation
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json \
                --setup "$BUILD_CAS" --prepare "$CLEAN_DD" "$BUILD_CAS" || rc=$?
              for p in ${USPID:-} ${CURLPID:-} ${CPUPID:-}; do kill "$p" 2>/dev/null || true; done
              echo "== IN-VM PROBE DECOMPOSITION (idle vs during the real cached build) =="
              python3 - <<'PYEOF' || true
          import re
          def usstats(path, label):
              try: lines = open(path).read().splitlines()
              except Exception: print(f"  {label}: (no data)"); return
              means = [float(m.group(1)) for l in lines if (m := re.search(r'mean=([0-9.]+)', l))]
              maxs = [float(m.group(1)) for l in lines if (m := re.search(r'max=([0-9.]+)', l))]
              if not means: print(f"  {label}: (no batches)"); return
              means.sort()
              print(f"  {label}: batches={len(means)}  batch-mean p50={means[len(means)//2]:.1f}ms  p90={means[int(len(means)*0.9)]:.1f}ms  worst-op={max(maxs):.1f}ms")
          def curlstats(path, label):
              try: ts = sorted(float(l) * 1000 for l in open(path) if l.strip())
              except Exception: print(f"  {label}: (no data)"); return
              if not ts: print(f"  {label}: (no data)"); return
              print(f"  {label}: n={len(ts)}  mean={sum(ts)/len(ts):.1f}ms  p50={ts[len(ts)//2]:.1f}  p90={ts[int(len(ts)*0.9)]:.1f}  max={ts[-1]:.1f}")
          usstats('/tmp/us_idle.log',  'URLSession idle  ')
          usstats('/tmp/us_build.log', 'URLSession BUILD ')
          curlstats('/tmp/curl_idle.log',  'curl (blocking) idle  ')
          curlstats('/tmp/curl_build.log', 'curl (blocking) BUILD ')
          try:
              rs, cs = [], []
              for l in open('/tmp/cpu_build.log'):
                  if (m := re.search(r'runnable=(\d+)', l)): rs.append(int(m.group(1)))
                  if (m := re.search(r'compilers=(\d+)', l)): cs.append(int(m.group(1)))
              if rs: print(f"  CPU during build: runnable-threads mean={sum(rs)/len(rs):.0f} max={max(rs)}  compiler-procs mean={sum(cs)/len(cs):.0f} max={max(cs)}  samples={len(rs)}")
          except Exception as e: print(f"  cpu sampler: (no data: {e})")
          try:
              free, po, cp, sw = [], [], [], []
              for l in open('/tmp/cpu_build.log'):
                  if (m := re.search(r'memfree=(\d+)', l)): free.append(int(m.group(1)))
                  if (m := re.search(r'pageouts=(\d+)', l)): po.append(int(m.group(1)))
                  if (m := re.search(r'comppages=(\d+)', l)): cp.append(int(m.group(1)))
                  if (m := re.search(r'swapused=([0-9.]+[MG])', l)): sw.append(m.group(1))
              if free:
                  po_delta = (po[-1] - po[0]) if len(po) > 1 else 0
                  cp_mb = [p * 16384 / 1e6 for p in cp]
                  print(f"  MEMORY during build: free% min={min(free)} mean={sum(free)/len(free):.0f}  pageouts delta={po_delta}  compressor MB min={min(cp_mb):.0f} max={max(cp_mb):.0f}  swap last={sw[-1] if sw else '?'}")
          except Exception as e: print(f"  memory sampler: (no data: {e})")
          PYEOF
              echo "vCPUs in VM: $(sysctl -n hw.ncpu 2>/dev/null || echo '?')  physical mem: $(sysctl -n hw.memsize 2>/dev/null || echo '?')" ;;
            xcode-cache-ramstate)
              # A/B for the analytics-write hypothesis, ZERO code changes: identical
              # to xcode-cache, but the daemon's state dir (cas_analytics.db + socket)
              # lives on a RAM disk. The per-op analytics insert (SQLite.swift
              # queue.sync on the cooperative pool + wal_autocheckpoint=1 per-insert
              # checkpoint) then never touches the xcodebuild-contended sparse disk.
              # If transfer_ms collapses vs the ~153ms baseline, pool-blocking
              # disk-stalled analytics writes are the daemon's per-op bottleneck.
              # The daemon is a launchd agent that does NOT inherit the caller's
              # env (SetupCacheCommandService forwards an allowlist only), so
              # XDG_STATE_HOME can't reach it. Instead, symlink the DEFAULT state
              # dir onto the RAM disk — the daemon resolves the same path and
              # transparently lands on RAM. The shared cas_analytics harvest below
              # also resolves through the symlink unchanged.
              RAMDEV=$(hdiutil attach -nomount ram://1048576)
              RAMDEV=$(echo "$RAMDEV" | tr -d '[:space:]')
              diskutil erasevolume APFS ramstate "$RAMDEV" >/dev/null
              mkdir -p /Volumes/ramstate/tuist-state "$HOME/.local/state"
              rm -rf "$HOME/.local/state/tuist"
              ln -sfn /Volumes/ramstate/tuist-state "$HOME/.local/state/tuist"
              touch "$HOME/.local/state/tuist/.rw-check"
              echo "state dir symlinked to RAM disk: $(readlink "$HOME/.local/state/tuist") (dev $RAMDEV)"
              tuist setup cache
              tuist install
              tuist generate --no-binary-cache
              CAS_SOCK=""
              for _ in $(seq 1 20); do
                CAS_SOCK=$(ls -t "$HOME/.local/state/tuist/"*.sock 2>/dev/null | head -1 || true)
                [ -n "$CAS_SOCK" ] && break
                sleep 1
              done
              echo "CAS daemon socket: ${CAS_SOCK:-<none found>}"
              [ -n "$CAS_SOCK" ] || { echo "::error::no CAS daemon socket on the RAM state dir"; exit 1; }
              CAS="COMPILATION_CACHE_ENABLE_CACHING=YES COMPILATION_CACHE_ENABLE_PLUGIN=YES COMPILATION_CACHE_REMOTE_SERVICE_PATH=${CAS_SOCK}"
              BUILD_CAS="$BUILD_BASE $CAS"
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json \
                --setup "$BUILD_CAS" --prepare "$CLEAN_DD" "$BUILD_CAS" || rc=$? ;;
            xcode-cache-ramdd)
              # Splits the warm-build residual between VM disk sync latency and
              # everything else: identical cached build, but DerivedData lives on
              # a 6GiB RAM disk so llbuild's per-task database commits and the
              # output materialization skip the Tart sparse-image disk. An
              # F_FULLFSYNC probe on the normal disk (idle vs during the build)
              # measures sync latency directly (#11556 measured a single fsynced
              # insert at 573ms on this disk, so slow syncs are a proven mode).
              tuist setup cache
              tuist install
              tuist generate --no-binary-cache
              CAS_SOCK=""
              for _ in $(seq 1 20); do
                CAS_SOCK=$(ls -t "$HOME/.local/state/tuist/"*.sock 2>/dev/null | head -1 || true)
                [ -n "$CAS_SOCK" ] && break
                sleep 1
              done
              [ -n "$CAS_SOCK" ] || { echo "::error::no CAS daemon socket after tuist setup cache"; exit 1; }
              CAS="COMPILATION_CACHE_ENABLE_CACHING=YES COMPILATION_CACHE_ENABLE_PLUGIN=YES COMPILATION_CACHE_REMOTE_SERVICE_PATH=${CAS_SOCK}"
              RAMDEV=$(hdiutil attach -nomount ram://12582912)
              RAMDEV=$(echo "$RAMDEV" | tr -d '[:space:]')
              diskutil erasevolume APFS ramdd "$RAMDEV" >/dev/null
              RAMDD=/Volumes/ramdd/DerivedData
              BUILD_CAS_RAM="$BUILD_BASE $CAS -derivedDataPath $RAMDD"
              CLEAN_RAM="rm -rf $RAMDD"
              df -h /Volumes/ramdd | tail -1
              cat > /tmp/fsync_probe.py <<'PYEOF'
          import fcntl, os, sys, time
          n = int(sys.argv[1]); interval = float(sys.argv[2])
          fd = os.open("/tmp/fsync_probe.bin", os.O_CREAT | os.O_RDWR)
          buf = os.urandom(4096)
          for _ in range(n):
              t0 = time.time()
              os.pwrite(fd, buf, 0)
              fcntl.fcntl(fd, fcntl.F_FULLFSYNC)
              print(f"{(time.time() - t0) * 1000:.2f}", flush=True)
              time.sleep(interval)
          PYEOF
              echo "== F_FULLFSYNC on the normal VM disk, idle baseline =="
              python3 /tmp/fsync_probe.py 20 0.1 > /tmp/fsync_idle.log 2>&1 || true
              python3 -c "ts=sorted(float(l) for l in open('/tmp/fsync_idle.log') if l.strip()); print(f'  idle: n={len(ts)}  p50={ts[len(ts)//2]:.1f}ms  p90={ts[int(len(ts)*0.9)]:.1f}  max={ts[-1]:.1f}')" || true
              python3 /tmp/fsync_probe.py 100000 0.5 > /tmp/fsync_build.log 2>&1 & FSPID=$!
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json \
                --setup "$BUILD_CAS_RAM" --prepare "$CLEAN_RAM" "$BUILD_CAS_RAM" || rc=$?
              kill "${FSPID:-}" 2>/dev/null || true
              echo "== F_FULLFSYNC during the cached builds =="
              python3 -c "ts=sorted(float(l) for l in open('/tmp/fsync_build.log') if l.strip()); print(f'  build: n={len(ts)}  p50={ts[len(ts)//2]:.1f}ms  p90={ts[int(len(ts)*0.9)]:.1f}  p99={ts[int(len(ts)*0.99)]:.1f}  max={ts[-1]:.1f}')" || true
              du -sh "$RAMDD" 2>/dev/null || true ;;
            module-cache)
              # Binary (module) cache: each run clears local binaries, re-pulls
              # them via generate, then builds the app target.
              tuist install
              tuist cache
              # BREAKDOWN of the module-cache wall-clock, decomposed into:
              #   pull   = binary download from the cache (LOCAL disk on host-Kura,
              #            network on PN/WAN — where the local-serving win lives)
              #   gen    = graph resolve + Xcode project generation (CPU, cache-cold
              #            binaries already present so no pull)
              #   build  = compile the top-level tuist target + link (CPU)
              now() { python3 -c 'import time;print(time.time())'; }
              eval "$CLEAN_DD"; tuist clean binaries >/dev/null 2>&1 || true
              g0=$(now); tuist generate "$GEN_TARGET"; g1=$(now)          # resolve+PULL+gen
              g2=$(now); tuist generate "$GEN_TARGET"; g3=$(now)          # resolve+gen (binaries cached, no pull)
              du_cache=$(du -sm "$HOME/.cache/tuist" 2>/dev/null | awk '{print $1}')
              b0=$(now); eval "$BUILD_NO_CACHE"; b1=$(now)        # compile
              python3 -c "g0,g1,g2,g3,b0,b1,du=$g0,$g1,$g2,$g3,$b0,$b1,${du_cache:-0}; gen1=g1-g0; gen2=g3-g2; pull=max(0.0,gen1-gen2); build=b1-b0; print('== module-cache BREAKDOWN =='); print(f'  generate#1 (resolve+pull+gen)={gen1:.1f}s   generate#2 (resolve+gen, cached)={gen2:.1f}s'); print(f'  -> PULL(download binaries)~{pull:.1f}s   GEN(resolve+project)~{gen2:.1f}s   BUILD(compile)={build:.1f}s'); print(f'  one-shot generate#1+build={gen1+build:.1f}s   binary-cache footprint~{du:.0f}MB')"
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json --show-output \
                --prepare "$CLEAN_DD"' && tuist clean binaries' \
                'tuist generate '"$GEN_TARGET"' && '"$BUILD_NO_CACHE" || rc=$? ;;
            no-cache)
              tuist install
              tuist generate --no-binary-cache
              hyperfine --warmup 1 --runs "$HYPERFINE_RUNS" --export-json result.json --show-output \
                --prepare "$CLEAN_DD" "$BUILD_NO_CACHE" || rc=$? ;;
            *) echo "unsupported strategy: $STRATEGY"; exit 2 ;;
          esac
          echo "== hyperfine result (exit=$rc) =="
          python3 - result.json <<'PY' 2>/dev/null || echo "  (no result.json)"
          import sys, json
          with open(sys.argv[1]) as f:
              for r in json.load(f)["results"]:
                  print(f"  mean={r['mean']:.1f}s  min={r['min']:.1f}s  max={r['max']:.1f}s")
          PY
          echo "== CAS daemon analytics (ground truth for cache hits) =="
          CAS_DB="$HOME/.local/state/tuist/cas_analytics.db"
          if [ -f "$CAS_DB" ]; then
            sqlite3 "$CAS_DB" "PRAGMA wal_checkpoint(TRUNCATE);" >/dev/null 2>&1 || true
            # Split the per-op duration into transfer (wire) vs codec (de/compress) vs
            # remainder (daemon per-request processing: gRPC hop, marshalling, scheduling).
            # transfer_duration/codec_duration exist only on branch builds carrying the
            # instrumentation; fall back to the plain query on the canary.
            sqlite3 -header -column "$CAS_DB" "SELECT count(*) AS ops, round(avg(duration),1) AS total_ms, round(avg(transfer_duration),1) AS transfer_ms, round(avg(codec_duration),1) AS codec_ms, round(avg(duration-transfer_duration-codec_duration),1) AS remainder_ms, round(avg(size)) AS avg_bytes, round(avg(compressed_size)) AS avg_comp FROM cas_outputs;" 2>/dev/null \
              || sqlite3 "$CAS_DB" "SELECT count(*) AS ops, round(avg(duration),1) AS avg_ms, round(sum(duration)/1000.0,1) AS total_s, round(avg(size)) AS avg_bytes FROM cas_outputs;" 2>&1 || true
            # Keyvalue lookups (cache-hit checks) sit SERIALLY at each task's start,
            # unlike the parallel CAS fetches: their latency x task count bounds how
            # much of the build's wall time the daemon path can still influence.
            echo "-- keyvalue ops (read = per-task cache lookup, serial on the task critical path) --"
            sqlite3 -header -column "$CAS_DB" "SELECT operation_type AS op, count(*) AS ops, round(avg(duration),1) AS avg_ms, round(max(duration),1) AS max_ms, round(sum(duration)/1000.0,1) AS total_s FROM keyvalue_metadata GROUP BY operation_type;" 2>&1 || true
          else
            echo "  no cas_analytics.db — the CAS daemon never talked to a remote (endpoint/auth issue)"
          fi
          exit "$rc"
