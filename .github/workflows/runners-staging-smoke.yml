name: Runners Staging Smoke Test

# Manual smoke test for the staging Tuist Runners pool. Targets
# `runs-on: tuist-staging-macos` so the staging tier's warm Pods
# (configured in infra/helm/tuist/values-managed-staging.yaml as
# `runnersFleet.replicas: 2`) pick up this job.
#
# Use this to validate, end-to-end:
#   1. workflow_job: queued webhook reaches the staging server.
#   2. Tuist.Runners.Dispatch finds an idle Pod and mints a JIT
#      config from GitHub.
#   3. The runner VM polls /api/internal/runners/dispatch on
#      staging.tuist.dev, claims the JIT, registers as a runner.
#   4. GH dispatches this job to the registered runner.
#   5. The job runs on the runner VM, and the per-account cache
#      volume (spec #76) materializes + persists across runs.
#   6. After completion the Pod terminates and the reconciler's
#      next 60 s tick creates a replacement.
#   7. When the account runs a private runner-cache Kura node, the
#      VM reaches it over the Scaleway PN (TUIST_CACHE_ENDPOINT),
#      proving the macOS runner-cache data plane end-to-end.
#
# Triggered manually only — we don't want every push to staging
# burning runner cycles.

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: "Short label for this run's cache-volume marker (e.g. a, b)"
        required: false
        default: "a"
  # Also fires when this workflow file itself changes on the
  # feat/runners-shape-2 branch. The smoke isn't a default CI
  # hook (would burn a runner slot on every PR), but during the
  # staging bring-up we want edits to the smoke definition to
  # re-validate against the live fleet without manual dispatch.
  push:
    branches:
      - feat/runners-shape-2
    paths:
      - .github/workflows/runners-staging-smoke.yml

# Smoke job runs shell inside the Tart VM and curls public
# github.com plus the account's private runner-cache over the PN —
# it never reads or mutates repo state, so the GITHUB_TOKEN needs
# zero scopes.
permissions: {}

jobs:
  smoke:
    # Single-label form. `tuist-staging-macos` is the pool's unique
    # dispatch label and is sufficient to pick a runner.
    runs-on: tuist-staging-macos
    timeout-minutes: 30
    steps:
      - name: Show environment
        run: |
          echo "Hostname:    $(hostname)"
          echo "macOS:       $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"
          echo "Xcode path:  $(xcode-select -p)"
          # Confirm we're inside a Tart VM. The host CPU model leaks via sysctl.
          sysctl -n machdep.cpu.brand_string

      - name: Cache volume — host/guest diagnostics (spec #76)
        run: |
          set -uo pipefail
          echo "=== dispatch-poll.sh cache lines (guest side) ==="
          sudo cat /var/log/tuist-runner/poll.log 2>/dev/null | grep -iE "cache|ready|xdg|dirty|budget|share" || echo "(no cache lines in poll.log)"
          echo "=== cache share attached? (virtio-fs --dir cache) ==="
          ls -la "/Volumes/My Shared Files/cache" 2>/dev/null || echo "(no cache share — host attached no cache volume this boot)"
          echo "=== status share (cache-ready / dirty markers) ==="
          ls -la "/Volumes/My Shared Files/status" 2>/dev/null || true

      - name: Cache volume — state + marker persistence (spec #76)
        run: |
          set -uo pipefail
          echo "=== per-account cache volume (spec #76) — guest-side state ==="
          echo "TUIST_XDG_CACHE_HOME  = ${TUIST_XDG_CACHE_HOME:-<unset>}"
          echo "TUIST_CACHE_MAX_BYTES = ${TUIST_CACHE_MAX_BYTES:-<unset>}"
          if [ -n "${TUIST_CACHE_SIGNING_GRANT:-}" ]; then
            echo "TUIST_CACHE_SIGNING_GRANT = present (len ${#TUIST_CACHE_SIGNING_GRANT})"
          else
            echo "TUIST_CACHE_SIGNING_GRANT = absent (grant off / MAC fallback)"
          fi

          root="${TUIST_XDG_CACHE_HOME:-}"
          if [ -z "${root}" ]; then
            echo "::warning::cache volume not present — job is on the cold path this boot."
            exit 0
          fi
          echo "=== df of the cache share ==="; df -h "${root}" || true

          bindir="${root}/tuist/Binaries"
          echo "=== markers present BEFORE this run (materialized from the account's master) ==="
          if ls -1 "${bindir}" 2>/dev/null | grep -q "validation-marker"; then
            ls -1 "${bindir}" | grep "validation-marker" | sed 's/^/  found: /'
            echo "RESULT: a prior run's marker was materialized here -> materialize + dirty-gate + promote WORKS."
          else
            echo "  (none — expected on a first run / cold materialize for this account)"
          fi

          echo "=== writing this run's marker (adds a Binaries entry -> dirty=1 -> promote) ==="
          mkdir -p "${bindir}"
          marker="${bindir}/validation-marker-${{ inputs.run_label }}-${{ github.run_id }}"
          printf 'run %s at %s\n' "${{ github.run_id }}" "$(date -u +%FT%TZ)" > "${marker}"
          echo "  wrote ${marker}"

      - name: Public reachability check
        run: |
          set -euo pipefail
          # Public GH should be reachable (the runner already registered, so
          # this had better work). Tart VM egress isolation is enforced at the
          # Mac mini's IaaS security group, not somewhere we can curl from here,
          # so this is the only network assertion the smoke makes.
          curl -fsSL -o /dev/null -w "github.com → HTTP %{http_code}\n" https://github.com

      - name: Kura runner-cache reachable over the PN
        run: |
          set -uo pipefail
          endpoint="${TUIST_CACHE_ENDPOINT:-}"
          if [ -z "${endpoint}" ]; then
            echo "TUIST_CACHE_ENDPOINT unset — dispatch handed this fleet no private runner-cache URL; skipping the PN cache probe."
            exit 0
          fi
          echo "TUIST_CACHE_ENDPOINT=${endpoint}"
          # macOS runners reach the cache over the Scaleway PN in node-port form
          # (http://<node PN IP>:<NodePort>). A 200 on /up proves the VM routes
          # onto the PN and the cache serves.
          code=$(curl -sS -m 10 -o /tmp/up -w '%{http_code}' "${endpoint%/}/up")
          echo "GET ${endpoint%/}/up → HTTP ${code}"
          cat /tmp/up 2>/dev/null || true; echo
          [ "${code}" = "200" ] || { echo "::error::cache /up over the PN returned ${code}"; exit 1; }
          echo "Runner reached the Kura runner-cache over the PN."
