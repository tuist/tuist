name: Cache Load Test Baseline

on:
  push:
    branches:
      - main
    paths:
      - cache/**
      - tuist_common/**
      - .github/workflows/cache-load-test*.yml
      - cache/k6/**
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: cache-load-test-staging
  cancel-in-progress: false

defaults:
  run:
    working-directory: cache

jobs:
  deploy:
    name: Deploy main
    runs-on: namespace-profile-default
    timeout-minutes: 30
    environment: cache-staging
    steps:
      - uses: actions/checkout@v4
      - uses: 1password/install-cli-action@v2
      - uses: jdx/mise-action@v3.2.0
        with:
          cache_key: "{{default}}-{{env.NSC_BASE_IMAGE_REF_ID}}"
          working_directory: cache
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.CACHE_SSH_PRIVATE_KEY }}
      - name: Deploy with Kamal
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CACHE_OP_SERVICE_ACCOUNT_TOKEN }}
          SECRETS: ${{ secrets.CACHE_KAMAL_SECRETS }}
        run: mise run deploy "staging"

  test:
    name: Baseline (${{ matrix.region }})
    needs: deploy
    runs-on: namespace-profile-default
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: eu-central
            cache_host: cache-eu-central-staging.tuist.dev
          - region: us-east
            cache_host: cache-us-east-staging.tuist.dev
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Generate fixtures
        run: |
          mkdir -p cache/k6/fixtures
          dd if=/dev/urandom of=cache/k6/fixtures/10kb.bin bs=1024 count=10 2>/dev/null
          dd if=/dev/urandom of=cache/k6/fixtures/256kb.bin bs=1024 count=256 2>/dev/null
          dd if=/dev/urandom of=cache/k6/fixtures/2mb.bin bs=$((1024*1024)) count=2 2>/dev/null
          dd if=/dev/urandom of=cache/k6/fixtures/10mb.bin bs=$((1024*1024)) count=10 2>/dev/null
          dd if=/dev/urandom of=cache/k6/fixtures/25mb.bin bs=$((1024*1024)) count=25 2>/dev/null
          dd if=/dev/urandom of=cache/k6/fixtures/50mb.bin bs=$((1024*1024)) count=50 2>/dev/null
      - name: Run k6
        working-directory: cache/k6
        run: |
          k6 run src/main.ts \
            -e CACHE_HOST=${{ matrix.cache_host }} \
            -e SERVER_URL=https://staging.tuist.dev \
            -e REGION=${{ matrix.region }} \
            -e RUN_ID="lt-baseline-${{ github.run_id }}-${{ matrix.region }}" \
            -e COMMIT_SHA=${{ github.sha }}
      - name: Rename result
        working-directory: cache/k6
        run: mv result.json ${{ matrix.region }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-${{ matrix.region }}
          path: cache/k6/${{ matrix.region }}.json
          retention-days: 90

  publish:
    name: Publish baseline
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: baseline-*
          merge-multiple: true
      - uses: actions/upload-artifact@v4
        with:
          name: cache-load-test-baseline
          path: |
            eu-central.json
            us-east.json
          retention-days: 90
