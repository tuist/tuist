app = "tuist-cloud-staging"
primary_region = "atl"
kill_signal = "SIGINT"
kill_timeout = "5s"
console_command = "/app/bin/rails console"

[experimental]
  auto_rollback = true

[env]
  PORT = "8080"
  RAILS_PORT="3000"
  PHX_PORT="4000"
  MIX_ENV="stag"
  RAILS_ENV="staging"
  RAILS_MAX_THREADS=2
  WEB_CONCURRENCY=1
  PHX_HOST="cloud-staging.tuist.io"

[[vm]]
  cpu_kind = 'shared'
  memory = "2048mb"
  cpus = 2

[processes]
  app = "/usr/local/bin/hivemind /app/Procfile"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]
  http_options = { h2_backend = true }

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = 10000
    grace_period = "10s"
    method = "get"
    path = "/ready"
    protocol = "http"
    timeout = 2000
    tls_skip_verify = false
    [services.http_checks.headers]

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/"
