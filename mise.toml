[tools]
    aube = "1.6.2"
    # Auto-bumped by Renovate to the latest Tuist CLI release, including canary prereleases.
    tuist = "4.201.0-canary.8"
    swiftlint = "0.59.1"
    "elixir" = "1.19.5"
    "erlang" = "28.4.3"
    swiftformat = "0.58.7"
    git-cliff = "2.6.0"
    sops = "3.9.3"
    age = "1.2.1"
    protoc = "32.1"
    "1password-cli" = "2.32.0"
    bats = "1.11.1"
    rclone = "1.73.3"
    jq = "1.8.1"
    oras = "1.3.0"
    xcodes = "1.6.0"
    yq = "4.52.5"
    java = "21"
    gradle = "8.12"
    caddy = "2.11.2"
    "github:tuist/blick" = "0.8.0"
    "npm:opencode-ai" = "1.14.39"
    kubectl = "1.36.1"
    helm = "4.2.0"
    # pomerium-cli is the kubeconfig exec credential plugin that does
    # the Google OIDC dance + caches the session for kubectl calls
    # against the kube-<env>.tuist.dev Pomerium gateway. See
    # infra/helm/pomerium/.
    "github:pomerium/cli" = "0.32.2"

[hooks]
    postinstall = "{{config_root}}/mise/tasks/install.sh"

[env]
    MISE_CONFIG_ROOT = "{{config_root}}"
    _.source = ["{{config_root}}/mise/utilities/dev_instance_env.sh", "{{config_root}}/mise/utilities/cache_ee_env.sh"]
    TUIST_CACHE_CONCURRENCY_LIMIT="none"
    TUIST_FILESYSTEM_BACKEND = "swift-file-system"
    TUIST_USE_SWIFTERPM = "1"
    TUIST_INSPECT_TEST_MODE = "remote"
    TUIST_FEATURE_FLAG_KURA = "1"
    TUIST_HOSTED = "1"
    TUIST_S3_VIRTUAL_HOST = "1"
    TUIST_S3_BUCKET_AS_HOST = "1"
    TUIST_S3_REGION = "auto"
    TUIST_S3_TIGRIS_BUCKET_AS_HOST = "0"
    TUIST_S3_TIGRIS_VIRTUAL_HOST = "0"
    ERL_AFLAGS = "-kernel shell_history enabled -kernel shell_history_file_bytes 1024000"
    # Only used in a local, development environment
    TUIST_CACHE_API_KEY = "7a3de63bb6136d94539e9976b1c54bfd553467c2c4775f84b7b2baf27f8b38c6"

[tasks.cla-sign]
    description = "Sign a component CLA by adding current user to signatures.json"
    run = '''
    #!/usr/bin/env bash
    set -euo pipefail

    COMPONENT="${CLA_COMPONENT:-server}"
    case "$COMPONENT" in
        server)
            SIGNATURES_FILE="server/cla/signatures.json"
            COMPONENT_NAME="Tuist Server"
            ;;
        kura)
            SIGNATURES_FILE="kura/cla/signatures.json"
            COMPONENT_NAME="Kura"
            ;;
        *)
            echo "Unsupported CLA component: $COMPONENT"
            echo "Set CLA_COMPONENT to either 'server' or 'kura'."
            exit 1
            ;;
    esac

    REPO_ID="250427618"  # tuist/tuist repository ID

    echo "Adding your signature to the $COMPONENT_NAME CLA..."

    # Get current user info from GitHub
    user_info=$(gh api user)
    user_login=$(echo "$user_info" | jq -r '.login')
    user_name=$(echo "$user_info" | jq -r '.name // .login')
    user_id=$(echo "$user_info" | jq -r '.id')

    echo "Signing CLA for: $user_name ($user_login)"

    # Check if user already signed
    if [[ -f "$SIGNATURES_FILE" ]]; then
        existing_signature=$(jq -r --arg user_id "$user_id" '.signedContributors[]? | select(.id == ($user_id | tonumber))' "$SIGNATURES_FILE" 2>/dev/null || echo "")
        if [[ -n "$existing_signature" ]]; then
            echo "✅ You have already signed the $COMPONENT_NAME CLA!"
            exit 0
        fi
    fi

    # Create signatures file if it doesn't exist
    if [[ ! -f "$SIGNATURES_FILE" ]]; then
        mkdir -p "$(dirname "$SIGNATURES_FILE")"
        echo '{"signedContributors":[]}' > "$SIGNATURES_FILE"
    fi

    # Create new signature entry
    current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    new_signature=$(jq -n \
        --arg name "$user_name" \
        --arg id "$user_id" \
        --arg created_at "$current_time" \
        --arg repo_id "$REPO_ID" \
        '{
            name: $name,
            id: ($id | tonumber),
            comment_id: "",
            created_at: $created_at,
            repoId: ($repo_id | tonumber),
            pullRequestNo: null
        }')

    # Add signature to the file
    temp_file=$(mktemp)
    jq --argjson new_sig "$new_signature" '.signedContributors += [$new_sig]' "$SIGNATURES_FILE" > "$temp_file"
    mv "$temp_file" "$SIGNATURES_FILE"

    echo "✅ $COMPONENT_NAME CLA signature added successfully!"
    echo "📝 Your signature has been recorded in $SIGNATURES_FILE"
    echo ""
    echo "Next steps:"
    echo "1. Commit the updated signatures file: git add $SIGNATURES_FILE && git commit -m \"add CLA signature for $user_name\""
    echo "2. Push your changes to complete the CLA signing process"
    '''

[plugins]
    swiftformat = "https://github.com/mise-plugins/mise-swiftformat.git"

[settings]
    jobs = 6
    http_timeout = "60"
    experimental = true
    sops.age_key_file = "~/.config/mise/tuist-age.txt"
    sops.strict = false
