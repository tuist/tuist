http:
  routers:
    phx:
      rule: "PathPrefix(`/v2`) || PathPrefix(`/phoenix/live_reload`) || PathPrefix(`/live`) || PathPrefix(`/assets/v2`) || Path(`/api-docs`) || Path(`/api/openapi`) || PathRegexp(`^//?api/cache.*$`)"
      service: phx
      middlewares:
        - strip-double-slash

  services:
    phx:
      loadBalancer:
        servers:
        - url: "http://127.0.0.1:4000/"
        passHostHeader: true

  middlewares:
    strip-double-slash:
      replacePathRegex:
        regex: "^//([^/].*)"
        replacement: "/$$1"
