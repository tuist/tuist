http:
  routers:
    phx:
      rule: "PathPrefix(`/v2`) || PathPrefix(`/phoenix/live_reload`) || PathPrefix(`/live`) || PathPrefix(`/assets/v2`) || Path(`/api-docs`) || Path(`/api/openapi`) || PathPrefix(`/api/cache`) || PathPrefix(`/api/analytics`) || PathPrefix(`/api/projects`) || PathPrefix(`/webhooks/stripe`) || PathPrefix(`/api/organizations`)"
      service: phx

  services:
    phx:
      loadBalancer:
        servers:
        - url: "http://127.0.0.1:4000/"
        passHostHeader: true
