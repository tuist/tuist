version: "1"

# Most Tuist services have moved to Kubernetes (see infra/helm/tuist).
# This file only manages the Render-hosted Noora Storybook. The Slack
# service also runs on Render but is managed manually outside this IaC.

services:
  - type: web
    name: noora-storybook
    region: frankfurt
    runtime: docker
    repo: https://github.com/tuist/tuist
    dockerfilePath: noora/storybook/Dockerfile
    dockerContext: noora
    plan: starter
    numInstances: 1
    autoDeployTrigger: "off"
    previews:
      generation: "off"
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PHX_HOST
        value: storybook.noora.tuist.dev
      - key: PORT
        value: "8080"
    domains:
      - storybook.noora.tuist.dev
