  # ── Preview environment services ──────────────────────────────────────
  # Each PR touching server/** gets an isolated preview with its own
  # PostgreSQL, ClickHouse, and Redis. No MASTER_KEY or encrypted secrets
  # needed — Tuist.Environment.decrypt_secrets() returns %{} and all
  # config falls back to TUIST_* env vars.

  - type: web
    name: tuist-preview
    region: frankfurt
    runtime: docker
    repo: https://github.com/tuist/tuist
    dockerfilePath: server/Dockerfile
    dockerCommand: /app/bin/start-preview
    plan: standard
    numInstances: 1
    previews:
      generation: automatic
    buildFilter:
      paths:
        - server/**
        - tuist_common/**
    envVars:
      - key: MIX_ENV
        value: stag
      - key: TUIST_HOSTED
        value: 0
      - key: TUIST_USE_SSL_FOR_DATABASE
        value: 0
      - key: TUIST_DATABASE_POOL_SIZE
        value: 5
      # ClickHouse runs embedded in the web container (installed when TUIST_HOSTED=0).
      # S3 config — required for the app to boot (runtime.exs unconditionally parses s3_endpoint).
      # These are placeholder values; file storage won't work until real credentials are set.
      - key: TUIST_S3_ENDPOINT
        value: http://localhost:9095
      - key: TUIST_S3_ACCESS_KEY_ID
        value: placeholder
      - key: TUIST_S3_SECRET_ACCESS_KEY
        value: placeholder
      - key: TUIST_S3_BUCKET_NAME
        value: tuist-preview
      - key: TUIST_S3_REGION
        value: auto
      - key: TUIST_SECRET_KEY_BASE
        generateValue: true
      - key: TUIST_SECRET_KEY_PASSWORD
        generateValue: true
      - key: TUIST_SECRET_KEY_TOKENS
        generateValue: true
      - key: TUIST_SECRET_KEY_ENCRYPTION
        generateValue: true
      - key: TUIST_LICENSE_KEY
        sync: false
      - key: RELEASE_COOKIE
        generateValue: true
      - fromDatabase:
          name: tuist-preview-db
          property: connectionString
        key: DATABASE_URL
      # TODO: Configure these for full functionality in previews.
      # For login/auth, set GitHub OAuth credentials (can share staging values):
      #   TUIST_GITHUB_APP_CLIENT_ID, TUIST_GITHUB_APP_CLIENT_SECRET
      # For file storage, set S3/Tigris credentials:
      #   TUIST_S3_ACCESS_KEY_ID, TUIST_S3_SECRET_ACCESS_KEY,
      #   TUIST_S3_BUCKET_NAME, TUIST_S3_ENDPOINT, TUIST_S3_REGION
      # For Redis (rate limiting, feature flags):
      #   REDIS_URL (from the preview-redis keyvalue store)

  # - type: keyvalue
  #   name: tuist-preview-redis
  #   plan: starter
  #   region: frankfurt
  #   maxmemoryPolicy: allkeys-lru
  #   ipAllowList: []

databases:
  - name: tuist-preview-db
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "16"
    previewPlan: basic-256mb
