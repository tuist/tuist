# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[bump]
initial_tag = "0.1.0"

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
## What's Changed

{%- if version %} in {{ version }}{%- endif -%}
<!-- RELEASE NOTES START -->
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
  * {{ commit.message | split(pat="\n") | first | trim }}
{%- endfor -%}
{% endfor %}

{% if version %}
    {% if previous.version %}
      **Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}
    {% endif %}
{% else -%}
  {% raw %}\n{% endraw %}
{% endif %}

{%- macro remote_url() -%}
  https://github.com/tuist/tuist
{%- endmacro -%}
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""
postprocessors = [
    { pattern = '\* (feat|fix|docs?|perf|refactor|style|test|chore|ci)(\([^)]*\))?:\s*', replace = "* " },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
    # Linkify (#123) PR refs straight from commit messages.
    # [remote.github] is intentionally unset so git-cliff makes no GitHub API
    # calls per release (each would paginate the whole repo's commits+PRs).
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/tuist/tuist/pull/${1}))" },
]
# Type-only parsers, path filtering via `--include-path
# "grafana-datasource/**/*"` in the release workflow. Any conventional
# commit touching the plugin path triggers a bump regardless of the
# commit's scope tag — a `fix(server):` PR that also changes the plugin
# still releases it. Mirrors the infra/runners-controller cliff.
commit_parsers = [
    { message = "^feat(\\([^)]*\\))?", group = "<!-- 0 -->⛰️  Features" },
    { message = "^fix(\\([^)]*\\))?", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^docs?(\\([^)]*\\))?", group = "<!-- 3 -->📚 Documentation" },
    { message = "^perf(\\([^)]*\\))?", group = "<!-- 4 -->⚡ Performance" },
    { message = "^refactor(\\([^)]*\\))?", group = "<!-- 2 -->🚜 Refactor" },
    { message = "^style(\\([^)]*\\))?", group = "<!-- 5 -->🎨 Styling" },
    { message = "^test(\\([^)]*\\))?", group = "<!-- 6 -->🧪 Testing" },
    { message = "^chore(\\([^)]*\\))?", skip = true },
    { message = "^ci(\\([^)]*\\))?", skip = true },
    { message = "^[a-z]+\\([^)]+\\)", skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "grafana-datasource@[0-9].*"
skip_tags = "beta|alpha"
# Match the release-candidate version suffix only. An unanchored "rc" also
# matches the "rc" in "datasou(rc)e", so git-cliff ignored the
# grafana-datasource@x.y.z tags and never bumped past the initial version.
ignore_tags = "-rc"
topo_order = false
sort_commits = "newest"
