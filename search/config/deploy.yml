service: tuist-search

image: tuist-search

servers:
  web:
    hosts:
      - 91.99.179.13

registry:
  server: localhost:5000

proxy:
  ssl: true
  host: search.tuist.dev
  app_port: 8108
  healthcheck:
    path: /health
    interval: 3
    timeout: 5

env:
  clear:
    TYPESENSE_DATA_DIR: /data
    TYPESENSE_ENABLE_CORS: "true"
  secret:
    - TYPESENSE_API_KEY

volumes:
  - /data/typesense:/data

builder:
  arch: arm64
