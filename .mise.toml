[tools]
"elixir" = "1.18.3"
"flyctl" = "0.3.41"
"erlang" = "27.3.2"
"npm:prettier" = "3.4.2"
"pnpm" = "10.5.2"
"clickhouse" = "25.5.1"
sops = "3.9.3"
"ubi:aquasecurity/trivy" = "0.63.0"

[hooks]
postinstall = "mise run install"

[env]
TUIST_HOSTED = 1
ERL_AFLAGS = "-kernel shell_history enabled -kernel shell_history_file_bytes 1024000"
_.file = ".env.dev.json"

[settings]
sops.age_key_file = "~/.config/mise/tuist-server-dev-age.txt"
