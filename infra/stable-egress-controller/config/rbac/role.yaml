apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stable-egress-controller
rules:
  # Watch candidate nodes and move the active gateway label between them.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Leader election.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
