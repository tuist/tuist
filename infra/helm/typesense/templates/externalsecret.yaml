{{- if .Values.runtimeSecrets.externalSecret.enabled }}
{{- $apiKeyRef := required "runtimeSecrets.externalSecret.apiKeyRef is required when runtimeSecrets.externalSecret.enabled is true" .Values.runtimeSecrets.externalSecret.apiKeyRef -}}
{{- $githubTokenRef := required "runtimeSecrets.externalSecret.githubTokenRef is required when runtimeSecrets.externalSecret.enabled is true" .Values.runtimeSecrets.externalSecret.githubTokenRef -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "typesense.runtimeSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "typesense.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  refreshInterval: {{ .Values.runtimeSecrets.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.runtimeSecrets.externalSecret.storeRef.name }}
    kind: {{ .Values.runtimeSecrets.externalSecret.storeRef.kind }}
  target:
    name: {{ include "typesense.runtimeSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TYPESENSE_API_KEY: "{{ `{{ .API_KEY | trim }}` }}"
        GITHUB_TOKEN: '{{ `{{ .GITHUB_TOKEN | default "" | trim }}` }}'
  data:
    - secretKey: API_KEY
      remoteRef:
        key: {{ $apiKeyRef | quote }}
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: {{ $githubTokenRef | quote }}
{{- end }}
