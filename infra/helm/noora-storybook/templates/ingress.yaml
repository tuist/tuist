{{- if .Values.ingress.enabled }}
{{- $host := required "ingress.host is required when ingress.enabled is true" .Values.ingress.host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "noora-storybook.fullname" . }}
  labels:
    {{- include "noora-storybook.labels" . | nindent 4 }}
    app.kubernetes.io/component: storybook
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if .Values.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName | quote }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "noora-storybook.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
