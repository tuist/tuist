{{- $secretName := include "noora-storybook.fullname" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if and $existingSecret $existingSecret.data }}
  {{- $existingData = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "noora-storybook.labels" . | nindent 4 }}
    app.kubernetes.io/component: storybook
type: Opaque
stringData:
  secret-key-base: {{ .Values.secretKeyBase | default (get $existingData "secret-key-base" | default "" | b64dec) | default (randAlphaNum 64) | quote }}
