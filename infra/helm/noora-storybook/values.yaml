global:
  commonLabels: {}
  podLabels: {}
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/tuist/noora-storybook
  tag: ""
  pullPolicy: IfNotPresent

secretKeyBase: ""

# Optional explicit PHX_HOST override. When unset, the Deployment falls back to
# ingress.host.
host: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

ingress:
  enabled: false
  className: ""
  host: ""
  tlsSecretName: ""
  annotations: {}

certificate:
  enabled: false
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: ""

resources: {}
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
extraEnv: []
extraEnvFrom: []
podAnnotations: {}
podLabels: {}
affinity: {}
nodeSelector: {}
tolerations: []
terminationGracePeriodSeconds: 30
networkPolicy:
  enabled: false
  ingressControllerNamespace: platform
  ingressControllerPodLabels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
  dnsNamespace: kube-system

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 60
