{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "alloy.secretName" . }}
  labels:
    {{- include "alloy.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ include "alloy.secretName" . }}
    creationPolicy: Owner
    # Trim trailing whitespace from 1P values (pasted via web UI occasionally
    # get a newline appended). Grafana Cloud tokens are byte-strict, a stray
    # \n produces a 401 with no useful error body.
    template:
      engineVersion: v2
      data:
        PROMETHEUS_TOKEN: "{{ `{{ .PROMETHEUS_TOKEN | trim }}` }}"
        LOKI_TOKEN: "{{ `{{ .LOKI_TOKEN | trim }}` }}"
        TEMPO_TOKEN: "{{ `{{ .TEMPO_TOKEN | trim }}` }}"
  data:
    - secretKey: PROMETHEUS_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.grafanaCloud.prometheus.token.item .Values.grafanaCloud.prometheus.token.field | quote }}
    - secretKey: LOKI_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.grafanaCloud.loki.token.item .Values.grafanaCloud.loki.token.field | quote }}
    - secretKey: TEMPO_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.grafanaCloud.tempo.token.item .Values.grafanaCloud.tempo.token.field | quote }}
{{- end }}
