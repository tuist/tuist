# Alloy overlay for the canary workload cluster.
# Install with:
#   helm upgrade --install alloy infra/helm/alloy \
#     -n observability --create-namespace \
#     -f infra/helm/alloy/values-canary.yaml

env: canary

scrape:
  targets:
    - address: tuist-tuist-server.tuist-canary.svc.cluster.local:9091
      instance: canary

podDiscovery:
  namespaces:
    - tuist-canary
