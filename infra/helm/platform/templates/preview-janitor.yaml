{{- with .Values.previewJanitor }}
{{- if .enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: preview-janitor-script
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: preview-janitor
    app.kubernetes.io/component: preview-cleanup
data:
  preview-janitor.sh: |
{{ $.Files.Get "files/preview-janitor.sh" | indent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .serviceAccount.name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: preview-janitor
    app.kubernetes.io/component: preview-cleanup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preview-janitor
  labels:
    app.kubernetes.io/name: preview-janitor
    app.kubernetes.io/component: preview-cleanup
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["kura.tuist.dev"]
    resources: ["kurainstances"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preview-janitor
  labels:
    app.kubernetes.io/name: preview-janitor
    app.kubernetes.io/component: preview-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: preview-janitor
subjects:
  - kind: ServiceAccount
    name: {{ .serviceAccount.name | quote }}
    namespace: {{ $.Release.Namespace | quote }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: preview-janitor
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: preview-janitor
    app.kubernetes.io/component: preview-cleanup
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .startingDeadlineSeconds }}
  suspend: {{ .suspend }}
  jobTemplate:
    spec:
      backoffLimit: {{ .backoffLimit }}
      activeDeadlineSeconds: {{ .activeDeadlineSeconds }}
      template:
        metadata:
          annotations:
            checksum/script: {{ $.Files.Get "files/preview-janitor.sh" | sha256sum | quote }}
          labels:
            app.kubernetes.io/name: preview-janitor
            app.kubernetes.io/component: preview-cleanup
        spec:
          serviceAccountName: {{ .serviceAccount.name | quote }}
          automountServiceAccountToken: true
          restartPolicy: Never
          {{- with .nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: janitor
              image: {{ printf "%s:%s" .image.repository .image.tag | quote }}
              imagePullPolicy: {{ .image.pullPolicy | quote }}
              env:
                - name: KURA_NAMESPACE
                  value: {{ .kuraNamespace | quote }}
                - name: STUCK_CREATE_AGE_SECONDS
                  value: {{ .stuckCreateAgeSeconds | quote }}
                - name: TEARDOWN_TIMEOUT
                  value: {{ .teardownTimeout | quote }}
              command:
                - /scripts/preview-janitor.sh
              resources:
                {{- toYaml .resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: script
                  mountPath: /scripts/preview-janitor.sh
                  subPath: preview-janitor.sh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: script
              configMap:
                name: preview-janitor-script
                defaultMode: 0555
            - name: tmp
              emptyDir: {}
{{- end }}
{{- end }}
