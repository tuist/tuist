# Production workload-cluster overlay. Loaded by k8s:install-platform when
# CLUSTER_NAME=tuist.

# Stable outbound source IP for hosted Tuist server traffic that reaches
# customer infrastructure (for example GHES instances behind IP allowlists).
# The IP is a Hetzner Floating IP in the tuist-workloads project. The gateway
# role lives on the dedicated ≥2-node `md-egress` pool (see
# cluster-production.yaml), whose nodes self-apply the
# `tuist.dev/stable-egress-candidate=server` label at kubelet registration. The
# failover controller keeps the Floating IP + the active gateway label on one
# Ready candidate and fails over on node loss — so a node replacement
# self-heals in seconds, instead of the manual failover that caused the
# 2026-06-14 outage.
ciliumEgressGateway:
  server:
    enabled: true
    namespace: tuist
    egressIP: 116.202.0.10
    hostConfigurator:
      enabled: true
    failoverController:
      # Stays false until its prerequisites are met, so merging this never
      # points production at a missing/mutable image or starts an unplanned
      # gateway cutover. Flip to true (separate change) only after:
      #   1. go.sum is committed and the controller image is released + the
      #      `image.tag` below is pinned to that semver (not `latest`);
      #   2. the md-egress nodes are Ready and carry the candidate label;
      #   3. you're ready for the one-time IP/label cutover off the current
      #      hand-labelled gateway node (see the platform README runbook).
      enabled: false
      # Pinned to a released semver (never `latest` in prod). release.yml
      # publishes the ghcr tag; Renovate tracks it and opens the bump PR (see
      # renovate.json), which the platform chart deploy rolls out on merge.
      # 0.1.0 is the controller's initial_version — it exists once the first
      # release runs; keep enabled:false until then.
      image:
        # renovate: datasource=docker depName=ghcr.io/tuist/tuist-stable-egress-controller
        tag: 0.1.0
      floatingIpName: tuist-production-server-egress
      # Reserved egress pool customers allowlist. Active egress only ever
      # originates from an IP in this set; growing capacity / migrating the
      # active IP within it never touches a customer allowlist. Operator:
      # reserve the additional Floating IPs in the tuist-workloads project,
      # add their /32s here AND to the customer network guide, before they are
      # ever used. Today only 116.202.0.10 is provisioned.
      egressIpAllowlist:
        - 116.202.0.10/32

# Main Tuist web/API ingress. Keep the Hetzner location explicit here instead
# of deriving it from Nodes: production also carries regional Kura pools, and
# the platform LoadBalancer should stay with the fsn1 general pool.
ingress-nginx:
  controller:
    service:
      annotations:
        load-balancer.hetzner.cloud/location: fsn1
        load-balancer.hetzner.cloud/node-selector: topology.kubernetes.io/region=fsn1

# Dedicated Kura ingress dataplanes. These are shared per region, not
# per customer: customer-specific hosts route through the regional
# ingress class and then to the selected Kura pod. Keep the controller
# pods on the same regional Kura pools so the Hetzner LoadBalancer,
# ingress-nginx, and Kura pods stay local to the region.
kura-eu-central-ingress-nginx:
  enabled: true
  controller:
    nodeSelector:
      node.cluster.x-k8s.io/pool: kura
    service:
      annotations:
        load-balancer.hetzner.cloud/location: fsn1
        load-balancer.hetzner.cloud/name: tuist-kura-eu-central-ingress
        load-balancer.hetzner.cloud/node-selector: node.cluster.x-k8s.io/pool=kura
        load-balancer.hetzner.cloud/uses-proxyprotocol: "true"

kura-us-east-ingress-nginx:
  enabled: true
  controller:
    nodeSelector:
      node.cluster.x-k8s.io/pool: kura-us-east
    service:
      annotations:
        load-balancer.hetzner.cloud/location: ash
        load-balancer.hetzner.cloud/name: tuist-kura-us-east-ingress
        load-balancer.hetzner.cloud/node-selector: node.cluster.x-k8s.io/pool=kura-us-east
        load-balancer.hetzner.cloud/uses-proxyprotocol: "true"

kura-us-west-ingress-nginx:
  enabled: true
  controller:
    nodeSelector:
      node.cluster.x-k8s.io/pool: kura-us-west
    service:
      annotations:
        load-balancer.hetzner.cloud/location: hil
        load-balancer.hetzner.cloud/name: tuist-kura-us-west-ingress
        load-balancer.hetzner.cloud/node-selector: node.cluster.x-k8s.io/pool=kura-us-west
        load-balancer.hetzner.cloud/uses-proxyprotocol: "true"
