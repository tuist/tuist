# Canary workload-cluster overlay. Loaded by k8s:install-platform when
# CLUSTER_NAME=tuist-canary.

# Stable outbound source IP for canary Tuist server traffic. The gateway runs HA
# across the md-egress pool (see cluster-canary.yaml): the failover controller
# keeps the Floating IP + active label on one Ready node; the host-configurer
# configures eth0 on it. Mirrors prod/staging so the flow is exercised in the
# deployment cascade before production.
ciliumEgressGateway:
  server:
    enabled: true
    namespace: tuist-canary
    egressIP: 78.47.174.50
    hostConfigurator:
      enabled: true
    failoverController:
      enabled: true
      # Image tag resolved at deploy time by k8s:install-platform.
      floatingIpName: tuist-canary-server-egress
      egressIpAllowlist:
        - 78.47.174.50/32

ingress-nginx:
  controller:
    service:
      annotations:
        load-balancer.hetzner.cloud/location: fsn1
        load-balancer.hetzner.cloud/node-selector: topology.kubernetes.io/region=fsn1

kura-eu-central-ingress-nginx:
  enabled: true
  controller:
    # eu-central is cut over to the Dedibox bare-metal box: the regional gateway
    # runs on the box's host network so serving traffic hits the box NIC directly
    # (Dedibox has no Hetzner LB). The DaemonSet binds one nginx per cache node;
    # reportNodeInternalIp publishes the box's public IP (its node InternalIP)
    # into each Ingress status so external-dns resolves the per-account hosts to
    # the box.
    kind: DaemonSet
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    reportNodeInternalIp: true
    # Direct client connections on this hostNetwork path: no Hetzner LB adds a
    # PROXY header, so the shared regional default (use-proxy-protocol: true)
    # would mangle every connection. Turn it off here.
    config:
      use-proxy-protocol: "false"
    nodeSelector:
      node.cluster.x-k8s.io/pool: kura-dedibox
    tolerations:
      - key: tuist.dev/kura-cache
        operator: Exists
        effect: NoSchedule
    publishService:
      enabled: false
    service:
      type: ClusterIP
      externalTrafficPolicy: ""
      annotations: {}
