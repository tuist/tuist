apiVersion: v2
name: tuist-platform
description: >
  Platform-level Helm chart installed once per Tuist-managed Kubernetes cluster.
  Bundles cert-manager, ingress-nginx, external-dns (Cloudflare) and
  external-secrets-operator as dependencies, plus the ClusterIssuer and
  shared Secrets that wire them together.
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: cert-manager
    version: v1.16.2
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: ingress-nginx
    version: 4.11.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled
  - name: external-dns
    version: 1.15.0
    repository: https://kubernetes-sigs.github.io/external-dns
    condition: external-dns.enabled
  - name: external-secrets
    version: 2.3.0  # matches Apalla on the existing workload clusters; ships ESO with the onepasswordSDK provider (added in 0.13+)
    repository: https://charts.external-secrets.io
    condition: external-secrets.enabled
