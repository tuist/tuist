apiVersion: v2
name: tuist-platform
description: >
  Platform-level Helm chart installed once per Tuist-managed Kubernetes cluster.
  Bundles cert-manager, ingress-nginx, external-dns (Cloudflare),
  external-secrets-operator, metrics-server, and cloudnative-pg as
  dependencies, plus the ClusterIssuer and shared Secrets that wire
  them together.
type: application
version: 0.2.0
appVersion: "0.2.0"
dependencies:
  - name: cert-manager
    version: v1.16.2
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: ingress-nginx
    version: 4.11.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled
  - name: ingress-nginx
    alias: kura-eu-central-ingress-nginx
    version: 4.11.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: kura-eu-central-ingress-nginx.enabled
  - name: ingress-nginx
    alias: kura-ca-east-ingress-nginx
    version: 4.11.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: kura-ca-east-ingress-nginx.enabled
  - name: ingress-nginx
    alias: kura-us-east-ingress-nginx
    version: 4.11.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: kura-us-east-ingress-nginx.enabled
  - name: ingress-nginx
    alias: kura-us-west-ingress-nginx
    version: 4.11.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: kura-us-west-ingress-nginx.enabled
  - name: external-dns
    version: 1.15.0
    repository: https://kubernetes-sigs.github.io/external-dns
    condition: external-dns.enabled
  - name: external-secrets
    version: 2.3.0  # ships ESO with the onepasswordSDK provider (added in 0.13+)
    repository: https://charts.external-secrets.io
    condition: external-secrets.enabled
  - name: metrics-server
    version: 3.12.2
    repository: https://kubernetes-sigs.github.io/metrics-server/
    condition: metrics-server.enabled
  - name: cloudnative-pg
    version: 0.28.3
    repository: https://cloudnative-pg.github.io/charts
    condition: cloudnative-pg.enabled
  - name: plugin-barman-cloud
    version: 0.7.0
    repository: https://cloudnative-pg.github.io/charts
    condition: plugin-barman-cloud.enabled
