# Platform-level values for the Tuist-managed Kubernetes cluster.
# This chart is installed once per cluster (staging / production), not per app release.
#
# Install:
#   helm dependency update infra/helm/platform
#   helm upgrade --install platform infra/helm/platform \
#     -n platform --create-namespace \
#     --set cloudflare.apiTokenSecret.create=false \
#     --set cloudflare.email=ops@tuist.dev
#
# The Cloudflare API token is expected in a pre-existing Secret in the platform
# namespace (see infra/k8s/onboarding.md for the bootstrap commands).

# Cloudflare wiring shared by cert-manager (DNS-01 ACME) and external-dns.
cloudflare:
  email: ops@tuist.dev
  # Name + key of the Secret that holds the Cloudflare API token. The chart
  # does not create this Secret; create it out-of-band so the token never
  # lands in values / helm history. Token must have Zone.DNS:Edit scope on
  # the tuist.dev zone (and any other managed zones).
  apiTokenSecret:
    name: cloudflare-api-token
    key: api-token

# Lets Encrypt account email for certificates issued by cert-manager.
letsencrypt:
  email: ops@tuist.dev

cert-manager:
  enabled: true
  installCRDs: true
  prometheus:
    enabled: true

ingress-nginx:
  enabled: true
  controller:
    replicaCount: 2
    publishService:
      enabled: true
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
      # Provider-specific LB annotations are set via overlays so this base
      # chart stays portable (see values-hetzner.yaml). Leaving annotations
      # empty here means any cloud provider's default LB controller will
      # provision a plain public LB with its own defaults — works everywhere,
      # but without provider-native features like PROXY protocol.
      annotations: {}
    # Proxy protocol is a Hetzner-oriented default because that's where the
    # managed Tuist cluster runs. Other providers should disable these in
    # their own overlay when their LB doesn't pass through PROXY headers.
    #
    # upstream-keepalive-timeout must stay below Bandit's
    # thousand_island_options.read_timeout (15s in server/config/runtime.exs).
    # Otherwise nginx reuses a connection the backend has already FIN'd,
    # producing 502s with Bandit `reason=protocol_error`.
    config:
      use-forwarded-headers: "true"
      use-proxy-protocol: "true"
      compute-full-forwarded-for: "true"
      upstream-keepalive-timeout: "10"
    metrics:
      enabled: true

external-dns:
  enabled: true
  provider: cloudflare
  sources:
    - service
    - ingress
  # Must be unique per workload cluster because several managed clusters
  # write records under tuist.dev. The bootstrap task overrides this with
  # "<cluster-name>-platform".
  txtOwnerId: tuist-platform
  # Limit which records external-dns will touch; be explicit for prod safety.
  domainFilters:
    - tuist.dev
  policy: sync
  cloudflare:
    # Reference the Cloudflare API token Secret created out-of-band. The
    # external-dns chart accepts env from an existing Secret under env[].
    apiTokenType: token
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: api-token

external-secrets:
  enabled: true
  installCRDs: true
  webhook:
    port: 9443

# Backs the pods.metrics.k8s.io API the HPA reads. Without it, HPAs report
# `FailedGetResourceMetric` and refuse to scale.
# --kubelet-insecure-tls because kubeadm kubelets serve a self-signed cert
# the kube-apiserver CA can't validate (CSR auto-approval is opt-in).
metrics-server:
  enabled: true
  args:
    - --kubelet-insecure-tls
  resources:
    requests:
      cpu: 50m
      memory: 80Mi
    limits:
      cpu: 200m
      memory: 200Mi

# CloudNativePG — operator that owns the postgresql.cnpg.io/v1 Cluster +
# Backup + ScheduledBackup CRs the Tuist chart renders. Installed
# cluster-wide on every workload cluster so the next `helm upgrade
# tuist` can declare a Cluster without an out-of-band step.
#
# Self-hosters running the Tuist chart with `postgresql.mode: embedded`
# (the default) or `postgresql.mode: external` don't need this — flip
# it off in the same overlay that flips the Tuist chart's
# `postgresql.mode` off the cnpg path.
cloudnative-pg:
  enabled: true
  # PodMonitor stays off: managed clusters run Grafana Alloy via
  # k8s-monitoring with annotation autodiscovery
  # (prometheus.io/scrape + prometheus.io/port), not prometheus-operator,
  # so the `monitoring.coreos.com/v1` PodMonitor CRD isn't installed.
  # Enabling this would crash `helm upgrade platform` with
  # "no matches for kind PodMonitor".
  monitoring:
    podMonitorEnabled: false

# Whether to emit the ClusterIssuer template below. Turn off if you manage
# cert-manager issuers with a separate GitOps process.
clusterIssuer:
  enabled: true
  name: letsencrypt-cloudflare
  server: https://acme-v02.api.letsencrypt.org/directory
