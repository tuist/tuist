# The external-dns DNSEndpoint CRD, installed so external-dns can run with the
# `crd` source. The kura-controller emits DNSEndpoints to publish each
# host-network region's public peer host to the region's failover IP (a
# bare-metal peer plane has no LoadBalancer for the service source to read).
# Upstream: github.com/kubernetes-sigs/external-dns docs/contributing/crd-source.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnsendpoints.externaldns.k8s.io
spec:
  group: externaldns.k8s.io
  names:
    kind: DNSEndpoint
    listKind: DNSEndpointList
    plural: dnsendpoints
    singular: dnsendpoint
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                endpoints:
                  type: array
                  items:
                    type: object
                    properties:
                      dnsName:
                        type: string
                      targets:
                        type: array
                        items:
                          type: string
                      recordType:
                        type: string
                      recordTTL:
                        type: integer
                        format: int64
                      labels:
                        type: object
                        additionalProperties:
                          type: string
                      providerSpecific:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            value:
                              type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
