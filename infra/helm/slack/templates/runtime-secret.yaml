{{- if not .Values.runtimeSecrets.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "slack.runtimeSecretName" . }}
  labels:
    {{- include "slack.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
type: Opaque
stringData:
  SLACK_ADMIN_USERNAME: {{ required "runtimeSecrets.inline.adminUsername is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.adminUsername | quote }}
  SLACK_ADMIN_PASSWORD: {{ required "runtimeSecrets.inline.adminPassword is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.adminPassword | quote }}
  TURNSTILE_SITE_KEY: {{ required "runtimeSecrets.inline.turnstileSiteKey is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.turnstileSiteKey | quote }}
  TURNSTILE_SECRET_KEY: {{ required "runtimeSecrets.inline.turnstileSecretKey is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.turnstileSecretKey | quote }}
  MAILGUN_API_KEY: {{ required "runtimeSecrets.inline.mailgunApiKey is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.mailgunApiKey | quote }}
  SLACK_INVITE_URL: {{ required "runtimeSecrets.inline.slackInviteUrl is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.slackInviteUrl | quote }}
  SLACK_BOT_TOKEN: {{ .Values.runtimeSecrets.inline.slackBotToken | default "" | quote }}
  SLACK_CHANNEL_ID: {{ .Values.runtimeSecrets.inline.slackChannelId | default "" | quote }}
{{- end }}
