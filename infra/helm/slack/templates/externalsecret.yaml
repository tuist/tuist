{{- if .Values.runtimeSecrets.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "slack.runtimeSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slack.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  refreshInterval: {{ .Values.runtimeSecrets.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.runtimeSecrets.externalSecret.storeRef.name }}
    kind: {{ .Values.runtimeSecrets.externalSecret.storeRef.kind }}
  target:
    name: {{ include "slack.runtimeSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SLACK_ADMIN_USERNAME: "{{ `{{ .ADMIN_USERNAME | trim }}` }}"
        SLACK_ADMIN_PASSWORD: "{{ `{{ .ADMIN_PASSWORD | trim }}` }}"
        TURNSTILE_SITE_KEY: "{{ `{{ .TURNSTILE_SITE_KEY | trim }}` }}"
        TURNSTILE_SECRET_KEY: "{{ `{{ .TURNSTILE_SECRET_KEY | trim }}` }}"
        MAILGUN_API_KEY: "{{ `{{ .MAILGUN_API_KEY | trim }}` }}"
        SLACK_INVITE_URL: "{{ `{{ .SLACK_INVITE_URL | trim }}` }}"
        SLACK_BOT_TOKEN: "{{ `{{ .SLACK_BOT_TOKEN | trim }}` }}"
        SLACK_CHANNEL_ID: "{{ `{{ .SLACK_CHANNEL_ID | trim }}` }}"
  data:
    - secretKey: ADMIN_USERNAME
      remoteRef:
        key: {{ printf "%s/%s" (required "runtimeSecrets.externalSecret.item is required when runtimeSecrets.externalSecret.enabled is true" .Values.runtimeSecrets.externalSecret.item) .Values.runtimeSecrets.externalSecret.fields.adminUsername | quote }}
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.adminPassword | quote }}
    - secretKey: TURNSTILE_SITE_KEY
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.turnstileSiteKey | quote }}
    - secretKey: TURNSTILE_SECRET_KEY
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.turnstileSecretKey | quote }}
    - secretKey: MAILGUN_API_KEY
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.mailgunApiKey | quote }}
    - secretKey: SLACK_INVITE_URL
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.slackInviteUrl | quote }}
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.slackBotToken | quote }}
    - secretKey: SLACK_CHANNEL_ID
      remoteRef:
        key: {{ printf "%s/%s" .Values.runtimeSecrets.externalSecret.item .Values.runtimeSecrets.externalSecret.fields.slackChannelId | quote }}
{{- end }}
