{{- /*
ClusterRoleBindings that grant the impersonated identities the
right tier. Pomerium injects `Impersonate-Group: <name>` based on
the user's tailnet role + active elevation; the bindings here are
what makes those group names mean something to the apiserver.

The chart that introduces the groups (this one) owns the bindings
for them, so deploying this chart to a fresh cluster gets the
identity → RBAC story end-to-end with no external dependency.

Tier shape (matches what tuist-ops's PolicyController returns):

  tuist-admins         → view   (Owner / Admin tailnet role)
  tuist-eng            → view   (Member tailnet role)
  tuist-<env>-write    → edit   (elevation grant; per-env so a
                                 prod elevation can't unlock
                                 staging or vice versa)

View tier excludes Secrets by Kubernetes' built-in role definition.
Edit allows reads/writes on Secrets + most resources but cannot
mutate RBAC.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuist-admins-view
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: tuist-admins
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuist-eng-view
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: tuist-eng
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuist-{{ .Values.tuistEnv }}-write-edit
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: Group
    name: tuist-{{ .Values.tuistEnv }}-write
    apiGroup: rbac.authorization.k8s.io
---
# Read-only extension to the `view` tier. The upstream `view` ClusterRole
# omits cluster-scoped and custom resources, so a view-tier identity (every
# member + their agents) can't observe the infra it routinely needs to:
# nodes, CAPI machines, our Scaleway provider CRs, the Kura CRs, CRDs, and
# RBAC objects. This aggregates into `view` via the label below (no extra
# binding; both tuist-admins and tuist-eng inherit it), and is strictly
# `get`/`list`/`watch` with no `secrets` rule, so the view tier's deliberate
# Secret exclusion is untouched. None of these resource kinds embed secret
# data (CAPI/Kura reference Secrets by name, never inline).
#
# RBAC read (clusterroles/rolebindings) is the one deliberate widening of the
# upstream `view` shape: it exposes the authorization graph, which `view`
# normally hides as anti-recon. We accept that here because the whole
# cluster-access design contains agents on *mutation*, not reads, and being
# able to diagnose a `NotFound`/misbound RBAC object during a deploy is worth
# more than hiding the grant list from a read-only identity. Still read-only,
# still no Secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuist-view-infra-read
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups:
      - cluster.x-k8s.io
      - infrastructure.cluster.x-k8s.io
      - kura.tuist.dev
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch"]
---
# Write extension to the `edit` tier, the mutate analog of
# `tuist-view-infra-read`. The upstream `edit` ClusterRole covers core/apps
# resources but not custom resources, so a JIT-elevated `tuist-<env>-write`
# identity can mutate Pods/StatefulSets/PVCs yet not the server-managed Kura
# CRs (KuraInstance). Those are reconciled from the control plane,
# so operators normally leave them alone — but a region cutover or cleanup
# sometimes needs to recreate them so they re-render (e.g. onto a new node
# pool). This aggregates into `edit` so an active write elevation can do that
# without the break-glass kubeconfig. Scoped to `kura.tuist.dev`. Broader
# CAPI/infra writes stay withheld from the edit tier; the one narrow host-
# recovery exception (`tuist-fleet-unwedge` below) is bound straight to the
# write-elevation group rather than aggregated here, so machine-delete never
# rides along on the generic `edit` tier. Scaling or tearing down a fleet
# remains a break-glass action.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuist-edit-kura-write
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
rules:
  - apiGroups: ["kura.tuist.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
---
# Host-recovery capability for UN-WEDGING a single fleet host without the
# break-glass kubeconfig. A tart-kubelet host whose drift roll can't reach it
# (the runner-mini SSH accept-backlog wedge) exhausts its retry budget, its
# ScalewayAppleSiliconMachine goes terminal (`TartKubeletUpdateExceededRetries`)
# and the drift loop stops — the host is then stranded on its old config until
# an operator either recreates the CAPI Machine (the MachineSet reprovisions a
# fresh host) or clears the terminal status so the loop resumes. Both were
# break-glass-only because the base `edit` tier keeps CAPI/infra CRs read-only.
#
# Unlike `tuist-edit-kura-write`, this is NOT aggregated into `edit`. It is
# bound directly to the `tuist-<env>-write` elevation group below. `delete
# machines` is sensitive enough that it must not ride along on the generic
# `edit` role, which anyone could later grant to a service account or a team's
# namespace via a RoleBinding — those grantees would silently inherit host
# deletion. A direct binding keeps the capability welded to an active,
# TTL-bounded, audited write elevation and nothing else.
#
# Deliberately narrow: this is host recovery, not fleet management.
#   * `machines` delete only. Every machine in the workload cluster is
#     MachineSet-owned (the control plane lives in the mgmt cluster), so a
#     delete can only recreate a worker host, never a control-plane node.
#     machinesets/machinedeployments are untouched — scaling or tearing down a
#     fleet stays a break-glass action.
#   * scalewayapplesiliconmachines (+/status) update/patch — clear the terminal
#     failure so the drift loop retries. No delete: the CAPI Machine delete
#     cascades to the infra machine on its own.
#   * nodes update/patch + pods/eviction create — cordon and drain the host
#     before deleting it, matching the recreate runbook.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuist-fleet-unwedge
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["machines"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["scalewayapplesiliconmachines", "scalewayapplesiliconmachines/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
# Bind the host-recovery role straight to this env's write-elevation group, so
# the machine-unwedge capability lives ONLY on an active `tuist-<env>-write`
# elevation — never on the generic `edit` tier. Per-env like the edit binding
# above, so a prod elevation can't unwedge a staging host or vice versa.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuist-{{ .Values.tuistEnv }}-write-fleet-unwedge
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tuist-fleet-unwedge
subjects:
  - kind: Group
    name: tuist-{{ .Values.tuistEnv }}-write
    apiGroup: rbac.authorization.k8s.io
---
# Live-debug extension to the `edit` tier — the capabilities an operator reaches
# for when a pod or node is misbehaving and reads alone can't narrow the cause.
# The upstream `edit` role already covers `pods/exec` (a shell in the container),
# but two gaps bite during the incidents this elevation exists for:
#
#   * `pods/ephemeralcontainers` → `kubectl debug`. The Kura pods (and most of
#     our images) are distroless, so `exec` lands in a container with no shell
#     and no `curl` — useless for "curl the instance's own metrics/health
#     endpoint from inside." An ephemeral debug container shares the target
#     pod's network namespace, so it can `curl localhost:<port>` against the
#     process even when the pod is not Ready and even though the per-tenant
#     NetworkPolicy blocks the apiserver from pod-proxying it directly.
#
#   * `nodes/proxy` (get) → the kubelet's read endpoints (`/stats/summary`,
#     `/metrics`) on the node hosting the pod. This is the "is it disk, or the
#     algorithm?" question answered without SSH: kubelet stats report the node's
#     filesystem + resource pressure. Host-level, so unaffected by pod
#     NetworkPolicies. Scoped to `get` only — POST/`create` through the kubelet
#     proxy would be a second exec path, and it's not needed to read stats.
#
# Aggregates into `edit`, which only the JIT-elevated `tuist-<env>-write` group
# binds to, so both are gated behind an active `/elevate` (TTL-bounded, audited)
# and never available to the always-on view tier. Both are genuine privilege
# boundaries — `kubectl debug` mutates a running pod, and `nodes/proxy` reaches
# arbitrary kubelet read endpoints — so elevation, not the base tier, is the
# right home for them.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuist-edit-live-debug
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
rules:
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
