{{- /*
Pomerium config file. Mounted at /etc/pomerium/config.yaml on the
pod, read by the binary at startup. Most secrets stay out of this
file (Pomerium reads them from POMERIUM_* env vars sourced from
the ESO-synced Secret); this file holds the structural config
(routes, OIDC provider type, ext_authz wiring).

Pomerium runs in all-in-one mode (no `services:` block) — single
process handles authenticate, authorize, databroker, proxy in one
binary. Right shape for our scale.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pomerium.fullname" . }}-config
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
data:
  config.yaml: |
    # Pomerium serves HTTP internally; ingress-nginx in front of it
    # terminates TLS via the cert-manager cert. Pomerium trusts the
    # X-Forwarded-Proto header to know the original request was
    # HTTPS (needed for OIDC redirect URI construction).
    insecure_server: true
    use_proxy_protocol: false
    address: ":8080"

    # Authenticate service URL: where Pomerium hosts its own OIDC
    # callback. cert-manager issues a cert covering both this host
    # and the kubectl gateway host on the same Ingress.
    authenticate_service_url: "https://{{ .Values.authenticateHostname }}"
    authenticate_callback_path: "/oauth2/callback"

    # IdP — Google Workspace OIDC.
    # client_id / client_secret come from env vars
    # (POMERIUM_IDP_CLIENT_ID / POMERIUM_IDP_CLIENT_SECRET).
    idp_provider: "google"

    # Databroker storage: memory backing. Pod restart = users
    # re-auth via browser. Acceptable at our scale (see values.yaml
    # comment).
    databroker_storage_type: "memory"

    # Allowed authentication domain — Workspace org gate. Without
    # this, any Google user could attempt sign-in; with it, only
    # @tuist.dev accounts can pass the OIDC step.
    idp_scopes: ["openid", "profile", "email"]

    routes:
      - from: "https://{{ .Values.publicHostname }}"
        to: "https://kubernetes.default.svc:443"
        tls_skip_verify: true
        pass_identity_headers: true
        preserve_host_header: false
        timeout: 90s
        # Pomerium authenticates ITSELF to the apiserver via its
        # pod's ServiceAccount token (automounted by Kubernetes at
        # the path below). The inbound Pomerium-issued bearer
        # token kubectl sends is stripped here and replaced with
        # the SA bearer for the upstream request. The apiserver
        # sees Pomerium-the-SA as the requester and consumes the
        # Impersonate-User / Impersonate-Group headers (set by the
        # ext_authz response below) to decide RBAC. The
        # ClusterRole binding in templates/rbac.yaml grants this
        # SA the Impersonate verb so the apiserver accepts those
        # headers.
        kubernetes_service_account_token_file: "/var/run/secrets/kubernetes.io/serviceaccount/token"
        # Coarse domain gate before any ext_authz call.
        # Per-request impersonation (which group to inject) is
        # decided by the ext_authz callback below.
        policy:
          - allow:
              and:
                - domain:
                    is: tuist.dev
        # Static set_request_headers handles the always-applied
        # pieces; the per-request Impersonate-User / Impersonate-
        # Group injection comes from the ext_authz response.
        set_request_headers:
          X-Tuist-Env: {{ .Values.tuistEnv | quote }}

    # Per-route external authorization — Pomerium calls this URL on
    # every request after the policy block above passes. The
    # response shape is Envoy ExtAuthz v3 (CheckResponse), and the
    # ok_response.headers field is injected into the upstream
    # request. tuist-ops's /api/v1/policy controller returns
    # Impersonate-User + Impersonate-Group headers that the
    # apiserver consumes to decide RBAC.
    #
    # Reached over the tailnet — tuist-ops's Service is annotated
    # `tailscale.com/expose: true` which provisions the FQDN below.
    # No bearer on this call; auth is "you're on the tailnet."
    ext_authz_service_url: "http://{{ .Values.extAuthzHost }}:{{ .Values.extAuthzPort }}/api/v1/policy"
