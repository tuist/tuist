{{- /*
Single Ingress fronting both:
  - kube-<env>.tuist.dev          (kubectl gateway)
  - authenticate.kube-<env>.tuist.dev  (OIDC callback hostname
                                        Pomerium issues redirect_uri
                                        against)

cert-manager issues one cert covering both hosts via Cloudflare
DNS-01. external-dns watches this Ingress and creates the two
Cloudflare A records pointing at ingress-nginx's external IP.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pomerium.fullname" . }}
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.publicHostname }}
        - {{ .Values.authenticateHostname }}
        {{- if .Values.opsRoute.enabled }}
        - {{ .Values.opsRoute.host }}
        {{- end }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.publicHostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pomerium.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    - host: {{ .Values.authenticateHostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pomerium.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    {{- if .Values.opsRoute.enabled }}
    # ops.tuist.dev → Pomerium. Pomerium matches its own per-prefix
    # routes (/grants, /audit via OIDC; /webhooks/slack public) and 404s
    # anything else, so /api/v1/policy is not publicly reachable here.
    # cert-manager extends the TLS cert to this host; external-dns
    # points the A record at this Ingress. The tuist-ops chart's own
    # Ingress for this host must be disabled at the same time
    # (`ingress.enabled: false`) so the two don't both claim it.
    - host: {{ .Values.opsRoute.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pomerium.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    {{- end }}
