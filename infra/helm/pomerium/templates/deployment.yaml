apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pomerium.fullname" . }}
  labels:
    {{- include "pomerium.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate: memory-backed databroker means a rolling restart
  # would briefly have two Pomeriums neither holding the other's
  # sessions; cleaner to drop the old pod and bring up a new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pomerium.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pomerium.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod recycle whenever the config or secret changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "pomerium.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pomerium
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/pomerium/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: POMERIUM_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POMERIUM_SHARED_SECRET
            - name: POMERIUM_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POMERIUM_COOKIE_SECRET
            - name: POMERIUM_IDP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POMERIUM_IDP_CLIENT_ID
            - name: POMERIUM_IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POMERIUM_IDP_CLIENT_SECRET
          volumeMounts:
            - name: config
              mountPath: /etc/pomerium
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pomerium.fullname" . }}-config
