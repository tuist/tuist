{{- /*
ESO syncs Pomerium's credentials from 1Password into the Secret the
upstream Pomerium chart reads via envFrom. One 1P item per env keeps
the credentials physically isolated; key names match Pomerium's expected
env vars.

Expected 1P fields on the POMERIUM_<TUIST_ENV> item:
  shared_secret      — base64, generated once (Pomerium's internal
                       RPC signing key, used regardless of databroker
                       storage backing)
  cookie_secret      — base64, generated once
  idp_client_id      — Google Workspace OAuth client ID
  idp_client_secret  — Google Workspace OAuth client secret
  signing_key        — base64 PEM of an EC P-256 key, ONLY required when
                       opsRoute.enabled. Pins the key Pomerium signs
                       X-Pomerium-Jwt-Assertion with so its public half
                       is stable for tuist-ops to verify against
                       (otherwise Pomerium generates an ephemeral key
                       that rotates on pod restart). Gated so envs
                       without the field don't fail ESO sync.

Databroker storage is memory-backed (see values.yaml). No
connection string field is consumed by ESO; existing items may
still have the field populated, harmlessly.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pomerium-tuist
  labels:
    app.kubernetes.io/component: pomerium
    app.kubernetes.io/managed-by: helm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: pomerium-tuist
    template:
      type: Opaque
      data:
        SHARED_SECRET: "{{ `{{ .shared_secret | trim }}` }}"
        COOKIE_SECRET: "{{ `{{ .cookie_secret | trim }}` }}"
        IDP_CLIENT_ID: "{{ `{{ .idp_client_id | trim }}` }}"
        IDP_CLIENT_SECRET: "{{ `{{ .idp_client_secret | trim }}` }}"
        {{- if .Values.opsRoute.enabled }}
        SIGNING_KEY: "{{ `{{ .signing_key | trim }}` }}"
        {{- end }}
  dataFrom:
    - extract:
        key: POMERIUM_{{ .Values.tuistEnv | upper }}
