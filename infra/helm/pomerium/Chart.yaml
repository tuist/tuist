apiVersion: v2
name: pomerium-kube-gateway
description: |
  Self-contained Helm chart for Pomerium running in all-in-one mode
  as the kubectl gateway for one Tuist workload cluster. One Helm
  release per env (staging / canary / production) deployed into
  that cluster. Pomerium authenticates humans via Google Workspace
  OIDC, calls tuist-ops's /api/v1/policy ext_authz endpoint over
  the tailnet on every request to resolve impersonation headers,
  and forwards to the in-cluster apiserver.

  No upstream chart dependency — Pomerium's chart is multi-component
  split-mode which is overkill for our scale (5 humans, 1 replica).
type: application
version: 0.1.0
appVersion: "0.22.0"
