# Overlay for the canary cluster's tailscale-operator install.
# Canary has its own OAuth client + tag pair so a leaked canary
# credential can't enroll a device under the production tag.

tailscale-operator:
  operatorConfig:
    hostname: tuist-k8s-canary
    defaultTags:
      - "tag:tuist-k8s-canary"

  # Front the canary apiserver over the tailnet in auth mode. Default
  # tier is view-only for everyone (including founders); writes go
  # through the JIT bot per the design in values.yaml.
  apiServerProxyConfig:
    mode: "true"
    allowImpersonation: "true"

accessBindings:
  - group: tuist-admins
    clusterRole: view
  - group: tuist-eng
    clusterRole: view
  - group: tuist-canary-write
    clusterRole: edit

connector:
  hostname: tuist-cluster-router-canary
  tags:
    - "tag:tuist-k8s-canary"

macminiEgress:
  enabled: true
  proxyGroup:
    tags:
      - "tag:tuist-k8s-canary"
  # Per-machine Services are created dynamically by the CAPI
  # provider — see macosFleet.tailscaleEgress in the main tuist
  # chart's values-managed-common.yaml.
  machines: []
