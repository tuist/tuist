# Overlay for the staging cluster's tailscale-operator install.
# Matches the chart-default tag set in values.yaml — included
# explicitly so the env-overlay shape is symmetric with canary +
# production.

tailscale-operator:
  operatorConfig:
    hostname: tuist-k8s-staging
    defaultTags:
      - "tag:tuist-k8s-staging"

  # Front the staging apiserver over the tailnet in auth mode so the
  # team gets identity-based kubectl access. Staging mirrors canary
  # and prod (view-by-default + break-glass) so the JIT-elevation
  # workflow can be tested end-to-end on staging.
  apiServerProxyConfig:
    mode: "true"
    allowImpersonation: "true"

# Read-only by default for everyone. Writes go through the JIT bot,
# which adds the requester to group:tuist-staging-write for the
# session; that group is bound to `edit` here. Impersonated group
# names must match the ACL grants in infra/tailscale/acls.json.
accessBindings:
  - group: tuist-admins
    clusterRole: view
  - group: tuist-eng
    clusterRole: view
  - group: tuist-staging-write
    clusterRole: edit

connector:
  hostname: tuist-cluster-router-staging
  tags:
    - "tag:tuist-k8s-staging"

macminiEgress:
  enabled: true
  proxyGroup:
    tags:
      - "tag:tuist-k8s-staging"
  # Per-machine Services are created dynamically by the CAPI
  # provider's ScalewayAppleSiliconMachine reconciler — see
  # macosFleet.tailscaleEgress in the main tuist chart's
  # values-managed-common.yaml. The `machines:` list below stays
  # as an escape hatch for Mac minis that aren't managed by CAPI
  # (e.g. a one-off bare-metal host on the tailnet); leave empty
  # for the standard case.
  machines: []
