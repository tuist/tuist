{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.externalSecrets.secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Upstream tailscale-operator expects these exact two keys
        # on the OAuth Secret — `client_id` and `client_secret`.
        # The 1Password item's fields are conventionally `client-id`
        # / `client-secret`; we rename on output so the upstream
        # chart's secretRef wiring works unchanged.
        client_id: "{{ `{{ .CLIENT_ID | trim }}` }}"
        client_secret: "{{ `{{ .CLIENT_SECRET | trim }}` }}"
  data:
    - secretKey: CLIENT_ID
      remoteRef:
        key: {{ printf "%s/%s" .Values.externalSecrets.item .Values.externalSecrets.fields.clientID | quote }}
    - secretKey: CLIENT_SECRET
      remoteRef:
        key: {{ printf "%s/%s" .Values.externalSecrets.item .Values.externalSecrets.fields.clientSecret | quote }}
{{- end }}
