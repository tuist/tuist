apiVersion: v2
name: tuist-tailscale-operator
description: >
  Wraps Tailscale's official Kubernetes operator chart and adds an
  ExternalSecret that syncs the operator's OAuth client credentials
  from 1Password via external-secrets-operator. The operator joins
  the workload cluster to a Tuist tailnet so in-cluster scrapers
  (alloy-metrics) can reach the macOS fleet's tart-kubelet hosts on
  their CGNAT addresses.

  Two paths are wired by this chart:
    - Connector (subnet router): advertises the cluster to the
      tailnet so tailnet devices can dial in-cluster Services.
    - macminiEgress (ProxyGroup + per-target ExternalName Service):
      gives cluster Pods a way to dial a Mac mini at its MagicDNS
      FQDN via an operator-managed egress proxy.
type: application
version: 0.1.0
appVersion: "1.96.5"

dependencies:
  - name: tailscale-operator
    version: 1.96.5
    repository: https://pkgs.tailscale.com/helmcharts
