# Tuist wrapper for the Tailscale Kubernetes operator. Per-env
# overlays set `tailscale-operator.operatorConfig.hostname` and the
# `Connector.spec.subnetRouter.advertiseRoutes` set (typically the
# tailnet's `100.64.0.0/10` CGNAT range, optionally narrowed). The
# OAuth client credentials are synced by ESO — see
# `templates/externalsecret.yaml`.

externalSecrets:
  enabled: true
  refreshInterval: "1h"
  storeRef:
    kind: ClusterSecretStore
    name: onepassword
  # Single 1Password item holding the operator's OAuth client ID +
  # secret. Tailscale's chart consumes them as env vars on the
  # operator Pod via secretRef. Per-env naming convention matches
  # the SCALEWAY_API / TAILSCALE items (`tuist-k8s-<env>` vault).
  item: TAILSCALE_OPERATOR
  fields:
    clientID: client-id
    clientSecret: client-secret
  # Name of the resulting K8s Secret. Tailscale's upstream chart
  # defaults to `operator-oauth` — keep that name so we don't have
  # to override the chart's secretName.
  secretName: operator-oauth

# Upstream tailscale-operator chart values. Everything under this
# key is passed verbatim to the subchart — see
# https://github.com/tailscale/tailscale/tree/main/cmd/k8s-operator/deploy/chart
# for the full schema.
tailscale-operator:
  # Use the ESO-synced Secret instead of letting the chart create
  # one from inline values (which is the chart's default).
  oauthSecretVolumeName: operator-oauth

  # OAuth client credentials live in a separate Secret. Don't
  # let the upstream chart try to create the Secret itself from
  # inline values — `installCRDs` + ESO does the work.
  oauth:
    clientId: ""
    clientSecret: ""

  operatorConfig:
    # Hostname the operator registers under in the Tailscale admin
    # console. Per-env overlays override (e.g. `k8s-staging`,
    # `k8s-production`) so the admin UI distinguishes which
    # operator manages which cluster.
    hostname: tuist-k8s
    # Operator-managed tags applied to every device the operator
    # spins up (subnet router Pods, ProxyClass-backed proxies).
    # Per-env overlays override to `tag:tuist-k8s-<env>` so each
    # env's operator gets its own ACL identity. The tag must be
    # declared in infra/tailscale/acls.json's tagOwners block, and
    # the OAuth client used by this operator must list it under
    # "Tags this client may apply".
    defaultTags:
      - "tag:tuist-k8s-staging"

# Connector CR — the operator-managed `tailscaled` subnet router
# that announces the cluster's reachability to the tailnet's
# 100.64.0.0/10 range. Lets tailnet devices dial in-cluster Services
# through the Connector. Does NOT make tailnet IPs reachable from
# arbitrary cluster Pods — that's what `macminiEgress` below is for.
connector:
  enabled: true
  name: tuist-cluster-subnet-router
  hostname: tuist-cluster-router
  # Per-env tag for the cluster-side subnet router. Defaults to the
  # staging tag so the chart-default install lands in staging; per-
  # env values override to `tag:tuist-k8s-{canary,production}`.
  # ACL grants this tag dial access to `tag:tuist-macmini-<env>` on
  # the scrape ports — see acls.json.
  tags:
    - "tag:tuist-k8s-staging"
  # CGNAT range — every Mac mini joined under `tag:tuist-macmini`
  # gets an address in `100.64.0.0/10`. Advertising the full range
  # is simpler than per-host routes and the ACL boundary doesn't
  # care which IP a request lands on — it gates by tag identity.
  advertiseRoutes:
    - "100.64.0.0/10"

# Egress plumbing so cluster Pods (specifically alloy-metrics) can
# reach each Mac mini at its MagicDNS FQDN. Materialised by
# templates/macmini-egress.yaml — see that file's header for why a
# ProxyGroup + per-target ExternalName is necessary on top of the
# Connector subnet router.
macminiEgress:
  enabled: false
  proxyGroup:
    name: macmini-egress
    # 2 replicas gives HA without burning a lot of pods; the proxy
    # holds no state per scrape, so a restart drops one in-flight
    # scrape interval at worst.
    replicas: 2
    # Tailscale identity the egress proxy registers under. Per-env
    # overlays override to `tag:tuist-k8s-<env>` for the same reason
    # the Connector tag is per-env: ACL grants are scoped to the
    # cluster-env tag dialing the matching `tag:tuist-macmini-<env>`.
    tags:
      - "tag:tuist-k8s-staging"
  # Per-mini ExternalName Services. Each entry produces one Service
  # in the release namespace. The list is hand-maintained today;
  # when the fleet grows past a handful, lift this into the CAPI
  # controller so each `ScalewayAppleSiliconMachine` reconcile
  # materialises its own egress Service.
  #
  # Schema:
  #   - name:        Service name (must be a valid DNS-1123 label)
  #     tailnetFQDN: MagicDNS hostname of the Mac mini (matches
  #                  the `--hostname` passed to `tailscale up` in
  #                  infra/macos-host-bootstrap/bootstrap.go, which
  #                  is the CR/Node name). Suffix is the tailnet's
  #                  MagicDNS domain, e.g. `<tailnet>.ts.net`.
  machines: []
