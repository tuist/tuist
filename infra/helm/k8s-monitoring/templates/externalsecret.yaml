{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.grafanaCloud.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.grafanaCloud.secretName }}
    creationPolicy: Owner
    # Grafana Cloud tokens are byte-strict — a trailing newline from a
    # manually-pasted 1Password value produces a 401 with no useful body.
    # Trim before publishing the Secret.
    template:
      engineVersion: v2
      data:
        prometheus-username: {{ .Values.grafanaCloud.prometheus.username | quote }}
        prometheus-password: "{{ `{{ .PROMETHEUS_TOKEN | trim }}` }}"
        loki-username: {{ .Values.grafanaCloud.loki.username | quote }}
        loki-password: "{{ `{{ .LOKI_TOKEN | trim }}` }}"
        tempo-username: {{ .Values.grafanaCloud.tempo.username | quote }}
        tempo-password: "{{ `{{ .TEMPO_TOKEN | trim }}` }}"
  data:
    - secretKey: PROMETHEUS_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.grafanaCloud.prometheus.token.item .Values.grafanaCloud.prometheus.token.field | quote }}
    - secretKey: LOKI_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.grafanaCloud.loki.token.item .Values.grafanaCloud.loki.token.field | quote }}
    - secretKey: TEMPO_TOKEN
      remoteRef:
        key: {{ printf "%s/%s" .Values.grafanaCloud.tempo.token.item .Values.grafanaCloud.tempo.token.field | quote }}
{{- end }}
