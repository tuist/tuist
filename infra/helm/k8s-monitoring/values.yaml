# Common values for the Tuist Grafana Kubernetes Monitoring wrapper chart.
# Per-env overlays set `cluster.name`, the `env` label, and the pod-logs
# namespace filter. Secrets (Grafana Cloud tokens) are synced by ESO — see
# `templates/externalsecret.yaml`. URLs and numeric usernames below are
# public per Grafana Cloud stack so they live in values, not in 1Password.

# ExternalSecret wiring. Assumes a ClusterSecretStore named `onepassword`
# has already been installed on the cluster — the workload-cluster
# bootstrap (see k8s/onboarding.md §4) puts that in place before this
# chart is ever installed.
externalSecrets:
  enabled: true
  refreshInterval: "1h"
  storeRef:
    kind: ClusterSecretStore
    name: onepassword

# Grafana Cloud destinations. The ExternalSecret template produces one
# Kubernetes Secret named `grafanaCloud.secretName` with six keys
# (prometheus|loki|tempo × username|password); the k8s-monitoring
# destination blocks below point at it via `secret.create: false`.
grafanaCloud:
  secretName: k8s-monitoring-grafana-cloud
  prometheus:
    username: "1774467"
    token:
      item: PROMETHEUS_TOKEN
      field: password
  loki:
    username: "986520"
    token:
      item: LOKI_TOKEN
      field: password
  tempo:
    username: "980835"
    token:
      item: TEMPO_TOKEN
      field: password

# Upstream grafana/k8s-monitoring chart values. Everything under this key
# is passed verbatim to the subchart — see
# https://github.com/grafana/k8s-monitoring-helm/tree/main/charts/k8s-monitoring
# for the full surface area.
k8s-monitoring:
  # Set by per-env overlays: tuist-staging / tuist-canary / tuist-production.
  # Drives the `cluster` / `k8s.cluster.name` label on everything.
  cluster:
    name: ""

  global:
    scrapeInterval: 30s

  # v4 schema: destinations is a map keyed by destination name. Per-env
  # overlays merge into these entries (e.g. adding `extraLabels.env`) so
  # existing Grafana Cloud dashboards that filter on env=… keep working
  # after the chart swap.
  destinations:
    grafana-cloud-metrics:
      type: prometheus
      url: https://prometheus-prod-24-prod-eu-west-2.grafana.net/api/prom/push
      auth:
        type: basic
        usernameKey: prometheus-username
        passwordKey: prometheus-password
      secret:
        create: false
        name: k8s-monitoring-grafana-cloud
        namespace: observability
      extraLabels: {}
      # Last-stop write relabeling for labels / metrics that survive the
      # feature-level allow-lists below. These labels are restart-scoped
      # Kubernetes identifiers that multiply otherwise equivalent series and
      # are not used by dashboards in this repo.
      metricProcessingRules: |
        write_relabel_config {
          action = "labeldrop"
          regex = "container_id|uid|pod_ip|image_id|image_spec|k8s_pod_uid"
        }
        write_relabel_config {
          source_labels = ["__name__"]
          regex = "node_network_(receive|transmit)_drop_total|traces_service_graph_request_.*"
          action = "drop"
        }
        write_relabel_config {
          source_labels = ["job"]
          regex = "integrations/(process|self)"
          action = "drop"
        }

    grafana-cloud-logs:
      type: loki
      url: https://logs-prod-012.grafana.net/loki/api/v1/push
      auth:
        type: basic
        usernameKey: loki-username
        passwordKey: loki-password
      secret:
        create: false
        name: k8s-monitoring-grafana-cloud
        namespace: observability
      extraLabels: {}

    # Tempo uses OTLP gRPC and only accepts traces — metrics/logs go to
    # their respective destinations above.
    grafana-cloud-traces:
      type: otlp
      url: tempo-prod-10-prod-eu-west-2.grafana.net:443
      protocol: grpc
      metrics:
        enabled: false
      logs:
        enabled: false
      traces:
        enabled: true
      auth:
        type: basic
        usernameKey: tempo-username
        passwordKey: tempo-password
      secret:
        create: false
        name: k8s-monitoring-grafana-cloud
        namespace: observability
      extraLabels: {}

  # ───── Features ─────

  # Enables kube-state-metrics + kubelet + cAdvisor scraping. Pairs with
  # `telemetryServices.kube-state-metrics.deploy: true` below.
  #
  # All three of cAdvisor / kubelet / KSM ship a long tail of per-cgroup,
  # per-runtime, and per-resource metrics that the Grafana Cloud Kubernetes
  # integration dashboards and the standard kube-prometheus alert rules
  # (KubePodCrashLooping, KubeMemoryOvercommit, KubeContainerWaiting,
  # KubeNodeNotReady, …) never query. Grafana publishes a curated allow-list
  # per component that keeps the ~30 metrics those dashboards/alerts actually
  # need and drops the rest. cAdvisor on its own accounted for ~71% of total
  # scraped samples on this stack before this block (998K / 1.4M per scrape).
  #
  # Pre-flight verified via the Grafana Cloud Assistant for each component:
  #   - cAdvisor: 18 `container_*` metrics ingested, all in the default list.
  #   - kubelet: 24 `kubelet_*` metrics ingested, all in the default list;
  #     the one risky drop (`kubelet_runtime_operations_duration_seconds_bucket`)
  #     isn't ingested on this stack.
  #   - kube-state-metrics: 96 `kube_*` metrics ingested; none of the explicit
  #     high-churn omissions (`kube_lease_*`, `kube_endpointslice_*`,
  #     `kube_mutatingwebhookconfiguration_*`,
  #     `kube_configmap_metadata_resource_version`,
  #     `kube_secret_metadata_resource_version`) are referenced by any
  #     dashboard, alert, or recording rule.
  #
  # `includeMetrics` therefore stays empty for all three. If a future
  # dashboard needs a dropped metric, add it under
  # `<component>.metricsTuning.includeMetrics` — same pattern hostMetrics
  # already uses above.
  clusterMetrics:
    enabled: true
    collector: alloy-metrics
    cadvisor:
      metricsTuning:
        useDefaultAllowList: true
        # Keep only the container resource metrics used by the Kubernetes app
        # and Tuist dashboards. The default list also keeps several
        # container_memory_* gauges with identical label cardinality; those
        # multiply DPM without feeding any dashboard in this repo.
        excludeMetrics:
          - container_memory_cache
          - container_memory_rss
          - container_memory_swap
          - container_memory_usage_bytes
        # Drop all cAdvisor series for the CI runner namespace. Each ephemeral
        # job pod gets ~15 container_* series carrying a unique pod label that
        # dies with the pod but lingers as a billable series, so this is the
        # heaviest churn source in the active-vs-billable gap. Same rationale
        # (and same namespace) as the kube_pod_* drop above: the runner
        # dashboard reads low-cardinality RunnerPool telemetry, not per-pod
        # container metrics. No-op for the runner pods cAdvisor never scrapes.
        excludeNamespaces:
          - tuist-runners
    kubelet:
      metricsTuning:
        useDefaultAllowList: true
    kube-state-metrics:
      # Do not blank the `pod` label on kube_pod_* metrics: relabeling
      # cannot aggregate duplicate samples, so that produces colliding
      # series rather than namespace-level totals. Instead, remove the
      # runner namespace from pod-scoped KSM metrics and use low-cardinality
      # RunnerPool telemetry in the runner dashboard. Keep
      # kube_pod_status_unschedulable available cluster-wide because it is a
      # cheap placement signal compared to the rest of kube_pod_*.
      #
      # The final rule drops kube_pod_status_phase for terminal pods
      # (Succeeded/Failed). Job/CronJob and short-lived deploy pods leave one
      # such series each that lives forever as a billable series but never
      # comes back as an active one — the bulk of the active-vs-billable gap.
      # We page on container waiting/crash signals, not terminal pod phase,
      # and no dashboard reads this metric, so only Running/Pending/Unknown
      # are worth keeping.
      extraMetricProcessingRules: |
        rule {
          source_labels = ["__name__", "namespace"]
          separator = ";"
          regex = "kube_pod_status_unschedulable;tuist-runners"
          target_label = "__tmp_keep_runner_pod_metric"
          replacement = "true"
          action = "replace"
        }
        rule {
          source_labels = ["__name__", "namespace", "__tmp_keep_runner_pod_metric"]
          separator = ";"
          regex = "kube_pod_.*;tuist-runners;"
          action = "drop"
        }
        rule {
          regex = "__tmp_keep_runner_pod_metric"
          action = "labeldrop"
        }
        rule {
          source_labels = ["__name__", "phase"]
          separator = ";"
          regex = "kube_pod_status_phase;(Succeeded|Failed)"
          action = "drop"
        }
      metricsTuning:
        useDefaultAllowList: true
        includeMetrics:
          - kube_pod_status_unschedulable
        excludeMetrics:
          # We page on container waiting/termination reasons, not pod-level
          # status reasons. This metric fans out by pod × reason and was one
          # of the highest-cardinality series in Grafana Cloud.
          - kube_pod_status_reason
          # PersistentVolume phase is useful for storage inventory, but we
          # monitor actual usage / pressure through PVC and kubelet volume
          # stats. The phase gauge fans out by PV × phase and is unused.
          - kube_persistentvolume_status_phase

  # Streams Kubernetes Events to Loki as structured logs. Cheap and
  # extremely useful for post-mortem ("what got evicted, when, why").
  # Events are singleton-scoped — running on >1 replica would duplicate.
  clusterEvents:
    enabled: true
    collector: alloy-singleton

  # Node-level CPU / memory / disk / network / PSI metrics from the
  # node-exporter DaemonSet (deployed by telemetryServices.node-exporter
  # below, which auto-populates linuxHosts' discovery — no manual namespace
  # or labelMatchers needed). `hostMetrics.enabled` alone is a no-op:
  # `linuxHosts.enabled` defaults to false, so before this every Linux k8s
  # node — including the bare-metal runner hosts — had zero host-memory
  # signal, and a host-level microVM die-off (QEMU SIGBUS under RAM
  # pressure) was invisible in metrics, surfacing only in the node journal.
  # useDefaultAllowList (the chart default) keeps the curated node_cpu.* /
  # node_memory.* / node_filesystem.* set; that set omits the host-pressure
  # signals this class of incident actually needs, so add them explicitly:
  # PSI (the leading indicator of memory/CPU/IO distress), the host
  # OOM-kill counter, and load average. Scrapes under job
  # `integrations/node_exporter`.
  hostMetrics:
    enabled: true
    collector: alloy-metrics
    linuxHosts:
      enabled: true
      metricsTuning:
        # The upstream default uses `node_cpu.*`, which also keeps
        # `node_cpu_scaling_governor` and creates one series per CPU governor
        # label. Keep the actual CPU seconds counter explicitly instead.
        useDefaultAllowList: false
        includeMetrics:
          - node_cpu_seconds_total
          - node_exporter_build_info
          - node_filesystem.*
          - node_memory.*
          - process_cpu_seconds_total
          - process_resident_memory_bytes
          - node_pressure_.*
          - node_vmstat_oom_kill
          - node_load.*
          # Per-interface network counters (dropped by the default allow-list)
          # so we can measure the Scaleway kura runner-cache node's PN
          # throughput against the Hetzner kura nodes.
          - node_network_receive_bytes_total
          - node_network_transmit_bytes_total
      # The allow-list above keeps node_cpu_seconds_total for all CPU modes
      # and node_network_*_bytes_total for every interface, but the dashboards
      # only read mode="idle" and physical devices (device=~"e(n|th).*").
      # Drop the unqueried CPU modes and the virtual interfaces — the largest
      # node-exporter series source left after the curated allow-list.
      # extraMetricProcessingRules runs after the allow-list keep, so it trims
      # within the kept set.
      extraMetricProcessingRules: |
        rule {
          source_labels = ["__name__", "mode"]
          separator = ";"
          regex = "node_cpu_seconds_total;(guest|guest_nice|steal|irq|softirq)"
          action = "drop"
        }
        rule {
          source_labels = ["__name__", "device"]
          separator = ";"
          regex = "node_network_(receive|transmit)_bytes_total;(en|eth).*"
          target_label = "__tmp_keep_net_iface"
          replacement = "true"
          action = "replace"
        }
        rule {
          source_labels = ["__name__", "__tmp_keep_net_iface"]
          separator = ";"
          regex = "node_network_(receive|transmit)_bytes_total;"
          action = "drop"
        }
        rule {
          regex = "__tmp_keep_net_iface"
          action = "labeldrop"
        }

  # DaemonSet-based pod log tailing via /var/log/pods hostPath. A
  # compromised Alloy pod can only read logs from the single node it
  # runs on.
  podLogsViaLoki:
    enabled: true
    collector: alloy-logs

  # Node journald → Loki. The in-guest runner vitals probe is blind to a
  # host-side microVM teardown (kata-shim/qemu kill, containerd restart,
  # kernel OOM/segfault) — those land only in the worker node's journal,
  # which nothing shipped before this. Assigned to alloy-logs because that
  # DaemonSet already tolerates the bare-metal runner taint (see the
  # collector block below), so it runs on the runner nodes where the
  # microVMs live and a runner that vanishes mid-job leaves a host trail.
  nodeLogs:
    enabled: true
    collector: alloy-logs
    journal:
      maxAge: "4h"
      # Container runtime + kubelet units, plus kernel messages. The keep
      # rule matches __journal__systemd_unit, but kernel lines carry no
      # unit, so "^$" (empty unit) is kept too — that's where the
      # OOM/segfault/qemu-kill evidence for a microVM teardown shows up.
      units:
        - "^$"
        - "containerd.service"
        - "kubelet.service"

  # Picks up any Pod/Service annotated with prometheus.io/scrape=true.
  # Upstream defaults to the k8s.grafana.com/* annotation namespace; we
  # override to prometheus.io/* so the same annotations work for both
  # this chart and the embedded Prometheus that self-hosters opt into
  # via observability.enabled in the main Tuist chart.
  #
  # metricsPortName narrows the discovery output to a single target per
  # pod when the pod declares more than one container port. Without it,
  # Kubernetes pod-role discovery emits one target per declared port
  # (e.g. server pods have http + metrics + epmd), and even though the
  # metricsPortNumber rewrite collapses them all to :9091, that's still
  # extra work the relabel pipeline has to do per scrape interval.
  # Pods with a single port (or no named port) ignore the keepequal
  # filter, so this is safe for the cache pod too.
  annotationAutodiscovery:
    enabled: true
    collector: alloy-metrics
    annotations:
      scrape: "prometheus.io/scrape"
      metricsPortName: "prometheus.io/port-name"
      metricsPortNumber: "prometheus.io/port"
      metricsPath: "prometheus.io/path"
      metricsScheme: "prometheus.io/scheme"
    metricsTuning:
      excludeMetrics:
        # Cilium's event timestamps, BPF map gauges, and agent-internal
        # operational counters (API rate limiter, k8s client, triggers,
        # controllers, datapath, per-endpoint policy enforcement) have high
        # pod/map/endpoint fan-out and are not queried by any dashboard or
        # alert in this repo. Re-add a specific name here if a Cilium
        # integration dashboard is ever installed.
        - cilium_event_ts
        - cilium_bpf_map_capacity
        - cilium_bpf_map_pressure
        - cilium_bpf_map_ops_total
        - cilium_agent_bootstrap_seconds
        - cilium_api_limiter_.*
        - cilium_k8s_client_.*
        - cilium_triggers_.*
        - cilium_controllers_.*
        - cilium_datapath_.*
        - cilium_policy_endpoint_enforcement_status
        # Go runtime metrics (GC, memstats, scheduler, threads) ship one set
        # per scraped pod across the hundreds of Go infra pods (Cilium,
        # operators, controllers) and churn on every restart. The Tuist
        # server/processor run on the BEAM, not Go, so this drops only infra
        # noise; no dashboard or alert reads go_*.
        - go_.*
        # Response-size histograms add buckets per Phoenix route/status/method
        # and are not used by the dashboards in this repo.
        - tuist_prom_ex_phoenix_http_response_size_bytes_bucket

  # OTLP receivers for the managed workloads' span exports. The Tuist
  # server and processor push over gRPC to :4317; managed Kura pods push
  # over OTLP HTTP to :4318/v1/traces. Keeping both enabled lets each
  # workload use the protocol its runtime stack already prefers.
  applicationObservability:
    enabled: true
    collector: alloy-receiver
    receivers:
      otlp:
        grpc:
          enabled: true
          port: 4317
        http:
          enabled: true
          port: 4318

  # ───── Telemetry services (deployed alongside the collectors) ─────

  telemetryServices:
    kube-state-metrics:
      deploy: true
    node-exporter:
      deploy: true
      # The chart-default probe is httpGet `/` with timeoutSeconds: 1. On a
      # loaded node (a bare-metal CI runner mid-build, a busy control-plane),
      # node-exporter scraping /proc + /sys can take >1s, so the probe times
      # out, the pod flaps to NotReady, and the DaemonSet briefly drops to
      # 15/16. A deploy's readiness wait that happens to poll during the flap
      # then fails. Give the probe headroom (and a small CPU request so it is
      # not BestEffort-throttled first) so a momentarily slow node does not
      # flip the pod out of Ready.
      readinessProbe:
        timeoutSeconds: 5
        failureThreshold: 5
      livenessProbe:
        timeoutSeconds: 5
        failureThreshold: 5
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
      # Exempt node-exporter from kubelet node-pressure (DiskPressure) eviction.
      # node-exporter is a DaemonSet, so the observability chart's `helm --wait`
      # blocks until every node has a Ready node-exporter Pod. When a node hit
      # DiskPressure the kubelet evicted its (default-priority) node-exporter,
      # the DaemonSet sat at N-1/N forever, `helm --wait` timed out, and — since
      # the observability install is a prerequisite of the server deploy job —
      # ALL production deploys were blocked on one bad node. A system-critical
      # priority is exempt from node-pressure eviction, so node-exporter keeps
      # running (and reporting) exactly when a node is unhealthy, instead of
      # being the thing that gets reaped and wedges the whole pipeline.
      priorityClassName: system-node-critical

  # ───── Service integrations ─────
  #
  # The `alloy` integration scrapes each Alloy collector's own /metrics
  # endpoint with a curated allow-list (build_info, component health,
  # WAL stats, clustering). The chart-default allow-list does NOT
  # include `alloy_config_last_load_successful` — we override
  # `tuning.includeMetrics` to keep that one + the success-timestamp.
  #
  # Why we care about config-load success:
  # Alloy's reload model is "hot-swap if valid, keep serving previous
  # config if invalid." A broken config landing in the ConfigMap (via
  # `kubectl apply`, `helm upgrade`, or extraConfig drift) is silent —
  # the config-reloader sidecar logs `400 Bad Request` every 5s, but
  # the pod stays Ready and serves stale config until someone restarts
  # it. Bringing the success flag to Grafana Cloud lets us alert on
  # it instead of finding out hours later when a fresh pod crashloops.
  #
  # Alert to create in Grafana Cloud (PromQL):
  #
  #   min by (cluster, instance, job) (alloy_config_last_load_successful) == 0
  #
  # Recommended config:
  #   - For: 5m   (absorb the legitimate "pod restarted between scrapes" gap;
  #                must be ≥ 2× the 60s scrape interval below + a buffer)
  #   - Severity: critical
  #   - Summary: "Alloy {{ $labels.instance }} ({{ $labels.cluster }})
  #              is running stale config — last reload failed"
  #   - Runbook: kubectl logs <pod> -c alloy to find the parse error;
  #              fix the config in the values overlay, re-deploy, restart pod.
  integrations:
    collector: alloy-metrics
    alloy:
      # One instance entry per Alloy collector role. Targets are
      # discovered by the operator-managed Service the chart renders
      # for each role (matched on `app.kubernetes.io/name`). The
      # tuning override is identical across roles — kept inlined for
      # clarity rather than yaml-anchored, since the chart's
      # values.schema.json validates per-entry.
      instances:
        - name: alloy-metrics
          labelSelectors:
            app.kubernetes.io/name: alloy-metrics
          metrics:
            tuning:
              useDefaultAllowList: false
              includeMetrics:
                - alloy_config_last_load_successful
                - alloy_config_last_load_success_timestamp_seconds
              excludeMetrics:
                - loki_write_request_duration_seconds_bucket
        - name: alloy-logs
          labelSelectors:
            app.kubernetes.io/name: alloy-logs
          metrics:
            tuning:
              useDefaultAllowList: false
              includeMetrics:
                - alloy_config_last_load_successful
                - alloy_config_last_load_success_timestamp_seconds
              excludeMetrics:
                - loki_write_request_duration_seconds_bucket
        - name: alloy-singleton
          labelSelectors:
            app.kubernetes.io/name: alloy-singleton
          metrics:
            tuning:
              useDefaultAllowList: false
              includeMetrics:
                - alloy_config_last_load_successful
                - alloy_config_last_load_success_timestamp_seconds
              excludeMetrics:
                - loki_write_request_duration_seconds_bucket
        - name: alloy-receiver
          labelSelectors:
            app.kubernetes.io/name: alloy-receiver
          metrics:
            tuning:
              useDefaultAllowList: false
              includeMetrics:
                - alloy_config_last_load_successful
                - alloy_config_last_load_success_timestamp_seconds
              excludeMetrics:
                - loki_write_request_duration_seconds_bucket

  # ───── Collectors (Alloy instances) ─────
  #
  # k8s-monitoring splits Alloy into four roles so each one can be scaled
  # and scoped independently. Controller type + replica count come from
  # upstream presets — without them the Alloy subchart defaults to a
  # DaemonSet, which is wrong for the singleton + receiver roles.
  collectors:
    # Clustering lets multiple alloy-metrics replicas hash-partition the
    # scrape targets, so adding replicas linearly scales capacity. Required
    # by the clusterMetrics / hostMetrics / annotationAutodiscovery features.
    alloy-metrics:
      presets: [clustered]
      # Custom scrape jobs for the macOS fleet's node_exporter (:9100)
      # and tart-kubelet controller-runtime metrics (:8080). Both bind
      # to the tailnet interface on each Mac mini — see
      # macos-host-bootstrap.installNodeExporter and tart-kubelet's
      # --node-ip-source=tailscale.
      #
      # Reachability path: alloy-metrics resolves an in-cluster
      # ExternalName Service (one per Mac mini, created by the
      # tailscale-operator wrapper chart's macminiEgress block) which
      # the Tailscale K8s operator rewrites to a ClusterIP Service
      # fronting an egress ProxyGroup. That ProxyGroup holds a tailnet
      # identity and forwards to the Mac mini's MagicDNS endpoint.
      # alloy-metrics itself never joins the tailnet — the operator
      # bridges it.
      #
      # Service-role (not Node-role) discovery: the egress lives in
      # ExternalName Services labelled `tuist.dev/macmini-egress=true`,
      # not on Node objects. Service-role emits one target per (Service,
      # port) tuple, so the two named ports below produce two targets
      # per Mac mini Service — keep filters by `port_name` to send each
      # to the right scrape job.
      #
      # Self-hosters who don't run the Tailscale operator never
      # materialise these Services, so the discovery returns zero
      # targets and the scrape jobs are no-ops. No need to gate this
      # block behind a values flag.
      extraConfig: |
        // Discover all Services labelled tuist.dev/macmini-egress=true.
        // Materialised by infra/helm/tailscale-operator/templates/
        // macmini-egress.yaml — one ExternalName Service per Mac
        // mini, fronted by a Tailscale operator-managed egress
        // ProxyGroup that holds the tailnet identity.
        discovery.kubernetes "tuist_macmini_egress" {
          role = "service"
          selectors {
            role = "service"
            label = "tuist.dev/macmini-egress=true"
          }
        }

        // Filter the (Service, port) targets down to node-exporter,
        // and use the Service name as the `instance` label so a
        // CAPI machine rename doesn't break dashboards.
        discovery.relabel "tuist_macos_node_exporter" {
          targets = discovery.kubernetes.tuist_macmini_egress.targets
          rule {
            source_labels = ["__meta_kubernetes_service_port_name"]
            regex = "node-exporter"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_name"]
            target_label = "instance"
          }
        }

        prometheus.scrape "tuist_macos_node_exporter" {
          targets = discovery.relabel.tuist_macos_node_exporter.output
          forward_to = [prometheus.relabel.tuist_macos_node_exporter.receiver]
          job_name = "tuist-macos-node-exporter"
          scrape_interval = "30s"
          scrape_timeout = "10s"

          // Without this block, every alloy-metrics replica scrapes the
          // same target independently. The chart-default scrape blocks
          // (cadvisor, kubelet, kube-state-metrics, …) all opt in; the
          // five Tuist extraConfig blocks below did not, which manifested
          // as 36 DPM (~18× the 2 DPM expected at 30s) on the `node_*` /
          // `tart_kubelet_*` / `cnpg_*` series — a perfect match against
          // the 18 alloy-metrics replicas the chart runs in production.
          clustering {
            enabled = true
          }
        }

        prometheus.relabel "tuist_macos_node_exporter" {
          rule {
            source_labels = ["__name__"]
            regex = "up|scrape_samples_scraped|node_exporter_build_info|node_cpu_seconds_total|node_memory_.*|node_filesystem_.*|node_disk_(read|written)_bytes_total|node_filefd_(allocated|maximum)|node_load.*|node_network_(receive|transmit)_bytes_total|node_pressure_.*|node_sockstat_(TCP_alloc|TCP_inuse|TCP_tw|sockets_used)|node_vmstat_oom_kill|process_cpu_seconds_total|process_resident_memory_bytes"
            action = "keep"
          }
          // Top-level extraConfig sits OUTSIDE the chart's `declare`
          // blocks, so `argument.metrics_destinations.value` is out of
          // scope here. Forward straight to the concrete Grafana Cloud
          // metrics destination (matches the `destinations` key in
          // values.yaml, dashes to underscores per Alloy syntax).
          forward_to = [prometheus.remote_write.grafana_cloud_metrics.receiver]
        }

        // tart-kubelet's controller-runtime metrics endpoint. Carries
        // reconcile counters, errors, and the
        // `tart_kubelet_vm_boot_duration_seconds` histogram that
        // backs the runners dashboard.
        discovery.relabel "tuist_macos_tart_kubelet" {
          targets = discovery.kubernetes.tuist_macmini_egress.targets
          rule {
            source_labels = ["__meta_kubernetes_service_port_name"]
            regex = "tart-kubelet"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_name"]
            target_label = "instance"
          }
        }

        prometheus.scrape "tuist_macos_tart_kubelet" {
          targets = discovery.relabel.tuist_macos_tart_kubelet.output
          // Top-level extraConfig sits OUTSIDE the chart's `declare`
          // blocks, so `argument.metrics_destinations.value` is out of
          // scope here. Forward straight to the concrete Grafana Cloud
          // metrics destination (matches the `destinations` key in
          // values.yaml — dashes → underscores per Alloy syntax).
          forward_to = [prometheus.remote_write.grafana_cloud_metrics.receiver]
          job_name = "tuist-macos-tart-kubelet"
          scrape_interval = "30s"
          scrape_timeout = "10s"

          clustering {
            enabled = true
          }
        }

        // CloudNativePG instance metrics. Managed clusters don't install
        // prometheus-operator CRDs, and CNPG doesn't add prometheus.io/*
        // annotations to instance pods, so annotationAutodiscovery can't
        // pick these up. Scrape the built-in instance exporter directly.
        discovery.kubernetes "tuist_cnpg_instances" {
          role = "pod"
          selectors {
            role = "pod"
            label = "cnpg.io/cluster=tuist-tuist-pg"
          }
        }

        discovery.relabel "tuist_cnpg_instances" {
          targets = discovery.kubernetes.tuist_cnpg_instances.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex = "Running"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_port_name"]
            regex = "metrics"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_ip"]
            target_label = "__address__"
            replacement = "$1:9187"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label = "node"
          }
          rule {
            target_label = "cnpg_cluster"
            replacement = "tuist-tuist-pg"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_cnpg_io_instanceName"]
            target_label = "cnpg_instance"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_cnpg_io_instanceRole"]
            target_label = "instance_role"
          }
        }

        prometheus.scrape "tuist_cnpg_instances" {
          targets = discovery.relabel.tuist_cnpg_instances.output
          forward_to = [prometheus.relabel.tuist_cnpg_instances.receiver]
          job_name = "tuist-cnpg-instances"
          scrape_interval = "30s"
          scrape_timeout = "10s"

          clustering {
            enabled = true
          }
        }

        prometheus.relabel "tuist_cnpg_instances" {
          rule {
            source_labels = ["__name__", "name"]
            separator = "@"
            regex = "cnpg_pg_settings_setting@max_connections"
            target_label = "__keepme"
            replacement = "1"
          }
          rule {
            source_labels = ["__name__", "__keepme"]
            separator = "@"
            regex = "cnpg_pg_settings_setting@"
            action = "drop"
          }
          rule {
            source_labels = ["__name__"]
            regex = "cnpg_pg_settings_setting"
            target_label = "__keepme"
            replacement = ""
          }

          forward_to = [prometheus.remote_write.grafana_cloud_metrics.receiver]
        }

        // PgBouncer pooler metrics for the processor's transaction-mode
        // pool. The pooler is optional, but discovery simply returns no
        // targets when it is disabled.
        discovery.kubernetes "tuist_cnpg_pooler" {
          role = "pod"
          selectors {
            role = "pod"
            label = "cnpg.io/poolerName=tuist-tuist-pg-pooler-rw"
          }
        }

        discovery.relabel "tuist_cnpg_pooler" {
          targets = discovery.kubernetes.tuist_cnpg_pooler.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex = "Running"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_port_name"]
            regex = "metrics"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_ip"]
            target_label = "__address__"
            replacement = "$1:9127"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label = "node"
          }
          rule {
            target_label = "cnpg_pooler"
            replacement = "tuist-tuist-pg-pooler-rw"
          }
        }

        prometheus.scrape "tuist_cnpg_pooler" {
          targets = discovery.relabel.tuist_cnpg_pooler.output
          forward_to = [prometheus.remote_write.grafana_cloud_metrics.receiver]
          job_name = "tuist-cnpg-pooler"
          scrape_interval = "30s"
          scrape_timeout = "10s"

          clustering {
            enabled = true
          }
        }

        // CloudNativePG operator controller metrics. Kept separate from
        // instance metrics so dashboard panels can distinguish operator
        // reachability from database health.
        discovery.kubernetes "tuist_cnpg_operator" {
          role = "pod"
          selectors {
            role = "pod"
            label = "app.kubernetes.io/name=cloudnative-pg"
          }
        }

        discovery.relabel "tuist_cnpg_operator" {
          targets = discovery.kubernetes.tuist_cnpg_operator.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex = "Running"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_port_name"]
            regex = "metrics"
            action = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_ip"]
            target_label = "__address__"
            replacement = "$1:8080"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }
        }

        prometheus.scrape "tuist_cnpg_operator" {
          targets = discovery.relabel.tuist_cnpg_operator.output
          forward_to = [prometheus.remote_write.grafana_cloud_metrics.receiver]
          job_name = "tuist-cnpg-operator"
          scrape_interval = "30s"
          scrape_timeout = "10s"

          clustering {
            enabled = true
          }
        }
    # filesystem-log-reader mounts /var/log so the DaemonSet can tail pod
    # logs from disk (matches the podLogsViaLoki feature).
    alloy-logs:
      presets: [filesystem-log-reader]
      controller:
        # The nodeLogs feature validation requires the assigned collector
        # to be an explicit DaemonSet (it does not infer this from the
        # filesystem-log-reader preset), and a DaemonSet is what we want
        # anyway: journald is per-node, so one Alloy per node.
        type: daemonset
        # Tolerate the bare-metal runner taint so the log DaemonSet also
        # lands on the runner-tier nodes and tails the Linux runner Pods.
        # Without this, runner Pod logs (including RUNNER_VITALS) never
        # reach Loki: those nodes repel everything but runner Pods, so the
        # default-toleration DaemonSet skips them. Tolerations live under
        # `controller` (the Alloy CR's controller spec); a top-level
        # `tolerations` here renders to spec.tolerations and is ignored.
        tolerations:
          - key: tuist.dev/runner-tier
            operator: Equal
            value: bare-metal
            effect: NoSchedule
    # Kubernetes Events must come from exactly one replica — otherwise
    # every pod watches the event stream and emits duplicate log lines.
    alloy-singleton:
      presets: [singleton]
    # OTLP receiver is a plain service the server pushes spans to; one
    # Deployment replica is plenty and avoids the per-node DaemonSet
    # footprint of the upstream default.
    alloy-receiver:
      presets: [deployment]
