global:
  commonLabels:
    tuist.dev/service: swift-registry
    tuist.dev/stack: managed

host: swift-registry-staging.tuist.dev
serverUrl: https://staging.tuist.dev
deployEnv: stag
sentryEnv: stag

# Keep sync off for the first staging smoke test. Once we've verified
# ingress, the nginx sidecar, probes, and read-only paths against an
# empty staging Tigris bucket, flip this to true and let SyncWorker
# populate the bucket from the Swift Package Index.
registrySyncEnabled: false

ingress:
  enabled: true
  className: nginx
  host: swift-registry-staging.tuist.dev
  tlsSecretName: swift-registry-staging-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare

runtimeSecrets:
  externalSecret:
    enabled: true
    item: SWIFT_REGISTRY

networkPolicy:
  enabled: true

observability:
  otelEndpoint: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4317

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "2Gi"
