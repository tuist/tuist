global:
  commonLabels: {}
  podLabels: {}
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/tuist/swift-registry
  tag: ""
  pullPolicy: IfNotPresent

secretKeyBase: ""
releaseCookie: ""

host: ""
serverUrl: "https://tuist.dev"
deployEnv: production
sentryEnv: production
poolSize: "2"
storageDir: /storage
registrySyncEnabled: true
registrySyncAllowlist: ""

service:
  type: ClusterIP
  port: 80
  # nginx sidecar listens on this port and is the in-cluster entrypoint.
  # Must match `nginx.containerPort` below.
  targetPort: 8080

# Phoenix listens on this Unix socket inside the pod; nginx proxy_passes to it.
phoenix:
  socketPath: /run/swift-registry/swift-registry.sock
  socketLink: /run/swift-registry/current.sock

nginx:
  image:
    repository: nginxinc/nginx-unprivileged
    tag: 1.27-alpine
    pullPolicy: IfNotPresent
  containerPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

s3:
  endpoint: ""
  protocol: ""
  virtualHost: false
  caCertPem: ""

runtimeSecrets:
  secretName: ""
  inline:
    sentryDsn: ""
    s3RegistryBucket: ""
    s3Host: ""
    s3AccessKeyId: ""
    s3SecretAccessKey: ""
    s3Region: ""
    apiKey: ""
    registryGithubToken: ""
    obanWebUsername: ""
    obanWebPassword: ""
  externalSecret:
    enabled: false
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    item: SWIFT_REGISTRY
    fields:
      sentryDsn: ""
      s3RegistryBucket: S3_REGISTRY_BUCKET
      s3Host: S3_HOST
      s3AccessKeyId: S3_ACCESS_KEY_ID
      s3SecretAccessKey: S3_SECRET_ACCESS_KEY
      s3Region: S3_REGION
      apiKey: TUIST_SWIFT_REGISTRY_API_KEY
      registryGithubToken: REGISTRY_GITHUB_TOKEN
      obanWebUsername: ""
      obanWebPassword: ""

persistence:
  data:
    create: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
  storage:
    create: true
    existingClaim: ""
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 100Gi

ingress:
  enabled: false
  className: ""
  host: ""
  tlsSecretName: ""
  annotations: {}

resources: {}
podSecurityContext:
  fsGroup: 990
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 990
extraEnv: []
extraEnvFrom: []
podAnnotations: {}
podLabels: {}
affinity: {}
nodeSelector: {}
tolerations: []
terminationGracePeriodSeconds: 30
deploymentStrategy:
  type: Recreate

networkPolicy:
  enabled: false
  ingressControllerNamespace: platform
  ingressControllerPodLabels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
  dnsNamespace: kube-system

observability:
  otelEndpoint: ""
  lokiUrl: ""

probes:
  readiness:
    path: /up
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /up
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    path: /up
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 60
