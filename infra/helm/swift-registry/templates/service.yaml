apiVersion: v1
kind: Service
metadata:
  name: {{ include "swift-registry.fullname" . }}
  labels:
    {{- include "swift-registry.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "swift-registry.componentLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
