global:
  commonLabels:
    tuist.dev/service: swift-registry
    tuist.dev/stack: managed

host: swift-registry.tuist.dev
serverUrl: https://tuist.dev
deployEnv: prod
sentryEnv: prod
poolSize: "10"

ingress:
  enabled: true
  className: nginx
  host: swift-registry.tuist.dev
  tlsSecretName: swift-registry-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare

runtimeSecrets:
  externalSecret:
    enabled: true
    item: SWIFT_REGISTRY

networkPolicy:
  enabled: true

observability:
  otelEndpoint: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4317

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

nodeSelector:
  node.cluster.x-k8s.io/pool: general
