{{- if not .Values.runtimeSecrets.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "registry.runtimeSecretName" . }}
  labels:
    {{- include "registry.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
type: Opaque
stringData:
  SENTRY_DSN_REGISTRY: {{ .Values.runtimeSecrets.inline.sentryDsn | default "" | quote }}
  S3_REGISTRY_BUCKET: {{ required "runtimeSecrets.inline.s3RegistryBucket is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.s3RegistryBucket | quote }}
  S3_HOST: {{ required "runtimeSecrets.inline.s3Host is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.s3Host | quote }}
  S3_ACCESS_KEY_ID: {{ required "runtimeSecrets.inline.s3AccessKeyId is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ required "runtimeSecrets.inline.s3SecretAccessKey is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.s3SecretAccessKey | quote }}
  S3_REGION: {{ required "runtimeSecrets.inline.s3Region is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.s3Region | quote }}
  TUIST_REGISTRY_SWIFT_API_KEY: {{ required "runtimeSecrets.inline.apiKey is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.apiKey | quote }}
  REGISTRY_GITHUB_TOKEN: {{ required "runtimeSecrets.inline.registryGithubToken is required when runtimeSecrets.externalSecret.enabled is false" .Values.runtimeSecrets.inline.registryGithubToken | quote }}
  OBAN_WEB_USERNAME: {{ .Values.runtimeSecrets.inline.obanWebUsername | default "" | quote }}
  OBAN_WEB_PASSWORD: {{ .Values.runtimeSecrets.inline.obanWebPassword | default "" | quote }}
{{- end }}
