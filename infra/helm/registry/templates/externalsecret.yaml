{{- if .Values.runtimeSecrets.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "registry.runtimeSecretName" . }}
  labels:
    {{- include "registry.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  refreshInterval: {{ .Values.runtimeSecrets.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.runtimeSecrets.externalSecret.storeRef.name | default "onepassword" }}
    kind: {{ .Values.runtimeSecrets.externalSecret.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "registry.runtimeSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SENTRY_DSN_REGISTRY: '{{ `{{ (index . "sentry_dsn" | default (index . "SENTRY_DSN_REGISTRY") | default "") | trim }}` }}'
        S3_REGISTRY_BUCKET: "{{ `{{ .s3_registry_bucket | trim }}` }}"
        S3_HOST: "{{ `{{ .s3_host | trim }}` }}"
        S3_ACCESS_KEY_ID: "{{ `{{ .s3_access_key_id | trim }}` }}"
        S3_SECRET_ACCESS_KEY: "{{ `{{ .s3_secret_access_key | trim }}` }}"
        S3_REGION: "{{ `{{ .s3_region | trim }}` }}"
        TUIST_REGISTRY_SWIFT_API_KEY: "{{ `{{ .api_key | trim }}` }}"
        REGISTRY_GITHUB_TOKEN: "{{ `{{ .registry_github_token | trim }}` }}"
        OBAN_WEB_USERNAME: '{{ `{{ (index . "oban_web_username" | default (index . "OBAN_WEB_USERNAME") | default "") | trim }}` }}'
        OBAN_WEB_PASSWORD: '{{ `{{ (index . "oban_web_password" | default (index . "OBAN_WEB_PASSWORD") | default "") | trim }}` }}'
  data:
    {{- with .Values.runtimeSecrets.externalSecret.fields.sentryDsn }}
    - secretKey: sentry_dsn
      remoteRef:
        key: {{ printf "%s/%s" $.Values.runtimeSecrets.externalSecret.item . | quote }}
    {{- end }}
    - secretKey: s3_registry_bucket
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.s3RegistryBucket }}"
    - secretKey: s3_host
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.s3Host }}"
    - secretKey: s3_access_key_id
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.s3AccessKeyId }}"
    - secretKey: s3_secret_access_key
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.s3SecretAccessKey }}"
    - secretKey: s3_region
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.s3Region }}"
    - secretKey: api_key
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.apiKey }}"
    - secretKey: registry_github_token
      remoteRef:
        key: "{{ .Values.runtimeSecrets.externalSecret.item }}/{{ .Values.runtimeSecrets.externalSecret.fields.registryGithubToken }}"
    {{- with .Values.runtimeSecrets.externalSecret.fields.obanWebUsername }}
    - secretKey: oban_web_username
      remoteRef:
        key: {{ printf "%s/%s" $.Values.runtimeSecrets.externalSecret.item . | quote }}
    {{- end }}
    {{- with .Values.runtimeSecrets.externalSecret.fields.obanWebPassword }}
    - secretKey: oban_web_password
      remoteRef:
        key: {{ printf "%s/%s" $.Values.runtimeSecrets.externalSecret.item . | quote }}
    {{- end }}
  dataFrom:
    - extract:
        key: {{ .Values.runtimeSecrets.externalSecret.item | quote }}
{{- end }}
