{{- /*
ESO ExternalSecret syncing the Tigris credentials barman uses to
write WAL + base backups. Same 1P item the main Tuist server's
CNPG cluster reads — `S3_BACKUP_CREDENTIALS` in the production vault.
Granted just write-access to the tuist-prod-pg-backups bucket under
the tuist-ops prefix.
*/}}
{{- if .Values.postgresql.backup.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgresql.backup.credentialsSecretName }}
  labels:
    {{- include "tuist-ops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql-backup
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeRef.name }}
    kind: {{ .Values.externalSecret.storeRef.kind }}
  target:
    name: {{ .Values.postgresql.backup.credentialsSecretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ACCESS_KEY_ID: "{{ `{{ .access_key_id | trim }}` }}"
        ACCESS_SECRET_KEY: "{{ `{{ .secret_access_key | trim }}` }}"
  dataFrom:
    - extract:
        key: S3_BACKUP_CREDENTIALS
{{- end }}
