{{- /*
ESO ExternalSecret for the bot's runtime credentials. Single 1P
item TUIST_OPS_BOT in the mgmt vault, fields listed in the
Slack/Tailscale blocks below; ESO renders the matching
key=value pairs into a Secret consumed via envFrom on the pod.

Names match what TuistOps.Environment reads. Keep this in sync
with `tuist-ops/lib/tuist_ops/environment.ex`.
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist-ops.runtimeSecretName" . }}
  labels:
    {{- include "tuist-ops.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime-secret
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeRef.name }}
    kind: {{ .Values.externalSecret.storeRef.kind }}
  target:
    name: {{ include "tuist-ops.runtimeSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TAILSCALE_CLIENT_ID: "{{ `{{ .tailscale_client_id | trim }}` }}"
        TAILSCALE_CLIENT_SECRET: "{{ `{{ .tailscale_client_secret | trim }}` }}"
        TAILSCALE_TAILNET: "{{ `{{ .tailscale_tailnet | trim }}` }}"
        SLACK_SIGNING_SECRET: "{{ `{{ .slack_signing_secret | trim }}` }}"
        SLACK_BOT_TOKEN: "{{ `{{ .slack_bot_token | trim }}` }}"
        SLACK_APPROVALS_CHANNEL_ID: "{{ `{{ .slack_approvals_channel_id | trim }}` }}"
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.item | quote }}
---
# Phoenix release SECRET_KEY_BASE lives in the same 1P item but
# under its own field so it can be rotated independently of the
# Slack/Tailscale credentials.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist-ops.appSecretName" . }}
  labels:
    {{- include "tuist-ops.labels" . | nindent 4 }}
    app.kubernetes.io/component: app-secret
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeRef.name }}
    kind: {{ .Values.externalSecret.storeRef.kind }}
  target:
    name: {{ include "tuist-ops.appSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SECRET_KEY_BASE: "{{ `{{ .secret_key_base | trim }}` }}"
  dataFrom:
    - extract:
        key: {{ .Values.appSecret.externalSecret.item | quote }}
{{- end }}
