# Overlay for Slack-requested preview environments.
#
# Layer this after values-preview.yaml. It keeps the preview-class dependency
# shape (embedded Postgres, ClickHouse, and MinIO) but turns on the Kura
# controller. The workflow creates one preview-scoped KuraInstance and points
# the server at its public endpoint through server.kuraEndpointUrls, so all
# accounts in the preview share that mesh without creating per-account
# kura_servers rows.
#
# Required deploy-time image pins:
#   --set kuraController.image.tag=<sha-or-release>
#   --set kuraRuntime.image.tag=<release>
global:
  commonLabels:
    tuist.dev/environment: preview
    tuist.dev/preview-source: slack

server:
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 4Gi
  extraEnv:
    - name: TUIST_DATABASE_POOL_SIZE
      value: "10"
    # Opts this install into the shared Kura mesh routing path: every
    # account is served the configured TUIST_KURA_ENDPOINTS instead of
    # going through per-account `kura_servers` rows. Defense-in-depth
    # flag — production overlays do not set this, so a stray endpoints
    # env var leaking there cannot bypass the per-account opt-in.
    - name: TUIST_KURA_SHARED_MESH
      value: "1"

kuraController:
  enabled: true
  namespace: kura
  replicaCount: 1
  tlsClusterIssuer: letsencrypt-cloudflare
  telemetry:
    deploymentEnvironment: preview
    otlpTracesEndpoint: ""
  sharedSecrets:
    enabled: true
    kuraIntrospection:
      enabled: true
      # clientId / clientSecret are injected at install time by
      # preview-ondemand-deploy.yml. The workflow reuses any existing
      # `kura-shared-secrets` Secret in the preview namespace so re-installs
      # do not churn credentials, and generates fresh random material on
      # first install. Leaving them committed in plaintext would publish
      # working preview credentials in the git history.
      clientId: ""
      clientSecret: ""

kuraRuntime:
  image:
    repository: ghcr.io/tuist/kura
    tag: ""
