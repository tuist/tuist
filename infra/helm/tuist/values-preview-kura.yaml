# Overlay for Slack-requested preview environments.
#
# Layer this after values-preview.yaml. It keeps the preview-class dependency
# shape (embedded Postgres, ClickHouse, and MinIO) but turns on the Kura
# controller. The workflow creates one preview-scoped KuraInstance and points
# the server at its public endpoint through server.kuraEndpointUrls, so all
# accounts in the preview share that mesh without creating per-account
# kura_servers rows.
#
# Required deploy-time image pins:
#   --set kuraController.image.tag=<sha-or-release>
#   --set kuraRuntime.image.tag=<release>
global:
  commonLabels:
    tuist.dev/environment: preview
    tuist.dev/preview-source: slack

server:
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 4Gi
  extraEnv:
    - name: TUIST_DATABASE_POOL_SIZE
      value: "10"

kuraController:
  enabled: true
  namespace: kura
  replicaCount: 1
  tlsClusterIssuer: letsencrypt-cloudflare
  telemetry:
    deploymentEnvironment: preview
    otlpTracesEndpoint: ""
  sharedSecrets:
    enabled: true
    kuraIntrospection:
      enabled: true
      clientId: preview-kura
      clientSecret: preview-kura-secret

kuraRuntime:
  image:
    repository: ghcr.io/tuist/kura
    tag: ""
