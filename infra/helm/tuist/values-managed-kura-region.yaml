# Production regional Kura workload clusters.
# Layer on top of values.yaml when deploying only the Kura controller to
# us-east/us-west clusters. The Tuist server itself remains in the main
# production cluster and writes KuraInstance CRs here via kubeconfig.

global:
  commonLabels:
    tuist.dev/service: kura
    tuist.dev/stack: managed

kuraController:
  enabled: true
  namespace: kura
  image:
    tag: ""  # Set by CI to the commit SHA on each deploy.
  # Some regional clusters run as single control-plane-only clusters.
  # Tolerating the standard control-plane taint lets the controller
  # schedule there, while worker-backed regions remain unaffected.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  # ClusterIssuer that fronts the public HTTPS and gRPC LoadBalancers
  # with Let's Encrypt certificates. Must already exist on the regional
  # cluster (cert-manager + the issuer are bootstrapped via the
  # mgmt-cluster pipeline).
  tlsClusterIssuer: "letsencrypt-cloudflare"
  cloudflareLoadBalancing:
    enabled: true
    zoneName: tuist.dev
    apiTokenSecret:
      managed: true
      item: KURA_CLOUDFLARE_API_TOKEN
  sharedSecrets:
    # In managed regions, kura-shared-secrets is populated by CI from
    # the same secret store as the Tuist server release.
    enabled: true
    data: {}

server:
  enabled: false
  serviceAccount:
    create: false
  migrationJob:
    enabled: false

cache:
  enabled: false

processor:
  enabled: false

xcresultProcessor:
  enabled: false

macosFleet:
  enabled: false

postgresql:
  mode: external

clickhouse:
  mode: external

objectStorage:
  mode: external
  external:
    managedSecrets: false

redis:
  enabled: false

observability:
  enabled: false
