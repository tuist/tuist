# Production regional Kura workload clusters.
# Layer on top of values.yaml when deploying only the Kura controller to
# us-east/us-west clusters. The Tuist server itself remains in the main
# production cluster and writes KuraInstance CRs here via kubeconfig.

global:
  commonLabels:
    tuist.dev/service: kura
    tuist.dev/stack: managed

# Regional Kura clusters still expose their per-region public and gRPC
# endpoints through Hetzner LoadBalancer Services. This only disables
# the Cloudflare-fronted global endpoint layer until the Cloudflare
# pool quota is raised.
kuraGlobalEndpointsEnabled: false
kuraGlobalEndpointsRequired: false

kuraController:
  enabled: true
  namespace: kura
  image:
    tag: ""  # Set by CI to the commit SHA on each deploy.
  # Some regional clusters run as single control-plane-only clusters.
  # Tolerating the standard control-plane taint lets the controller
  # schedule there, while worker-backed regions remain unaffected.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  # ClusterIssuer that fronts the public HTTPS and gRPC LoadBalancers
  # with Let's Encrypt certificates. Must already exist on the regional
  # cluster (cert-manager + the issuer are bootstrapped via the
  # mgmt-cluster pipeline).
  tlsClusterIssuer: "letsencrypt-cloudflare"
  telemetry:
    otlpTracesEndpoint: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4318/v1/traces
  cloudflareLoadBalancing:
    # Keep Cloudflare credentials wired so destroy flows can still clean
    # up any previously provisioned global endpoints after reconciliation
    # is re-enabled.
    enabled: true
    zoneName: tuist.dev
    apiTokenSecret:
      managed: true
      item: cloudflare-tuist-dns
  sharedSecrets:
    # In managed regions, kura-shared-secrets is populated from the
    # same 1Password vault as the Tuist server release.
    enabled: true
    data: {}
    externalSecret:
      enabled: true
      item: kura-introspection-oauth-client

server:
  enabled: false
  serviceAccount:
    create: false
  migrationJob:
    enabled: false

cache:
  enabled: false

processor:
  enabled: false

xcresultProcessor:
  enabled: false

macosFleet:
  enabled: false

postgresql:
  mode: external

clickhouse:
  mode: external

objectStorage:
  mode: external
  external:
    managedSecrets: false

redis:
  enabled: false

observability:
  enabled: false
