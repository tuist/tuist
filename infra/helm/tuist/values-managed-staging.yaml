# Staging overlay for the Tuist-managed deployment.
# Layer on top of values-managed-common.yaml. Secrets come from 1Password via
# ESO (configured in common); at deploy time we only pass the image tag.
#
#   helm upgrade --install tuist infra/helm/tuist \
#     -n tuist-staging --create-namespace \
#     -f infra/helm/tuist/values-managed-common.yaml \
#     -f infra/helm/tuist/values-managed-staging.yaml \
#     --set server.image.tag=$GIT_SHA

server:
  replicaCount: 1

  # Non-secret runtime config. Traces go to the in-cluster Alloy receiver
  # (deployed by infra/helm/k8s-monitoring) via OTLP gRPC; Alloy forwards
  # them to Grafana Cloud Tempo. Logs follow a different path — the server
  # writes to stdout and a per-node Alloy DaemonSet tails /var/log/pods —
  # so TUIST_LOKI_URL stays unset (the in-app LokiLoggerHandler only
  # attaches when TUIST_LOKI_INPROC=1).
  extraEnv:
    # Selects which priv/secrets/<env>.yml.enc file the app decrypts at
    # boot. Image is env-agnostic (built with MIX_ENV=prod); this flag
    # plus the MASTER_KEY ESO secret pick the runtime deployment target.
    - name: TUIST_DEPLOY_ENV
      value: stag
    - name: TUIST_DATABASE_POOL_SIZE
      value: "15"
    - name: TUIST_OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4317

  appUrl: https://staging.tuist.dev

  # ingress-nginx fronts the server on port 443 with a Cloudflare Origin CA
  # cert (synced into the tuist-tls-cloudflare-origin Secret out-of-band;
  # 15-year validity, renewal is a future-us problem). Cloudflare is set
  # to Full (strict) SSL — edge ↔ origin now runs HTTPS.
  ingress:
    enabled: true
    className: nginx
    host: staging.tuist.dev
    tlsSecretName: tuist-tls-cloudflare-origin

  autoscaling:
    enabled: false

  podDisruptionBudget:
    enabled: false

  # Staging only has 2 cpx22 worker nodes (~2.5GiB allocatable each), and
  # system DaemonSets eat ~1GiB per node before app pods schedule. With
  # `maxSurge: 1` (the chart default) a rolling deploy needs the new server
  # pod to start *before* the old one terminates, which doesn't fit. Swap
  # to `maxUnavailable: 1` so the old pod terminates first; brief downtime
  # during deploy is acceptable for staging.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  # Staging is squeezed onto 2 cpx22 workers (~2.5Gi allocatable each, ~1.5Gi
  # eaten by system DaemonSets). Requests are sized for *scheduling*, not for
  # actual runtime memory usage — the BEAM regularly uses 700-900MiB. Limits
  # carry the real headroom; the burstable QoS class is intentional given how
  # idle staging stays.
  resources:
    requests:
      cpu: "250m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"

processor:
  # Supabase staging project (inzgspjesrhqhleomvkb) — dedicated pooler on
  # port 6543 (transaction mode). Same hostname as the direct Postgres
  # endpoint, just a different port. Pooler creds are the `tuist_processor`
  # role provisioned via infra/supabase/tuist-processor-role.sql.
  database:
    host: db.inzgspjesrhqhleomvkb.supabase.co
  # Single replica on staging — 2-replica redundancy isn't needed for a
  # pre-prod env, and a second pod doesn't fit on the 2-worker cluster
  # alongside the server pod + system DaemonSets. PDB stays off too;
  # rolling deploys terminate the one pod, jobs queue up briefly in
  # oban_jobs, and resume once the new pod boots.
  replicaCount: 1
  podDisruptionBudget:
    enabled: false
  # Same surge=0/unavailable=1 reasoning as the server above.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  extraEnv:
    # Must match the server's TUIST_DEPLOY_ENV above so the processor pod
    # decrypts the same priv/secrets/<env>.yml.enc file the web tier does.
    - name: TUIST_DEPLOY_ENV
      value: stag
    - name: TUIST_OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4317
  # The processor runs the full Tuist BEAM release (Repos, Vault, Cachex,
  # ingestion buffers, Oban, etc.) — TUIST_MODE=processor only skips the
  # Phoenix endpoint binding and narrows the Oban queue set. Boot memory sits
  # around 600-800MiB. Same burstable shape as the server above: low request
  # so it schedules next to the server on the cramped staging cluster, high
  # limit so runtime isn't constrained.
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "1536Mi"

xcresultProcessor:
  # Single replica in staging. The xcresult processor is a regular k8s
  # Deployment scheduled onto the Mac mini macOS node via Tart-CRI;
  # rolling deploys get the same maxSurge=0/maxUnavailable=1 treatment
  # as the server, with jobs queuing in oban_jobs while the pod
  # restarts.
  enabled: true
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  extraEnv:
    - name: TUIST_DEPLOY_ENV
      value: stag
    - name: TUIST_OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4317

# Mac mini fleet. The chart renders one ScalewayAppleSiliconMachine
# CR per replica; the cluster-api-provider-scaleway-applesilicon
# operator orders each Mac mini, then SSH-bootstraps it with
# tart-kubelet. The Mac mini joins the cluster as a real Node.
macosFleet:
  enabled: true
  replicas: 1
  image:
    # capi-provider-scaleway-applesilicon — operator that owns Mac
    # mini lifecycle (Scaleway create/release + SSH bootstrap +
    # tart-kubelet install).
    tag: "ae4b412d"
  # External k8s API server URL the Mac minis dial when joining.
  # Pinned to the Syself-managed staging control plane endpoint.
  apiServerURL: "https://autopilot-1.autopilot-prod.k8s.syself.net:443"
  machine:
    # M4-S is normally what we'd pick (smallest M4); falls back to
    # M2-M when M4-S is no_stock. Override per Scaleway capacity.
    type: M2-M
