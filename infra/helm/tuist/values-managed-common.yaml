# Shared values for the Tuist-managed deployment (tuist.dev).
# All data services are external; the cache + embedded observability stack are off;
# traffic flows through cert-manager + Cloudflare DNS-01 TLS and an ingress-nginx
# LoadBalancer backed by the cloud provider's managed LB.
#
# This file is layered under values-managed-staging.yaml / values-managed-production.yaml;
# those overlays tune replica count, host names, and any environment-specific knobs.

global:
  commonLabels:
    tuist.dev/service: server
    tuist.dev/stack: managed

server:
  serviceAccount:
    create: true
    name: tuist-server
  enabled: true
  hosted: true
  skipEmailConfirmation: false
  logLevel: info
  image:
    repository: ghcr.io/tuist/tuist
    tag: ""  # Set by CI to the commit SHA on each deploy.
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  # ingress-nginx defaults `proxy-body-size` to 1m, which rejects large
  # `createBundle` requests (the JSON manifest carries one entry per
  # artifact and grows past 1 MB on big iOS apps). Match the Phoenix
  # Plug.Parsers limit at lib/tuist_web/endpoint.ex so the two stay in
  # lockstep — bump both when bumping either.
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"

  # All runtime secrets (DATABASE_URL, CLICKHOUSE_URL, S3 creds, Sentry, Stripe,
  # OAuth, Mailgun, etc.) live in priv/secrets/<env>.yml.enc baked into the
  # image. The app decrypts them at boot when MASTER_KEY is present in the
  # environment. MASTER_KEY itself is synced from 1Password by ESO — see
  # externalSecrets below and infra/k8s/syself-onboarding.md for the bootstrap.
  managedSecrets: true
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    masterKey:
      # 1Password item name in the vault referenced by the SecretStore.
      item: MASTER_KEY
      # Default `password` field for items of category Password.
      field: password

  database:
    ssl: true

  cluster:
    # Enable only when distributed Elixir is needed across pods (libcluster,
    # Phoenix.PubSub across nodes, singleton workers).
    #
    # Important: if you scale `server.replicaCount` above 1 (including via
    # the HPA) while keeping this false, rel/env.sh sets
    # RELEASE_DISTRIBUTION=none and each pod runs isolated. Anything in the
    # app that assumes cluster membership (cross-node Phoenix.PubSub fanout,
    # global singletons, distributed Oban) will silently only work within a
    # single pod. Verify the app's expectations before scaling past 1
    # replica, or set this to true and headless-Service + TUIST_CLUSTER_*
    # env vars will be emitted by the chart.
    enabled: false
    applicationName: tuist

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  migrationJob:
    enabled: true
    asHook: true
    backoffLimit: 3

  # HTTP probes all hit /ready. startupProbe covers the ~30-60s Phoenix boot
  # and the OTel / Sentry init latency we occasionally see in prod.
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      path: /ready
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      path: /ready
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 60

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  terminationGracePeriodSeconds: 60

# Processor runs in-cluster as a dedicated Oban consumer for :process_build.
# Same Docker image as the server; TUIST_MODE=processor in the chart
# flips the BEAM into queue-only mode. Postgres is the coordination plane —
# FOR UPDATE SKIP LOCKED gives natural load-balancing across replicas.
#
# The DATABASE_URL in 1P ("PROCESSOR_DATABASE_URL") must embed the
# `tuist_processor` role provisioned via infra/supabase/tuist-processor-role.sql
# on each env's Supabase project. Without the role, ESO syncs an empty URL
# and processor pods crashloop — see infra/supabase/README.md for bootstrap.
processor:
  enabled: true
  replicaCount: 2
  queueConcurrency: 5
  managedSecrets: true
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    databasePassword:
      item: PROCESSOR_DATABASE_PASSWORD
      field: password
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# Xcresult processing runs as a standard k8s Deployment on Mac mini
# nodes that joined the cluster via tart-cri (see infra/tart-cri/).
# xcresulttool is Xcode-only, so this workload lives on macOS hosts
# specifically. Flipping `enabled: true` also adds
# TUIST_DELEGATE_PROCESS_XCRESULT=1 to the Linux server pods so they
# drop `:process_xcresult` and the macOS Pods own the queue.
xcresultProcessor:
  enabled: true
  replicaCount: 2
  queueConcurrency: 4
  image:
    repository: ghcr.io/tuist/tuist-xcresult-processor
    tag: ""  # Set by CI to the commit SHA on each deploy.

# Mac mini fleet provisioned declaratively via the Cluster API
# Scaleway-Apple-Silicon provider. Scaling is `kubectl scale
# machinedeployment <name> --replicas=N`. Per-env overlay sets the
# control-plane URL + the per-host pod CIDR.
macosFleet:
  enabled: true
  image:
    repository: ghcr.io/tuist/capi-provider-scaleway-applesilicon
    tag: ""

# Everything below = external. The managed deployment never runs embedded
# Postgres / ClickHouse / object storage / observability stacks.
cache:
  enabled: false

postgresql:
  mode: external
  # Supabase-managed Postgres in AWS eu-central-1 Frankfurt.
  # Fill per environment; keep the password in a separate Secret (see
  # extraEnvFrom in the overlays).
  external:
    host: ""
    port: 5432
    database: tuist
    username: tuist
    password: ""

clickhouse:
  mode: external
  external:
    url: ""  # https://<clickhouse-cloud>.clickhouse.cloud:8443/tuist_prod

objectStorage:
  mode: external
  # Tigris S3-compatible storage.
  external:
    endpoint: ""       # e.g. https://fly.storage.tigris.dev
    accessKey: ""
    secretKey: ""
    region: auto
    buckets:
      default: tuist
      cache: tuist-cache
      xcodeCache: tuist-xcode-cache
      registry: tuist-registry

observability:
  # We forward to Grafana Cloud via an in-cluster Alloy DaemonSet installed by
  # the platform chart. The chart's embedded observability stack stays off.
  enabled: false
