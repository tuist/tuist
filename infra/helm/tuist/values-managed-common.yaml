# Shared values for the Tuist-managed deployment (tuist.dev).
# All data services are external; the cache + embedded observability stack are off;
# traffic flows through cert-manager + Cloudflare DNS-01 TLS and an ingress-nginx
# LoadBalancer backed by the cloud provider's managed LB.
#
# This file is layered under values-managed-staging.yaml /
# values-managed-canary.yaml / values-managed-production.yaml; those overlays
# tune replica count, host names, and any environment-specific knobs.

global:
  commonLabels:
    tuist.dev/service: server
    tuist.dev/stack: managed

kuraController:
  enabled: true
  namespace: kura
  image:
    tag: ""  # Set by CI to the commit SHA on each deploy.
  # Managed app clusters bootstrap this ClusterIssuer via the platform
  # chart. The controller uses it for the per-Kura public HTTPS and gRPC
  # certificates mounted into each runtime pod.
  tlsClusterIssuer: "letsencrypt-cloudflare"
  telemetry:
    otlpTracesEndpoint: http://k8s-monitoring-alloy-receiver.observability.svc.cluster.local:4318/v1/traces

server:
  serviceAccount:
    create: true
    name: tuist-server
  enabled: true
  hosted: true
  skipEmailConfirmation: false
  logLevel: info
  image:
    repository: ghcr.io/tuist/tuist
    tag: ""  # Set by CI to the commit SHA on each deploy.
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  # ingress-nginx defaults `proxy-body-size` to 1m, which rejects large
  # `createBundle` requests (the JSON manifest carries one entry per
  # artifact and grows past 1 MB on big iOS apps). Match the Phoenix
  # Plug.Parsers limit at lib/tuist_web/endpoint.ex so the two stay in
  # lockstep — bump both when bumping either.
  #
  # `proxy-request-buffering: off` streams the request body straight to
  # Bandit instead of spooling it to /tmp/nginx/client-body on the
  # controller pod. With buffering on, anything over `client-body-buffer-size`
  # (8–16 KB) hits disk; slow disk reads back to upstream then trip Bandit's
  # thousand_island read_timeout (15s, runtime.exs) and surface as 502s on
  # any POST endpoint with a non-trivial body (cache, runs, webhooks).
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-request-buffering: "off"

  # All runtime secrets (DATABASE_URL, CLICKHOUSE_URL, S3 creds, Sentry, Stripe,
  # OAuth, Mailgun, etc.) live in priv/secrets/<env>.yml.enc baked into the
  # image. The app decrypts them at boot when MASTER_KEY is present in the
  # environment. MASTER_KEY itself is synced from 1Password by ESO — see
  # externalSecrets below and infra/k8s/onboarding.md for the bootstrap.
  managedSecrets: true
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    masterKey:
      # 1Password item name in the vault referenced by the SecretStore.
      item: MASTER_KEY
      # Default `password` field for items of category Password.
      field: password

  # ESO-synced GitHub App + bot PATs. The PEM file attachment name
  # differs per env (production.pem / staging.pem / canary.pem) and is
  # set in each values-managed-<env>.yaml. Everything else is shared
  # across envs.
  github:
    managedSecrets: true

  database:
    ssl: true

  cluster:
    # Enable only when distributed Elixir is needed across pods (libcluster,
    # Phoenix.PubSub across nodes, singleton workers).
    #
    # Important: if you scale `server.replicaCount` above 1 (including via
    # the HPA) while keeping this false, rel/env.sh sets
    # RELEASE_DISTRIBUTION=none and each pod runs isolated. Anything in the
    # app that assumes cluster membership (cross-node Phoenix.PubSub fanout,
    # global singletons, distributed Oban) will silently only work within a
    # single pod. Verify the app's expectations before scaling past 1
    # replica, or set this to true and headless-Service + TUIST_CLUSTER_*
    # env vars will be emitted by the chart.
    enabled: false
    applicationName: tuist

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  migrationJob:
    enabled: true
    asHook: true
    backoffLimit: 3
    # Keep a non-zero memory request so the migration pod isn't the first
    # thing kubelet evicts under node pressure. Production has room for this
    # default; staging/canary override the request lower so the pre-upgrade
    # hook still schedules on their smaller two-worker clusters. The 4Gi
    # limit gives the artifact backfill (which streams chunks but still
    # carries the BEAM, the PG cursor, and the CH client) headroom over
    # its tens-of-MB working set, while still bounding a runaway so it
    # self-terminates instead of taking the node's other pods down.
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "4Gi"

  # HTTP probes all hit /ready. startupProbe covers the ~30-60s Phoenix boot
  # and the OTel / Sentry init latency we occasionally see in prod.
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      path: /ready
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      path: /ready
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 60

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  terminationGracePeriodSeconds: 60

# Processor runs in-cluster as a dedicated Oban consumer for :process_build.
# Same Docker image as the server; TUIST_MODE=processor in the chart
# flips the BEAM into queue-only mode. Postgres is the coordination plane —
# FOR UPDATE SKIP LOCKED gives natural load-balancing across replicas.
#
# The `PROCESSOR_DATABASE_PASSWORD` 1P item holds the password for the
# `tuist_processor` role. Under `postgresql.mode = cnpg` (default for
# managed envs) CNPG creates and manages the role declaratively from
# that Secret; per-table GRANTs run once per fresh cluster via the
# bootstrap SQL in infra/cnpg/tuist-processor-grants.sql. Without the
# 1P item, ESO syncs an empty password and processor pods crashloop.
processor:
  enabled: true
  replicaCount: 2
  queueConcurrency: 5
  managedSecrets: true
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    databasePassword:
      item: PROCESSOR_DATABASE_PASSWORD
      field: password
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# Xcresult processing runs as a standard k8s Deployment on Mac mini
# nodes that joined the cluster via tart-cri (see infra/tart-cri/).
# xcresulttool is Xcode-only, so this workload lives on macOS hosts
# specifically. Flipping `enabled: true` also adds
# TUIST_DELEGATE_PROCESS_XCRESULT=1 to the Linux server pods so they
# drop `:process_xcresult` and the macOS Pods own the queue.
xcresultProcessor:
  enabled: true
  replicaCount: 2
  queueConcurrency: 4
  image:
    repository: ghcr.io/tuist/tuist-xcresult-processor
    # Bumped automatically by the release workflow when a relevant
    # server, xcresult NIF, or xcresult-processor-image change lands on
    # main; the workflow rebuilds the Tart VM image on the bare-metal
    # Mac mini, pushes the matching semver tag, and rewrites this line
    # in the same auto-commit. Until release.yml has run for this
    # component, pin to a known-good SHA-tagged build that the standalone
    # xcresult-processor-image.yml workflow pushed.
    tag: "0.12.1"

capi:
  # Managed clusters store the CAPI workload kubeconfig in their
  # per-env 1Password vault, so ESO can sync it into the
  # <release>-capi-kubeconfig Secret that CAPI core's cluster cache
  # reads. Without it CAPI can't bind fleet Machines to Nodes and the
  # server deploy's `helm --wait` times out on the fleet
  # MachineDeployments.
  remoteKubeconfig:
    externalSecrets:
      enabled: true

# Mac mini fleet provisioned declaratively via the Cluster API
# Scaleway-Apple-Silicon provider. Scaling is `kubectl scale
# machinedeployment <name> --replicas=N`. Per-env overlay sets the
# control-plane URL + the per-host pod CIDR.
macosFleet:
  enabled: true
  image:
    repository: ghcr.io/tuist/capi-provider-scaleway-applesilicon
    # Bumped automatically by the release workflow when a
    # capi-scaleway-scoped conventional commit lands on main; the
    # workflow builds the new image, pushes the matching semver tag,
    # and rewrites this line in the same auto-commit. Until
    # release.yml has run for this scope, pin to a known-good
    # SHA-tagged build that the standalone
    # capi-provider-scaleway-applesilicon-image.yml workflow pushed.
    tag: "0.8.2"
  # MagicDNSSuffix is a tailnet-account-level constant — same
  # across all three envs because they share one Tuist tailnet.
  # Read once from `tailscale status --json | .MagicDNSSuffix` on
  # any tailnet-joined device.
  tailscaleEgress:
    enabled: true
    magicDNSSuffix: taild6d7bb.ts.net

runnersController:
  image:
    repository: ghcr.io/tuist/tuist-runners-controller
    # SHA-tagged build from the runners-controller-image.yml
    # workflow.
    tag: "0.11.0"

# Everything below = external. The managed deployment never runs embedded
# Postgres / ClickHouse / object storage / observability stacks.
cache:
  enabled: false

# CloudNativePG-managed in-cluster Postgres. Replaces the Supabase
# external mode that managed envs ran on previously. Each env overlay
# tunes instance count + storage size; the rest of the cluster shape
# lives under `postgresql.cnpg` in values.yaml. Requires the
# cloudnative-pg operator (installed via the platform chart).
#
# The owner role's password Secret is generated by CNPG and exposed at
# `<cluster>-app`; the server / migration pods mount DATABASE_URL from
# its `uri` key. The processor's least-privilege `tuist_processor` role
# uses the same `PROCESSOR_DATABASE_PASSWORD` 1P item as the prior
# Supabase shape — the password value is what CNPG reconciles into the
# role's SCRAM hash, so rotation is still a one-shot `op item edit`.
# Phased Supabase→CNPG migration. `cnpg.enabled: true` makes the
# next platform/server deploy provision the in-cluster Postgres
# cluster + start barman archiving to Tigris. The server itself stays
# on Supabase (`mode: external`) so the catch-up soak can run in
# parallel without touching the live traffic path. After the soak
# passes per env, flip `mode` to `cnpg` in the env overlay to cut
# over.
postgresql:
  mode: external
  external:
    host: ""
    port: 5432
    database: tuist
    username: tuist
    password: ""
  cnpg:
    enabled: true
    backup:
      # Per-env bucket name lives in the env overlay's destinationPath.
      endpointURL: https://t3.storage.dev
    externalSecrets:
      refreshInterval: "1h"
      storeRef:
        kind: ClusterSecretStore
        name: onepassword
      backupCredentials:
        item: S3_BACKUP_CREDENTIALS
        accessKeyField: access_key_id
        secretKeyField: secret_access_key
      processorPassword:
        item: PROCESSOR_DATABASE_PASSWORD
        field: password
      opsRoPassword:
        item: OPS_DATABASE_PASSWORD
        field: password

clickhouse:
  mode: external
  external:
    url: ""  # https://<clickhouse-cloud>.clickhouse.cloud:8443/tuist_prod

objectStorage:
  mode: external
  # Tigris S3-compatible storage. Per-env access key + secret access key are
  # synced from 1Password via ESO (item S3_CREDENTIALS in tuist-k8s-<env>);
  # endpoint and region are vendor-level constants and live here. Per-env
  # bucket name is set in values-managed-<env>.yaml.
  external:
    endpoint: https://t3.storage.dev
    region: auto
    managedSecrets: true
    externalSecrets:
      refreshInterval: "1h"
      storeRef:
        kind: ClusterSecretStore
        name: onepassword
      accessKey:
        item: S3_CREDENTIALS
        field: access_key_id
      secretKey:
        item: S3_CREDENTIALS
        field: secret_access_key

observability:
  # We forward to Grafana Cloud via an in-cluster Alloy DaemonSet installed by
  # the platform chart. The chart's embedded observability stack stays off.
  enabled: false

# macOS Profile catalog — shared across every managed env. The
# catalog (which shapes / Xcode versions exist) doesn't differ per
# env today; per-env files only declare `xcodeOverrides` keyed by
# `xcodeVersion`, where they tune `replicas`, pod sizing, and
# autoscaling for the local fleet.
#
# - `runner-pool.yaml` iterates `xcodeVersions` here and merges the
#   matching per-env `xcodeOverrides[<version>]` to render each pool.
# - The server reads these via `TUIST_RUNNER_MACOS_SHAPES` and
#   `TUIST_RUNNER_MACOS_XCODE_VERSIONS` (JSON projections in
#   server-deployment.yaml), so the Profiles dropdown + validation
#   stay in lockstep with the rendered pools.
# - `release.yml`'s `release-runner-image` reads `xcodeVersions`
#   from THIS file to build the Release notes image list.
#
# Keep `xcodeVersions` aligned with `runner-image-build.strategy.matrix.xcode`
# in `.github/workflows/release.yml` so every active Xcode tag has a
# pool that pins to it.
runnersFleet:
  shapes:
    - vcpus: 6
      memoryGb: 14
      default: true
  xcodeVersions:
    - xcodeVersion: "26.5"
      default: true
    - xcodeVersion: "26.4.1"
