{{- if .Values.macosFleet.enabled }}
{{- $fleetName := include "tuist.macosFleetName" . }}
{{- /*
Mac mini fleet — declarative.

The chart owns ONE ScalewayAppleSiliconFleet CR per logical pool;
the cluster-api-provider-scaleway-applesilicon operator's Fleet
controller owns the lifecycle of the underlying
ScalewayAppleSiliconMachine instances. This split was introduced
after `helm.sh/resource-policy: keep` on direct Machine CRs led
to silently-dropped spec updates (helm orphans the resource and
stops patching). With the Fleet abstraction:

  - helm freely patches the Fleet's `spec.replicas` /
    `spec.machineTemplate` on every upgrade.
  - The Fleet controller scales Machines up/down to match
    `spec.replicas` and recycles non-Ready Machines whose spec
    drifts from the template (covers the "Scaleway out of stock,
    flip SKU" scenario without manual `kubectl delete`).
  - Ready Machines (with a Scaleway server allocated) are not
    disrupted on a template change; rolling-update them is a
    follow-up enhancement.

Adoption: pre-existing Machine CRs (rendered by the older chart
shape before this template emitted Fleets) carrying
`tuist.dev/fleet=<fleetName>` are auto-adopted by the Fleet
controller via OwnerReference on first reconcile. No manual
kubectl ceremony beyond stripping the Machine's helm-tracking
annotations / labels so helm doesn't fight the operator over
ownership during the first upgrade.
*/ -}}
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ScalewayAppleSiliconFleet
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: macos-fleet
    tuist.dev/fleet: {{ $fleetName }}
  # No `helm.sh/resource-policy: keep`. Helm orphans kept
  # resources from BOTH uninstall AND upgrade, so spec changes
  # would be silently dropped — exactly the bug the Fleet
  # abstraction above already fixes for individual Machines, and
  # the same trap applies here. The dangerous case to avoid is
  # `macosFleet.enabled=false` in a single upgrade that ALSO
  # removes the operator: scale `replicas` to 0 first, let the
  # operator drain via the Fleet controller, then disable in a
  # follow-up release.
spec:
  replicas: {{ .Values.macosFleet.replicas | default 1 }}
  machineTemplate:
    type: {{ .Values.macosFleet.machine.type | default "M4-S" | quote }}
    zone: {{ .Values.macosFleet.machine.zone | default "fr-par-1" | quote }}
    os: {{ .Values.macosFleet.machine.os | default "macos-tahoe-26.0" | quote }}
{{- end }}
