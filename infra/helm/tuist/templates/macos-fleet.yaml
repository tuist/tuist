{{- if .Values.macosFleet.enabled }}
{{- $fleetName := .Values.macosFleet.name | default (include "tuist.componentName" (dict "root" . "component" "macos-fleet")) }}
{{- $replicas := int (.Values.macosFleet.replicas | default 1) }}
{{- /*
Mac mini fleet: render N ScalewayAppleSiliconMachine CRs directly.
Each one is reconciled by the cluster-api-provider-scaleway-applesilicon
operator, which orders the Mac mini from Scaleway and SSH-installs Tart.

We don't use CAPI core's Cluster/MachineDeployment machinery anymore —
without kubelet on Mac minis there's no Node to wait for, so the
indirection costs more than it gives. Scaling = bumping `replicas`.

The vk-applesilicon Deployment (next template) discovers these CRs at
runtime and registers a virtual Node backed by the fleet.
*/ -}}
{{- range $i, $_ := until $replicas }}
{{- $instance := printf "%s-%d" $fleetName $i }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ScalewayAppleSiliconMachine
metadata:
  name: {{ $instance }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
    app.kubernetes.io/component: macos-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  type: {{ $.Values.macosFleet.machine.type | default "M4-S" | quote }}
  zone: {{ $.Values.macosFleet.machine.zone | default "fr-par-1" | quote }}
  os: {{ $.Values.macosFleet.machine.os | default "macos-tahoe-26.0" | quote }}
  fleetName: {{ $fleetName | quote }}
  # podCIDR is unused now that Mac minis aren't k8s nodes (the VK
  # provider doesn't expose per-host pod networks), but the CRD still
  # requires the field. Leave it nominal.
  podCIDR: {{ $.Values.macosFleet.machine.podCIDR | default "10.0.0.0/24" | quote }}
{{- end }}
{{- end }}
