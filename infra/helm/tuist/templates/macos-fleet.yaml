{{- if .Values.macosFleet.enabled }}
{{- $fleetName := include "tuist.macosFleetName" . }}
{{- $clusterName := include "tuist.componentName" (dict "root" . "component" "capi") }}
{{- $bootstrapSecret := include "tuist.componentName" (dict "root" . "component" "noop-bootstrap") }}
{{- /*
Mac mini fleet — declarative.

CAPI primitive shape: MachineDeployment owns a MachineSet, which
creates Machines per replica, each Machine.spec.infrastructureRef
points at a per-replica ScalewayAppleSiliconMachine cloned from
the MachineTemplate below. Updates to the template (SKU change,
OS bump) propagate via MachineSet rotation; OnDelete strategy
keeps Ready Machines alive across template changes — physical
Mac minis are expensive to churn (Scaleway 24h-floor).

Replaces the previous ScalewayAppleSiliconFleet abstraction. We
get rolling-update / health-check / clusterctl tooling for free
and shed ~600 lines of custom Fleet controller code; sizing,
template, and Node-label semantics are unchanged.

Adoption of pre-existing Machines: MachineSet's label-selector
adoption pulls Machines whose labels match into ownership on the
first reconcile, so a chart upgrade from the Fleet shape doesn't
recreate Mac minis (avoids the 24h-floor cost). Operator-side
prep before the upgrade: strip the old Fleet's OwnerRef from
existing Machines.
*/ -}}
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ScalewayAppleSiliconMachineTemplate
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: macos-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  template:
    spec:
      type: {{ .Values.macosFleet.machine.type | default "M4-S" | quote }}
      zone: {{ .Values.macosFleet.machine.zone | default "fr-par-1" | quote }}
      os: {{ .Values.macosFleet.machine.os | default "macos-tahoe-26.0" | quote }}
      fleetName: {{ $fleetName }}
      {{- with .Values.macosFleet.machine.hostCPU }}
      hostCPU: {{ . }}
      {{- end }}
      {{- with .Values.macosFleet.machine.hostMemoryMB }}
      hostMemoryMB: {{ . }}
      {{- end }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: macos-fleet
    tuist.dev/fleet: {{ $fleetName }}
    cluster.x-k8s.io/cluster-name: {{ $clusterName }}
spec:
  clusterName: {{ $clusterName }}
  replicas: {{ .Values.macosFleet.replicas | default 1 }}
  # OnDelete: don't auto-roll Ready Mac minis when the template
  # changes — physical churn is expensive (Scaleway 24h-floor)
  # and the existing Mac minis are doing real work. Operator
  # rolls by `kubectl delete` on the Machines they want
  # replaced, MachineSet creates fresh ones from the new template.
  strategy:
    type: OnDelete
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $clusterName }}
      tuist.dev/fleet: {{ $fleetName }}
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ $clusterName }}
        tuist.dev/fleet: {{ $fleetName }}
    spec:
      clusterName: {{ $clusterName }}
      bootstrap:
        dataSecretName: {{ $bootstrapSecret }}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: ScalewayAppleSiliconMachineTemplate
        name: {{ $fleetName }}
{{- end }}
