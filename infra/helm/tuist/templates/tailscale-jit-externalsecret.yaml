{{- if .Values.tailscaleJIT.enabled }}
# JIT-elevation Slack bot credentials. Synced from the single 1P
# item TAILSCALE_JIT_BOT in the tuist-k8s-production vault (the bot
# only runs on prod since the tailnet ACL is a global single-writer
# resource) into a dedicated Secret the server pod mounts via
# envFrom. See lib/tuist/tailscale_jit/* for what each value is for.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tuist-tailscale-jit-bot
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: tailscale-jit
  {{- if .Values.server.migrationJob.asHook }}
  annotations:
    # Migration Job runs as a pre-upgrade hook with envFrom on this
    # Secret. Render this ExternalSecret as a hook too (weight -10,
    # matching server-external-secrets) so ESO syncs the Secret
    # BEFORE the migration Job's Pod starts; Helm waits on the
    # ExternalSecret's Ready condition (SecretSynced) before
    # proceeding to weight -1 hooks. Without this annotation the
    # ExternalSecret renders as a regular resource that lands AFTER
    # the hook chain, and the migration Job crashes with
    # CreateContainerConfigError: secret "tuist-tailscale-jit-bot" not found.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
spec:
  refreshInterval: {{ .Values.tailscaleJIT.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.tailscaleJIT.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.tailscaleJIT.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: tuist-tailscale-jit-bot
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TAILSCALE_JIT_CLIENT_ID: "{{ `{{ .client_id | trim }}` }}"
        TAILSCALE_JIT_CLIENT_SECRET: "{{ `{{ .client_secret | trim }}` }}"
        TAILSCALE_JIT_TAILNET: "{{ `{{ .tailnet | trim }}` }}"
        TAILSCALE_JIT_SLACK_SIGNING_SECRET: "{{ `{{ .slack_signing_secret | trim }}` }}"
        TAILSCALE_JIT_SLACK_BOT_TOKEN: "{{ `{{ .slack_bot_token | trim }}` }}"
        TAILSCALE_JIT_APPROVALS_CHANNEL_ID: "{{ `{{ .approvals_channel_id | trim }}` }}"
        TAILSCALE_JIT_ALERTS_CHANNEL_ID: "{{ `{{ .alerts_channel_id | trim }}` }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/client_id"
    - secretKey: client_secret
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/client_secret"
    - secretKey: tailnet
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/tailnet"
    - secretKey: slack_signing_secret
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/slack_signing_secret"
    - secretKey: slack_bot_token
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/slack_bot_token"
    - secretKey: approvals_channel_id
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/approvals_channel_id"
    - secretKey: alerts_channel_id
      remoteRef:
        key: "{{ .Values.tailscaleJIT.externalSecrets.item | default "TAILSCALE_JIT_BOT" }}/alerts_channel_id"
{{- end }}
