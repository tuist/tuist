{{- if .Values.server.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tuist.componentServiceAccountName" (dict "root" . "component" "server") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- if or .Values.server.serviceAccount.annotations .Values.server.migrationJob.asHook }}
  annotations:
    {{- if .Values.server.migrationJob.asHook }}
    # Pre-install/upgrade hook ordering (Helm applies in ASCENDING weight,
    # waiting for each to become ready before the next):
    #
    #   -12  this ServiceAccount (applied first, no dependencies)
    #   -10  ExternalSecret → ESO fetches MASTER_KEY from 1Password
    #    -5  Secret (app-secrets), when managedSecrets=false
    #    -1  migrate Job — needs the SA to be bound and MASTER_KEY available
    #
    # before-hook-creation deletes only the previous hook's copy on the next
    # install/upgrade, so the SA persists across releases for the main
    # Deployment (which is a normal release resource) to keep referencing.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-12"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- end }}
    {{- with .Values.server.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if and .Values.server.serviceAccount.create .Values.cache.serviceAccount.create }}
---
{{- end }}
{{- if .Values.cache.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tuist.componentServiceAccountName" (dict "root" . "component" "cache") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
  {{- with .Values.cache.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
