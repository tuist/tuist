{{- if .Values.server.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tuist.componentServiceAccountName" (dict "root" . "component" "server") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  # Deliberately NOT a Helm hook. This SA used to be a pre-upgrade hook
  # with the (default) before-hook-creation delete policy, which deletes
  # and recreates it on every upgrade. Deleting a ServiceAccount
  # invalidates every projected token already mounted in running pods
  # (the apiserver rejects tokens whose embedded SA UID no longer
  # exists), so for up to a token-refresh period after each deploy the
  # server pods got 401s from the Kubernetes API — breaking
  # runner-dispatch TokenReviews and kura reconciliation. The migration
  # Job hook uses its own hook-managed SA instead (see
  # server-migration-job.yaml).
  {{- with .Values.server.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if and .Values.server.serviceAccount.create .Values.cache.serviceAccount.create }}
---
{{- end }}
{{- if .Values.cache.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tuist.componentServiceAccountName" (dict "root" . "component" "cache") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
  {{- with .Values.cache.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
