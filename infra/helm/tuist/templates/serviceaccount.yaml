{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tuist.serviceAccountName" . }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.server.migrationJob.asHook }}
    # The migration Job runs as a pre-install hook (weight -1) and references
    # this ServiceAccount. The SA must therefore exist before the Job, which
    # means it also needs to be a hook (at lower weight). Keep it across
    # releases via before-hook-creation so the main Deployment can keep
    # referencing it.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
