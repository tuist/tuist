{{- if .Values.runnersFleet.enabled }}
{{- $namespace := .Values.runnersFleet.namespace | default "tuist-runners" }}
{{- $serverSA := include "tuist.componentServiceAccountName" (dict "root" . "component" "server") }}
{{- /*
Customer runner Pods live in their own namespace, separate from
the chart's release namespace. Two reasons:

1. Blast radius. The runners-controller's ServiceAccount needs
   Pod create/delete + SA create/delete to materialize per-Pod
   credentials; the server's SA needs RunnerAssignment write +
   cluster-scoped TokenReview to mint JITs. Both are scoped to
   exactly what they need. Pinning the runner workload to a
   dedicated namespace keeps a controller or server compromise
   from reaching the chart's other workloads.
2. Network policy. We default-deny ingress (runners receive jobs
   by polling GitHub from inside the VM, never via inbound
   connections), and allow egress to all of HTTP/HTTPS *except*
   cluster-internal CIDRs (`exceptCIDRs` carves out the cluster's
   Pod + Service ranges). Customer CI workflows legitimately
   reach a long tail of third-party hosts — actions cache,
   package registries (npm, CocoaPods, Homebrew, RubyGems),
   monitoring services, etc. — so a closed allowlist would
   break real workflows. The CIDR carve-out blocks a compromised
   runner from pivoting into our internal services
   (ClickHouse, Postgres, server admin endpoints) regardless of
   what credentials it holds; an L7 domain-allowlist proxy is on
   the v2 hardening list for tightening this further.

The Namespace is helm-owned (`helm.sh/resource-policy: keep`)
because Pods inside it are short-lived but the namespace itself
is load-bearing — uninstalling the chart shouldn't yank it from
under in-flight Pods. Re-install picks the namespace back up.
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $namespace | quote }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
    tuist.dev/runners-namespace: "true"
  annotations:
    helm.sh/resource-policy: keep
---
{{- if .Values.server.serviceAccount.create }}
# Server-side namespaced RBAC: the dispatch-handler webhook
# creates Burst RunnerAssignment CRs when GitHub couldn't bind
# a workflow_job to a warm runner. Read on RunnerPool to look
# up pool config from a SA's `tuist.dev/runner-pool` label
# during JIT mint.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-pool-manager") }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
rules:
  - apiGroups: [tuist.dev]
    resources: [runnerpools]
    verbs: [get, list, watch]
  - apiGroups: [tuist.dev]
    resources: [runnerassignments]
    # `create` for Burst assignments; `get`/`list` so the dispatch
    # endpoint can resolve the SA -> Pool linkage. `update` so the
    # SharedWarm dispatch path can atomically claim a Burst on
    # behalf of a polling warm Pod (PUT with resourceVersion CAS
    # is the optimistic-concurrency contract the dispatch endpoint
    # relies on to make claims race-free). No `delete` — only the
    # runners-controller deletes assignments after their Pod hits
    # a terminal phase or after a SharedWarm claim is recorded.
    verbs: [get, list, watch, create, update]
  - apiGroups: [""]
    resources: [serviceaccounts]
    # Read SA labels (`tuist.dev/runner-pool`) during the
    # TokenReview-mediated JIT mint to resolve which pool the
    # caller is authorized for.
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-pool-manager") }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
subjects:
  - kind: ServiceAccount
    name: {{ $serverSA }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-pool-manager") }}
---
# Cluster-scoped TokenReview so the dispatch endpoint can validate
# bearer tokens presented by runner Pods. Standard API the SA-as-
# auth pattern depends on; no other path to verify a projected
# SA token without it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-token-reviewer") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-token-reviewer") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
subjects:
  - kind: ServiceAccount
    name: {{ $serverSA }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-token-reviewer") }}
---
# Cluster-scoped read on Nodes so the server can surface the
# Pod -> Node mapping in audit logs / future ops dashboard.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-fleet-reader") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-fleet-reader") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
subjects:
  - kind: ServiceAccount
    name: {{ $serverSA }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-fleet-reader") }}
{{- end }}
{{- if .Values.runnersFleet.networkPolicy.enabled }}
---
# Default-deny ingress + constrained egress for runner Pods. The
# label selector matches every Pod in tuist-runners (the
# runners-controller stamps `tuist.dev/runner=true` on every Pod
# it creates).
#
# Ingress: deny everything (empty `from:`). Runners receive jobs
# by polling GitHub from inside the VM, not by accepting inbound
# connections.
#
# Egress: HTTPS / HTTP to public internet, except cluster-internal
# CIDRs. Customer CI workflows hit a long tail of third-party
# hosts (actions cache, package registries, etc.), so an L4
# allowlist would break real workloads; the CIDR carve-out blocks
# lateral pivots into in-cluster services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "runners-default-deny") }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners
spec:
  podSelector:
    matchLabels:
      tuist.dev/runner: "true"
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    # DNS to kube-dns / coredns. Egress to the cluster DNS
    # Service IP is the standard pattern; the cluster admin's
    # NetworkPolicy provider implements it as a CNI rule rather
    # than a literal Pod-to-Pod allow.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Public internet egress for HTTP(S) — required for the GH
    # Actions runner binary to reach api.github.com, the actions
    # cache, and the customer's package registries during builds.
    # An L7 allowlist proxy (deferred to v2 hardening) tightens
    # this; for v1 we accept "all of HTTPS".
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            {{- with .Values.runnersFleet.networkPolicy.exceptCIDRs }}
            except:
              {{- range $cidr := . }}
              - {{ $cidr | quote }}
              {{- end }}
            {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
{{- end }}
