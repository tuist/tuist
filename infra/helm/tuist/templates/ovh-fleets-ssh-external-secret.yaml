{{- /* Per-fleet SSH keypair for each ovhFleets map entry (us-east, us-west, …),
   mirroring the singular ovh-fleet-ssh-external-secret.yaml. All entries share the
   env's OVH_FLEET_SSH 1Password item (one OVH account; the per-fleet displayName +
   datacenter scope adoption), synced into tuist-tuist-ovh-fleet-<key>-ssh. Plain
   Owner ExternalSecret (no hook) so the controller never re-mints, same as the
   singular. */ -}}
{{- range $key, $fleet := .Values.ovhFleets }}
{{- if and $fleet.enabled $fleet.sshExternalSecret $fleet.sshExternalSecret.enabled }}
{{- $fleetName := include "tuist.componentName" (dict "root" $ "component" (printf "ovh-fleet-%s" $key)) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fleetName }}-ssh
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
    app.kubernetes.io/component: ovh-fleet
spec:
  refreshInterval: {{ $fleet.sshExternalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ dig "storeRef" "name" "onepassword" $fleet.sshExternalSecret }}
    kind: {{ dig "storeRef" "kind" "ClusterSecretStore" $fleet.sshExternalSecret }}
  target:
    name: {{ $fleetName }}-ssh
    creationPolicy: Owner
  data:
    - secretKey: id_ed25519
      remoteRef:
        key: "{{ required (printf "ovhFleets.%s.sshExternalSecret.item is required when enabled" $key) $fleet.sshExternalSecret.item }}/{{ dig "fields" "privateKey" "private-key" $fleet.sshExternalSecret }}"
    - secretKey: id_ed25519.pub
      remoteRef:
        key: "{{ $fleet.sshExternalSecret.item }}/{{ dig "fields" "publicKey" "public-key" $fleet.sshExternalSecret }}"
    - secretKey: sudo-password
      remoteRef:
        key: "{{ $fleet.sshExternalSecret.item }}/{{ dig "fields" "sudoPassword" "sudo-password" $fleet.sshExternalSecret }}"
{{- end }}
{{- end }}
