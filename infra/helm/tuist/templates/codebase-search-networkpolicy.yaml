{{- if and .Values.codebaseSearch.enabled .Values.codebaseSearch.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "codebase-search") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: codebase-search
spec:
  podSelector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "codebase-search") | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "tuist.componentLabels" (dict "root" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: http
  egress: []
{{- end }}
