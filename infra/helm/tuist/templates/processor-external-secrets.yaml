{{- if and .Values.processor.enabled .Values.processor.managedSecrets }}
# ESO syncs the `tuist_processor` role password from 1Password and the
# template below composes the full DATABASE_URL from it + the non-secret
# connection values under `processor.database` (Supabase pooler) or the
# CNPG `<cluster>-rw` Service (in-cluster Postgres).
#
# Storing just the password means rotation is a single op
# (`op item edit` + `ALTER ROLE` — Supabase path; CNPG rotates on its
# own reconcile when the Secret changes) instead of regenerating the
# whole URL.
#
# Everything else the release needs (S3 creds, Sentry, ClickHouse URL,
# etc.) comes from the MASTER_KEY-decrypted priv/secrets/<env>.yml.enc
# baked into the image — same as the web server pods.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "processor-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  refreshInterval: {{ .Values.processor.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.processor.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.processor.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "processor-external-secrets") }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # URL-encoded password so stray `@` / `:` / `?` / `/` don't truncate
        # the URL — generated passwords can contain any of these.
        {{- if eq .Values.postgresql.mode "cnpg" }}
        {{- $cnpgHost := ternary (include "tuist.cnpgServicePooler" .) (include "tuist.cnpgServiceRW" .) .Values.postgresql.cnpg.pooler.enabled }}
        processor-database-url: "postgres://{{ .Values.postgresql.cnpg.roles.processor.name }}:{{ `{{ .password | urlquery }}` }}@{{ $cnpgHost }}:5432/{{ .Values.postgresql.cnpg.database }}"
        {{- else }}
        processor-database-url: "postgres://{{ .Values.processor.database.username }}:{{ `{{ .password | urlquery }}` }}@{{ required "processor.database.host is required when processor.managedSecrets is true" .Values.processor.database.host }}:{{ .Values.processor.database.port }}/{{ .Values.processor.database.name }}{{- if .Values.processor.database.params }}?{{ .Values.processor.database.params }}{{- end }}"
        {{- end }}
  data:
    - secretKey: password
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.databasePassword.item | default "PROCESSOR_DATABASE_PASSWORD" }}/{{ .Values.processor.externalSecrets.databasePassword.field | default "password" }}"
{{- end }}
