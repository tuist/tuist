{{- if and .Values.processor.enabled .Values.processor.managedSecrets }}
# ESO syncs the processor's DATABASE_URL override from 1Password into a
# dedicated Secret that this ExternalSecret owns. That URL embeds the
# least-privilege `tuist_processor` Postgres role (provisioned once per env
# via infra/supabase/tuist-processor-role.sql) so a compromised processor
# pod can't reach `users`, `user_tokens`, or billing tables.
#
# Everything else the release needs (S3 creds, Sentry, ClickHouse URL, etc.)
# comes from the MASTER_KEY-decrypted priv/secrets/<env>.yml.enc baked into
# the image — same as the web server pods.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "processor-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  refreshInterval: {{ .Values.processor.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.processor.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.processor.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "processor-external-secrets") }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        processor-database-url: "{{ `{{ .database_url | trim }}` }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.databaseUrl.item | default "PROCESSOR_DATABASE_URL" }}/{{ .Values.processor.externalSecrets.databaseUrl.field | default "password" }}"
{{- end }}
