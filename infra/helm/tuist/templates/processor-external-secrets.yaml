{{- if and .Values.processor.enabled .Values.processor.managedSecrets }}
# When processor.managedSecrets is on, ESO syncs processor secrets from the
# configured SecretStore (1Password by default) into a dedicated Secret that
# this ExternalSecret owns. The Deployment references this Secret for
# SECRET_KEY_BASE, WEBHOOK_SECRET, and SENTRY_DSN_PROCESSOR.
#
# Kept separate from the server's ExternalSecret so scoping stays tight: the
# server's 1Password item only needs MASTER_KEY; the processor's only needs
# its own three values. Helm and ESO never fight over the same Secret object.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "processor-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  refreshInterval: {{ .Values.processor.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.processor.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.processor.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "processor-external-secrets") }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        processor-secret-key-base: "{{ `{{ .secret_key_base | trim }}` }}"
        processor-webhook-secret: "{{ `{{ .webhook_secret | trim }}` }}"
        object-storage-access-key: "{{ `{{ .s3_access_key_id | trim }}` }}"
        object-storage-secret-key: "{{ `{{ .s3_secret_access_key | trim }}` }}"
        {{- if .Values.processor.sentry.dsn }}
        processor-sentry-dsn: "{{ `{{ .sentry_dsn | trim }}` }}"
        {{- end }}
  data:
    - secretKey: secret_key_base
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.secretKeyBase.item | default "PROCESSOR_SECRET_KEY_BASE" }}/{{ .Values.processor.externalSecrets.secretKeyBase.field | default "password" }}"
    - secretKey: webhook_secret
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.webhookSecret.item | default "PROCESSOR_WEBHOOK_SECRET" }}/{{ .Values.processor.externalSecrets.webhookSecret.field | default "password" }}"
    - secretKey: s3_access_key_id
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.s3AccessKeyId.item | default "PROCESSOR_S3_ACCESS_KEY_ID" }}/{{ .Values.processor.externalSecrets.s3AccessKeyId.field | default "password" }}"
    - secretKey: s3_secret_access_key
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.s3SecretAccessKey.item | default "PROCESSOR_S3_SECRET_ACCESS_KEY" }}/{{ .Values.processor.externalSecrets.s3SecretAccessKey.field | default "password" }}"
    {{- if .Values.processor.sentry.dsn }}
    - secretKey: sentry_dsn
      remoteRef:
        key: "{{ .Values.processor.externalSecrets.sentryDsn.item | default "SENTRY_DSN_PROCESSOR" }}/{{ .Values.processor.externalSecrets.sentryDsn.field | default "password" }}"
    {{- end }}
{{- end }}
