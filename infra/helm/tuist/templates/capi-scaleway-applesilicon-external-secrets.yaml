{{- if and .Values.macosFleet.enabled .Values.macosFleet.scaleway.externalSecrets.enabled }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "capi-scaleway-applesilicon") }}
---
# ESO syncs Scaleway IAM credentials from the configured store
# (1Password by default) into a Secret the CAPI provider Deployment
# mounts as env vars.
#
# Three keys: access-key, secret-key, project-id. The 1Password item
# stores them as separate fields; we glob them into one ExternalSecret
# so rotation is atomic.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
  annotations:
    # Run as a pre-install/pre-upgrade hook so Helm blocks on ESO
    # synchronously fetching the Scaleway credentials from 1Password
    # before the operator Deployment lands. Without this the operator
    # Pod can be created before the Secret exists and gets stuck on
    # `Error: secret "<name>" not found`; ESO does fix it eventually
    # (within a sync interval) but the Pod's CrashLoopBackOff window
    # may extend past helm --atomic --wait's 60-min ceiling, rolling
    # the entire chart back. Helm waits for the ExternalSecret's
    # Ready condition (= ESO synced successfully).
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: {{ .Values.macosFleet.scaleway.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.macosFleet.scaleway.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.macosFleet.scaleway.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: "{{ .Values.macosFleet.scaleway.externalSecrets.item }}/{{ .Values.macosFleet.scaleway.externalSecrets.fields.accessKey | default "access-key" }}"
    - secretKey: secret-key
      remoteRef:
        key: "{{ .Values.macosFleet.scaleway.externalSecrets.item }}/{{ .Values.macosFleet.scaleway.externalSecrets.fields.secretKey | default "secret-key" }}"
    - secretKey: project-id
      remoteRef:
        key: "{{ .Values.macosFleet.scaleway.externalSecrets.item }}/{{ .Values.macosFleet.scaleway.externalSecrets.fields.projectID | default "project-id" }}"
{{- end }}
