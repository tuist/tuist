{{- if and .Values.dediboxFleet.enabled .Values.dediboxFleet.scaleway.externalSecrets.enabled }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "dedibox") }}
---
# ESO syncs the Scaleway IAM key the Dedibox reconciler authenticates with. Two
# keys: secret-key (sent as X-Auth-Token over raw HTTP) and project-id. Unlike
# the per-env macOS/Elastic Metal SCW creds, this is the DEFAULT-project key with
# DediboxFullAccess — every Dedibox in the org lives in the default project, so
# the same key serves every environment and the per-fleet adoptTag does the
# scoping. Self-hosters not using ESO can override dediboxFleet.scaleway.secretName.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedibox
  annotations:
    # Pre-install/upgrade hook so Helm blocks on ESO fetching the key before the
    # operator Deployment lands (same rationale as the Scaleway IAM secret).
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: {{ .Values.dediboxFleet.scaleway.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.dediboxFleet.scaleway.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.dediboxFleet.scaleway.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: "{{ .Values.dediboxFleet.scaleway.externalSecrets.item }}/{{ .Values.dediboxFleet.scaleway.externalSecrets.fields.secretKey | default "secret-key" }}"
    - secretKey: project-id
      remoteRef:
        key: "{{ .Values.dediboxFleet.scaleway.externalSecrets.item }}/{{ .Values.dediboxFleet.scaleway.externalSecrets.fields.projectID | default "project-id" }}"
{{- end }}
