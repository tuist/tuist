{{- if and .Values.server.enabled .Values.server.github.managedSecrets }}
# Pulls the github.com Tuist App credentials and bot PATs out of the
# encrypted priv/secrets blob and into a dedicated k8s Secret managed by
# ESO. The Server / Processor Deployments reference this Secret as env
# vars (TUIST_GITHUB_APP_*, TUIST_GITHUB_TOKEN_*).
#
# Item layout in 1Password (per-env vault):
#   GITHUB_APP                              ← multi-field
#     name, id, client_id, client_secret, webhook_secret, <env>.pem
#   GITHUB_TOKEN_UPDATE_PACKAGE_RELEASES    ← single PAT
#     credential
#   GITHUB_TOKEN_UPDATE_PACKAGES            ← single PAT
#     credential
#
# A separate Secret (not a Merge into app-secrets) is used on purpose:
# helm upgrade rewrites chart-managed resources, which would wipe ESO-
# managed keys on each deploy until the next ESO reconcile cycle.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "github-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.server.github.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.server.github.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.server.github.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "github-external-secrets") }}
    creationPolicy: Owner
    # Strip trailing whitespace — the 1P web UI appends a newline when
    # pasting, and the GitHub App private key, client secret, and
    # webhook secret all reject the trailing \n at use time (HMAC
    # mismatch / OAuth 401 / RSA decode error respectively).
    template:
      engineVersion: v2
      data:
        app-name: "{{ `{{ .app_name | trim }}` }}"
        app-id: "{{ `{{ .app_id | trim }}` }}"
        app-client-id: "{{ `{{ .app_client_id | trim }}` }}"
        app-client-secret: "{{ `{{ .app_client_secret | trim }}` }}"
        app-webhook-secret: "{{ `{{ .app_webhook_secret | trim }}` }}"
        # Private key is a multi-line PEM; do NOT trim — only the trailing
        # whitespace from the file attachment, which dataFrom handles.
        app-private-key: "{{ `{{ .app_private_key }}` }}"
        token-update-package-releases: "{{ `{{ .token_update_package_releases | trim }}` }}"
        token-update-packages: "{{ `{{ .token_update_packages | trim }}` }}"
  data:
    - secretKey: app_name
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.app.item | default "GITHUB_APP" }}/{{ .Values.server.github.externalSecrets.app.fields.name | default "app_name" }}"
    - secretKey: app_id
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.app.item | default "GITHUB_APP" }}/{{ .Values.server.github.externalSecrets.app.fields.id | default "app_id" }}"
    - secretKey: app_client_id
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.app.item | default "GITHUB_APP" }}/{{ .Values.server.github.externalSecrets.app.fields.clientId | default "client_id" }}"
    - secretKey: app_client_secret
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.app.item | default "GITHUB_APP" }}/{{ .Values.server.github.externalSecrets.app.fields.clientSecret | default "client_secret" }}"
    - secretKey: app_webhook_secret
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.app.item | default "GITHUB_APP" }}/{{ .Values.server.github.externalSecrets.app.fields.webhookSecret | default "webhook_secret" }}"
    # Per-env PEM filename (production.pem / staging.pem / canary.pem).
    # ESO's 1P provider reads file attachments using the filename as the
    # property — the chart values pin which one for this environment.
    - secretKey: app_private_key
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.app.item | default "GITHUB_APP" }}/{{ .Values.server.github.externalSecrets.app.fields.privateKey | required ".Values.server.github.externalSecrets.app.fields.privateKey is required (e.g. production.pem)" }}"
    - secretKey: token_update_package_releases
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.tokenUpdatePackageReleases.item | default "GITHUB_TOKEN_UPDATE_PACKAGE_RELEASES" }}/{{ .Values.server.github.externalSecrets.tokenUpdatePackageReleases.field | default "credential" }}"
    - secretKey: token_update_packages
      remoteRef:
        key: "{{ .Values.server.github.externalSecrets.tokenUpdatePackages.item | default "GITHUB_TOKEN_UPDATE_PACKAGES" }}/{{ .Values.server.github.externalSecrets.tokenUpdatePackages.field | default "credential" }}"
{{- end }}
