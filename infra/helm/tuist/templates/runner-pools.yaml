{{- if .Values.runnersFleet.enabled }}
{{- $namespace := .Values.runnersFleet.namespace | default "tuist-runners" }}
{{- $fleetName := include "tuist.runnersFleetName" . }}
{{- $defaultImage := required "runnersFleet.runnerImage required when runnersFleet.enabled" .Values.runnersFleet.runnerImage }}
{{- $defaultPodCPU := .Values.runnersFleet.pod.cpuMilli | default 8000 }}
{{- $defaultPodMem := .Values.runnersFleet.pod.memoryMB | default 14336 }}
{{- $pools := .Values.runnerPools | default list }}
{{- if eq (len $pools) 0 }}
{{- fail "runnerPools must declare at least one entry when runnersFleet.enabled is true; without a RunnerPool the controller has nothing to reconcile and burst RunnerAssignments are reaped on poolRef-not-found." }}
{{- end }}
{{- /*
RunnerPool CRs — one per customer pool. Each entry in
`runnerPools` renders into a CR the runners-controller picks
up; the controller maintains MinWarm pre-bound RunnerAssignment
CRs, each of which materializes one Pod + SA.

The Pool's `image`, `podCPUMilli`, `podMemoryMB` default to the
fleet's shared image + pod sizing values; per-pool overrides
are supported for customers that need a different runner image
or VM size.
*/}}
{{- range $pool := .Values.runnerPools | default list }}
---
{{- $role := $pool.role | default "Customer" }}
apiVersion: tuist.dev/v1alpha1
kind: RunnerPool
metadata:
  name: {{ required "runnerPools[].name required" $pool.name | quote }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
    app.kubernetes.io/component: runners-controller
    tuist.dev/runner-pool-role: {{ $role | quote }}
    {{- if eq $role "Customer" }}
    tuist.dev/runner-pool-owner: {{ required "runnerPools[].owner required for Customer role" $pool.owner | quote }}
    {{- end }}
spec:
  role: {{ $role | quote }}
  {{- if $pool.owner }}
  owner: {{ $pool.owner | quote }}
  {{- end }}
  {{- with $pool.labels }}
  labels:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- else }}
  labels: []
  {{- end }}
  minWarm: {{ $pool.minWarm | default 0 }}
  {{- with $pool.runnerGroupID }}
  runnerGroupID: {{ . }}
  {{- end }}
  {{- with $pool.allowedRepos }}
  allowedRepos:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  image: {{ $pool.image | default $defaultImage | quote }}
  fleetSelector: {{ $pool.fleetSelector | default $fleetName | quote }}
  podCPUMilli: {{ $pool.podCPUMilli | default $defaultPodCPU }}
  podMemoryMB: {{ $pool.podMemoryMB | default $defaultPodMem }}
{{- end }}
{{- end }}
