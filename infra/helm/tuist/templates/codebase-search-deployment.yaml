{{- if .Values.codebaseSearch.enabled }}
{{- $imageTag := required "codebaseSearch.image.tag is required when codebaseSearch.enabled is true" .Values.codebaseSearch.image.tag -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "codebase-search") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: codebase-search
spec:
  replicas: {{ .Values.codebaseSearch.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "codebase-search") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "codebase-search") | nindent 8 }}
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.codebaseSearch.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.codebaseSearch.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 10
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- include "tuist.podScheduling" . | nindent 6 }}
      {{- with .Values.codebaseSearch.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.codebaseSearch.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.codebaseSearch.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: codebase-search
          image: "{{ .Values.codebaseSearch.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.codebaseSearch.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 990
          ports:
            - name: http
              containerPort: {{ .Values.codebaseSearch.containerPort }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            {{- toYaml .Values.codebaseSearch.resources | nindent 12 }}
{{- end }}
