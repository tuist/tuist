{{- if and .Values.runnersController.mgmtCluster.enabled .Values.runnersController.mgmtCluster.externalSecrets }}
{{- if .Values.runnersController.mgmtCluster.externalSecrets.enabled }}
{{- $name := .Values.runnersController.mgmtCluster.kubeconfigSecretName | default "tuist-runners-controller-mgmt-kubeconfig" }}
---
# ESO syncs the management-cluster kubeconfig from the configured
# store (1Password by default) into a Secret the runners-controller
# Deployment mounts. The kubeconfig must already exist in the store
# alongside the management-cluster-side ServiceAccount + RoleBinding
# that grant GET/LIST/PATCH on `machinedeployments.cluster.x-k8s.io`
# in the topology namespace (e.g. `org-tuist`). See
# `infra/runners-controller/AGENTS.md` for the bootstrap.
#
# Single key — the whole kubeconfig file lives in one 1Password
# attachment/field.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners-controller
  annotations:
    # Same pre-install/pre-upgrade hook pattern as the other ESO
    # secrets in this chart: Helm blocks on the Secret existing
    # before the runners-controller Deployment lands. Without this
    # the controller Pod can be created before the kubeconfig
    # Secret exists and crash-loops while waiting on the mount.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: {{ .Values.runnersController.mgmtCluster.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.runnersController.mgmtCluster.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.runnersController.mgmtCluster.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.runnersController.mgmtCluster.kubeconfigSecretKey | default "kubeconfig" }}
      remoteRef:
        key: "{{ .Values.runnersController.mgmtCluster.externalSecrets.item }}/{{ .Values.runnersController.mgmtCluster.externalSecrets.field | default "kubeconfig" }}"
{{- end }}
{{- end }}
