{{- $syncLicense := and .Values.server.enabled (ne (.Values.server.externalSecrets.license.item | default "") "") -}}
{{- $syncCacheGrant := and .Values.server.enabled (ne (.Values.server.externalSecrets.cacheGrant.item | default "") "") -}}
{{- $serverKuraIntrospection := .Values.server.externalSecrets.kuraIntrospection -}}
{{- $kuraSharedSecrets := .Values.kuraController.sharedSecrets -}}
{{- $kuraSharedSecretsExternalSecret := $kuraSharedSecrets.externalSecret -}}
{{- $syncServerKuraIntrospection := and .Values.server.enabled (ne ($serverKuraIntrospection.item | default "") "") -}}
{{- $syncSharedKuraIntrospection := and .Values.server.enabled .Values.kuraController.enabled $kuraSharedSecrets.enabled $kuraSharedSecrets.kuraIntrospection.enabled $kuraSharedSecretsExternalSecret.enabled (ne ($kuraSharedSecretsExternalSecret.item | default "") "") -}}
{{- $syncKuraIntrospection := or $syncServerKuraIntrospection $syncSharedKuraIntrospection -}}
{{- $kuraIntrospectionClientIdValue := $serverKuraIntrospection.clientIdValue | default $kuraSharedSecrets.kuraIntrospection.clientId | default "" -}}
{{- $kuraIntrospectionItem := ternary $serverKuraIntrospection.item $kuraSharedSecretsExternalSecret.item $syncServerKuraIntrospection -}}
{{- $kuraIntrospectionClientIdField := ternary ($serverKuraIntrospection.fields.clientId | default "KURA_CONTROL_PLANE_CLIENT_ID") ($kuraSharedSecretsExternalSecret.fields.introspectionClientId | default "KURA_CONTROL_PLANE_CLIENT_ID") $syncServerKuraIntrospection -}}
{{- $kuraIntrospectionClientSecretField := ternary ($serverKuraIntrospection.fields.clientSecret | default "KURA_CONTROL_PLANE_CLIENT_SECRET") ($kuraSharedSecretsExternalSecret.fields.introspectionClientSecret | default "KURA_CONTROL_PLANE_CLIENT_SECRET") $syncServerKuraIntrospection -}}
{{- if or $syncLicense $syncKuraIntrospection $syncCacheGrant }}
# ESO syncs secrets from the configured SecretStore (1Password by default)
# into a dedicated Secret that this ExternalSecret owns. The Deployment /
# Migration Job reference this Secret for the Tuist license and Kura OAuth
# env refs.
#
# A separate Secret (not a Merge into app-secrets) is used on purpose: helm
# upgrade rewrites chart-managed resources, which would wipe ESO-managed keys
# on each deploy until the next ESO reconcile cycle. Keeping them apart means
# helm and ESO never fight over the same object.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "server-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- if .Values.server.migrationJob.asHook }}
  annotations:
    # Hook ordering (see serviceaccount.yaml for the full chain):
    #   -12 ServiceAccount → -10 this ExternalSecret → -5 Secret → -1 Job.
    # Helm waits for each hook's Ready condition; for an ExternalSecret
    # that means ESO has successfully fetched the value from 1Password.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
spec:
  refreshInterval: {{ .Values.server.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.server.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.server.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "server-external-secrets") }}
    creationPolicy: Owner
    # Strip trailing whitespace from 1P values — the web UI often appends a
    # newline when pasting a password, and Elixir's EncryptedSecrets key check
    # is strict about exact bytes (newline -> wrong key -> "malformed yaml").
    template:
      engineVersion: v2
      data:
        {{- if $syncLicense }}
        server-license-key: "{{ `{{ .server_license_key | trim }}` }}"
        {{- end }}
        {{- if $syncCacheGrant }}
        cache-grant-private-key: "{{ `{{ .cache_grant_private_key | trim }}` }}"
        {{- end }}
        {{- if $syncKuraIntrospection }}
        {{- if ne $kuraIntrospectionClientIdValue "" }}
        KURA_CONTROL_PLANE_CLIENT_ID: {{ $kuraIntrospectionClientIdValue | quote }}
        TUIST_KURA_INTROSPECTION_CLIENT_ID: {{ $kuraIntrospectionClientIdValue | quote }}
        {{- else }}
        KURA_CONTROL_PLANE_CLIENT_ID: "{{ `{{ .kura_introspection_client_id | trim }}` }}"
        TUIST_KURA_INTROSPECTION_CLIENT_ID: "{{ `{{ .kura_introspection_client_id | trim }}` }}"
        {{- end }}
        KURA_CONTROL_PLANE_CLIENT_SECRET: "{{ `{{ .kura_introspection_client_secret | trim }}` }}"
        TUIST_KURA_INTROSPECTION_CLIENT_SECRET: "{{ `{{ .kura_introspection_client_secret | trim }}` }}"
        {{- end }}
  data:
    {{- if $syncLicense }}
    - secretKey: server_license_key
      remoteRef:
        key: "{{ .Values.server.externalSecrets.license.item }}/{{ .Values.server.externalSecrets.license.field | default "password" }}"
    {{- end }}
    {{- if $syncCacheGrant }}
    - secretKey: cache_grant_private_key
      remoteRef:
        key: "{{ .Values.server.externalSecrets.cacheGrant.item }}/{{ .Values.server.externalSecrets.cacheGrant.field | default "password" }}"
    {{- end }}
    {{- if $syncKuraIntrospection }}
    {{- if eq $kuraIntrospectionClientIdValue "" }}
    - secretKey: kura_introspection_client_id
      remoteRef:
        key: "{{ $kuraIntrospectionItem }}/{{ $kuraIntrospectionClientIdField }}"
    {{- end }}
    - secretKey: kura_introspection_client_secret
      remoteRef:
        key: "{{ $kuraIntrospectionItem }}/{{ $kuraIntrospectionClientSecretField }}"
    {{- end }}
{{- end }}
