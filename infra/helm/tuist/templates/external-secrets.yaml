{{- if and .Values.server.enabled .Values.server.managedSecrets }}
# When managedSecrets is on, ESO syncs secrets from the configured SecretStore
# (1Password by default) into a dedicated Secret that this ExternalSecret
# owns. The Deployment/Migration Job reference this Secret for MASTER_KEY.
#
# A separate Secret (not a Merge into app-secrets) is used on purpose: helm
# upgrade rewrites chart-managed resources, which would wipe ESO-managed keys
# on each deploy until the next ESO reconcile cycle. Keeping them apart means
# helm and ESO never fight over the same object.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "server-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- if .Values.server.migrationJob.asHook }}
  annotations:
    # The migration Job runs as a pre-install/pre-upgrade hook (weight -1)
    # and mounts MASTER_KEY via secretKeyRef, so ESO must materialize the
    # target Secret first. Applying the ExternalSecret at hook-weight -10
    # makes Helm wait for ESO to sync 1P before the Job starts.
    # before-hook-creation keeps the resource across releases.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
spec:
  refreshInterval: {{ .Values.server.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.server.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.server.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "server-external-secrets") }}
    creationPolicy: Owner
    # Strip trailing whitespace from 1P values — the web UI often appends a
    # newline when pasting a password, and Elixir's EncryptedSecrets key check
    # is strict about exact bytes (newline -> wrong key -> "malformed yaml").
    template:
      engineVersion: v2
      data:
        server-master-key: "{{ `{{ .server_master_key | trim }}` }}"
  data:
    - secretKey: server_master_key
      remoteRef:
        # 1Password SDK provider expects a single "<item>/<field>" string in
        # remoteRef.key (NOT separate key + property). The vault is set at the
        # SecretStore level.
        key: "{{ .Values.server.externalSecrets.masterKey.item | default "MASTER_KEY" }}/{{ .Values.server.externalSecrets.masterKey.field | default "password" }}"
{{- end }}
