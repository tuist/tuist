{{- if .Values.processor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "processor") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  replicas: {{ .Values.processor.replicaCount }}
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "processor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "processor") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4002"
    spec:
      containers:
        - name: processor
          image: "{{ .Values.processor.image.repository }}:{{ .Values.processor.image.tag }}"
          imagePullPolicy: {{ .Values.processor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "app-secrets") }}
                  key: processor-secret-key-base
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "app-secrets") }}
                  key: processor-webhook-secret
            - name: S3_ENDPOINT
              value: {{ include "tuist.objectStorageEndpoint" . | quote }}
            - name: S3_BUCKET
              value: {{ .Values.processor.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.processor.s3.region | quote }}
            - name: S3_VIRTUAL_HOST
              value: {{ .Values.processor.s3.virtualHost | ternary "1" "0" | quote }}
            - name: S3_BUCKET_AS_HOST
              value: {{ .Values.processor.s3.bucketAsHost | ternary "1" "0" | quote }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "app-secrets") }}
                  key: object-storage-access-key
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "app-secrets") }}
                  key: object-storage-secret-key
            {{- if and .Values.observability.enabled (include "tuist.observabilityOtlpEndpoint" .) }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ include "tuist.observabilityOtlpEndpoint" . | quote }}
            {{- end }}
            {{- with .Values.processor.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.processor.resources | nindent 12 }}
{{- end }}
