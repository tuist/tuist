{{- range $fleet := .Values.cacheGatewayFleet }}
{{- if $fleet.enabled }}
{{- $secret := include "tuist.componentName" (dict "root" $ "component" (printf "cache-gateway-%s-secrets" $fleet.name)) }}
{{- $item := ($fleet.externalSecrets).item | default "CACHE_GATEWAY" }}
{{- if (($fleet.externalSecrets).enabled) }}
---
# Managed: sync the gateway's secrets from one 1Password item — the
# SeaweedFS S3 credentials, the Ed25519 token-verification PUBLIC key
# (the server holds the private half), and the HMAC blob-URL signing
# secret. `| trim` guards against pasted trailing newlines.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret }}
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ ($fleet.externalSecrets).refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ (($fleet.externalSecrets).storeRef).name | default "onepassword" }}
    kind: {{ (($fleet.externalSecrets).storeRef).kind | default "ClusterSecretStore" }}
  target:
    name: {{ $secret }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        s3-access-key: "{{ `{{ .s3_access_key | trim }}` }}"
        s3-secret-key: "{{ `{{ .s3_secret_key | trim }}` }}"
        token-verify-pubkey: "{{ `{{ .token_verify_pubkey }}` }}"
        blob-signing-secret: "{{ `{{ .blob_signing_secret | trim }}` }}"
  data:
    - secretKey: s3_access_key
      remoteRef:
        key: "{{ $item }}/s3_access_key_id"
    - secretKey: s3_secret_key
      remoteRef:
        key: "{{ $item }}/s3_secret_access_key"
    - secretKey: token_verify_pubkey
      remoteRef:
        key: "{{ $item }}/token_verify_public_key"
    - secretKey: blob_signing_secret
      remoteRef:
        key: "{{ $item }}/blob_signing_secret"
{{- else }}
---
# Self-host: inline secrets from values. token-verify-pubkey is the PEM
# Ed25519 public key matching the server's TUIST_CACHE_TOKEN_SIGNING_KEY.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret }}
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
type: Opaque
stringData:
  s3-access-key: {{ $fleet.s3AccessKey | default "seaweedfs" | quote }}
  s3-secret-key: {{ $fleet.s3SecretKey | default "seaweedfs-secret" | quote }}
  token-verify-pubkey: {{ $fleet.tokenVerifyPublicKey | default "" | quote }}
  blob-signing-secret: {{ $fleet.blobSigningSecret | default "" | quote }}
{{- end }}
{{- end }}
{{- end }}
