{{- range $fleet := .Values.seaweedfsFleet }}
{{- if $fleet.enabled }}
{{- $secret := include "tuist.componentName" (dict "root" $ "component" (printf "seaweedfs-%s-creds" $fleet.name)) }}
{{- if (($fleet.externalSecrets).enabled) }}
---
# Managed: sync the static S3 credentials from 1Password into the fleet's
# creds Secret. `| trim` strips the trailing newline the 1P web UI appends,
# which otherwise produces a 403 Invalid-signature at request time.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret }}
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $fleet.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ ($fleet.externalSecrets.storeRef).name | default "onepassword" }}
    kind: {{ ($fleet.externalSecrets.storeRef).kind | default "ClusterSecretStore" }}
  target:
    name: {{ $secret }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        access-key: "{{ `{{ .access_key | trim }}` }}"
        secret-key: "{{ `{{ .secret_key | trim }}` }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: "{{ ($fleet.externalSecrets.accessKey).item | default "SEAWEEDFS_S3" }}/{{ ($fleet.externalSecrets.accessKey).field | default "access_key_id" }}"
    - secretKey: secret_key
      remoteRef:
        key: "{{ ($fleet.externalSecrets.secretKey).item | default "SEAWEEDFS_S3" }}/{{ ($fleet.externalSecrets.secretKey).field | default "secret_access_key" }}"
{{- else }}
---
# Self-host: inline credentials from values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret }}
  labels:
    {{- include "tuist.labels" $ | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ $fleet.accessKey | default "seaweedfs" | quote }}
  secret-key: {{ $fleet.secretKey | default "seaweedfs-secret" | quote }}
{{- end }}
{{- end }}
{{- end }}
