{{- if and .Values.swiftRegistrySync.enabled .Values.swiftRegistrySync.managedSecrets }}
# ESO syncs everything the swift-registry-sync pod needs into a single
# Secret:
#
#   - S3 credentials + bucket name from the per-env `REGISTRY` 1P item
#     in `tuist-k8s-<env>` (same item the standalone `registry`
#     Phoenix app reads). The legacy `REGISTRY_GITHUB_TOKEN` field is
#     exposed as `SWIFT_REGISTRY_GITHUB_TOKEN` to match the
#     runtime.exs env name; the 1P item itself doesn't need to
#     rename.
#
#   - DATABASE_URL composed from the `tuist_swift_registry_sync`
#     role's password (per-env `SWIFT_REGISTRY_SYNC_DATABASE_PASSWORD`
#     1P item) and the non-secret CNPG / external Postgres
#     connection params. The role is least-privilege per
#     infra/cnpg/tuist-swift-registry-sync-grants.sql (Oban tables
#     only — narrower than tuist_processor, no accounts/projects
#     reads). Without the 1P item ESO syncs an empty password and
#     the pod crashloops on connection refused.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "swift-registry-sync-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: swift-registry-sync
spec:
  refreshInterval: {{ .Values.swiftRegistrySync.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.swiftRegistrySync.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.swiftRegistrySync.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "swift-registry-sync-external-secrets") }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        S3_REGISTRY_BUCKET: "{{ `{{ .s3_registry_bucket | trim }}` }}"
        S3_HOST: "{{ `{{ .s3_host | trim }}` }}"
        S3_REGION: "{{ `{{ .s3_region | trim }}` }}"
        S3_ACCESS_KEY_ID: "{{ `{{ .s3_access_key_id | trim }}` }}"
        S3_SECRET_ACCESS_KEY: "{{ `{{ .s3_secret_access_key | trim }}` }}"
        SWIFT_REGISTRY_GITHUB_TOKEN: "{{ `{{ .swift_registry_github_token | trim }}` }}"
        # URL-encoded password so stray `@` / `:` / `?` / `/` don't truncate
        # the URL — generated passwords can contain any of these.
        {{- if eq .Values.postgresql.mode "cnpg" }}
        {{- $cnpgHost := ternary (include "tuist.cnpgServicePooler" .) (include "tuist.cnpgServiceRW" .) .Values.postgresql.cnpg.pooler.enabled }}
        DATABASE_URL: "postgres://{{ .Values.postgresql.cnpg.roles.swiftRegistrySync.name }}:{{ `{{ .db_password | urlquery }}` }}@{{ $cnpgHost }}:5432/{{ .Values.postgresql.cnpg.database }}"
        {{- else }}
        DATABASE_URL: "postgres://{{ .Values.swiftRegistrySync.database.username }}:{{ `{{ .db_password | urlquery }}` }}@{{ required "swiftRegistrySync.database.host is required when swiftRegistrySync.managedSecrets is true and postgresql.mode != cnpg" .Values.swiftRegistrySync.database.host }}:{{ .Values.swiftRegistrySync.database.port }}/{{ .Values.swiftRegistrySync.database.name }}{{- if .Values.swiftRegistrySync.database.params }}?{{ .Values.swiftRegistrySync.database.params }}{{- end }}"
        {{- end }}
  data:
    - secretKey: s3_registry_bucket
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.item }}/{{ .Values.swiftRegistrySync.externalSecrets.fields.s3RegistryBucket }}"
    - secretKey: s3_host
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.item }}/{{ .Values.swiftRegistrySync.externalSecrets.fields.s3Host }}"
    - secretKey: s3_region
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.item }}/{{ .Values.swiftRegistrySync.externalSecrets.fields.s3Region }}"
    - secretKey: s3_access_key_id
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.item }}/{{ .Values.swiftRegistrySync.externalSecrets.fields.s3AccessKeyId }}"
    - secretKey: s3_secret_access_key
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.item }}/{{ .Values.swiftRegistrySync.externalSecrets.fields.s3SecretAccessKey }}"
    - secretKey: swift_registry_github_token
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.item }}/{{ .Values.swiftRegistrySync.externalSecrets.fields.githubToken }}"
    - secretKey: db_password
      remoteRef:
        key: "{{ .Values.swiftRegistrySync.externalSecrets.databasePassword.item }}/{{ .Values.swiftRegistrySync.externalSecrets.databasePassword.field }}"
{{- end }}
