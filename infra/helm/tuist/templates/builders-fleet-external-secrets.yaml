{{- if and .Values.capi.enabled .Values.buildersFleet.enabled .Values.buildersFleet.externalSecrets.enabled }}
{{- $fleetName := include "tuist.buildersFleetName" . }}
{{- $ghAppSecret := default (printf "%s-gh-app" $fleetName) .Values.buildersFleet.ghAppSecretName }}
{{- $eso := .Values.buildersFleet.externalSecrets }}
{{- $item := $eso.item | default "BUILDERS_FLEET_GITHUB_APP" }}
{{- $fieldAppID := $eso.fields.appID | default "app-id" }}
{{- $fieldInstallationID := $eso.fields.installationID | default "installation-id" }}
{{- $fieldPrivateKey := $eso.fields.privateKey | default "private-key" }}
{{- /*
ExternalSecret that syncs the builders fleet's GitHub App
credentials from 1Password into the cluster Secret the CAPI
reconciler reads at every builder-host bootstrap.

The 1Password item holds three fields:
  - app-id           — GitHub App ID
  - installation-id  — Installation ID for the target org
  - private-key      — PEM-encoded RSA private key

None of the three expire on a timer; the operator creates the
App + installs it on the org once at env bring-up and never
rotates the credentials manually. At every Machine bootstrap the
reconciler signs a JWT, exchanges it for an installation access
token, then for an org-scope runner registration token (~1h TTL)
— that short-lived registration token is what the runner agent's
config.sh consumes. The host then stores its own long-lived auth
credential locally and the registration token is never read
again for that host.

Self-hosters who don't run 1Password / ESO can leave
`buildersFleet.externalSecrets.enabled` at false and manage the
target Secret manually (`kubectl create secret generic ...`).
*/ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $ghAppSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: builders-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  refreshInterval: {{ $eso.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $eso.storeRef.name | default "onepassword" }}
    kind: {{ $eso.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $ghAppSecret }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # `trim` strips the trailing newlines 1Password's web UI tends
        # to append when an operator pastes a value in. The App ID and
        # installation ID are numeric and must round-trip exactly; a
        # stray \n would cause a 400 from the App-auth endpoints. The
        # private key is multi-line PEM where leading/trailing
        # whitespace is tolerated by Go's pem.Decode but trimmed for
        # tidiness anyway.
        app-id: "{{ `{{ .appID | trim }}` }}"
        installation-id: "{{ `{{ .installationID | trim }}` }}"
        private-key: "{{ `{{ .privateKey }}` }}"
  data:
    - secretKey: appID
      remoteRef:
        key: "{{ $item }}/{{ $fieldAppID }}"
    - secretKey: installationID
      remoteRef:
        key: "{{ $item }}/{{ $fieldInstallationID }}"
    - secretKey: privateKey
      remoteRef:
        key: "{{ $item }}/{{ $fieldPrivateKey }}"
{{- end }}
