{{- if and .Values.capi.enabled .Values.buildersFleet.enabled .Values.buildersFleet.externalSecrets.enabled }}
{{- $fleetName := include "tuist.buildersFleetName" . }}
{{- $tokenSecret := default (printf "%s-gh-runner-registration-token" $fleetName) .Values.buildersFleet.registrationTokenSecretName }}
{{- /*
ExternalSecret that syncs the GitHub Actions runner registration
token from 1Password into the cluster Secret the CAPI reconciler
reads at builder-host bootstrap time.

The Secret target has a single `token` field. The 1Password item
holds the same: a registration token minted via
  gh api -X POST /orgs/<org>/actions/runners/registration-token --jq .token
Operators rotate the 1P value when scaling up (registration tokens
have ~1h TTL); once a host has registered, its agent stores a long-
lived auth token locally and the registration Secret isn't needed
again for that host.

Self-hosters who don't run 1Password / ESO can leave
`buildersFleet.externalSecrets.enabled` at false and manage the
target Secret manually (`kubectl create secret generic ...`).
*/ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $tokenSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: builders-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  refreshInterval: {{ .Values.buildersFleet.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.buildersFleet.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.buildersFleet.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $tokenSecret }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # `trim` strips the trailing newline 1Password's web UI tends
        # to append when an operator pastes the token in. The Actions
        # runner config.sh accepts the raw token; a stray \n would
        # cause a 400 from the registration endpoint.
        token: "{{ `{{ .token | trim }}` }}"
  data:
    - secretKey: token
      remoteRef:
        key: "{{ .Values.buildersFleet.externalSecrets.item | default "BUILDERS_FLEET_RUNNER_REGISTRATION_TOKEN" }}/{{ .Values.buildersFleet.externalSecrets.field | default "credential" }}"
{{- end }}
