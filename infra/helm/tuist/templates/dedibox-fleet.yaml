{{- if and .Values.capi.enabled .Values.dediboxFleet.enabled }}
{{- $fleetName := include "tuist.componentName" (dict "root" . "component" "dedibox-fleet") }}
{{- $clusterName := include "tuist.componentName" (dict "root" . "component" "capi") }}
{{- $bootstrapSecret := include "tuist.componentName" (dict "root" . "component" "noop-bootstrap") }}
{{- /*
Dedibox fleet — the EU customer-facing Kura cache region on Scaleway Dedibox
bare metal. Like the Elastic Metal kura-fleet it self-joins via the reconciler's
SSH bootstrap (noop-bootstrap; this cluster's control plane is externally
managed, so CABPK has no CA to mint a kubeadm join).

Every Dedibox in the organization lives in the DEFAULT Scaleway project (a
Dedibox can't be assigned to another project), so the per-fleet `adoptTag` — not
the project — is the environment boundary: the operator pre-orders boxes and
stamps them with this tag, and the reconciler claims only boxes carrying it. The
reconciler authenticates with the default-project Dedibox IAM key
(DEDIBOX_SCW_*), wired from dedibox-external-secrets.yaml.

OnDelete strategy: don't auto-churn the cache node.
*/ -}}
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: DediboxMachineTemplate
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedibox-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  template:
    spec:
      adoptTag: {{ required "dediboxFleet.machine.adoptTag is required: it is the per-env adoption boundary" .Values.dediboxFleet.machine.adoptTag | quote }}
      offer: {{ .Values.dediboxFleet.machine.offer | default "" | quote }}
      datacenter: {{ .Values.dediboxFleet.machine.datacenter | default "DC2" | quote }}
      os: {{ .Values.dediboxFleet.machine.os | default "ubuntu_24.04" | quote }}
      # Stable fleet name so every Machine the MachineDeployment clones shares one
      # SSH key — the key the controller registers and the OS install authorizes.
      fleetName: {{ $fleetName | quote }}
      # Dedicate the node to this region's cache pod; general workloads stay off.
      nodeTaints:
        - key: tuist.dev/kura-cache
          value: "true"
          effect: NoSchedule
      {{- with .Values.dediboxFleet.machine.egressBudgetMbps }}
      egressBudgetMbps: {{ . }}
      {{- end }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedibox-fleet
    tuist.dev/fleet: {{ $fleetName }}
    cluster.x-k8s.io/cluster-name: {{ $clusterName }}
spec:
  clusterName: {{ $clusterName }}
  # `dig` (not `| default 1`) so an explicit replicas: 0 renders 0 — Helm's default
  # treats 0 as empty and would force 1. 0 lets a fresh fleet deploy at MD 0/0
  # (never wedging helm --wait on an unjoined box); prep the box, then scale to 1.
  replicas: {{ dig "replicas" 1 .Values.dediboxFleet }}
  strategy:
    type: OnDelete
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $clusterName }}
      tuist.dev/fleet: {{ $fleetName }}
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ $clusterName }}
        tuist.dev/fleet: {{ $fleetName }}
        # CAPI propagates node.cluster.x-k8s.io/* Machine labels to the Node, so
        # the region's pool label lands declaratively (the region's nodeSelector
        # pins its Kura cache pods here).
        node.cluster.x-k8s.io/pool: {{ .Values.dediboxFleet.nodePool | default "kura-dedibox" | quote }}
    spec:
      clusterName: {{ $clusterName }}
      version: {{ .Values.dediboxFleet.kubernetesVersion | default "v1.34.8" | quote }}
      bootstrap:
        dataSecretName: {{ $bootstrapSecret }}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: DediboxMachineTemplate
        name: {{ $fleetName }}
---
{{- /*
MachineHealthCheck — the auto-remediation backstop for a box that stays dead.
The in-box bootstrap hardening (systemd hardware watchdog + panic sysctls) reboots
a silently-locked-up box in ~30s without touching the OS, so this only fires when
that self-heal fails: a Node NotReady for 10 continuous minutes is remediated. The
provider has no reboot API for Dedibox — its only release path is a wipe-and-
reinstall — so remediation reinstalls the box and re-adopts it once it comes back
clean. Without this, a frozen box sits NotReady forever, drops the observability
node-exporter DaemonSet below full availability, and wedges every deploy.

unhealthyRange "[0-1]" remediates a single dead box but never reinstalls a whole
region at once: a cluster-wide blip that NotReadies every replica is left for an
operator rather than mass-reinstalled. nodeStartupTimeout must clear the FULL
bare-metal OS reinstall + boot — a Scaleway Dedibox install can take 60-90+ min
before sshd comes up, and the controller waits for the release reinstall to be
observed complete before handing the box back to the pool. Set it below that and
the health check culls the box mid-install, the provider wipes and reinstalls it,
and the clock restarts from zero:
an endless reinstall loop that never lets the box join and wedges helm --wait on
the MachineDeployment (the node never reaches Ready, so this only gates the
initial startup window — a box that dies after joining is still remediated by the
unhealthyConditions below).
*/ -}}
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedibox-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  clusterName: {{ $clusterName }}
  nodeStartupTimeout: 150m
  unhealthyRange: "[0-1]"
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $clusterName }}
      tuist.dev/fleet: {{ $fleetName }}
  unhealthyConditions:
    - type: Ready
      status: Unknown
      timeout: 600s
    - type: Ready
      status: "False"
      timeout: 600s
{{- end }}
