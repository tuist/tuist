apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "app-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
type: Opaque
stringData:
  server-secret-key-base: {{ randAlphaNum 64 | quote }}
  cache-secret-key-base: {{ randAlphaNum 64 | quote }}
  processor-secret-key-base: {{ randAlphaNum 64 | quote }}
  processor-webhook-secret: {{ randAlphaNum 64 | quote }}
  cache-guardian-secret-key: {{ randAlphaNum 64 | quote }}
  postgres-password: {{ ternary .Values.postgresql.embedded.password .Values.postgresql.external.password (eq .Values.postgresql.mode "embedded") | quote }}
  object-storage-access-key: {{ include "tuist.objectStorageAccessKey" . | quote }}
  object-storage-secret-key: {{ include "tuist.objectStorageSecretKey" . | quote }}
  {{- if .Values.server.license.key }}
  server-license-key: {{ .Values.server.license.key | quote }}
  {{- end }}
  {{- if .Values.server.license.certificateBase64 }}
  server-license-certificate-base64: {{ .Values.server.license.certificateBase64 | quote }}
  {{- end }}
