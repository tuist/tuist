{{- if and .Values.dediboxFleet.enabled .Values.dediboxFleet.sshExternalSecret.enabled }}
{{- $fleetName := include "tuist.componentName" (dict "root" . "component" "dedibox-fleet") }}
---
# ESO syncs the per-fleet SSH keypair (+ the install sudo-password) the Dedibox
# reconciler self-joins boxes with. Owning it from 1Password means the key
# survives a cluster rebuild and is generated once (per env vault) rather than
# minted ad-hoc in-cluster, and prep reads the same pubkey from 1Password — so a
# box can be prepped with no cluster access at all.
#
# Deliberately NOT a pre-install hook (unlike the IAM ExternalSecret): the
# controller's EnsureFleetSSHKey regenerates the key if the Secret is absent, and
# a hook's before-hook-creation delete policy would GC the owned Secret for a
# window each upgrade — long enough for the controller to mint a fresh key and
# lock out an already-adopted box. A plain Owner ExternalSecret keeps the Secret
# in place across upgrades (no deletion window) and adopts a pre-existing
# controller-minted Secret in place on first sync.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fleetName }}-ssh
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedibox-fleet
spec:
  refreshInterval: {{ .Values.dediboxFleet.sshExternalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.dediboxFleet.sshExternalSecret.storeRef.name | default "onepassword" }}
    kind: {{ .Values.dediboxFleet.sshExternalSecret.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $fleetName }}-ssh
    creationPolicy: Owner
  data:
    - secretKey: id_ed25519
      remoteRef:
        key: "{{ required "dediboxFleet.sshExternalSecret.item is required when sshExternalSecret.enabled" .Values.dediboxFleet.sshExternalSecret.item }}/{{ .Values.dediboxFleet.sshExternalSecret.fields.privateKey | default "private-key" }}"
    - secretKey: id_ed25519.pub
      remoteRef:
        key: "{{ .Values.dediboxFleet.sshExternalSecret.item }}/{{ .Values.dediboxFleet.sshExternalSecret.fields.publicKey | default "public-key" }}"
    - secretKey: sudo-password
      remoteRef:
        key: "{{ .Values.dediboxFleet.sshExternalSecret.item }}/{{ .Values.dediboxFleet.sshExternalSecret.fields.sudoPassword | default "sudo-password" }}"
{{- end }}
