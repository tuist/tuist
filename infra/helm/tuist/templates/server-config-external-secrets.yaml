{{- if and .Values.server.enabled .Values.server.config.managedSecrets }}
# Syncs the bulk of the server's runtime secrets from 1Password into a single
# dedicated k8s Secret whose keys are the TUIST_* env var names the release
# reads (Tuist.Environment.get/3 maps [:a, :b] -> TUIST_A_B). The Server,
# Migration Job, and Processor Deployments pull this Secret in via `envFrom`
# (see tuist.serverConfigEnvFrom), which is what lets us drop the encrypted
# priv/secrets/<env>.yml.enc blob + MASTER_KEY entirely.
#
# Per-concern 1Password items (one per logical secret), all in the per-env
# vault the ClusterSecretStore is bound to (tuist-k8s-{staging,canary,production}):
#   SENTRY                  dsn
#   STRIPE                  publishable_key, secret_key, endpoint_secret
#                           (the price IDs are not secrets — they live in the chart
#                            under server.stripe.prices, not here)
#   SLACK                   client_id, client_secret, tuist_token
#   APPLE                   app_client_id, service_client_id, team_id, private_key_id, private-key.pem [file]
#   OAUTH                   client_id, client_secret, jwt-public-key.pem [file]
#                           (client_name + private_key are intentionally NOT synced:
#                            the blob never set them so the accessors return nil today,
#                            and syncing them as "" would crash JOSE.JWK.from_pem/1)
#
# [file] = a 1Password file attachment; ESO's 1P provider reads it by filename,
# so the remoteRef key is "<ITEM>/<filename>" (same as GITHUB_APP/private-key.pem).
#   MAILGUN                 api_key
#                           (the mailing domain/from/reply-to are not secrets — they
#                            live in the chart under server.mailing, not here)
#   POSTHOG                 api_key, url   (only when server.config.posthog.enabled;
#                           opt out per env — e.g. canary has no PostHog item)
#   LOOPS                   api_key
#   CLICKHOUSE              url
#   PLAIN                   authentication_secret
#   CACHE_API_KEY           password
#   SECRET_KEYS             password, tokens, encryption
#
# A dedicated Secret (not a Merge into app-secrets) on purpose: helm upgrade
# rewrites chart-managed resources and would wipe ESO-managed keys until the
# next reconcile, so helm and ESO never share an object.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "server-config-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- if .Values.server.migrationJob.asHook }}
  annotations:
    # Same hook chain as the license/Kura ExternalSecret: -12 ServiceAccount ->
    # -10 ExternalSecret -> -5 Secret -> -1 Job. Helm waits for the Ready
    # condition (ESO fetched every field from 1Password) before the migrate
    # Job runs, so a missing 1P item fails the deploy here rather than booting
    # the release with half its config.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
spec:
  refreshInterval: {{ .Values.server.config.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.server.config.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.server.config.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "server-config-external-secrets") }}
    creationPolicy: Owner
    # Strip the trailing newline the 1P web UI appends on paste from every
    # single-line value (an OAuth secret / API key with a stray \n fails at
    # use time). Multi-line PEM/key fields are read from file attachments and
    # left untouched.
    template:
      engineVersion: v2
      data:
        TUIST_SENTRY_DSN: "{{ `{{ .TUIST_SENTRY_DSN | trim }}` }}"
        TUIST_STRIPE_PUBLISHABLE_KEY: "{{ `{{ .TUIST_STRIPE_PUBLISHABLE_KEY | trim }}` }}"
        TUIST_STRIPE_SECRET_KEY: "{{ `{{ .TUIST_STRIPE_SECRET_KEY | trim }}` }}"
        TUIST_STRIPE_ENDPOINT_SECRET: "{{ `{{ .TUIST_STRIPE_ENDPOINT_SECRET | trim }}` }}"
        TUIST_SLACK_CLIENT_ID: "{{ `{{ .TUIST_SLACK_CLIENT_ID | trim }}` }}"
        TUIST_SLACK_CLIENT_SECRET: "{{ `{{ .TUIST_SLACK_CLIENT_SECRET | trim }}` }}"
        TUIST_SLACK_TUIST_TOKEN: "{{ `{{ .TUIST_SLACK_TUIST_TOKEN | trim }}` }}"
        TUIST_APPLE_APP_CLIENT_ID: "{{ `{{ .TUIST_APPLE_APP_CLIENT_ID | trim }}` }}"
        TUIST_APPLE_SERVICE_CLIENT_ID: "{{ `{{ .TUIST_APPLE_SERVICE_CLIENT_ID | trim }}` }}"
        TUIST_APPLE_TEAM_ID: "{{ `{{ .TUIST_APPLE_TEAM_ID | trim }}` }}"
        TUIST_APPLE_PRIVATE_KEY_ID: "{{ `{{ .TUIST_APPLE_PRIVATE_KEY_ID | trim }}` }}"
        TUIST_APPLE_PRIVATE_KEY: "{{ `{{ .TUIST_APPLE_PRIVATE_KEY }}` }}"
        TUIST_OAUTH_CLIENT_ID: "{{ `{{ .TUIST_OAUTH_CLIENT_ID | trim }}` }}"
        TUIST_OAUTH_CLIENT_SECRET: "{{ `{{ .TUIST_OAUTH_CLIENT_SECRET | trim }}` }}"
        TUIST_OAUTH_JWT_PUBLIC_KEY: "{{ `{{ .TUIST_OAUTH_JWT_PUBLIC_KEY }}` }}"
        TUIST_MAILGUN_API_KEY: "{{ `{{ .TUIST_MAILGUN_API_KEY | trim }}` }}"
        {{- if .Values.server.config.posthog.enabled }}
        TUIST_POSTHOG_API_KEY: "{{ `{{ .TUIST_POSTHOG_API_KEY | trim }}` }}"
        TUIST_POSTHOG_URL: "{{ `{{ .TUIST_POSTHOG_URL | trim }}` }}"
        {{- end }}
        TUIST_LOOPS_API_KEY: "{{ `{{ .TUIST_LOOPS_API_KEY | trim }}` }}"
        TUIST_CLICKHOUSE_URL: "{{ `{{ .TUIST_CLICKHOUSE_URL | trim }}` }}"
        TUIST_PLAIN_AUTHENTICATION_SECRET: "{{ `{{ .TUIST_PLAIN_AUTHENTICATION_SECRET | trim }}` }}"
        TUIST_CACHE_API_KEY: "{{ `{{ .TUIST_CACHE_API_KEY | trim }}` }}"
        TUIST_SECRET_KEY_BASE: "{{ `{{ .TUIST_SECRET_KEY_BASE | trim }}` }}"
        TUIST_SECRET_KEY_PASSWORD: "{{ `{{ .TUIST_SECRET_KEY_PASSWORD | trim }}` }}"
        TUIST_SECRET_KEY_TOKENS: "{{ `{{ .TUIST_SECRET_KEY_TOKENS | trim }}` }}"
        TUIST_SECRET_KEY_ENCRYPTION: "{{ `{{ .TUIST_SECRET_KEY_ENCRYPTION | trim }}` }}"
  data:
    - secretKey: TUIST_SENTRY_DSN
      remoteRef: { key: "SENTRY/dsn" }
    - secretKey: TUIST_STRIPE_PUBLISHABLE_KEY
      remoteRef: { key: "STRIPE/publishable_key" }
    - secretKey: TUIST_STRIPE_SECRET_KEY
      remoteRef: { key: "STRIPE/secret_key" }
    - secretKey: TUIST_STRIPE_ENDPOINT_SECRET
      remoteRef: { key: "STRIPE/endpoint_secret" }
    - secretKey: TUIST_SLACK_CLIENT_ID
      remoteRef: { key: "SLACK/client_id" }
    - secretKey: TUIST_SLACK_CLIENT_SECRET
      remoteRef: { key: "SLACK/client_secret" }
    - secretKey: TUIST_SLACK_TUIST_TOKEN
      remoteRef: { key: "SLACK/tuist_token" }
    - secretKey: TUIST_APPLE_APP_CLIENT_ID
      remoteRef: { key: "APPLE/app_client_id" }
    - secretKey: TUIST_APPLE_SERVICE_CLIENT_ID
      remoteRef: { key: "APPLE/service_client_id" }
    - secretKey: TUIST_APPLE_TEAM_ID
      remoteRef: { key: "APPLE/team_id" }
    - secretKey: TUIST_APPLE_PRIVATE_KEY_ID
      remoteRef: { key: "APPLE/private_key_id" }
    - secretKey: TUIST_APPLE_PRIVATE_KEY
      remoteRef: { key: "APPLE/private-key.pem" }
    - secretKey: TUIST_OAUTH_CLIENT_ID
      remoteRef: { key: "OAUTH/client_id" }
    - secretKey: TUIST_OAUTH_CLIENT_SECRET
      remoteRef: { key: "OAUTH/client_secret" }
    - secretKey: TUIST_OAUTH_JWT_PUBLIC_KEY
      remoteRef: { key: "OAUTH/jwt-public-key.pem" }
    - secretKey: TUIST_MAILGUN_API_KEY
      remoteRef: { key: "MAILGUN/api_key" }
    {{- if .Values.server.config.posthog.enabled }}
    - secretKey: TUIST_POSTHOG_API_KEY
      remoteRef: { key: "POSTHOG/api_key" }
    - secretKey: TUIST_POSTHOG_URL
      remoteRef: { key: "POSTHOG/url" }
    {{- end }}
    - secretKey: TUIST_LOOPS_API_KEY
      remoteRef: { key: "LOOPS/api_key" }
    - secretKey: TUIST_CLICKHOUSE_URL
      remoteRef: { key: "CLICKHOUSE/url" }
    - secretKey: TUIST_PLAIN_AUTHENTICATION_SECRET
      remoteRef: { key: "PLAIN/authentication_secret" }
    - secretKey: TUIST_CACHE_API_KEY
      remoteRef: { key: "CACHE_API_KEY/password" }
    # secret_key.base is read from the blob (not the chart) in managed envs
    # today — the chart's TUIST_SECRET_KEY_BASE is gated behind
    # `not managedSecrets`. Carry the exact current value so dropping the blob
    # doesn't rotate Phoenix's session/signing key out from under live sessions.
    - secretKey: TUIST_SECRET_KEY_BASE
      remoteRef: { key: "SECRET_KEYS/base" }
    - secretKey: TUIST_SECRET_KEY_PASSWORD
      remoteRef: { key: "SECRET_KEYS/password" }
    - secretKey: TUIST_SECRET_KEY_TOKENS
      remoteRef: { key: "SECRET_KEYS/tokens" }
    - secretKey: TUIST_SECRET_KEY_ENCRYPTION
      remoteRef: { key: "SECRET_KEYS/encryption" }
{{- end }}
