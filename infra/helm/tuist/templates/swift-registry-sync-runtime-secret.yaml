{{- if and .Values.swiftRegistrySync.enabled (not .Values.swiftRegistrySync.managedSecrets) }}
{{- $secretName := .Values.swiftRegistrySync.runtimeSecretName | default (include "tuist.componentName" (dict "root" . "component" "swift-registry-sync-runtime")) -}}
{{- $s3RegistryBucket := .Values.swiftRegistrySync.inlineSecrets.s3RegistryBucket | default (include "tuist.objectStorageBucketRegistry" .) -}}
{{- $s3Endpoint := .Values.swiftRegistrySync.inlineSecrets.s3Endpoint | default (include "tuist.objectStorageEndpoint" .) -}}
{{- $s3Host := .Values.swiftRegistrySync.inlineSecrets.s3Host | default "" -}}
{{- $s3Region := .Values.swiftRegistrySync.inlineSecrets.s3Region | default (include "tuist.objectStorageRegion" .) -}}
{{- $s3AccessKeyId := .Values.swiftRegistrySync.inlineSecrets.s3AccessKeyId | default (include "tuist.objectStorageAccessKey" .) -}}
{{- $s3SecretAccessKey := .Values.swiftRegistrySync.inlineSecrets.s3SecretAccessKey | default (include "tuist.objectStorageSecretKey" .) -}}
{{- $databaseUrl := .Values.swiftRegistrySync.databaseUrl -}}
{{- if eq $databaseUrl "" -}}
{{- $databaseUrl = include "tuist.databaseUrl" . -}}
{{- end -}}
{{- if and (eq $s3Endpoint "") (eq $s3Host "") -}}
{{- fail "swiftRegistrySync.inlineSecrets.s3Endpoint, swiftRegistrySync.inlineSecrets.s3Host, or objectStorage endpoint is required when swiftRegistrySync.managedSecrets is false" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: swift-registry-sync
type: Opaque
stringData:
  DATABASE_URL: {{ required "swiftRegistrySync.databaseUrl or a literal chart database URL is required when swiftRegistrySync.managedSecrets is false" $databaseUrl | quote }}
  S3_REGISTRY_BUCKET: {{ required "swiftRegistrySync.inlineSecrets.s3RegistryBucket or objectStorage registry bucket is required when swiftRegistrySync.managedSecrets is false" $s3RegistryBucket | quote }}
  S3_ENDPOINT: {{ $s3Endpoint | quote }}
  S3_HOST: {{ $s3Host | quote }}
  S3_REGION: {{ required "swiftRegistrySync.inlineSecrets.s3Region or objectStorage region is required when swiftRegistrySync.managedSecrets is false" $s3Region | quote }}
  S3_ACCESS_KEY_ID: {{ required "swiftRegistrySync.inlineSecrets.s3AccessKeyId or objectStorage access key is required when swiftRegistrySync.managedSecrets is false" $s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ required "swiftRegistrySync.inlineSecrets.s3SecretAccessKey or objectStorage secret key is required when swiftRegistrySync.managedSecrets is false" $s3SecretAccessKey | quote }}
  SWIFT_REGISTRY_GITHUB_TOKEN: {{ .Values.swiftRegistrySync.inlineSecrets.githubToken | default "" | quote }}
{{- end }}
