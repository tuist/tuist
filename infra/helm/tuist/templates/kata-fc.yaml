{{- if .Values.kataContainers.enabled }}
# Kata Containers + Firecracker RuntimeClass for Linux runner Pods.
#
# Each runner Pod becomes a microVM: separate kernel, real per-tenant
# kernel isolation. The `kata-fc` RuntimeClass below is what
# `pools[].runtimeClass: kata-fc` in `values-*.yaml` resolves to, and
# what the runners-controller's podtemplate stamps onto
# `Pod.spec.runtimeClassName` for linux pools.
#
# Install model: Kata + nydus-snapshotter + Firecracker are baked into
# the bare-metal Node at OS install time via the `postInstallScript`
# in `infra/k8s/clusters/bare-metal-staging.yaml`. The script runs
# chrooted in the freshly-installed Ubuntu image before any reboot,
# unpacks `kata-static` under `/opt/kata`, installs the nydus
# snapshotter as a systemd unit, writes the kata-fc containerd
# drop-in to `/etc/containerd/conf.d/`, and seeds
# `/etc/containerd/config.toml` to import drop-ins. When the Node
# boots, containerd starts with the kata-fc handler already
# registered — no runtime DaemonSet, no containerd restart, no
# disruption to Cilium / CNI.
#
# The `katacontainers.io/kata-runtime=true` label below is applied to
# the Node by `postKubeadmCommands` in the bare-metal worker
# `KubeadmConfigTemplate`, so the RuntimeClass scheduling rule binds
# immediately after kubeadm-join. Nodes without the label never
# match this RuntimeClass and fail to schedule kata-fc Pods (the
# correct behavior — fail loud rather than silently fall back to runc
# when an operator asked for microVM isolation).
#
# To disable Kata cluster-wide (e.g. dev environments without bare
# metal), set `kataContainers.enabled: false` in values. The
# `runtimeClass` field on a pool resolves to nil at the controller
# and Pods fall back to the cluster default runtime.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-fc
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kata-containers
handler: kata-fc
scheduling:
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
overhead:
  podFixed:
    cpu: "50m"
    memory: "100Mi"
{{- end }}
