{{- if .Values.server.enabled }}
{{- $secretName := include "tuist.componentName" (dict "root" . "component" "app-secrets") }}
{{- $objectStorageAccessKey := include "tuist.objectStorageAccessKey" . -}}
{{- $objectStorageSecretKey := include "tuist.objectStorageSecretKey" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "server") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.server.autoscaling.enabled }}
  replicas: {{ .Values.server.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.server.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "server") | nindent 8 }}
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        # Ports declared on this Pod: http, metrics, epmd (HA prod).
        # Without a port-name discriminator, Kubernetes pod-role
        # discovery emits one scrape target per declared port — naming
        # the metrics one explicitly keeps Alloy on a single target
        # per pod. See helm/k8s-monitoring/values.yaml for the
        # annotation→config mapping.
        prometheus.io/port-name: metrics
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "tuist.componentServiceAccountName" (dict "root" . "component" "server") }}
      terminationGracePeriodSeconds: {{ .Values.server.terminationGracePeriodSeconds }}
      {{- include "tuist.podScheduling" . | nindent 6 }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command:
            - /app/bin/tuist
            - start
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9091
            {{- if .Values.server.cluster.enabled }}
            - name: epmd
              containerPort: 4369
            {{- end }}
          env:
            # TUIST_MODE defaults to :web in Tuist.Environment.mode/0 — no
            # need to set it explicitly here. The processor Deployment sets
            # TUIST_MODE=processor; everything else is :web.
            {{- if eq .Values.postgresql.mode "cnpg" }}
            # Managed CNPG uses the least-privilege runtime role
            # (`tuist_web` by default). Self-hosted chart installs without
            # managedSecrets keep using the owner Secret for backwards
            # compatibility. The service hostname (`<cluster>-rw`) only
            # resolves to the current primary; CNPG fails the Service over
            # during a promotion.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.server.managedSecrets }}
                  name: {{ include "tuist.cnpgWebRoleSecretName" . }}
                  {{- else }}
                  name: {{ include "tuist.cnpgAppSecretName" . }}
                  {{- end }}
                  key: uri
            - name: TUIST_USE_SSL_FOR_DATABASE
              value: "0"
            {{- end }}
            - name: TUIST_DATABASE_SCHEMA
              value: {{ .Values.postgresql.schema | quote }}
            {{- if not .Values.server.managedSecrets }}
            {{- if ne .Values.postgresql.mode "cnpg" }}
            {{- include "tuist.externalPostgresqlSecretEnv" . | nindent 12 }}
            - name: DATABASE_URL
              value: {{ include "tuist.databaseUrl" . | quote }}
            - name: TUIST_USE_SSL_FOR_DATABASE
              value: {{ .Values.server.database.ssl | ternary "1" "0" | quote }}
            {{- end }}
            - name: TUIST_CLICKHOUSE_URL
              value: {{ include "tuist.clickhouseUrl" . | quote }}
            - name: TUIST_SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: server-secret-key-base
            {{- end }}
            - name: TUIST_APP_URL
              value: {{ .Values.server.appUrl | quote }}
            - name: TUIST_LOG_LEVEL
              value: {{ .Values.server.logLevel | quote }}
            - name: TUIST_HOSTED
              value: {{ .Values.server.hosted | ternary "1" "0" | quote }}
            {{- with (.Values.server.artifactRetentionDays.cacheArtifacts | toString) }}
            - name: TUIST_CACHE_ARTIFACT_RETENTION_DAYS
              value: {{ . | quote }}
            {{- end }}
            {{- with (.Values.server.artifactRetentionDays.appPreviews | toString) }}
            - name: TUIST_APP_PREVIEW_RETENTION_DAYS
              value: {{ . | quote }}
            {{- end }}
            {{- with (.Values.server.artifactRetentionDays.buildArchives | toString) }}
            - name: TUIST_BUILD_ARCHIVE_RETENTION_DAYS
              value: {{ . | quote }}
            {{- end }}
            {{- with (.Values.server.artifactRetentionDays.runArtifacts | toString) }}
            - name: TUIST_RUN_ARTIFACT_RETENTION_DAYS
              value: {{ . | quote }}
            {{- end }}
            {{- with (.Values.server.artifactRetentionDays.testAttachments | toString) }}
            - name: TUIST_TEST_ATTACHMENT_RETENTION_DAYS
              value: {{ . | quote }}
            {{- end }}
            {{- with (.Values.server.artifactRetentionDays.shardBundles | toString) }}
            - name: TUIST_SHARD_BUNDLE_RETENTION_DAYS
              value: {{ . | quote }}
            {{- end }}
            - name: TUIST_SKIP_EMAIL_CONFIRMATION
              value: {{ .Values.server.skipEmailConfirmation | ternary "1" "0" | quote }}
            - name: TUIST_SELF_HOSTING_DEVELOPMENT_MODE
              value: {{ .Values.server.license.selfHostingDevelopmentMode | ternary "1" "0" | quote }}
            {{- if .Values.processor.enabled }}
            # Hand off the :process_build queue entirely to processor pods —
            # without this the server's local Oban worker (default concurrency
            # 2) races the dedicated processor and steals jobs the processor
            # was meant to do, defeating the whole point of a separate parse
            # fleet.
            - name: TUIST_DELEGATE_PROCESS_BUILD
              value: "1"
            {{- end }}
            {{- if .Values.xcresultProcessor.enabled }}
            # Hand off the :process_xcresult queue to the macOS xcresult-
            # processor Pods scheduled onto Mac mini nodes via tart-cri.
            # Linux pods don't ship the macOS-only xcresult NIF, so
            # without this flag the server's local Oban worker would
            # claim jobs and crash on `:nif_not_loaded` for every
            # test-result archive.
            - name: TUIST_DELEGATE_PROCESS_XCRESULT
              value: "1"
            {{- end }}
            {{- if or .Values.runnersFleet.enabled .Values.runnersFleetLinux.enabled }}
            # Runners namespace. The server reads RunnerPool CRs at
            # dispatch time to discover the fleet name; runner
            # availability is gated by the `:runners` feature flag and
            # has no chart-level setting.
            - name: TUIST_RUNNERS_NAMESPACE
              value: {{ .Values.runnersFleet.namespace | default "tuist-runners" | quote }}
            # Identity gate for `POST /api/internal/runners/pods/stopped`:
            # only the rendered runners-controller SA can close billing
            # sessions. Mirrors the deployment-time identity defined in
            # `runners-controller-deployment.yaml`.
            - name: TUIST_RUNNERS_CONTROLLER_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: TUIST_RUNNERS_CONTROLLER_SA_NAME
              value: {{ include "tuist.componentName" (dict "root" . "component" "runners-controller") | quote }}
            {{- end }}
            {{- if .Values.runnersFleetLinux.enabled }}
            # Prefix the dispatch path prepends to a shape key to address
            # a shape pool's RunnerPool CR (`<prefix>-<vcpus>vcpu-<gb>gb`).
            # Injected from the same helper that names the CRs in
            # runner-pool.yaml so the server always resolves to a pool a
            # Pod actually polls, regardless of the helm release name.
            - name: TUIST_RUNNERS_LINUX_POOL_NAME_PREFIX
              value: {{ include "tuist.componentName" (dict "root" . "component" "runner-pool-linux") | quote }}
            {{- with .Values.runnersFleetLinux.shapes }}
            # Single source of truth for the shape catalog: inject the
            # same `runnersFleetLinux.shapes` list that renders the
            # RunnerPool CRs so the server's catalog (dashboard dropdown,
            # profile validation, dispatch) can't drift from the pools
            # that exist. Projected to the fields the server reads;
            # config/runtime.exs parses it into `:runner_linux_shapes`.
            {{- $serverShapes := list }}
            {{- range . }}
            {{- $shape := dict "vcpus" (.vcpus | int) "memoryGb" (.memoryGb | int) }}
            {{- if .default }}{{- $_ := set $shape "default" true }}{{- end }}
            {{- $serverShapes = append $serverShapes $shape }}
            {{- end }}
            - name: TUIST_RUNNER_LINUX_SHAPES
              value: {{ $serverShapes | toJson | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.runnersFleet.enabled }}
            # macOS analogue of the Linux pool name prefix above. The
            # chart's macOS RunnerPool CRs are named
            # `<componentName>-runner-pool-macos-<xcode-dashes>` (per
            # Xcode profile); injecting the prefix here keeps
            # `Catalog.pool_name/1` in lockstep with the rendered CRs.
            - name: TUIST_RUNNERS_MACOS_POOL_NAME_PREFIX
              value: {{ include "tuist.componentName" (dict "root" . "component" "runner-pool-macos") | quote }}
            {{- with .Values.runnersFleet.shapes }}
            # Same projection as the Linux shapes above, for the macOS
            # fleet. M2-L is the only shape today; this is wired now so
            # future shape diversity doesn't need a chart change.
            {{- $serverMacosShapes := list }}
            {{- range . }}
            {{- $shape := dict "vcpus" (.vcpus | int) "memoryGb" (.memoryGb | int) }}
            {{- if .default }}{{- $_ := set $shape "default" true }}{{- end }}
            {{- $serverMacosShapes = append $serverMacosShapes $shape }}
            {{- end }}
            - name: TUIST_RUNNER_MACOS_SHAPES
              value: {{ $serverMacosShapes | toJson | quote }}
            {{- end }}
            {{- with .Values.runnersFleet.xcodeVersions }}
            # macOS Xcode catalog injection. Mirrors the shape pattern:
            # one source for the chart pool rendering (planned) and the
            # server's `:runner_macos_xcode_versions` validation.
            {{- $serverXcodeVersions := list }}
            {{- range . }}
            {{- $entry := dict "xcodeVersion" (.xcodeVersion | toString) }}
            {{- if .default }}{{- $_ := set $entry "default" true }}{{- end }}
            {{- $serverXcodeVersions = append $serverXcodeVersions $entry }}
            {{- end }}
            - name: TUIST_RUNNER_MACOS_XCODE_VERSIONS
              value: {{ $serverXcodeVersions | toJson | quote }}
            {{- end }}
            {{- end }}
            {{- if or .Values.postgresql.cnpg.enabled (eq .Values.postgresql.mode "cnpg") }}
            # Namespace of the CNPG Cluster + Backup CRs (this release's
            # namespace). The /ops/db Backups tab lists those CRs via the
            # K8s API; the server SA's read grant is in postgresql-cnpg.yaml.
            - name: TUIST_CNPG_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- end }}
            {{- include "tuist.licenseEnv" . | nindent 12 }}
            {{- include "tuist.kuraIntrospectionEnv" . | nindent 12 }}
            {{- include "tuist.githubEnv" . | nindent 12 }}
            {{- include "tuist.googleEnv" . | nindent 12 }}
            {{- include "tuist.stripePricesEnv" . | nindent 12 }}
            {{- include "tuist.mailingEnv" . | nindent 12 }}
            {{- if .Values.server.cluster.enabled }}
            - name: TUIST_CLUSTER_DNS_SERVICE
              value: {{ include "tuist.serverHeadlessServiceName" . | quote }}
            - name: TUIST_CLUSTER_APP_NAME
              value: {{ .Values.server.cluster.applicationName | quote }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RELEASE_DISTRIBUTION
              value: "name"
            - name: RELEASE_NODE
              value: "$(TUIST_CLUSTER_APP_NAME)@$(POD_IP)"
            {{- end }}
            {{- include "tuist.serverObjectStorageEnv" . | nindent 12 }}
            - name: TUIST_S3_BUCKET_NAME
              value: {{ include "tuist.objectStorageBucketDefault" . | quote }}
            - name: TUIST_S3_ENDPOINT
              value: {{ include "tuist.objectStorageEndpoint" . | quote }}
            - name: TUIST_S3_REGION
              value: {{ include "tuist.objectStorageRegion" . | quote }}
            - name: TUIST_S3_VIRTUAL_HOST
              value: {{ .Values.server.s3.virtualHost | ternary "1" "0" | quote }}
            - name: TUIST_S3_BUCKET_AS_HOST
              value: {{ .Values.server.s3.bucketAsHost | ternary "1" "0" | quote }}
            {{- if and (eq .Values.objectStorage.mode "external") .Values.objectStorage.external.managedSecrets }}
            - name: TUIST_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "object-storage-external-secrets") }}
                  key: object-storage-access-key
            - name: TUIST_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "object-storage-external-secrets") }}
                  key: object-storage-secret-key
            {{- else if and $objectStorageAccessKey $objectStorageSecretKey }}
            - name: TUIST_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: object-storage-access-key
            - name: TUIST_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: object-storage-secret-key
            {{- end }}
            {{- if or .Values.cache.enabled .Values.server.cacheEndpointUrl }}
            - name: TUIST_CACHE_ENDPOINTS
              value: {{ .Values.server.cacheEndpointUrl | default (printf "http://%s:%v" (include "tuist.componentName" (dict "root" . "component" "cache")) .Values.cache.service.port) | quote }}
            {{- end }}
            - name: TUIST_CACHE_S3_BUCKET_NAME
              value: {{ .Values.cache.s3.bucket | quote }}
            - name: TUIST_CACHE_XCODE_S3_BUCKET_NAME
              value: {{ .Values.cache.s3.xcodeCacheBucket | quote }}
            {{- with .Values.server.kuraEndpointUrls }}
            - name: TUIST_KURA_ENDPOINTS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.server.kuraDedicatedGatewayAccounts }}
            - name: TUIST_KURA_DEDICATED_GATEWAY_ACCOUNTS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if .Values.kuraRuntime.image.tag }}
            - name: TUIST_KURA_RUNTIME_IMAGE_TAG
              value: {{ .Values.kuraRuntime.image.tag | quote }}
            {{- end }}
            - name: TUIST_KURA_TUIST_BASE_URL
              value: {{ printf "http://%s.%s.svc.cluster.local:%v" (include "tuist.componentName" (dict "root" . "component" "server")) .Release.Namespace (.Values.server.service.port | default 80) | quote }}
            {{- $redisUrl := include "tuist.redisUrl" . }}
            {{- if and .Values.redis.enabled $redisUrl }}
            - name: TUIST_REDIS_URL
              value: {{ $redisUrl | quote }}
            {{- end }}
            {{- if and .Values.observability.enabled (include "tuist.observabilityOtlpEndpoint" .) }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ include "tuist.observabilityOtlpEndpoint" . | quote }}
            - name: TUIST_LOKI_URL
              value: "http://{{ include "tuist.componentName" (dict "root" . "component" "loki") }}:3100"
            {{- end }}
            {{- if .Values.server.kuraPeerFailoverIps }}
            - name: TUIST_KURA_PEER_FAILOVER_IPS
              value: "{{- range $i, $e := .Values.server.kuraPeerFailoverIps }}{{ if $i }},{{ end }}{{ $e.region }}={{ $e.ip }}{{- end }}"
            {{- end }}
            {{- include "tuist.clickhousePoolEnv" . | nindent 12 }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- $serverConfigEnvFrom := include "tuist.serverConfigEnvFrom" . | trim }}
          {{- if or $serverConfigEnvFrom .Values.server.extraEnvFrom }}
          envFrom:
            {{- with $serverConfigEnvFrom }}
            {{- . | nindent 12 }}
            {{- end }}
            {{- with .Values.server.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.server.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.server.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.server.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.server.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.server.probes.liveness.failureThreshold }}
          lifecycle:
            preStop:
              exec:
                # Give the ingress time to stop routing new traffic before the
                # release shuts down — avoids 502s during a rolling deploy.
                command: ["sh", "-c", "sleep 10"]
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
{{- end }}
