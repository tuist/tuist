{{- if and .Values.capi.enabled .Values.kuraFleet.enabled }}
{{- $fleetName := include "tuist.componentName" (dict "root" . "component" "kura-fleet") }}
{{- $clusterName := include "tuist.componentName" (dict "root" . "component" "capi") }}
{{- $bootstrapSecret := include "tuist.componentName" (dict "root" . "component" "noop-bootstrap") }}
{{- /*
Kura runner-cache fleet — a declarative Scaleway Elastic Metal node co-located
with the Mac fleet: a bare-metal server with a 10G+ PN NIC and local NVMe.
Elastic Metal can't attach scw-bssd, so the cache PVCs use a local-NVMe
StorageClass on the node (see infra/k8s/mgmt/bootstrap/local-path-*).

Like the macOS fleet, bootstrap is `noop-bootstrap` (no CAPI kubeadm join):
this cluster's control plane is externally managed (Hetzner/caph), so CABPK
has no cluster CA to mint a kubeadm join. Instead the reconciler mints a
kubelet token kubeconfig and SSH-delivers a self-join script — the same
machinery the Apple Silicon kind uses over SSH.

The runner-cache taint rides nodeTaints on the MachineTemplate (the reconciler
passes it to the kubelet's --register-with-taints); the pool label rides CAPI
Machine→Node propagation. OnDelete strategy: don't auto-churn the cache node.
*/ -}}
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ScalewayElasticMetalMachineTemplate
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  template:
    spec:
      offerType: {{ .Values.kuraFleet.machine.offerType | default "EM-B220E-NVME" | quote }}
      # Pre-ordered pool: the operator orders Elastic Metal boxes named with this
      # prefix out-of-band (never inline during a rollout); the controller claims
      # a free one and releases it back to the pool (reinstall) on delete.
      adoptNamePrefix: {{ .Values.kuraFleet.machine.adoptNamePrefix | default "tuist-kura-em-" | quote }}
      # Stable fleet name so every Machine the MachineDeployment clones shares one
      # SSH key — the key the operator authorizes on the pre-ordered pool boxes.
      fleetName: {{ $fleetName | quote }}
      zone: {{ .Values.kuraFleet.machine.zone | default "fr-par-1" | quote }}
      os: {{ .Values.kuraFleet.machine.os | default "ubuntu_noble" | quote }}
      privateNetworkName: {{ .Values.kuraFleet.machine.privateNetworkName | default "tuist-runner-cache" | quote }}
      privateNetworkCIDR: {{ .Values.kuraFleet.machine.privateNetworkCIDR | default "172.16.0.0/22" | quote }}
      nodeTaints:
        - key: tuist.dev/runner-cache
          value: "true"
          effect: NoSchedule
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-fleet
    tuist.dev/fleet: {{ $fleetName }}
    cluster.x-k8s.io/cluster-name: {{ $clusterName }}
spec:
  clusterName: {{ $clusterName }}
  # `dig` (not `| default 1`) so an explicit replicas: 0 renders 0 — Helm's default
  # treats 0 as empty and would force 1. 0 lets a fresh fleet deploy at MD 0/0
  # (never wedging helm --wait on an unjoined box); prep the box, then scale to 1.
  replicas: {{ dig "replicas" 1 .Values.kuraFleet }}
  strategy:
    type: OnDelete
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $clusterName }}
      tuist.dev/fleet: {{ $fleetName }}
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ $clusterName }}
        tuist.dev/fleet: {{ $fleetName }}
        # CAPI propagates node.cluster.x-k8s.io/* Machine labels to the Node,
        # so the pool label lands declaratively (the runner-cache region's
        # nodeSelector pins the cache pods here).
        node.cluster.x-k8s.io/pool: {{ .Values.kuraFleet.nodePool | default "kura-scw-fr-par" | quote }}
    spec:
      clusterName: {{ $clusterName }}
      version: {{ .Values.kuraFleet.kubernetesVersion | default "v1.34.8" | quote }}
      bootstrap:
        dataSecretName: {{ $bootstrapSecret }}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: ScalewayElasticMetalMachineTemplate
        name: {{ $fleetName }}
---
{{- /*
MachineHealthCheck — the auto-remediation backstop for a box that stays dead.
The in-box bootstrap hardening (systemd hardware watchdog + panic sysctls) reboots
a silently-locked-up box in ~30s without touching the OS, so this only fires when
that self-heal fails: a Node NotReady for 10 continuous minutes is remediated. The
provider's release path is a wipe-and-reinstall, so remediation reinstalls the box
and re-adopts it once it comes back clean. Without this, a frozen box sits NotReady
forever, drops the observability node-exporter DaemonSet below full availability,
and wedges every deploy.

unhealthyRange "[0-1]" remediates a single dead box but never reinstalls a whole
region at once: a cluster-wide blip that NotReadies every replica is left for an
operator rather than mass-reinstalled. nodeStartupTimeout must clear the FULL
bare-metal OS reinstall + boot — a Scaleway Elastic Metal reinstall + boot can
run well past 30 min. Set it below that and the health check culls the box mid-
install, the provider wipes and reinstalls it, and the clock restarts from zero:
an endless reinstall loop that never lets the box join and wedges helm --wait on
the MachineDeployment (the node never reaches Ready, so this only gates the
initial startup window — a box that dies after joining is still remediated by the
unhealthyConditions below).
*/ -}}
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: {{ $fleetName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-fleet
    tuist.dev/fleet: {{ $fleetName }}
spec:
  clusterName: {{ $clusterName }}
  nodeStartupTimeout: 90m
  unhealthyRange: "[0-1]"
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $clusterName }}
      tuist.dev/fleet: {{ $fleetName }}
  unhealthyConditions:
    - type: Ready
      status: Unknown
      timeout: 600s
    - type: Ready
      status: "False"
      timeout: 600s
{{- end }}
