{{- /* Render the shared OVH IAM secret when the singular ovhFleet OR any ovhFleets
   map entry is enabled — one OVH account serves every OVH fleet, so the reconciler
   needs these creds whenever any OVH fleet is on. The item is read from the
   singular ovhFleet.externalSecrets (set as the shared OVH config holder even when
   that fleet itself is disabled). */ -}}
{{- $ovhAny := and .Values.ovhFleet.enabled .Values.ovhFleet.externalSecrets.enabled -}}
{{- range $f := .Values.ovhFleets }}{{- if $f.enabled }}{{- $ovhAny = true -}}{{- end }}{{- end }}
{{- if $ovhAny }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "ovh") }}
---
# ESO syncs the OVH API credentials the OVH reconciler authenticates with. The
# OVH SDK reads OVH_APPLICATION_KEY / OVH_APPLICATION_SECRET / OVH_CONSUMER_KEY
# from the env; the OVH_ENDPOINT (ovh-eu, ovh-ca, ...) is non-secret config set
# on the Deployment. The application/consumer keys are minted in the OVH API
# console scoped to GET /dedicated/server/* + GET /services/* (the latter to read
# a box's displayName, the adoption marker). Self-hosters not using ESO can
# override ovhFleet.secretName.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: ovh
  annotations:
    # Pre-install/upgrade hook so Helm blocks on ESO fetching the keys before the
    # operator Deployment lands (same rationale as the Scaleway IAM secret).
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: {{ .Values.ovhFleet.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.ovhFleet.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.ovhFleet.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
  data:
    - secretKey: application-key
      remoteRef:
        key: "{{ .Values.ovhFleet.externalSecrets.item }}/{{ .Values.ovhFleet.externalSecrets.fields.applicationKey | default "application-key" }}"
    - secretKey: application-secret
      remoteRef:
        key: "{{ .Values.ovhFleet.externalSecrets.item }}/{{ .Values.ovhFleet.externalSecrets.fields.applicationSecret | default "application-secret" }}"
    - secretKey: consumer-key
      remoteRef:
        key: "{{ .Values.ovhFleet.externalSecrets.item }}/{{ .Values.ovhFleet.externalSecrets.fields.consumerKey | default "consumer-key" }}"
{{- end }}
