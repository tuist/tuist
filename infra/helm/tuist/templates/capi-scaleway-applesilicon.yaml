{{- if and .Values.capi.enabled .Values.macosFleet.enabled }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "capi-scaleway-applesilicon") }}
---
# Cluster API infrastructure provider for Scaleway Apple Silicon Mac
# minis. Watches ScalewayAppleSiliconMachine CRs and reconciles them
# against Scaleway's API: orders the host, SSHes in, installs Tart +
# tart-kubelet, drops a kubeconfig, and loads the launchd job. The
# Mac mini joins the cluster as a real Node and starts handling Pods
# scheduled to it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
rules:
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources:
      - scalewayapplesiliconmachines
      - scalewayapplesiliconmachinetemplates
      - scalewayapplesiliconclusters
      - scalewayelasticmetalmachines
      - scalewayelasticmetalmachinetemplates
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources:
      - scalewayapplesiliconmachines/status
      - scalewayapplesiliconmachines/finalizers
      - scalewayapplesiliconclusters/status
      - scalewayelasticmetalmachines/status
      - scalewayelasticmetalmachines/finalizers
    verbs: [get, update, patch]
  - apiGroups: ["cluster.x-k8s.io"]
    resources: [machines, machinesets, machinedeployments, clusters]
    verbs: [get, list, watch]
  # The SASC reconciler marks the parent Cluster's
  # ControlPlaneInitialized condition True (externally-managed
  # control plane: Mac minis join an existing Hetzner cluster, so
  # there is no CAPI control-plane Machine that could ever set
  # this otherwise — the gate stays False forever and CAPI core
  # never creates ScalewayAppleSiliconMachines). The condition
  # lives under `clusters/status`, so we need patch there too.
  - apiGroups: ["cluster.x-k8s.io"]
    resources: [clusters/status]
    verbs: [get, update, patch]
  - apiGroups: [""]
    # `delete` is needed at Machine teardown so the Node object the
    # tart-kubelet registered doesn't linger as NotReady after the
    # host is released back to Scaleway (the kubelet can't deregister
    # itself once the VM is gone).
    resources: [nodes]
    # `patch` lets the Instance reconciler stamp the foreign providerID
    # (so CAPI links Machine<->Node) and the dynamic tuist.dev/pn-ipv4 label.
    verbs: [get, list, watch, patch, delete]
  - apiGroups: [""]
    # The operator owns four Secret families in its own namespace:
    #   - <fleet>-ssh: per-fleet Ed25519 keypair, generated once
    #   - <machine>-bootstrap: per-machine sudo password +
    #     SSH username + TOFU host fingerprint
    #   - tart-kubelet-<machine>-token: per-machine kubelet auth token,
    #     populated by k8s once it sees the SA annotation
    # Plus bootstrap-token-<id> in kube-system. Other Secrets (cluster
    # Secret holding Scaleway creds) are watched read-only.
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    # Per-machine kubelet identity. Manager.EnsureNodeIdentity creates
    # one ServiceAccount per Mac mini in the operator's namespace and
    # binds it to the chart's tart-kubelet ClusterRole.
    resources: [serviceaccounts]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["rbac.authorization.k8s.io"]
    # Per-machine binding referencing the chart's tart-kubelet
    # ClusterRole. We bind, never modify the role itself; the chart
    # owns the role definition centrally.
    resources: [clusterrolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["rbac.authorization.k8s.io"]
    # `bind` verb on the two ClusterRoles the operator binds node identities to:
    # the chart's tart-kubelet role (the macOS shim) and the built-in system:node
    # (the Linux kura nodes). k8s's privilege-escalation rule otherwise blocks the
    # operator's SA from creating a ClusterRoleBinding to a role whose permissions
    # it doesn't hold itself (Pod read, Node create, ...). The `bind` meta-verb is
    # the documented escape hatch for this controller-creates-binding pattern;
    # scoped to these roles by name so it can't bind to anything broader.
    resources: [clusterroles]
    resourceNames:
      - {{ include "tuist.componentName" (dict "root" . "component" "tart-kubelet") }}
      - system:node
    verbs: [bind]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    # Operator boot-time auto-discovery reads kube-public/cluster-info
    # to learn the cluster's external API server URL (the value Mac
    # minis dial when joining as Nodes). kubeadm clusters expose
    # cluster-info to system:authenticated by default via
    # system:public-info-viewer, but Tuist-managed Hetzner clusters
    # don't ship that binding, so we grant the operator's SA explicit
    # read on the single ConfigMap by name.
    resources: [configmaps]
    resourceNames: [cluster-info]
    verbs: [get]
{{- if .Values.macosFleet.tailscaleEgress.enabled }}
---
# Namespaced Role + RoleBinding granting the operator's SA the
# ability to maintain one ExternalName Service per Mac mini in the
# tailscale-operator namespace. Scoped to that one namespace (rather
# than baked into the cluster-wide role) so a compromised operator
# can't materialise Services anywhere else in the cluster. Same
# pattern as the fleet-spread Role below.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-tailscale-egress
  namespace: {{ .Values.macosFleet.tailscaleEgress.namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
rules:
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-tailscale-egress
  namespace: {{ .Values.macosFleet.tailscaleEgress.namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-tailscale-egress
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.xcresultProcessor.enabled }}
---
# Namespaced Role for the fleet-spread controller's one operation:
# patching the xcresult-processor Deployment's pod-template
# annotation to roll a new ReplicaSet on fleet-shape change. Done
# as a Role (not a ClusterRole rule with resourceNames) because
# RBAC's resourceNames matches across all namespaces — a
# ClusterRole granting `get,patch` on `deployments/xcresult-
# processor` would let the operator patch any same-named Deployment
# anywhere in the cluster, not just the one in this release. A
# namespace-scoped Role caps the blast radius at the release
# namespace where the operator actually needs to operate.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-fleet-spread
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
rules:
  - apiGroups: ["apps"]
    resources: [deployments]
    resourceNames:
      - {{ include "tuist.componentName" (dict "root" . "component" "xcresult-processor") }}
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-fleet-spread
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-fleet-spread
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
# Namespaced Role granting the operator's SA read on the single
# kube-system/kube-dns Service. The Linux self-join reads its
# ClusterIP (discoverClusterDNS) to set the kubelet's clusterDNS, so
# cache pods resolve in-cluster DNS for the peer mesh. Scoped to
# kube-system as a Role rather than a ClusterRole with
# resourceNames (which would match a kube-dns Service in any
# namespace); read via the uncached APIReader since the manager's
# Services cache is scoped to the egress namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-cluster-dns
  namespace: kube-system
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
rules:
  - apiGroups: [""]
    resources: [services]
    resourceNames: [kube-dns]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-cluster-dns
  namespace: kube-system
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-cluster-dns
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
spec:
  # 2 replicas for HA via leader election (controller-runtime's
  # built-in Lease-based mechanism — only one replica reconciles at
  # a time, the other waits for failover).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "capi-scaleway-applesilicon") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "capi-scaleway-applesilicon") | nindent 8 }}
    spec:
      serviceAccountName: {{ $name }}
      containers:
        - name: manager
          image: "{{ .Values.macosFleet.image.repository }}:{{ .Values.macosFleet.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.macosFleet.image.pullPolicy }}
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --secrets-namespace={{ .Release.Namespace }}
            {{- with .Values.macosFleet.apiServerURL }}
            - --api-server-url={{ . }}
            {{- end }}
            - --node-identity-cluster-role={{ include "tuist.componentName" (dict "root" . "component" "tart-kubelet") }}
            - --tartkubelet-host-cpu={{ .Values.macosFleet.tartKubelet.hostCPU | default 8 }}
            - --tartkubelet-host-memory-mb={{ .Values.macosFleet.tartKubelet.hostMemoryMB | default 16384 }}
            - --tartkubelet-max-pods={{ .Values.macosFleet.tartKubelet.maxPods | default 3 }}
            {{- if .Values.macosFleet.tailscale.enabled }}
            # Tailscale + node_exporter artifact paths. Both are
            # baked into the operator image at the Dockerfile-pinned
            # versions (TAILSCALE_VERSION / NODE_EXPORTER_VERSION).
            # When the chart's macosFleet.tailscale.enabled is off,
            # both flags stay empty and the bootstrap steps
            # short-circuit.
            - --tailscale-binaries-path=/opt/tailscale/tailscale-darwin-arm64.tar.gz
            - --node-exporter-binary-path=/opt/node-exporter/node_exporter-darwin-arm64
            # The bootstrap reads this Secret per Machine reconcile
            # (controller-runtime cache hit, no API round-trip) so a
            # rotated key takes effect on the next reconcile without
            # the operator needing to restart.
            - --tailscale-auth-key-secret-name={{ .Values.macosFleet.tailscale.secretName | default (include "tuist.componentName" (dict "root" . "component" "capi-scaleway-applesilicon-tailscale")) }}
            {{- with .Values.macosFleet.tailscale.tags }}
            # Per-env ACL tags every Mac mini advertises at
            # `tailscale up` time. Set in per-env values to one of
            # `tag:tuist-macmini-{staging,canary,production}`. The
            # auth key's tag binding must include this tag (set when
            # the key is generated in the Tailscale admin console),
            # and the tag must be declared in
            # infra/tailscale/acls.json's tagOwners block.
            - --tailscale-tags={{ join "," . }}
            {{- end }}
            {{- if .Values.macosFleet.tailscale.acceptRoutes }}
            # Install the subnet routes this env's cluster-side
            # Connector advertises into the tailnet (the cluster's
            # Service CIDR — see infra/helm/tailscale-operator's
            # per-env values). Host routes are VM routes (vmnet NATs
            # VM egress through the host routing table), so this is
            # the route half of the macOS runner-cache path; the
            # firewall carve-out below is the policy half.
            - --tailscale-accept-routes=true
            {{- end }}
            {{- end }}
            {{- with .Values.macosFleet.vmClusterEgress.kuraServiceCIDR }}
            # Punch the runner-cache carve-out through the VM egress
            # firewall: Tart VMs may reach the cluster's Service CIDR
            # on the Kura cache ports (4000 HTTP / 50051 gRPC),
            # mirroring the Linux runner namespace's NetworkPolicy
            # egress rule. Source of truth for the CIDR:
            # infra/k8s/clusters/cluster-<env>.yaml
            # (.spec.clusterNetwork.services).
            - --vm-kura-egress-cidr={{ . }}
            {{- end }}
            {{- with .Values.macosFleet.vmClusterEgress.clusterDNSIP }}
            # kube-dns ClusterIP, additionally reachable on :53 so the
            # runner VM's /etc/resolver entry resolves
            # `*.svc.cluster.local`. Verify with
            # `kubectl -n kube-system get svc kube-dns`.
            - --vm-cluster-dns-ip={{ . }}
            {{- end }}
            {{- with .Values.macosFleet.vmCachePrivateNetwork.id }}
            # Scaleway Private Network carrying the kura runner-cache
            # NodePort endpoints. The operator attaches every mini,
            # resolves the per-host VLAN, and bootstrap materializes
            # the VLAN interface + VM egress pass + NAT — the data
            # plane dispatch's node-port cache_endpoint_url rides.
            - --vm-cache-pn-id={{ . }}
            {{- end }}
            {{- with .Values.macosFleet.vmCachePrivateNetwork.cidr }}
            - --vm-cache-pn-cidr={{ . }}
            {{- end }}
            {{- if .Values.xcresultProcessor.enabled }}
            # Auto-roll the xcresult-processor Deployment whenever the
            # set of Ready Mac minis changes, so Pods spread across new
            # hosts without a manual `kubectl rollout restart`. The
            # Deployment's existing topologySpreadConstraints handle
            # the placement; this just forces a new ReplicaSet on
            # fleet-shape change. See controllers/fleetspread_controller.go.
            - --fleet-spread-deployment={{ include "tuist.componentName" (dict "root" . "component" "xcresult-processor") }}
            - --fleet-spread-namespace={{ .Release.Namespace }}
            {{- end }}
            {{- if .Values.macosFleet.tailscaleEgress.enabled }}
            # Materialise one ExternalName Service per Mac mini in
            # the tailscale-operator namespace so cluster Pods
            # (alloy-metrics) can scrape the host at its MagicDNS
            # FQDN. The ProxyGroup the Services reference is
            # rendered by the tailscale-operator wrapper chart
            # (infra/helm/tailscale-operator/templates/macmini-egress.yaml).
            - --tailscale-egress-proxy-group={{ .Values.macosFleet.tailscaleEgress.proxyGroup }}
            - --tailscale-egress-namespace={{ .Values.macosFleet.tailscaleEgress.namespace }}
            - --tailscale-egress-magicdns-suffix={{ required "macosFleet.tailscaleEgress.magicDNSSuffix is required when tailscaleEgress.enabled" .Values.macosFleet.tailscaleEgress.magicDNSSuffix }}
            {{- end }}
            {{- if .Values.macosFleet.adoptPoolPrefix }}
            # Orphan-reclaim sweep + delete-path pool-prefix fallback.
            # Pool prefix and swept zones are derived from the fleet
            # config (the sweep also unions in every live CR's zone at
            # runtime); the claimed-name prefix is the chart name. The
            # sweep is report-only unless orphanReclaim.activeReclaim is
            # set. See controllers/orphan_reclaimer.go.
            - --default-adopt-pool-prefix={{ .Values.macosFleet.adoptPoolPrefix }}
            - --orphan-reclaim-zones={{ list (.Values.macosFleet.machine.zone | default "fr-par-1") (.Values.runnersFleet.machine.zone | default "fr-par-1") (.Values.buildersFleet.machine.zone | default "fr-par-1") | uniq | join "," }}
            {{- if .Values.macosFleet.orphanReclaim.activeReclaim }}
            - --orphan-reclaim-claim-name-prefix={{ include "tuist.fullname" . }}-
            {{- end }}
            {{- end }}
          env:
            # Scaleway credentials. ESO syncs them from 1Password into
            # this Secret automatically (see
            # capi-scaleway-applesilicon-external-secrets.yaml). For
            # self-hosters not using ESO, override
            # `macosFleet.scaleway.secretName` to point at a Secret
            # they create themselves.
            - name: SCW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.macosFleet.scaleway.secretName | default $name }}
                  key: access-key
            - name: SCW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.macosFleet.scaleway.secretName | default $name }}
                  key: secret-key
            - name: SCW_DEFAULT_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.macosFleet.scaleway.secretName | default $name }}
                  key: project-id
          ports:
            - name: metrics
              containerPort: 8080
            - name: probe
              containerPort: 8081
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
{{- end }}
