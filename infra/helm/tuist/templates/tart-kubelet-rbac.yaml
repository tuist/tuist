{{- if .Values.macosFleet.enabled }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "tart-kubelet") }}
{{- /*
Cluster credentials each Mac mini's tart-kubelet authenticates with.

One ServiceAccount is shared across the fleet (simpler ops; less strong
tenant isolation than per-Node SAs). The CAPI provider builds a
kubeconfig referencing the linked token Secret + the configured API
server URL when it bootstraps each host.

Per-Node SAs (or TLS bootstrap+CSR like upstream kubelet) become
important when customer Pods land on these hosts as part of the
runners product. Tracked separately.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: tart-kubelet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: tart-kubelet
rules:
  # Manage the Node object this kubelet registers itself as.
  - apiGroups: [""]
    resources: [nodes, nodes/status]
    verbs: [get, list, watch, create, update, patch]
  # Watch + status-update Pods scheduled here.
  - apiGroups: [""]
    resources: [pods, pods/status]
    verbs: [get, list, watch, update, patch]
  # Resolve `valueFrom` / `envFrom` references in Pod env, exactly the
  # way a real kubelet does.
  - apiGroups: [""]
    resources: [secrets, configmaps]
    verbs: [get, list, watch]
  # Emit Events on Pod failures so `kubectl describe pod` shows them.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: tart-kubelet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
# Long-lived ServiceAccount token. Annotated so k8s populates `data.token`
# + `data.ca.crt` automatically; the CAPI provider reads it on each
# bootstrap to build a self-contained kubeconfig for the Mac mini.
#
# Long-lived tokens are deprecated in favor of TokenRequest API; we
# accept the trade-off here because tart-kubelet boots from disk and
# can't refresh tokens via downward API. Rotation is a manual operation
# until per-Node TLS bootstrap lands.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: tart-kubelet
  annotations:
    kubernetes.io/service-account.name: {{ $name }}
    "helm.sh/resource-policy": keep
type: kubernetes.io/service-account-token
{{- end }}
