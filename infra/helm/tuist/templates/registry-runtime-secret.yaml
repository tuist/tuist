{{- if and .Values.registry.enabled (not .Values.registry.managedSecrets) }}
{{- $secretName := .Values.registry.runtimeSecretName | default (include "tuist.componentName" (dict "root" . "component" "registry-runtime")) -}}
{{- $s3RegistryBucket := .Values.registry.inlineSecrets.s3RegistryBucket | default (include "tuist.objectStorageBucketRegistry" .) -}}
{{- $s3Endpoint := .Values.registry.s3.endpoint | default (include "tuist.objectStorageEndpoint" .) -}}
{{- $s3Host := .Values.registry.inlineSecrets.s3Host | default "" -}}
{{- $s3AccessKeyId := .Values.registry.inlineSecrets.s3AccessKeyId | default (include "tuist.objectStorageAccessKey" .) -}}
{{- $s3SecretAccessKey := .Values.registry.inlineSecrets.s3SecretAccessKey | default (include "tuist.objectStorageSecretKey" .) -}}
{{- $s3Region := .Values.registry.inlineSecrets.s3Region | default (include "tuist.objectStorageRegion" .) -}}
{{- if and (eq $s3Endpoint "") (eq $s3Host "") -}}
{{- fail "registry.s3.endpoint, registry.inlineSecrets.s3Host, or objectStorage endpoint is required when registry.managedSecrets is false" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
type: Opaque
stringData:
  SENTRY_DSN_REGISTRY: {{ .Values.registry.inlineSecrets.sentryDsn | default "" | quote }}
  S3_REGISTRY_BUCKET: {{ required "registry.inlineSecrets.s3RegistryBucket or objectStorage registry bucket is required when registry.managedSecrets is false" $s3RegistryBucket | quote }}
  S3_ENDPOINT: {{ $s3Endpoint | quote }}
  S3_HOST: {{ $s3Host | quote }}
  S3_ACCESS_KEY_ID: {{ required "registry.inlineSecrets.s3AccessKeyId or objectStorage access key is required when registry.managedSecrets is false" $s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ required "registry.inlineSecrets.s3SecretAccessKey or objectStorage secret key is required when registry.managedSecrets is false" $s3SecretAccessKey | quote }}
  S3_REGION: {{ required "registry.inlineSecrets.s3Region or objectStorage region is required when registry.managedSecrets is false" $s3Region | quote }}
{{- end }}
