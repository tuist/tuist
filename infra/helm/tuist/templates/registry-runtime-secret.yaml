{{- if and .Values.registry.enabled (not .Values.registry.managedSecrets) }}
{{- $secretName := .Values.registry.runtimeSecretName | default (include "tuist.componentName" (dict "root" . "component" "registry-runtime")) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
type: Opaque
stringData:
  SENTRY_DSN_REGISTRY: {{ .Values.registry.inlineSecrets.sentryDsn | default "" | quote }}
  S3_REGISTRY_BUCKET: {{ required "registry.inlineSecrets.s3RegistryBucket is required when registry.managedSecrets is false" .Values.registry.inlineSecrets.s3RegistryBucket | quote }}
  S3_HOST: {{ required "registry.inlineSecrets.s3Host is required when registry.managedSecrets is false" .Values.registry.inlineSecrets.s3Host | quote }}
  S3_ACCESS_KEY_ID: {{ required "registry.inlineSecrets.s3AccessKeyId is required when registry.managedSecrets is false" .Values.registry.inlineSecrets.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ required "registry.inlineSecrets.s3SecretAccessKey is required when registry.managedSecrets is false" .Values.registry.inlineSecrets.s3SecretAccessKey | quote }}
  S3_REGION: {{ required "registry.inlineSecrets.s3Region is required when registry.managedSecrets is false" .Values.registry.inlineSecrets.s3Region | quote }}
{{- end }}
