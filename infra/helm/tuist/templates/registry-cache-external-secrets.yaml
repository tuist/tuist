{{- if and .Values.registryCache.enabled .Values.registryCache.proxy.auth.enabled .Values.registryCache.proxy.auth.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "registry-cache-upstream") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry-cache
spec:
  refreshInterval: {{ .Values.registryCache.proxy.auth.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.registryCache.proxy.auth.externalSecret.storeRef.name | default "onepassword" }}
    kind: {{ .Values.registryCache.proxy.auth.externalSecret.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "registry-cache-upstream") }}
    creationPolicy: Owner
    # `| trim` for the same reason object-storage does it: a 1P paste
    # appends a newline, and a Docker Hub token with a trailing \n fails
    # auth at pull time.
    template:
      engineVersion: v2
      data:
        username: "{{ `{{ .username | trim }}` }}"
        password: "{{ `{{ .password | trim }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: "{{ .Values.registryCache.proxy.auth.externalSecret.username.item | default "DOCKER_HUB_CREDENTIALS" }}/{{ .Values.registryCache.proxy.auth.externalSecret.username.field | default "username" }}"
    - secretKey: password
      remoteRef:
        key: "{{ .Values.registryCache.proxy.auth.externalSecret.password.item | default "DOCKER_HUB_CREDENTIALS" }}/{{ .Values.registryCache.proxy.auth.externalSecret.password.field | default "password" }}"
{{- end }}
