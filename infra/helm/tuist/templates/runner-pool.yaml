{{- if .Values.runnersFleet.enabled }}
{{- $namespace := .Values.runnersFleet.namespace | default "tuist-runners" }}
{{- $fleetName := include "tuist.runnersFleetName" . }}
{{- $image := required "runnersFleet.runnerImage required when runnersFleet.enabled" .Values.runnersFleet.runnerImage }}
{{- $podCPU := .Values.runnersFleet.pod.cpuMilli | default 8000 }}
{{- $podMem := .Values.runnersFleet.pod.memoryMB | default 14336 }}
{{- /*
The cluster's runner fleet, expressed as a RunnerPool CR. There's
exactly one fleet for v1; multi-image lands as a values-list shape
(`runnersFleet.fleets[]`) that renders one CR per entry.

`spec.minWarm` equals the fleet's host count so every Mac mini
always carries either a polling warm Pod or a Pod running a
customer job. Apple's SLA permits up to two VMs per host; for v1
we run one VM per host to keep capacity reasoning simple and
absorb tart/host overhead — a future knob can raise this when
the operational story for two-VMs-per-host is in place.

Per-customer concurrency is `accounts.runner_max_concurrent` in
Postgres; it doesn't appear in K8s. The dispatch endpoint reads
it at claim time, claims an eligible row from
`runner_dispatch_queue`, stamps the polling Pod with owner
labels, and mints a JIT registration scoped to that customer.
*/}}
apiVersion: tuist.dev/v1alpha1
kind: RunnerPool
metadata:
  name: {{ $fleetName | quote }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: runners-controller
spec:
  labels: []
  minWarm: {{ .Values.runnersFleet.replicas | default 0 }}
  image: {{ $image | quote }}
  fleetSelector: {{ $fleetName | quote }}
  podCPUMilli: {{ $podCPU }}
  podMemoryMB: {{ $podMem }}
{{- end }}
