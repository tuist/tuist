{{- if .Values.runnersFleet.enabled }}
{{- $namespace := .Values.runnersFleet.namespace | default "tuist-runners" }}
{{- $hostFleetName := include "tuist.runnersFleetName" . }}
{{- $pools := .Values.runnersFleet.pools | default list }}
{{- if not $pools }}
  {{- fail "runnersFleet.pools must contain at least one entry when runnersFleet.enabled is true" }}
{{- end }}
{{- $labels := include "tuist.labels" . }}
{{- $defaultRunnerLabels := list "self-hosted" "macOS" "ARM64" }}
{{- /*
RunnerPool CRs — one per entry in `runnersFleet.pools`. Each
pool is a runner image variant (Xcode version, base OS,
toolchain bundle, etc.). Customers route to a pool by putting
its `spec.dispatchLabel` in `runs-on`; the Tuist server's
webhook handler matches `workflow_job.labels` against every
pool's `dispatchLabel`. The dispatch endpoint reads the pool a
caller belongs to from the polling SA's `tuist.dev/runner-pool`
label and uses that pool's `dispatchLabel` in the JIT mint.

Together with one VM per host (v1 design choice — Apple's SLA
permits up to two), sum of `replicas` across pools is the
cluster's max concurrent customer jobs. The chart doesn't
validate that sum stays within `runnersFleet.hostCount` — an
overcommit shows up as unscheduled Pods rather than a deploy
failure.

All pools share the same node fleet (`FleetSelector` = the
helm-rendered CAPI MachineDeployment name) so Pods bin-pack on
whichever Mac mini has free capacity. Splitting a pool onto its
own dedicated host fleet is a future shape (add a second
MachineDeployment, set the pool's `fleetSelector` to its name).
*/}}
{{- range $pool := $pools }}
{{- $name := required "runnersFleet.pools[].name required" $pool.name }}
{{- $image := required (printf "runnersFleet.pools[%s].runnerImage required" $name) $pool.runnerImage }}
{{- $dispatchLabel := required (printf "runnersFleet.pools[%s].dispatchLabel required" $name) $pool.dispatchLabel }}
{{- $replicas := $pool.replicas | default 0 }}
{{- $podCPU := dig "pod" "cpuMilli" 8000 $pool }}
{{- $podMem := dig "pod" "memoryMB" 14336 $pool }}
{{- $runnerLabels := $pool.runnerLabels | default $defaultRunnerLabels }}
{{- $autoscaling := $pool.autoscaling }}
{{- $poolName := printf "%s-%s" (include "tuist.componentName" (dict "root" $ "component" "runner-pool")) $name }}
---
apiVersion: tuist.dev/v1alpha1
kind: RunnerPool
metadata:
  name: {{ $poolName | quote }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: runners-controller
    tuist.dev/runner-pool: {{ $poolName | quote }}
spec:
  labels: []
  replicas: {{ $replicas }}
  image: {{ $image | quote }}
  fleetSelector: {{ $hostFleetName | quote }}
  dispatchLabel: {{ $dispatchLabel | quote }}
  runnerLabels:
    {{- range $runnerLabels }}
    - {{ . | quote }}
    {{- end }}
  podCPUMilli: {{ $podCPU }}
  podMemoryMB: {{ $podMem }}
  {{- if $autoscaling }}
  autoscaling:
    enabled: {{ dig "enabled" false $autoscaling }}
    minWarmPoolFloor: {{ dig "minWarmPoolFloor" 1 $autoscaling }}
    maxReplicas: {{ dig "maxReplicas" 0 $autoscaling }}
    scaleDownCooldownSeconds: {{ dig "scaleDownCooldownSeconds" 300 $autoscaling }}
  {{- end }}
{{- end }}
{{- end }}
