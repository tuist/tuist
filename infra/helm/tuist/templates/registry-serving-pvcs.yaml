{{- if .Values.registryServing.enabled }}
{{- $root := . }}
{{- range $region := .Values.registryServing.regions }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tuist.componentName" (dict "root" $root "component" (printf "registry-serving-%s" $region.name)) }}
  labels:
    {{- include "tuist.labels" $root | nindent 4 }}
    app.kubernetes.io/component: registry-serving
    tuist.dev/registry-region: {{ $region.name | quote }}
spec:
  {{- $regionStorage := default (dict) $region.storage }}
  accessModes:
    {{- toYaml (default (list "ReadWriteOnce") (get $regionStorage "accessModes")) | nindent 4 }}
  resources:
    requests:
      storage: {{ default $root.Values.registryServing.storage.size (get $regionStorage "size") }}
  {{- with (default $root.Values.registryServing.storage.storageClassName (get $regionStorage "storageClassName")) }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
