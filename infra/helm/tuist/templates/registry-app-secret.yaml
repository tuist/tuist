{{- if .Values.registry.enabled }}
{{- $secretName := include "tuist.componentName" (dict "root" . "component" "registry-app") -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if and $existingSecret $existingSecret.data }}
  {{- $existingData = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
type: Opaque
stringData:
  secret-key-base: {{ .Values.registry.secretKeyBase | default (get $existingData "secret-key-base" | default "" | b64dec) | default (randAlphaNum 64) | quote }}
  release-cookie: {{ .Values.registry.releaseCookie | default (get $existingData "release-cookie" | default "" | b64dec) | default (randAlphaNum 64) | quote }}
{{- end }}
