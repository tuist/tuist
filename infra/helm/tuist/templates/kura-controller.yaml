{{- if .Values.kuraController.enabled }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "kura-controller") }}
{{- $namespace := .Values.kuraController.namespace }}
{{- $kuraSharedSecretName := "kura-shared-secrets" }}
{{- $kuraIntrospection := .Values.kuraController.sharedSecrets.kuraIntrospection }}
{{- $kuraSharedSecretsExternalSecret := .Values.kuraController.sharedSecrets.externalSecret }}
{{- $kuraIntrospectionClientId := $kuraIntrospection.clientId | default "" }}
{{- $kuraIntrospectionClientSecret := $kuraIntrospection.clientSecret | default "" }}
{{- if and $kuraIntrospection.enabled (eq $kuraIntrospectionClientId "") (not $kuraSharedSecretsExternalSecret.enabled) }}
{{- fail "kuraController.sharedSecrets.kuraIntrospection.clientId is required when kuraIntrospection is enabled without sharedSecrets.externalSecret.enabled" }}
{{- end }}
{{- if and $kuraIntrospection.enabled (eq $kuraIntrospectionClientSecret "") (not $kuraSharedSecretsExternalSecret.enabled) }}
{{- fail "kuraController.sharedSecrets.kuraIntrospection.clientSecret is required when kuraIntrospection is enabled without sharedSecrets.externalSecret.enabled" }}
{{- end }}
{{- $kuraIntrospectionSecretData := dict }}
{{- if $kuraIntrospection.enabled }}
{{- if ne $kuraIntrospectionClientId "" }}
{{- $_ := set $kuraIntrospectionSecretData "KURA_CONTROL_PLANE_CLIENT_ID" $kuraIntrospectionClientId }}
{{- end }}
{{- if ne $kuraIntrospectionClientSecret "" }}
{{- $_ := set $kuraIntrospectionSecretData "KURA_CONTROL_PLANE_CLIENT_SECRET" $kuraIntrospectionClientSecret }}
{{- end }}
{{- end }}
{{- $serverRoleName := printf "%s-server" $name }}
{{- $imageTag := .Values.kuraController.image.tag }}
{{- $tlsClusterIssuer := .Values.kuraController.tlsClusterIssuer | default .Values.kuraController.grpcClusterIssuer }}
{{- if not $imageTag }}
{{- fail "kuraController.image.tag is required — running the controller on :latest silently drifts and surfaces in production after the next push to ghcr." }}
{{- end }}
{{- if and .Values.kuraController.tlsClusterIssuer .Values.kuraController.grpcClusterIssuer (ne .Values.kuraController.tlsClusterIssuer .Values.kuraController.grpcClusterIssuer) }}
{{- fail "kuraController.tlsClusterIssuer and deprecated kuraController.grpcClusterIssuer cannot both be set to different values" }}
{{- end }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-controller
rules:
  - apiGroups: ["kura.tuist.dev"]
    resources: [kurainstances]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["kura.tuist.dev"]
    resources: [kurainstances/status, kurainstances/finalizers]
    verbs: [get, update, patch]
  - apiGroups: ["apps"]
    resources: [statefulsets, deployments, daemonsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, configmaps, secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["externaldns.k8s.io"]
    resources: [dnsendpoints]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  # delete: self-heal a wedged instance by recreating its StatefulSet and
  # dropping data PVCs that can never bind (storage-class drift on the immutable
  # volumeClaimTemplate, or a node-local volume orphaned by a reprovisioned
  # bare-metal fleet node). The cache is regenerable, so a fresh PVC is provisioned.
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, update, patch, delete]
  # read PVs to detect a data volume pinned (node affinity) to a node that no
  # longer exists — the reprovisioned-node orphan case above.
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["cert-manager.io"]
    resources: [certificates]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
# Nodes are cluster-scoped, so this can't live in the namespaced
# controller Role: the controller resolves the primary pod's node
# `tuist.dev/pn-ipv4` label into KuraInstance.status.nodeAddress for
# NodePort-exposed instances, and controller-runtime's cached client
# needs list+watch for the Node informer behind that get.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}-node-reads
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-controller
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}-node-reads
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}-node-reads
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $namespace }}
{{- if .Values.server.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $serverRoleName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
rules:
  - apiGroups: ["kura.tuist.dev"]
    resources: [kurainstances]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  # The server applies the per-account mesh peer-TLS Secret alongside the
  # KuraInstance when an account bridges into the managed mesh.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $serverRoleName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $serverRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tuist.componentServiceAccountName" (dict "root" . "component" "server") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura-controller
spec:
  replicas: {{ .Values.kuraController.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "kura-controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "kura-controller") | nindent 8 }}
    spec:
      serviceAccountName: {{ $name }}
      {{- with .Values.kuraController.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.kuraController.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.kuraController.image.pullPolicy }}
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --watch-namespace={{ $namespace }}
            {{- if $tlsClusterIssuer }}
            - --grpc-cluster-issuer={{ $tlsClusterIssuer }}
            {{- end }}
            {{- if .Values.kuraController.telemetry.otlpTracesEndpoint }}
            - --otlp-traces-endpoint={{ .Values.kuraController.telemetry.otlpTracesEndpoint }}
            {{- end }}
            - --deployment-environment={{ .Values.kuraController.telemetry.deploymentEnvironment | default "production" }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: probe
              containerPort: 8081
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.kuraController.resources | nindent 12 }}
{{- if .Values.kuraController.sharedSecrets.enabled }}
---
# Shared platform secrets for every Kura runtime pod in this cluster.
# The controller mounts this Secret via envFrom on the StatefulSet so
# the JWT verifier secret never has to live in the KuraInstance spec
# (anyone with list/watch on the CR could otherwise read forging
# material). Keys are populated either through ExternalSecret, Helm
# values, or by an out-of-band operator (sealed-secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: kura-shared-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura
{{- if .Values.kuraController.sharedSecrets.annotations }}
  annotations:
    {{- toYaml .Values.kuraController.sharedSecrets.annotations | nindent 4 }}
{{- end }}
type: Opaque
{{- $kuraSharedSecretData := deepCopy $kuraIntrospectionSecretData }}
{{- range $key, $value := .Values.kuraController.sharedSecrets.data }}
{{- $_ := set $kuraSharedSecretData $key $value }}
{{- end }}
{{- with $kuraSharedSecretData }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- if and .Values.server.enabled $kuraIntrospection.enabled (ne $namespace .Release.Namespace) }}
---
# Mirror only the Kura OAuth keys into the server namespace. Kubernetes
# Secrets are namespaced, and the server needs the same client credentials
# to serve Kura token introspection.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $kuraSharedSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura
type: Opaque
{{- with $kuraIntrospectionSecretData }}
stringData:
  {{- toYaml $kuraIntrospectionSecretData | nindent 2 }}
{{- end }}
{{- end }}
{{- if $kuraSharedSecretsExternalSecret.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $kuraSharedSecretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura
spec:
  refreshInterval: {{ $kuraSharedSecretsExternalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $kuraSharedSecretsExternalSecret.storeRef.name | default "onepassword" }}
    kind: {{ $kuraSharedSecretsExternalSecret.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $kuraSharedSecretName }}
    creationPolicy: Merge
    template:
      engineVersion: v2
      data:
        {{- if ne $kuraIntrospectionClientId "" }}
        KURA_CONTROL_PLANE_CLIENT_ID: {{ $kuraIntrospectionClientId | quote }}
        {{- else }}
        KURA_CONTROL_PLANE_CLIENT_ID: "{{ `{{ .kura_introspection_client_id | trim }}` }}"
        {{- end }}
        KURA_CONTROL_PLANE_CLIENT_SECRET: "{{ `{{ .kura_introspection_client_secret | trim }}` }}"
  data:
    {{- if eq $kuraIntrospectionClientId "" }}
    - secretKey: kura_introspection_client_id
      remoteRef:
        key: "{{ required "kuraController.sharedSecrets.externalSecret.item is required when externalSecret.enabled is true" $kuraSharedSecretsExternalSecret.item }}/{{ $kuraSharedSecretsExternalSecret.fields.introspectionClientId | default "KURA_CONTROL_PLANE_CLIENT_ID" }}"
    {{- end }}
    - secretKey: kura_introspection_client_secret
      remoteRef:
        key: "{{ required "kuraController.sharedSecrets.externalSecret.item is required when externalSecret.enabled is true" $kuraSharedSecretsExternalSecret.item }}/{{ $kuraSharedSecretsExternalSecret.fields.introspectionClientSecret | default "KURA_CONTROL_PLANE_CLIENT_SECRET" }}"
{{- if and .Values.server.enabled $kuraIntrospection.enabled (ne $namespace .Release.Namespace) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $kuraSharedSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura
spec:
  refreshInterval: {{ $kuraSharedSecretsExternalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $kuraSharedSecretsExternalSecret.storeRef.name | default "onepassword" }}
    kind: {{ $kuraSharedSecretsExternalSecret.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $kuraSharedSecretName }}
    creationPolicy: Merge
    template:
      engineVersion: v2
      data:
        {{- if ne $kuraIntrospectionClientId "" }}
        KURA_CONTROL_PLANE_CLIENT_ID: {{ $kuraIntrospectionClientId | quote }}
        {{- else }}
        KURA_CONTROL_PLANE_CLIENT_ID: "{{ `{{ .kura_introspection_client_id | trim }}` }}"
        {{- end }}
        KURA_CONTROL_PLANE_CLIENT_SECRET: "{{ `{{ .kura_introspection_client_secret | trim }}` }}"
  data:
    {{- if eq $kuraIntrospectionClientId "" }}
    - secretKey: kura_introspection_client_id
      remoteRef:
        key: "{{ required "kuraController.sharedSecrets.externalSecret.item is required when externalSecret.enabled is true" $kuraSharedSecretsExternalSecret.item }}/{{ $kuraSharedSecretsExternalSecret.fields.introspectionClientId | default "KURA_CONTROL_PLANE_CLIENT_ID" }}"
    {{- end }}
    - secretKey: kura_introspection_client_secret
      remoteRef:
        key: "{{ required "kuraController.sharedSecrets.externalSecret.item is required when externalSecret.enabled is true" $kuraSharedSecretsExternalSecret.item }}/{{ $kuraSharedSecretsExternalSecret.fields.introspectionClientSecret | default "KURA_CONTROL_PLANE_CLIENT_SECRET" }}"
{{- end }}
{{- end }}
{{- if .Values.kuraController.sentry.externalSecret.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kura-sentry-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: kura
spec:
  refreshInterval: {{ .Values.kuraController.sentry.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.kuraController.sentry.externalSecret.storeRef.name | default "onepassword" }}
    kind: {{ .Values.kuraController.sentry.externalSecret.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: kura-shared-secrets
    creationPolicy: Merge
    template:
      engineVersion: v2
      data:
        KURA_SENTRY_DSN: "{{ `{{ .kura_sentry_dsn | trim }}` }}"
  data:
    - secretKey: kura_sentry_dsn
      remoteRef:
        key: "{{ required "kuraController.sentry.externalSecret.item is required when sentry externalSecret is enabled" .Values.kuraController.sentry.externalSecret.item }}/{{ .Values.kuraController.sentry.externalSecret.field | default "KURA_SENTRY_DSN" }}"
{{- end }}
{{- end }}

{{- end }}
