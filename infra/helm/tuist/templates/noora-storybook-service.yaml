{{- if .Values.nooraStorybook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "noora-storybook") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: noora-storybook
spec:
  type: {{ .Values.nooraStorybook.service.type }}
  selector:
    {{- include "tuist.componentLabels" (dict "root" . "component" "noora-storybook") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.nooraStorybook.service.port }}
      targetPort: {{ .Values.nooraStorybook.service.targetPort }}
{{- end }}
