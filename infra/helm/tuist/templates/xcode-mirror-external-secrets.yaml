{{- if and .Values.server.enabled .Values.server.xcodeMirror.managedSecrets }}
# Syncs the Tuist.XcodeMirror worker's credentials from 1Password
# into a dedicated k8s Secret managed by ESO. The Server Deployment
# references this Secret as env vars (TUIST_XCODE_MIRROR_*) which
# the Elixir worker reads via Tuist.Environment.
#
# Items in 1Password (in the tuist-hosted vault):
#   Tuist Xcode Mirror Session             ← multi-field
#     session_cookies (concealed) — JSON cookie jar; refreshed
#       by `mise run xcode-mirror:mint-session`. Contents look
#       like `{"myacinfo": "...", "dqsid": "...", ...}`.
#     apple_id — the Apple ID the cookies belong to. Used by
#       the mint-session task to bootstrap without an arg.
#   GHCR_TUIST_BOT                          ← multi-field
#     username — `tuist-bot`
#     token (concealed) — PAT with `write:packages` on the tuist org.
#       Shared with other workflows that push to ghcr.io/tuist/*;
#       not a per-worker credential.
#
# Same separate-Secret pattern github-external-secrets uses: a
# Merge into app-secrets would get clobbered by helm upgrade until
# the next ESO reconcile, briefly leaving the worker without auth.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "xcode-mirror-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.server.xcodeMirror.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.server.xcodeMirror.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.server.xcodeMirror.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "xcode-mirror-external-secrets") }}
    creationPolicy: Owner
    # Strip trailing whitespace — the 1P web UI appends \n on paste,
    # which would break JSON parsing for `session_cookies` and the
    # GHCR token auth header.
    template:
      engineVersion: v2
      data:
        session-cookies: "{{ `{{ .session_cookies | trim }}` }}"
        ghcr-username: "{{ `{{ .ghcr_username | trim }}` }}"
        ghcr-token: "{{ `{{ .ghcr_token | trim }}` }}"
  data:
    - secretKey: session_cookies
      remoteRef:
        key: "{{ .Values.server.xcodeMirror.externalSecrets.session.item | default "Tuist Xcode Mirror Session" }}/{{ .Values.server.xcodeMirror.externalSecrets.session.fields.sessionCookies | default "session_cookies" }}"
    - secretKey: ghcr_username
      remoteRef:
        key: "{{ .Values.server.xcodeMirror.externalSecrets.ghcr.item | default "GHCR_TUIST_BOT" }}/{{ .Values.server.xcodeMirror.externalSecrets.ghcr.fields.username | default "username" }}"
    - secretKey: ghcr_token
      remoteRef:
        key: "{{ .Values.server.xcodeMirror.externalSecrets.ghcr.item | default "GHCR_TUIST_BOT" }}/{{ .Values.server.xcodeMirror.externalSecrets.ghcr.fields.token | default "token" }}"
{{- end }}
