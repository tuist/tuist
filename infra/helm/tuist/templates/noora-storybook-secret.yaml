{{- if .Values.nooraStorybook.enabled }}
{{- $secretName := include "tuist.componentName" (dict "root" . "component" "noora-storybook-secret") }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingData := dict }}
{{- if and $existingSecret $existingSecret.data }}
  {{- $existingData = $existingSecret.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: noora-storybook
type: Opaque
stringData:
  secret-key-base: {{ .Values.nooraStorybook.secretKeyBase | default (get $existingData "secret-key-base" | default "" | b64dec) | default (randAlphaNum 64) | quote }}
{{- end }}
