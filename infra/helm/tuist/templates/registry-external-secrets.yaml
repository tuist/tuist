{{- if and .Values.registry.enabled .Values.registry.managedSecrets }}
{{- $secretName := .Values.registry.runtimeSecretName | default (include "tuist.componentName" (dict "root" . "component" "registry-runtime")) -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: {{ .Values.registry.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.registry.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.registry.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SENTRY_DSN_REGISTRY: '{{ `{{ (index . "sentry_dsn" | default (index . "SENTRY_DSN_REGISTRY") | default "") | trim }}` }}'
        S3_REGISTRY_BUCKET: "{{ `{{ .s3_registry_bucket | trim }}` }}"
        S3_HOST: "{{ `{{ .s3_host | trim }}` }}"
        S3_ACCESS_KEY_ID: "{{ `{{ .s3_access_key_id | trim }}` }}"
        S3_SECRET_ACCESS_KEY: "{{ `{{ .s3_secret_access_key | trim }}` }}"
        S3_REGION: "{{ `{{ .s3_region | trim }}` }}"
  data:
    {{- with .Values.registry.externalSecrets.fields.sentryDsn }}
    - secretKey: sentry_dsn
      remoteRef:
        key: {{ printf "%s/%s" $.Values.registry.externalSecrets.item . | quote }}
    {{- end }}
    - secretKey: s3_registry_bucket
      remoteRef:
        key: "{{ .Values.registry.externalSecrets.item }}/{{ .Values.registry.externalSecrets.fields.s3RegistryBucket }}"
    - secretKey: s3_host
      remoteRef:
        key: "{{ .Values.registry.externalSecrets.item }}/{{ .Values.registry.externalSecrets.fields.s3Host }}"
    - secretKey: s3_access_key_id
      remoteRef:
        key: "{{ .Values.registry.externalSecrets.item }}/{{ .Values.registry.externalSecrets.fields.s3AccessKeyId }}"
    - secretKey: s3_secret_access_key
      remoteRef:
        key: "{{ .Values.registry.externalSecrets.item }}/{{ .Values.registry.externalSecrets.fields.s3SecretAccessKey }}"
    - secretKey: s3_region
      remoteRef:
        key: "{{ .Values.registry.externalSecrets.item }}/{{ .Values.registry.externalSecrets.fields.s3Region }}"
  dataFrom:
    - extract:
        key: {{ .Values.registry.externalSecrets.item | quote }}
{{- end }}
