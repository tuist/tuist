{{- if and .Values.macosFleet.enabled .Values.macosFleet.tailscale.enabled .Values.macosFleet.tailscale.externalSecrets.enabled }}
{{- $name := include "tuist.componentName" (dict "root" . "component" "capi-scaleway-applesilicon-tailscale") }}
---
# Tailscale pre-auth key for the Mac mini fleet. The CAPI provider's
# bootstrap reads this Secret per Machine reconcile (via
# credentials.Manager.GetTailscaleAuthKey) and feeds the value to the
# bootstrap's `tailscale up`. Rotation: bump the 1Password item, ESO
# resyncs within `refreshInterval`, next Machine reconcile picks up
# the new key. Existing hosts keep their tailnet identity across
# rotations — the auth key only authenticates the *initial* join.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: capi-scaleway-applesilicon
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: {{ .Values.macosFleet.tailscale.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.macosFleet.tailscale.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.macosFleet.tailscale.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
  data:
    - secretKey: auth-key
      remoteRef:
        key: "{{ .Values.macosFleet.tailscale.externalSecrets.item }}/{{ .Values.macosFleet.tailscale.externalSecrets.fields.authKey | default "auth-key" }}"
{{- end }}
