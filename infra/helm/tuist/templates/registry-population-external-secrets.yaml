{{- if and .Values.registryPopulation.enabled .Values.registryPopulation.managedSecrets }}
# ESO syncs the GitHub PAT used by the registry sync workers and the
# `tuist_registry` Postgres role password from the configured store
# (1Password by default). The DATABASE_URL is composed from the password
# + the non-secret connection values under `registryPopulation.database`.
# Same shape as processor-external-secrets.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "registry-population-external-secrets") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry-population
spec:
  refreshInterval: {{ .Values.registryPopulation.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.registryPopulation.externalSecrets.storeRef.name | default "onepassword" }}
    kind: {{ .Values.registryPopulation.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "tuist.componentName" (dict "root" . "component" "registry-population-external-secrets") }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        registry-population-database-url: "postgres://{{ .Values.registryPopulation.database.username }}:{{ `{{ .databasePassword | urlquery }}` }}@{{ required "registryPopulation.database.host is required when registryPopulation.managedSecrets is true" .Values.registryPopulation.database.host }}:{{ .Values.registryPopulation.database.port }}/{{ .Values.registryPopulation.database.name }}{{- if .Values.registryPopulation.database.params }}?{{ .Values.registryPopulation.database.params }}{{- end }}"
        registry-github-token: "{{ `{{ .githubToken }}` }}"
  data:
    - secretKey: databasePassword
      remoteRef:
        key: "{{ .Values.registryPopulation.externalSecrets.databasePassword.item | default "REGISTRY_POPULATION_DATABASE_PASSWORD" }}/{{ .Values.registryPopulation.externalSecrets.databasePassword.field | default "password" }}"
    - secretKey: githubToken
      remoteRef:
        key: "{{ .Values.registryPopulation.externalSecrets.githubToken.item | default "REGISTRY_GITHUB_TOKEN" }}/{{ .Values.registryPopulation.externalSecrets.githubToken.field | default "password" }}"
{{- end }}
