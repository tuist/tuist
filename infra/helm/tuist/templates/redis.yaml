{{- if and .Values.redis.enabled (eq .Values.redis.mode "embedded") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "redis") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  selector:
    {{- include "tuist.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "redis") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  # Strategy: Recreate. The bucket data is ephemeral and the cluster only
  # tolerates one pod (no clustering, no persistence) — surging during
  # rollout would briefly bind two pods to the same Service IP.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "redis") | nindent 8 }}
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "tuist.podScheduling" . | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.redis.embedded.image.repository }}:{{ .Values.redis.embedded.image.tag }}"
          imagePullPolicy: {{ .Values.redis.embedded.image.pullPolicy }}
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.redis.embedded.resources | nindent 12 }}
{{- if .Values.redis.embedded.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "redis") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "redis") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "tuist.componentLabels" (dict "root" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
{{- end }}
{{- end }}
