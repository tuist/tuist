{{- if .Values.codebaseSearch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "codebase-search") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: codebase-search
spec:
  type: ClusterIP
  selector:
    {{- include "tuist.componentLabels" (dict "root" . "component" "codebase-search") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.codebaseSearch.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
