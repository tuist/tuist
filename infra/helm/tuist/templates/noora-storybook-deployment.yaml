{{- if .Values.nooraStorybook.enabled }}
{{- $host := .Values.nooraStorybook.host | default .Values.nooraStorybook.ingress.host -}}
{{- $phxHost := required "nooraStorybook.host or nooraStorybook.ingress.host is required when nooraStorybook.enabled is true" $host -}}
{{- $imageTag := required "nooraStorybook.image.tag is required when nooraStorybook.enabled is true" .Values.nooraStorybook.image.tag -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tuist.componentName" (dict "root" . "component" "noora-storybook") }}
  labels:
    {{- include "tuist.labels" . | nindent 4 }}
    app.kubernetes.io/component: noora-storybook
spec:
  replicas: {{ .Values.nooraStorybook.replicaCount }}
  selector:
    matchLabels:
      {{- include "tuist.componentLabels" (dict "root" . "component" "noora-storybook") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tuist.componentLabels" (dict "root" . "component" "noora-storybook") | nindent 8 }}
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.nooraStorybook.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nooraStorybook.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.nooraStorybook.terminationGracePeriodSeconds }}
      {{- include "tuist.podScheduling" . | nindent 6 }}
      {{- with .Values.nooraStorybook.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nooraStorybook.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nooraStorybook.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: noora-storybook
          image: "{{ .Values.nooraStorybook.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.nooraStorybook.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.nooraStorybook.service.targetPort }}
          env:
            - name: PHX_HOST
              value: {{ $phxHost | quote }}
            - name: PORT
              value: {{ printf "%v" .Values.nooraStorybook.service.targetPort | quote }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "tuist.componentName" (dict "root" . "component" "noora-storybook-secret") }}
                  key: secret-key-base
            {{- with .Values.nooraStorybook.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.nooraStorybook.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.nooraStorybook.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.nooraStorybook.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.nooraStorybook.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.nooraStorybook.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.nooraStorybook.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.nooraStorybook.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.nooraStorybook.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.nooraStorybook.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.nooraStorybook.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.nooraStorybook.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.nooraStorybook.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.nooraStorybook.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.nooraStorybook.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.nooraStorybook.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.nooraStorybook.probes.liveness.failureThreshold }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.nooraStorybook.resources | nindent 12 }}
{{- end }}
