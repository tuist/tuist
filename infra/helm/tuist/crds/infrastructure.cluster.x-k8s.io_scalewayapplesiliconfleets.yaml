kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: scalewayapplesiliconfleets.infrastructure.cluster.x-k8s.io
  labels:
    cluster.x-k8s.io/v1beta1: v1alpha1
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
      - cluster-api
    kind: ScalewayAppleSiliconFleet
    listKind: ScalewayAppleSiliconFleetList
    plural: scalewayapplesiliconfleets
    shortNames:
      - sasf
    singular: scalewayapplesiliconfleet
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.replicas
          name: Replicas
          type: integer
        - jsonPath: .status.readyReplicas
          name: Ready
          type: integer
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            ScalewayAppleSiliconFleet groups N Mac mini instances under a
            single helm-managed declarative spec.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: "ScalewayAppleSiliconFleetSpec is the operator-facing declarative\nshape for a pool of Mac minis. The chart manages exactly one Fleet\nper logical pool (xcresult-processor, customer runners, ...); the\nFleet controller owns the Machine instance lifecycle (creation,\nadoption, recycling on template drift, garbage-collection on\nscale-down or delete) so helm never has to touch individual Machine\nCRs after they've been provisioned.\n\nWhy this shape (vs. helm rendering Machine CRs directly):\n\n\t`helm.sh/resource-policy: keep` on Machine CRs orphans them from\n\thelm tracking, so spec.type / spec.zone updates in values are\n\tsilently dropped. Removing `keep` solves the update-propagation\n\tproblem but reintroduces the rollback-wedge risk (helm trying to\n\tdelete a Machine while the operator is being rolled, finalizer\n\tblocks forever). Putting the abstraction one level up — Fleet is\n\thelm-managed; Machines are operator-managed — gives us both:\n\thelm freely patches the Fleet's spec on every upgrade, and the\n\toperator handles Machine lifecycle including the awkward\n\trollback-during-operator-roll case."
              properties:
                machineTemplate:
                  description: |-
                    MachineTemplate is the per-Machine spec the Fleet controller
                    stamps onto every Machine it creates. Updates here apply to
                    new Machines immediately and are automatically rolled out to
                    non-Ready Machines (those still Provisioning / Bootstrapping)
                    by recycling them — this covers the "Scaleway out of stock,
                    flip SKU" scenario without manual intervention. Ready
                    Machines are not disturbed; rolling-update them is a
                    follow-up.
                  properties:
                    fleetName:
                      description: |-
                        FleetName groups Machines that share an SSH key. Set by the
                        MachineTemplate (typically to the parent MachineDeployment's
                        name). The operator generates one Ed25519 keypair per fleet,
                        registers the public half with Scaleway via the IAM API, and
                        stores the private half in `<fleetName>-ssh` so all Machines
                        in the fleet share the same operator-held credential.
                      type: string
                    kubeletVersion:
                      description: |-
                        KubeletVersion override; defaults to the operator's
                        chart-level value when empty.
                      type: string
                    os:
                      default: macos-tahoe-26.0
                      description: |-
                        OS is the Scaleway-provided macOS image name. The controller
                        resolves this to an OS UUID via `scw apple-silicon os list`.
                      type: string
                    providerID:
                      description: |-
                        ProviderID, set by the controller after provisioning, takes the
                        shape `scw-applesilicon://<zone>/<server-id>`. CAPI core expects
                        this to populate; without it the parent Machine never goes Ready.
                      type: string
                    type:
                      default: M4-S
                      description: |-
                        Type is Scaleway's Mac mini SKU (M1-M, M4-S, M4-M, etc.).
                        Defaults to M4-S: only zone fr-par-1 currently carries M2/M4
                        SKUs (fr-par-3 has M1-M only and it's been unstocked).
                      type: string
                    zone:
                      default: fr-par-1
                      description: Zone is the Scaleway zone (fr-par-1, fr-par-3, etc.).
                      type: string
                  type: object
                replicas:
                  default: 1
                  description: |-
                    Replicas is the desired number of Machines in the fleet.
                    The Fleet controller creates / deletes Machine CRs to
                    converge to this count. Default 1.
                  format: int32
                  type: integer
              required:
                - machineTemplate
                - replicas
              type: object
            status:
              description: ScalewayAppleSiliconFleetStatus is the observed state of the fleet.
              properties:
                readyReplicas:
                  description: |-
                    ReadyReplicas is the count of those Machines reporting
                    Status.Ready=true.
                  format: int32
                  type: integer
                replicas:
                  description: |-
                    Replicas is the number of Machine CRs that currently exist
                    for this fleet.
                  format: int32
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
