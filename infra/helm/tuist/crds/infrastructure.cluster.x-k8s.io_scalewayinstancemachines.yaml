        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .spec.providerID
          name: ProviderID
          type: string
        - jsonPath: .status.ready
          name: Ready
          type: boolean
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
