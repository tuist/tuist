    cluster.x-k8s.io/v1beta1: v1alpha1
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
      - cluster-api
    kind: ScalewayInstanceMachine
    listKind: ScalewayInstanceMachineList
    plural: scalewayinstancemachines
    shortNames:
      - sim
    singular: scalewayinstancemachine
  scope: Namespaced
  versions:
    - name: v1alpha1
