                  type: string
                  default: macos-tahoe-26.0
                podCIDR:
                  type: string
                fleetName:
                  type: string
                kubeletVersion:
                  type: string
            status:
              type: object
              properties:
                ready: { type: boolean }
                serverID: { type: string }
                phase: { type: string }
                failureReason: { type: string }
                failureMessage: { type: string }
                tartKubeletBinarySHA: { type: string }
                addresses:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      address: { type: string }
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      severity: { type: string }
                      lastTransitionTime: { type: string, format: date-time }
                      reason: { type: string }
                      message: { type: string }
