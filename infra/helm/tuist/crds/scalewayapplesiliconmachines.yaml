apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scalewayapplesiliconmachines.infrastructure.cluster.x-k8s.io
  labels:
    cluster.x-k8s.io/v1beta1: v1alpha1
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: ScalewayAppleSiliconMachine
    listKind: ScalewayAppleSiliconMachineList
    plural: scalewayapplesiliconmachines
    singular: scalewayapplesiliconmachine
    shortNames: [samm]
    categories: [cluster-api]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
