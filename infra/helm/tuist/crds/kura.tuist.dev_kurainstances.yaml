apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kurainstances.kura.tuist.dev
spec:
  group: kura.tuist.dev
  names:
    kind: KuraInstance
    listKind: KuraInstanceList
    plural: kurainstances
    shortNames:
      - kura
    singular: kurainstance
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Host
          type: string
          jsonPath: .spec.publicHost
        - name: gRPC
          type: string
          jsonPath: .spec.grpcPublicHost
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - accountHandle
                - tenantID
                - region
                - image
              properties:
                accountHandle:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                tenantID:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                region:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                image:
                  type: string
                  minLength: 1
                  maxLength: 256
                  pattern: "^[A-Za-z0-9._/-]+(:[A-Za-z0-9._-]+)?(@sha256:[A-Fa-f0-9]{64})?$"
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                publicHost:
                  type: string
                  maxLength: 253
                grpcPublicHost:
                  type: string
                  maxLength: 253
                ingressClassName:
                  type: string
                # Private marks an instance with no public endpoint:
                # the controller skips the Ingress/external-dns surface
                # and the in-cluster Service is the only access path
                # (runner-cache nodes).
                private:
                  type: boolean
                # NodePort data plane for runner fleets that share a
                # network with the node pool but not the pod network
                # (macOS Tart VMs over a cloud Private Network). See
                # KuraInstanceSpec in the controller API.
                exposeNodePort:
                  type: boolean
                clientCIDRs:
                  type: array
                  items:
                    type: string
                podAnnotations:
                  type: object
                  additionalProperties:
                    type: string
                peerTLSSecretName:
                  type: string
                # Enables controller-managed per-account peer mesh: a
                # per-account CA signs each instance leaf so an account's
                # pods replicate to each other and no other account can.
                mesh:
                  type: boolean
                # Public hostname for the account peer plane. When set (mesh
                # mode) the controller provisions a LoadBalancer for the peer
                # port and adds the host to each instance's peer-cert SAN, so a
                # self-hosted node can dial the managed mesh over the internet.
                meshPublicPeerHost:
                  type: string
                # Self-hosted node peer URLs injected into managed pods'
                # KURA_PEERS so the managed mesh dials them (managed->self-hosted
                # replication leg).
                meshExternalPeers:
                  type: array
                  items:
                    type: string
                # Provider-specific annotations for the public peer LoadBalancer
                # (e.g. hcloud location + node-selector restricting LB targets to
                # the account's node pool).
                meshPublicPeerLoadBalancerAnnotations:
                  type: object
                  additionalProperties:
                    type: string
                storageClassName:
                  type: string
                storageSize:
                  type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                extraEnv:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                extensionScript:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                publicURL:
                  type: string
                grpcPublicURL:
                  type: string
                observedImage:
                  type: string
                readyReplicas:
                  type: integer
                  format: int32
                message:
                  type: string
                nodeAddress:
                  type: string
                nodePortHTTP:
                  type: integer
                  format: int32
                nodePortGRPC:
                  type: integer
                  format: int32
                lastReconciledAt:
                  type: string
                  format: date-time
