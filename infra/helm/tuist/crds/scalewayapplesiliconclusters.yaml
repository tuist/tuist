apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scalewayapplesiliconclusters.infrastructure.cluster.x-k8s.io
  labels:
    cluster.x-k8s.io/v1beta1: v1alpha1
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: ScalewayAppleSiliconCluster
    listKind: ScalewayAppleSiliconClusterList
    plural: scalewayapplesiliconclusters
    singular: scalewayapplesiliconcluster
    shortNames: [sasc]
    categories: [cluster-api]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Endpoint
          type: string
          jsonPath: .spec.controlPlaneEndpoint.host
        - name: Ready
          type: boolean
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                controlPlaneEndpoint:
                  type: object
                  properties:
                    host: {type: string}
                    port: {type: integer}
            status:
              type: object
              properties:
                ready: {type: boolean}
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: {type: string}
                      status: {type: string}
                      severity: {type: string}
                      lastTransitionTime: {type: string, format: date-time}
                      reason: {type: string}
                      message: {type: string}
