apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kuragateways.kura.tuist.dev
spec:
  group: kura.tuist.dev
  names:
    kind: KuraGateway
    listKind: KuraGatewayList
    plural: kuragateways
    shortNames:
      - kuragw
    singular: kuragateway
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: IngressClass
          type: string
          jsonPath: .spec.ingressClassName
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: LoadBalancer
          type: string
          jsonPath: .status.loadBalancer
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - region
                - ingressClassName
              properties:
                region:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                ingressClassName:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                controllerClassName:
                  type: string
                  minLength: 1
                  maxLength: 128
                controllerImage:
                  type: string
                  minLength: 1
                  maxLength: 256
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                loadBalancerAnnotations:
                  type: object
                  additionalProperties:
                    type: string
                hostNetwork:
                  type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                ingressClassName:
                  type: string
                serviceName:
                  type: string
                readyReplicas:
                  type: integer
                  format: int32
                loadBalancer:
                  type: string
                message:
                  type: string
                lastReconciledAt:
                  type: string
                  format: date-time
