# Overlay for ephemeral preview environments.
#
# Pins every pod (server, cache, embedded postgres / clickhouse / minio /
# redis, migration job) onto nodes labeled `role=preview` and tolerates the
# matching `role=preview:NoSchedule` taint so the dedicated preview node pool
# is reserved for these short-lived releases. The chart's tuist.podScheduling
# helper already threads these into every workload — no template changes
# required.
#
# Apply with:
#   helm install pr-1234 infra/helm/tuist -f infra/helm/tuist/values-preview.yaml
#
# Preview state is intentionally ephemeral: the workloads are short-lived and
# using node-local storage avoids the flaky CSI attach/format path that was
# stalling short-lived preview releases.
global:
  nodeSelector:
    role: preview
  tolerations:
    - key: role
      operator: Equal
      value: preview
      effect: NoSchedule
  commonLabels:
    tuist.dev/environment: preview

server:
  replicaCount: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  cluster:
    enabled: false
  # Keep the migration as a regular Job (NOT a Helm pre-install hook).
  # Managed envs set migrationJob.asHook=true because they use external
  # Postgres + ClickHouse, but preview ships with embedded ones, and the
  # Job's wait-for-dependencies init container then deadlocks: pre-install
  # hooks run before regular release resources, so the embedded Postgres
  # / ClickHouse never come up during the hook window.
  #
  # `spec.template` is immutable, so re-deploying with a new image tag would
  # fail on a Job of the same name. namePerRevision scopes the Job name to the
  # release revision, so Helm creates the new one and prunes the previous one
  # itself. This replaces the deploy workflow's `kubectl delete job` step.
  migrationJob:
    asHook: false
    namePerRevision: true
  # License is synced from 1Password via ESO into the chart's
  # server-external-secrets Secret. The 1P item must exist in the vault that
  # the ClusterSecretStore (default name: onepassword) is bound to. ESO and
  # the SecretStore must be installed in the cluster before `helm install`.
  externalSecrets:
    license:
      item: TUIST_LICENSE_KEY
      field: password
  # Static ingress configuration for the preview cluster. The dynamic per-deploy
  # bits (enabled, host, and the matching appUrl) are passed by CI:
  #
  #   --set server.ingress.enabled=true
  #   --set server.ingress.host=pr-1234.preview.tuist.dev
  #   --set server.appUrl=https://pr-1234.preview.tuist.dev
  #
  # Convention for the host label:
  #   pr-<number>      for PR builds (stable across pushes; redeploys upgrade)
  #   sha-<7chars>     for one-off commits / branches without a PR
  #
  # TLS comes from a wildcard cert for *.preview.tuist.dev issued by the
  # platform chart's tuist-preview overlay. Two ways to plug it in:
  #
  #   1. ingress-nginx default-ssl-certificate: start the controller with
  #      --default-ssl-certificate=ingress-nginx/preview-tuist-dev-wildcard-tls
  #      and leave tlsSecretName empty here. Every Ingress without its own
  #      tls: block falls back to the wildcard. No per-namespace plumbing.
  #   2. cert-manager + reflector: mirror the wildcard Secret into each
  #      preview-* namespace and set tlsSecretName below to its name.
  #
  # The managed preview cluster uses option 1 through
  # infra/helm/platform/values-tuist-preview.yaml. The ingress controller's
  # LoadBalancer Service owns the wildcard record through ExternalDNS, so it
  # automatically follows the current preview ingress address and resolves
  # every per-pull-request subdomain.
  ingress:
    enabled: false
    className: nginx
    host: ""
    tlsSecretName: ""
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  extraEnv:
    - name: TUIST_DEPLOY_ENV
      value: preview
    - name: TUIST_TEST_USER_LOGIN_ENABLED
      value: "1"

cache:
  # Cache is enabled by default for previews. DATABASE_URL is composed by
  # the chart's tuist.cacheDatabaseUrl helper to point at a dedicated
  # `tuist_cache` database in the embedded Postgres (auto-created on first
  # boot via templates/postgresql-init.yaml).
  enabled: true
  replicaCount: 1
  podSecurityContext:
    fsGroup: 990
  storage:
    pvc:
      create: false
  data:
    pvc:
      create: false

postgresql:
  mode: embedded
  embedded:
    persistence:
      create: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

clickhouse:
  mode: embedded
  embedded:
    persistence:
      create: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

redis:
  enabled: false

objectStorage:
  mode: embedded
  embedded:
    persistence:
      create: false

registry:
  enabled: true
  managedSecrets: false
  deployEnv: preview
  sentryEnv: preview
  poolSize: "2"
  metrics:
    enabled: false
  ingress:
    enabled: false
    className: nginx
    host: ""
    tlsSecretName: ""
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

swiftRegistrySync:
  enabled: true
  managedSecrets: false
  syncAllowlist: alamofire/alamofire
  syncLimit: "1"
  extraEnv:
    - name: TUIST_DEPLOY_ENV
      value: preview
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  tmpSizeLimit: 4Gi

observability:
  enabled: false
