nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # If true, a ServiceAccount is created and assigned to server and migration job pods.
  # Set annotations (e.g. eks.amazonaws.com/role-arn) for IRSA when using external AWS services.
  # Defaults to false (opt-in) for backwards compatibility with existing deployments that rely on
  # the namespace default service account. The upstream Helm chart convention (helm create) uses
  # true as the default, but changing it here would silently reassign running pods.
  create: false
  name: ""
  annotations: {}

global:
  imagePullSecrets: []
  commonLabels: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []

server:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/tuist/tuist
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  extraEnv: []
  # Additional env from Secrets or ConfigMaps. List of objects with
  # secretRef.name or configMapRef.name. Useful for bringing in
  # managed-deployment secrets (Mailgun, OAuth tokens, etc.) without listing
  # each one in values.yaml.
  extraEnvFrom: []
  appUrl: http://tuist.local
  logLevel: info
  hosted: false
  skipEmailConfirmation: true
  secretKeyBase: ""
  # MASTER_KEY for decrypting priv/secrets/<env>.yml.enc at runtime. Required
  # for hosted deployments that rely on encrypted secrets baked into the image.
  # Leave empty to skip wiring the env var (self-hosted installs don't need it).
  masterKey: ""
  # When true, the chart skips emitting DATABASE_URL / TUIST_CLICKHOUSE_URL /
  # TUIST_SECRET_KEY_BASE / TUIST_S3_* env vars and lets the Elixir release
  # read those values from the encrypted priv/secrets/<env>.yml.enc file that
  # MASTER_KEY unlocks. Pair with `masterKey: <...>` or externalSecrets below.
  # Intended for the managed-cloud shape (Render today, k8s tomorrow).
  # Self-hosted installs leave this false so values.yaml drives all runtime config.
  managedSecrets: false
  # Sync secrets from an external store via external-secrets-operator. Only
  # consulted when managedSecrets is true and masterKey is empty. The store
  # must already exist (ClusterSecretStore/SecretStore) and be configured
  # elsewhere (see infra/k8s/gke-onboarding.md for the 1Password flow).
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    masterKey:
      # 1Password item name in the vault referenced by the SecretStore.
      # For the 1P SDK provider the item + field are joined as "<item>/<field>"
      # and the vault is set on the ClusterSecretStore, not here.
      item: MASTER_KEY
      # Field within the item. 1P "Password" category items expose their
      # value under `password`; custom items can use any label.
      field: password
  license:
    key: ""
    certificateBase64: ""
    selfHostingDevelopmentMode: false
  database:
    ssl: false
  s3:
    region: auto
    virtualHost: false
    bucketAsHost: false
    bucketName: tuist
  cacheEndpointUrl: ""
  # Erlang distribution / libcluster configuration. Emits a headless Service
  # and wires TUIST_CLUSTER_DNS_SERVICE + TUIST_CLUSTER_APP_NAME into the pod.
  cluster:
    enabled: false
    applicationName: tuist
  ingress:
    enabled: false
    className: ""
    host: ""
    # TLS is configured when tlsSecretName is set. Typically paired with
    # cert-manager annotations on the Ingress.
    tlsSecretName: ""
    annotations: {}
    # extraPaths is merged before the default "/" path so cert-manager
    # HTTP01 solvers (and similar) can inject their own route.
    extraPaths: []
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podAnnotations: {}
  podLabels: {}
  affinity: {}
  terminationGracePeriodSeconds: 60
  # Preferred HTTP probes. All three hit the Phoenix /ready endpoint.
  # startupProbe gives the release up to ~5 minutes to come up under load
  # (failureThreshold * periodSeconds).
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      path: /ready
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      path: /ready
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  migrationJob:
    enabled: true
    backoffLimit: 6
    resources: {}
    # When true, the Job runs as a Helm pre-install/pre-upgrade hook so that
    # migrations complete before new pods roll out. Disable for self-hosted
    # topologies that prefer a post-install Job instead.
    asHook: false

cache:
  enabled: true
  replicaCount: 1
  podSecurityContext:
    fsGroup: 990
  image:
    repository: ghcr.io/tuist/cache
    tag: "0.29.0"
    pullPolicy: IfNotPresent
  nginx:
    enabled: true
    image:
      repository: nginx
      tag: "1.29-alpine"
      pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  resources: {}
  extraEnv: []
  publicHost: cache.local
  serverUrl: ""
  apiKey: ""
  secretKeyBase: ""
  guardianSecretKey: ""
  storage:
    pvc:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 50Gi
  data:
    pvc:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
  socket:
    pvc:
      create: false
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 1Gi
  s3:
    region: auto
    bucket: tuist-cache
    xcodeCacheBucket: tuist-xcode-cache
    registryBucket: tuist-registry

postgresql:
  mode: embedded
  external:
    host: ""
    port: 5432
    database: tuist
    username: tuist
    password: tuist
  embedded:
    image:
      repository: postgres
      tag: "16"
      pullPolicy: IfNotPresent
    database: tuist
    username: tuist
    password: tuist
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources: {}

clickhouse:
  mode: embedded
  external:
    url: ""
  embedded:
    image:
      repository: clickhouse/clickhouse-server
      tag: "26.1"
      pullPolicy: IfNotPresent
    database: tuist
    username: default
    password: ""
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 50Gi
    resources: {}

objectStorage:
  mode: embedded
  external:
    endpoint: ""
    accessKey: ""
    secretKey: ""
    region: auto
    buckets:
      default: tuist
      cache: tuist-cache
      xcodeCache: tuist-xcode-cache
      registry: tuist-registry
  embedded:
    provider: minio
    image:
      repository: quay.io/minio/minio
      tag: latest
      pullPolicy: IfNotPresent
    mcImage:
      repository: quay.io/minio/mc
      tag: latest
      pullPolicy: IfNotPresent
    rootUser: minio
    rootPassword: minio1234
    region: auto
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 100Gi
    buckets:
      default: tuist
      cache: tuist-cache
      xcodeCache: tuist-xcode-cache
      registry: tuist-registry
    resources: {}

observability:
  enabled: false
  collector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.122.1"
      pullPolicy: IfNotPresent
    resources: {}
  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: "11.5.2"
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: "v3.4.2"
      pullPolicy: IfNotPresent
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
  loki:
    enabled: true
    image:
      repository: grafana/loki
      tag: "3.5.5"
      pullPolicy: IfNotPresent
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
  tempo:
    enabled: true
    image:
      repository: grafana/tempo
      tag: "2.8.2"
      pullPolicy: IfNotPresent
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
