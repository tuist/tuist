nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  commonLabels: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []

server:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/tuist/tuist
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  extraEnv: []
  # Additional env from Secrets or ConfigMaps. List of objects with
  # secretRef.name or configMapRef.name. Useful for bringing in
  # managed-deployment secrets (Mailgun, OAuth tokens, etc.) without listing
  # each one in values.yaml.
  extraEnvFrom: []
  appUrl: http://tuist.local
  logLevel: info
  hosted: false
  skipEmailConfirmation: true
  secretKeyBase: ""
  # MASTER_KEY for decrypting priv/secrets/<env>.yml.enc at runtime. Required
  # for hosted deployments that rely on encrypted secrets baked into the image.
  # Leave empty to skip wiring the env var (self-hosted installs don't need it).
  masterKey: ""
  # When true, the chart skips emitting DATABASE_URL / TUIST_CLICKHOUSE_URL /
  # TUIST_SECRET_KEY_BASE / TUIST_S3_* env vars and lets the Elixir release
  # read those values from the encrypted priv/secrets/<env>.yml.enc file that
  # MASTER_KEY unlocks. Pair with `masterKey: <...>` or externalSecrets below.
  # Intended for the managed-cloud shape where secrets ship inside the image.
  # Self-hosted installs leave this false so values.yaml drives all runtime config.
  managedSecrets: false
  # Sync secrets from an external store via external-secrets-operator. Only
  # consulted when managedSecrets is true and masterKey is empty. The store
  # must already exist (ClusterSecretStore/SecretStore) and be configured
  # elsewhere (see infra/k8s/syself-onboarding.md for the 1Password flow).
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    masterKey:
      # 1Password item name in the vault referenced by the SecretStore.
      # For the 1P SDK provider the item + field are joined as "<item>/<field>"
      # and the vault is set on the ClusterSecretStore, not here.
      item: MASTER_KEY
      # Field within the item. 1P "Password" category items expose their
      # value under `password`; custom items can use any label.
      field: password
    # Sync the Tuist license key from the external store. Independent of
    # managedSecrets — preview environments use this without the encrypted
    # priv/secrets blob. Leave `item` empty to skip license sync.
    license:
      item: ""
      field: password
  license:
    key: ""
    certificateBase64: ""
    selfHostingDevelopmentMode: false
  database:
    ssl: false
  s3:
    region: auto
    virtualHost: false
    bucketAsHost: false
    bucketName: tuist
  cacheEndpointUrl: ""
  # Erlang distribution / libcluster configuration. Emits a headless Service
  # and wires TUIST_CLUSTER_DNS_SERVICE + TUIST_CLUSTER_APP_NAME into the pod.
  cluster:
    enabled: false
    applicationName: tuist
  serviceAccount:
    # Workload identity / Kubernetes API identity for server pods and the migration job.
    # Set annotations when integrating with a cloud IAM system or custom RBAC.
    create: false
    name: ""
    annotations: {}
  ingress:
    enabled: false
    className: ""
    host: ""
    # TLS is configured when tlsSecretName is set. Typically paired with
    # cert-manager annotations on the Ingress.
    tlsSecretName: ""
    annotations: {}
    # extraPaths is merged before the default "/" path so cert-manager
    # HTTP01 solvers (and similar) can inject their own route.
    extraPaths: []
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podAnnotations: {}
  podLabels: {}
  affinity: {}
  # Optional nodeSelector to keep server pods off a dedicated worker pool
  # (for example, the cpx51 processor pool the managed cluster provisions
  # for xcactivitylog parsing). Self-hosters can leave this empty.
  nodeSelector: {}
  tolerations: []
  terminationGracePeriodSeconds: 60
  # Preferred HTTP probes. All three hit the Phoenix /ready endpoint.
  #
  # startupProbe gives the release up to ~5 minutes to come up under load
  # (failureThreshold * periodSeconds = 60 * 5s = 300s). Kubernetes
  # disables both readinessProbe and livenessProbe while startupProbe is
  # still failing, so the `liveness.initialDelaySeconds: 30` below only
  # starts counting AFTER startupProbe succeeds — the small delay cannot
  # race with a slow boot.
  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      path: /ready
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      path: /ready
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  migrationJob:
    enabled: true
    backoffLimit: 6
    resources: {}
    # When true, the Job runs as a Helm pre-install/pre-upgrade hook so that
    # migrations complete before new pods roll out. Disable for self-hosted
    # topologies that prefer a post-install Job instead.
    asHook: false

processor:
  # Oban-backed xcactivitylog processor. Runs the same Docker image as the
  # server with TUIST_MODE=processor, which (a) disables the Phoenix
  # web endpoint and (b) narrows the Oban queue set to :process_build only.
  # Jobs flow from any `ProcessBuildWorker.new()` enqueue (server side) to
  # these pods via SELECT … FOR UPDATE SKIP LOCKED; a saturated pod doesn't
  # claim more work, so jobs naturally flow to whichever replica has headroom.
  #
  # Disabled by default — self-hosters who don't want a dedicated parse fleet
  # can leave this off, and the server's main Deployment will consume the
  # :process_build queue in-process like every other queue.
  enabled: false
  replicaCount: 2
  # Per-pod Oban concurrency for the :process_build queue. Total parse
  # parallelism is replicaCount * queueConcurrency.
  queueConcurrency: 5
  resources: {}
  extraEnv: []
  # When true, the chart provisions an ExternalSecret that syncs the
  # `tuist_processor` role password from the configured store (1Password
  # by default) and composes DATABASE_URL from it + the non-secret
  # `database:` values below. When false, the full URL must be provided
  # via `databaseUrl` for self-hosted installs.
  managedSecrets: false
  # Full DATABASE_URL for self-hosted installs pointing at the Postgres role
  # provisioned via infra/supabase/tuist-processor-role.sql. Used as-is when
  # managedSecrets is false; ignored when managedSecrets is true (the URL is
  # composed from `database:` + the ESO-synced password instead).
  databaseUrl: ""
  # Non-secret connection parameters composed with the secret password into
  # DATABASE_URL when `managedSecrets: true`. Kept out of 1P on purpose so
  # rotation is a single-item update.
  database:
    # Supabase project pooler hostname — per-env, set in values-managed-<env>.yaml.
    host: ""
    # 6543 for Supavisor (transaction mode, recommended). 5432 for direct
    # sessions (required if the worker uses SET / advisory locks).
    port: 6543
    name: postgres
    username: tuist_processor
    # Query params appended to the URL; sslmode=require + channel_binding
    # matches Supabase defaults. No secrets here either.
    params: "sslmode=require"
  externalSecrets:
    refreshInterval: "1h"
    storeRef:
      kind: ClusterSecretStore
      name: onepassword
    databasePassword:
      item: PROCESSOR_DATABASE_PASSWORD
      field: password
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: 0 keeps at least one processor consuming the queue
      # during a rolling deploy. maxSurge: 1 lets the surge pod co-locate
      # on one of the two worker VMs when the topology spread can't satisfy
      # strict separation.
      maxSurge: 1
      maxUnavailable: 0
  topologySpread:
    # Spread one replica per Kubernetes node. Default whenUnsatisfiable is
    # ScheduleAnyway so a 1-node cluster (preview / small self-host) still
    # schedules; override to DoNotSchedule on multi-node clusters where
    # co-location would degrade throughput (managed production does this).
    enabled: true
    whenUnsatisfiable: ScheduleAnyway
  affinity: {}
  # Optional nodeSelector to pin processor pods to a dedicated node pool.
  # The managed cluster sets `node.cluster.x-k8s.io/pool: processor` on
  # cpx51 worker nodes provisioned for parsing; self-hosters can leave
  # this empty and processors will land on any schedulable node.
  nodeSelector: {}
  # Tolerations for taint-based pool isolation. Syself's ClusterClass v6
  # doesn't expose a taint variable so the managed cluster relies on
  # nodeSelector alone, but the field is wired up so a future cluster
  # class (or a self-hoster with their own taints) can use it.
  tolerations: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podAnnotations: {}
  podLabels: {}
  # Grace period long enough for an in-flight xcactivitylog parse (typically
  # 30s–5min, occasionally up to ~20min on outsized archives) to finish
  # before SIGKILL. Oban.Plugins.Lifeline reclaims anything that was still
  # running at the deadline.
  terminationGracePeriodSeconds: 1260
  # Build archives are unzipped into the pod's /tmp. Scale to match the
  # largest archive plus headroom for CAS metadata. 16 GiB gives ~3 GiB per
  # slot at queueConcurrency = 5, which is enough for any realistic build
  # archive plus its CAS sidecar files.
  tmpSizeLimit: 16Gi

xcresultProcessor:
  # Dedicated macOS workers that consume `:process_xcresult`. The parse
  # path leans on `xcresulttool` from Xcode (no Linux equivalent), so
  # these Pods schedule onto Mac mini nodes running tart-kubelet (see
  # infra/tart-kubelet/) — the macOS hosts join the cluster as real
  # nodes with `kubernetes.io/os=darwin` + `tuist.dev/runtime=tart` and
  # a `tuist.dev/macos:NoSchedule` taint that this Deployment tolerates.
  #
  # When enabled the chart emits two things:
  #   1. The Deployment template here (xcresult-processor-deployment.yaml).
  #   2. TUIST_DELEGATE_PROCESS_XCRESULT=1 on the in-cluster Linux server
  #      pods — they drop `:process_xcresult` from their Oban queue list
  #      so jobs land exclusively on the macOS fleet, avoiding both
  #      SKIP-LOCKED races and `:nif_not_loaded` crashes (the macOS-only
  #      NIF isn't loaded on Linux pods).
  #
  # Requires at least one Mac mini joined to the cluster. Tuist-managed
  # deployments declare the fleet via `macosFleet.enabled=true` (see
  # below) and the cluster-api-provider-scaleway-applesilicon operator
  # provisions hosts from Scaleway and bootstraps Tart + tart-kubelet
  # over SSH. Self-hosters without a macOS fleet should leave this off;
  # xcresult ingestion silently no-ops for them (acceptable — Linux-only
  # deployments don't have xcresult uploads to ingest in the first place).
  enabled: false
  replicaCount: 2
  # Per-pod Oban concurrency. Total parallelism = replicaCount * concurrency.
  queueConcurrency: 4
  image:
    # Built by .github/workflows/xcresult-processor-image.yml — Tart
    # VM image with the Tuist server release and the macOS-only
    # xcresult NIF baked in.
    repository: ghcr.io/tuist/tuist-xcresult-processor
    tag: ""  # Set by CI to the commit SHA.
    pullPolicy: IfNotPresent
  # When the chart's `processor.managedSecrets` is true (managed cloud)
  # the build processor's ExternalSecret already syncs the
  # tuist_processor role's DATABASE_URL into a Secret — we reuse that
  # same Secret here so xcresult and build processors share one
  # credential rotation surface. Override these for self-hosted setups
  # that point at a different Secret.
  databaseUrlSecretName: ""  # default: processor-external-secrets
  databaseUrlSecretKey: "processor-database-url"
  extraEnv: []
  # Pair with the topology spread in the Deployment template (one
  # replica per Mac mini hostname, ScheduleAnyway). minAvailable: 1
  # keeps at least one queue consumer up across voluntary disruptions
  # (host drains, fleet rolls). Off by default so single-replica
  # deployments don't fight the chart.
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "3000m"
      memory: "4Gi"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Surge by 1 so a new VM comes up before the old one drains; keeps
      # at least 1 VM consuming the queue across deploys.
      maxSurge: 1
      maxUnavailable: 0

# macOS Mac mini fleet, provisioned declaratively via Cluster API.
#
# Operator UX:
#   1. Drop Scaleway IAM credentials in 1Password (one item with
#      `access-key`, `secret-key`, `project-id` fields).
#   2. Set `macosFleet.enabled: true` + `controlPlane.host` in the
#      chart.
#   3. `helm upgrade`. Done — Mac minis are ordered, joined to the
#      cluster as `kubernetes.io/os=darwin` Nodes, and the
#      xcresult-processor Deployment schedules onto them.
#
# Everything else is operator-managed:
#   - SSH key: generated on first reconcile (Ed25519), public half
#     registered with Scaleway via the IAM API, private half stored
#     in `<fleet-name>-ssh` Secret. The chart doesn't pre-create it.
#   - Bootstrap material: bootstrap token minted on each Machine
#     reconcile (24h TTL); API server URL + CA cert read from the
#     operator pod's in-cluster service-account context. No 1P
#     entries needed for cluster join material.
#
# Scaling: `kubectl scale machinedeployment <name> --replicas=N`.
macosFleet:
  enabled: false
  name: ""             # default: <release>-macos-fleet
  replicas: 1
  kubeletVersion: 1.32.1
  controlPlane:
    host: ""           # API server endpoint Mac minis dial when joining
    port: 6443
  image:
    repository: ghcr.io/tuist/capi-provider-scaleway-applesilicon
    # Pin the operator image to a specific build SHA in your env values.
    # Falls back to `:latest` if unset, which is fine for development
    # but not production.
    tag: ""
    pullPolicy: IfNotPresent
  # External URL of the cluster API server that Mac minis dial when
  # joining. Auto-discovered from the kube-public/cluster-info
  # ConfigMap that kubeadm/CAPI write during cluster bootstrap; only
  # set this when the ConfigMap isn't usable (non-kubeadm cluster,
  # split-horizon DNS, ad-hoc override).
  apiServerURL: ""

  # tart-kubelet — kubelet-shaped agent the CAPI provider installs on
  # each Mac mini. Each Mac mini joins the cluster as a real Node and
  # runs Pods scheduled to it as Tart VMs. The darwin/arm64 binary is
  # baked into the operator's own image — bumping
  # `macosFleet.image.tag` rolls a new kubelet.
  tartKubelet:
    # Capacity advertised by each Mac mini when it registers its Node.
    # M4-S = 8 vCPU / 16 GB. maxPods is 2 because Apple's macOS SLA
    # only permits up to two simultaneous virtualized macOS instances
    # per bare-metal host (Tart refuses to start a third VM).
    hostCPU: 8
    hostMemoryMB: 16384
    maxPods: 2
  scaleway:
    # Name of the Secret holding `access-key`, `secret-key`,
    # `project-id`. ESO populates it from 1Password by default; set
    # to a manually-created Secret name to opt out.
    secretName: ""
    externalSecrets:
      enabled: true
      refreshInterval: "1h"
      storeRef:
        kind: ClusterSecretStore
        name: onepassword
      # Bare 1Password item name. The cluster's `ClusterSecretStore
      # "onepassword"` is pre-configured per env to look in the
      # matching `tuist-k8s-<env>` vault, so this name is the same
      # across staging / canary / production. Convention: each env
      # has its own SCALEWAY_API item with a per-env Scaleway IAM
      # principal — leaked staging key rotates without touching
      # production.
      item: SCALEWAY_API
      fields:
        accessKey: access-key
        secretKey: secret-key
        projectID: project-id
  machine:
    # M4-S is the smallest readily-stocked Apple Silicon SKU Scaleway
    # carries in fr-par-1 today (M4 chip, base RAM). fr-par-3 only
    # offers M1-M and it's been unstocked; fr-par-1 has the broader
    # M2/M4 lineup. Override per-env if the workload calls for more
    # CPU/RAM (M4-M, M4-XL) or a different generation (M2-L).
    type: M4-S
    zone: fr-par-1
    os: macos-tahoe-26.0

cache:
  enabled: true
  replicaCount: 1
  serviceAccount:
    # Workload identity / Kubernetes API identity for cache pods.
    # Set annotations (for example, eks.amazonaws.com/role-arn) for IRSA on external S3.
    create: false
    name: ""
    annotations: {}
  podSecurityContext: {}
  image:
    repository: ghcr.io/tuist/cache
    tag: "0.29.0"
    pullPolicy: IfNotPresent
  nginx:
    enabled: true
    image:
      repository: nginx
      tag: "1.29-alpine"
      pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  resources: {}
  extraEnv: []
  publicHost: cache.local
  serverUrl: ""
  apiKey: ""
  secretKeyBase: ""
  guardianSecretKey: ""
  # DATABASE_URL for the cache Phoenix app's own Postgres. Two paths:
  #
  #   - Self-hosted with an external Postgres: set explicitly here, like
  #     ecto://user:pass@host:5432/db.
  #   - Embedded mode (postgresql.mode=embedded): leave empty. The chart
  #     composes a URL pointing at the embedded Postgres + a dedicated
  #     `cache.embedded.database` (auto-created at first Postgres boot via
  #     templates/postgresql-init.yaml so the cache app's migrations don't
  #     collide with the server's).
  #
  # Managed-cloud envs (managedSecrets: true) bypass this entirely — the
  # cache app reads its own DATABASE_URL from priv/secrets/<env>.yml.enc
  # baked into the image.
  databaseUrl: ""
  embedded:
    # Database name created in the embedded Postgres for the cache app.
    # Only meaningful when postgresql.mode=embedded; ignored otherwise.
    database: tuist_cache
  storage:
    pvc:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 50Gi
  data:
    pvc:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
  socket:
    pvc:
      create: false
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 1Gi
  s3:
    region: auto
    bucket: tuist-cache
    xcodeCacheBucket: tuist-xcode-cache
    registryBucket: tuist-registry

postgresql:
  mode: embedded
  external:
    host: ""
    port: 5432
    database: tuist
    username: tuist
    password: tuist
  embedded:
    image:
      repository: postgres
      tag: "16"
      pullPolicy: IfNotPresent
    database: tuist
    username: tuist
    password: tuist
    persistence:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
    resources: {}

clickhouse:
  mode: embedded
  external:
    url: ""
  embedded:
    image:
      repository: clickhouse/clickhouse-server
      tag: "26.1"
      pullPolicy: IfNotPresent
    service:
      # Exposed service port for ClickHouse's native protocol.
      # Override only if your service mesh or reserved ports require a different number.
      nativePort: 9000
    database: tuist
    username: default
    password: ""
    persistence:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 50Gi
    resources: {}

# Redis backs the persistent (cross-pod, cross-deploy) auth rate limiter.
# When disabled the server transparently falls back to an in-memory bucket
# (per-pod, lost on restart) — fine for dev / single-pod self-hosted.
# Persistence is intentionally absent: the bucket data is ephemeral by
# design, a pod restart resetting limits is acceptable.
redis:
  enabled: false
  mode: embedded
  external:
    url: ""  # e.g. redis://my-redis:6379
  embedded:
    image:
      repository: valkey/valkey
      tag: "8.1-alpine"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi
    # Restrict ingress on the embedded Valkey Service to server pods.
    # Requires a CNI that enforces NetworkPolicy (Cilium, Calico, etc.).
    networkPolicy:
      enabled: true

objectStorage:
  mode: embedded
  external:
    endpoint: ""
    accessKey: ""
    secretKey: ""
    region: auto
    buckets:
      default: tuist
      cache: tuist-cache
      xcodeCache: tuist-xcode-cache
      registry: tuist-registry
    managedSecrets: false
    externalSecrets:
      refreshInterval: "1h"
      storeRef:
        kind: ClusterSecretStore
        name: onepassword
      accessKey:
        # 1Password item title and field. With the 1P SDK provider the vault
        # is set on the ClusterSecretStore, not here.
        item: S3_CREDENTIALS
        field: access_key_id
      secretKey:
        item: S3_CREDENTIALS
        field: secret_access_key
  embedded:
    provider: minio
    image:
      repository: quay.io/minio/minio
      tag: latest
      pullPolicy: IfNotPresent
    mcImage:
      repository: quay.io/minio/mc
      tag: latest
      pullPolicy: IfNotPresent
    rootUser: minio
    rootPassword: minio1234
    region: auto
    persistence:
      create: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 100Gi
    buckets:
      default: tuist
      cache: tuist-cache
      xcodeCache: tuist-xcode-cache
      registry: tuist-registry
    resources: {}

observability:
  enabled: false
  collector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.122.1"
      pullPolicy: IfNotPresent
    resources: {}
  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: "11.5.2"
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: "v3.4.2"
      pullPolicy: IfNotPresent
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
  loki:
    enabled: true
    image:
      repository: grafana/loki
      tag: "3.5.5"
      pullPolicy: IfNotPresent
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
  tempo:
    enabled: true
    image:
      repository: grafana/tempo
      tag: "2.8.2"
      pullPolicy: IfNotPresent
    persistence:
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
