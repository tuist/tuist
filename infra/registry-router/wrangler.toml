name = "registry-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"
# Keep same-zone fetches on the origin path instead of invoking this Worker's public route again.
compatibility_flags = ["global_fetch_private_origin"]

routes = [
  { pattern = "registry.tuist.dev/*", zone_name = "tuist.dev" },
  { pattern = "tuist.dev/api/registry/*", zone_name = "tuist.dev" }
]

[[kv_namespaces]]
binding = "HEALTH"
id = "84f962fcf0a04a499f3f78d2dd7f4994"

[triggers]
crons = ["* * * * *"]
