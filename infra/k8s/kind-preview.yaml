kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tuist-preview
# Five-node layout that mirrors how preview environments run on the
# managed cluster: a control plane, a "general" worker for shared
# workloads, a dedicated worker labeled `role=preview` and tainted so only
# ephemeral preview releases land on it, plus two Kura workers. The Kura
# workers let local preview-ondemand validation create multi-replica
# controller-managed KuraInstance StatefulSets with the same hostname spread
# constraint used in managed clusters.
nodes:
  - role: control-plane
  - role: worker
    labels:
      role: general
  - role: worker
    labels:
      role: preview
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            register-with-taints: "role=preview:NoSchedule"
  - role: worker
    labels:
      role: kura
      node.cluster.x-k8s.io/pool: kura
  - role: worker
    labels:
      role: kura
      node.cluster.x-k8s.io/pool: kura
