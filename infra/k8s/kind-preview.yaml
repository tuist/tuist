kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tuist-preview
# Three-node layout that mirrors how preview environments run on the
# managed cluster: a control plane, a "general" worker for shared
# workloads, and a dedicated worker labeled `role=preview` and tainted so
# only ephemeral preview releases land on it. Kura preview runtimes
# colocate on the preview worker with a role=preview toleration; an
# explicit infra/perf-test profile can re-introduce dedicated kura
# workers when it ships.
nodes:
  - role: control-plane
  - role: worker
    labels:
      role: general
  - role: worker
    labels:
      role: preview
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            register-with-taints: "role=preview:NoSchedule"
