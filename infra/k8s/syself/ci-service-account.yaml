# ServiceAccount used by GitHub Actions to deploy the Tuist Helm chart into
# this workload cluster. Its long-lived token is rendered into a kubeconfig
# and stored as the KUBECONFIG GitHub Environment secret.
#
# The RBAC is deliberately narrow: full control inside the namespace the
# chart deploys into, plus the minimum cluster-scoped verbs Helm needs for
# CRD-adjacent resources (ClusterRoles it creates for its own components,
# if any). Review + tighten if you notice it pulling more than it needs.
#
# Applied per-environment by substituting __NAMESPACE__ with the target
# namespace (tuist-staging / tuist-canary / tuist) and piping into kubectl.
# Example for staging:
#
#   sed 's/__NAMESPACE__/tuist-staging/g' infra/k8s/syself/ci-service-account.yaml \
#     | kubectl --kubeconfig ~/.kube/tuist-staging.yaml apply -f -
#
# The placeholder exists because Kubernetes has no built-in "inherit the
# namespace from an outer scope" primitive — each resource's metadata
# (and every ClusterRoleBinding subject) must name it explicitly.

apiVersion: v1
kind: Namespace
metadata:
  name: __NAMESPACE__
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: __NAMESPACE__
---
# Long-lived token kubelet-style. The SA controller no longer auto-creates
# token Secrets in k8s ≥1.24, so we create one explicitly.
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-deployer-token
  namespace: __NAMESPACE__
  annotations:
    kubernetes.io/service-account.name: github-actions-deployer
type: kubernetes.io/service-account-token
---
# Namespace-scoped: full access inside the target namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer
  namespace: __NAMESPACE__
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: __NAMESPACE__
---
# Cluster-scoped: just enough for Helm to list/get CRDs and cluster-level
# resources the chart references (ExternalSecret CRs are namespaced but the
# CRD itself is cluster-scoped). Add here if Helm errors on a specific verb.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-actions-deployer-cluster
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-deployer-cluster
roleRef:
  kind: ClusterRole
  name: github-actions-deployer-cluster
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: __NAMESPACE__
