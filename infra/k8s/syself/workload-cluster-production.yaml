# Production workload Cluster for Tuist on Syself Apalla (Hetzner).
#
# Shape: 3 × cpx22 cloud control plane + 2 × ccx33 dedicated-vCPU workers
# in fsn1. ~€135/mo. Dedicated cores on the workers give us predictable
# p99 latency without foreclosing HPA. Workers are sized for the
# xcactivitylog processor: at queueConcurrency=5 with a 1 GiB per-archive
# cap, peak per-pod memory is ~20 GiB, so we run on 32 GiB nodes with
# pod anti-affinity (one processor replica per node).

apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: tuist
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    class: hetzner-apalla-1-34-v6
    version: v1.34.6
    controlPlane:
      replicas: 3
    workers:
      machineDeployments:
        - class: workeramd64hcloud
          name: md-0
          replicas: 2
          failureDomain: fsn1
    variables:
      - name: region
        value: fsn1
      - name: controlPlaneMachineTypeHcloud
        value: cpx22
      - name: controlPlaneMachineArchHcloud
        value: amd64
      - name: workerMachineTypeHcloud
        value: ccx33
      - name: SSHKeyNameHcloud
        value:
          - name: tuist-syself
