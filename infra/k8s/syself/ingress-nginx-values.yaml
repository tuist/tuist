# ingress-nginx values for a Syself/Hetzner workload cluster.
#
# Hetzner's cloud-controller-manager reads `load-balancer.hetzner.cloud/*`
# annotations from the Service to pick the LB location + type. Without them
# the LB fails to provision or lands in the wrong DC.
#
# Install:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
#     -n ingress-nginx --create-namespace \
#     -f infra/k8s/syself/ingress-nginx-values.yaml

controller:
  service:
    type: LoadBalancer
    annotations:
      load-balancer.hetzner.cloud/location: fsn1
      load-balancer.hetzner.cloud/type: lb11
      load-balancer.hetzner.cloud/name: tuist-ingress
      # Preserve client source IP so rate-limiters and logs see the real
      # caller, not the LB node. Requires ingress-nginx to run as a Service
      # of type LoadBalancer with externalTrafficPolicy=Local.
      load-balancer.hetzner.cloud/use-private-ip: "false"
    externalTrafficPolicy: Local
  # Small cluster — default HPA + 2 replicas is overkill for staging traffic.
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
