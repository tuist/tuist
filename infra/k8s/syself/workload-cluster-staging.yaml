# Staging workload Cluster for Tuist on Syself Apalla (Hetzner).
#
# Shape: 3 × cpx22 cloud control plane + 2 × cpx31 workers in fsn1.
# ~€65/mo. Workers bumped from cpx22 (4 GB) to cpx31 (8 GB) so the
# grafana/k8s-monitoring DaemonSets (alloy-metrics/logs/receiver/singleton
# × 2 nodes + kube-state-metrics + node-exporter) fit alongside the
# Phoenix server during rolling updates — cpx22 left no memory headroom
# for a new server pod to schedule while the old one drained.

apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: tuist-staging
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    class: hetzner-apalla-1-34-v6
    version: v1.34.6
    controlPlane:
      replicas: 3
    workers:
      machineDeployments:
        - class: workeramd64hcloud
          name: md-0
          replicas: 2
          failureDomain: fsn1
    variables:
      - name: region
        value: fsn1
      - name: controlPlaneMachineTypeHcloud
        value: cpx22
      - name: controlPlaneMachineArchHcloud
        value: amd64
      - name: workerMachineTypeHcloud
        value: cpx31
      - name: SSHKeyNameHcloud
        value:
          - name: tuist-syself
      # Uncomment and fill in to expose the kube-apiserver via a custom
      # domain (DNS + Hetzner LB must be pre-created — see onboarding §4).
      # - name: clusterEndpointHost
      #   value: k8s-staging.tuist.dev
      # - name: clusterLoadBalancerType
      #   value: lb11
      # - name: clusterLoadBalancerName
      #   value: tuist-staging-apiserver-lb
