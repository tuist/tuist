# Staging workload Cluster for Tuist on Syself Apalla (Hetzner).
#
# Shape: 3 × cpx22 cloud control plane + 2 × cpx22 workers in fsn1.
# ~€45/mo. Two-worker minimum because the baseline system pods
# (cilium-operator, hubble, CSI controllers, metrics-server, ESO, Alloy)
# saturate a single cpx22 before the Phoenix server can schedule.

apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: tuist-staging
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    class: hetzner-apalla-1-34-v6
    version: v1.34.6
    controlPlane:
      replicas: 3
    workers:
      machineDeployments:
        - class: workeramd64hcloud
          name: md-0
          replicas: 2
          failureDomain: fsn1
    variables:
      - name: region
        value: fsn1
      - name: controlPlaneMachineTypeHcloud
        value: cpx22
      - name: controlPlaneMachineArchHcloud
        value: amd64
      - name: workerMachineTypeHcloud
        value: cpx22
      - name: SSHKeyNameHcloud
        value:
          - name: tuist-syself
      # Uncomment and fill in to expose the kube-apiserver via a custom
      # domain (DNS + Hetzner LB must be pre-created — see onboarding §4).
      # - name: clusterEndpointHost
      #   value: k8s-staging.tuist.dev
      # - name: clusterLoadBalancerType
      #   value: lb11
      # - name: clusterLoadBalancerName
      #   value: tuist-staging-apiserver-lb
