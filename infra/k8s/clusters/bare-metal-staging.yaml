# Bare-metal substrate for the staging workload cluster.
#
# Owns one thing here: the `HetznerBareMetalMachineTemplate` that
# the `bare-metal-worker` MachineDeployment class (see
# `clusterclass-tuist.yaml`) claims through. Per-host
# `HetznerBareMetalHost` CRs are NOT in this file — they're managed
# by `hetzner-robot-controller`, which reflects Robot's inventory
# (servers named `tuist-bm-*`) into the cluster and auto-fills disk
# WWNs once caph populates `hardwareDetails`. See
# `infra/hetzner-robot-controller/AGENTS.md`.
#
# Prerequisite Secrets (created manually on the mgmt cluster — see
# `infra/runners-controller/AGENTS.md` for the bring-up runbook):
#
#   - `hetzner` Secret in `org-tuist` — extended with
#     `hetzner-robot-user` + `hetzner-robot-password` keys alongside
#     the existing `hcloud` token. caph reads all three from the
#     same Secret via the HetznerClusterTemplate's `hetznerSecretRef`
#     (per-host credential override isn't supported in caph >=v1.0).
#     The hetzner-robot-controller also reads `hetzner-robot-user` /
#     `hetzner-robot-password` from this same Secret.
#
#   - `hetzner-bare-metal-ssh-key` in `org-tuist` — keys
#     `sshkey-name` + `ssh-publickey` + `ssh-privatekey`. Referenced
#     by `HetznerBareMetalMachineTemplate.spec.template.spec.sshSpec`
#     below, AND from `HetznerCluster.spec.sshKeys.robotRescueSecretRef`
#     (a one-time patch on the live HetznerCluster — the template is
#     immutable, so the field can't be propagated through GitOps).
#
# Both items are fleet-level (one Hetzner Robot account spans every
# AX-class host across staging / canary / production), so they live
# in the `tuist-k8s-mgmt` 1Password vault. Once ESO lands on the
# mgmt cluster the manual Secret-creation step goes away and these
# become ESO-synced.
#
# Schema note: the caph bare-metal CR fields below track caph >=v1.0.

---
# Infrastructure template for the bare-metal-worker MachineDeployment
# class. The class definition lives in `clusterclass-tuist.yaml`.
# Selects hosts via `hostSelector.matchLabels` so we only claim
# hetzner-robot-controller-managed hosts (the controller stamps
# `app.kubernetes.io/managed-by=hetzner-robot-controller` on each CR
# it creates). Without this gate, caph would also claim any
# operator-hand-authored `HetznerBareMetalHost` in the namespace,
# defeating the convention's safety property.
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HetznerBareMetalMachineTemplate
metadata:
  name: tuist-bare-metal-machinetemplate
  namespace: org-tuist
spec:
  template:
    spec:
      installImage:
        # Path inside the rescue system's filesystem to the OS tarball
        # to install. Hetzner mounts an NFS share at /root/.oldroot/nfs
        # inside the rescue system with images for each supported
        # distribution.
        image:
          path: /root/.oldroot/nfs/install/../images/Ubuntu-2404-noble-amd64-base.tar.gz
        # Software RAID 1 mirror across both NVMes. caph silently
        # rewrites `swraidLevel: 0` → `SWRAIDLEVEL 1` in the
        # installimage wrapper (RAID 0 isn't supported via its API),
        # so set the level explicitly to avoid the surprise.
        swraid: 1
        swraidLevel: 1
        # Partition layout — match Hetzner's default installimage
        # for UEFI AX-class boxes with SWRAID 1. The ESP uses
        # `fileSystem: esp` (Hetzner installimage keyword, not the
        # caph-documented `ext*`/`btrfs`/`xfs` list — caph's schema
        # is an unconstrained string and passes the value through to
        # the autosetup file). `esp` tells installimage to mark the
        # partition as EFI System Partition, format it as FAT32,
        # and place it OUTSIDE the RAID array — `vfat` makes
        # installimage reject it as malformed inside SWRAID. No
        # swap on bare metal.
        partitions:
          - mount: /boot/efi
            fileSystem: esp
            size: 256M
          - mount: /boot
            fileSystem: ext4
            size: 1024M
          - mount: /
            fileSystem: ext4
            size: all
        # post-install script runs on the freshly installed OS before
        # the first reboot. Used to install containerd + the
        # tuist.dev/kata-runtime label so kata-deploy picks it up on
        # first kubelet check-in.
        postInstallScript: |
          #!/bin/bash
          set -euo pipefail
          # Label the node for the kata-deploy DaemonSet on first boot.
          # The bare-metal-worker `KubeadmConfigTemplate` runs the
          # actual kubeadm join + label apply via cloud-init; this
          # file just stages the marker.
          mkdir -p /etc/tuist
          echo 'kata-runtime=true' > /etc/tuist/node-labels
      # Only claim hosts the hetzner-robot-controller created. The
      # controller stamps both labels on every CR it owns:
      # `app.kubernetes.io/managed-by=hetzner-robot-controller` is the
      # ownership gate, `robot.hetzner.com/server-name` carries the
      # Robot panel name so future per-env selectors (e.g.
      # `tuist-bm-staging-*`) can route. The current shape is single-
      # env / single-pool, so we match only the managed-by label.
      hostSelector:
        matchLabels:
          app.kubernetes.io/managed-by: hetzner-robot-controller
      sshSpec:
        # The same SSH key the operator pastes into the Robot order
        # form when provisioning, so caph can SSH into rescue mode
        # without needing a separate credential set.
        secretRef:
          name: hetzner-bare-metal-ssh-key
          key:
            name: sshkey-name
            publicKey: ssh-publickey
            privateKey: ssh-privatekey
        portAfterInstallImage: 22
        portAfterCloudInit: 22

---
# Bootstrap template for the bare-metal-worker MachineDeployment.
# cloud-init drops the kubelet config + containerd config files, runs
# kubeadm join, and applies the labels + taints that route runner
# Pods exclusively to this node and opt into kata-deploy.
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: tuist-bare-metal-worker-bootstraptemplate
  namespace: org-tuist
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          name: '{{ ds.meta_data.local_hostname }}'
          kubeletExtraArgs:
            - name: cloud-provider
              value: external
            - name: provider-id
              value: 'hcloud://{{ ds.meta_data.instance_id }}'
          taints:
            # Only runner Pods land on bare-metal nodes; everything
            # else stays on the elastic cloud `md-0` pool.
            - key: tuist.dev/runner-tier
              value: bare-metal
              effect: NoSchedule
      preKubeadmCommands:
        - set -euo pipefail
        # Container runtime + kubeadm install. Matches what the
        # cloud worker template installs so the worker bootstrap is
        # consistent across substrates; the actual containerd version
        # tracks the K8s version the cluster runs at.
        - apt-get update
        - apt-get install -y apt-transport-https ca-certificates curl gpg
        - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        - 'echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /" > /etc/apt/sources.list.d/kubernetes.list'
        - apt-get update
        - apt-get install -y containerd kubeadm kubelet
        - systemctl enable --now containerd
        - systemctl enable kubelet
      postKubeadmCommands:
        # Stamp the runner-pool + kata-runtime labels on the Node
        # after kubeadm join completes. The MachineDeployment also
        # carries these in `metadata.labels`, but CAPI's label-sync
        # only propagates `node.cluster.x-k8s.io/*` and
        # `node-role.kubernetes.io/*`; the tuist.dev/* labels have to
        # be applied directly.
        - 'kubectl --kubeconfig /etc/kubernetes/kubelet.conf label node "$(hostname)" tuist.dev/kata-runtime=true --overwrite'
