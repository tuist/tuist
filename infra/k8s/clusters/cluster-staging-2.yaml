# Parallel-build staging Cluster CR. Same shape as cluster-staging.yaml
# (3× cpx22 control plane + 2× cpx31 workers in fsn1) but with name
# tuist-staging-2 so it can run side-by-side with the existing
# Apalla-managed `tuist-staging` cluster on the same Hetzner project
# without conflicting on resource names. After DNS cuts over to this
# cluster and the old one is decommissioned, this file gets retired
# (rename to cluster-staging.yaml or delete and rename the cluster).
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist-staging-2
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      - name: hcloudWorkerMachineType
        value: cpx31
      - name: hcloudSSHKeyName
        value:
          - name: tuist-syself
    workers:
      machineDeployments:
        - class: hcloud-worker
          name: md-0
          replicas: 2
          failureDomain: fsn1
