# Production workload Cluster, topology mode against tuist-hcloud.
# Three worker pools: md-0 general (ccx23, dedicated vCPU for the
# Phoenix server's predictable p99 latency), md-processor (cpx62
# shared-vCPU, 16 vCPU / 32 GiB each, optimized for xcactivitylog
# parsing throughput-per-euro), and kura (ccx13 dedicated vCPU for
# Kura cache replicas). Pool labels propagate from MachineDeployment
# metadata to nodes via CAPI's machine-to-node label sync (only the
# node-role.kubernetes.io/, node-restriction.kubernetes.io/, and
# node.cluster.x-k8s.io/ prefixes are allowed through).
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
      # Per-topology control-plane remediation (spec/72 Decision 5). This
      # cluster runs 3 control-plane nodes, so remediating a single stuck
      # node is safe: an absolute `unhealthyLessThanOrEqualTo: 1` self-heals
      # one bad node while still short-circuiting a wider outage. The shared
      # ClusterClass default (33%) is kept for single-CP clusters, where a
      # 1-of-1 unhealthy node exceeds 33% and correctly does NOT self-
      # remediate (an absolute `1` there would destroy the only node). The
      # full healthCheck block is restated (not just remediation) so the
      # override is unambiguous regardless of ClusterClass merge semantics;
      # keep `checks` in sync with clusterclass-tuist.yaml controlPlane.
      healthCheck:
        checks:
          nodeStartupTimeoutSeconds: 900
          unhealthyNodeConditions:
            - type: Ready
              status: Unknown
              timeoutSeconds: 300
            - type: Ready
              status: "False"
              timeoutSeconds: 300
        remediation:
          triggerIf:
            unhealthyLessThanOrEqualTo: 1
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      # Default for pools without an override (md-0).
      - name: hcloudWorkerMachineType
        value: ccx23
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
      # Scopes bare-metal HBM claims to this cluster (see the
      # `HetznerBareMetalMachineTemplateClusterSelector` patch in
      # `clusterclass-tuist.yaml`). Matches the `--clusters` entry
      # on the `hetzner-robot-controller` Deployment and the
      # cluster prefix in the Robot panel server name
      # (`tuist-bm-production-…`).
      - name: bareMetalCluster
        value: production
      # Insert InternalIP so the apiserver can reach kubelets on nodes with no
      # ExternalIP and an unresolvable Hostname (the Scaleway Elastic Metal kura
      # node + the macOS-PN fleet) for `kubectl logs`/`exec`. Flipping this
      # re-renders the apiserver patch and rolls this cluster's control plane.
      - name: kubeletPreferredAddressTypes
        value: ExternalIP,InternalIP,Hostname,InternalDNS,ExternalDNS
    workers:
      machineDeployments:
        # General-purpose pool: Phoenix server, redis, system DaemonSets,
        # plus the 3-instance CloudNativePG cluster — its hard pod
        # anti-affinity (`topologyKey: kubernetes.io/hostname,
        # podAntiAffinityType: required`) needs one CNPG instance per
        # host, so the pool size has to match the configured instance
        # count to avoid leaving a CNPG pod permanently Pending.
        - class: hcloud-worker
          name: md-0
          replicas: 3
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: general
        # Dedicated stable-egress gateway pool (HA, ≥2 nodes). The Phoenix
        # server's public egress is SNAT'd through the active node's Hetzner
        # Floating IP by the CiliumEgressGatewayPolicy in the platform chart.
        # Every node here self-applies the candidate label
        # `tuist.dev/stable-egress-candidate=server` at kubelet registration
        # via `workerNodeLabels` (survives MachineHealthCheck remediation,
        # unlike CAPI metadata-label sync). The stable-egress failover
        # controller picks one Ready candidate as active — moving the Floating
        # IP (Hetzner API) and the active `tuist.dev/stable-egress-gateway`
        # label together — and fails over to the other on node loss. The
        # host-configurer DaemonSet configures eth0 on the active node.
        #
        # An outage on 2026-06-14 traced to this binding being a single
        # hand-labelled node: it got remediated, neither the label nor the IP
        # migrated, and server egress black-holed. Two candidates + automated
        # failover removes both the SPOF and the manual runbook.
        - class: hcloud-worker
          name: md-egress
          replicas: 2
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: egress
          variables:
            overrides:
              # Forwards/SNATs server egress only — runs no application
              # workload, so it doesn't need the general pool's dedicated
              # vCPU shape.
              - name: hcloudWorkerMachineType
                value: cpx22
              - name: workerNodeLabels
                value: tuist.dev/stable-egress-candidate=server
        # Dedicated processor pool: xcactivitylog parsing.
        # CA annotations declared here propagate to the rendered
        # MachineDeployment via topology mode. Without them the
        # classRef swap to tuist-hcloud would re-render the MD
        # without the autoscaler bounds, dropping cluster-autoscaler's
        # node-group registration mid-flight.
        #
        # `replicas` is deliberately UNSET on this pool (spec/72 footgun):
        # it is autoscaled between the min/max annotations below, and CAPI's
        # topology controller only manages replicas when the field is
        # present. Under Flux (10-min reconcile) a pinned `replicas` would
        # be re-asserted on every sync and fight cluster-autoscaler; leaving
        # it unset lets CAPI default within [min,max] and hands replica
        # control to the autoscaler (see the CAPI Autoscaling docs). Before
        # enabling the production Flux Kustomization, confirm the live MD's
        # replicas are preserved:
        #   kubectl -n org-tuist get md tuist-md-processor \
        #     -o jsonpath='{.spec.replicas}{"\n"}{.metadata.annotations}'
        - class: hcloud-worker
          name: md-processor
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: processor
            annotations:
              cluster.x-k8s.io/cluster-autoscaler-node-group-min-size: "2"
              cluster.x-k8s.io/cluster-autoscaler-node-group-max-size: "6"
          variables:
            overrides:
              - name: hcloudWorkerMachineType
                value: cpx62
        # US East / US West Kura capacity moved off Hetzner to OVH bare-metal
        # boxes (Vint Hill VA / Hillsboro OR), provisioned as the kura-us-east /
        # kura-us-west fleets in the tuist chart (ovhFleets) and self-joined via
        # the CAPI provider — they are no longer Hetzner worker pools here, so the
        # region catalog reports no Hetzner location for them.
        # Linux runner pool on Hetzner Robot bare metal. The
        # `hetzner-robot-controller` reflects
        # `tuist-bm-production-*` Robot servers into HBM CRs
        # stamped `tuist.dev/cluster=production`; caph claims them
        # through the patched HBMM hostSelector. Each node ends up
        # labeled `node.cluster.x-k8s.io/pool=runners-linux` +
        # `tuist.dev/kata-runtime=true` and tainted
        # `tuist.dev/runner-tier=bare-metal:NoSchedule`.
        #
        # Host count is operator-managed: order another
        # `tuist-bm-production-*` server in the Robot panel and
        # bump `replicas:` here to grow capacity.
        - class: bare-metal-worker
          name: runners-linux
          # Two pre-ordered AX162-R hosts (`tuist-bm-production-1` and
          # `tuist-bm-production-2`) in FSN1. Each box hosts ~64 Kata-
          # QEMU runner slots at the chart's 1 vCPU / 4 GB slot size;
          # two boxes give ~128 runner slots + one host of HA headroom.
          # Bump in lockstep with new Robot orders.
          replicas: 2
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: runners-linux
              # See cluster-staging.yaml for the rationale — keeps
              # bare-metal Nodes out of HCCM's LB target set so a
              # bad providerID can't break the ingress.
              node.kubernetes.io/exclude-from-external-load-balancers: ""
