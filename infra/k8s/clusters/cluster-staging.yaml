# Staging workload Cluster, topology mode against tuist-hcloud.
# 3× cpx22 control plane + 2× cpx32 workers in fsn1.
#
# Linux GitHub Actions runners run on Hetzner Robot bare-metal hosts
# (AX42-U class), joined to this workload cluster as worker Nodes.
# The bare-metal hosts are NOT managed by this ClusterClass — they
# join out-of-band via `kubeadm join` and are taint+labeled to host
# runner Pods exclusively. See `infra/runners-controller/AGENTS.md`
# for the bare-metal bring-up procedure.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist-staging
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      # Default for pools without an override (md-0).
      - name: hcloudWorkerMachineType
        value: cpx32
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
    workers:
      machineDeployments:
        # General-purpose pool: Phoenix server, system DaemonSets.
        # Stays on Hetzner Cloud (cpx32) since these workloads don't
        # benefit from bare metal and the elastic scaling matters
        # more than per-host cost.
        - class: hcloud-worker
          name: md-0
          replicas: 2
          failureDomain: fsn1
