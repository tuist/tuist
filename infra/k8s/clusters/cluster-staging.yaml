# Staging workload Cluster, topology mode against tuist-hcloud.
# 3× cpx22 control plane + 2× cpx32 workers in fsn1, plus a
# `bare-metal-worker` MachineDeployment that claims Hetzner Robot
# AX42-U boxes for the Linux runner fleet.
#
# Linux GitHub Actions runners run as Firecracker microVMs (via Kata
# Containers) on the bare-metal nodes. The HetznerBareMetalHost CRs
# the bare-metal MD claims live in `bare-metal-staging.yaml`; caph
# rescue-boots each AX42-U, runs `installimage` to write Ubuntu
# 24.04 LTS, and the cloud-init in
# `tuist-bare-metal-worker-bootstraptemplate` (in
# `clusterclass-tuist.yaml`-via-`bare-metal-staging.yaml`) runs
# `kubeadm join` automatically.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist-staging
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      # Default for pools without an override (md-0).
      - name: hcloudWorkerMachineType
        value: cpx32
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
    workers:
      machineDeployments:
        # General-purpose pool: Phoenix server, system DaemonSets.
        # Stays on Hetzner Cloud (cpx32) since these workloads don't
        # benefit from bare metal and the elastic scaling matters
        # more than per-host cost.
        - class: hcloud-worker
          name: md-0
          replicas: 2
          failureDomain: fsn1
        # Linux runner pool on Hetzner Robot bare metal. Each
        # claimable `HetznerBareMetalHost` CR (see
        # `bare-metal-staging.yaml`) gets picked up by caph, which
        # runs the rescue + installimage + cloud-init kubeadm-join
        # flow to register the host as a worker Node. Each node ends
        # up labeled `node.cluster.x-k8s.io/pool=runners-linux` +
        # `tuist.dev/kata-runtime=true` and tainted
        # `tuist.dev/runner-tier=bare-metal:NoSchedule`.
        #
        # No `replicas:` here — scale intent for this pool lives in
        # the workload cluster's `values-managed-<env>.yaml` under
        # `runnersFleetLinux.pools[].autoscaling`, and the
        # workload-side runners-controller autoscaler patches this
        # MD's `spec.replicas` at runtime via `--mgmt-kubeconfig`.
        # Omitting replicas opts this MD out of topology-managed
        # replicas, so CAPI won't fight the autoscaler.
        - class: bare-metal-worker
          name: runners-linux
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: runners-linux
