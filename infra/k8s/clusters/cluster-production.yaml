# Production workload Cluster, topology mode against tuist-hcloud.
# Three worker pools: md-0 general (ccx23, dedicated vCPU for the
# Phoenix server's predictable p99 latency), md-processor (cpx62
# shared-vCPU, 16 vCPU / 32 GiB each, optimized for xcactivitylog
# parsing throughput-per-euro), and kura (ccx13 dedicated vCPU for
# Kura cache replicas). Pool labels propagate from MachineDeployment
# metadata to nodes via CAPI's machine-to-node label sync (only the
# node-role.kubernetes.io/, node-restriction.kubernetes.io/, and
# node.cluster.x-k8s.io/ prefixes are allowed through).
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      # Default for pools without an override (md-0).
      - name: hcloudWorkerMachineType
        value: ccx23
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
      # Scopes bare-metal HBM claims to this cluster (see the
      # `HetznerBareMetalMachineTemplateClusterSelector` patch in
      # `clusterclass-tuist.yaml`). Matches the `--clusters` entry
      # on the `hetzner-robot-controller` Deployment and the
      # cluster prefix in the Robot panel server name
      # (`tuist-bm-production-…`).
      - name: bareMetalCluster
        value: production
    workers:
      machineDeployments:
        # General-purpose pool: Phoenix server, redis, system DaemonSets,
        # plus the 3-instance CloudNativePG cluster — its hard pod
        # anti-affinity (`topologyKey: kubernetes.io/hostname,
        # podAntiAffinityType: required`) needs one CNPG instance per
        # host, so the pool size has to match the configured instance
        # count to avoid leaving a CNPG pod permanently Pending.
        - class: hcloud-worker
          name: md-0
          replicas: 3
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: general
        # Dedicated processor pool: xcactivitylog parsing.
        # CA annotations declared here propagate to the rendered
        # MachineDeployment via topology mode. Without them the
        # classRef swap to tuist-hcloud would re-render the MD
        # without the autoscaler bounds, dropping cluster-autoscaler's
        # node-group registration mid-flight. Values must match the
        # live MD at swap time; verify with:
        #   kubectl -n org-tuist get md tuist-md-processor \
        #     -o jsonpath='{.metadata.annotations}'
        - class: hcloud-worker
          name: md-processor
          replicas: 2
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: processor
            annotations:
              cluster.x-k8s.io/cluster-autoscaler-node-group-min-size: "2"
              cluster.x-k8s.io/cluster-autoscaler-node-group-max-size: "6"
          variables:
            overrides:
              - name: hcloudWorkerMachineType
                value: cpx62
        # Dedicated eu-central Kura pool. Kura StatefulSets use RWO PVCs
        # and a hard hostname spread constraint, so the minimum is three
        # workers to keep each account's three replicas on distinct
        # nodes. The pool label propagates to the MachineDeployment and
        # node template, so cluster-autoscaler can scale this group for
        # Kura pods with that nodeSelector. ClusterClass does not expose
        # taints today; Kura pods pin here by node.cluster.x-k8s.io/pool
        # and general/server pods pin to their own pools.
        - class: hcloud-worker
          name: kura
          failureDomain: fsn1
          healthCheck:
            checks:
              nodeStartupTimeoutSeconds: 600
              unhealthyNodeConditions:
                - type: Ready
                  status: Unknown
                  timeoutSeconds: 300
                - type: Ready
                  status: "False"
                  timeoutSeconds: 300
            remediation:
              triggerIf:
                unhealthyLessThanOrEqualTo: 100%
          metadata:
            labels:
              autoscaling.tuist.dev/group: kura
              node.cluster.x-k8s.io/pool: kura
            annotations:
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "3"
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "12"
              cluster.x-k8s.io/cluster-autoscaler-node-group-min-size: "3"
              cluster.x-k8s.io/cluster-autoscaler-node-group-max-size: "12"
          variables:
            overrides:
              - name: hcloudWorkerMachineType
                value: ccx13
        # US East Kura capacity lives in the production workload
        # cluster as a regional node pool instead of a separate cluster.
        # The region catalog pins us-east KuraInstances to this pool.
        - class: hcloud-worker
          name: kura-us-east
          failureDomain: ash
          healthCheck:
            checks:
              nodeStartupTimeoutSeconds: 600
              unhealthyNodeConditions:
                - type: Ready
                  status: Unknown
                  timeoutSeconds: 300
                - type: Ready
                  status: "False"
                  timeoutSeconds: 300
            remediation:
              triggerIf:
                unhealthyLessThanOrEqualTo: 100%
          metadata:
            labels:
              autoscaling.tuist.dev/group: kura-us-east
              node.cluster.x-k8s.io/pool: kura-us-east
            annotations:
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "3"
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "32"
              cluster.x-k8s.io/cluster-autoscaler-node-group-min-size: "3"
              cluster.x-k8s.io/cluster-autoscaler-node-group-max-size: "32"
          variables:
            overrides:
              - name: hcloudWorkerMachineType
                value: ccx13
        # US West Kura capacity lives in the production workload
        # cluster as a regional node pool instead of a separate cluster.
        # The region catalog pins us-west KuraInstances to this pool.
        - class: hcloud-worker
          name: kura-us-west
          failureDomain: hil
          healthCheck:
            checks:
              nodeStartupTimeoutSeconds: 600
              unhealthyNodeConditions:
                - type: Ready
                  status: Unknown
                  timeoutSeconds: 300
                - type: Ready
                  status: "False"
                  timeoutSeconds: 300
            remediation:
              triggerIf:
                unhealthyLessThanOrEqualTo: 100%
          metadata:
            labels:
              autoscaling.tuist.dev/group: kura-us-west
              node.cluster.x-k8s.io/pool: kura-us-west
            annotations:
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "3"
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "12"
              cluster.x-k8s.io/cluster-autoscaler-node-group-min-size: "3"
              cluster.x-k8s.io/cluster-autoscaler-node-group-max-size: "12"
          variables:
            overrides:
              - name: hcloudWorkerMachineType
                value: ccx13
        # Linux runner pool on Hetzner Robot bare metal. The
        # `hetzner-robot-controller` reflects
        # `tuist-bm-production-*` Robot servers into HBM CRs
        # stamped `tuist.dev/cluster=production`; caph claims them
        # through the patched HBMM hostSelector. Each node ends up
        # labeled `node.cluster.x-k8s.io/pool=runners-linux` +
        # `tuist.dev/kata-runtime=true` and tainted
        # `tuist.dev/runner-tier=bare-metal:NoSchedule`.
        #
        # Host count is operator-managed: order another
        # `tuist-bm-production-*` server in the Robot panel and
        # bump `replicas:` here to grow capacity.
        - class: bare-metal-worker
          name: runners-linux
          # Two pre-ordered AX162-R hosts (`tuist-bm-production-1` and
          # `tuist-bm-production-2`) in FSN1. Each box hosts ~64 Kata-
          # QEMU runner slots at the chart's 1 vCPU / 4 GB slot size;
          # two boxes give ~128 runner slots + one host of HA headroom.
          # Bump in lockstep with new Robot orders.
          replicas: 2
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: runners-linux
              # See cluster-staging.yaml for the rationale — keeps
              # bare-metal Nodes out of HCCM's LB target set so a
              # bad providerID can't break the ingress.
              node.kubernetes.io/exclude-from-external-load-balancers: ""
