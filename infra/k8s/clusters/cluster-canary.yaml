# Canary workload Cluster, topology mode against tuist-hcloud.
# Mirrors staging shape.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist-canary
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      - name: hcloudWorkerMachineType
        value: cpx32
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
      # Scopes bare-metal HBM claims to this cluster (see the
      # `HetznerBareMetalMachineTemplateClusterSelector` patch in
      # `clusterclass-tuist.yaml`). Matches the `--clusters` entry
      # on the `hetzner-robot-controller` Deployment and the
      # cluster prefix in the Robot panel server name
      # (`tuist-bm-canary-…`).
      - name: bareMetalCluster
        value: canary
    workers:
      machineDeployments:
        - class: hcloud-worker
          name: md-0
          replicas: 2
          failureDomain: fsn1
        # Linux runner pool on Hetzner Robot bare metal. The
        # `hetzner-robot-controller` reflects `tuist-bm-canary-*`
        # Robot servers into HBM CRs stamped
        # `tuist.dev/cluster=canary`; caph claims them through the
        # patched HBMM hostSelector. Each node ends up labeled
        # `node.cluster.x-k8s.io/pool=runners-linux` +
        # `tuist.dev/kata-runtime=true` and tainted
        # `tuist.dev/runner-tier=bare-metal:NoSchedule`.
        #
        # Host count is operator-managed: order another
        # `tuist-bm-canary-*` server in the Robot panel and bump
        # `replicas:` here to grow capacity.
        - class: bare-metal-worker
          name: runners-linux
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: runners-linux
              # See cluster-staging.yaml for the rationale — keeps
              # bare-metal Nodes out of HCCM's LB target set so a
              # bad providerID can't break the ingress.
              node.kubernetes.io/exclude-from-external-load-balancers: ""
