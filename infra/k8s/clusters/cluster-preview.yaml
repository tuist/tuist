# Preview workload Cluster, topology mode against tuist-hcloud.
# Single CP, one preview app worker pool, and an autoscaled Kura worker
# pool for Slack-requested previews. The app worker pool
# replica count is managed by the preview-deploy / preview-sweep workflows,
# not by this manifest.
#
# DO NOT `kubectl apply` THIS FILE AFTER INITIAL BOOTSTRAP.
# The `replicas: 1` on the worker MachineDeployment will fight the
# preview-deploy workflow, which scales the pool 0→1 on PR open and
# back on the hourly sweep. A re-apply resets replicas to 1 and
# leaves any in-flight scale-down in an inconsistent state. To make
# topology changes (CP machine type, K8s version, etc.), edit the
# Cluster CR in place via `kubectl edit` and let the topology
# controller reconcile only the diff. Long-term fix: server-side
# apply with a field manager that explicitly excludes
# `workers.machineDeployments[?(@.name=="md-0")].replicas` from the
# managed-fields set. The Kura pool intentionally keeps replicas unset and
# relies on Cluster Autoscaler min/max annotations.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist-preview
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 1
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      - name: hcloudWorkerMachineType
        value: cpx42
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
    workers:
      machineDeployments:
        - class: hcloud-worker
          name: md-0
          replicas: 1
          failureDomain: fsn1
        # Dedicated Kura pool for previews. Controller-managed
        # KuraInstance StatefulSets default to
        # `node.cluster.x-k8s.io/pool=kura` and use hard hostname spreading.
        # Keep this autoscaled so Kura nodes only exist while a preview creates
        # Kura pods.
        - class: hcloud-worker
          name: kura
          failureDomain: fsn1
          healthCheck:
            checks:
              nodeStartupTimeoutSeconds: 600
              unhealthyNodeConditions:
                - type: Ready
                  status: Unknown
                  timeoutSeconds: 300
                - type: Ready
                  status: "False"
                  timeoutSeconds: 300
            remediation:
              triggerIf:
                unhealthyLessThanOrEqualTo: 100%
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: kura
              autoscaling.tuist.dev/group: kura-preview
            annotations:
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "0"
              cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "6"
              cluster.x-k8s.io/cluster-autoscaler-node-group-min-size: "0"
              cluster.x-k8s.io/cluster-autoscaler-node-group-max-size: "6"
          variables:
            overrides:
              - name: hcloudWorkerMachineType
                value: ccx13
