# Preview workload Cluster, topology mode against tuist-hcloud.
# Single CP + worker; the worker pool replica count is managed by the
# preview-deploy / preview-sweep workflows, not by this manifest.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tuist-preview
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 1
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      - name: hcloudWorkerMachineType
        value: cpx42
      - name: hcloudSSHKeyName
        value:
          - name: tuist-syself
    workers:
      machineDeployments:
        - class: hcloud-worker
          name: md-0
          replicas: 1
          failureDomain: fsn1
