# Syncs Flux's git credential (a dedicated single-repo GitHub App) from the
# tuist-k8s-mgmt 1Password vault into the secret the bootstrap-created
# `flux-system` GitRepository reads (spec/72 Decision 8: Flux's git secret
# is ESO-synced, not hand-created; the App key rotates on the production-
# secret cadence).
#
# creationPolicy: Merge — `flux bootstrap` already creates the `flux-system`
# Secret; ESO merges the current App credentials into it on each refresh
# without taking ownership, so rotation is a 1Password edit and neither tool
# fights the other. Requires the `onepassword` ClusterSecretStore
# (external-secrets.yaml) and a `FLUX_GITHUB_APP` item in tuist-k8s-mgmt
# with fields app-id / installation-id / private-key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-system-git-auth
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: flux-system
    creationPolicy: Merge
    deletionPolicy: Retain
    template:
      data:
        # Flux source-controller GitHub App auth keys.
        githubAppID: "{{ .appID }}"
        githubAppInstallationID: "{{ .installationID }}"
        githubAppPrivateKey: "{{ .privateKey }}"
  data:
    - secretKey: appID
      remoteRef:
        key: FLUX_GITHUB_APP/app-id
    - secretKey: installationID
      remoteRef:
        key: FLUX_GITHUB_APP/installation-id
    - secretKey: privateKey
      remoteRef:
        key: FLUX_GITHUB_APP/private-key
