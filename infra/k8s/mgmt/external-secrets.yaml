# External Secrets Operator (ESO) on the MANAGEMENT cluster.
#
# spec/72 Decision 8: landing ESO on the mgmt cluster is a bootstrap
# prerequisite for Flux. Management-cluster secrets are hand-created today;
# once ESO is here, Flux's git credential and the Grafana Cloud tokens are
# synced from the `tuist-k8s-mgmt` 1Password vault instead.
#
# ESO is NOT installed by the platform chart here — the mgmt cluster does
# not run `infra/helm/platform/`. Install the same pinned chart standalone
# (matches the workload-cluster version so the onepasswordSDK provider
# behaves identically):
#
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm upgrade --install external-secrets external-secrets/external-secrets \
#     --version 2.3.0 \
#     -n external-secrets --create-namespace \
#     --set installCRDs=true
#
# Then create the 1Password service-account token Secret the store below
# authenticates with (break-glass, one-time — this is the seed credential
# ESO itself needs, so it cannot be ESO-synced):
#
#   op read "op://tuist-k8s-mgmt/onepassword-sa-token/credential" \
#     | kubectl create secret generic onepassword-sa-token \
#         -n onepassword --from-file=token=/dev/stdin
#
# and apply this file. Everything else (Flux git creds, Grafana Cloud
# tokens) is then an ExternalSecret against the store.
---
apiVersion: v1
kind: Namespace
metadata:
  name: onepassword
  labels:
    app.kubernetes.io/managed-by: tuist-bootstrap
---
# 1Password-backed ClusterSecretStore for the mgmt cluster. Same shape as
# the per-workload store in `bootstrap/onepassword-secretstore.yaml`, but
# the vault is fixed to tuist-k8s-mgmt (no envsubst — there is one mgmt
# cluster). Uses the 1Password SDK provider, which authenticates against
# the 1P API directly with a service-account token; no in-cluster Connect.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      vault: tuist-k8s-mgmt
      auth:
        serviceAccountSecretRef:
          name: onepassword-sa-token
          namespace: onepassword
          key: token
