# ClusterSecretStore wiring external-secrets-operator (already
# installed by `infra/helm/platform/`) to the per-env 1Password
# vault. ESO uses the 1Password SDK provider, which authenticates
# against the 1P API directly using a service account token —
# no in-cluster 1Password Connect needed.
#
# Per-cluster substitutions (handled by the bootstrap script with envsubst):
#   ${VAULT_NAME} — e.g. tuist-k8s-staging, tuist-k8s-canary,
#                   tuist-k8s-production, tuist-k8s-preview
#
# Expects `onepassword-sa-token` Secret in `onepassword` namespace,
# created by the bootstrap script from 1Password (item: per-env
# 1Password service-account token).

---
apiVersion: v1
kind: Namespace
metadata:
  name: onepassword
  labels:
    app.kubernetes.io/managed-by: tuist-bootstrap
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      vault: ${VAULT_NAME}
      auth:
        serviceAccountSecretRef:
          name: onepassword-sa-token
          namespace: onepassword
          key: token
