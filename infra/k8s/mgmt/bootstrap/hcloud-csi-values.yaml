# hcloud-csi-driver values.
# Installed so a workload that wants a PVC just gets one. CNPG (the
# main PVC consumer on workload clusters) carries its own StorageClass
# config, so this is mostly future-proofing for ad-hoc workloads.
#
# HCLOUD_TOKEN comes from the chart's default secretKeyRef
# (kube-system/hcloud, key `token`), which caph provisions when it
# brings the workload cluster up — same Secret HCCM reads.

# Default StorageClass uses Hetzner volumes (block storage in fsn1).
storageClasses:
  - name: hcloud-volumes
    defaultStorageClass: true
    reclaimPolicy: Retain  # safer default — let the operator garbage-collect explicitly
    # Volume binding deferred so PVCs follow the pod placement.
    volumeBindingMode: WaitForFirstConsumer

controller:
  replicaCount: 1
  # During bootstrap, only the first control-plane node may be joined when
  # the CSI chart is installed. Schedule the controller there so Helm's
  # readiness wait does not depend on worker-node provisioning.
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

node:
  # CSI driver needs to reach Hetzner's instance metadata service at
  # 169.254.169.254 (link-local) on startup to determine the volume
  # location. That address isn't reachable from pod-network namespaces
  # under Cilium with bpf-masquerade; hostNetwork=true puts the
  # node pod in the host's namespace where the metadata service is
  # directly reachable. Default in the chart is false, which leads
  # to a CrashLoopBackOff with "context deadline exceeded" trying to
  # GET /hetzner/v1/metadata/availability-zone.
  hostNetwork: true
  # Skip Hetzner Robot bare-metal nodes (the `runners-linux` pool in
  # `cluster-<env>.yaml`). The chart's default tolerations are
  # `operator: Exists`, which swallows the
  # `tuist.dev/runner-tier=bare-metal:NoSchedule` taint and lands the
  # pod on bare metal, where two things go wrong:
  #   1. Hetzner Cloud Volumes can't attach to Robot servers, so the
  #      driver has nothing to do there — it's the wrong CSI for the
  #      hardware.
  #   2. The driver's startup call to `api.hetzner.cloud` truncates
  #      to the first 3 nameservers (Linux resolv.conf limit), which
  #      on a multi-NIC bare-metal box can omit the working upstream;
  #      kubelet logs `DNSConfigForming` and the process exits Error
  #      before binding its `:9808` healthz port, so the liveness
  #      probe gets `connection refused` and CrashLoopBackOff kicks
  #      in. Observed on `bm-tuist-staging-runners-linux-*`.
  #
  # Helm replaces (rather than merges) `node.affinity` when set, so
  # the chart's upstream Robot exclusions (`is-root-server`,
  # `provided-by=robot`) are re-declared here alongside our own
  # rules. All match expressions live in one list so they AND
  # together — a node schedules the pod only if it is none of:
  # Hetzner root server, Robot-provisioned, in `runners-linux`, or
  # running darwin. Our CAPI HCCM doesn't set the `is-root-server` /
  # `provided-by` labels today (upstream chart with no Robot creds),
  # so the pool and OS rules are what actually filter in this
  # cluster; the others are forward-compat with a Syself-style HCCM
  # or a future Robot-aware upstream.
  #
  # The darwin exclusion catches the Scaleway Apple Silicon Mac
  # minis joined via tart-cri (`kubernetes.io/os: darwin`,
  # `tuist.dev/runtime: tart`). Hetzner Cloud Volumes can't attach
  # to those — they're not on Hetzner at all — so the driver has
  # nothing to do, and without this filter its pods sit Pending
  # indefinitely waiting on hostPath mounts and a Linux kernel
  # interface that doesn't exist. NotIn with an absent label
  # matches (= node included), so this rule only filters out nodes
  # that explicitly advertise darwin; everything else still passes.
  #
  # Future bare-metal pools should carry the same
  # `node.cluster.x-k8s.io/pool` label convention so this affinity
  # can be extended with another `values:` entry.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: instance.hetzner.cloud/is-root-server
                operator: NotIn
                values:
                  - "true"
              - key: instance.hetzner.cloud/provided-by
                operator: NotIn
                values:
                  - robot
              - key: node.cluster.x-k8s.io/pool
                operator: NotIn
                values:
                  - runners-linux
                  # Scaleway Instance pool for the macOS runner
                  # cache (kura) — not Hetzner hardware, hcloud
                  # Volumes can't attach there. scaleway-csi serves
                  # its PVCs instead.
                  - kura-scw-fr-par
                  # Dedibox bare metal (EU customer-facing kura
                  # cache) — likewise not Hetzner; local NVMe serves
                  # its PVCs.
                  - kura-dedibox
                  # OVHcloud bare metal (validation / future us-east,
                  # us-west kura cache) — not Hetzner either; local
                  # NVMe serves its PVCs.
                  - kura-ovh-staging
              - key: kubernetes.io/os
                operator: NotIn
                values:
                  - darwin
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi
