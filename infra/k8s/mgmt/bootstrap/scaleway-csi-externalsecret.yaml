# Scaleway API credentials for scaleway-csi, synced from the per-env
# SCALEWAY_API 1Password item (same item the CAPI Apple-Silicon
# provider uses — one Scaleway IAM principal per env). The chart's
# `controller.scaleway.existingSecretName` points here so no key
# material lives in values files.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scaleway-csi
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: scaleway-csi
    template:
      data:
        # Zone of the kura-scw-fr-par Instance pool; volumes are
        # zonal and WaitForFirstConsumer pins them to the consuming
        # node's zone anyway, this is the API default.
        SCW_DEFAULT_ZONE: fr-par-1
        SCW_DEFAULT_PROJECT_ID: "{{ .projectID }}"
        SCW_ACCESS_KEY: "{{ .accessKey }}"
        SCW_SECRET_KEY: "{{ .secretKey }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: SCALEWAY_API/access-key
    - secretKey: secretKey
      remoteRef:
        key: SCALEWAY_API/secret-key
    - secretKey: projectID
      remoteRef:
        key: SCALEWAY_API/project-id
