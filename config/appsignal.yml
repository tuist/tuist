default: &defaults
  # Your app's name
  name: "Tuist Cloud Rails"

  request_headers:
    - HTTP_ACCEPT
    - HTTP_ACCEPT_CHARSET
    - HTTP_ACCEPT_ENCODING
    - HTTP_ACCEPT_LANGUAGE
    - HTTP_CACHE_CONTROL
    - HTTP_CONNECTION
    - CONTENT_LENGTH
    - PATH_INFO
    - HTTP_RANGE
    - REQUEST_METHOD
    - REQUEST_PATH
    - SERVER_NAME
    - SERVER_PORT
    - SERVER_PROTOCOL
    - HTTP_X_REQUEST_ID

  # Actions that should not be monitored by AppSignal
  # ignore_actions:
  #   - ApplicationController#isup

  # Errors that should not be recorded by AppSignal
  # For more information see our docs:
  # https://docs.appsignal.com/ruby/configuration/ignore-errors.html
  # ignore_errors:
  #   - Exception
  #   - NoMemoryError
  #   - ScriptError
  #   - LoadError
  #   - NotImplementedError
  #   - SyntaxError
  #   - SecurityError
  #   - SignalException
  #   - Interrupt
  #   - SystemExit
  #   - SystemStackError

  # See https://docs.appsignal.com/ruby/configuration/options.html for
  # all configuration options.

# Configuration per environment, leave out an environment or set active
# to false to not push metrics for that environment.
development:
  <<: *defaults
  active: false

staging:
  <<: *defaults
  push_api_key: 6b537076-3b76-4ca8-95af-c1231b2e40bd
  active: <%= ENV.fetch("TUIST_CLOUD_SELF_HOSTED", 0) == 0 %>

canary:
  <<: *defaults
  push_api_key: 4d1bdc6c-2b28-43a2-aac3-3729d9cffb9b
  active: <%= ENV.fetch("TUIST_CLOUD_SELF_HOSTED", 0) == 0 %>

production:
  <<: *defaults
  push_api_key: 6ac0be5a-4a1d-488d-ab22-e9a96ffe42d8
  active: <%= ENV.fetch("TUIST_CLOUD_SELF_HOSTED", 0) == 0 %>
