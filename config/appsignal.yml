default: &defaults
  # Your app's name
  name: "Tuist Cloud Rails"
  request_headers:
    - HTTP_ACCEPT
    - HTTP_ACCEPT_CHARSET
    - HTTP_ACCEPT_ENCODING
    - HTTP_ACCEPT_LANGUAGE
    - HTTP_CACHE_CONTROL
    - HTTP_CONNECTION
    - CONTENT_LENGTH
    - PATH_INFO
    - HTTP_RANGE
    - REQUEST_METHOD
    - REQUEST_PATH
    - SERVER_NAME
    - SERVER_PORT
    - SERVER_PROTOCOL
    - HTTP_X_REQUEST_ID
    - HTTP_TUIST_CLOUD_CLI_VERSION
    - HTTP_TUIST_CLOUD_CLI_RELEASE_DATE

  # Actions that should not be monitored by AppSignal
  # ignore_actions:
  #   - ApplicationController#isup

  # Errors that should not be recorded by AppSignal
  # For more information see our docs:
  # https://docs.appsignal.com/ruby/configuration/ignore-errors.html
  # ignore_errors:
  #   - Exception
  #   - NoMemoryError
  #   - ScriptError
  #   - LoadError
  #   - NotImplementedError
  #   - SyntaxError
  #   - SecurityError
  #   - SignalException
  #   - Interrupt
  #   - SystemExit
  #   - SystemStackError

  # See https://docs.appsignal.com/ruby/configuration/options.html for
  # all configuration options.

# Configuration per environment, leave out an environment or set active
# to false to not push metrics for that environment.
development:
  <<: *defaults
  active: false

staging:
  <<: *defaults
  push_api_key: 9ac822a3-af7d-45c6-ae0b-1f5b1253f1c4
  active: <%= ENV.fetch("TUIST_CLOUD_HOSTED", "0") == "1" %>

canary:
  <<: *defaults
  push_api_key: 5500bd6a-16db-4cf4-b569-297f00a9854c
  active: <%= ENV.fetch("TUIST_CLOUD_HOSTED", "0") == "1" %>

production:
  <<: *defaults
  push_api_key: 1e548fb3-aee4-47b8-a7d9-8a2298f48f91
  active: <%= ENV.fetch("TUIST_CLOUD_HOSTED", "0") == "1" %>
