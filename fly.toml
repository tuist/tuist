app = "tuist-cloud"
primary_region = "fra"
kill_signal = "SIGINT"
kill_timeout = "5s"
console_command = "/app/bin/rails console"

[experimental]
  auto_rollback = true

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PORT = "8080"
  MIX_ENV="prod"
  TUIST_APP_URL="https://cloud.tuist.io"
  TUIST_CLOUD_HOSTED="1"
  TUIST_USE_SSL_FOR_DATABASE="1"
  TUIST_DATABASE_POOL_SIZE="10"
  RELEASE_COOKIE="wYkuAJNnZ0oIXt_AVQf1gFO3i6OvhV6i4BKqtyh79oL-HKwSle-DLg=="

[[vm]]
  cpu_kind = 'shared'
  memory = "4096mb"
  cpus = 2

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 2
  processes = ["app"]
  http_options = { h2_backend = true }

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = 10000
    grace_period = "10s"
    method = "get"
    path = "/ready"
    protocol = "http"
    timeout = 2000
    tls_skip_verify = false
    [services.http_checks.headers]

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/"
