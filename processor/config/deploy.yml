service: processor
image: tuist/processor

servers:
  web:
    proxy: false
    options:
      publish: 4002:4002

ssh:
  user: github-actions

registry:
  server: ghcr.io
  username: cschmatzler
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ..


env:
  clear:
    PORT: "4002"

  secret:
    - SECRET_KEY_BASE
    - S3_ENDPOINT
    - S3_BUCKET
    - S3_REGION
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - WEBHOOK_SECRET
    - GIT_SHA

volumes:
  - /tmp/processor:/tmp:rw
